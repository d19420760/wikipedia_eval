        \ player to reach the third round of a major in the Open Era. Learner Tien\
        \ was the youngest player to reach the Australian Open quarterfinals since\
        \ Nick Kyrgios in 2015.\nFor the first time in the Open Era, and first time\
        \ since the 32-seed system was introduced at the 2001 Wimbledon Championships,\
