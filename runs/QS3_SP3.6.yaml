        \ Result 8\nTitle: British television Apollo 11 coverage\nURL: https://en.wikipedia.org/wiki/British_television_Apollo_11_coverage\n\
        Extract: British television coverage of the Apollo 11 mission, the first crewed\
        \ landing on the Moon, lasted from 16 to 24 July 1969. Three UK television\
