        \ and London (summer) in 1944. The 1906 Intercalated Olympics were officially\
        \ sanctioned and held in Athens. However, in 1949, the International Olympic\
        \ Committee (IOC) decided to unrecognize the 1906 Games. The 2020 Summer Olympics\
        \ in Tokyo were postponed for the first time in the Olympics history to summer\
        \ 2021 due to the COVID-19 pandemic, with the 2022 Winter Olympics being held\
        \ roughly six months later in Beijing which also hosted the 2008 Summer Olympics.\n\
        Four cities and regions have been chosen by the IOC to host upcoming Olympic\
        \ Games: Los Angeles for the 2028 Summer Olympics; the 2030 Winter Olympics\
        \ will be the first Olympic Games to be hosted by a region (the French Alps—comprising\
        \ 7 cities and towns); Brisbane will host the 2032 Summer Olympics; and Utah\
        \ will host the 2034 Winter Olympics.\nIn 2022, Beijing became the first city\
        \ to have hosted both the Summer and Winter Olympics. By 2034, eleven cities\
        \ will have hosted the Olympic Games more than once: Athens (1896 and 2004\
        \ Summer Olympics), Paris (1900, 1924 and 2024 Summer Olympics), London (1908,\
        \ 1948 and 2012 Summer Olympics), St. Moritz (1928 and 1948 Winter Olympics),\
        \ Lake Placid (1932 and 1980 Winter Olympics), Los Angeles (1932, 1984 and\
        \ 2028 Summer Olympics), Cortina d'Ampezzo (1956 and 2026 Winter Olympics),\
        \ Innsbruck (1964 and 1976 Winter Olympics), Tokyo (1964 and 2020 Summer Olympics),\
        \ Beijing (2008 Summer Olympics and 2022 Winter Olympics) and Salt Lake City\
        \ (2002 and 2034 Winter Olympics). \nStockholm hosted the 1912 Summer Olympics\
        \ and the equestrian portion of the 1956 Summer Olympics. London and Paris\
        \ have both hosted three Games, while Los Angeles will become the third city\
        \ to gain that distinction in 2028.\nAs of 2026, a large majority of the Games\
        \ (42 out of 55) have been hosted in Western Europe, the United States, Canada,\
        \ or Australia. Eight Games have been hosted in Asia (all in East Asia), three\
        \ in Eastern Europe, and two in Latin America. Africa has yet to host an Olympic\
        \ Games. Other major geographic regions and subcontinents that have never\
        \ hosted the Olympics include the Middle East, Central Asia, the Indian subcontinent,\
        \ Southeast Asia, and the Caribbean. Between the first Winter Olympics in\
        \ 1924 and the last ones to be held in the same year as the Summer Olympics\
        \ in 1992, the Summer and Winter Games took place in the same country three\
        \ times.\nUsually, the Games' host cities are selected by the IOC members\
        \ six to seven years in advance. \nUntil the 2022 Winter Olympics, the selection\
        \ process lasts approximately two years. In the first stage, any city in the\
        \ world may apply to become a host city. After ten months, the Executive Board\
        \ of the IOC decides which applicant cities will become official candidates\
        \ based on the recommendation of a working group that reviews the applications.\
        \ In the second stage, the candidate cities are investigated thoroughly by\
        \ an Evaluation Commission, which then submits a final short list of cities\
        \ for selection. The host city is then chosen by vote of the IOC session,\
        \ a general meeting of IOC members. There was a change in host selection process\
        \ in the late 2010s to address several problems – including the costs of hosting\
        \ and the disappointment felt by unsuccessful applicants. Called Olympic Agenda\
        \ 2020, this new process is focused on reducing the cost of Games, minimising\
