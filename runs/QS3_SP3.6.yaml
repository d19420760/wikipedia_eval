        \ size (an area slightly smaller than Trinidad and Tobago), in the hilly south\
        \ central part of the state of Paraná in southern Brazil. They refer to this\
        \ region as \"Brazilian Ukraine.\" Smaller numbers of Ukrainians have settled\
        \ in São Paulo, Santa Catarina, Rio Grande do Sul, Pernambuco, and Paraíba.\n\
        The cities with the largest number of Ukrainians are Prudentópolis (approximately\
