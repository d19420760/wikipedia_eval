        ## Result 2
        Title: Inquisition
        URL: https://en.wikipedia.org/wiki/Inquisition
        Extract: An inquisition was a Catholic judicial procedure in which ecclesiastical judges could initiate, investigate and try cases in their jurisdiction. Popularly the Inquisition became the name for various medieval and Reformation-era state-organized tribunals whose aim was to combat heresy, apostasy, blasphemy, witchcraft, and customs considered to be deviant, using this judicial procedure. Violence, isolation, certain torture or the threat of its application, have been used by inquisitions to extract confessions and denunciations. Inquisitions with the aim of combatting religious sedition (e.g. apostasy or heresy) had their start in the 12th-century Kingdom of France, particularly among the Cathars and the Waldensians. The inquisitorial courts from this time until the mid-15th century are together known as the Medieval Inquisition. Other banned groups investigated by medieval inquisitions, which primarily took place in France and Italy, include the Spiritual Franciscans, the Hussites, and the Beguines. Beginning in the 1250s, inquisitors were generally chosen from members of the Dominican Order, replacing the earlier practice of using local clergy as judges.
        Inquisitions also expanded to other European countries, resulting in the Spanish Inquisition and the Portuguese Inquisition. The Spanish and Portuguese inquisitions often focused on the New Christians or Conversos (former Jews who converted to Christianity to avoid antisemitic regulations and persecution), the Marranos (people who were forced to abandon Judaism against their will by violence and threats of expulsion), and on the Moriscos (Muslims who had been forced to convert to Catholicism), as a result of suspicions that they had secretly maintained or reverted to their previous religions, as well as the fear of possible rebellions, as had occurred in previous times (such as the First and Second Morisco Rebellions). Spain and Portugal also operated inquisitorial courts not only in Europe, but also throughout their empires: the Goa Inquisition, the Peruvian Inquisition, and the Mexican Inquisition, among others. Inquisitions conducted in the Papal States were known as the Roman Inquisition.
        The scope of the inquisitions grew significantly in response to the Protestant Reformation and the Catholic Counter-Reformation. In 1542, a putative governing institution, the Supreme Sacred Congregation of the Roman and Universal Inquisition was created. With the exception of the Papal States, ecclessiastical inquisition courts were abolished in the early 19th century, after the Napoleonic Wars in Europe and the Spanish American wars of independence in the Americas. The papal institution survived as part of the Roman Curia, although it underwent a series of name and focus changes, now part of the Dicastery for the Doctrine of the Faith.

