        \ - panoramio.jpg\n| caption              = Shakespeare's Birthplace in 2010\n\
        | type                 = \n| location             = [[Stratford-upon-Avon#Henley\
        \ Street|Henley Street]], [[Stratford-upon-Avon]], [[Warwickshire]], England\n\
        | coordinates          = {{Coord|52.1939|-1.7080|display=inline,title|region:GB-WAR_type:landmark}}\n\
        | built                = before 1552\n| original_use         = [[House]]\n\
        | current_use          = [[Museum]]\n| architecture         = [[Timber framing|Half-timbered]]\n\
        | owner                = [[Shakespeare Birthplace Trust]]\n| website     \
        \         = {{URL|http://www.shakespeare.org.uk/content/view/47/47/}}\n| designation1\
        \         = Grade I\n| designation1_offname = Shakespeare's Birthplace\n|\
        \ designation1_date    = 25 October 1951\n| designation1_number  =  {{Listed\
        \ building England|1187807}}\n}}\n\n'''Shakespeare's Birthplace''' is a restored\
        \ 16th-century [[Timber framing|half-timbered]] house situated on [[Stratford-upon-Avon#Henley\
        \ Street|Henley Street]], [[Stratford-upon-Avon]], [[Warwickshire]], England,\
        \ where it is believed that [[William Shakespeare]] was born in 1564 and spent\
        \ his childhood years.<ref name=aboutbritain>[http://www.aboutbritain.com/ShakespearesBirthplace.htm\
        \ Shakespeare's birthplace] aboutbritain.com. Retrieved: 11 November 2008.</ref><ref\
        \ name=britainexpress>[http://www.britainexpress.com/counties/warwickshire/az/Stratford/Shakespeare-Birthplace.htm\
        \ Shakespeare's Birthplace] britainexpress.com. Retrieved: 12 November 2008.</ref>\
        \ It is now a small [[museum]] open to the public and a popular visitor attraction,\
        \ owned and managed by the [[Shakespeare Birthplace Trust]].<ref>{{cite book|last=Muir|first=Kenneth|authorlink=Kenneth\
        \ Muir (scholar)|title=Shakespeare Survey|publisher=Cambridge University Press|year=2002|isbn=\
        \ 978-0-521-52368-4}}</ref><ref name=\"world and its people\">{{cite book\n\
        \  |last = Dunton\n  |first = Larkin\n  |title = The World and Its People\n\
        \  |url = https://archive.org/details/worldanditspeop05duntgoog\n  |publisher\
        \ = Silver Burdett\n  |year = 1896\n  |page = [https://archive.org/details/worldanditspeop05duntgoog/page/n58\
        \ 50]}}</ref> It has been a Grade I [[listed building]] since 25 October 1951.<ref\
        \ name=\"Historic England\">{{cite web |title=SHAKESPEARE'S BIRTHPLACE |url=https://historicengland.org.uk/listing/the-list/list-entry/1187807\
        \ |website=HistoricEngland.org.uk |access-date=22 May 2024}}</ref>\n\n==Description==\n\
        [[File:Birthplace room.JPG|thumb|left|The second-story room in which Shakespeare\
        \ is thought to have been born. Unknown artist, 1903.]]\nThe house itself\
        \ is relatively simple, but for the late 16th century it would have been considered\
        \ quite a substantial dwelling.<ref name=britainexpress/> [[John Shakespeare]],\
        \ William's father, was a glove maker and wool dealer, and the house was originally\
        \ divided in two parts to allow him to carry out his business from the same\
        \ premises.<ref name=aboutbritain/>\n\nThe building is not outstanding architecturally,<ref\
        \ name=know-britain/> and typical of the times was constructed in [[wattle\
        \ and daub]] around a wooden frame. Local oak from the [[Arden, Warwickshire|Forest\
        \ of Arden]] and blue-grey stone from [[Wilmcote]] were used in its construction,\
        \ while the large fireplaces were made from an unusual combination of early\
        \ brick and stone, and the ground-floor level has stone-flagged floors.<ref\
        \ name=aboutbritain/><ref name=know-britain/> There is a framed panel on the\
        \ building exterior above and to the right of the porch roof showing exposed\
        \ construction wattle.<ref>{{cite web |last1=Berry |first1=Nicholas |title=Shakespeare's\
        \ Elizabethan timber framed birthplace |url=https://www.earlyoakreproductions.co.uk/news-blog/historic-britain/shakespeares-elizabethan-timber-framed-birthplace.php\
        \ |website=earlyoakreproductions.co.uk |publisher=Early Oak Reproductions\
        \ |access-date=5 June 2025}}</ref>\n\nThe plan of the building was originally\
        \ a simple rectangle. From north-west to south-east, the ground-floor consisted\
        \ of a parlour with fireplace, an adjoining hall with a large open hearth,\
        \ a cross passage, and finally a room which probably served as John Shakespeare's\
        \ workshop. This arrangement was mirrored on the first-floor by three chambers\
        \ accessed by a staircase from the hall, probably where the present stairs\
        \ are sited. Traditionally, the chamber over the parlour is the birthroom.\
        \ A separate single-bay house, now known as Joan Hart's Cottage, was later\
        \ built onto the north-west end of the house, and the present kitchen was\
        \ added at the rear with a chamber above it.<ref name=SBT>[http://www.shakespeare.org.uk/content/view/47/47/\
        \ Shakespeare's Birthplace] {{webarchive|url=https://web.archive.org/web/20081213004134/http://www.shakespeare.org.uk/content/view/47/47/\
        \ |date=2008-12-13 }} Shakespeare Birthplace Trust. Retrieved: 17 November\
        \ 2008.</ref>\n\n==History==\n[[File:Stratford Shakespeare 1900.jpg|thumb|right|Shakespeare's\
        \ Birthplace<br>(as seen between 1890 and 1905)]]\nThere are differing views\
        \ concerning the origin of the building, which possibly dates back to the\
        \ 15th century, but more likely was built in the mid-16th century.<ref name=know-britain>[http://www.know-britain.com/cities_towns/shakespeares_birthplace_stratford.html\
        \ Shakespeare's birthplace] know-britain.com. Retrieved: 11 November 2008.</ref>\n\
        \nRecords show that in 1552 John Shakespeare was fined for leaving a pile\
        \ of muck outside his home in Henley Street, suggesting that he could have\
        \ resided in a house there at the time. In Jephson's account of Shakespeare's\
        \ time in Stratford he states that at the time of Shakespeare's birth his\
        \ father was renting the property and that ten years later he was able to\
        \ purchase two freehold houses in Henley Street.<ref>{{cite journal| title\
        \ = Shakespeare – his birthplace, home and grave | journal=Discover Collections\
        \ | publisher = State Library of New South Wales | date = 2017 | url = http://www.sl.nsw.gov.au/stories/shakespeare-his-birthplace-home-and-grave}}</ref>\n\
        The house remained in the family until it was handed down for the final time\
        \ to William Shakespeare's daughter and, given that he was born in 1564, it\
        \ is fairly certain that he was born and brought up there.<ref name=bbc/>\n\
        \n===Ownership===\n[[File:Shakespeare's house in Henley Street, Stratford-upon-Avon\
        \ - ILN 1847.jpg|thumb|left|300px|Shakespeare's birthplace as it appeared\
        \ in 1847 before restoration. Engraved by [[W. J. Linton]] after a drawing\
        \ by [[Edward Duncan]].]]\n\nThe ownership of the premises passed to William\
        \ on John Shakespeare's death. However, by that time William already owned\
        \ [[New Place]] in Stratford and had no need for the Henley Street premises\
        \ as a home for himself or his family. Consequently, the main house was leased\
        \ to Lewis Hiccox, who converted it into an inn known as the Maidenhead (later\
        \ the Swan and Maidenhead Inn), and the small, one-bay house to the north-west\
        \ was put to residential use. By the time of Shakespeare's death in 1616 it\
        \ was occupied by [[Joan Shakespeare|Joan Hart]], his recently widowed sister.<ref\
        \ name=SBT/>\n\nUnder the terms of Shakespeare's will, the ownership of the\
        \ whole property (the inn and Joan Hart's cottage) passed to his elder daughter,\
        \ [[Susanna Hall|Susanna]]. In 1649 it passed to her only child, [[Elizabeth\
        \ Barnard|Elizabeth]], and then in 1670 to [[Thomas Hart (Shakespeare)|Thomas\
        \ Hart]]. Hart was the descendant of Shakespeare's sister, [[Joan Shakespeare|Joan]],\
        \ whose family had continued as tenants of the smaller house after her death\
        \ in 1646. The entire property remained in the ownership of the Harts until\
        \ 1806, when it was sold to a butcher, Thomas Court, who also took over the\
        \ running of the Swan and Maidenhead Inn. The smaller house remained occupied\
        \ by Thomas Hornby, another butcher, to whom the Harts had let it when they\
        \ moved away from Stratford in the 1790s.<ref name=SBT/> Mrs Hornby continued\
        \ as a tenant and custodian of Shakespeare's Birthplace until her rent was\
        \ increased in 1820.<ref name=britainexpress/>\n\n===Acquisition===\n[[File:Shakespeare’s\
        \ birthplace, Henley Street, Stratford On Avon, Ernest Edwards, 1863, from\
        \ albumen print,.jpg|thumb|left|Shakespeare's birthplace, Henley Street, Stratford\
        \ On Avon, Ernest Edwards, 1863, from Jephson, J., & Edwards, E. (1864). Shakespere,\
        \ his birthplace, home, and grave.]]\nOnce the family line had come to an\
        \ end, the house was allowed to fall into a state of disrepair until a rekindling\
        \ of interest in the 18th century.<ref name=bbc/> [[Isaac Watts]], [[Charles\
        \ Dickens]], Sir [[Walter Scott]] and [[Thomas Carlyle]] were among the notables\
        \ that visited the birthplace and autographed the walls and windows.<ref name=\"\
        world and its people2\">{{cite book\n  |last = Dunton\n  |first = Larkin\n\
        \  |title = The World and Its People\n  |url = https://archive.org/details/worldanditspeop05duntgoog\n\
        \  |publisher = Silver Burdett\n  |year = 1896\n  |page = [https://archive.org/details/worldanditspeop05duntgoog/page/n59\
        \ 51]}}</ref> Many of the signatures still remain on the windowpanes around\
        \ the house, although the signed walls have long since been painted over.<ref\
        \ name=\"aboutbritain\"/><ref name=SBT/> A guest registry book includes the\
        \ signatures of [[Lord Byron]], [[Alfred, Lord Tennyson]], [[John Keats]],\
        \ and [[William Thackeray]].<ref name=\"world and its people2\"/>\n[[File:Shakespeare's\
        \ birthplace 1769.jpg|thumb|right|300px|The restoration was based upon this\
        \ engraving, first published in ''[[The Gentleman's Magazine]]'' in July 1769.\
        \ Benjamin Cole engraving after a drawing by [[Richard Greene (antiquary)|Richard\
        \ Greene]].]]\nInterest in the property again increased when the whole premises\
        \ were put up for sale on the death of Court's widow in 1846. The American\
        \ showman [[P. T. Barnum]] proposed to buy the home and ship it \"brick-by-brick\"\
        \ to the US.<ref name=bbc/><ref name=\"Winkler-2024\">{{Cite news |last=Winkler\
        \ |first=Elizabeth |date=2024-04-23 |title=460 Years Ago, Shakespeare Was\
        \ Born Here. Or Somewhere. |url=https://www.nytimes.com/2024/04/23/travel/shakespeare-birthplace-stratford-upon-avon.html\
        \ |access-date=2024-05-10 |work=The New York Times |language=en-US |issn=0362-4331}}</ref>\
        \ In response, the Shakespeare Birthday Committee (becoming the [[Shakespeare\
        \ Birthplace Trust]] by a [[local act of Parliament]]) was established and,\
        \ with the help of donors including Dickens, the committee raised the necessary\
        \ £3,000 and bought it the following year.<ref name=bbc/><ref name=\"Winkler-2024\"\
        \ />\n\n===Restoration===\nOnce the committee (Trust) had acquired the building,\
        \ restoration work was able to proceed. Originally the Birthplace formed part\
        \ of a terrace with later houses built either side,<ref name=SBT/> and the\
        \ first stage in its conservation was their destruction, thought necessary\
        \ to avoid the risk of any fire spreading from them to the Birthplace.<ref\
        \ name=know-britain/>\n\nOld photographs reveal that early in the 19th century,\
        \ part of the front of the Birthplace was faced with brick. This was an economical\
        \ alternative to the common practice of replacing timber-framed buildings\
        \ and rebuilding in brick in 18th century England. Referring to an engraving\
        \ of 1769 as well as taking into account surviving architectural evidence,\
        \ a reconstruction carried out by the Trust between 1857 and 1864 restored\
        \ the outside of the building to its 16th century state.<ref name=know-britain/><ref\
        \ name=SBT/>\n\n==Present day==\n[[File:Shakespeare's Birthplace (rear view)\
        \ Stratford-upon-Avon2.jpg|thumb|left|Garden at the rear of the house in 2006.]]\n\
        \n[[File:View from Shakespeares Birthplace Stratford upon Avon.jpg|thumb|right|The\
        \ view towards Henley Street from the upper floor of Shakespeare's Stratford\
        \ upon Avon birthplace.]]\n\nAdjoining the Birthplace is the [[Shakespeare\
        \ Centre]], a contrasting modern glass and concrete visitors centre which\
        \ forms the headquarters of the Shakespeare Birthplace Trust. The driving\
        \ force behind its construction, and opening in 1964, was [[Levi Fox]], [[Order\
        \ of the British Empire#Current classes|OBE]], Director of the Trust from\
        \ 1945 to 1989, with a view to properly housing its library, documents and\
        \ collections.<ref>[https://www.theguardian.com/news/2006/oct/12/guardianobituaries.artsobituaries\
        \ Obituary of Levi Fox] ''The Guardian''. Retrieved 17 October 2008.</ref>\
        \ As well as showing Shakespeare-related displays, the Shakespeare Centre\
        \ also provides public access to the Birthplace.<ref name=aboutbritain/>\n\
        \nThe Birthplace recreates a picture of family life at the time of Shakespeare\
        \ complete with period domestic furnishings, a glass window inscribed with\
        \ the signatures of visitors to the house over the centuries, and John Shakespeare's\
        \ glove making workshop.<ref name=SBT/>\n\nThe walled garden at the back of\
        \ the house has been specially planted with flowers and herbs that would have\
        \ been known in Shakespeare's time.<ref name=bbc>[https://www.bbc.co.uk/coventry/content/articles/2008/03/27/bard_birthplace_feature.shtml\
        \ The Bard's birthplace] bbc.co.uk. Retrieved 11 November 2008.</ref>\n\n\
        ==References==\n{{Reflist}}\n\n==External links==\n{{Commons category|Shakespeare's\
        \ birthplace}}\n* {{cite web|url=http://www.shakespeare.org.uk/ |title=Shakespeare\
        \ Birthplace official website |publisher=[[Shakespeare Birthplace Trust]]\
        \ |access-date=27 May 2011 }}\n* {{cite web |url=http://www.heritagepassbritain.com/en/places-to-visit/property/generic/shakespeares-birthplace-and-the-shakespeare-town-houses.html/\
        \ |title=Shakespeare's Birthplace |url-status=dead |archive-url=https://web.archive.org/web/20120320115824/http://www.heritagepassbritain.com/en/places-to-visit/property/generic/shakespeares-birthplace-and-the-shakespeare-town-houses.html/\
        \ |archive-date=2012-03-20 }} Great British Heritage Pass\n\n{{Shakespeare}}\n\
        \n[[Category:Shakespeare Birthplace Trust]]\n[[Category:Timber framed buildings\
        \ in Warwickshire]]\n[[Category:Birthplaces of individual people]]\n[[Category:Grade\
        \ I listed houses in Warwickshire]]\n[[Category:Historic house museums in\
        \ Warwickshire]]\n[[Category:Houses completed in the 16th century]]\n[[Category:16th-century\
        \ establishments in England]]"
