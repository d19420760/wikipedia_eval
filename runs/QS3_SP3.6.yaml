      content: "## Result 1\nTitle: Titanic (1997 film)\nURL: https://en.wikipedia.org/wiki/Titanic_(1997_film)\n\
        Extract: Titanic is a 1997 American epic historical romance film written and\
        \ directed by James Cameron. Incorporating both historical and fictional aspects,\
