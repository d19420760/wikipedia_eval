        ## Result 1
        Title: September 11 attacks
        URL: https://en.wikipedia.org/wiki/September_11_attacks
        Extract: The September 11 attacks, colloquially known as 9/11, were a coordinated series of suicide attacks perpetrated by the Islamist terrorist organization al-Qaeda against the United States in 2001. Nineteen terrorists hijacked four airliners, then flew one into each of the Twin Towers at the World Trade Center in New York City. The third plane crashed into the Pentagon, the headquarters of the United States Department of Defense, in Arlington County, Virginia. The fourth plane crashed in a rural Pennsylvania field during a passenger revolt. In response to the attacks, the United States launched the global war on terror, seeking to eliminate hostile groups deemed terrorist organizations, and the governments purported to support them. This foreign policy agenda was conducted over the next two decades.Ringleader and hijacker Mohamed Atta flew American Airlines Flight 11 into the North Tower of the World Trade Center complex at 8:46 a.m. At 9:03 a.m., hijacker Marwan al-Shehhi flew United Airlines Flight 175 into the South Tower. Both collapsed within an hour and forty-two minutes, destroying the remaining five structures in the complex. Hijacker Hani Hanjour flew American Airlines Flight 77 into the Pentagon at 9:37 a.m., causing a partial collapse. United Airlines Flight 93, flown by hijacker Ziad Jarrah, was believed to target either the United States Capitol or the White House. Alerted to the previous attacks, the passengers revolted and the hijackers crashed the aircraft into a field near Shanksville, Pennsylvania, at 10:03 a.m. The Federal Aviation Administration ordered a ground stop for all traffic in U.S. airspace, requiring all airborne aircraft to return to their point of origin or divert to Canada. The actions undertaken in Canada to support incoming aircraft and their occupants were collectively titled Operation Yellow Ribbon.
        That evening, the Central Intelligence Agency informed President George W. Bush that its Counterterrorism Center had identified the attacks as having been the work of al-Qaeda under Osama bin Laden. The United States responded by launching the war on terror and invading Afghanistan. NATO's invocation of Article 5 of the North Atlantic Treaty—its only usage to date—called upon allies to fight al-Qaeda. As U.S. and allied invasion forces swept through Afghanistan, bin Laden eluded them. He denied any involvement until 2004, when excerpts of a taped statement in which he accepted responsibility for the attacks were released. Al-Qaeda's cited motivations included U.S. support of Israel, the presence of U.S. military bases in Saudi Arabia and sanctions against Iraq. The nearly decade-long manhunt for bin Laden concluded in May 2011, when he was killed during a U.S. military raid in Abbottabad, Pakistan. The war in Afghanistan continued for another eight years.
        The attacks killed 2,977 people, injured thousands more, and gave rise to long-term health consequences, while causing at least US$10 billion in infrastructure and property damage. It remains the deadliest terrorist attack in history, as well as the deadliest incident for firefighters and law enforcement personnel in American history, killing 343 and 72 members, respectively. The crashes of Flight 11 and Flight 175 were the deadliest aviation disasters of all time, and the collision of Flight 77 with the Pentagon resulted in the fourth-highest number of ground fatalities in a plane crash in history. The destruction of the World Trade Center and its environs seriously harmed the U.S. economy and induced global market shocks. Many other countries strengthened anti-terrorism legislation and expanded their powers of law enforcement and intelligence agencies. The total number of deaths caused by the attacks, combined with the death tolls from the conflicts they directly incited, has been estimated by the Costs of War Project to be more than 4.5 million.
        Cleanup of the World Trade Center site (colloquially known as "Ground Zero") was completed in May 2002, while the Pentagon was repaired within a year. After delays in the design of a replacement complex, six new buildings were planned to replace the lost towers at the World Trade Center site, along with a museum and memorial dedicated to those who were killed or injured in the attacks. The tallest building, One World Trade Center, began construction in 2006, and opened in 2014. Memorials to the attacks include the National September 11 Memorial & Museum in New York City, the Pentagon Memorial in Arlington County, Virginia, and the Flight 93 National Memorial at the Pennsylvania crash site.

        ## Result 2
