      content: "## Result 1\nTitle: List of English monarchs\nURL: https://en.wikipedia.org/wiki/List_of_English_monarchs\n\
        Extract: This list of kings and reigning queens of the Kingdom of England\
        \ begins with Alfred the Great, who initially ruled Wessex, one of the seven\
        \ Anglo-Saxon kingdoms which later made up modern England. Alfred styled himself\
        \ king of the Anglo-Saxons from about 886, and while he was not the first\
        \ king to claim to rule all of the English, his rule represents the start\
        \ of the first unbroken line of kings to rule the whole of England, the House\
        \ of Wessex.\nArguments are made for a few different kings thought to have\
        \ controlled enough Anglo-Saxon kingdoms to be deemed the first king of England.\
        \ For example, Offa of Mercia and Egbert of Wessex are sometimes described\
        \ as kings of England by popular writers, but it is no longer the majority\
        \ view of historians that their wide dominions were part of a process leading\
        \ to a unified England. The historian Simon Keynes states, for example, \"\
        Offa was driven by a lust for power, not a vision of English unity; and what\
        \ he left was a reputation, not a legacy.\" That refers to a period in the\
        \ late 8th century, when Offa achieved a dominance over many of the kingdoms\
        \ of southern England, but it did not survive his death in 796. Likewise,\
        \ in 829 Egbert of Wessex conquered Mercia, but he soon lost control of it.\n\
        It was not until the late 9th century that one kingdom, Wessex, had become\
        \ the dominant Anglo-Saxon kingdom. Its king, Alfred the Great, was the overlord\
        \ of western Mercia and used the title King of the Angles and Saxons though\
        \ he never ruled eastern and northern England, which was then known as the\
        \ Danelaw and had been conquered by the Danes, from southern Scandinavia.\
        \ Alfred's son Edward the Elder conquered the eastern Danelaw. Edward's son\
        \ Æthelstan became the first king to rule the whole of England when he conquered\
        \ Northumbria in 927. Æthelstan is regarded by some modern historians as the\
        \ first true king of England. The title \"King of the English\" or Rex Anglorum\
        \ in Latin, was first used to describe Æthelstan in one of his charters in\
        \ 928. The standard title for monarchs from Æthelstan until John was \"King\
        \ of the English\". In 1016, Cnut the Great, a Dane, was the first to call\
        \ himself \"King of England\". In the Norman period, \"King of the English\"\
        \ remained standard, with occasional use of \"King of England\" or Rex Anglie.\
        \ From John's reign onwards, all other titles were eschewed in favour of \"\
        King\" or \"Queen of England\".\nThe Principality of Wales was incorporated\
        \ into the Kingdom of England under the Statute of Rhuddlan in 1284, and in\
        \ 1301, King Edward I invested his eldest son, the future King Edward II,\
        \ as Prince of Wales. Since that time, the eldest sons of all English monarchs,\
        \ except for King Edward III, have borne this title.\nAfter the death of Queen\
        \ Elizabeth I in 1603, her cousin King James VI of Scotland inherited the\
        \ English crown as James I of England, joining the crowns of England and Scotland\
        \ in personal union. By royal proclamation, James styled himself \"King of\
        \ Great Britain\", but no such kingdom was created until 1707, when England\
        \ and Scotland united during the reign of Queen Anne to form the new Kingdom\
        \ of Great Britain, with a single British parliament sitting at Westminster.\
        \ That marked the end of the Kingdom of England as a sovereign state.\n\n\
        ## Result 2\nTitle: Henry V of England\nURL: https://en.wikipedia.org/wiki/Henry_V_of_England\n\
        Extract: Henry V (16 September 1386 – 31 August 1422), also called Henry of\
        \ Monmouth, was King of England, Lord of Ireland, and Duke of Aquitaine from\
        \ 1413 until his death in 1422. Despite his relatively short reign, Henry's\
        \ outstanding military successes in the Hundred Years' War against France\
        \ made England one of the strongest military powers in Europe. Immortalised\
        \ in Shakespeare's Henriad plays, Henry is known and celebrated as one of\
        \ the greatest warrior-kings of medieval England.\nHenry of Monmouth, the\
        \ eldest son of Henry IV, became heir apparent and Prince of Wales after his\
        \ father seized the throne in 1399. During the reign of his father, the young\
        \ Prince Henry gained early military experience in Wales during the Glyndŵr\
        \ rebellion, and by fighting against the powerful Percy family of Northumberland.\
        \ He played an important part at the Battle of Shrewsbury despite being just\
        \ sixteen years of age. As he entered adulthood, Henry played an increasingly\
        \ central role in England's government due to the declining health of his\
        \ father, but disagreements between Henry and his father led to political\
        \ conflict between the two. After his father's death in March 1413, Henry\
        \ ascended to the throne of England and assumed complete control of the country,\
        \ also reviving the historic English claim to the French throne.\nIn 1415,\
        \ Henry followed in the wake of his great-grandfather, Edward III, by renewing\
        \ the Hundred Years' War with France, beginning the Lancastrian phase of the\
        \ conflict (1415–1453). His first military campaign included capturing the\
        \ port of Harfleur and a famous victory at the Battle of Agincourt, which\
        \ inspired a proto-nationalistic fervour in England and Wales. During his\
        \ second campaign (1417–1420), his armies captured Paris and conquered most\
        \ of northern France, including the formerly English-held Duchy of Normandy.\
        \ Taking advantage of political divisions within France, Henry put unparalleled\
        \ pressure on Charles VI of France (\"the Mad\"), resulting in the largest\
        \ holding of French territory by an English king since the Angevin Empire.\
        \ The Treaty of Troyes (1420) recognised Henry V as regent of France and heir\
        \ apparent to the French throne, disinheriting Charles's own son, the Dauphin\
        \ Charles. Henry subsequently married Charles VI's daughter, Catherine of\
        \ Valois. The treaty ratified the unprecedented formation of a union between\
        \ the kingdoms of England and France, in the person of Henry, upon the death\
        \ of the ailing Charles. However, Henry died in August 1422, less than two\
        \ months before his father-in-law, and was succeeded by his only son and heir,\
        \ the infant Henry VI.\nAnalyses of Henry's reign are varied. According to\
        \ Charles Ross, he was widely praised for his personal piety, bravery, and\
        \ military genius; Henry was admired even by contemporary French chroniclers.\
        \ However, his occasionally cruel temperament and lack of focus regarding\
        \ domestic affairs have made him the subject of criticism. Nonetheless, Adrian\
        \ Hastings believes his militaristic pursuits during the Hundred Years' War\
        \ fostered a strong sense of English nationalism and set the stage for the\
        \ rise of England (later Great Britain) to prominence as a dominant global\
        \ power.\n\n## Result 3\nTitle: Angevin kings of England\nURL: https://en.wikipedia.org/wiki/Angevin_kings_of_England\n\
        Extract: The Angevins (; \"of/from Anjou\") were a royal house of French origin\
        \ that ruled England and Ireland and in France in the 12th and early 13th\
        \ centuries; its monarchs were Henry II, Richard I and John. Henry II won\
        \ control of a vast assemblage of lands in western Europe that would last\
        \ for 80 years and would retrospectively be referred to as the Angevin Empire.\
        \ As a political entity this was structurally different from the preceding\
        \ Norman and subsequent Plantagenet realms. Geoffrey of Anjou became Duke\
        \ of Normandy in 1144 and died in 1151. In 1152, his heir, Henry, added Aquitaine\
        \ by virtue of his marriage to Eleanor of Aquitaine. Henry also inherited\
        \ the claim of his mother, Empress Matilda, the daughter of King Henry I of\
        \ England and Matilda of Scotland (who was also the remaining descendant of\
        \ the royal House of Wessex), to the English throne, to which Henry II succeeded\
        \ in 1154 following the death of Matilda's cousin Stephen.\nIn 1189, Henry\
        \ was succeeded by his third son, Richard, whose reputation for martial prowess\
        \ won him the epithet \"Cœur de Lion\" or \"Lionheart\". He was born and raised\
        \ in England but spent very little time there during his adult life, perhaps\
        \ as little as six months. Despite this Richard remains an enduring iconic\
        \ figure both in England and in France, and is one of very few kings of England\
        \ remembered by his nickname as opposed to regnal number.\nWhen Richard died,\
        \ his brother John – Henry's fifth and last surviving son – took the throne.\
        \ In 1204, John lost many of the Angevins' continental territories, including\
        \ Anjou, to the French crown. He and his successors were still recognized\
        \ as dukes of Aquitaine. The loss of Anjou, for which the dynasty is named,\
        \ and other French fiefs made John the last of the Angevin kings of England.\
        \ However, there is no agreement among historians. Some make no distinction\
        \ between Angevins and Plantagenets while considering Henry II as the first\
        \ Plantagenet king. From John, the dynasty continued on the throne of England\
        \ and unbroken in the senior male line until the reign of Richard II before\
        \ dividing into two competing cadet branches, the House of Lancaster and the\
        \ House of York. In the 17th century, historians would use the term \"Plantagenet\"\
        \ when describing the house.\n\n## Result 4\nTitle: Henry VII of England\n\
        URL: https://en.wikipedia.org/wiki/Henry_VII_of_England\nExtract: Henry VII\
        \ (28 January 1457 – 21 April 1509), also known as Henry Tudor, was King of\
        \ England and Lord of Ireland from his seizure of the crown on 22 August 1485\
        \ until his death in 1509. He was the first monarch of the House of Tudor.\n\
        Henry was the son of Edmund Tudor, 1st Earl of Richmond, and Lady Margaret\
        \ Beaufort. His mother was a great-granddaughter of John of Gaunt, an English\
        \ prince who founded the Lancastrian cadet branch of the House of Plantagenet.\
        \ Henry's father was the half-brother of the Lancastrian king Henry VI. Edmund\
        \ Tudor died three months before his son was born, and Henry was raised by\
        \ his uncle Jasper Tudor, a Lancastrian, and William Herbert, a supporter\
        \ of the Yorkist branch of the House of Plantagenet. During Henry's early\
        \ years, his uncles and the Lancastrians fought a series of civil wars against\
        \ the Yorkist claimant, Edward IV. After Edward retook the throne in 1471,\
        \ Henry spent 14 years in exile in Brittany. He attained the throne when his\
        \ forces, supported by France and Scotland, defeated Richard III at the Battle\
        \ of Bosworth Field. He was the last king of England to win his throne on\
        \ the field of battle, defending it two years later at the Battle of Stoke\
        \ Field to decisively end the Wars of the Roses (1455–1487). He strengthened\
        \ his claim by marrying Elizabeth of York, Edward IV's daughter.\nHenry restored\
        \ power and stability to the English monarchy following the civil war. He\
        \ is credited with many administrative, economic and diplomatic initiatives.\
        \ His supportive policy toward England's wool industry and his standoff with\
        \ the Low Countries had long-lasting benefits to the English economy. He paid\
        \ very close attention to detail, and instead of spending lavishly, he concentrated\
        \ on raising new revenues. He stabilised the government's finances by introducing\
        \ several new taxes. After his death, a commission found widespread abuses\
        \ in the tax collection process. Henry reigned for nearly 24 years and was\
        \ peacefully succeeded by his son, Henry VIII.\n\n## Result 5\nTitle: Henry\
        \ IV of England\nURL: https://en.wikipedia.org/wiki/Henry_IV_of_England\n\
        Extract: Henry IV (c. April 1367 – 20 March 1413), also known as Henry Bolingbroke\
        \ (having been born at Bolingbroke Castle), was King of England from 1399\
        \ to 1413, Lord of Ireland and duke of Aquitaine. Henry was the son of John\
        \ of Gaunt, Duke of Lancaster and a grandson of King Edward III.\nWhen Henry\
        \ came of age, he was involved in the 1388 revolt of the Lords Appellant against\
        \ his first cousin, King Richard II.  Henry was later exiled from England\
        \ in 1397. After Henry's father died in 1399, Richard blocked Henry's inheritance\
        \ to the holdings of the House of Lancaster. So, Henry rallied Lancastrian\
        \ supporters, imprisoned Richard II and formally deposed him, usurping the\
        \ throne. These actions later contributed to dynastic disputes in the Wars\
        \ of the Roses (1455–1487).\nHenry was the first English ruler whose mother\
        \ tongue was English (rather than French) since the Norman Conquest, over\
        \ 300 years earlier. He was also the first monarch to come from the House\
        \ of Lancaster. As king, he faced a number of rebellions, most seriously those\
        \ of Owain Glyndŵr, the last Welshman to claim the title of Prince of Wales,\
        \ and the English knight Henry Percy (Hotspur), who was killed in the Battle\
        \ of Shrewsbury in 1403. Henry IV had six children from his first marriage\
        \ to Mary de Bohun, while his second marriage to Joan of Navarre produced\
        \ no surviving children. Henry and Mary's eldest son, Henry of Monmouth, assumed\
        \ the reins of government in 1410 as the king's health worsened. Henry IV\
        \ died in 1413, and his son succeeded him as Henry V.\n\n## Result 6\nTitle:\
        \ Henry II of England\nURL: https://en.wikipedia.org/wiki/Henry_II_of_England\n\
        Extract: Henry II ( (1133-March-05) (1189-July-06)5 March 1133 – 6 July 1189)\
        \ was King of England from 1154 until his death in 1189. During his reign\
        \ he controlled England, substantial parts of Wales and Ireland, and much\
        \ of France (including Normandy, Anjou, and Aquitaine), an area that was later\
        \ called the Angevin Empire, and also held power over Scotland for a time\
        \ and the Duchy of Brittany.\nHenry was the eldest son of Geoffrey Plantagenet,\
        \ Count of Anjou, and Matilda, daughter of Henry I of England. By the age\
        \ of fourteen, he became politically and militarily involved in his mother's\
        \ efforts to claim the English throne, at that time held by her cousin Stephen\
        \ of Blois. Henry's father made him Duke of Normandy in 1150, and upon his\
        \ father's death in 1151, Henry inherited Anjou, Maine and Touraine. His marriage\
        \ to Eleanor of Aquitaine brought him control of the Duchy of Aquitaine. Thus,\
        \ he controlled most of France. Henry's military expedition to England in\
        \ 1153 resulted in King Stephen agreeing, by the Treaty of Wallingford, to\
        \ leave England to Henry; he inherited the kingdom at Stephen's death a year\
        \ later.\nHenry was an energetic and ruthless ruler, driven by a desire to\
        \ restore the royal lands and prerogatives of his grandfather Henry I. During\
        \ the early years of his reign Henry restored the royal administration in\
        \ England and led expeditions into Wales in 1157. However, Henry was defeated\
        \ at the Battle of Ewloe, nearly being killed in the fighting. Henry's desire\
        \ to control the English Church led to conflict with his former friend Thomas\
        \ Becket, the Archbishop of Canterbury. This controversy lasted for much of\
        \ the 1160s and resulted in Becket's murder in 1170. Soon after his accession,\
        \ Henry came into conflict with Louis VII of France, his feudal overlord,\
        \ and the two rulers fought over several decades in what has been termed a\
        \ \"cold war\". Henry expanded his empire at Louis's expense, taking Brittany\
        \ and pushing east into central France and south into Toulouse. Despite numerous\
        \ peace conferences and treaties, no lasting agreement was reached.\nHenry\
        \ and Eleanor had eight children. Three of their sons were kings, Henry the\
        \ Young King as co-ruler with his father and Richard I and John as sole monarchs.\
        \ As his sons grew up, Henry struggled to find ways to satisfy their desires\
        \ for land and immediate power, and tensions rose over the future inheritance\
        \ of the empire, encouraged by Louis VII and his son Philip II, who ascended\
        \ to the French throne in 1180. In 1173 Henry's heir apparent, \"Young Henry\"\
        , rebelled against his father. He was subsequently joined in his rebellion\
        \ by his brothers Richard and Geoffrey as well as their mother. Several European\
        \ states allied themselves with the rebels, and the Great Revolt was defeated\
        \ only by Henry's vigorous military action and talented local commanders,\
        \ many of them \"new men\" appointed for their loyalty and administrative\
        \ skills. Young Henry and Geoffrey led another failed revolt in 1183, during\
        \ which Young Henry died of dysentery. Geoffrey died in 1186. The Anglo-Norman\
        \ invasion of Ireland provided lands for Henry's youngest son, John. By 1189,\
        \ Philip swayed Richard to his side, leading to a final rebellion. Suffering\
        \ from a bleeding ulcer which sapped the extraordinary energy that was a hallmark\
        \ of his earlier reign, Henry was decisively defeated by Philip and Richard.\
        \ He then retreated to Chinon Castle in Anjou. He died soon afterwards and\
        \ was succeeded by his son Richard.\nHenry's empire quickly collapsed during\
        \ the reign of his son John, but many of the changes Henry introduced during\
        \ his lengthy rule had long-term impacts. Henry's legal reforms are generally\
        \ considered to have laid the basis for the English Common Law, while his\
        \ intervention in Brittany, Wales, Ireland, and Scotland shaped the development\
        \ of their societies, histories, and governmental systems. Contemporary chroniclers\
        \ such as Gerald of Wales and William of Newburgh, though sometimes unfavourable,\
        \ generally lauded Henry's achievements. In the 18th century, scholars argued\
        \ that Henry was a driving force in the creation of a genuinely English monarchy\
        \ and, ultimately, a unified Britain. During the Victorian expansion of the\
        \ British Empire, historians were keenly interested in the formation of Henry's\
        \ own empire, but they also criticized certain aspects of his private life\
        \ and treatment of Becket.\n\n## Result 7\nTitle: Henry VI of England\nURL:\
        \ https://en.wikipedia.org/wiki/Henry_VI_of_England\nExtract: Henry VI (6\
        \ December 1421 – 21 May 1471) was King of England from 1422 to 1461 and again\
        \ from 1470 to 1471, and claimant to the French throne from 1422 to 1453 under\
        \ the terms of the Treaty of Troyes. He became king of England at the age\
        \ of nine months following the death of his father, Henry V, and inherited\
        \ the French claim upon the death of his maternal grandfather, Charles VI\
        \ of France.\nHenry VI's claim to France was increasingly challenged during\
        \ the latter stages of the Hundred Years' War, and by 1453 English authority\
        \ there had collapsed entirely. His reign in England was marked by weak royal\
        \ authority, factional conflict among the nobility, and a prolonged period\
        \ of mental incapacity beginning in 1453, which contributed significantly\
        \ to political instability and the outbreak of the Wars of the Roses.\nHenry\
        \ was born during the Hundred Years' War (1337–1453). He is the only English\
        \ monarch to have been crowned King of France, following his coronation at\
        \ Notre-Dame de Paris in 1431 as Henry II. His early reign, when England was\
        \ ruled by a regency government, saw the pinnacle of English power in France.\
        \ However, setbacks followed once he assumed full control in 1437. The young\
        \ king faced military reversals in France, as well as political and financial\
        \ crises in England, where divisions among the nobility in his government\
        \ began to widen. His reign saw the near total loss of English lands in France.\n\
        In contrast to his father, Henry VI was described as timid, passive, benevolent\
        \ and averse to warfare and violence. In 1445, Henry married Charles VII's\
        \ niece Margaret of Anjou in the hope of achieving peace. However, the peace\
        \ policy failed and war recommenced. By 1453, Calais was the only English-governed\
        \ territory on the continent. Henry's domestic popularity declined in the\
        \ 1440s, and political unrest in England grew as a result. Because of military\
        \ defeats and political crises, Henry suffered a mental breakdown in 1453,\
        \ triggering a power struggle between the royal family: Richard, 3rd Duke\
        \ of York; Edmund Beaufort, 2nd Duke of Somerset; and Queen Margaret. Civil\
        \ war broke out in 1455, leading to a long period of dynastic conflict known\
        \ as the Wars of the Roses (1455–1487).\nHenry was deposed in March 1461 by\
        \ York's eldest son, who took the throne as Edward IV. Henry was captured\
        \ by Edward's forces in 1465 and imprisoned in the Tower of London. Henry\
        \ was restored to the throne by Richard Neville (\"Warwick the Kingmaker\"\
        ) in 1470. However, in 1471, Edward retook power, killing Henry's only son,\
        \ Edward of Westminster, and imprisoning Henry once again. Henry died in the\
        \ Tower in May 1471, possibly killed on the orders of King Edward. Henry may\
        \ have been bludgeoned to death: his corpse was found much later to have light\
        \ brown hair matted with what appeared to be blood. He was buried at Chertsey\
        \ Abbey and moved to Windsor Castle in 1484. He left a legacy of educational\
        \ institutions, having founded Eton College, King's College, Cambridge, and\
        \ All Souls College, Oxford. William Shakespeare wrote a trilogy of plays\
        \ about his life, depicting him as weak-willed and easily influenced by his\
        \ wife.\n\n## Result 8\nTitle: Henry I of England\nURL: https://en.wikipedia.org/wiki/Henry_I_of_England\n\
        Extract: Henry I (c. 1068 – 1 December 1135), also known as Henry Beauclerc,\
        \ was King of England from 1100 to his death in 1135. He was the fourth son\
        \ of William the Conqueror and was educated in Latin and the liberal arts.\
        \ On William's death in 1087, Henry's elder brothers Robert Curthose and William\
        \ Rufus inherited Normandy and England, respectively, thereby leaving Henry\
        \ landless. He subsequently purchased the County of Cotentin in western Normandy\
        \ from Robert, but his brothers deposed him in 1091. He gradually rebuilt\
        \ his power base in the Cotentin and allied himself with William Rufus against\
        \ Robert.\nWhen William died in a hunting accident, Henry seized the English\
        \ throne ahead of Robert, promising at his coronation to correct many of William's\
        \ less popular policies. He married Matilda of Scotland and they had two surviving\
        \ children, Empress Matilda and William Adelin. Robert disputed Henry's control\
        \ of England and invaded from Normandy in 1101. The ensuing military campaign\
        \ ended in a negotiated settlement that confirmed Henry as king. The peace\
        \ was short-lived, however, and Henry invaded the Duchy of Normandy in 1105\
        \ and 1106, finally defeating Robert at the Battle of Tinchebray. Henry kept\
        \ Robert imprisoned for the rest of his life. Henry's control of Normandy\
        \ was subsequently challenged by Louis VI of France, Baldwin VII of Flanders\
        \ and Fulk V of Anjou, who promoted the rival claims of Robert's son, William\
        \ Clito, and supported a major rebellion in the Duchy between 1116 and 1119.\
        \ Following Henry's victory at the Battle of Brémule, a favourable peace settlement\
        \ was agreed with Louis in 1120. \nConsidered by contemporaries to be a harsh\
        \ but effective ruler, Henry skilfully manipulated the barons in England and\
        \ Normandy. In England, he drew on the existing Anglo-Saxon system of justice,\
        \ local government and taxation, but also strengthened it with more institutions\
        \ such as the royal exchequer and itinerant justices.  Many of the officials\
        \ who ran Henry's system were \"new men\" of obscure backgrounds, rather than\
        \ from families of high status, who rose through the ranks as administrators.\
        \ Henry encouraged ecclesiastical reform but became embroiled in a serious\
        \ dispute in 1101 with Archbishop Anselm of Canterbury, which was resolved\
        \ through a compromise solution in 1105. He supported the Cluniac order and\
        \ played a major role in the selection of the senior clergy in England and\
        \ Normandy.\nHenry's son William drowned in the White Ship disaster of 1120,\
        \ throwing the royal succession into doubt. Henry took a second wife, Adeliza\
        \ of Louvain, in the hope of having another son, but their marriage was childless.\
        \ In response to this, he declared his daughter Matilda his heir and married\
        \ her to Geoffrey of Anjou. The relationship between Henry and the couple\
        \ became strained, and fighting broke out along the border with Anjou. Henry\
        \ died on 1 December 1135 after a week of illness. Despite his plans for Matilda,\
        \ the King was succeeded by his nephew Stephen of Blois, resulting in a period\
        \ of civil war known as the Anarchy.\n\n## Result 9\nTitle: Henry VIII\nURL:\
        \ https://en.wikipedia.org/wiki/Henry_VIII\nExtract: Henry VIII (28 June 1491\
        \ – 28 January 1547) was King of England and Lord of Ireland from 22 April\
        \ 1509, and King of Ireland from 18 June 1542, until his death in 1547.\n\
        Born in Greenwich, Henry was the second son of Henry VII and Elizabeth of\
        \ York. His elder brother, Arthur, Prince of Wales, had been the heir apparent,\
        \ but died in 1502 at the age of 15. Henry VII died in 1509, and Henry took\
        \ the throne at the age of 17. He married Catherine of Aragon, who had been\
        \ Princess of Wales and became widowed from Arthur. Henry had sought a male\
        \ heir from Catherine, who produced the future Mary I but no surviving male\
        \ children.\nThe English church had been in communion with the pope of the\
        \ Catholic Church. Henry desired to annul the marriage to Catherine, appealing\
        \ to Pope Clement VII. Since Catherine was the aunt of Charles V, Holy Roman\
        \ Emperor, the pope delayed the verdict amid political pressure from Charles.\
        \ Henry had become impatient with the delay, secretly marrying Anne Boleyn\
        \ in 1532.\nThomas Cranmer, the archbishop of Canterbury, declared Henry's\
        \ marriage to Catherine to be null and void on 23 May 1533. The pope formally\
        \ rejected the English proceedings and maintained that Henry was married to\
        \ Catherine, and later excommunicated Henry from the Catholic Church. Henry\
        \ then broke from the Church, and passed the Act of Supremacy 1534 which established\
        \ the monarch as Supreme Head of the Church of England. The English Reformation\
        \ that followed attempted to develop a centralised religious identity in England\
        \ and Ireland. He dissolved monasteries and convents, seized their wealth,\
        \ disposed of their assets, destroyed buildings and relics, dispersed or destroyed\
        \ libraries, and provided for their former personnel and functions.\nHenry\
        \ had six wives in total; during the process of annulment from Catherine,\
        \ he married Anne Boleyn. Anne produced one child, the future Elizabeth I,\
        \ and was charged with high treason and executed by beheading in the Tower\
        \ of London. Henry married Jane Seymour in 1536, who gave birth to Edward,\
        \ the heir apparent. Catherine Parr was Henry's last wife, taking care of\
        \ him during his final years until his death in 1547.\nHenry's contemporaries\
        \ considered him an attractive, educated, and accomplished king. He has been\
        \ described as \"one of the most charismatic rulers to sit on the English\
        \ throne\" and his reign described as the \"most important\" in English history.\
        \ He was an author and composer. As he aged, he became severely overweight\
        \ and his health suffered, and he was frequently characterised in his later\
        \ life as a lustful, egotistical, paranoid, and tyrannical monarch. Three\
        \ of his children became English monarchs: Edward VI, Mary I, and Elizabeth\
        \ I.\n\n## Result 10\nTitle: Henry III of England\nURL: https://en.wikipedia.org/wiki/Henry_III_of_England\n\
        Extract: Henry III (1 October 1207 – 16 November 1272), also known as Henry\
        \ of Winchester, was King of England, Lord of Ireland and Duke of Aquitaine\
        \ from 1216 until his death in 1272. \nThe son of John, King of England, and\
        \ Isabella of Angoulême, Henry acceded to the throne when he was only nine\
        \ in the middle of the First Barons' War. Cardinal Guala Bicchieri declared\
        \ the war against the rebel barons to be a religious crusade and Henry's forces,\
        \ led by William Marshal, defeated the rebels at the battles of Lincoln and\
        \ Sandwich in 1217. Henry promised to abide by the Great Charter of 1225,\
        \ a later version of Magna Carta (1215), which limited royal power and protected\
        \ the rights of the major barons. Henry's early reign was dominated first\
        \ by William Marshal, and after his death in 1219 by the magnate Hubert de\
        \ Burgh, Earl of Kent. In 1230 the King attempted to reconquer the provinces\
        \ of France that had once belonged to his father, but the invasion was a debacle.\
        \ A revolt led by William Marshal's son Richard broke out in 1232, ending\
        \ in a peace settlement negotiated by the Catholic Church.\nFollowing the\
        \ revolt, Henry ruled England personally, rather than governing through senior\
        \ ministers. He travelled less than previous monarchs, investing heavily in\
        \ a handful of his favourite palaces and castles. He married Eleanor of Provence,\
        \ with whom he had five children. He was known for his piety, holding lavish\
        \ religious ceremonies and giving generously to charities; he was particularly\
        \ devoted to the figure of Edward the Confessor, whom he adopted as his patron\
        \ saint. He extracted huge sums of money from the Jews in England, ultimately\
        \ crippling their ability to do business. As attitudes towards the Jews hardened,\
        \ he later introduced the Statute of Jewry, which attempted to segregate the\
        \ Jewish community from the English populace. In a fresh attempt to reclaim\
        \ his family's lands in France, he invaded Poitou in 1242, leading to the\
        \ disastrous Battle of Taillebourg. After this, he relied on diplomacy, cultivating\
        \ an alliance with Frederick II, Holy Roman Emperor. He supported his brother\
        \ Richard of Cornwall in his successful bid to become King of the Romans in\
        \ 1256, but was unable to place his own son Edmund Crouchback on the throne\
        \ of Sicily, despite investing large amounts of money. He planned to go on\
        \ crusade to the Levant, but was prevented from doing so by rebellions in\
        \ Gascony.\nBy 1258, Henry's rule had grown increasingly unpopular due to\
        \ the failure of his expensive foreign policies, the notoriety of his Poitevin\
        \ half-brothers, and the role of his local officials in collecting taxes and\
        \ debts. In response to this state of affairs, a coalition of his barons seized\
        \ power in a coup d'état and expelled the Poitevins from England, reforming\
        \ the royal government through a process called the Provisions of Oxford.\
        \ In 1259, Henry and the baronial government consented to the Treaty of Paris,\
        \ under which Henry gave up his rights to his other lands in France in return\
        \ for King Louis IX recognising him as the rightful ruler of Gascony. Despite\
        \ the ultimate collapse of the baronial regime, Henry was unable to reform\
        \ a stable government and instability continued across England.\nIn 1263 one\
        \ of the more radical barons, Simon de Montfort, seized power, resulting in\
        \ the Second Barons' War. Henry persuaded Louis to support his cause and mobilised\
        \ an army. The Battle of Lewes was fought in 1264 when Henry was defeated\
        \ and taken prisoner. Henry's eldest son, Edward, escaped from captivity to\
        \ defeat Simon at the Battle of Evesham the following year and freed his father.\
        \ Henry initially exacted a harsh revenge on the remaining rebels but was\
        \ persuaded by the Church to mollify his policies through the Dictum of Kenilworth.\
        \ Reconstruction was slow, and Henry had to acquiesce to several measures,\
        \ including further suppression of the Jews, to maintain baronial and popular\
        \ support. He died in 1272, leaving Edward as his successor. His body was\
        \ buried in Westminster Abbey, which he had rebuilt in the second half of\
        \ his reign, and was moved to his current tomb in 1290. Some miracles were\
        \ declared after his death, but he was not canonised. His reign of 56 years\
        \ was the longest in medieval English history and would not be surpassed by\
        \ an English, or later British, monarch until that of George III in the 18th\
        \ and 19th centuries."
