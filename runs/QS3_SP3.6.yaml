        \ is no standard way to measure the total length of a bridge. Some bridges\
        \ are measured from the beginning of the entrance ramp to the end of the exit\
        \ ramp. Some are measured from shoreline to shoreline. Others use the length\
        \ of the total construction involved in building the bridge. Since there is\
        \ no standard, no ranking of a bridge should be assumed from its stated length.\
        \ \nNumbers are merely estimates and measures in U.S. customary units (feet)\
        \ may be imprecise due to conversion rounding.\n\n## Result 3\nTitle: Yangtze\n\
        URL: https://en.wikipedia.org/wiki/Yangtze\nExtract: The Yangtze River, Yangzi\
        \ River (English:   or ) or Chang Jiang (simplified Chinese: 长江; traditional\
        \ Chinese: 長江; pinyin: Cháng Jiāng; Zhuyin Fuhao: ㄔㄤˊ ㄐㄧㄤ; lit. 'long river')\
        \ is the longest river in China and the third-longest river in the world.\
        \ It rises at Jari Hill in the Tanggula Mountains of the Tibetan Plateau and\
        \ flows for 6,236 kilometers (3,875 mi), including the Dam Qu River, the longest\
        \ source of the Yangtze, in a generally easterly direction to the East China\
        \ Sea. It is the fifth-largest primary river by discharge volume in the world.\
        \ Its drainage basin comprises one-fifth of the land area of China, and is\
        \ home to nearly one-third of the country's population.\nThe Yangtze has played\
        \ a major role in the history, culture, and economy of China. For thousands\
        \ of years, the river has been used for water, irrigation, sanitation, transportation,\
        \ industry, boundary-marking, and war. The Yangtze Delta generates as much\
        \ as 20% of China's GDP, and the Three Gorges Dam on the Yangtze is the largest\
        \ hydro-electric power station in the world. In mid-2014, the Chinese government\
        \ announced it was building a multi-tier transport network, comprising railways,\
        \ roads and airports to create a new economic belt alongside the river.\n\
        The Yangtze flows through a wide array of ecosystems and is habitat to several\
        \ endemic and threatened species, including the Chinese alligator, the narrow-ridged\
        \ finless porpoise, and also was the home of the now extinct Yangtze river\
        \ dolphin (or baiji) and Chinese paddlefish, as well as the Yangtze sturgeon,\
        \ which is extinct in the wild. In recent years, the river has suffered from\
        \ industrial pollution, plastic pollution, agricultural runoff, siltation,\
        \ and loss of wetland and lakes, which exacerbates seasonal flooding. Some\
        \ sections of the river are now protected as nature reserves. A stretch of\
        \ the upstream Yangtze flowing through deep gorges in western Yunnan is part\
        \ of the Three Parallel Rivers of Yunnan Protected Areas, a UNESCO World Heritage\
        \ Site.\n\n## Result 4\nTitle: Amazon River\nURL: https://en.wikipedia.org/wiki/Amazon_River\n\
        Extract: The Amazon River (UK: , US: ; Portuguese: rio Amazonas, Spanish:\
        \ río Amazonas) in South America is the largest river by discharge volume\
        \ of water in the world, and the second-longest or longest river system in\
        \ the world, a title which is disputed with the Nile.\nThe headwaters of the\
        \ Apurímac River on Nevado Mismi in Peru had been considered, for nearly a\
        \ century, the Amazon basin's most distant source until a 2014 study found\
        \ it to be the headwaters of the Mantaro River on the Cordillera Rumi Cruz\
        \ in Peru. The Mantaro and Apurímac rivers join, and with other tributaries\
        \ form the Ucayali River, which in turn meets the Marañón River upstream of\
        \ Iquitos, Peru, forming what countries other than Brazil consider to be the\
        \ main stem of the Amazon. Brazilians call this section the Solimões River\
        \ above its confluence with the Rio Negro forming what Brazilians call the\
        \ Amazon at the Meeting of Waters (Portuguese: Encontro das Águas) at Manaus,\
        \ the largest city on the river.\nThe Amazon River has an average discharge\
        \ of about 215,000–230,000 cubic meters per second (7,600,000–8,100,000 cu\
        \ ft/s)—approximately 6,591–7,570 cubic kilometers (1,581–1,816 cu mi) per\
        \ year, greater than the next seven largest independent rivers combined. Two\
        \ of the top ten rivers by discharge are tributaries of the Amazon river.\
        \ The Amazon represents 20% of the global riverine discharge into oceans.\
        \ The Amazon basin is the largest drainage basin in the world, with an area\
        \ of approximately 7,000,000 square kilometers (2,700,000 sq mi). The portion\
        \ of the river's drainage basin in Brazil alone is larger than any other river's\
        \ basin. The Amazon enters Brazil with only one-fifth of the flow it finally\
        \ discharges into the Atlantic Ocean, yet already has a greater flow at this\
        \ point than the discharge of any other river in the world. It has a recognized\
        \ length of 6,400 kilometers (4,000 mi), but according to some reports, its\
        \ length varies from 6,575–7,062 kilometers (4,086–4,388 mi).\n\n## Result\
        \ 5\nTitle: Lena River\nURL: https://en.wikipedia.org/wiki/Lena_River\nExtract:\
        \ The Lena is a river in the Russian Far East and is the easternmost river\
        \ of the three great rivers of Siberia which flow into the Arctic Ocean, the\
        \ others being Ob and Yenisey. The Lena River is 4,294 km (2,668 mi) long\
        \ and has a capacious drainage basin of 2,490,000 km2 (960,000 mi2); thus\
        \ the Lena is the eleventh-longest river in the world and the longest river\
        \ entirely within Russia. Geographically, permafrost underlies all the Lena\
        \ River's catchment and it is continuous in over 75 percent of the basin.\n\
        \n## Result 6\nTitle: Amazonas, o maior rio do mundo\nURL: https://en.wikipedia.org/wiki/Amazonas,_o_maior_rio_do_mundo\n\
        Extract: Amazonas, o Maior Rio do Mundo (lit. 'Amazon: The Greatest River\
        \ in the World') is a 1922 Brazilian silent documentary film produced in 1918\
        \ by Silvino Santos. It is a black-and-white film that portrays life in the\
        \ Amazon rainforest. Completed in 1920, it is considered one of the oldest\
        \ cinematic records of the Amazon. It was presumed lost in 1931 and only rediscovered\
        \ in 2023 at the Czech Film Archive.\nSilvino Santos produced the work over\
        \ three years using sophisticated cinematic techniques, which led it to be\
        \ deemed of \"immense artistic value\" by Le Monde. It has also been described\
        \ as the \"Holy Grail of Brazilian silent cinema\" by The Guardian.\n\n##\
        \ Result 7\nTitle: Nile\nURL: https://en.wikipedia.org/wiki/Nile\nExtract:\
        \ The Nile is a major north-flowing river in northeast Africa which empties\
        \ into the Mediterranean Sea. At 7,088 kilometers (4,404 mi) long, it is the\
        \ longest river in the world, although the volume of water it carries is much\
        \ smaller than other major rivers such as the Amazon or the Congo. The Nile\
        \ has played a central role in the environmental, economic, and cultural history\
        \ of Africa for millennia.\nThe Nile has two major tributaries: the White\
        \ Nile and the Blue Nile. The White Nile is longer and is considered to be\
        \ the headwaters, yet the Blue Nile contributes over twice the volume of the\
        \ White Nile. The White Nile begins near Lake Victoria and flows through Uganda\
        \ and South Sudan; while  the Blue Nile begins near Lake Tana in Ethiopia\
        \ and flows into Sudan from the southeast. The two rivers meet at the Sudanese\
        \ capital of Khartoum. From there, the Nile flows north through the Nubian\
        \ Desert to Egypt's capital, Cairo, and finally empties into the Mediterranean\
        \ Sea near Alexandria, where it has formed a large river delta.\nGeologically,\
        \ the Nile is a young river and has followed its present course for about\
        \ 15,000 years. Its drainage basin extends across eleven countries. Most of\
        \ the water in the Nile comes from rainfall in the upstream countries Ethiopia,\
        \ Kenya, Tanzania, and Uganda. Downstream countries – Egypt, Sudan, and South\
        \ Sudan – are primarily desert, and withdraw river water for irrigation. Other\
        \ countries that lie wholly or partly in the Nile Basin are Burundi, the Democratic\
        \ Republic of the Congo, Eritrea, and Rwanda.\nThe Nile was the foundation\
        \ of the Ancient Egyptian civilization, which relied on the river for nearly\
        \ every aspect of life. The annual flooding of the river deposited nutrient-rich\
        \ silt along the riverbanks. This soil supported crops that enabled a sophisticated\
        \ society to thrive in an otherwise inhospitable desert. The Nile facilitated\
        \ trade, communication, transportation, and governance. South (upstream) of\
        \ the second Nile cataract lay Nubia, the historical home of the ancient Kerma\
        \ culture and the Kushite Empire. Many Europeans were fascinated by the Nile,\
        \ and their explorations around Lake Victoria in the late 19th century located\
        \ the source of the river. Among the cultures that live along the Nile in\
        \ the modern era are the Nilotic peoples, semi-nomadic cattle herders who\
        \ practice nomadic pastoralism, moving their cattle seasonally in response\
        \ to the Nile's floods. \nIn the modern era, the Nile plays a critical role\
        \ in the economies of Egypt and Sudan, which rely on it to irrigate extensive\
        \ croplands. Since the late 20th century, over a dozen dams have been built\
        \ in the Nile Basin to provide for irrigation and to generate electricity.\
        \ The dams have altered the river's annual flood cycle and restricted the\
        \ transport of silt downstream, causing the Nile Delta to shrink. Some dams\
        \ – such as the Aswan High Dam and Grand Ethiopian Renaissance Dam – have\
        \ been the source of international political disputes about water scarcity,\
        \ safety, food security, and forced displacement of peoples.\n\n## Result\
        \ 8\nTitle: List of longest tunnels\nURL: https://en.wikipedia.org/wiki/List_of_longest_tunnels\n\
        Extract: This list of longest tunnels ranks tunnels that are at least 13 km\
        \ (8.1 mi) long. Only continuous tunnels are included. Pipelines, even those\
        \ that are buried, are excluded. The longest tunnels have been constructed\
        \ for water distribution, followed by tunnels for railways.\n\n## Result 9\n\
        Title: Arkansas River\nURL: https://en.wikipedia.org/wiki/Arkansas_River\n\
        Extract: The Arkansas River is a major tributary of the Mississippi River.\
        \ It generally flows to the east and southeast as it traverses the U.S. states\
        \ of Colorado, Kansas, Oklahoma, and Arkansas. The river's source basin lies\
        \ in Colorado, specifically the Arkansas River Valley. The headwaters derive\
        \ from the snowpack in the Sawatch and Mosquito mountain ranges. It flows\
        \ east into Kansas and finally through Oklahoma and Arkansas, where it meets\
        \ the Mississippi River.\nAt 1,469 miles (2,364 km), it is the sixth-longest\
        \ river in the United States, the second-longest tributary in the Mississippi–Missouri\
        \ system, and the 47th longest river in the world. Its origin is in the Rocky\
        \ Mountains in Lake County, Colorado, near Leadville. In 1859, placer gold\
        \ discovered in the Leadville area brought thousands seeking to strike it\
        \ rich, but the easily recovered placer gold was quickly exhausted. The Arkansas\
        \ River's mouth is at Napoleon, Arkansas, and its drainage basin covers nearly\
        \ 170,000 square miles (440,000 km2). Its volume is much smaller than the\
        \ Missouri and Ohio rivers, with a mean discharge of about 40,000 cubic feet\
        \ per second (1,100 m3/s).\nThe Arkansas from its headwaters to the 100th\
        \ meridian west formed part of the U.S.–Mexico border from the Adams–Onís\
        \ Treaty (in force 1821) until the Texas Annexation or Treaty of Guadalupe\
        \ Hidalgo.\n\n## Result 10\nTitle: Niger River\nURL: https://en.wikipedia.org/wiki/Niger_River\n\
        Extract: The Niger River ( NY-jər; French: (le) fleuve Niger [(lə) flœv niʒɛʁ])\
