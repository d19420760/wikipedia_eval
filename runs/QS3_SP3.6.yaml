        ## Result 1
        Title: Great Pyramid of Giza
        URL: https://en.wikipedia.org/wiki/Great_Pyramid_of_Giza
        Extract: The Great Pyramid of Giza is the largest of the Egyptian pyramids and the most famous landmark of the Giza pyramid complex in Giza, Egypt. It is the oldest of the Seven Wonders of the Ancient World, and the only wonder that has remained largely intact. The Great Pyramid served as the tomb of Egyptian Pharaoh Khufu ("Cheops"), who ruled during the Fourth Dynasty of the Old Kingdom. It was built c. 2600 BC over a period of about 26 years.
        Initially standing at 146.6 metres (481 feet), the Great Pyramid was the world's tallest human-made structure for more than 3,700 years. Over time, most of the smooth white limestone casing was removed, which lowered the pyramid's height to the current 138.5 metres (454.4 ft); what is seen today is the underlying core structure. Each side of the base was measured to be about 230.3 metres (755.6 ft) in length, giving a volume of roughly 2.6 million cubic metres (92 million cubic feet), which includes an internal hillock. The dimensions of the pyramid were 280 royal cubits (146.7 m; 481.4 ft) high, a base length of 440 cubits (230.6 m; 756.4 ft), with a seked of ⁠5+1/2⁠ palms (a slope of 51°50'40").
        The Great Pyramid was built by quarrying an estimated 2.3 million large blocks, weighing 6 million tonnes in total. The majority of the stones are not uniform in size or shape, and are only roughly dressed. The outside layers were bound together by mortar, primarily local limestone from the Giza Plateau was used for its construction. Other blocks were imported by boat on the Nile: white limestone from Tura for the casing, and blocks of granite from Aswan, weighing up to 80 tonnes, for the "King's Chamber" structure.
        There are three known chambers inside of the Great Pyramid. The lowest was cut into the bedrock, upon which the pyramid was built, but remained unfinished. The so-called Queen's Chamber and King's Chamber, which contain a granite sarcophagus, are above ground within the pyramid structure. Hemiunu, Khufu's vizier, is believed by some to be the architect of the Great Pyramid. Many varying scientific and alternative hypotheses attempt to explain the exact construction techniques, but, as is the case for other such structures, there is no definite consensus.
        The funerary complex around the pyramid consisted of two mortuary temples connected by a causeway (one close to the pyramid and one near the Nile); tombs for the immediate family and court of Khufu, including three smaller pyramids for Khufu's wives; an even smaller "satellite pyramid"; and five buried solar barques. It is part of the UNESCO World Heritage Site "Memphis and its Necropolis".

        ## Result 2
        Title: Giza pyramid complex
        URL: https://en.wikipedia.org/wiki/Giza_pyramid_complex
        Extract: The Giza pyramid complex (also called the Giza necropolis) in Egypt is home to the Great Pyramid, the pyramid of Khafre, and the pyramid of Menkaure, along with their associated pyramid complexes and the Great Sphinx. All were built during the Fourth Dynasty of the Old Kingdom of ancient Egypt, between c. 2600 – c. 2500 BC. The site also includes several temples, cemeteries, and the remains of a workers' village.
        The site is at the edge of the Western Desert, approximately 9 km (5.6 mi) west of the Nile River in the city of Giza, and about 13 km (8.1 mi) southwest of the city centre of Cairo. It forms the northernmost part of the 16,000 ha (160 km2; 62 sq mi) Pyramid Fields of the Memphis and its Necropolis UNESCO World Heritage Site, inscribed in 1979. The pyramid fields include the Abusir, Saqqara, and Dahshur pyramid complexes, which were all built in the vicinity of Egypt's ancient capital of Memphis. Further Old Kingdom pyramid fields were located at the sites Abu Rawash, Zawyet El Aryan, and Meidum. Most of the limestone used to build the pyramids originates from the underlying Mokattam Formation.
        The Great Pyramid and the Pyramid of Khafre are the largest pyramids built in ancient Egypt, and they have historically been common as emblems of Ancient Egypt in the Western imagination. They were popularised in Hellenistic times, when the Great Pyramid was listed by Antipater of Sidon as one of the Seven Wonders of the World. It is by far the oldest of the Ancient Wonders and the only one still in existence.

        ## Result 3
        Title: Egyptian pyramids
        URL: https://en.wikipedia.org/wiki/Egyptian_pyramids
        Extract: The Egyptian pyramids are ancient masonry structures located in Egypt. Most were built as tombs for the pharaohs and their consorts during the Old and Middle Kingdom periods. At least 138 identified pyramids have been discovered in Egypt. Approximately 80 pyramids were built within the Kingdom of Kush, now located in the modern country of Sudan.
        The earliest known Egyptian pyramids are at Saqqara, west of Memphis. Step-pyramid-like structures, like Mastaba 3808 attributed to pharaoh Anedjib, may predate the Pyramid of Djoser built c. 2630–2610 BCE during the Third Dynasty. This pyramid and its surrounding complex are generally considered to be the world's oldest monumental structures constructed of dressed masonry.
        The most famous Egyptian pyramids are those found at Giza, on the outskirts of Cairo. Several of the Giza pyramids are counted among the largest structures ever built. The Pyramid of Khufu is the largest Egyptian pyramid and the last of the Seven Wonders of the Ancient World still in existence, despite being the oldest by about 2,000 years.
        Recent archeological research at Giza suggests that Fourth Dynasty pyramid construction was heavily dependent on Nile-based transport. Sediment cores show evidence of a Nile-connected harbor functioning along the Giza plateau during Khufu's reign. Researchers argue this port system helped large scale movement of limestone blocks and other materials, highlighting the importance of waterways in Old Kingdom building strategies.

        ## Result 4
        Title: Giza Plateau
        URL: https://en.wikipedia.org/wiki/Giza_Plateau
        Extract: The Giza Plateau (Arabic: هضبة الجيزة) is a limestone plateau in Giza, Egypt, the site of the Fourth Dynasty Giza pyramid complex, which includes the pyramids of Khufu, Khafre and Menkaure, the Great Sphinx, several cemeteries, a workers' village and an industrial complex. It forms the northernmost part of the 160 km2 (62 sq mi) Pyramid Fields in the Western Desert edge of the Nile Valley that are part of the UNESCO World Heritage Site, Memphis and its Necropolis.
        The plateau is elevated approximately 60 metres (200 ft) above sea level.

        ## Result 5
        Title: Giza
        URL: https://en.wikipedia.org/wiki/Giza
        Extract: Giza is the third-largest city in Egypt by area and population, and is also the eighteenth-largest city in Africa by population. It is the capital of Giza Governorate with a total population of 4,458,135 as of 2023. It is located on the west bank of the Nile opposite central Cairo, and is a part of the Greater Cairo metropolis. Giza lies less than 30 kilometres (20 miles) north of Memphis (Men-nefer, today the village of Mit Rahina), which was the capital city of the unified Egyptian state during the reign of pharaoh Narmer, roughly 3100 BC.
        Giza is most famous as the location of the Giza Plateau, the site of some of the most impressive ancient monuments in the world, including a complex of ancient Egyptian royal mortuary and sacred structures, among which are the Great Sphinx, the Great Pyramid of Giza, and a number of other large pyramids and temples, and the Grand Egyptian Museum. Giza has always been a focal point in Egypt's history due to its location close to Memphis, the ancient Egyptian capital of the Old Kingdom.
        In 2025, Giza was visited by 14.7 million tourists, becoming the most popular tourist destination in Egypt. Its historic centre is listed by UNESCO as a World Heritage Site. Giza also hosts the headquarters of several Egyptian multinational companies and banks. Rich in ancient Egyptian heritage, hotels, restaurants, and bazaars, Giza is considered an important economic, scientific, and tourism centre of Egypt and Africa. The Giza Zoo, the first zoo built in Africa, is located in Giza. The city also is the home of the association football club Zamalek SC.

        ## Result 6
        Title: Pyramidology
        URL: https://en.wikipedia.org/wiki/Pyramidology
        Extract: Pyramidology (or pyramidism) refers to various religious or pseudoscientific speculations regarding pyramids, most often the Giza pyramid complex and the Great Pyramid of Giza in Egypt. Some "pyramidologists" also concern themselves with the monumental structures of pre-Columbian America (such as Teotihuacan, the Mesoamerican Maya civilization, and the Inca of the South American Andes), and the temples of Southeast Asia.
        Some pyramidologists claim that the Great Pyramid of Giza has encoded within it predictions for the Exodus of the Hebrews from Egypt, the crucifixion of Jesus, the start of World War I, the founding of modern-day Israel in 1948, and future events including the beginning of Armageddon; this was discovered by using what they call "pyramid inches" to calculate the passage of time where one British inch equals one solar year.
        Pyramidology reached its peak by the early 1980s. Interest revived in 1992 and 1993 when Rudolf Gantenbrink sent a remote-controlled robot up the air shafts of the Queen's Chamber.

        ## Result 7
        Title: Construction of the Egyptian pyramids
        URL: https://en.wikipedia.org/wiki/Construction_of_the_Egyptian_pyramids
        Extract: The construction of the Egyptian pyramids can be explained with well-established scientific facts; however, there are some aspects that even today are considered controversial hypotheses. The construction techniques used seem to have developed over time; later pyramids were not constructed in the same way as earlier ones. It is believed that huge stones were carved from quarries with copper tools, and these blocks were then dragged and lifted into position. Disagreements chiefly concern the methods used to move and place the stones.
        In addition to the many unresolved arguments about the construction techniques, there have been many disagreements as to the kind of workforce used. The Greeks, many years after the event, believed that the pyramids were built by slave labour. Archaeologists now believe that the Great Pyramid of Giza (at least) was built by tens of thousands of skilled workers who camped near the pyramids and worked for a salary or as a form of tax payment (levy) until the construction was completed, pointing to workers' cemeteries discovered in 1990. For the Middle Kingdom pyramid of Amenemhat II, there is evidence from the annal stone of the king that foreigners from Canaan were employed.
        The pseudoscientific field of pyramidology includes many archaeological fringe theories attempting to explain how the pyramids were built.

        ## Result 8
        Title: Giza Governorate
        URL: https://en.wikipedia.org/wiki/Giza_Governorate
        Extract: Giza (Arabic: محافظة الجيزة Muḥāfaẓah Al Gizah) is one of the governorates of Egypt. It is in the center of the country, situated mostly on the west bank of the Nile River opposite Cairo.  Its capital is the city of Giza, after which the governorate was named. It includes a stretch of the left bank of the Nile Valley around Giza, as well as a relatively small portion of the east bank (such as Ghammāzah al Kubrá and El-Saf).
        Giza acquired a large stretch of Egypt's Western Desert, including Bahariya Oasis when the 6th of October Governorate was merged into it on 14 April 2011.  The Giza Governorate is also home to the Great Sphinx and the Pyramids of Giza.

        ## Result 9
        Title: Pyramid of Menkaure
        URL: https://en.wikipedia.org/wiki/Pyramid_of_Menkaure
        Extract: The pyramid of Menkaure is the smallest of the three main pyramids of the Giza pyramid complex, located on the Giza Plateau in the southwestern outskirts of Cairo, Egypt. It is thought to have been built to serve as the tomb of the Fourth Dynasty King Menkaure.

        ## Result 10
        Title: Great Sphinx of Giza
        URL: https://en.wikipedia.org/wiki/Great_Sphinx_of_Giza
        Extract: The Great Sphinx of Giza is a limestone statue of a reclining sphinx, a mythical creature with the head of a human and the body of a lion. The monument was sculpted from the limestone bedrock of the Eocene-aged Mokattam Formation and faces east on the Giza Plateau, on the west bank of the Nile in Giza, Egypt. The oldest known monumental sculpture in Egypt, the Sphinx is part of the Memphite Necropolis and is a UNESCO World Heritage Site.
        Archaeological evidence suggests the Sphinx was created by Egyptians of the Old Kingdom during the reign of Khufu (c. 2590–2566 BC) or Khafre (c. 2558–2532 BC). Scholars and Egyptologists believe the face of the Sphinx was carved to represent either the pharaoh Khufu or one of his sons, pharaohs Djedefre and Khafre, but a consensus has not been reached and the person(s) in whose likeness the Sphinx was carved remains in dispute.
        The Sphinx has undergone multiple restorations, the most recent of which involved  replacing layers of limestone blocks around the base. The monument is 73 m (240 ft) long from paw to tail, 20 m (66 ft) high from the base to the top of the head, and 19 m (62 ft) wide at its rear haunches.
        The circumstances of the destruction of the Sphinx's nose are unknown, but examinations of the face have shown evidence of a deliberate act with rods or chisels. Contrary to a popular myth, the nose was not destroyed by cannonfire from Napoleon's troops during his 1798 Egyptian campaign.
