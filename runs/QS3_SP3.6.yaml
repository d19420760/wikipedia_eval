        \ The Quebec Agreement established the Combined Policy Committee and the Combined\
        \ Development Trust to coordinate the efforts of the United States, the United\
        \ Kingdom and Canada. The subsequent Hyde Park Agreement in September 1944\
        \ extended this cooperation to the postwar period. A British Mission led by\
