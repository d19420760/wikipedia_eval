        \ = live}}</ref><ref>[https://euobserver.com/institutional/138832 Macron revives\
        \ multi-speed Europe idea] {{Webarchive|url=https://web.archive.org/web/20171229231647/https://euobserver.com/institutional/138832\
        \ |date=29 December 2017 }}, EUObserver 30 August 2017</ref>\n\n==Political\
        \ systems==\n{{Main list|List of European Union member states by political\
        \ system}}\n\n[[File:European Union member states by form of government.svg|thumb|\n\
        {{legend|#C90000|[[Presidential system|Presidential republic]]}}\n{{legend|#FF9B37|[[Semi-presidential\
        \ republic]]}}\n{{legend|#F0F000|[[Parliamentary republic]]}}\n{{legend|#00E673|[[Constitutional\
        \ monarchy]]}}\n]]\n\nThe admission of a new state the Union is limited to\
        \ liberal democracies and [[Freedom House]] ranks all EU states as being totally\
        \ free electoral democracies.<ref>{{cite web |url = https://freedomhouse.org/report/freedom-world/freedom-world-2018\
        \ |title = Freedom in the World 2018: Democracy in Crisis |publisher = [[Freedom\
        \ House]] |year = 2018 |access-date = 15 April 2018 |archive-date = 7 October\
        \ 2019 |archive-url = https://web.archive.org/web/20191007111055/https://freedomhouse.org/report/freedom-world/freedom-world-2018\
        \ |url-status = live }}</ref> All but 4 are ranked at the top 1.0 rating.<ref>{{cite\
        \ web|url=https://freedomhouse.org/report/freedom-world-2018-table-country-scores\
        \ |archive-url=https://web.archive.org/web/20180411130830/https://freedomhouse.org/report/freedom-world-2018-table-country-scores|archive-date=11\
        \ April 2018 |title=Freedom in the World 2018: Table of Country Scores |publisher=[[Freedom\
        \ House]] |year=2018 |url-status=live }}</ref> However, the exact political\
        \ system of a state is not limited, with each state having its own system\
        \ based on its historical evolution.\n\nMore than half of member states—16\
        \ out of 27—are [[parliamentary republic]]s, while six states are [[constitutional\
        \ monarchy|constitutional monarchies]], meaning they have a monarch although\
        \ political powers are exercised by elected politicians. Most republics and\
        \ all the monarchies operate a [[parliamentary system]] whereby the head of\
        \ state (president or monarch) has a largely ceremonial role with [[reserve\
        \ power]]s. That means most power is in the hands of what is called in most\
        \ of those countries the prime minister, who is accountable to the [[National\
        \ parliaments of the European Union|national parliament]]. Of the remaining\
        \ republics, four{{clarification needed| date=November 2023}} operate a [[semi-presidential\
        \ system]], where competences are shared between the president and prime minister,\
        \ while one republic operates a [[presidential system]], where the president\
        \ is head of both state and government.\n\nParliamentary structure in member\
        \ states varies: there are 15 [[unicameral]] national parliaments and 12 [[Bicameralism|bicameral]]\
        \ parliaments. The prime minister and government are usually directly accountable\
        \ to the directly elected [[lower house]] and require its support to stay\
        \ in office—the exception being Cyprus with its presidential system. [[Upper\
        \ house]]s are composed differently in different member states: it can be\
        \ directly elected like the [[Senate of Poland|Polish senate]]; indirectly\
        \ elected, for example, by regional legislatures like the [[Federal Council\
        \ of Austria]]; or unelected, but representing certain interest groups like\
        \ the [[National Council of Slovenia]]. All elections in member states use\
        \ some form of [[proportional representation]]. The most common type of proportional\
        \ representation is the [[Party-list proportional representation|party-list\
        \ system]].{{citation needed|date=November 2013}}<!-- True but still needs\
        \ to be cited  -->\n\nThere are also differences in the level of [[self-governance]]\
        \ for the sub-regions of a member state. Most states, especially the smaller\
        \ ones, are [[unitary state]]s; meaning all major political power is concentrated\
        \ at the national level. 9 states allocate power to more local levels of government.\
        \ Austria, Belgium and Germany are full federations, meaning their regions\
        \ have constitutional autonomies. Denmark, Finland, France and the Netherlands\
        \ are [[Federacy|federacies]], meaning some regions have autonomy but most\
        \ do not. Spain and Italy have systems of [[devolution]] where regions have\
        \ autonomy, but the national government retains the legal right to revoke\
        \ it.<ref>{{cite encyclopedia |last=McGarry |first=John |editor1-last=Weller\
        \ |editor1-first=Marc |editor2-last=Nobbs |editor2-first=Katherine|encyclopedia=Asymmetric\
        \ Autonomy and the Settlement of Ethnic Conflicts |year=2010 |publisher=University\
        \ of Pennsylvania Press |location=Philadelphia |isbn=978-0-8122-4230-0 |pages=148–179}}</ref>\n\
        \nStates such as France have a number of [[Special Member State territories\
        \ and the European Union|overseas territories]], retained from their [[Colonial\
