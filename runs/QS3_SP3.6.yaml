        \ southwest Niger, on the border with Benin, and then through Nigeria, discharging\
        \ through a massive delta, known as the Niger Delta, into the Gulf of Guinea\
        \ in the Atlantic Ocean. The Niger is the 14th-longest river in the world\
        \ and the third-longest river in Africa, exceeded by the Nile and the Congo\
        \ River. Its main tributary is the Benue River."
