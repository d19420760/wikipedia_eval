        \ (equivalent to $685.85 million in 2025). In 1944, the Combined Development\
        \ Trust purchased 3,440,000 pounds (1,560,000 kg) of uranium oxide ore from\
        \ the Belgian Congo.\nThe raw ore was dissolved in nitric acid to produce\
        \ uranyl nitrate, which was reduced to highly pure uranium dioxide. By July\
        \ 1942, Mallinckrodt was producing a ton of oxide a day, but turning this\
        \ into uranium metal initially proved more difficult. A branch of the Metallurgical\
        \ Laboratory was established at Iowa State College in Ames, Iowa, under Frank\
        \ Spedding to investigate alternatives. This became known as the Ames Project,\
        \ and the Ames process it developed to produce uranium metal became available\
        \ in 1943. Uranium metal was used to fuel the nuclear reactors. Uranium tetrachloride\
        \ was produced as feed for the calutrons used in the Y-12 (electromagnetic)\
        \ isotope separation process, and uranium hexafluoride for the K-25 (gaseous\
        \ diffusion) separation process.\n\n## Result 7\nTitle: Manhattan Plaza\n\
        URL: https://en.wikipedia.org/wiki/Manhattan_Plaza\nExtract: Manhattan Plaza\
        \ is a large federally subsidized residential complex of 46 floors and 428\
        \ feet (130 m) at 400 and 484 West 43rd Street in midtown Manhattan, New York\
        \ City. Opened in 1977, it has 1,689 units and about 3,500 tenants. Under\
