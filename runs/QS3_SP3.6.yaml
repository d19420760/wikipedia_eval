        \ by host nations. Bids are now easier and less expensive to prepare. The\
        \ 2032 Summer Games host city was the first to be fully selected under this\
        \ process, but other elements and rules were introduced later.\n\n## Result\
        \ 2\nTitle: Football at the 2016 Summer Olympics\nURL: https://en.wikipedia.org/wiki/Football_at_the_2016_Summer_Olympics\n\
        Extract: The association football tournament at the 2016 Summer Olympics was\
        \ held from 3 to 20 August in Brazil.\nIn addition to the Olympic host city\
        \ of Rio de Janeiro, matches were played in Belo Horizonte, Brasília, Salvador,\
        \ São Paulo, and Manaus. All six cities hosted matches during the 2014 World\
        \ Cup, with the Estádio Olímpico João Havelange in Rio de Janeiro the only\
        \ Olympic venue not to have been a World Cup venue.\nAssociations affiliated\
        \ with FIFA might send teams to participate in the tournament. Men's teams\
        \ were restricted to under-23 players (born on or after 1 January 1993) with\
        \ a maximum of three overage players allowed, while there were no age restrictions\
        \ on women's teams. The Games made use of about 400 footballs.\n\n## Result\
        \ 3\nTitle: Gymnastics at the 2016 Summer Olympics\nURL: https://en.wikipedia.org/wiki/Gymnastics_at_the_2016_Summer_Olympics\n\
        Extract: Gymnastics at the 2016 Summer Olympics in Rio de Janeiro was held\
        \ in three categories: artistic gymnastics, rhythmic gymnastics and trampolining.\
        \ All gymnastics events were staged at the Arena Olímpica do Rio from 6 to\
        \ 21 August 2016.\n\n## Result 4\nTitle: Summer Olympic Games\nURL: https://en.wikipedia.org/wiki/Summer_Olympic_Games\n\
        Extract: The Summer Olympic Games, also known as the Summer Olympics or the\
        \ Games of the Olympiad, are a major international multi-sport event normally\
        \ held once every four years. The inaugural Games took place in 1896 in Athens,\
        \ then part of the Kingdom of Greece, and the most recent was held in 2024\
        \ in Paris, France. This was the first international multi-sport event of\
        \ its kind, organised by the International Olympic Committee (IOC) founded\
        \ by Pierre de Coubertin. The tradition of awarding medals began in 1904;\
        \ in each Olympic event, gold medals are awarded for first place, silver medals\
        \ for second place, and bronze medals for third place. The Winter Olympic\
        \ Games were created out of the success of the Summer Olympic Games, which\
        \ are regarded as the largest and most prestigious multi-sport international\
        \ event in the world.\nThe Summer Olympics have increased in scope from a\
        \ 42-event competition programme in 1896 with fewer than 250 male competitors\
        \ from 14 nations, to 339 events in 2021 (2020 Summer Olympics) with 11,319\
        \ competitors (almost half of whom were women) from 206 nations. The Games\
        \ have been held in nineteen countries over five continents: four times in\
        \ the United States (1904, 1932, 1984, and 1996), three times in Great Britain\
        \ (1908, 1948, and 2012) and in France (1900, 1924, and 2024), twice each\
        \ in Greece (1896 and 2004), Germany (1936 and 1972), Australia (1956 and\
        \ 2000), and Japan (1964 and 2020), and once each in Sweden (1912), Belgium\
        \ (1920), the Netherlands (1928), Finland (1952), Italy (1960), Mexico (1968),\
        \ Canada (1976), Russia (1980), South Korea (1988), Spain (1992), China (2008),\
        \ and Brazil (2016).\nLondon and Paris have hosted three times, while Los\
        \ Angeles, Athens, and Tokyo have each hosted twice; Los Angeles will host\
        \ the Games for the third time in 2028. Only three countries have won at least\
        \ one medal in every Summer Olympic Games: Australia, France and Great Britain.\
        \ Only Great Britain has won at least a gold medal in every edition. The United\
        \ States leads the all-time medal count for the Summer Olympics and has topped\
        \ the medal table on 19 separate occasions, followed by the USSR (seven times,\
        \ including the 1992 'Unified Team'), and France, Great Britain, Germany and\
        \ China (once each).\n\n## Result 5\nTitle: Swimming at the 2016 Summer Olympics\n\
        URL: https://en.wikipedia.org/wiki/Swimming_at_the_2016_Summer_Olympics\n\
        Extract: The swimming competitions at the 2016 Summer Olympics in Rio de Janeiro\
        \ took place from 6 to 13 August at the Olympic Aquatics Stadium. The women's\
        \ open-water marathon was held on August 15, and the men's open water race\
        \ on August 16 in Fort Copacabana.\n\n## Result 6\nTitle: 2028 Summer Olympics\n\
        URL: https://en.wikipedia.org/wiki/2028_Summer_Olympics\nExtract: The 2028\
        \ Summer Olympics, officially the Games of the XXXIV Olympiad and commonly\
        \ known as Los Angeles 2028 or LA28, is an upcoming international multi-sport\
        \ event scheduled to take place from July 14 to 30, 2028, in the United States.\
        \ Los Angeles will be the host city, with various events also scheduled to\
        \ be held at other cities spread across the Greater Los Angeles area, plus\
        \ two subsites in Oklahoma City.\nLos Angeles had originally bid for the 2024\
        \ Summer Olympics. Following multiple withdrawals, the International Olympic\
        \ Committee (IOC) approved a process to concurrently award the 2024 and 2028\
        \ Games to Los Angeles and Paris as the two remaining candidates; Paris was\
        \ preferred as host for 2024, while Los Angeles agreed to host in 2028. Los\
        \ Angeles was formally awarded the Games at the 131st IOC Session in Lima,\
        \ Peru, on September 13, 2017. They will mark the fifth Summer Olympics, and\
        \ ninth Olympics overall to be hosted by the United States. Los Angeles has\
        \ previously hosted the Summer Olympics in 1932 and 1984, and will become\
        \ the third three-time host city after London (1908, 1948, 2012) and Paris\
        \ (1900, 1924, 2024), and the first non-European city to do so. These will\
        \ be the first Summer Olympics held under the IOC presidency of Kirsty Coventry.\n\
        After debuting in 2020 as optional events, skateboarding, sport climbing,\
        \ and surfing have been promoted to the Summer Olympics' core event program.\
        \ The Games will feature the debut of flag football and squash as optional\
        \ sports, joined by the return of baseball/softball, cricket (for the first\
        \ time since 1900) and lacrosse (for the first time as a medal event since\
        \ 1908).\n\n## Result 7\nTitle: 2016 Summer Olympics\nURL: https://en.wikipedia.org/wiki/2016_Summer_Olympics\n\
        Extract: The 2016 Summer Olympics (Portuguese: Jogos Olímpicos de Verão de\
        \ 2016), officially the Games of the XXXI Olympiad (Portuguese: Jogos da XXXI\
        \ Olimpíada) and officially branded as Rio 2016, were an international multi-sport\
        \ event held from 5 to 21 August 2016 in Rio de Janeiro, Brazil, with preliminary\
        \ events in some sports beginning on 3 August. Rio de Janeiro was announced\
        \ as the host city at the 121st IOC Session in Copenhagen, Denmark, on 2 October\
        \ 2009.\n11,238 athletes from 207 nations took part in the 2016 Games, including\
        \ first-time entrants Kosovo, South Sudan, and the Refugee Olympic Team. With\
        \ 306 sets of medals, the Games featured 28 Olympic sports, including rugby\
        \ sevens and golf, which were added to the Olympic program in 2009. These\
        \ sporting events took place at 33 venues in the host city and at five separate\
        \ venues in the Brazilian cities of São Paulo, Belo Horizonte, Salvador, Brasília,\
        \ and Manaus.\nThese were the first Olympic Games to be held in South America,\
        \ as well as the first to be held in a Portuguese-speaking country, the first\
        \ summer edition to be held entirely in the host country's winter season,\
        \ the first since 1968 to be held in Latin America, and the first since 2000\
        \ to be held in the Southern Hemisphere. These were also the first Summer\
        \ Olympics to take place under the International Olympic Committee (IOC) presidency\
        \ of Thomas Bach. The games were opened by acting president of Brazil (and\
        \ later president), Michel Temer and closed by Bach.\nThe United States topped\
        \ the medal table, winning the most gold medals (46) and the highest number\
        \ of medals overall (121); the U.S. team also won its 1,000th Summer Olympic\
        \ gold medal. Great Britain finished second and the only country to increase\
        \ its tally of medals in the Summer Olympiad immediately after being the host\
        \ nation. China finished third. Host nation Brazil won seven gold medals and\
        \ 19 total medals, its best result at any Olympics, finishing in thirteenth\
        \ place. Bahrain, Fiji, Ivory Coast, Jordan, Kosovo, Puerto Rico, Singapore,\
        \ Tajikistan, and Vietnam all won their first gold medals, as did the group\
        \ of Independent Olympic Athletes (from Kuwait).\n\n## Result 8\nTitle: 2024\
        \ Summer Olympics\nURL: https://en.wikipedia.org/wiki/2024_Summer_Olympics\n\
        Extract: The 2024 Summer Olympics (French: Les Jeux Olympiques d'été de 2024),\
        \ officially the Games of the XXXIII Olympiad (French: Jeux de la XXXIIIe\
        \ olympiade de l'ère moderne) and branded as Paris 2024, were an international\
        \ multi-sport event held in France from 26 July to 11 August 2024, with several\
        \ events starting from 24 July. Paris was the host city, with events (mainly\
        \ football) held in 16 additional cities in metropolitan France, including\
        \ the sailing centre in the second-largest city of France, Marseille, on the\
        \ Mediterranean Sea, as well as one subsite for surfing in Tahiti, French\
        \ Polynesia.\nParis was awarded the Games at the 131st IOC Session in Lima,\
        \ Peru, on 13 September 2017. After multiple withdrawals that left only Paris\
        \ and Los Angeles in contention, the International Olympic Committee (IOC)\
        \ approved a process to concurrently award the 2024 and 2028 Summer Olympics\
        \ to the two remaining candidate cities. Having previously hosted in 1900\
        \ and 1924, Paris became the second city ever to host the Summer Olympics\
        \ three times, after London (1908, 1948, and 2012). Paris 2024 marked the\
        \ centennial of the 1924 Summer Games and the 1924 Winter Olympics in Chamonix\
        \ (the first Winter Olympics), as well as the sixth Olympic Games hosted by\
        \ France (three Summer Olympics and three Winter Olympics). The Summer Games\
        \ returned to the traditional four-year Olympiad cycle, after the 2020 edition\
        \ was postponed to 2021 due to the COVID-19 pandemic.\nParis 2024 featured\
        \ the debut of breaking as an Olympic sport, and was the final Olympic Games\
        \ held during the IOC presidency of Thomas Bach. The 2024 Games were expected\
        \ to cost €9 billion. The opening ceremony was held outside of a stadium for\
        \ the first time in modern Olympic history, being outdoors in the Paris's\
        \ downtown and athletes were paraded by boat along the Seine. Paris 2024 was\
        \ the first Olympics in history to reach full gender parity on the field of\
        \ play, with equal numbers of male and female athletes.\nThe United States\
        \ topped the medal table for the fourth consecutive Summer Games and 19th\
        \ time overall, with 40 gold and 126 total medals. China tied with the United\
        \ States on gold (40), but finished second due to having fewer silvers; the\
        \ nation won 91 medals overall. This was the first time a gold medal tie had\
        \ occurred between the two most successful nations in Summer Olympic history.\
        \ Japan finished third with 20 gold and 45 total medals, and sixth in the\
        \ overall medal count. Australia finished fourth with 18 gold and 53 total\
        \ medals, marking the nation's most successful Summer Olympics of all time,\
        \ and fifth in the overall medal count. The host nation, France, finished\
        \ fifth with 16 gold and 64 total medals, marking their first top-five finish\
        \ since the 1996 Summer Olympics, and fourth in the overall medal count. Dominica,\
        \ Saint Lucia, Cape Verde and Albania won their first-ever Olympic medals,\
        \ the former two both being gold, with Botswana and Guatemala also winning\
        \ their first-ever gold medals. The Refugee Olympic Team also won their first-ever\
        \ medal: Cindy Ngamba, a refugee from Cameroon, won a bronze in boxing.\n\
        Despite some controversies throughout relating to politics, logistics and\
        \ conditions in the Olympic Village, the Games were considered a success by\
        \ the press, Parisians and observers upon its conclusion. The Paris Olympics\
        \ broke all-time records for ticket sales, with more than 9.5 million tickets\
        \ sold (12.1 million including the Paralympic Games).\n\n## Result 9\nTitle:\
        \ 2032 Summer Olympics\nURL: https://en.wikipedia.org/wiki/2032_Summer_Olympics\n\
        Extract: The 2032 Summer Olympics, officially the Games of the XXXV Olympiad\
        \ and also known as Brisbane 2032, is a planned international multi-sport\
        \ event scheduled to take place from 23 July to 8 August 2032 in Brisbane,\
        \ Australia, with venues across the various regions of Queensland.\nAs part\
        \ of the new Olympic bid process, the Future Host Commission of the International\
        \ Olympic Committee (IOC) nominated Brisbane as its preferred candidate on\
        \ 24 February 2021. The Brisbane bid was approved on 21 July 2021 during the\
        \ 138th IOC Session in Tokyo.\nIt will be the third Olympic Games held in\
        \ Australia, following the 1956 Summer Olympics in Melbourne, Victoria, and\
        \ the 2000 Summer Olympics in Sydney, New South Wales; Melbourne and Sydney\
