      content: "## Result 1\nTitle: First Reading of the Emancipation Proclamation\
        \ of President Lincoln\nURL: https://en.wikipedia.org/wiki/First_Reading_of_the_Emancipation_Proclamation_of_President_Lincoln\n\
        Extract: First Reading of the Emancipation Proclamation of President Lincoln\
        \ is an 1864 oil-on-canvas painting by Francis Bicknell Carpenter. In the\
        \ painting, Carpenter depicts Abraham Lincoln, the 16th president of the United\
        \ States, and his Cabinet members reading over the Emancipation Proclamation,\
        \ which proclaimed the freedom of slaves in the ten states in rebellion against\
        \ the Union in the American Civil War on January 1, 1863. Lincoln presented\
        \ the preliminary Emancipation Proclamation to his Cabinet on July 22, 1862\
        \ and issued it on September 22, 1862. The final Emancipation Proclamation\
        \ took effect on January 1, 1863.\nCarpenter spent six months in the White\
        \ House while he painted. The painting is displayed at the United States Capitol\
        \ in Washington, D.C.\n\n## Result 2\nTitle: Emancipation Proclamation\nURL:\
        \ https://en.wikipedia.org/wiki/Emancipation_Proclamation\nExtract: The Emancipation\
        \ Proclamation, officially Proclamation 95, was a presidential proclamation\
        \ and executive order issued by United States president Abraham Lincoln on\
        \ January 1, 1863, during the American Civil War. The Proclamation changed\
        \ the legal status of more than 3.5 million enslaved African Americans in\
        \ the secessionist Confederate states from enslaved to free. As soon as slaves\
        \ escaped the control of their enslavers, either by fleeing to Union lines\
        \ or through the advance of federal troops, they were permanently free. In\
        \ addition, the Proclamation allowed for former slaves to \"be received into\
        \ the armed service of the United States\". The Emancipation Proclamation\
        \ played a significant part in the end of slavery in the United States.\n\
        On September 22, 1862, Lincoln issued the Preliminary Emancipation Proclamation\
        \ (Proclamation 93). Its third paragraph begins:\n\nThat on the first day\
        \ of January in the year of our Lord, one thousand eight hundred and sixty-three,\
        \ all persons held as slaves within any State, or designated part of a State,\
        \ the people whereof shall then be in rebellion against the United States\
        \ shall be then, thenceforward, and forever free;...\nOn January 1, 1863,\
        \ Lincoln issued the Final Emancipation Proclamation. It stated:\n\nNow, therefore\
        \ I, Abraham Lincoln, President of the United States, by virtue of the power\
        \ in me vested as Commander-in-Chief, of the Army and Navy of the United States\
        \ in time of actual armed rebellion against the authority and government of\
        \ the United States, and as a fit and necessary war measure for suppressing\
