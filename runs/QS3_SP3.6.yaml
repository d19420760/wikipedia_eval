        \ With the win, Alcaraz ended Djokovic's unbeaten 10–0 record in Australian\
        \ Open finals.\nJannik Sinner was the two-time defending champion, but lost\
        \ in the semifinals to Djokovic in a rematch of their semifinal match two\
