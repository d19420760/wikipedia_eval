        \ Known as the Cow Pox, in which he described the protective effect of cowpox\
        \ against smallpox. In 1881, to honor Jenner, Louis Pasteur proposed that\
        \ the terms should be extended to cover the new protective inoculations then\
        \ being developed. The science of vaccine development and production is termed\
        \ vaccinology.\n\n## Result 3\nTitle: Inverse vaccine\nURL: https://en.wikipedia.org/wiki/Inverse_vaccine\n\
        Extract: An inverse vaccine, or reverse vaccine, is a hypothetical approach\
        \ to the use of vaccines that trains the immune system to not respond to certain\
        \ substances. Under laboratory conditions, an inverse vaccine has been shown\
