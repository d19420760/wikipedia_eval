        \ Cantelmo''' 86%\n| {{party shading/Republican}} | Janis Kelly 9% \n| \n\
        |}\n\nPolitically, the majority of the city's voters (many of them students)\
        \ have supported [[American liberalism|liberalism]] and the [[Democratic Party\
        \ (United States)|Democratic Party]]. A November 2004 study by [[ePodunk]]\
        \ lists it as New York's most liberal city.<ref>{{Cite web |url=http://www.epodunk.com/top10/liberal/index.html\
        \ |title=Most liberal places in America |publisher=ePodunk.com |access-date=April\
        \ 30, 2015 |archive-url=https://web.archive.org/web/20150408142929/http://www.epodunk.com/top10/liberal/index.html\
        \ |archive-date=April 8, 2015 |url-status=dead }}</ref> This contrasts with\
        \ the more [[American conservatism|conservative]] leanings of the generally\
        \ rural Upstate New York region. The city's voters are also more liberal than\
        \ those in the rest of [[Tompkins County]], although the county was last carried\
        \ by a Republican presidential candidate in 1980. In 2008, [[Barack Obama]],\
        \ running against New York State's US Senator Hillary Clinton, won Tompkins\
        \ County in the Democratic Presidential Primary, the only county that he won\
        \ in New York State.<ref>{{Cite web|url=http://www.elections.ny.gov/NYSBOE/Elections/2008/Primary/PP-DEM-PRES-2008.pdf|title=2008\
        \ presidential general election results|publisher=New York State Board of\
        \ Elections|access-date=April 30, 2015|archive-date=August 15, 2014|archive-url=https://web.archive.org/web/20140815104346/http://www.elections.ny.gov/NYSBOE/Elections/2008/Primary/PP-DEM-PRES-2008.pdf|url-status=dead}}</ref>\
        \ Obama won Tompkins County (including Ithaca) by a wide margin of 41% over\
        \ his opponent [[John McCain]] in the November 2008 election. Tompkins County\
        \ is currently part of New York's 19th congressional district.\n\n===Ithaca\
        \ Police Department===\nThe Ithaca Police Department (IPD) is responsible\
        \ for all public safety and law enforcement services within the municipal\
        \ boundaries of Ithaca.<ref>{{Cite web |title=History of the Ithaca Police\
        \ Department {{!}} Ithaca, NY - Official Website |url=https://www.cityofithaca.org/315/History-of-the-Ithaca-Police-Department\
        \ |access-date=2025-09-19 |website=www.cityofithaca.org}}</ref> The IPD was\
        \ established on June 1, 1888, upon Ithaca's formal incorporation as a city.\
        \ As of 2024, it consisted of 54 employees including department chief Thomas\
        \ Kelly.<ref>{{Cite web |last=Jordan |first=Jimmy |date=2023-04-07 |title=Almost\
        \ three years since Ithaca's police reform efforts began, plans start to move\
        \ forward |url=https://ithacavoice.org/2023/04/almost-three-years-since-ithacas-police-reform-efforts-began-plans-start-to-move-forward/\
        \ |access-date=2025-09-19 |website=The Ithaca Voice |language=en-US}}</ref>\n\
        \nThe City of Ithaca Common Council oversees IPD and makes budgeting determinations\
        \ on behalf of the department.\n\nThe Ithaca Police Benevolent Association\
        \ (IPBA) is a [[police union]] established by members of IPD.<ref>{{Cite web\
        \ |title=About us |url=https://www.ithacapba.org/about/who-we-are |access-date=2025-09-19\
        \ |website=www.ithacapba.org}}</ref>\n\n===Sister city===\nIthaca is a [[city\
        \ twinning|sister city]] of:\n* [[Eldoret]], Kenya<ref>{{Cite web | url=http://hepstrack.com/blog/2014/03/31/the-rift-makes-ithaca-shift/\
        \ | title=The Rift Makes Ithaca Shift | publisher=HepsTrack, LLC | work=HepsTrack.com\
        \ | date=March 31, 2014 | access-date=April 27, 2014 | archive-date=January\
        \ 21, 2016 | archive-url=https://web.archive.org/web/20160121103654/http://hepstrack.com/blog/2014/03/31/the-rift-makes-ithaca-shift/\
        \ | url-status=dead }}</ref>\n* [[Pokhara]], Nepal<ref>{{Cite web |last=Sicroff\
        \ |first=Seth |title=The Ithaca - Pokhara Sister Cities Project |url=https://www.mountainlegacy.org/0mlsisters.html}}</ref>\n\
        \n==Education==\n\n===Colleges===\n{{Further|Cornell University|Ithaca College}}\n\
        [[File:Cornell University from McGraw Tower.JPG|thumb|[[Sage Chapel]] at [[Cornell\
        \ University]]]]\nIthaca is a major educational center in [[Central New York]].\
        \ The two major post-secondary educational institutions located in Ithaca\
        \ were each founded in the late 19th century. In 1865, Ezra Cornell founded\
        \ [[Cornell University]], which overlooks the town from East Hill. It was\
        \ opened as a [[coeducational]] institution. Women first enrolled in 1870.\
        \ Ezra Cornell also established [[Tompkins County Public Library|a public\
        \ library]] for the city. [[Ithaca College]] was founded as the Ithaca Conservatory\
        \ of Music in 1892.<ref>[https://www.tcpl.org/research-learn/local-history-genealogy\
        \ Wilgus Opera House] {{Webarchive|url=https://web.archive.org/web/20200410012759/https://www.tcpl.org/research-learn/local-history-genealogy\
        \ |date=April 10, 2020 }}, Ithaca, New York. From 1894 until 1911 (except\
        \ for occasional years), the Ithaca Conservatory of Music occupied the second\
        \ and third floors of the Wilgus Block, located beside the Sprague Block.\
        \ Accessed via \"Wilgus Opera House, Ithaca, NY\" https://bscottholmes.com/content/wilgus-opera-house-ithaca-ny\
        \ {{Webarchive|url=https://web.archive.org/web/20200323213741/https://bscottholmes.com/content/wilgus-opera-house-ithaca-ny\
        \ |date=March 23, 2020 }} March 2020.</ref> Ithaca College was originally\
        \ located in the downtown area but relocated to South Hill in the 1960s. In\
        \ 2018, there were 23,600 students enrolled at Cornell and 6,700 at Ithaca\
        \ College.<ref>{{Cite web |url=https://www.cornell.edu/about/facts.cfm |title=Cornell\
        \ University : Enrollments by College : Ithaca Campus – Fall 2018 |publisher=Dpb.cornell.edu\
        \ |access-date=April 19, 2019 |archive-date=April 3, 2019 |archive-url=https://web.archive.org/web/20190403053400/https://www.cornell.edu/about/facts.cfm\
        \ |url-status=live }}</ref> [[Tompkins Cortland Community College]] is located\
        \ in the neighboring town of [[Dryden (town), New York|Dryden]], and has an\
        \ extension center in downtown Ithaca. [[Empire State College]] offers non-traditional\
        \ college courses to adults in downtown Ithaca.\n\n===Public schools===\n\
        {{Further|Ithaca City School District}}\nThe [[Ithaca City School District]],\
        \ based in Ithaca, encompasses the city and its surrounding area and enrolls\
        \ about 5,500 K-12 students in eight elementary schools (roughly one for every\
        \ neighborhood), two middle schools (Boynton and Dewitt), [[Ithaca High School\
        \ (Ithaca, New York)|Ithaca High School]] and the [[Lehman Alternative Community\
        \ School]], a combined middle and high school. Several private elementary\
        \ and secondary schools are located in the Ithaca area, including the Roman\
        \ Catholic Immaculate Conception School, the [[Cascadilla School]], the New\
        \ Roots Charter School, the [[Elizabeth Ann Clune Montessori School]], the\
        \ Namaste Montessori School (in the [[Trumansburg]] area) and the Ithaca [[Waldorf\
        \ School]]. Ithaca has two networks for supporting its home-schooling families:\
        \ Loving Education At Home (LEAH) and the Northern Light Learning Center (NLLC).\
        \ TST BOCES is located in [[Tompkins County]].\n\n===Library===\n[[File:Tompkins\
        \ County Public Library, Ithaca NY.jpg|thumb|Tompkins County Public Library]]\n\
        The [[Tompkins County Public Library]], located at 101 East Green Street,\
        \ serves as the public library for Tompkins County and is the Central Library\
        \ for the [[Finger Lakes Library System]]. The library serves over 38,000\
        \ registered borrowers and contains nearly 260,000 items in its circulating\
        \ collection, and circulates about 800,000 items annually.<ref>{{Cite web\
        \ |title=About TCPL |url=https://www.tcpl.org/about-us/about-tcpl |access-date=30\
        \ August 2022 |website=Tompkins County Public Library |archive-date=August\
        \ 30, 2022 |archive-url=https://web.archive.org/web/20220830152743/https://www.tcpl.org/about-us/about-tcpl\
        \ |url-status=live }}</ref>\n\n==Media==\nThe ''[[Ithaca Journal]]'', founded\
        \ in 1815, is a morning daily newspaper that has been owned by [[Gannett]]\
        \ since 1912. The ''Ithaca Voice'' is a nonprofit digital news site with a\
        \ mission to improve civic and political understanding in Ithaca and Tompkins\
        \ County.<ref>{{cite web |title=About Us |url=https://ithacavoice.com/about-us-main/\
        \ |website=Ithaca Voice |access-date=8 November 2022 |archive-date=February\
        \ 6, 2023 |archive-url=https://web.archive.org/web/20230206034215/https://ithacavoice.com/about-us-main/\
        \ |url-status=live }}</ref> The ''[[Ithaca Times]]'' is a free alternative\
        \ weekly newspaper that's published every Wednesday. ''[[The Cornell Daily\
        \ Sun]]'' is also published in Ithaca, operating since 1880. Other media outlets\
        \ include the online magazine ''14850.com''.\n\nIthaca is home to several\
        \ radio stations:\n{{Div col}}\n* [[WICB]] 91.7 FM is a non-commercial, student-run\
        \ station owned by Ithaca College.\n* [[WPIE]] 1160 AM/107.1 FM \"ESPN Ithaca\"\
        \ is a sports talk station locally owned by Taughannock Media.\n* [[WQNY]]\
        \ \"Q-Country\" 103.7 FM, owned by The Cayuga Radio Group, a subsidiary of\
        \ Saga Communications, Inc.\n* [[WINO (FM)|WINO]] 88.1 FM, Ithaca Community\
        \ Radio, has a studio and offices in the Clinton House, and also broadcasts\
        \ at 91.9 FM in [[Watkins Glen, New York|Watkins Glen]].\n* [[WVBR-FM]] 93.5\
        \ FM/105.5 FM, affiliated with Cornell University, is a student-owned and\
        \ operated commercial station with music, sports including Cornell hockey,\
        \ and community members hosting specialty programming.\n* [[WYXL]] \"Lite\
        \ Rock\" 97.3 FM\n* News/talk [[WHCU]] 870 AM\n* Progressive talk [[WNYY]]\
        \ 1470 AM\n* Classic rock \"I-100\" [[WIII (FM)|WIII]] 99.9 FM\n{{Div col}}\n\
        {{div col end}}\nPublic radio:\n* WSQG 90.9 FM, [[WSKG-FM]]'s Ithaca frequency,\
        \ provides [[NPR]] and classical music programming.\n* [[WITH (FM)|WITH]]\
        \ 90.1 FM is the local translator for public radio and [[Adult album alternative|AAA]]\
        \ station [[WRUR-FM]] in Rochester.<ref>{{Cite web|url=https://www.withradio.org/about-us|title=About\
        \ WITH|website=www.withradio.org|access-date=August 2, 2019}}</ref>\n{{div\
        \ col end}}\n\nOther FM stations include: Saga's \"98.7 The Vine\", a low-powered\
        \ translator station; [[WFIZ]] \"Z95.5\", airing a top-40 (CHR) format; contemporary\
        \ Christian music station WCII 88.9; and classic rock \"The Wall\" WLLW 99.3\
        \ and 96.3, based in [[Seneca Falls (village), New York|Seneca Falls]] with\
        \ a transmitter in Ithaca.\n\n==Transportation==\nIn 2009, the Ithaca metropolitan\
        \ statistical area (MSA) ranked as the highest in the United States for the\
        \ percentage of commuters who walked to work (15.1 percent).<ref>{{cite web|url=https://www.census.gov/prod/2011pubs/acs-15.pdf|series=American\
        \ Community Survey Reports|title=Commuting in the United States: 2009|access-date=December\
        \ 9, 2017|date=September 2011|archive-url=https://web.archive.org/web/20170726134351/https://www.census.gov/prod/2011pubs/acs-15.pdf|archive-date=July\
        \ 26, 2017|url-status=dead}}</ref> In 2013, the Ithaca MSA ranked as the second-lowest\
        \ in the United States for percentage of commuters who traveled by private\
        \ vehicle (68.7 percent). During the same year, 17.5 percent of commuters\
        \ in the Ithaca MSA walked to work.<ref>{{cite web |url=https://www.census.gov/content/dam/Census/library/publications/2015/acs/acs-32.pdf\
        \ |title=Who Drives to Work? Commuting by Automobile in the United States:\
        \ 2013 |series=American Survey Reports |access-date=December 9, 2017 |date=August\
        \ 2015 |author=McKenzie, Brian |archive-date=December 21, 2017 |archive-url=https://web.archive.org/web/20171221064610/https://www.census.gov/content/dam/Census/library/publications/2015/acs/acs-32.pdf\
        \ |url-status=live }}</ref>\n\n===Roads===\n[[File:TompkinsConsolidatedAreaTransitBus2.JPG|thumb|A\
        \ [[Tompkins Consolidated Area Transit|TCAT]] bus]]\n[[File:Voyager golden\
        \ record 103 highway.gif|thumb|[[New York State Route 13|Route 13]] in Ithaca,\
        \ photographed for the ''[[Voyager Golden Record]]'']]\nIthaca is in the rural\
        \ Finger Lakes region about {{Convert|225|mi|km}} northwest of New York City;\
        \ the nearest larger cities, [[Binghamton, New York|Binghamton]] and [[Syracuse,\
        \ New York|Syracuse]], are an hour's drive away by car, [[Rochester, New York|Rochester]]\
        \ and [[Scranton, Pennsylvania|Scranton]] are two hours, [[Buffalo, New York|Buffalo]]\
        \ and [[Albany, New York|Albany]] are three hours. [[New York City]], [[Philadelphia]],\
        \ [[Toronto]], and [[Ottawa]] are approximately four hours away.\n\nIthaca\
        \ lies at over a half-hour's drive from any [[interstate highway]], and all\
        \ car trips to Ithaca involve some driving on two-lane state rural highways.\
        \ The city is at the convergence of many regional two-lane state highways:\
        \ Routes [[New York State Route 13|13]], [[New York State Route 13A|13A]],\
        \ [[New York State Route 34|34]], [[New York State Route 79|79]], [[New York\
        \ State Route 89|89]], [[New York State Route 96|96]], [[New York State Route\
        \ 96B|96B]] and [[New York State Route 366|366]]. These are usually not congested\
        \ except in Ithaca proper. However, Route 79 between the I-81 access at Whitney\
        \ Point and Ithaca receives a significant amount of Ithaca-bound congestion\
        \ right before Ithaca's colleges reopen after breaks.\n\nIn July 2008, a non-profit\
        \ called Ithaca Carshare began a [[carsharing]] service in Ithaca. Ithaca\
        \ Carshare has a fleet of vehicles shared by over 1500 members as of July,\
        \ 2015 and has become a popular service among both city residents and the\
        \ college communities. Vehicles are located throughout Ithaca downtown and\
        \ at the two major institutions. With Ithaca Carshare as the first locally-run\
        \ carsharing organization in New York State, others have since launched in\
        \ [[Buffalo, New York|Buffalo]], Albany, and [[Syracuse, New York|Syracuse]].\n\
        \nRideshare services to promote carpooling and vanpooling are operated by\
        \ ZIMRIDE and VRIDE. A community mobility education program, Way2Go, is operated\
        \ by Cornell Cooperative Extension of Tompkins County. Way2Go's website provides\
        \ consumer information and videos. Way2Go works collaboratively to help people\
        \ save money, stress less, go green and improve mobility options.<ref>{{Cite\
        \ web|url=http://ccetompkins.org/community/way2go#sthash.IocP71mT.dpuf |title=Cornell\
        \ Cooperative Extension &#124; Way2Go |publisher=Ccetompkins.org |date=April\
        \ 16, 2015 |access-date=April 30, 2015}}</ref> The 2-1-1 Tompkins/Cortland\
        \ Help line connects people with services, including transportation, in the\
        \ community, by telephone and web on a 24/7 basis. The information and referral\
        \ service is operated by the Human Services Coalition of Tompkins County,\
        \ Inc. Together, 2-1-1 Information and Referral and Way2Go are a one-call,\
        \ one-click resource designed to mobility services information for Ithaca\
        \ and throughout Tompkins County.\n\n===Inter-City Bus Service===\nThere is\
        \ frequent intercity bus service by [[Greyhound Lines]], New York Trailways,\
        \ [[OurBus]], [[FlixBus]], and Shortline (Coach USA), particularly to Binghamton\
        \ and New York City, with limited service to Rochester, [[Buffalo, New York|Buffalo]]\
        \ and Syracuse, and via connections in Binghamton to [[Utica, New York|Utica]]\
        \ and [[Albany, New York|Albany]]. OurBus provides limited holiday services\
        \ to [[Allentown, Pennsylvania]], [[Philadelphia]], and [[Washington, D.C.]].\
        \ [[Cornell University]] runs a premium campus-to-campus bus between its Ithaca\
        \ campus and its medical school in [[Manhattan]], New York City, which is\
        \ open to the public. Starting in September 2019, intercity buses began serving\
        \ Ithaca from the downtown bus stop at 131 East Green Street after the former\
        \ [[Ithaca Bus Station|Greyhound bus station]] on West State Street closed\
        \ due to staff retirement and building maintenance issues.<ref>{{Cite web|url=https://locations.greyhound.com/bus-stations/us/ny/ithaca/bus-station-150898|title=Ithaca\
        \ NY Bus Station {{!}} Greyhound|website=locations.greyhound.com|access-date=2019-12-05|archive-date=December\
        \ 5, 2019|archive-url=https://web.archive.org/web/20191205205516/https://locations.greyhound.com/bus-stations/us/ny/ithaca/bus-station-150898|url-status=dead}}</ref><ref>{{Cite\
        \ web|url=https://www.ithaca.com/news/future-of-ithaca-s-bus-depot-in-the-air/article_c53fcc16-7ee1-11e8-8d06-4b99a57d66db.html|title=Future\
        \ of Ithaca's bus depot in the air|last=Reynolds|first=Mark H. Anbinder &\
        \ Nick|website=Ithaca Times|date=July 3, 2018|language=en|access-date=2019-12-05|archive-date=December\
        \ 5, 2019|archive-url=https://web.archive.org/web/20191205195540/https://www.ithaca.com/news/future-of-ithaca-s-bus-depot-in-the-air/article_c53fcc16-7ee1-11e8-8d06-4b99a57d66db.html|url-status=live}}</ref><ref>{{Cite\
        \ web|url=https://cornellsun.com/2018/10/10/ithaca-bus-terminal-relocates-to-new-space-on-green-street/|title=Ithaca\
        \ Bus Terminal Relocates to New Space on Green Street|date=2018-10-10|website=The\
        \ Cornell Daily Sun|language=en-US|access-date=2019-12-05|archive-date=December\
        \ 5, 2019|archive-url=https://web.archive.org/web/20191205195538/https://cornellsun.com/2018/10/10/ithaca-bus-terminal-relocates-to-new-space-on-green-street/|url-status=live}}</ref>\
        \ OurBus now picks up and drops off on Seneca Street, near the downtown Hilton\
        \ Garden Inn.\n\n=== Local Bus Service ===\nIthaca is the center of an extensive\
        \ bus public transportation network. [[Tompkins Consolidated Area Transit]],\
        \ Inc. (TCAT, Inc.) is a not-for-profit corporation that provides public transportation\
        \ for Tompkins County, New York. TCAT was reorganized as a non-profit corporation\
        \ in 2004 and is primarily supported locally by Cornell University, the City\
        \ of Ithaca and Tompkins County. TCAT is governed by a nine-member board of\
        \ directors with three directors each being recommended by the City of Ithaca,\
        \ Tompkins County, and Cornell University.<ref>{{Cite web |title=Boards &\
        \ Committees |url=https://tcatbus.com/about/boards-committees/ |access-date=2026-05-09\
        \ |website=TCAT |language=en-US}}</ref>\n\nTCAT's ridership increased from\
        \ 2.7 million in 2004 to 4.4 million in 2013.<ref>{{Cite web|url=http://www.tcatbus.com/files/all/tcat_2013_yearbook_-_final.pdf|title=2013\
        \ Yearbook|archive-url=https://web.archive.org/web/20141027015210/http://www.tcatbus.com/files/all/tcat_2013_yearbook_-_final.pdf|url-status=dead|archive-date=October\
        \ 27, 2014|date=October 27, 2014|access-date=August 2, 2019}}</ref> TCAT operates\
        \ 34 routes, many running seven days a week. It has frequent service to downtown,\
        \ Cornell University, [[Ithaca College]], and [[The Shops at Ithaca Mall]]\
        \ in the Lansing, New York, but less frequent service to residential and rural\
        \ areas, including [[Trumansburg, New York|Trumansburg]] and [[Newfield, New\
        \ York|Newfield]]. Chemung County Transit (C-TRAN) runs weekday commuter service\
        \ from Chemung County to Ithaca. Cortland Transit runs commuter service to\
        \ Cornell University. Tioga County Public Transit operated three routes to\
        \ Ithaca and Cornell, but ceased operations on November 30, 2014. \n\nGadabout\
        \ Transportation Services, Inc. provides demand-response paratransit service\
        \ for Tompkins County residents 55 and older, and people with disabilities.\
        \ Ithaca Dispatch provides local and regional taxi service. In addition, Ithaca\
        \ Airline Limousine and IthaCar Service connect to the local airports.\n\n\
        ===Airports===\n{{Further|Ithaca Tompkins International Airport}}\n[[File:Ithaca\
        \ Tompkins Airport tower nov 2017.jpg|thumb|upright=.7|[[Ithaca Tompkins International\
        \ Airport]] viewed from a taxiing plane]]\nIthaca is served by [[Ithaca Tompkins\
        \ International Airport]], located about three miles to the northeast of the\
        \ city center. In late 2019, the airport completed a major $34.8 million renovation\
        \ which included a larger terminal with additional passenger gates and [[jet\
        \ bridge]]s, expanded passenger amenities and a {{convert|5000|sqft|m2}} customs\
        \ facility that enables it to receive international charter and private flights.<ref\
        \ name=\"ijairport\">{{citation|url=https://www.ithacajournal.com/story/news/local/2019/12/20/ithaca-tompkins-international-airport-reveals-34-8-million-upgrades/2697178001/|title=Ithaca\
        \ Tompkins International Airport reveals $34.8 million upgrades|first=Kate|last=Collins|work=Ithaca\
        \ Journal|date=December 20, 2019}}</ref>\n\n[[American Eagle (airline brand)|American\
        \ Airlines]] pulled out of Ithaca on September 7, 2022, citing pilot shortages.{{citation\
        \ needed|date=March 2025}} [[Delta Connection]] provides service to and from\
        \ [[John F. Kennedy International Airport]], operated by its commuter partner\
        \ [[Endeavor Air]], using the [[Bombardier CRJ900]]. [[United Express]] offers\
        \ daily flights to its hub at [[Newark Liberty International Airport]], operated\
        \ by its commuter partners [[GoJet Airlines]] and [[Republic Airways]], using\
        \ the [[Bombardier CRJ700]] and the [[Embraer E175]], respectively.{{citation\
        \ needed|date=March 2025}}\n\n===Railways===\n[[File:Lehigh Valley Railroad\
        \ Station, Ithaca, New York-with sign.jpg|thumb|[[Ithaca station (Lehigh Valley\
        \ Railroad)|Lehigh Valley Railroad station]], built in 1898, has been refurbished\
        \ and is now a [[Chemung Canal Trust Company]] bank branch]]\n[[File:Cornell\
        \ - White Memorial Entrance and streetcar (cropped).jpg|thumb|A 1907 illustration\
        \ of a streetcar passing Eddy Gate, the main entrance to [[Cornell University]]\
        \ at the time]]\n[[File:NS 8921 GE C40-9W.jpg|thumb|A [[Norfolk Southern Railway]]\
        \ locomotive]]\nInto the mid-20th century, it was possible to reach Ithaca\
        \ by passenger rail. At least two trains per day serviced Ithaca along the\
        \ [[Delaware, Lackawanna and Western Railroad]] until 1942, or the [[Lehigh\
        \ Valley Railroad]]. The trip took about seven hours from [[New York City]],\
        \ about eight hours from [[Philadelphia]], and about three hours from [[Buffalo,\
        \ New York]].<ref name=\"Cornell-1920\">{{cite book |title=Guide to the Campus:\
        \ Cornell University |date=1920 |publisher=Cornell University |location=Ithaca,\
        \ New York |pages=[https://archive.org/details/cu31924055960987/page/n16 3]–4\
        \ |url=https://archive.org/details/cu31924055960987 |access-date=8 April 2019}}</ref>\
        \ There has been no passenger rail service since February 4, 1961.\n\nBeginning\
        \ in the 1870s, there were trains to Buffalo via [[Geneva, New York]], to\
        \ New York City via [[Wilkes-Barre, Pennsylvania]] on the [[Lehigh Valley\
        \ Railroad]], to [[Hoboken, New Jersey]] with a train change in [[Owego, New\
        \ York|Owego]] via [[Binghamton, New York|Binghampton]] and [[Scranton, Pennsylvania]]\
        \ on the [[Delaware, Lackawanna and Western Railroad]], and to the [[Northeastern\
        \ United States|U.S. Northeast]] via [[Cortland, New York]] on the Lehigh\
        \ Valley Railroad.<ref>Lee, Hardy Campbell (2008) (2nd ed.; first ed. 1977)\
        \ ''A History of Railroads in Tompkins County''. Revised and enlarged by Winton\
        \ Rossiter, maps by David Rossiter. Ithaca, NY: The History Center in Tompkins\
        \ County</ref><ref>[http://www.swampstomper.nl/history/railways.html \"Ithaca\
        \ had its own 19th century railway rush\"] {{Webarchive|url=https://web.archive.org/web/20150903232612/http://www.swampstomper.nl/history/railways.html\
        \ |date=September 3, 2015 }}, D G Rossiter, ''The Ithaca Journal'', Centennial\
        \ edition, Friday, 08-April-1988. Last Accessed on 24-August-2014</ref><ref>{{cite\
        \ journal |title=Lehigh Valley Railroad, Table 3|journal=Official Guide of\
        \ the Railways |publisher=National Railway Publication Company |volume=78\
        \ |issue=12 |date=May 1946}}</ref> The Lehigh Valley's top New York City-Ithaca-Buffalo\
        \ passenger train, the daylight ''[[Black Diamond (train)|Black Diamond]],''\
        \ was publicized as \"The Handsomest Train in the World,\" but it took a roundabout\
        \ route to New York City, traveling south to [[Waverly, Tioga County, New\
        \ York|Waverly, New York]], to Wilkes-Barre and [[Easton, Pennsylvania|Easton]],\
        \ and then across [[New Jersey]]. It was named after the railroad's largest\
        \ commodity, [[anthracite]] coal, and made its last run on May 11, 1959.\n\
        \nUntil March 1942, the Lackawanna Railroad operated two shuttle trains a\
        \ day between Ithaca and Owego, where passengers could transfer to westbound\
        \ trains to Buffalo and [[Chicago]] or eastbound to Binghamton, [[Scranton,\
        \ Pennsylvania]], and [[Hoboken, New Jersey]], across the [[Hudson River]]\
        \ from New York City.<ref>{{cite journal |title=Delaware, Lackawanna & Western\
        \ Railroad, Tables 1, 12|journal=Official Guide of the Railways |publisher=National\
        \ Railway Publication Company |volume=74 |issue=1 |date=June 1941}}</ref>\
        \ Until September 15, 1958, the Lackawanna maintained Syracuse-Binghamton\
        \ service through nearby [[Cortland, New York|Cortland]], to the east.<ref>{{cite\
        \ journal |title=Delaware, Lackawanna & Western Railroad, Table 3|journal=Official\
        \ Guide of the Railways |publisher=National Railway Publication Company |volume=91\
        \ |issue=3 |date=August 1958}}</ref> Until May 11, 1959, two Lehigh Valley\
        \ trains a day made both westbound and eastbound stops in Ithaca.<ref>Lehigh\
        \ Valley Passenger Timetable, January 19, 1958.</ref> The last passenger train\
        \ making stops in Ithaca was the Lehigh Valley's overnight ''[[Maple Leaf\
        \ (LV train)|Maple Leaf]]'', which discontinued in February 1961.<ref>'Direct\
        \ Link To N.Y. CN Link To Be Cut,' 'St. Catherines Standard,' February 2,\
        \ 1961</ref><ref>{{cite news|title=Last of the Railroad - Era Passes Tonight\
        \ as Lehigh Ends Service|work=Geneva Times|date=February 3, 1961|url=http://www.enter.net/~lvrr/7a8.htm|archive-url=https://web.archive.org/web/20081013081023/http://www.enter.net/~lvrr/7a8.htm|archive-date=October\
        \ 13, 2008}}</ref>\n\nWithin Ithaca, electric railways ran along Stewart Avenue\
        \ and Eddy Street.<ref name=\"Cornell-1920\" /> Ithaca was the fourth community\
        \ in New York state with a street railway; [[streetcar]]s ran from 1887 until\
        \ the summer of 1935.<ref>Kerr, Richard D. (1972) The Ithaca Street Railway,\
        \ Forty Fort, PA: Howard D. Cox</ref><ref>[http://www.swampstomper.nl/history/street.html\
        \ \"Street cars preceded local bus lines\"] {{Webarchive|url=https://web.archive.org/web/20150903232612/http://www.swampstomper.nl/history/street.html\
        \ |date=September 3, 2015 }}, D G Rossiter, The Ithaca Journal, Centennial\
        \ edition, Friday, 08-April-1988 . Last Accessed on 24-August-2014</ref>\n\
        \nIn December 2018, the Ithaca Central Railroad, a [[Watco]] subsidiary, took\
        \ over operation via lease of the {{Convert|48.8|mi|km|adj=on}} [[Norfolk\
        \ Southern]] Ithaca Secondary line from [[Sayre, Pennsylvania]] to the Cargill\
        \ Salt mine site on the eastern shore of Cayuga Lake, near Myers Point. Unit\
        \ coal trains carrying bituminous coal were delivered to the Ithaca Central\
        \ at Sayre by [[Norfolk Southern]] for less than eight months afterward, traveling\
        \ to the Ridge site of the Cayuga Operating Company: a coal-burning power\
        \ plant known as Milliken Station during NYSEG ownership. The power plant\
        \ closed on August 29, 2019. As of 2022, there are proposed plans to convert\
        \ its brownfield site into a major data center. The main rail freight traffic\
        \ is now salt from the Cargill salt mine farther north. Norfolk Southern's\
        \ tracks, headed north on the former Lehigh Valley Auburn and Ithaca Branch,\
        \ include a distinctive section in Ithaca that runs along the side of Fulton\
        \ St. (NY13 southbound), although not in the street itself.\n\n==Points of\
        \ interest==\n{{For |additional information about recreational trails|Trails\
        \ in Ithaca, New York}}\n{{Div col|colwidth=20em}}\n* [[Buttermilk Falls State\
        \ Park]]\n* [[Carl Sagan]]'s Grave\n* [[Cayuga Nature Center]]\n* [[Cornell\
        \ Botanic Gardens]]\n* [[Cornell University]]\n* [[Finger Lakes Trail]]\n\
        * [[Ithaca College]]\n* [[Ithaca Commons]]\n* [[Ithaca Dog Park]]\n* [[Ithaca\
        \ Falls]]\n* [[Museum of the Earth|Paleontological Research Institution's\
        \ Museum of the Earth]]\n* [[Robert H. Treman State Park]]\n* [[Sagan Planet\
        \ Walk]]\n* [[Sapsucker Woods Sanctuary]]\n* [[Sciencenter]]\n* [[Stewart\
        \ Park (Ithaca, New York)|Stewart Park]]\n* [[Taughannock Falls State Park]]\n\
        {{div col end}}\n\n<gallery class=\"center\">\nWaterfallIthacaNY.jpg|The falls\
        \ at [[Buttermilk Falls State Park]]\nF.R. Newman Arboretum, Cornell University.jpg|[[Cornell\
        \ Botanic Gardens]] at [[Cornell University]]\nHdr-Ithacafalls2.jpg|[[Ithaca\
        \ Falls]]\nIthacaDiner.jpg|Ithaca Diner\n</gallery>\n\n==Notable people==\n\
        {{Main|List of people from Ithaca, New York}}\n\n==Reputation==\nIn addition\
        \ to its liberal politics, Ithaca is commonly listed among the most culturally\
        \ liberal of American small cities. In 1997, ''[[Utne Reader]]'' named Ithaca\
        \ \"America's most enlightened town\".<ref>Jay Walljasper, Jon Spayde, [http://cafeutne.org/towns/ithaca.html\
        \ ''Ithaca, New York: A Gritty upstate City Where the Grassroots are Green'',\
        \ \"America's 10 Most Enlightened Towns (and we don't mean Santa Fe)\"] {{webarchive|url=https://web.archive.org/web/20050723080807/http://cafeutne.org/towns/ithaca.html\
        \ |date=July 23, 2005 }}, May/June, 1997 Issue, UTNE Reader</ref> As of 2007,\
        \ according to [[ePodunk]]'s Gay Index, Ithaca has a score of 231, versus\
        \ a national average score of 100.<ref>[http://www.epodunk.com/cgi-bin/genInfo.php?locIndex=922\
        \ \"Ithaca Community Profile\"] {{Webarchive|url=https://web.archive.org/web/20070220142108/http://epodunk.com/cgi-bin/genInfo.php?locIndex=922\
        \ |date=February 20, 2007 }} Gays & Lesbians local index</ref>  Like many\
        \ small college towns, Ithaca has also received accolades for having a high\
        \ overall quality of life.\n\nIn its earliest years, during the frontier days,\
        \ what is now Ithaca was briefly known by the names \"The Flats\" and \"Sodom,\"\
        <ref name=\"hoiatc\" /><ref>[http://www.usgennet.org/usa/ny/state/his/bk7/ch7.html]{{webarchive|url=https://web.archive.org/web/20071205073236/http://www.usgennet.org/usa/ny/state/his/bk7/ch7.html|date=December\
        \ 5, 2007}}</ref><ref>[http://www.usgennet.org/usa/ny/state/his/bk7/index.html]{{webarchive|url=https://web.archive.org/web/20090303130305/http://www.usgennet.org/usa/ny/state/his/bk7/index.html|date=March\
        \ 3, 2009}}</ref> the name of the [[Bible|Biblical]] [[Sodom and Gomorrah|city\
        \ of sin]], due to its reputation as a town of \"notorious immorality\",<ref>See,\
        \ e.g., 1811 article in local paper, at [https://freepages.history.rootsweb.com/~townofithaca/maps/1866atlas/_P9D9571small.jpg]\
        \ {{Webarchive|url=https://web.archive.org/web/20060525033920/http://freepages.history.rootsweb.com/~townofithaca/maps/1866atlas/_P9D9571small.jpg|date=May\
        \ 25, 2006}} or Town of Ithaca History project, available [http://www.town.ithaca.ny.us/\
        \ online] {{Webarchive|url=https://web.archive.org/web/20060424075412/http://www.town.ithaca.ny.us/|date=April\
        \ 24, 2006}} (click on \"History Project\", then \"Historical maps...\" and\
        \ finally \"famous for its notorious immorality\").</ref> a place of horse\
        \ racing, gambling, profanity, Sabbath-breaking and readily-available liquor.\
        \ [[Simeon De Witt]] renamed the town Ithaca for [[Homer's Ithaca|Odysseus's\
        \ home island]] in the early 19th century, though nearby [[Robert H. Treman\
        \ State Park]] still contains Lucifer Falls. Ithaca is primarily known for\
        \ its growing wineries and microbreweries, live music, colleges and small\
        \ dairy farms.{{citation needed|date = October 2023}}\n\n==See also==\n* [[Ezra\
        \ Cornell]]\n* [[List of Registered Historic Places in New York]]\n\n==References==\n\
        {{reflist}}\n\n==External links==\n* [https://www.cityofithaca.org/ Official\
        \ website]\n\n{{subject bar|New York (state)|United States|auto=1}}\n{{Ithaca,\
        \ New York|state=expanded}}\n{{Tompkins County, New York|state=collapsed}}\n\
        {{Navboxes|list=\n{{Tompkins County, New York}}\n{{Central New York colleges}}\n\
        {{New York}}\n{{New York county seats}}\n}}\n{{Authority control}}\n\n[[Category:Ithaca,\
        \ New York| ]]\n[[Category:1790 establishments in New York (state)]]\n[[Category:Academic\
        \ enclaves]]\n[[Category:Cities in New York (state)]]\n[[Category:Cities in\
        \ Tompkins County, New York]]\n[[Category:County seats in New York (state)]]\n\
        [[Category:Populated places established in 1790]]"
