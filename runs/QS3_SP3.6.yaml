        ## Result 1
        Title: Languages of Switzerland
        URL: https://en.wikipedia.org/wiki/Languages_of_Switzerland
        Extract: The four national languages of Switzerland are German, French, Italian, and Romansh. German, French, and Italian maintain equal status as official languages at the national level within the federal administration of the Swiss Confederation, while Romansh is used in dealings with people who speak it.  Latin is occasionally used in some formal contexts, particularly to denote the country (Confoederatio Helvetica).
        In 2020, 62.3% of the population of Switzerland were native speakers of German (either Swiss or Standard German) at home; 22.8% French (mostly Swiss French, but including some Franco-Provençal dialects); 8% Italian (mostly Swiss Italian, but including Lombard); and 0.5% Romansh.  The German region (Deutschschweiz) is roughly in the east, north, and centre; the French part (la Romandie) in the west; and the Italian area (Svizzera italiana) in the south. There remains a small Romansh-speaking native population in Grisons in the east. The cantons of Fribourg, Bern, and Valais are officially bilingual; Grisons is officially trilingual.
        English is widely spoken as a second language across Switzerland, and many Anglophone migrants live in Switzerland. It is often used as a lingua franca as Switzerland has four official languages. Because of this, English is often used in advertisements in Switzerland, and many businesses and companies in Switzerland, even if they only operate domestically, have names that use English words.

        ## Result 2
        Title: Official languages of the United Nations
        URL: https://en.wikipedia.org/wiki/Official_languages_of_the_United_Nations
        Extract: There are six official languages used in United Nations (UN) meetings and in which the UN writes and publishes all its official documents. In 1946, five languages were chosen as official languages of the UN: English, French, Russian, Spanish, and Chinese. In 1971, the United Nations' use of Traditional Chinese characters was replaced with Simplified Chinese characters. In 1973, Arabic was voted to be an additional official language. As of 2026, the official languages of the United Nations are:

        English (British English with Oxford spelling), in English Latin alphabet;
        French (Metropolitan French – français métropolitain / langues d'oïl) in French Latin alphabet;
        Spanish (Peninsular Spanish – español peninsular / castellano) in Spanish Latin alphabet;
        Russian (Moscow Russian – московское произношение, moskovskoye proiznosheniye) in the Russian Cyrillic alphabet;
        Chinese (Standard Mandarin – 中文, zhōngwén / 普通话, pǔtōnghuà) in Simplified Chinese characters;
        Arabic (Modern Standard Arabic – العربية, al-ʿarabiyyah / الفصحى, al-fuṣḥá) in Naskh / Arabic abjad.
        According to the UN Charter each of these six languages is equally authoritative although English and French have traditionally received preferential status and are the only two official and working languages of the UN Secretariat. It is an unspoken rule that the UN Secretary General and other high ranking United Nations officials must be fluent (at least C1 – Advanced fluency level according to the Common European Framework of Reference for Languages / CEFRL) in at least English and French. The UN has struggled to provide parity of all 6 languages as the English language has become the dominant world language in the digital age.
        Multiple UN Secretaries General, including Kofi Annan, Ban Ki Moon and Antonio Guterres, have worked to improve multilingualism within the UN. This work has culminated in additional funding for the UN Translation Service, the creation of the Coordinator for Multilingualism role, UN Language Days, and starting in 2018, the UN News website providing translations into non-official languages such as Portuguese, Swahili, Hindi, and Urdu in addition to the official languages. These and many of the non-official languages used by the United Nations often represent the Global South. Rule 57 allows the General Assembly or any subcommittee to utilize any language other than the languages of the Assembly. As of 2025, the United Nations and UNESCO have not formally ratified the Universal Declaration of Linguistic Rights.

        ## Result 3
        Title: Official language
        URL: https://en.wikipedia.org/wiki/Official_language
        Extract: An official language is defined by the Cambridge English Dictionary as, "the language or one of the languages that is accepted by a country's government, is taught in schools, used in the courts of law, etc." Depending on the decree, establishment of an official language might also place restrictions on the use of other languages in those capacities. Designated rights of an official language can be created in written form or by historic usage.
        An official language is recognized by 178 countries, of which 101 recognize more than one. The government of Italy made Italian their official language in 1999, and some nations (such as Mexico and Australia) have never declared de jure official languages at the national level. Other nations have declared non-indigenous official languages.
        Many of the world's constitutions mention one or more official or national languages. Some countries use the official language designation to empower indigenous groups by giving them access to the government in their native languages. In countries that do not formally designate an official language, a de facto national language usually evolves. English is the most common official or co-official language, with recognized status in 52 countries. Arabic, French, and Spanish are official or co-official languages in several countries.
        An official language that is also an indigenous language is called endoglossic, one that is not indigenous is exoglossic. An instance is Nigeria, which has three endoglossic official languages. By this, the country aims to protect the indigenous languages although at the same time recognising the English language as its lingua franca. In spatial terms, indigenous (endoglossic) languages are mostly employed in the function of official languages in Europe and Asia, while mainly non-indigenous (exoglossic) rest of the world.

