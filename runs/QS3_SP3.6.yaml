        {{notelist}}\n{{reflist|group=note|refs=\n<ref name=GEcitizen>Until 1913,\
        \ German citizenship was acquired through citizenship in a constituent state\
        \ (whose requirements varied); from 1913, uniform citizenship requirements\
        \ were [[Constitution of the German Empire#Citizenship|set at the national\
        \ level]]. Nevertheless, state citizenship remained in force until the Nazis\
        \ came to power in 1933.</ref>\n<ref name=MaturaScore>Einstein's scores on\
        \ his ''[[Matura]]'' certificate: German 5; French 3; Italian 5; History 6;\
        \ Geography 4; Algebra 6; Geometry 6; Descriptive Geometry 6; Physics 6; Chemistry\
        \ 5; Natural History 5; Art Drawing 4; Technical Drawing 4.{{br}}[[Grading\
        \ systems by country#Switzerland|Scale]]: 6 = very good, 5 = good, 4 = sufficient,\
        \ 3 = insufficient, 2 = poor, 1 = very poor.</ref>\n<ref name=\"gnriE\">\"\
        Their leaders in Germany have not driven out her cut-throats and her blackguards.\
        \ She has chosen the cream of her culture and has suppressed it. She has even\
        \ turned upon her most glorious citizen, Albert Einstein, who is the supreme\
        \ example of the selfless intellectual...The man, who, beyond all others,\
        \ approximates a citizen of the world, is without a home. How proud we must\
        \ be to offer him temporary shelter.\"</ref>\n<ref name=\"aBfxO\">In [[s:Translation:On\
        \ the Electrodynamics of Moving Bodies|his paper]], Einstein wrote: \"The\
        \ introduction of a 'luminiferous æther' will be proved to be superfluous\
        \ in so far, as according to the conceptions which will be developed, we shall\
        \ introduce neither a 'space absolutely at rest' endowed with special properties,\
        \ nor shall we associate a velocity-vector with a point in which electro-magnetic\
        \ processes take place.\"</ref>\n<ref name=\"sBl2q\">For a discussion of the\
        \ reception of relativity theory around the world, and the different controversies\
        \ it encountered, see the articles in {{harvp|Glick|1987}}.</ref>\n}}\n\n\
