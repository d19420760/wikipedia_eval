      content: "## Result 1\nTitle: Adaptive immune system\nURL: https://en.wikipedia.org/wiki/Adaptive_immune_system\n\
        Extract: The adaptive immune system (AIS), also known as the acquired immune\
        \ system or specific immune system, is a subsystem of the immune system that\
        \ is composed of specialized cells, organs, and processes that eliminate pathogens\
        \ specifically. The acquired immune system is one of the two main immunity\
        \ strategies found in vertebrates (the other being the innate immune system).\n\
        Like the innate system, the adaptive immune system includes both humoral immunity\
        \ components and cell-mediated immunity components and destroys invading pathogens.\
        \ Unlike the innate immune system, which is pre-programmed to react to common\
        \ broad categories of pathogen, the adaptive immune system is highly specific\
        \ to each particular pathogen the body has encountered.\nAdaptive immunity\
        \ creates immunological memory after an initial response to a specific pathogen,\
        \ and leads to an enhanced response to future encounters with that pathogen.\
        \ Antibodies are a critical part of the adaptive immune system. Adaptive immunity\
        \ can provide long-lasting protection, sometimes for the person's entire lifetime.\
        \ For example, someone who recovers from measles is now protected against\
        \ measles for their lifetime; in other cases it does not provide lifetime\
        \ protection, as with chickenpox. This process of adaptive immunity is the\
        \ basis of vaccination.\nThe cells that carry out the adaptive immune response\
        \ are white blood cells known as lymphocytes. B cells and T cells, two different\
        \ types of lymphocytes, carry out the main activities: antibody responses,\
        \ and cell-mediated immune response. In antibody responses, B cells are activated\
        \ to secrete antibodies, which are proteins also known as immunoglobulins.\
        \ Antibodies travel through the bloodstream and bind to the foreign antigen\
        \ causing it to inactivate, which does not allow the antigen to bind to the\
        \ host. Antigens are any substances that elicit the adaptive immune response.\
        \ Sometimes the adaptive system is unable to distinguish harmful from harmless\
        \ foreign molecules; the effects of this may be hayfever, asthma, or any other\
        \ allergy.\nIn adaptive immunity, pathogen-specific receptors are \"acquired\"\
        \ during the lifetime of the organism (whereas in innate immunity pathogen-specific\
        \ receptors are already encoded in the genome). This acquired response is\
        \ called \"adaptive\" because it prepares the body's immune system for future\
        \ challenges (though it can actually also be maladaptive when it results in\
        \ allergies or autoimmunity).\nThe system is highly adaptable because of two\
        \ factors. First, somatic hypermutation is a process of accelerated random\
        \ genetic mutations in the antibody-coding genes, which allows antibodies\
        \ with novel specificity to be created. Second, V(D)J recombination randomly\
        \ selects one variable (V), one diversity (D),\nand one joining (J) region\
        \ for genetic recombination and discards the rest, which produces a highly\
        \ unique combination of antigen-receptor gene segments in each lymphocyte.\
        \ This mechanism allows a small number of genetic segments to generate a vast\
        \ number of different antigen receptors, which are then uniquely expressed\
        \ on each individual lymphocyte. Since the gene rearrangement leads to an\
        \ irreversible change in the DNA of each cell, all progeny (offspring) of\
        \ that cell inherit genes that encode the same receptor specificity, including\
        \ the memory B cells and memory T cells that are the keys to long-lived specific\
        \ immunity.\n\n## Result 2\nTitle: Vaccine\nURL: https://en.wikipedia.org/wiki/Vaccine\n\
        Extract: A vaccine is a biological preparation that provides active acquired\
        \ immunity to a particular infectious or malignant disease. The safety and\
        \ effectiveness of vaccines has been widely studied and verified. A vaccine\
        \ typically contains an agent that resembles a disease-causing microorganism\
        \ and is often made from weakened or killed forms of the microbe, its toxins,\
        \ or one of its surface proteins. The agent stimulates the immune system to\
        \ recognize the agent as a threat, destroy it, and recognize further and destroy\
        \ any of the microorganisms associated with that agent that it may encounter\
        \ in the future.\nVaccines can be prophylactic (to prevent or alleviate the\
        \ effects of a future infection by a natural or \"wild\" pathogen), or therapeutic\
        \ (to fight a disease that has already occurred, such as cancer). Some vaccines\
        \ offer full sterilizing immunity, in which infection is prevented.\nThe administration\
        \ of vaccines is called vaccination. Vaccination is the most effective method\
        \ of preventing infectious diseases; widespread immunity due to vaccination\
        \ is largely responsible for the worldwide eradication of smallpox and the\
        \ restriction of diseases such as polio, measles, and tetanus from much of\
        \ the world. The World Health Organization (WHO) reports that licensed vaccines\
        \ are available for twenty-five different preventable infections.\nThe first\
        \ recorded use of inoculation to prevent smallpox (see variolation) occurred\
        \ in the 16th century in China, with the earliest hints of the practice in\
        \ China coming during the 10th century. It was also the first disease for\
        \ which a vaccine was produced. The folk practice of inoculation against smallpox\
        \ was brought from Turkey to Britain in 1721 by Lady Mary Wortley Montagu.\n\
        The terms vaccine and vaccination are derived from Variolae vaccinae (smallpox\
        \ of the cow), the term devised by Edward Jenner (who both developed the concept\
