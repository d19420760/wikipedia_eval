        \ by Rio de Janeiro. Brazil has the most Portuguese speakers in the world\
        \ and is the only country in the Americas where Portuguese is an official\
        \ language.\nBounded by the Atlantic Ocean on the east, Brazil has a coastline\
        \ of 7,491 kilometers (4,655 mi), among the longest in the world. Covering\
        \ roughly half of South America's land area, it borders all other countries\
        \ and territories on the continent except Ecuador and Chile. Brazil encompasses\
        \ a wide range of tropical and subtropical landscapes, as well as wetlands,\
        \ savannas, plateaus, and low mountains. It contains most of the Amazon basin,\
        \ including the world's largest river system and most extensive virgin tropical\
        \ forest. Brazil has diverse wildlife, a variety of ecological systems, and\
        \ extensive natural resources spanning numerous protected habitats. It ranks\
        \ first among 17 megadiverse countries, with its natural heritage being the\
        \ subject of significant global interest, as environmental degradation (through\
        \ processes such as deforestation) directly affect global issues such as climate\
        \ change and biodiversity loss.\nBrazil was inhabited by various indigenous\
        \ peoples prior to the landing of Portuguese explorer Pedro Álvares Cabral\
        \ in 1500. The territory was subsequently claimed and settled by Portugal,\
        \ which founded the country's first city, São Vicente, in 1532 and imported\
        \ enslaved Africans to work on plantations. Brazil remained a colony until\
        \ 1815, when it was elevated to a united kingdom with Portugal after the transfer\
        \ of the Portuguese court to Rio de Janeiro. Prince Pedro of Braganza declared\
        \ Brazilian independence in 1822 and, after waging a war against Portugal,\
        \ established the Empire of Brazil. The country's first constitution in 1824\
        \ established a bicameral legislature and enshrined principles such as freedom\
        \ of religion and the press; slavery was gradually abolished until its final\
        \ abolition in 1888. Brazil became a presidential republic following a military\
        \ coup d'état in 1889. An armed revolution in 1930 ended the First Republic\
        \ and brought Getúlio Vargas to power. Vargas' self-coup in 1937 ushered the\
        \ authoritarian Estado Novo, in which he oversaw Brazil's involvement in World\
        \ War II. Democracy was restored after Vargas' ousting in 1945. An authoritarian\
        \ military dictatorship emerged in 1964 with support from the United States\
