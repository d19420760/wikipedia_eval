        \ In addition to the head-to-head tours, there were the annual professional\
        \ tournaments called \"Championship tournaments\" (known retrospectively as\
        \ \"professional majors\" or \"professional Grand Slams\" where the world's\
        \ top professional players usually played. These tournaments held a certain\
        \ tradition and longevity.\nThe oldest of these three professional majors,\
        \ was the U.S. Pro Tennis Championships, played at a variety of different\
        \ venues and on a variety of different surfaces, between 1925 and 1999, although\
        \ it was no longer a major after 1967. Between 1954 and 1962, the U.S. Pro\
        \ was played indoors in Cleveland and was billed as the World Professional\
