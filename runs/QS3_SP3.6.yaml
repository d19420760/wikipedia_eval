      content: "## Result 1\nTitle: List of Olympic Games host cities\nURL: https://en.wikipedia.org/wiki/List_of_Olympic_Games_host_cities\n\
        Extract: The modern Olympics began in 1896. Since then, summer and winter\
        \ games have usually celebrated a four-year period known as an Olympiad. From\
        \ the inaugural Winter Games in 1924 until 1992, winter and summer Games were\
        \ held in the same year. Since 1994, summer and winter Games have been held\
        \ in staggered even years. The last Olympic games were held in both Milan\
        \ and Cortina, the first to ever be hosted by two cities, in February 2026.\
        \ Through 2026, there have been 30  Summer Olympic Games, held in 23 cities,\
        \ and 25 Winter Olympic Games, held in 22 cities. In addition, three summer\
