        \ per records, 140 per Columbus son, 146-147 likely per scholar, 150 per Columbus,\
        \ 152 possible per scholar-->\n| survivors         = \n| fatalities      \
        \  = 33–34 men {{small|/ excl Amerindian deaths}}<!--for 'fallecido' only,\
        \ 33 for crew = 146 or 147, 34 for crew >= 147-->\n| achievements      = {{unbulleted\
        \ list|First non-Amerindian discovery of<!--and formal possession and (failed)\
        \ settlement of--> mainland [[Middle America (Americas)|Middle America]]<!--not\
        \ NA bc Cabot-->|First crossing of [[Caribbean Sea]]|First non-Amerindian\
        \ survey of eastern [[Gulf of Honduras|Bay of Honduras]]|First survey of Caribbean\
        \ waters off lower Central America|First non-Amerindian contact with [[Maya\
        \ civilization|Maya civilisation]] / ''possibly''}}\n| route_image       =\
        \ File:Columbus fourth voyage.jpg\n| route_image_size  = \n| route_image_upright\
        \ = \n| route_image_caption = Caribbean route  {{small|/ 2011 map by K Pickering\
        \ / via Commons}}\n}}\n<!-- sidebars -->\nThe '''fourth voyage of Columbus'''\
        \ was a Spanish maritime expedition in 1502–1504 to the western [[Caribbean\
        \ Sea]] led by [[Christopher Columbus]]. The voyage, [[Voyages of Christopher\
        \ Columbus|Columbus's last]], failed to find a western maritime route to the\
        \ [[Far East]], returned relatively little profit, and resulted in the loss\
        \ of many crew men, all the fleet's ships, and a year-long marooning in [[Jamaica]].\
        \ It is deemed the first non-[[Indigenous peoples of the Americas|Amerindian]]<!--bc\
        \ Mayas, Aztecs etc--> discovery of mainland [[Middle America (Americas)|Middle\
        \ America]], and one of<!--bc Cabot--> the first non-Amerindian, non-[[Norse\
        \ colonization of North America|Norse]] discoveries of continental [[North\
        \ America]].<!--and deemed 'official' discovery of Hond, Nic, CR, Panama?-->{{refn|group=n|Dubbed\
        \ ''El Alto Viaje'' by Columbus {{harv|Bedini|2000|p=720}}. In [[infobox]],\
        \ start per {{harvnb|Davidson|1997|p=451}}; end per {{harvnb|Polo Martín|2015|p=146}},\
        \ {{harvnb|Bedini|2000|p=727}}; goal per {{harvnb|Polo Martín|2015|p=144<!--cath\
        \ et cipang-->}}, {{harvnb|Davidson|1997|p=450<!--india-->}}; ships per {{harvnb|Bedini|2000|p=721}};\
        \ crew per {{harvnb|León Guerrero|2005|pp=22<!--138-->, 31-32<!--152-->}},\
        \ {{harvnb|Gil|2003|p=614<!--150-->}}, {{harvnb|Bedini|2000|p=721<!--140-->}};\
        \ fatalities per {{harvnb|León Guerrero|2005|pp=24-32}}; achievements per\
        \ {{harvnb|Reichert|2017|p=13<!--hond bay, maya contact-->}}, {{harvnb|Hofman|Keehnen|2019|p=239<!--maya\
        \ contact-->}}, {{harvnb|Fernández-Armesto|1991|pp=164<!--caribbean, hond\
        \ bay-->, 164<!--carib, n amer-->}}. Note, Bay of Honduras bound by a line\
        \ running from Cape Catoche to Cape Gracias a Dios per {{harvnb|Reichert|2017|p=11}}.}}\n\
        \n== Prelude ==\nUpon being released from prison on 17 December 1500, Columbus\
        \ set about planning what he deemed would be 'his most significant, most profitable\
        \ expedition yet.'{{sfnm|1a1=Polo Martín|1y=2015|1p=144<!--release-->|2a1=Bedini|2y=2000|2p=720<!--quote-->}}\
        \ The [[Portuguese discovery of the sea route to India|1497 discovery]] of\
        \ an eastern maritime passage to 'the opulent East,' by [[Vasco da Gama|Vasco\
        \ de Gama]], had steeled Columbus's determination to find a shorter, more\
        \ direct western route.{{sfn|Bedini|2000|p=720}} Consequently, on 26 February\
        \ 1502, Columbus requested licence to sail on a fourth voyage.{{sfn|Bedini|2000|p=720}}\
        \ Passage to the East, he reasoned, might lay farther west than anyone had\
        \ prior sailed.{{sfn|Bedini|2000|p=720}} The project being deemed viable and\
        \ desirable, the [[Catholic Monarchs of Spain|Catholic Monarchs]] granted\
        \ authorisation on 14 March.{{sfn|Bedini|2000|pp=720-721}} The royal licence\
        \ approved disbursement of ten thousand gold pesos for fitting out a fleet,\
        \ appointed Francisco de Porras as comptroller of spoils<!--gold etc-->, and\
        \ Diego de Porras as auditor and Crown representative, and forbid the taking\
        \ of slaves, among other terms and conditions.{{sfn|Bedini|2000|p=721}} Columbus\
        \ enlisted Diego Tristán to captain the flagship, ''La Capitana'', Francisco\
        \ de Porras for ''Santiago de Palos'', Pedro de Terreros for ''El Gallego'',\
        \ and Bartolomeo Fieschi for ''Vizcaíno''.{{sfn|Bedini|2000|p=721}} One hundred\
        \ and forty men and boys were reportedly<!--per Columbus son--> recruited\
        \ to man the fleet.{{sfn|Bedini|2000|p=721}} By 28 April, when all preparations\
        \ had been finalised, Columbus had spent<!--per his report--> 2,259,239 [[Maravedí|maravedis]]\
        \ on wages, rent, equipment, and provisions.{{sfn|Gil|2003|p=613}}\n\n== Voyage\
        \ ==\n=== Departure ===\nThe Columbian fleet set sail on 9 May 1502.{{sfn|Bedini|2000|p=721}}\
        \ After a brief detour to [[Asilah|Arzila, Morocco]], which [[Ferdinand II\
        \ of Aragon|Ferdinand II]] had requested, the fleet reached [[El Hierro|Hierro,\
        \ Canary Islands]], where they reprovisioned.{{sfn|Bedini|2000|p=721}} The\
        \ fleet reached [[Martinique]] in 21 days, the fastest Atlantic crossing of\
        \ Columbus's career.{{sfn|Bedini|2000|p=721}}\n\n=== Antilles ===\nCrew well-rested\
        \ and ships repaired, the fleet departed the [[Lesser Antilles]] due west.{{sfn|Bedini|2000|p=721}}\
        \ Though his commission forbade landing at [[Hispaniola]] at this stage of\
        \ the voyage, Columbus anchored just off the [[Ozama River]] by the end of\
        \ June, as he wished to request permission to enter the port of [[Santo Domingo]]\
        \ so as to shelter therein from a hurricane he feared was brewing.{{sfn|Bedini|2000|p=721}}\
        \ The petition was denied, but the Admiral was shortly proven right by the\
        \ landing of a 'massive hurricane', which the fleet weathered reasonably well,\
        \ possibly off the [[Haina River|Jaina River]].{{sfn|Bedini|2000|p=721}} After\
        \ repairing the ships, the fleet set off downwind from Hispaniola on 15 July.{{sfn|Bedini|2000|pp=721,\
        \ 724}} After a brief stay at [[Isla de la Juventud|Isle of Pines, Cuba]],\
        \ the ships picked up stiff north-easterlies and set of due southwest.{{sfn|Bedini|2000|p=724}}\n\
        \n=== Veragua ===\n[[File:Maya mural of coastal town, Temple of the Warriors,\
        \ Chichen Itza.jpg|thumb|''Sea coast village'' {{small|/ 1931 lithograph<!--of\
        \ Temple of Warrier, Chichen Itza fresco--> by A Morris / via HathiTrust}}]]\n\
        On 30 July, a crewmate sighted [[Guanaja|Bonacca]].{{sfn|Bedini|2000|p=724}}\
        \ Notably, upon anchoring off the island, a richly-laden merchant's canoe\
        \ approached<!--rather 'passed by'?--> the fleet.{{sfn|Bedini|2000|p=724}}\
        \ Noting their goods were 'all of a quality superior to what they had seen\
        \ before,' the Spaniards forced a trade, buying ceramics, dyed cotton textiles,\
        \ flint-edged swords, and copper hatchets with 'the usual baubles.'{{sfn|Bedini|2000|p=724}}\
        \ As the vessel is thought to have hailed from some nearby port in the [[Maya\
        \ Lowlands]], the event is deemed by some scholars the first instance of contact\
        \ between Maya and non-Amerindian peoples.{{sfnm|1a1=Hofman|1a2=Keehnen|1y=2019|1p=239|2a1=Reichert|2y=2017|2p=13|3a1=Bedini|3y=2000|3p=361}}{{refn|group=n|The\
        \ nearest {{em|major}} maritime port was [[Nito (Maya site)|Nito]], in [[Manche\
        \ Chʼol|Manche Chol]] or [[Toquegua]] polities, while the nearest maritime\
        \ post {{lang|la|simpliciter}} was Masca<!--just east of Nito-->, in Toquegua<!--CITE\
        \ no such in Ulua per Ikahei 167, Chivana or Masca per Sheptak 62, 69-->.\
        \ Alternatively, the merchants 'may have been part of a high culture akin\
        \ to the Mayan [Maya]' {{harv|Bedini|2000|p=724}}<!--'native peoples of Hond'\
        \ in Sheptak 68, 'indigenous Honduran actors' in Sheptak 74-->. Candidates\
        \ for such group include (i) the fairly Mayanised but as-yet-unidentified\
        \ people of the Lower Ulua Valley<!--inc Naco Valley, et Cuyumapa drainage-->,\
        \ (ii) the not-so-fairly Mayanised [[Pech people|Paya people]]<!--ancestors\
        \ of modern Pech people--> of the Bay Islands and abutting mainland<!--Colon--><!--,\
        \ but do not include the Isthmo-Colombian people east of midline in modern\
        \ Gracias a Dios dept of Hond ie not the Costa de Orejas peoples--> ({{harvnb|Healy|Savage|2021|pp=2-3<!--paya-->}},\
        \ {{harvnb|Ikäheimo|Salmi|Äikäs|2015|pp=160, 167-168<!--ulua-->}}, {{harvnb|Sheptak|2013|pp=39,\
        \ 54-57, 62<!--ulua, toquegua-->}}).}}\n\nAfter impressing the canoe's elderly\
        \ skipper, the fleet anchored in the lee of Cape Honduras, 'where they made\
        \ the<!--their?--> first landing on the mainland of North America.'{{sfn|Bedini|2000|p=724}}\
        \ They next anchored off the [[Aguán River|Romano (Aguán) River]], due east,\
        \ where 'Columbus took formal possession' of the newly discovered lands on\
        \ 17 August.{{sfn|Bedini|2000|p=724}} The weather, which beset them with strong\
        \ headwinds and fierce rain, prolonged the fleet's journey southeastwards\
        \ to [[Cabo Gracias a Dios|Cape Gracias a Dios]], so christened because when\
        \ they rounded it on 14 September, the weather improved noticeably.{{sfn|Bedini|2000|p=724}}\n\
        \nOn 16 September, two days after having turned south at Cape Gracias a Dios,\
        \ the fleet anchored just off a large estuary, 'probably [that of] the Rio\
        \ Grande,' with surf so strong it swamped one of the boats, leading to the\
        \ death<!--first such?--> by drowning of two crewmates.{{sfn|Bedini|2000|p=724}}\n\
        \nOn 25 September, the fleet moored off [[Limón|Puerto Limón]]<!--in costa\
        \ rica-->, where they attempted to trade with the Talamancan locals, two of\
        \ whom were impressed to help with Castilian–Amerindian translation.{{sfn|Bedini|2000|p=724}}\n\
        \nOn 5 October, the fleet entered [[Almirante, Bocas del Toro|Almirante Bay]],\
        \ where Columbus 'found the first sign of fine gold, which an [Amerindian\
        \ man] wore like a large medal on his breast.'{{sfn|Bedini|2000|p=724}} They\
        \ then anchored in the [[Chiriquí Lagoon|Chiriqui Lagoon]], which the Talamancan\
        \ interpreters informed was a nine-day's march from {{em|Ciguare}}, a rich\
        \ land which lay on another ocean.{{sfn|Bedini|2000|p=724}} Columbus took\
        \ Ciguare to mean [[Cochinchina|Ciamba]]<!--Cochin-China-->, but nonetheless\
        \ seems to have given up his search for a maritime passage to the East, having\
        \ had no luck so far, and instead focussed on trading for gold, fine specimens\
        \ of which the new-found peoples had.{{sfn|Bedini|2000|p=724}} \n\nThe ships\
        \ put out on 17 October, due southeast where they sighted Veragua<!--native\
        \ settlement-->, a local village which Amerindian guides noted for its gold\
        \ production.{{sfn|Bedini|2000|p=724}} A storm then blew the ships east to\
        \ [[Portobelo, Colón|Porto Bello]]<!--just past panam canal entrance-->, and\
        \ farther east to [[Nombre de Dios, Colón|Nombre de Dios]]<!--modern place-->,\
        \ where the crew dropped anchors to repair the fleet.{{sfn|Bedini|2000|pp=724-725}}\
        \ To their misfortune, the weather only worsened, tempestuous winds and currents\
        \ battering the ships back and forth between Porto Bello and the [[Chagres\
        \ River]].{{sfn|Bedini|2000|p=725}} Conditions finally improved on 3 January\
        \ 1503, allowing the fleet to leave for the [[Belén River]] mouth, where they\
        \ anchored some days later.{{sfn|Bedini|2000|p=725}} \n\nAt this point, Columbus\
        \ lead exploratory parties up the river, while his brother, [[Bartholomew\
        \ Columbus|Bartholomew]], led parties up the <!--nearby?-->Veragua River.{{sfn|Bedini|2000|p=725}}\
        \ In February, 'the Spanish put up ten or twelve houses on the west bank of\
        \ the river [Belén],' thereby founding {{em|Santa María de Belén}}.{{sfn|Bedini|2000|p=725}}\
        \ This soon proved an unwelcome development among the locals, however, with\
        \ whom relations quickly soured to the point of military engagement<!--when?\
        \ voyage's first?-->.{{sfn|Bedini|2000|p=725}} Seeking to stave off an attack,\
        \ Columbus authorised the abduction of the local cacique ''[[El Quibían|Quibián]]'',\
        \ and his family and principal subordinates.{{sfn|Bedini|2000|p=725}} The\
        \ pre-emptive strike, led by Bartholomew and eighty men, proved both successful\
        \ and profitable, netting them 'a good deal of gold.'{{sfn|Bedini|2000|p=725}}\
        \ The cacique soon managed to escape however, and responded with a force of\
        \ four hundred warriors.{{sfn|Bedini|2000|p=725}} Though the crew managed\
        \ to repel the attack, they suffered twelve fatal<!--one crewmate w B-Columbus\
        \ by Gallega ship + Diego Tristán and all but one of his men--> and several\
        \ non-fatal<!--inc B-Columbus--> casualties.{{sfn|Bedini|2000|pp=725<!--acct-->-726<!--fatalities\
        \ tally-->}} Growing convinced of Santa María de Belén's untenable situation,\
        \ Columbus deemed it prudent to abandon the colonial project.{{sfn|Bedini|2000|p=726}}\
        \ Consequently, on 16 April, all ships but ''El Gallego'' set sail due east,\
        \ with Diego Méndez succeeding the recently deceased Diego Tristán as captain\
        \ of the flagship.{{sfn|Bedini|2000|p=726}} After scuttling the newly-unseaworthy\
        \ ''Vizcaíno'' at Porto Bello, the now-halved fleet reached a headland, probably\
        \ [[Point Mosquitos|Punta de Mosquito]], and set off northwards on 1 May.{{sfn|Bedini|2000|p=726}}\n\
        \n=== Antilles ===\n[[File:Eclipse Christophe Colomb.jpg|thumb|''L'éclipse\
        \ de lune de Christophe Colomb'' {{small|/ 1879 sketch by C Flammarion / via\
        \ Commons}}]]\nThe fleet, reduced now to ''La Capitana'' and ''Santiago de\
        \ Palos'', both already in a sorry state, anchored at the [[Jardines de la\
        \ Reina|Jardín de la Reina, Cuba]], on 12 May.{{sfn|Bedini|2000|p=726}} That\
        \ week proved especially disastrous for the leaky ships, and taxing for the\
        \ crew.{{sfn|Bedini|2000|p=726}} With 'ships pierced by borers worse than\
        \ a honeycomb, the people spiritless and desperate,' they carried on to Jamaica,\
        \ reaching [[Saint Ann's Bay|St Ann's Bay]] on 25 June.{{sfn|Bedini|2000|p=726}}\
        \ Columbus deeming the fleet unseaworthy, he had both ships run ashore and\
        \ the 116 crew mates<!--no impressed natives?--> marooned for what would prove\
        \ to be a year-long odyssey.{{sfn|Bedini|2000|p=726}}{{refn|group=n|Of the\
        \ original 140 men, 'six had died or deserted before Veragua, twelve had been\
        \ killed at Belen, and six had since died' {{harv|Bedini|2000|p=726}}.}}\n\
        \nColumbus set about securing a vessel to send for rescue. That July, he enlisted\
        \ his captains Méndez and Fieschi, twelve crew mates, and twenty [[Taíno|Taino]]\
        \ rowers to attempt the daring crossing of the [[Jamaica Channel]] aboard\
        \ dugout canoes in two parties.{{sfn|Bedini|2000|p=726}} In three days' time,\
        \ both canoes reached [[Navassa Island]], where several rowers<!--native-->\
        \ died or fell very ill of dehydration.{{sfn|Bedini|2000|p=726}} Despite these\
        \ odds, the survivors made the rest of the crossing in one day's time.{{sfn|Bedini|2000|p=726}}\
        \ The captains were detained by [[Nicolás de Ovando|the governor]] at Jaraguá<!--cacicazgo\
        \ of, or settlement in?-->, and did not reach Santo Domingo until March 1504.{{sfn|Bedini|2000|p=726}}\
        \ There, the governor denied them use of a small caravel to rescue their mates,\
        \ further prolonging their marooning.{{sfn|Bedini|2000|pp=726-727}}\n\nMeanwhile,\
        \ back in Jamaica, the stranded crew's discontent festered until 2 January\
        \ 1504, when Francisco and Diego de Porras led a mutiny of 48 men.{{sfn|Bedini|2000|p=727}}\
        \ The rebels fled ashore towards the eastern end of the island, to the great\
        \ misfortune of Amerindian settlements they passed.{{sfn|Bedini|2000|p=727}}\
        \ Over the next month, they would attempt the Channel crossing twice, but\
        \ fail both times, and so return to St Ann's Bay by the end of March, where,\
        \ after a skirmish, the Porras brothers would be imprisoned, and their mutineers\
        \ pardoned.{{sfn|Bedini|2000|p=727}} Coincidentally, Amerindian attitudes\
        \ towards the St Ann's party grew strained, leading to markedly fewer provisions.{{sfn|Bedini|2000|p=727}}\
        \ This trend the Admiral rather ingeniously reverted during the [[March 1504\
        \ lunar eclipse|lunar eclipse of 29 February]], which he convinced the caciques\
        \ was a sign of divine disapproval of their recent reticence.{{sfn|Bedini|2000|p=727}}\n\
        \nFinally, on 29 June, a rescue caravel from Santo Domingo arrived at St Ann's\
        \ Bay.{{sfn|Bedini|2000|p=727}} The rescued crew reached that port on 13 August.{{sfn|Bedini|2000|p=727}}\n\
        \n=== Return ===\nOn 12 September, Columbus, his son, his brother, and 22\
        \ crew mates departed Santo Domingo as passengers of two caravels, reaching\
        \ [[Sanlúcar de Barrameda]] on 7 November 1504.{{sfn|Bedini|2000|p=727}} In\
        \ Seville, Columbus reported to the authorities that the gold that was coming\
        \ for the Crown in his caravel had been adulterated and claimed a part for\
        \ himself for having made the accusation.\n<ref>{{Cite book| publisher = Universidad\
        \ de Sevilla, Consejo Superior de Investigaciones Científicas and Fundación\
        \ El Monte| isbn = 978-84-00-08206-2| pages = [https://archive.org/details/lacasadelacontra0000unse/page/221\
        \ 221]–236| editor = Antonio Acosta Rodríguez, Adolfo Luis González Rodríguez,\
        \ Enriqueta Vila Vilar| last = Varela Bueno| first = Consuelo| title = La\
        \ Casa de la Contratación y la navegación entre España y las Indias| url =\
        \ | chapter = Colón y la Casa de la Contratación| location = Sevilla| date\
        \ = 2003}}</ref>\n\n== Aftermath ==\nColumbus's hopes to the contrary, this\
        \ expedition proved to be 'the least profitable and most dangerous of all\
        \ his voyages,' the explorer having found no passage to the East, returned\
        \ miserly profits to Castile, lost many men and all four ships, and suffered\
        \ a year's stranding in Jamaica.{{sfn|Bedini|2000|p=720}} The post-voyage\
        \ debriefing of the Catholic Monarchs was precluded by the death of [[Isabella\
        \ I of Castile|Isabella I]] on 26 November 1504.{{sfnm|1a1=Polo Martín|1y=2015|1p=146|2a1=Bedini|2y=2000|2p=727}}\
        \ Instead, Columbus presented the voyage's negative results only to Ferdinand\
        \ II that December in [[Segovia]], with the latter proving less than thrilled,\
        \ as Columbus reportedly 'received nothing' from the King.{{sfnm|1a1=Polo\
        \ Martín|1y=2015|1p=146|2a1=Bedini|2y=2000|2p=727<!--quote-->|3a1=Fernández-Armesto|3y=1991|3p=xix<!--date-->}}\n\
        \n== Legacy ==\n[[File:Panama; a personal record of forty-six years, 1861-1907\
        \ (1907) (14574172927).jpg|thumb|Bronze of Columbus and Amerindian girl in\
        \ Colón, Panama {{small|/ in 1907 T Robinson memoir / via IA}}]]\n=== In scholarship\
        \ ===\nFirst-hand accounts of the voyage by Columbus, his son [[Ferdinand\
        \ Columbus|Ferdinand]], the Porras brothers, Pedro de Ledesma, and Diego Méndez\
        \ remain extant.{{sfnm|1a1=Polo Martín|1y=2015|1p=144<!--all but mendez-->|2a1=Davidson|2y=1997|2pp=448-450<!--mendez\
        \ etc-->}} Sixteenth century second-hand accounts include one by [[Bartolomé\
        \ de las Casas]]<!--on pers comm w Ledesma-->, and another by [[Gonzalo Fernández\
        \ de Oviedo y Valdés|Gonzalo Fernández de Oviedo]].{{sfnm|1a1=Polo Martín|1y=2015|1p=144<!--casas-->|2a1=Davidson|2y=1997|2p=450<!--oviedo-->}}\
        \ The itineraries described in these sources, however, do not perfectly concur,\
        \ resulting in discrepancies within the literature.{{sfn|Polo Martín|2015|p=144}}{{refn|group=n|{{harvnb|Davidson|1997|pp=xiv,\
        \ xxv}} deems the Ferdinand and Casas works as both the most influential accounts\
        \ of Columbus generally, and so inaccurate or distorted as to make ascertaining\
        \ fact from myth 'the most difficult task for the Columbus' scholar reading\
        \ them. Similarly, {{harvnb|Polo Martín|2015|p=152}} deems the Ferdinand work\
        \ the most detailed account of Columbus's fourth voyage, but also questions\
        \ its fidelity to first-hand experience. The Porras source has been noted\
        \ for its inclusion of distances, and the Ledesma one for its geographic coherence\
        \ {{harvnb|Polo Martín|2015|pp=147<!--Porras-->, 151<!--Led-->}}. {{harvnb|Davidson|1997|p=451}}\
        \ notes that historical accounts of the voyage do not agree on 'most of the\
        \ dates' they provide, citing as an example the date of departure from Cádiz,\
        \ which was 'reported differently by all participants.'}}\n\n=== In culture\
        \ ===\nThe [[Capitulations of Santa Fe]] secured for Columbus and his heirs\
        \ a number of rights and privileges attaching to lands discovered and formally\
        \ possessed by him.{{sfn|Bedini|2000|pp=413-415}} As Columbus discovered and\
        \ formally possessed mainland territory during his fourth voyage, rather than\
        \ insular lands, conflict arose regarding the extent of mainland to which\
        \ the Capitulations rights and privileges attached.{{sfn|Bedini|2000|p=415}}\
        \ In 1508, this resulted in the protracted ''[[Pleitos colombinos|Pleitos\
        \ Colombinos]]'', wherein Columbus's heir, [[Diego Columbus]], sued for recognition\
        \ of his inherited rights and privileges over lands discovered and possessed,\
        \ claiming rights and privileges over large tracts of the Central American\
        \ subcontinent<!--the entire North American continent?--> by dint of Columbus's\
        \ discoveries and acts of formal possession during his fourth voyage.{{sfn|Bedini|2000|p=416}}\n\
