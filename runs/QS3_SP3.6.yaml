        Now operating as X, the platform closely resembles its predecessor but includes additional features such as long-form texts,  account monetization options, audio-video calls, integration with xAI's Grok chatbot, job search, and a repurposing of the platform's verification system as a subscription premium. Several legacy Twitter features were removed from the site after Musk acquired Twitter, including Circles, NFT profile pictures, and the experimental pronouns in profiles feature. Musk's aims included transforming X into a "digital town square" and an "everything app" akin to WeChat.
        Twitter/X has faced significant controversy under Musk's ownership. Issues such as the release of the Twitter Files, suspension of ten journalists' accounts, and labeling media outlets as "state-affiliated" and restricting their visibility have sparked criticism. Despite Musk stepping down as CEO, the platform continues to struggle with challenges such as viral misinformation, hate speech (especially antisemitism), child pornography and any violation of laws, even in 2026, France raided X offices and issues arrest warrant against Elon for violation of law and Digital Service Act, Online Safety Act and Australia's Online Safety Act to fine the platform if fails to remove harmful and illegal content. In response to allegations it deemed unfair, X Corp. has pursued legal action against nonprofit organizations Media Matters and the Center for Countering Digital Hate.

