        ==Political and popular support==
        {{outdated section|date=April 2022}}
        [[Pew Research Center]]'s 2016 survey among its member states showed that while most countries viewed NATO positively, most NATO members preferred keeping their military spending the same. The response to whether their country should militarily aid another NATO country if it were to get into a serious military conflict with Russia was also mixed. Roughly half or fewer in six of the eight countries surveyed say their country should use military force if Russia attacks a neighboring country that is a NATO ally. And at least half in three of the eight NATO countries say that their government should not use military force in such circumstances. The strongest opposition to responding with armed force is in Germany (58%), followed by France (53%) and Italy (51%). More than half of Americans (56%) and Canadians (53%) are willing to respond to Russian military aggression against a fellow NATO country. A plurality of the British (49%) and Poles (48%) would also live up to their Article&nbsp;5 commitment. The Spanish are divided on the issue: 48% support it, 47% oppose.<ref>{{Cite web |last=Cuddington |first=Danielle |date=6 July 2016 |title=Support for NATO is widespread among member nations |url=http://www.pewresearch.org/fact-tank/2016/07/06/support-for-nato-is-widespread-among-member-nations/ |website=[[Pew Research]] |access-date=15 August 2017 |archive-date=4 April 2023 |archive-url=https://web.archive.org/web/20230404102025/https://www.pewresearch.org/fact-tank/2016/07/06/support-for-nato-is-widespread-among-member-nations/ |url-status=live }}</ref><ref>{{Cite news |last=Emmott |first=Robin |date=23 May 2017 |title=U.S. would defend NATO despite Trump's criticism, Europeans believe: study |url=https://www.reuters.com/article/us-usa-trump-nato-survey-idUSKBN18J21J/ |access-date=28 January 2024 |work=[[Reuters]] |archive-date=4 April 2023 |archive-url=https://web.archive.org/web/20230404015012/https://www.reuters.com/article/us-usa-trump-nato-survey-idUSKBN18J21J |url-status=live }}</ref>

        [[YouGov]], a market research company that is mainly active in the UK also hosts a regularly updated public opinion polling for NATO. As of 6 January 2025, 45% of UK citizens strongly support NATO, 31% Tend to support NATO, 18% Don't know, 3% Tend to oppose and 3% Strongly oppose. Older people (65+) Strongly support NATO at 59%, whilst in younger demographics (18-24), Tend to support ranks the highest at 34%, and Don't know is at 33%.<ref>{{Cite web |title=Support for NATO |url=https://yougov.co.uk/topics/international/trackers/support-for-nato |access-date=2025-05-13 |website=yougov.co.uk |language=en-gb}}</ref>

        A 2025 poll found that support for NATO membership was 52%, compared to the 66% of Slovenians who voted for NATO membership in a [[2003 Slovenian European Union and NATO membership referendum|referendum in 2003]].<ref>{{Cite web|date=2025-07-11 |title=Slovenians relatively reserved about NATO |url=https://english.sta.si/3282959/slovenians-relatively-reserved-about-nato |website=STA |access-date=2025-07-11}}</ref><ref>{{Cite web |date=2025-07-09 |title=Slovenia’s risky referendum on NATO |url=https://www.politico.eu/article/slovenia-nato-gamble-robert-golob-politics-eu/ |website=Politico |access-date=2025-07-11}}</ref>

