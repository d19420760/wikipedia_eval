        \ with about half of the doses purchased by high-income countries comprising\
        \ 14% of the world's population. As of August 2024, over 13 billion doses\
        \ of COVID‑19 vaccines have been administered worldwide.\n\n## Result 5\n\
        Title: Therapeutic vaccines\nURL: https://en.wikipedia.org/wiki/Therapeutic_vaccines\n\
        Extract: A therapeutic vaccine is a vaccine which is administered after a\
        \ disease or infection has already occurred. A therapeutic vaccine works by\
        \ activating the immune system of a patient to fight an infection. A therapeutic\
        \ vaccine differs from a prophylactic vaccine in that prophylactic vaccines\
        \ are administered to individuals as a precautionary measure to avoid the\
        \ infection or disease while therapeutic vaccines are administered after the\
        \ individual is already affected by the disease or infection.\nA therapeutic\
        \ vaccine fights an existing infection in the body rather than immunizing\
        \ the body for protection against future diseases and infections.\nTherapeutic\
        \ vaccines are mostly used against viral infections. Patients affected with\
