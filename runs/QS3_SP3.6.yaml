        Extract: The Andorra national football team (Catalan: Selecció de futbol d'Andorra) represents Andorra in men's international football and is controlled by the Andorran Football Federation, the governing body for football in Andorra. The team has enjoyed very little success due to the Principality's tiny population, the fifth smallest of any UEFA country (only Liechtenstein, San Marino, Gibraltar and the Faroe Islands are smaller).
        Andorra's first official game was a 6–1 defeat in a friendly match to Estonia in 1996. Since the qualifying rounds for the UEFA Euro 2000 tournament, Andorra have competed in qualifying for every European Championship and FIFA World Cup but have had very little success. They have only won fourteen matches since becoming recognised by FIFA in 1996.

