      content: "## Result 1\nTitle: Pizza Tower\nURL: https://en.wikipedia.org/wiki/Pizza_Tower\n\
        Extract: Pizza Tower is a 2023 platform game created by the indie developer\
        \ Tour De Pizza. It follows the pizza chef Peppino Spaghetti, who must scale\
        \ a tower to prevent the destruction of his pizzeria. Across 20 side-scrolling\
        \ levels, the player increases their score by gathering collectibles and defeating\
        \ enemies to build combos. At the end of each level, they activate an escape\
        \ sequence and must return to the beginning within a time limit. Pizza Tower\
        \ does not use health or lives, and its difficulty depends on what the player\
        \ chooses to achieve.\nThe five-year development was led by the pseudonymous\
        \ designer McPig and programmer Sertif. Pizza Tower began as a role-playing\
        \ video game with survival horror elements before evolving into a platformer\
        \ inspired by Nintendo's dormant Wario Land series, to which McPig wanted\
        \ to provide a spiritual successor. It was developed with GameMaker and features\
        \ a cartoonish, high-resolution pixel art style inspired by SpongeBob SquarePants\
        \ and French comics. Wario Land 4 (2001) served as the basis for the gameplay\
        \ and level design.\nPizza Tower developed a large fandom during its development\
        \ through early access builds offered to Patreon backers and game demos. It\
        \ was released for Windows on January 26, 2023. Pizza Tower received positive\
        \ reviews and nominations for year-end accolades. Critics praised its gameplay,\
        \ music, visuals, and humor. Critics favorably compared its art style to 1990s\
        \ Nicktoons and the sense of speed to the Sonic the Hedgehog series. They\
        \ considered it a worthy substitute for Wario Land, some calling it better\
        \ than its inspiration. Tour De Pizza supported the game with updates adding\
        \ new content into 2024, alongside a port for the Nintendo Switch.\n\n## Result\
        \ 2\nTitle: Pizza face\nURL: https://en.wikipedia.org/wiki/Pizza_face\nExtract:\
