        , which included quantities recovered from Europe by the Manhattan Project's\
        \ Alsos Mission.\nBeyond their immediate wartime needs, the American and British\
        \ governments attempted to control as much of the world's uranium deposits\
        \ as possible. They created the Combined Development Trust in June 1944, with\
        \ the director of the Manhattan Project, Major General Leslie R. Groves Jr.\
        \ as its chairman. The Combined Development Trust procured uranium and thorium\
        \ ores on international markets. A special account not subject to the usual\
        \ auditing and controls was used to hold Trust monies. Between 1944 and his\
