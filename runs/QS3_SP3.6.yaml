        Extract: Tamil cinema is a part of Indian cinema based in Chennai, Tamil Nadu. The films are made primarily in the Tamil language. Chintamani (1937) and Haridas (1944) are landmark films from the early stages of Tamil cinema. Chintamani was the first major box office success, while Haridas is noted for its significant impact and long theatrical run, reflecting industry's development before its formal establishment post-independence. This ranking lists the highest-grossing Tamil films produced by Tamil cinema, based on conservative global box office estimates as reported by organizations classified as green by Wikipedia. The figures are not adjusted for inflation. However, there is no official tracking of figures, and sources publishing data are frequently pressured to increase their estimates.

        ## Result 5
        Title: Vaazha II: Biopic of a Billion Bros
        URL: https://en.wikipedia.org/wiki/Vaazha_II:_Biopic_of_a_Billion_Bros
        Extract: Vaazha II: Biopic of a Billion Bros (lit. 'Plantain II: Biopic of a Billion Bros') is a 2026 Indian Malayalam-language coming-of-age comedy-drama film directed by Savin SA (in his directorial debut) and written by Vipin Das. It is a standalone sequel to Vaazha: Biopic of a Billion Boys (2024). The film stars Hashir H., Alan Bin Siraj, Ajin Joy, Vinayak V and Devaraj in the main roles, alongside Angel Maria, Veda Shankar, Vijay Babu, Aju Varghese, Bijukuttan, Alphonse Puthren, and Sudheesh in supporting roles.
        Principal photography took place from April to November 2025, shot in Ernakulam, the United Arab Emirates, and Georgia. Vaazha II: Biopic of a Billion Bros was released on 2 April 2026. The film received critical acclaim from critics. It was a commercial success and has emerged as the highest-grossing film of all time in Kerala, where it has grossed over ₹124 crore, as well as the highest-grossing Malayalam film of 2026, fourth highest-grossing Malayalam film of all time,
        and fourth highest-grossing Indian film of 2026. A sequel titled Vaazha III: Biopic of a Billion Girls was announced.

