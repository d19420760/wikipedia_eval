        \ theory of relativity, although all experimentally verifiable predictions\
        \ of this theory do not depend on that convention.\nExperiments that attempt\
        \ to directly probe the one-way speed of light independent of synchronization\
        \ have been proposed, but none have succeeded in doing so.\nThose experiments\
        \ directly establish that synchronization with slow clock-transport is equivalent\
