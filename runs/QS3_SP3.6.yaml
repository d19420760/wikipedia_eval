        \ Active streaks and active players are in boldface.\n\n## Result 10\nTitle:\
        \ Serena Williams\nURL: https://en.wikipedia.org/wiki/Serena_Williams\nExtract:\
        \ Serena Jameka Williams (born September 26, 1981) is an American former professional\
        \ tennis player. She was ranked as the world No. 1 in women's singles by the\
        \ Women's Tennis Association (WTA) for 319 weeks (third-most of all time),\
        \ and finished as the year-end No. 1 five times. Williams won 73 WTA Tour–level\
