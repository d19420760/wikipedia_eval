        | first_aired          = {{Start date|2019|09|20}}\n| last_aired         \
        \  = present\n| related              = ''[[Make Some Noise (TV series)|Make\
        \ Some Noise]]''\n}}\n'''''Game Changer''''' is an American comedy [[panel\
        \ game]] show on [[Dropout (streaming platform)|Dropout]] created and hosted\
