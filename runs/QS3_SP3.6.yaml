        \ comedies Simon (1980) and Lovesick (1983).\n\n## Result 5\nTitle: Manhattan\
        \ Project (song)\nURL: https://en.wikipedia.org/wiki/Manhattan_Project_(song)\n\
        Extract: \"Manhattan Project\" is a 1985 song by Canadian progressive rock\
