        \ puzzle solving, fierce competition, and a prankster ethos.\"<ref name=\"\
        Polo-2023\">{{Cite news |last=Polo |first=Susana |date=March 15, 2023 |title=Puzzle,\
        \ performance, or prank? TV's best game show isn't a game show at all |work=[[Polygon\
        \ (website)|Polygon]] |url=https://www.polygon.com/23639574/dropout-tv-college-humor-game-changer-sam-reich\
        \ |access-date=March 19, 2023}}</ref> Episodes of ''Game Changer'' have led\
        \ to four spinoff shows on Dropout: ''Dirty Laundry'', ''[[Make Some Noise\
        \ (TV series)|Make Some Noise]]'', ''Play It By Ear'', and ''Crowd Control''.\
        \ The show's eighth season premiered in May 2026.\n\n== Premise ==\nThe show\
        \ is based on one central theme: the players start the game knowing nothing\
        \ about it. Most episodes follow three contestants playing against each other\
        \ by following prompts and tasks put out by the host of the show, Sam Reich.\
        \ It also sometimes parodies other shows like ''[[Survivor (American TV series)|Survivor]]''\
        \ and [[The Bachelor (American TV series)|''The Bachelor'']].<ref>{{Cite web\
        \ |last1=Volk |first1=Pete |last2=Millman |first2=Zosha |last3=Staff |first3=Polygon\
        \ |date=2023-02-21 |title=The best TV of 2023 so far |url=https://www.polygon.com/what-to-watch/23599935/best-tv-shows-2023-new\
        \ |access-date=2023-02-28 |website=Polygon |language=en-US}}</ref> \n\nOccasionally,\
        \ special guests will participate in the game. The very first episode featured\
        \ the participants' significant others, and the inclusion of guests outside\
        \ of the Dropout/CollegeHumor community began with the virtually filmed third\
        \ season, which featured guests such as [[Tony Hawk]], [[Michael Winslow]],\
        \ and [[Giancarlo Esposito]].<ref>{{Cite web |last=Jacobs |first=Mira |date=2020-11-14\
        \ |title=The Mandalorian's Giancarlo Esposito Gives the ABCs a Villainous\
        \ Twist |url=https://www.cbr.com/mandalorian-giancarlo-esposito-villainous-abcs/\
        \ |access-date=2023-02-28 |website=CBR |language=en}}</ref> Other guests have\
        \ included [[Jewel (singer)|Jewel]], [[Ty Mitchell]], [[Bob the Drag Queen]],\
        \ [[Laganja Estranja]], [[Howie Mandel]], [[Victor Yerrid]], [[Sarah Natochenny]],\
        \ [[Eric Wareheim]], [[Paul F. Tompkins]], and [[Robert Reich]].\n\n== Production\
        \ ==\n''Game Changer'' was created as an original show for the streaming service\
        \ [[Dropout (streaming service)|Dropout]], in response to internal pressure\
        \ to create more inexpensive, unscripted content compared to [[CollegeHumor]]'s\
        \ previous output.  Early in development, the show was titled ''What the What''\
        \ and based loosely on the party game \"[[Scissors (game)|Scissors]]\".<ref\
        \ name=\"Polo-2023\" /> The show was announced on August{{nbsp}}29, 2019 and\
        \ released on September{{nbsp}}20, 2019.\n\nAfter CollegeHumor was sold by\
        \ [[IAC (company)|IAC]] and restructured in 2020, the company temporarily\
        \ halted production of all shows. ''Game Changer'', which was affected by\
        \ this, released their already-completed second season in January.<ref>{{Cite\
        \ web |last=Wright |first=Megh |date=2020-01-08 |title=Almost Everyone at\
        \ CollegeHumor Has Lost Their Jobs |url=https://www.vulture.com/2020/01/collegehumor-layoffs-sale.html\
        \ |access-date=2023-02-27 |website=Vulture |language=en-us}}</ref> The third\
        \ season of the show was recorded via [[Videotelephony|video conference]]\
        \ to comply with [[California government response to the COVID-19 pandemic|lockdown\
        \ restrictions]] in [[California]] during the [[COVID-19 pandemic]]; the show\
        \ returned to being recorded in the studio for its fourth season.<ref>{{Cite\
        \ tweet |author=Dropout |author-link=Dropout (media company) |user=dropout\
        \ |number=1280547602182942720 |date=July 7, 2020 |title=Sam's plans for Game\
        \ Changer season 3 are gonna blow your mind. Shooting remotely opens up new\
        \ possibilities of chaos we had never dreamed of in the past. |language=English\
        \ |access-date=March 31, 2024}}</ref> Originally, nine episodes were announced\
        \ as being a part of the fifth season ahead of the season premiere in November\
        \ 2022, with a 10th episode being a cut-for-time special. However, in March\
        \ 2023, a special 4-part season finale titled \"Game Changer: Battle Royale\"\
        \ was announced, with the mini-series being a sequel to season{{nbsp}}4's\
        \ ''Survivor''-style season finale.<ref>{{cite news |last1=Polo |first1=Susana\
        \ |title=Watch the trailer for Game Changer's surprise four-episode season\
        \ finale |url=https://www.msn.com/en-us/entertainment/gaming/watch-the-trailer-for-game-changer-s-surprise-four-episode-season-finale/ar-AA18RgVK\
        \ |access-date=21 March 2023 |work=MSN |agency=Polygon |date=20 March 2023}}</ref>\
        \ Beginning with the fifth season, behind-the-scenes videos are uploaded for\
        \ each episode the week after their release. Seasons 4 and 5 each concluded\
        \ with \"cut for time\" specials featuring moments that were cut from the\
        \ episodes; these moments were later integrated into the behind-the-scenes\
        \ videos from season{{nbsp}}6 onward. \n\nDuring the [[2023 SAG-AFTRA strike]],\
        \ production on the sixth season of ''Game Changer'' as well as most Dropout\
        \ programming shut down, as the show fell \"under SAG's Electronic Media contract\"\
        .<ref>{{Cite web |date=July 15, 2023 |title=What Does the SAG-AFTRA Strike\
        \ Mean for Actual Play Shows? |url=https://gizmodo.com/sag-aftra-strike-actual-play-shows-whats-affected-1850643857\
        \ |access-date=July 16, 2023 |website=Gizmodo |language=en}}</ref> In July\
        \ 2023, Sam Reich stated that as Dropout is not \"associated with the [[AMPTP]],\
        \ it's possible we may be able to reach an interim agreement with SAG that\
        \ allows us to continue to produce content during the strike. But we'll only\
        \ do that, obviously, if we get the blessing of the union and the buy-in of\
        \ our performers. If not, we have enough content in the can to last us a little\
        \ past the end of the year\".<ref>{{Cite tweet|number=1680274126983016448|user=samreich|title=Dropout\
        \ production is right now on hold. Because we aren't associated with the AMPTP,\
        \ it's possible we may be able to reach an interim agreement with SAG that\
        \ allows us to continue to produce content during the strike. [THREAD]|first=Sam|last=Reich|author-link=Sam\
        \ Reich|date=July 15, 2023}}</ref> In August 2023, Reich announced that all\
        \ Dropout shows had resumed production, as it was determined that their \"\
        New Media Agreement for Non-Dramatic Programming\" was actually a non-struck\
        \ SAG-AFTRA contract.<ref name=\"Dropout August 2023 Update\">{{Cite tweet|number=1688955479765155840|user=samreich|title=Dropout\
        \ is back in production. \U0001FAE1 Details below. \U0001F447 [Thread]|first=Sam|last=Reich|author-link=Sam\
        \ Reich|date=August 8, 2023|access-date=August 8, 2023}}</ref><ref>{{Cite\
        \ web |last=Carter |first=Justin |date=August 8, 2023 |title=Streaming Platform\
        \ Dropout Is Resuming Production |url=https://gizmodo.com/dropout-streaming-resume-production-hollywood-strikes-1850717894\
        \ |access-date=August 8, 2023 |website=[[Gizmodo]] |language=en}}</ref>\n\n\
        ''Game Changer'' editor Sam Geer, who also directed season{{nbsp}}6's episodes,\
        \ was promoted to executive producer in 2024.<ref name=\"dead-june-12-24\"\
        >{{cite web |last1=Fleming |first1=Ryan |title='Game Changer' Host Sam Reich\
        \ On Keeping The Series \"Consistently Original\" & Recruiting The Perfect\
        \ Ratfish: \"Couldn't Ask For A Wilder Wildcard\" |url=https://deadline.com/2024/06/game-changer-sam-reich-host-dropout-game-show-emmy-1235971594/\
        \ |publisher=Deadline Hollywood |date=June 12, 2024}}</ref> The set was expanded\
        \ for the filming of season{{nbsp}}7. Reich commented that one of the production\
        \ limitations of the previous set was the stage curtain entrance so this set\
        \ expansion featured a new \"grand entrance\" to \"wheel the most elaborate\
        \ stuff out onto that stage\".<ref name=\"IndieWire April 2025 Interview\"\
        >{{Cite web |last=Shachat |first=Sarah |date=2025-04-09 |title='Game Changer'\
        \ Season 7 Opens Up Whole New World(s) of Comedy |url=https://www.indiewire.com/features/interviews/game-changer-season-7-sam-reich-interview-1235114134/\
        \ |access-date=2025-04-09 |website=IndieWire |language=en-US}}</ref> Reich\
        \ stated, \"the open play space and the distance between the cameras and us\
        \ are so massive that to be on the stage this season, it felt a little bit\
        \ like there weren't cameras in the room.{{nbsp}}... I think that contributed\
        \ to a bit of just how free we felt as performers\".<ref name=\"IndieWire\
        \ April 2025 Interview\" />\n\nSeason{{nbsp}}7 featured off-set filming and\
        \ two episodes with [[studio audience]]s.<ref name=\"IndieWire April 2025\
        \ Interview\" /> Belen Edwards of ''[[Mashable]]'' explained that \"multiple\
        \ Season{{nbsp}}7 episodes have made fans a part of the game\" and that \"\
        either unknowingly or knowingly, ''Game Changer'' is bringing its fans into\
        \ the game\".<ref name=\"Edwards-2025\">{{cite web |last1=Edwards |first1=Belen\
        \ |date=July 14, 2025 |title='Game Changer' smartly weaponizes its social\
        \ media following in 'Fool's Gold' |url=https://mashable.com/article/game-changer-season-7-episode-8-fools-gold-social-media-sam-reich\
        \ |access-date=July 15, 2025 |website=[[Mashable]] |language=en}}</ref> Edwards\
        \ highlighted a challenge in \"One Year Later\" which \"involved creating\
        \ the most profitable piece of Dropout merchandise, something fans only realized\
        \ while watching the episode\", the live audience for \"Crowd Control\", and\
        \ the goal of creating the most [[viral video]]s in \"Fool's Gold\" where\
        \ the \"viewers will be able to keep affecting the episode's outcome\" in\
        \ the month after the episode aired.<ref name=\"Edwards-2025\" /> The season\
        \ also featured an [[alternate reality game]] (ARG) component, with clues\
        \ hidden in the episodes, in response to a mistaken belief by fans that an\
        \ ARG was hidden in season{{nbsp}}6.<ref name=\"ChangeGamer\">{{cite web |\
        \ last=Maas | first=Jennifer | title=Inside Dropout's Surprise ''Game Changer''\
        \ Finale: How Sam Reich Was Tricked, Attempted to Hide 'Samalamadingdong'\
        \ Episode (EXCLUSIVE) | website=[[Variety (magazine)|Variety]] | date=August\
        \ 25, 2025 | url=https://variety.com/2025/tv/news/game-changer-episode-11-surprise-sam-reich-samalamadingdong-1236495976/\
        \ | access-date=August 25, 2025}}</ref> The game was solved by fans within\
        \ 48 hours, ultimately unlocking the final episode of the season, one which\
        \ had been planned by [[Brennan Lee Mulligan]] and other Dropout cast and\
        \ crew members in secret to surprise Reich following the end of production\
        \ on the other episodes.<ref name=\"ChangeGamer\" />\n\nSeason{{nbsp}}8 finished\
        \ filming in November 2025.<ref>{{cite web |url=https://www.instagram.com/p/DRAs8Yqk6V-/\
        \ |website=Instagram |last=Reich |first=Sam |author-link=Sam Reich |date=2025-11-13\
        \ |title=that's a wrap on game changer season 8 |access-date=2026-01-24}}</ref><ref>{{cite\
        \ web |url=https://brighttangerine.com/game-changer-season-8-kevin-stiller/\
        \ |title=Game Changer DOP Kevin Stiller: “What a Blessing that we can Laugh\
        \ at Work.” |date=2025-12-17 |website=Bright Tangerine |access-date=2026-01-24}}</ref>\
        \ The season premiered on May 18, 2026.<ref name=\"S8Trailer\">{{cite web|url=https://www.polygon.com/dropout-game-changer-season-8-trailer-release-date/|title=Game\
        \ Changer returns next month and season 8 might be the most chaotic yet|work=[[Polygon\
        \ (website)|Polygon]]|first=Austin|last=Manchester|date=April 20, 2026|access-date=April\
        \ 21, 2026}}</ref>\n\nOn February 23, 2026, it was revealed that ''[[The Rookie]]''\
        \ would air an episode crossing over with ''Game Changer''. The episode, \"\
        [[Fun and Games (The Rookie)|Fun and Games]]\", aired on March 2, 2026, featuring\
        \ Reich, Vic Michaelis, Jacob Wysocki, Zac Oyama, and Anna Garcia.<ref>{{cite\
        \ web|url=https://variety.com/2026/tv/news/the-rookie-game-changer-crossover-episode-1236670298/|title=ABC's\
        \ ''The Rookie'' to Crossover With Dropout's ''Game Changer'' in March Episode|work=[[Variety\
        \ (magazine)|Variety]]|first=Jennifer|last=Maas|date=February 23, 2026|access-date=February\
        \ 23, 2026}}</ref><ref>{{Cite web |last=Foreman |first=Alison |date=March\
        \ 3, 2026 |title=Why Did Dropout (a Progressive, Pro-Queer Indie Streaming\
        \ Service) Risk a Cameo on 'The Rookie'? |url=https://www.indiewire.com/features/commentary/dropout-the-rookie-crossover-controversy-explained-1235182321/\
        \ |access-date=March 3, 2026 |website=[[IndieWire]] |language=en-US}}</ref>\n\
        \n===Spin-offs===\nEpisodes of ''Game Changer'' have become the basis for\
        \ a number of other shows on Dropout. In 2022, Dropout produced three spin-offs\
        \ based on previous episodes: ''Dirty Laundry'', a panel game about guessing\
        \ each other's secret facts based on the season{{nbsp}}3 episode \"Never Have\
        \ I Ever\"; ''[[Make Some Noise (TV series)|Make Some Noise]]'', a short form\
        \ improv show based on the season{{nbsp}}1 episode and recurring game of the\
        \ same name; and ''Play It by Ear'', a musical improv show based on the season{{nbsp}}4\
        \ episode \"The Official Cast Recording.\" In 2025, Dropout premiered ''Crowd\
        \ Control'', a stand-up crowd work series based on the season{{nbsp}}7 episode\
        \ of the same name.<ref name=\"vulture-like-2009\">{{Cite web |last=Fox |first=Jesse\
        \ David |date=June 2, 2025 |title=It Feels Like 2009 on Dropout |url=https://www.vulture.com/article/dropout-improv-streaming-service-collegehumor-sam-reich.html\
        \ |access-date=June 2, 2025 |website=[[Vulture (website)|Vulture]] |language=en}}</ref>\n\
        \n===Home media===\nOn February 6, 2026, Reich announced that the first two\
