        \ workshop to discuss the 1959 incident.\n\n## Result 8\nTitle: Pressurized\
        \ water reactor\nURL: https://en.wikipedia.org/wiki/Pressurized_water_reactor\n\
        Extract: A pressurized water reactor (PWR) is a type of light-water nuclear\
        \ reactor. PWRs are the most common type of nuclear power reactor, representing\
        \ almost 70% of the world's commercial reactor fleet. Some countries, such\
        \ as Canada and (historically) the United Kingdom, have relied heavily on\
        \ other designs (CANDU pressurized heavy‑water reactors and gas‑cooled reactors\
        \ respectively) while others, including Japan and India, operate a mix of\
        \ PWRs and other reactor types (notably boiling water reactors and pressurized\
        \ heavy‑water reactors). \nIn a PWR, water is used both as a neutron moderator\
        \ and as coolant fluid for the reactor core. In the core, water is heated\
        \ by the energy released by the fission of atoms contained in the fuel. Using\
        \ high pressure (around 155 bar: 2250 psi) ensures that the water stays in\
