        Animated family films have performed consistently well at the box office, with Disney enjoying lucrative re-releases prior to the home video, who have produced films such as Aladdin and The Lion King, both of which were the highest-grossing animated film of all time upon their release. Disney Animation also enjoyed later success with the Frozen and Zootopia films, in addition to Pixar, of which the films from the Toy Story, Inside Out, Finding Nemo, and Incredibles franchises have been the best performers. Beyond Disney and Pixar, other franchises such as Despicable Me, Shrek, Ice Age, the Fengshen Cinematic Universe, Kung Fu Panda, Super Mario, and  Madagascar have been met with the most success. Additionally, the current highest-grossing animated film is Ne Zha 2, a Chinese film that has grossed over $2 billion worldwide, the first-ever animated film to reach $2 billion worldwide.

