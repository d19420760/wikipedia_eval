        \n## Result 3\nTitle: U.S. state\nURL: https://en.wikipedia.org/wiki/U.S._state\n\
        Extract: In the United States, a state is a constituent political entity,\
        \ of which there are 50. Bound together in a political union, each state holds\
        \ governmental jurisdiction over a separate and defined geographic territory\
        \ where it shares its sovereignty with the federal government. Due to this\
