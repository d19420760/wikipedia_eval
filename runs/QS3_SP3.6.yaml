        \ for preservation in the United States National Film Registry by the Library\
        \ of Congress as being \"culturally, historically, or aesthetically significant\"\
        .\nAt the 55th Golden Globe Awards, Titanic won in the categories of Best\
        \ Motion Picture – Drama, Best Director, Best Original Score, and Best Original\
        \ Song. Winslet and Gloria Stuart were also nominated for their acting performances.\
        \ At the 70th Academy Awards, the film garnered fourteen nominations, tying\
        \ the record set in 1950 by Joseph L. Mankiewicz's All About Eve, with eleven\
