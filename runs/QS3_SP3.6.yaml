        ## Result 3
        Title: Andorra
        URL: https://en.wikipedia.org/wiki/Andorra
        Extract: Andorra, officially the Principality of Andorra, is a landlocked country on the Iberian Peninsula, in the eastern Pyrenees in southwestern Europe, bordered by France to the north and Spain to the south. Believed to have been created by Charlemagne, Andorra was ruled by the count of Urgell until 988, when it was transferred to the Diocese of Urgell. Andorra was formed as a polity by a charter in 1278, being a lordship within the Principality of Catalonia until 1715. It is currently headed by two co-princes: the Bishop of Urgell in Catalonia, Spain, and the president of France. Its capital and largest city is Andorra la Vella.
        Andorra is the sixth-smallest state in Europe, with an area of 468 square kilometres (181 sq mi) and a population of approximately 89,058 (as of February, 2026). The Andorran people are a Romance group closely related to Catalans. Andorra is the world's 17th-smallest country by land and 11th-smallest by population. Its capital, Andorra la Vella, is the highest capital city in Europe, at an elevation of 1,023 metres (3,356 feet) above sea level. The official language is Catalan, but Spanish, Portuguese, and French are also commonly spoken.
        Tourism in Andorra brings approximately 8 million visitors to the country annually. Andorra is not a member state of the European Union. It has been a member of the Council of Europe and of the United Nations since 1993.

