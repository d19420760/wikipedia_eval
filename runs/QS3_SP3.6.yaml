        \ 18, 2022. It was released with a starting price of US$429, a $30 increase\
        \ over its predecessor.\nThe third-generation iPhone SE has the same dimensions\
        \ and form factor as the second-generation iPhone SE. The third-generation\
        \ iPhone SE has a similar design to the iPhone 8 and similar internal hardware\
        \ components to the iPhone 13 series, including the A15 Bionic system-on-chip\
        \ and 5G connectivity.\nThe third-generation iPhone SE is the last iPhone\
