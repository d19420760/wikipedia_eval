        \ 10 sites added at the 21st session held in Naples in 1997. Italy has served\
        \ as a member of the World Heritage Committee five times, 1978–1985, 1987–1993,\
        \ 1993–1999, 1999–2001, and 2021–2025.\nOut of Italy's 61 heritage sites,\
        \ 55 are cultural and 6 are natural. Seven sites are transnational. The Historic\
        \ Centre of Rome is shared with the Vatican; the Monte San Giorgio and Rhaetian\
        \ Railway  with Switzerland; the Venetian Works of Defence with Croatia and\
