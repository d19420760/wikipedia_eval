        \ Result 6\nTitle: A1B reactor\nURL: https://en.wikipedia.org/wiki/A1B_reactor\n\
        Extract: The A1B reactor was developed by the United States Navy for the Gerald\
        \ R. Ford-class nuclear-powered aircraft carriers. Each ship is powered by\
