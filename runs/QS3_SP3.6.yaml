        ## Result 1
        Title: X (social network)
        URL: https://en.wikipedia.org/wiki/X_(social_network)
        Extract: X, formerly known as Twitter, is an American microblogging and social networking service, headquartered in Bastrop, Texas. It is one of the world's largest social media platforms and one of the most-visited websites. Users can share short text messages, images, and videos in short posts (commonly and unofficially known as "tweets", in reference to the site's former terminology for the format) and like other users' content. The platform also includes direct messaging, video and audio calling, bookmarks, lists, communities, Grok chatbot integration, job search, and a social audio feature (X Spaces). Users can vote on context added by approved users using the Community Notes feature.
        The platform was created in March 2006 as Twitter by Jack Dorsey, Noah Glass, Biz Stone, and Evan Williams, and was launched in July of that year; initially named twttr, it was renamed Twitter some months later. The platform grew quickly; by 2012 more than 100 million users produced 340 million daily tweets. Twitter, Inc., was based in San Francisco, California, and had more than 25 offices around the world. A signature characteristic of the service initially was that posts were required to be brief. Posts were initially limited to 140 characters, which was changed to 280 characters in 2017. The limitation was removed for subscribed accounts in 2023. 10% of users produce over 80% of tweets. In 2020, it was estimated that approximately 48 million accounts (15% of all accounts) were run by Internet bots rather than humans.
        The service is owned by the American company X Corp., which was established to succeed the prior owner Twitter, Inc. in March 2023 following the October 2022 acquisition of Twitter by Elon Musk for US$44 billion. Musk stated that his goal with the acquisition was to promote free speech on the platform. Since his acquisition, the platform has been criticized for enabling the increased spread of disinformation and hate speech and accused of becoming increasingly right-wing and catering to hate groups. The platform has the lowest rate of enforcement against violations of law, and its policies after Musk fired Twitter-era employees, have faced criticism. In February 2026, France raided X offices and issued an arrest warrant for Musk for violating the Digital Services Act, Online Safety Act, and Australia's Online Safety Act, and fined the platform for failing to remove harmful and illegal content.
        Linda Yaccarino succeeded Musk as CEO on June 5, 2023, with Musk remaining as the chairman and the chief technology officer. In July 2023, Musk announced that Twitter would be rebranded to "X" and the bird logo would be retired, a process which was completed by May 2024. In March 2025, X Corp. was acquired by xAI, Musk's artificial intelligence company. The deal, an all-stock transaction, valued X at $33 billion, with a full valuation of $45 billion when factoring in $12 billion in debt. Meanwhile, xAI itself was valued at $80 billion. In July 2025, Yaccarino stepped down from her role as CEO. In February 2026, the platform's owner, xAI, was acquired by SpaceX; this marked the sixth time where the social media platform has changed hands and the third time under Musk's ownership.

        ## Result 2
        Title: Twitter, Inc.
        URL: https://en.wikipedia.org/wiki/Twitter,_Inc.
