        Ontario – one of the provinces of Canada, located in east-central Canada. It is Canada's most populous province or territory and fourth largest in total area. It is home to the nation's capital city, Ottawa, and the nation's most populous city, Toronto.

        ## Result 5
        Title: Toronto
        URL: https://en.wikipedia.org/wiki/Toronto
        Extract: Toronto is the most populous city in Canada and the capital city of the Canadian province of Ontario. It is located on a harbour at the northwestern shore of Lake Ontario. The city is the fourth-most populous city in North America, behind Mexico City, New York City, and Los Angeles, with a census population of 2,794,356 as of 2021. The Greater Toronto Area (GTA) is constituted of Toronto proper and four surrounding regions, Peel, York, Durham, and Halton, and has a population of 6,712,341, while the Toronto census metropolitan area (CMA), with a somewhat different definition, has a population of 7,106,379. Toronto is an international centre of business, finance, arts, sports, and culture, and is recognized as one of the most multicultural and cosmopolitan cities in the world.
        Indigenous peoples have inhabited the Toronto area, located on a broad sloping plateau interspersed with rivers, deep ravines, and urban forest, for more than 10,000 years. After the broadly disputed Toronto Purchase, when the Mississaugas surrendered the area to the British Crown, the British established the town of York in 1793 and later designated it as the capital of Upper Canada. During the War of 1812, the town was the site of the Battle of York, resulting in heavy damage and a two-week occupation by American troops. York was renamed and incorporated in 1834 as the City of Toronto. It was designated as the capital of the province of Ontario in 1867 during Canadian Confederation. Toronto's city proper has since expanded past its original limits through both annexation and amalgamation to its current area of 631 square kilometres (244 sq mi) in 1998.
        The diverse population of Toronto reflects its current and historical role as an important destination for immigrants to Canada. About half of its residents were born outside of Canada and over 200 ethnic origins are represented among its inhabitants. While the majority of Torontonians speak English as their primary language, over 160 languages are spoken in the city. The city is governed by Toronto City Council, a unicameral body whose members are elected every four years. City council is composed of 25 councillors, who each represent a geographical ward, and the mayor of Toronto who serves as head of council and the chief executive officer of the municipal government.
        Toronto is Canada's largest financial centre, and is home to the Toronto Stock Exchange, the de facto operational headquarters of Canada's five largest banks, and the headquarters of many large Canadian and multinational corporations. Its economy is highly diversified with strengths in technology, design, financial services, life sciences, education, arts, fashion, aerospace, environmental innovation, food services, and tourism.  Toronto is a prominent centre for music, theatre, motion picture production, television production, and digital media production, and is home to the headquarters of Canada's major national broadcast networks and media outlets. Its varied cultural institutions, which include numerous museums and galleries, festivals and public events, entertainment districts, national historic sites, and sports activities, attract over 26 million visitors each year.

        ## Result 6
