      content: "## Result 1\nTitle: Spanish Inquisition\nURL: https://en.wikipedia.org/wiki/Spanish_Inquisition\n\
        Extract: {{Short description|System of tribunals enforcing Catholic doctrine}}\n\
        {{Other uses}}\n{{Multiple issues|{{More citations needed|date=January 2025}}\n\
        {{Page numbers needed|date=January 2025}}}}\n{{Use British English|date=October\
        \ 2021}}\n{{Use dmy dates|date=January 2019}}\n{{Infobox legislature|name=Tribunal\
        \ of the Holy Office of the Inquisition|native_name=Tribunal del Santo Oficio\
        \ de la Inquisición|native_name_lang=es|coa_pic=File:Inquisición española.svg|coa_caption=Seal\
        \ for the Tribunal in Spain<br />Flanking the cross is a sword, symbolising\
        \ the punishment of heretics, and an olive branch, symbolising reconciliation\
        \ with the repentant. In Latin, the inscription \"Exurge Domine et judica\
        \ causam tuam. Psalm 73.\" (\"Arise, Lord, and judge your cause\")|house_type=[[Tribunal]]\
        \ under the [[Spanish monarchy]], for upholding religious orthodoxy in their\
        \ realm|disbanded=15 July 1834|established=1 November 1478|members=Consisted\
        \ of a [[Grand Inquisitor]], who headed the Council of the Supreme and General\
        \ Inquisition, made up of six members. Under it were up to 21 tribunals in\
        \ the empire.|voting_system1=Grand Inquisitor and Suprema designated by the\
        \ crown|meeting_place=[[Spanish Empire]]|footnotes={{Plainlist|\n* See also:\n\
        * [[Medieval Inquisition]]\n* [[Mexican Inquisition]]\n* [[Peruvian Inquisition]]\n\
        * [[Portuguese Inquisition]]\n* [[Roman Inquisition]]}}\n}}\n\nThe '''Tribunal\
        \ of the Holy Office of the Inquisition''' ({{langx|es|Tribunal del Santo\
        \ Oficio de la Inquisición}}) was authorized by [[Pope Sixtus IV]] in 1478\
        \ and the first inquisitors, Miguel de Morillo and Juan de San Martín, were\
        \ appointed by the future [[Catholic Monarchs of Spain|Catholic Monarchs]],\
        \ King [[Ferdinand II of Aragon]] and Queen [[Isabella I of Castile]], in\
        \ 1480.<ref>Boruchoff 2023, p. 34.</ref> Although its stated aim was to maintain\
        \ Christian orthodoxy, it became an effective instrument of state power by\
        \ replacing the [[Medieval Inquisition]], which was under Papal control.\n\
        \nOver the course of the Inquisition, the Inquisition prosecuted an estimated\
        \ 150,000 people for various offences. Of these, an estimated 3,000–5,000\
        \ were relaxed to the state for execution, particularly in the initial 50\
        \ years,<ref name=\"Levack, Brian P. 19952\">Data for executions for witchcraft:\
        \ {{Cite book |last=Levack |first=Brian P. |title=The Witch-Hunt in Early\
        \ Modern Europe |publisher=Longman |year=1995 |isbn=978-0-582-08069-0 |edition=2nd\
        \ |location=London and New York |oclc=30154582}} And see [[Witch trials in\
        \ Early Modern Europe]] for more detail.</ref> mostly by [[Death by burning#Medieval\
        \ Inquisition and the burning of heretics|burning at the stake]]. Other punishments\
        \ included penance and public flogging, exile, [[Galley slave|enslavement\
        \ on galleys]], and prison terms ranging from several years to life imprisonment.\
        \ According to Joseph Pérez an important aspect of many of these punishments\
        \ was the profit motive confiscation of all the victims' property.{{sfn|Pérez|2005|pp=151–152}}\n\
        \nThe Inquisition was originally intended primarily to identify [[Heresy in\
        \ Christianity|heretics]] among those who converted from [[Judaism]] and [[Islam]]\
        \ to Catholicism. The regulation of the faith of newly converted Catholics\
        \ intensified following the [[Alhambra Decree|royal decrees issued in 1492\
        \ and 1502]] ordering [[Jews]] and [[Muslims]] to either convert to Catholicism,\
        \ leave [[Crown of Castile|Castile]] or face death.<ref name=\"AD2\">{{Cite\
        \ web |date=1492 |title=The Alhambra Decree-- Edict of the Expulsion of the\
        \ Jews of Spain |url=https://www.fau.edu/artsandletters/pjhr/chhre/pdf/hh-alhambra-1492-english.pdf\
        \ |website=Florida Atlantic University}}</ref> [[Forced conversions of Muslims\
        \ in Spain|Hundreds of thousands of forced conversions]], torture and executions,\
        \ the persecution of ''[[converso]]s'' and ''[[morisco]]s'', and the [[Expulsion\
        \ of Jews from Spain|mass expulsions of Jews]] and [[Expulsion of the Moriscos|Muslims\
        \ from Spain]] all followed.<ref name=\"Prien20122\">{{cite book |author=Hans-Jürgen\
        \ Prien |url={{google books|plainurl=y|id=kSAbYoBGmxQC|page=11}} |title=Christianity\
        \ in Latin America: Revised and Expanded Edition |date=2012 |publisher=Brill\
        \ |isbn=978-90-04-22262-5 |page=11}}</ref> An estimated 40,000–100,000 Jews\
        \ were expelled in 1492. ''Conversos'' were subjected to blood purity statutes\
        \ (''[[limpieza de sangre]])'', which introduced racially-based discrimination\
        \ and antisemitism, lasting into the 19th and 20th centuries.\n\nThe inquisition\
        \ expanded to other domains under the Spanish Crown, including [[Southern\
        \ Italy]] and the Americas, while also targeting those accused of ''[[Alumbrados|alumbradismo]]'',\
        \ Protestantism, [[Witch trials in the early modern period|witchcraft]], [[blasphemy]],\
        \ bigamy, sodomy, and [[Freemasonry]]. A notable feature was the ''[[Auto-da-fé|auto-da-fe]]'',\
        \ where the accused were paraded, sentences read, and confessions made, after\
        \ which the guilty were turned over to civil authorities for the execution\
        \ of sentences.{{sfn|Pérez|2005|pp=154–169}}\n\n==Background==\n{{main|Medieval\
        \ Inquisition|Papal Inquisition in Spain|History of the Jews in Spain}}\n\
        [[File:La_Virgen_de_los_Reyes_Católicos.jpg|thumb|[[:es:La Virgen de los Reyes\
        \ Católicos|The Virgin of the Catholic Monarchs]], 1491–1493. The Inquisitor,\
        \ [[Tomás de Torquemada|Torquemada]], is behind [[Ferdinand II of Aragon|King\
        \ Ferdinand]] (left).]]Roman Emperor [[Constantine the Great|Constantine]]\
        \ legalized Christianity in 313 with the [[Edict of Milan]]. Persecuted under\
        \ previous emperors, the new religion persecuted heterodox beliefs - [[Arianism]],\
        \ [[Manichaeism]], [[Gnosticism]], [[Adamites]], [[Donatism|Donatists]], [[Pelagianism|Pelagians]],\
        \ and [[Priscillianism|Priscillianists]]{{sfn|Sabatini|2018|p=9-11}} In 380\
        \ Emperor [[Theodosius I]] established [[Nicene Christianity]] as the state\
        \ church of the Roman Empire. It condemned other Christian creeds as heresies\
        \ and approved their repression.<ref>{{cite book |last1=Ehler |first1=Sidney\
        \ Zdeneck |url={{google books|plainurl=y|id=2WuMyEzani8C|page=6}} |title=Church\
        \ and State Through the Centuries: A Collection of Historic Documents with\
        \ Commentaries |last2=Morrall |first2=John B |publisher=Biblo & Tannen Publishers\
        \ |year=1967 |isbn=978-0-8196-0189-6 |pages=6–7 |quote=This Edict is the first\
        \ which definitely introduces Catholic orthodoxy as the established religion\
        \ of the Roman world. [...] Acknowledgment of the true doctrine of the Trinity\
        \ is made the test of State recognition. |archive-url=https://web.archive.org/web/20160515193906/https://books.google.com/books?id=2WuMyEzani8C&pg=PA6\
        \ |archive-date=2016-05-15 |url-status=live}}</ref><ref>{{Cite web |title=The\
        \ Edict of Thessalonica |url=https://www.historytoday.com/archive/months-past/edict-thessalonica\
        \ |website=History Today}}</ref> In 438, under Emperor [[Theodosius II]],\
        \ ''[[Codex Theodosianus]]'' (Theodosian Code) provided for property confiscation\
        \ and execution for heretics.{{sfn|Sabatini|2018|p=13}}<ref>{{Cite book |last=Pharr\
        \ |first=Clyde |title=The Theodosian Code and Novels and the Sirmondian Constitutions\
        \ |publisher=Princeton University Press |publication-date=1952 |pages=440–476}}</ref>\n\
        \nFollowing the conversion of Spain's [[Visigoths|Visigoth]] royal family\
        \ to Catholicism in 587, the situation for Jews deteriorated as the monarchy\
        \ and church aligned to consolidate the realm under the new religion.{{sfn|Rutgers|Bradbury|2006|p=512}}\
        \ The Church's [[Councils of Toledo]] imposed restrictions, including prohibitions\
        \ on intermarriage and holding office,{{sfn|Rutgers|Bradbury|2006|p=512}}\
        \ culminating in [[Sisebut|King Sisebut's]] 613 decree demanding conversion\
        \ or expulsion, which led many Jews to flee or convert.<ref name=\"Assis,\
        \ p. 10\">Assis, p.&nbsp;10</ref> Despite brief periods of tolerance, subsequent\
        \ rulers and church councils intensified persecution, banning all Jewish rites,{{sfn|Rutgers|Bradbury|2006|p=512}}\
        \ forcing baptisms, seizing property, enslaving Jews (after accusations of\
        \ conspiracy in 694), taking children away from Jewish parents,{{sfn|Rutgers|Bradbury|2006|p=512}}\
        \ and imposing severe economic hardships. This oppression alienated the Jewish\
        \ population, causing some to welcome the [[Muslim conquest of the Iberian\
        \ Peninsula|Muslim invasion]] in 711.<ref>Stillman, p.53</ref>\n\nWhile Muslims\
        \ in the [[Holy Land]] were the primary targets of the [[Crusades]], other\
        \ perceived enemies of Christianity soon became targets. In 1184 [[Pope Lucius\
        \ III]] created the [[Medieval Inquisition|Episcopal Inquisition]] to combat\
        \ [[Catharism]] in southern France. Heretics were to be handed over to secular\
        \ authorities for punishment, have their property seized, and face excommunication.\
        \ When this failed to stem the heresy, [[Pope Innocent III]] called forth\
        \ the [[Albigensian Crusade]]. The Crusaders killed 200,000{{sfn|Tatz|Higgins|2016|p=214}}\
        \ to 1,000,000{{sfn|Robertson|1902|p=254}} [[Cathar]]s, perpetrated massacres\
        \ (e.g. at [[Massacre at Béziers|Béziers]]), and burned hundreds at the stake.\
        \ It was the start of a centralization in the fight against heresy,{{sfn|Frassetto|2007|p=68}}{{sfn|Leff|1967|p=37}}\
        \ The [[Dominican Order]] was established to preach against the heresy, later\
        \ serving as inquisitor throughout Europe. In 1252 [[Pope Innocent IV]] issued\
        \ the bull ''[[Ad extirpanda]],'' authorizing inquisitors to use torture against\
        \ heretics.\n\nEuropean Jews became targets, leading to [[Antisemitism in\
        \ Christianity#Massacres|massacres and expulsions]]. While papal bulls sought\
        \ to shield Jews from violence, starting in the twelfth century [[Antisemitism\
        \ in Christianity#Papal restrictions and persecution of Jews|papal bulls also\
        \ prohibited Jews]] from holding public office, required them to wear distinctive\
        \ badges, ordered the burning of the [[Talmud]], limited their employment,\
        \ confined Jews to ghettos, and expelled them from the [[Papal States]], along\
        \ with other restrictions aimed at subordinating Jews.<ref>{{Cite book |last=Tolan\
        \ |first=John |url=https://hal.science/hal-00726485/file/Of_Milk_and_Blood.pdf\
        \ |title=The Legal Status of Religious Minorities in the Euro-Mediterranean\
        \ World (5th – 15th centuries)}}</ref> In 1231 Pope [[Pope Gregory IX|Gregory\
        \ IX]] expanded the [[Papal Inquisition in Spain|Papal Inquisition]] to [[Kingdom\
        \ of Aragon|Aragon]]. Cathars, Jewish converts and others deemed heretics\
        \ were targeted, with trials, imprisonments and executions. Books by Spanish\
        \ friars attacked Jews and Muslims.<ref name=\"JC\" /> In [[Kingdom of Castile|Castile]]\
        \ the Church Synod of Zamora protested rights granted Jews by the king. Calls\
        \ for restrictions on Spanish Jews were made by Popes and Cortes (assemblies\
        \ of the Church, nobles and cities).<ref name=\"JC\" /> Some kings protected\
        \ Jews, since they benefited from Jews' taxes, and Jews serving as courtiers\
        \ and tax collectors.<ref name=\"JC\" /> Others, like [[Alfonso X of Castile|Alfonso\
        \ X]], [[Sancho IV of Castile|Sancho IV]] and [[Henry II of Castile#Policy\
        \ regarding Jews|Henry II]], restricted Jews and exploited anti-Jewish sentiment\
        \ for political gain.<ref name=\"JC\" />{{sfn|Alpert|2001|pp=9–10}}\n\nThe\
        \ [[Shepherds' Crusade (1320)|Shepherds' Crusade]] of 1320, started to help\
        \ reconquer Spain from the Muslims, instead killed hundreds of Jews in France\
        \ and Spain.<ref name=\"JC\">{{Cite book |last=Weisenberg |first=Nathaniel\
        \ |url=https://citeseerx.ist.psu.edu/document?repid=rep1&type=pdf&doi=931cee3c08f2d0a3db4af7422f5e05b1b8c9bd4d\
        \ |title=The Unraveling: Seville The Jews of Castile and the Road to the Riots\
        \ of |date=2010 |publisher=Thesis, Georgetown University}}</ref><ref>{{Cite\
        \ journal |last=Kuzdale |first=Ann |date=1998 |title=Review of Communities\
        \ of Violence: Persecution of Minorities in the Middle Ages by David Nirenberg\
        \ |journal=Journal of the American Academy of Religion |volume=66 |issue=1\
        \ |pages=191–194 |doi=10.1093/jaarel/66.1.191 |issn=0002-7189 |jstor=1466255}}</ref><ref>{{Cite\
        \ journal |last=RAPOPORT |first=DAVID C. |date=2016 |title=Review of Holy\
        \ War, Martyrdom and Terror: Christianity, Violence and the West, ca. 70 C.E.\
        \ to the Iraq War by Philippe Buc |journal=Journal of World History |volume=27\
        \ |issue=2 |pages=332–335 |issn=1045-6007 |jstor=43901855}}</ref> In 1328,\
        \ mobs inflamed by the sermons of Franciscan preacher Pedro Olligoyen massacred\
        \ several Jewish communities in [[Navarre]].<ref name=\"JC\" /><ref>{{Cite\
        \ web |title=NAVARRE - JewishEncyclopedia.com |url=https://www.jewishencyclopedia.com/articles/11390-navarre\
        \ |access-date=2025-04-26 |website=www.jewishencyclopedia.com}}</ref> Years\
        \ of virulent anti-Jewish preaching by [[Ferrand Martínez]], [[Archdeacon]]\
        \ of [[Ecija]], climaxed in the [[Massacre of 1391|massacres of 1391]] when\
        \ riots broke out in Seville, [[Barcelona]], Valencia, Toledo, Mallorca and\
        \ elsewhere, killing thousands of Jews.{{sfn|Peters|1988|p=82}} To save themselves,\
        \ some fled, mainly to North Africa, while an estimated 100,000, or one half\
        \ of all Spanish Jews, converted to Catholicism. Following anti-Jewish riots\
        \ in 1435 in [[Mallorca]], Papal Inquisitor Antonio Murta played a key role\
        \ in forced conversions of local Jews.<ref>{{Cite book |last=Braunstein |first=Baruch\
        \ |title=The Chuetas of Majorca |publisher=Columbia University Press |year=1973\
        \ |isbn= |location=New York |pages=42–43}}</ref> The converts were called\
        \ ''[[conversos]]''. While mostly poor or of modest means, some conversos\
        \ became successful in government and commerce, drawing resentment. Conversos\
        \ were also suspected of continuing to practice Judaism in secret. Periods\
        \ of stress, food shortages, plague and inflation led to attacks on conversos—in\
        \ 1449 in Toledo (conversos were tortured and burned alive there), in 1462\
        \ in Carmona, again in Toledo in 1467, etc. In Cordoba in 1473 mobs killed\
        \ conversos, regardless of sex and age, burning and looting their homes.{{sfn|Alpert|2001|pp=12–13}}\n\
        \n== Activity of the Inquisition ==\n\n===Start of the Inquisition against\
        \ Jewish ''conversos''===\n[[File:Torquemada.jpg|thumb|right|Torquemada is\
        \ buried in the monastery of Saint Thomas at Ávila, and left his own epitaph:\
        \ ''\"Pestem Fugat Haereticam''\" i.e. \"drove away the pestilence of heresy\"\
        .<ref>{{Cite book |last=Gorsky |first=Jeffrey |title=Exiles in Sepharad: The\
        \ Jewish Millennium in Spain |publisher=University of Nebraska Press |year=2015\
        \ |page=246}}</ref>]]\n\n[[Queen Isabella I of Castile|Queen Isabella]] was\
        \ convinced of the existence of [[Crypto-Judaism]] among [[Andalusian people|Andalusian]]\
        \ ''[[conversos]]''<ref>{{cite web |title=Spanish Inquisition Timeline |url=https://www.britannica.com/summary/Spanish-Inquisition-Timeline\
        \ |access-date=15 December 2021 |website=[[Encyclopaedia Britannica]]}}</ref>\
        \ during her stay in [[Seville]] between 1477 and 1478.{{Efn|The terms converso\
        \ and crypto-Jew are somewhat vexed, and occasionally historians are not clear\
        \ on how, precisely, they are intended to be understood. For the purpose of\
        \ clarity, in this article converso will be taken to mean one who has sincerely\
        \ renounced Judaism or Islam and embraced Catholicism. Crypto-Jew will be\
        \ taken to mean one who accepts Christian baptism, yet continues to practice\
        \ Judaism.|name=a}}{{sfn|Sabatini|2018|pp=89-90}} A report, produced by [[Pedro\
        \ González de Mendoza]], Archbishop of Seville, and by the Dominican [[Tomás\
        \ de Torquemada]], confessor to [[Ferdinand II of Aragon|Ferdinand]] and [[Isabella\
        \ I of Castile|Isabella]], corroborated this assertion. The Catholic monarchs\
        \ requested a [[papal bull]] to establish an inquisition in Spain. In 1478\
        \ [[Pope Sixtus IV]] granted the bull ''Exigit sincerae devotionis affectus'',\
        \ to deal with those who had been baptized, but \"revert to the rites and\
        \ customs of the Jews and to keep the dogmas and precepts of the Jewish superstition\
        \ and perfidy.{{nbsp}}... Not only do they themselves persist in their own\
        \ blindness, but also some who are born of them and some who associate with\
        \ them are poisoned by their perfidy.\"<ref name=\"GT2\">{{Cite journal |last=Benjamin\
        \ G. Davis, Andrew Gaudio |title=A Brief History of Insanity: The Gaudio Translation\
        \ |url=https://scholarlycommons.pacific.edu/cgi/viewcontent.cgi?article=1433&context=uoplawreview\
        \ |journal=University of the Pacific Law Review |volume=53 |page=719}}</ref>\
        \ To \"expel this perfidy\", \"to convert the infidels to the proper faith\"\
        ,<ref name=\"GT2\" /> and punish all those \"guilty of such crimes along with\
        \ their harborers and followers,\" the bull permitted the monarchs to select\
        \ and appoint three bishops or priests to act as inquisitors.{{sfn|Peters|1988|p=85}}\n\
        \nThe first two inquisitors, the [[Dominican Order|Dominicans]] Miguel de\
        \ Morillo and [[Juan de San Martín]] were named two years later, on 27 September\
        \ 1480.{{sfn|Sabatini|2018|p=107–108}} The first ''[[Auto-da-fé|auto de fé]]''\
        \ execution was held in Seville on 6 February 1481: six people were burned\
        \ alive.{{sfn|Kamen|1998|p=47}} Thousands of conversos fled in terror, depopulating\
        \ large parts of the country, hurting commerce. Government revenues declined,\
        \ but the Queen was interested in \"the purity of her lands\", stating, per\
        \ the chronicler Hernando del Pulgar, \"the essential thing was to cleanse\
        \ the country of that sin of heresy\".{{sfn|Kamen|1998|p=47}}\n\nThe scale\
        \ of the operations required more resources. Accordingly, in February 1481,\
        \ Pope Sixtus IV appointed seven more inquisitors, all Dominican friars. One\
        \ of them was [[Tomás de Torquemada]].{{sfn|Kamen|1998|p=47}} The Inquisition\
        \ grew rapidly in the [[Kingdom of Castile]]. By 1492, tribunals existed in\
        \ eight Castilian cities: [[Ávila, Spain|Ávila]], [[Córdoba, Spain|Córdoba]],\
        \ [[Jaén, Spain|Jaén]], [[Medina del Campo]], [[Segovia]], [[Sigüenza]], [[Toledo,\
        \ Spain|Toledo]], and [[Valladolid]]. In 1482 Ferdinand sought to take over\
        \ the existing [[Papal Inquisition in Spain|Papal Inquisition in Aragon]],\
        \ which led to resistance since it infringed on local rights. Relatives and\
        \ others complained of the brutality to the Pope, who wanted to maintain control\
        \ of the inquisition.{{sfn|Kamen|1998|p=49}}\n\nOn 18 April 1482, Pope Sixtus\
        \ IV promulgated what historian Henry Charles Lea called \"the most extraordinary\
        \ [[papal bull|bull]] in the history of the Inquisition,\" \"Ad Perpetuam\
        \ Rei memoriam\", affirming that:<ref name=\"K92\">Date mentioned in that\
        \ book you cited in {{harvp|Kamen|1998|p=49}}</ref>\n{{Blockquote|... in Aragon,\
        \ Valencia, Mallorca and Catalonia the Inquisition has for some time been\
        \ moved not by zeal for the faith and the salvation of souls, but by lust\
        \ for wealth, and that many true and faithful Christians, on the testimony\
        \ of enemies, rivals, slaves and other lower and even less proper persons,\
        \ have without any legitimate proof been thrust into secular prisons, tortured\
        \ and condemned as relapsed heretics, deprived of their goods and property\
        \ and handed over to the secular arm to be executed, to the peril of souls,\
        \ setting a pernicious example, and causing disgust to many.<ref name=\"K92\"\
        \ />}}Historian Henry Charles Lea wrote that the Pope sought to treat heresy\
        \ like as other crimes.<ref name=\"K92\" /> According to ''A History of the\
        \ Jewish People'',{{Blockquote|In 1482 the pope was still trying to maintain\
        \ control over the Inquisition and to gain acceptance for his own attitude\
        \ towards the [[New Christian]]s which was generally more moderate than that\
        \ of the Inquisition and the local rulers.}}<ref name=AHJP>{{Cite book |editor-last=Malamat\
        \ |editor-first=Abraham |editor-last2=Ben-Sasson |editor-first2=H.H. |url={{google\
        \ books |plainurl=y |id=2kSovzudhFUC |page=588}} |title=A History of the Jewish\
        \ People |date=1976 |publisher=Harvard University Press |isbn=978-0-674-39731-6\
        \ |language=en}}</ref> Outraged, Ferdinand feigned doubt about the bull's\
        \ veracity, arguing that no sensible pope would have published such a document.\
        \ He wrote the pope on 13 May 1482, saying: \"Take care therefore not to let\
        \ the matter go further, and to revoke any concessions and entrust us with\
        \ the care of this question.\"{{sfn|Kamen|1998|pp=49–50}} The Pope suspended\
        \ the bull, then switched to full cooperation, by issuing a new bull on October\
        \ 17, 1483, with which he appointed Torquemada Inquisitor General of Aragon,\
        \ Catalonia and Valencia, thus uniting all Spanish activity under a single\
        \ leader.{{sfn|Kamen|1998|p=50}} Setting to work immediately, they burned\
        \ the first converses at the stake in Aragon in 1484. Opposition continued\
        \ in Aragon and Catalonia, which sought to maintain local control. [[Pope\
        \ Innocent VIII]] then resolved the issue by withdrawing all papal inquisitors\
        \ from Aragon and Catalonia, thus relinquishing full control to Torquemada,\
        \ specifying that all appeals be addressed by Torquemada.{{sfn|Kamen|1998|pp=50–51}}\n\
        \nThe Spanish Inquisition expanded to other territories under the Spanish\
        \ Crown – [[Southern Italy]], including [[Sicily]] and [[Sardinia]], and Central\
        \ and South America, with tribunals in [[Lima]], Peru, [[Mexico City]] and\
        \ [[Cartagena, Colombia|Cartagena]] (present-day [[Colombia]]).\n\n=== Trials\
        \ ===\n[[File:An_auto-da-fé_of_the_Spanish_Inquisition_and_the_execution_o_Wellcome_V0041892.jpg|thumb|300x300px|Burning\
        \ of heretics at stakes (''auto-da-fé'') in a marketplace during the Spanish\
        \ Inquisition.]]\nTomás de Torquemada established Inquisition procedures in\
        \ 1484, creating a 28-article code, ''Compilación de las instrucciones del\
        \ oficio de la Santa Inquisición'', based on Nicholas Eymerich's ''Directorium\
        \ Inquisitorum''. That code remained largely unchanged for over three centuries.<ref>{{Cite\
        \ book |last=Torquemada |first=Tomás de |url=https://archive.org/details/BRes14068130Despacho\
        \ |title=Compilacion de las Instrucciones del Oficio de la Santa Inquisicion\
        \ |publisher=Diego Diaz de la Carrera |publication-date=1667 |language=es}}</ref>{{sfn|Sabatini|2018|pp=142,\
        \ 147}}{{sfn|Pérez|2005|p=135}} The state deemed heresy to be treason, punishable\
        \ by death. Courts announced a 30-day grace period for self-confessions and\
        \ denunciations, requiring individuals to report themselves and others, including\
        \ relatives and friends, for attending Jewish prayer meetings.{{sfn|Pérez|2005|p=136}}\
        \ Inquisitors collected accusations from neighbors. Signs of crypto-Judaism\
        \ included no chimney smoke on Saturdays, buying many vegetables before [[Passover]],\
        \ or purchasing meat from a converted butcher. Courts presumed the accused\
        \ guilty, withholding accusers' identities.{{sfn|Pérez|2005|p=145}} Trials\
        \ aimed to extract confessions, often using water torture, the [[Rack (torture)|rack]],\
        \ or suspending individuals by their wrists with weights tied to their feet,\
        \ repeatedly raising and dropping them.{{sfn|Pérez|2005|p=148}}\n\nConfessions\
        \ occurred publicly at ''autos-da-fé''. Legal expert Francisco Peña stated\
        \ in 1578 that trials and executions aimed to ensure public good and instill\
        \ fear, requiring public sentencing \"for education and to terrify\".{{sfn|Pérez|2005|p=154}}\
        \ These ceremonies rivaled bullfights in popularity. In 1680, King Charles\
        \ II marked his marriage with an ''auto-da-fé'' in Madrid, drawing 50,000\
        \ spectators and sentencing 118 individuals, mostly Jewish conversos, to severe\
        \ penalties, including execution by burning.<ref>{{Cite web |title=Spanish\
        \ Inquisition's Grandiose Auto-da-Fé |url=https://www.ebsco.com/research-starters/history/spanish-inquisitions-grandiose-auto-da-fe\
        \ |access-date=2025-05-13 |website=www.ebsco.com |language=en}}</ref><ref\
        \ name=\":2\">{{Cite journal |last=Graizbord |first=David |date=2006 |title=Inquisitorial\
        \ Ideology at Work in an Auto De Fe, 1680: Religion in the Context of Proto-Racism\
        \ |url=https://www.academia.edu/28488233 |journal=Journal of Early Modern\
        \ History |volume=10 |issue=4 |pages=331–360 |doi=10.1163/157006506779141560\
        \ |issn=1385-3783}}</ref> Confessed individuals faced punishments like penance,\
        \ public flogging, exile, or servitude as galley slaves, common in the 16th\
        \ century.{{sfn|Pérez|2005|p=151}} Others received prison sentences, from\
        \ years to life, with near universal property confiscation, even for repentant\
        \ heretics.<ref name=\":1\">{{Cite book |last=Alpert |first=Michael |url=https://www.academia.edu/54526539\
        \ |title=Cryptojudaism and the Spanish Inquisition |date=2001 |isbn=978-0-333-98526-7\
        \ |page=23}}</ref>\n\nBetween 1536 and 1543, eight courts seized 87 million\
        \ maravedis from victims.<ref name=\":1\" /> Reconciled individuals could\
        \ not hold public or church positions, nor work as tax collectors, pharmacists,\
        \ or doctors, with restrictions extending to their descendants.{{sfn|Pérez|2005|p=153}}\
        \ Non-confessors or relapsed individuals faced death.{{sfn|Pérez|2005|pp=135-136}}<ref\
        \ name=AHJP/>\n\nThe Inquisition peaked from 1480 to 1530, with estimates\
        \ of 2,000 executions, mostly Jewish conversos.{{sfn|Kamen|2014|p=68}} In\
        \ Valencia, 91.6% of those judged between 1484 and 1530 were of Jewish origin,\
        \ and 99.3% in Barcelona from 1484 to 1505.{{sfn|Kamen|2014|p=65}} From 1531\
        \ to 1560, converso trials dropped to 3%. Persecutions rose again after discovering\
        \ crypto-Jews in Quintanar de la Orden in 1588 and denunciations increased\
        \ in the 1590s.\n\nIn the early 17th century, some conversos returned from\
        \ Portugal, escaping its Inquisition. Spanish Inquisitor General Antonio Zapata\
        \ and others reported \"strong evidence of Judaism\", prompting more trials,\
        \ including financiers and artisans. The 1680 Madrid ''auto-da-fé'' sentenced\
        \ 118, with 21, mostly immigrant Jewish conversos, executed. Dominican Thomas\
        \ Navarro's sermon blamed Jews for denying Christ, using medieval anti-Jewish\
        \ arguments and racist terms like \"stubborn nation\" and \"perfidious\",\
        \ tied to blood purity concepts.<ref name=\":2\" />\n\nIn 1691, Mallorca's\
        \ ''autos-da-fé'' burned 37 chuetas, or local conversos, alive.{{sfn|Kamen|2014|p=369}}\
        \ Accusations of conversos declined in the 18th century. Manuel Santiago Vivar,\
        \ tried in Córdoba in 1818, was the last prosecuted for crypto-Judaism.{{sfn|Kamen|2014|p=370}}\n\
        \n=== Expulsion of Jews and Jewish ''conversos'' ===\n{{anchor|Expulsion of\
        \ Jews and conversos|reason=Corrected punctuation in section title, retaining\
        \ for incoming links.}} \n{{Main|Expulsion of Jews from Spain}}\n\nThe Spanish\
        \ Inquisition aimed to prevent conversos from practicing Judaism. Torquemada\
        \ persuaded the monarchs that unbaptized Jews remained a threat, leading to\
        \ the 1492 [[Alhambra Decree]] expelling all Jews. The decree stated that\
        \ Christian-Jewish interactions caused \"great harm\" to Christians through\
        \ contact and communication. It ordered all Jews, regardless of age, to leave\
        \ the kingdom and never return, under penalty of death and property confiscation.\
        \ Assisting or sheltering Jews incurred severe penalties, including loss of\
        \ possessions and titles.<ref name=\"Decree-translation\">{{Cite web |title=The\
        \ Edict of Expulsion of the Jews – 1492 Spain |url=http://www.sephardicstudies.org/decree.html\
        \ |access-date=27 June 2017 |website=www.sephardicstudies.org}}</ref>\n\n\
        Estimates of expelled Jews vary. Early accounts by [[Juan de Mariana]] speaks\
        \ of 800,000 people, and [[Don Isaac Abravanel]] claimed 300,000, while modern\
        \ estimates, based on tax returns and population data, suggest 80,000 Jews\
        \ and 200,000 conversos lived in Spain, with about 40,000 emigrating.{{sfn|Kamen|1998|pp=29–31}}\
        \ Joseph Pérez estimates 50,000 to 100,000 expelled.<ref>{{Cite book |last=Pérez\
        \ |first=Joseph |url={{google books|plainurl=y|id=q_6AjgEACAAJ}} |title=The\
        \ Spanish Inquisition: A History |date=2012 |publisher=Notable Trials Library\
        \ |page=36 |language=en}}</ref>\n\nExpelled Jews, known as [[Sephardic Jews]],\
        \ from Castile mainly fled to Portugal, where forced conversion occurred in\
        \ 1497, followed by expulsions under the [[Portuguese Inquisition]]. Others,\
        \ called ''[[Megorashim]] ''(\"expelled\" in Hebrew), migrated to Morocco\
        \ and North Africa. Jews from Aragon often went to Italy, not Muslim lands.{{sfn|Kamen|1998|p=24}}\
        \ [[History of the Jews in Sicily|Sicily]], under Spanish rule, with 25,000–37,000\
        \ Jews, also faced expulsions in 1492. After Spain annexed [[History of the\
        \ Jews in Naples|Naples]], [[History of the Jews in Apulia|Apulia]] and [[History\
        \ of the Jews in Calabria|Calabria]] (1510–1535), Jews there were expelled.<ref\
        \ name=\"Lewis\">{{cite book|first=Bernard |last=Lewis |title=Islam |publisher=Gallimard\
        \ |year=2005 |pages=563–567}}</ref> Many settled in the Ottoman Empire, particularly\
        \ Thessaloniki, where expellees built synagogues named after Castile, Aragon,\
        \ and Catalonia in 1492–1493, with three more added by 1502 for those expelled\
        \ from Spanish-controlled Sicily, Apulia, and Calabria.<ref name=\"Lewis\"\
        />\n\nMost conversos assimilated into Catholic culture, but a minority secretly\
        \ practiced Judaism, gradually migrating to Europe, North Africa, and the\
        \ [[Ottoman Empire]], often joining existing Sephardic communities.{{sfn|Murphy|2012|p=[https://archive.org/details/godsjuryinquisit0000murp/page/75\
        \ 75]}} Persecution of conversos peaked in 1530, followed by blood purity\
        \ laws (''limpieza de sangre''), introducing racial discrimination and antisemitism\
        \ that persisted into the 19th and 20th centuries. Jews could return to Spain\
        \ in 1868 under a new constitutional monarchy that allowed religious diversity,\
        \ but the expulsion decree remained until 1968, limiting communal Jewish practice.<ref>{{Cite\
        \ web |last=Congress |first=World Jewish |title=Spain |url=https://www.worldjewishcongress.org/en/about/communities/es\
        \ |access-date=2025-06-22 |website=World Jewish Congress |language=EN}}</ref>\n\
        \n=== Expulsion of Muslim ''conversos'' ===\n{{anchor|Expulsion of the Moriscos\
        \ and Morisco conversos|reason=Retained for incoming links due to previous\
        \ longer section name.}}\nThe Inquisition targeted Moriscos, converts from\
        \ Islam, for suspected secret practice of their former faith. A decree on\
        \ 14 February 1502 forced Muslims in Granada to convert to Christianity or\
        \ face expulsion.<ref name=\"Prien20122\" /> In the Crown of Aragon, most\
        \ Muslims faced this choice after the [[Revolt of the Brotherhoods]] (1519–1523).\
        \ Expulsion enforcement varied, often ignored in interior and northern regions\
        \ where Moriscos, protected by locals, had coexisted for over five centuries.{{Citation\
        \ needed|date=February 2021}} Moriscos were suspected of aiding [[Barbary\
        \ pirate]]s backed by Spain's enemy, the [[Ottoman Empire]], regularly [[Spanish\
        \ relations with the Barbary coast|raided the coast]].\n\nThe [[War of the\
        \ Alpujarras]] (1568–1571), a Muslim and Morisco uprising in Granada anticipating\
        \ Ottoman support, led to the forced dispersal of about half the region's\
        \ Moriscos across Castile and Andalusia, heightening Spanish authorities'\
        \ suspicions.{{Citation needed|date=February 2021}} Many Moriscos guarded\
        \ their domestic privacy, fueling suspicions of secret Islamic practices.{{sfn|Scott|1959|p=259}}\
        \ Unlike crypto-Jews, Moriscos initially faced evangelization rather than\
        \ harsh persecution. Absent records, the Inquisition deemed all Moors baptized,\
        \ thus Moriscos, subject to its authority. A 1526 decree allowed 40 years\
        \ of religious instruction before prosecution. Fifty Moriscos were executed\
        \ before clarification. Moriscos, often poor, rural, Arabic-speaking laborers,\
        \ received limited Church education efforts.{{sfn|Green|2007|pp=124–127}}\
        \ In Valencia and Aragon, noble jurisdiction protected many Moriscos, as persecution\
        \ threatened the economy.\n\nLate in Philip II's reign, tensions escalated.\
        \ The 1568–1570 [[Rebellion of the Alpujarras (1568–1571)|Morisco Revolt]]\
        \ in Granada faced harsh suppression, and the Inquisition intensified focus\
        \ on Moriscos. From 1560 to 1571, Moriscos comprised 82% of Granada's tribunal\
        \ cases, dominating tribunals in Zaragoza and Valencia.{{sfn|Kamen|1998|p=217}}\
        \ They faced less severe treatment than Judaizing conversos or Protestants,\
        \ with fewer executions.{{sfn|Kamen|1998|p=225}} In 1609, King [[Philip III\
        \ of Spain|Philip III]], advised by the [[Duke of Lerma]] and Archbishop [[Juan\
        \ de Ribera (bishop of Santa Cruz de la Sierra)|Juan de Ribera]], ordered\
        \ the Moriscos' expulsion. Ribera cited Old Testament texts urging the destruction\
        \ of God's enemies to justify the decree.{{sfn|Lea|1901|p=308}} The edict\
        \ mandated Moriscos leave under penalty of death and confiscation, taking\
        \ only what they could carry, without money, bullion, jewels, or bills of\
        \ exchange.{{sfn|Lea|1901|p=345}} Estimates suggest 300,000 Moriscos, or 4%\
        \ of Spain's population, were expelled, though Trevor J. Dadson argues the\
        \ impact was less severe in many regions.<ref name=\"bibliotecaspublicas.es\"\
        >{{cite journal|first=Trevor J. |last=Dadson |url=http://www.bibliotecaspublicas.es/villarrubiadelosojos/imagenes/Dadson_Assimilation_Reality_or_Fiction.pdf\
        \ |title=The Assimilation of Spain's Moriscos: Fiction or Reality? |archive-url=https://web.archive.org/web/20130612121737/http://www.bibliotecaspublicas.es/villarrubiadelosojos/imagenes/Dadson_Assimilation_Reality_or_Fiction.pdf\
        \ |archive-date=12 June 2013 |journal=Journal of Levantine Studies |volume=1\
        \ |issue=2 |year=2011 |pages=11–30}}</ref> Valencia, with high ethnic tensions,\
        \ suffered economic collapse and depopulation.{{Citation needed|date=February\
        \ 2021}}\n\nMost expelled Moriscos settled in the [[Maghreb]] or [[Barbary\
        \ Coast]].<ref>{{cite journal|last=Boase|first=Roger|date=4 April 2002|title=The\
        \ Muslim Expulsion from Spain|journal=History Today|volume=52|issue=4|quote=Most\
        \ permanently expelled settled in the Maghreb or Barbary Coast, especially\
        \ in Oran, Tunis, Tlemcen, Tetuán, Rabat, and Salé. Many traveled overland\
        \ to France, but after Henry of Navarre's assassination in 1610, they emigrated\
        \ to Italy, Sicily, or Constantinople.}}</ref> Those avoiding expulsion or\
        \ returning assimilated into the dominant culture.<ref name=\"Susan M 2008\"\
        >{{cite journal |last1=Adams |first1=Susan M. |last2=Bosch |first2=Elena |last3=Balaresque\
        \ |first3=Patricia L. |last4=Ballereau |first4=Stéphane J. |last5=Lee |first5=Andrew\
        \ C. |last6=Arroyo |first6=Eduardo |last7=López-Parra |first7=Ana M. |last8=Aler\
        \ |first8=Mercedes |last9=Grifo |first9=Marina S. Gisbert |last10=Brion |first10=Maria\
        \ |last11=Carracedo |first11=Angel |last12=Lavinha |first12=João |last13=Martínez-Jarreta\
        \ |first13=Begoña |last14=Quintana-Murci |first14=Lluis |last15=Picornell\
        \ |first15=Antònia |last16=Ramon |first16=Misericordia |last17=Skorecki |first17=Karl\
        \ |last18=Behar |first18=Doron M. |last19=Calafell |first19=Francesc |last20=Jobling\
        \ |first20=Mark A. |date=December 2008 |title=The Genetic Legacy of Religious\
        \ Diversity and Intolerance: Paternal Lineages of Christians, Jews, and Muslims\
        \ in the Iberian Peninsula |journal=The American Journal of Human Genetics\
        \ |volume=83 |issue=6 |pages=725–736 |doi=10.1016/j.ajhg.2008.11.007 |pmc=2668061\
        \ |pmid=19061982|issn=0002-9297}}</ref> At the Inquisition's peak, Morisco\
        \ cases comprised under 10% of trials.{{Citation needed|date=February 2021}}\
        \ In 1621, Philip IV ordered a halt to harsh measures against Moriscos. In\
        \ 1628, the Council of the Supreme Inquisition instructed Seville inquisitors\
        \ to prosecute expelled Moriscos only for significant disturbances.<ref>[http://revistas.ucm.es/index.php/CHMO/article/view/37358/36158\
        \ Michel Boeglin: ''La expulsión de los moriscos de Andalucía y sus límites.\
        \ El caso de Sevilla (1610–1613)''] (In Spanish)</ref> The last major prosecution\
        \ for crypto-Islamic practices occurred in Granada in 1727, with most receiving\
        \ light sentences. By the late 18th century, indigenous Islamic practices\
        \ had ceased in Spain.<ref>{{Cite journal |last=Soria Mesa |first=Enrique\
        \ |date=2012 |title=Los moriscos que se quedaron. La permanencia de la población\
        \ de origen islámico en la España Moderna: Reino de Granada, siglos XVII-XVIII\
        \ |url=https://dialnet.unirioja.es/servlet/articulo?codigo=4040221 |journal=Vínculos\
        \ de Historia |issue=1 |pages=205–230 |issn=2254-6901|quote=The Moriscos who\
        \ remained. The permanence of Islamic origin population in Early Modern Spain:\
        \ Kingdom of Granada, XVII–XVIII centuries}} (In Spanish)</ref>\n\n=== Blood\
        \ purity ===\n\nDuring the Spanish Inquisition, ''[[limpieza de sangre]]''\
        \ (blood purity statutes) targeted Jewish and Muslim converts to Christianity,\
        \ introducing race-based discrimination and antisemitism. Toledo enacted the\
        \ first statute in 1449 after anti-converso riots and killings.<ref name=\"\
        Chami\">{{cite web |last=Chami |first=Pablo A. |title=Estatutos de Limpieza\
        \ de Sangre |trans-title=Statutes of Cleanliness of Blood |url=http://pachami.com/Inquisicion/LimpiezaSangre.html\
        \ |archive-url=https://web.archive.org/web/20230320155548/http://pachami.com/Inquisicion/LimpiezaSangre.html\
        \ |archive-date=20 March 2023 |language=es}}</ref> That statute barred conversos\
        \ or those with converted parents or grandparents from holding public or private\
        \ office or testifying in court. In 1496, [[Pope Alexander VI]] approved a\
        \ purity statute for the [[Hieronymites]].<ref name=\"Chami\" /> Religious\
        \ and military orders, guilds, and other groups added bylaws requiring proof\
        \ of \"clean blood.\" Converso families faced discrimination or resorted to\
        \ bribing officials and forging documents to claim Christian ancestry.<ref>{{cite\
        \ book |last=Martínez |first=María Elena |title=Genealogical Fictions: Limpieza\
        \ de sangre, religion, and gender in colonial Mexico |date=2008 |publisher=[[Stanford\
        \ University Press]] |location=Stanford, California}}</ref>\n\nBy 1530, Inquisition\
        \ tribunals required towns to maintain genealogy registers, labeling married\
        \ men and their families as Old Christians or conversos, marking them as \"\
        pure\" or \"impure.\" Investigations and trials followed if individuals lacked\
        \ proof of pure lineage or faced suspicion of lying. By the 16th century,\
        \ these statutes systematically excluded conversos from Church and state roles,\
        \ fostering fear, hostile witnesses, and perjury. A single Jewish ancestor\
        \ could cost a family everything, laying the groundwork for race-based [[antisemitism]].<ref>{{Cite\
        \ journal |last=Williams |first=Patrick |date=July 1990 |title=A Jewish Councillor\
        \ of Inquisition? Luis de Mercado, the Statutes of limpieza de sangre and\
        \ the Politics of Vendetta (1598–1601) |url=https://www.tandfonline.com/doi/full/10.1080/1475382902000367253\
        \ |journal=[[Bulletin of Hispanic Studies]] |language=en |volume=67 |issue=3\
        \ |pages=253–264 |doi=10.1080/1475382902000367253 |issn=0007-490X |url-access=subscription}}</ref>\n\
        \nThese statutes hindered Spaniards emigrating to the Americas, as proof of\
        \ no recent Muslim or Jewish ancestry was required for travel to the [[Spanish\
        \ Empire]]. In 1593, the [[Jesuits]] adopted the ''Decree de genere'', barring\
        \ those with any Jewish or Muslim ancestry, however distant, from joining\
        \ the Society of Jesus, applying Spain's blood purity principle globally.<ref\
        \ name=\":0\">{{cite journal |last1=Rosa |first1=De La |last2=Coello |first2=Alexandre\
        \ |year=1932 |title=El Estatuto de Limpieza de Sangre de la Compañía de Jesús\
        \ (1593) y su influencia en el Perú Colonial |trans-title=The Statute of Purity\
        \ of Blood of the Society of Jesus (1593) and its influence in Colonial Peru\
        \ |url=http://cat.inist.fr/?aModele=afficheN&cpsidt=24437295 |journal=Archivum\
        \ Historicum Societatis Iesu |issue=159 |language=es |publisher=Institutum\
        \ Societatis Iesu |pages=45–93 |issn=0037-8887 |archive-url=https://web.archive.org/web/20141026074808/http://cat.inist.fr/?aModele=afficheN&cpsidt=24437295\
        \ |archive-date=26 October 2014 |access-date=7 December 2012}}</ref> Blood\
        \ purity tests declined by the 18th century, but persisted into the 19th century\
        \ in some areas. In Mallorca, no [[Xueta]] (descendants of Mallorcan Jewish\
        \ conversos) priests could perform Mass in a cathedral until the 1960s.{{sfn|Pérez|2005b|p=}}{{page\
        \ needed|date=June 2025}}\n\n=== Christian heretics ===\n\n==== Protestantism\
        \ ====\n[[File:Anneken Hendriks, Dam, Amsterdam, by Jan Luyken.jpg|thumb|The\
        \ burning of a Dutch [[Anabaptist]], Anneken Hendriks, who was charged with\
        \ heresy in [[Amsterdam]] (1571)]]\n\nThe Spanish Inquisition rarely targeted\
        \ Protestants due to their limited presence.{{sfn|Kamen|2014|p=100}} It labeled\
        \ anyone offending the Church as \"Lutheran.\" Early trials focused on the\
        \ [[Alumbrados]], a mystical sect in [[Guadalajara (province)|Guadalajara]]\
        \ and [[Valladolid]], leading to long prison sentences but no executions.\
        \ These cases prompted the Inquisition to pursue intellectuals and clerics\
        \ influenced by [[Erasmian]] ideas, diverging from orthodoxy. Charles I and\
        \ [[Philip II of Spain|Philip II]] admired [[Erasmus]].{{sfn|Kamen|2014|p=94}}{{sfn|Kamen|2014|p=126}}\n\
        \nFrom 1558 to 1562, under Philip II, the Inquisition prosecuted Protestant\
        \ communities in [[Valladolid]] and Seville, totaling about 120 people.{{efn|These\
        \ trials, especially in Valladolid, inspired ''[[The Heretic: A Novel of the\
        \ Inquisition]]'' by Miguel Delibes (Overlook: 2006).}} That period saw heightened\
        \ Inquisition activity, with several ''[[auto-da-fé|autos de fe]]'', some\
        \ attended by royalty, resulting in about 100 executions.{{sfn|Kamen|1998|p=99}}\
        \ [[Henry Kamen]] notes that from 1559 to 1566, Spain executed around 100\
        \ for heresy, compared to twice as many in England under [[Mary I of England|Mary\
        \ Tudor]], three times as many in France, and ten times as many in the [[Low\
        \ Countries]].{{sfn|Kamen|2014|pp=102–108}} These mid-century autos de fe\
        \ nearly eliminated Spanish Protestantism, a small movement initially.{{sfn|Kamen|2014|pp=102–108}}\n\
        \nAfter 1562, repression lessened, though trials continued. In the late 16th\
        \ century, about 200 Spaniards faced Protestantism accusations. Most were\
        \ not actual Protestants; inquisitors or accusers marked irreligious acts,\
        \ drunken mockery, or anticlerical comments as \"Lutheran.\" Disrespecting\
        \ church images or eating meat on forbidden days also indicated heresy.{{sfn|Kamen|1998|p=98}}\
        \ Roughly 12 Spaniards were burned for Protestantism during that time.{{sfn|Kamen|1998|pp=99–100}}\n\
        \nThe Inquisition often treated Protestantism as a sign of foreign influence\
        \ or political disloyalty rather than a religious issue.<ref>{{cite web |last=Rodriguez-Sala\
        \ |first=Maria Luisa |title=Los Protestantes y la Inquisición |publisher=UNAM\
        \ |url=https://archivos.juridicas.unam.mx/www/bjv/libros/6/2905/6.pdf |language=es\
        \ |access-date=14 January 2022}}</ref>\n\n==== Orthodox Christianity ====\n\
        Even though the Inquisition had theoretical permission to investigate Orthodox\
        \ schismatics, it rarely did. No major war came between Spain and any Orthodox\
        \ country, lacking reasons to do so. One casualty was tortured by \"Jesuits\"\
        \ (though most likely [[Franciscans]]) who administered the Spanish Inquisition\
        \ in North America, according to authorities within the [[Eastern Orthodox\
        \ Church]]: St. [[Peter the Aleut]]. Even that single report has various \
        \ inaccuracies that make it problematic, and  confirmation in the Inquisitorial\
        \ archives.{{Citation needed|date=September 2025}}\n\n==== Freemasonry ====\n\
        {{Further|Papal ban of Freemasonry|In eminenti apostolatus}}\n\nThe Roman\
        \ Catholic Church has regarded [[Freemasonry]] as heretical since about 1738;\
        \ the ''suspicion'' of Freemasonry was potentially a capital offence. Spanish\
        \ Inquisition records reveal two prosecutions in Spain and only a few more\
        \ throughout the Spanish Empire.{{sfn|Green|2007|p=320}} In 1815, [[Francisco\
        \ Javier de Mier y Campillo]], the [[Inquisitor General]] of the Spanish Inquisition\
        \ and the [[Bishop of Almería]], suppressed Freemasonry and denounced the\
        \ lodges as \"societies which lead to atheism, to sedition and to all errors\
        \ and crimes.\"<ref name=\"Denslow\">William R. Denslow, [[Harry S. Truman]]:\
        \ ''10,000 Famous Freemasons'', {{ISBN|1-4179-7579-2}}.</ref> He then instituted\
        \ a purge during which [[Spaniards]] could be arrested on the charge of being\
        \ \"suspected of Freemasonry\".<ref name=\"Denslow\" />\n\n=== Censorship\
        \ ===\nAs part of the [[Counter-Reformation]], the Spanish Inquisition issued\
        \ \"Indexes\" of prohibited books to curb heretical ideas. Other places in\
        \ Europe had similar lists a decade before the Inquisition's first, published\
        \ in 1551, a reprint of the 1550 [[Old University of Leuven|University of\
        \ Leuven]] Index. Further Spanish Indexes appeared in 1559, 1583, 1612, 1632,\
        \ and 1640. The 1559 Index spanned 72 pages, while the 1667 ''Novus Index\
        \ Prohibitorum et Expurgatorum'' reached 1300 pages.<ref name=\":3\">{{Cite\
        \ web |title=Introduction to Inquisition Censorship Documents |url=https://inquisition.library.nd.edu/genre-censorship-introduction\
        \ |archive-url=https://web.archive.org/web/20211126232059/https://inquisition.library.nd.edu/genre-censorship-introduction\
        \ |archive-date=26 November 2021 |access-date=2025-06-23 |website=Hesburgh\
        \ Libraries Rare Books and Special Collections |language=en}}</ref> The Catholic\
        \ Church's ''[[Index Librorum Prohibitorum]]'' banned thousands of books from\
        \ 1560 to 1966.\n\nSome notable [[Spanish literature]] works, mostly plays\
        \ and religious texts, appeared in the Indexes.<ref name=\"BleibergIhrie1993\"\
        >{{cite book |last1=Bleiberg |first1=Germán |url={{google books|plainurl=y|id=bsvkun_p3SgC|page=374}}\
        \ |title=Dictionary of the Literature of the Iberian Peninsula |last2=Ihrie\
        \ |first2=Maureen |last3=Pérez |first3=Janet |publisher=Greenwood Publishing\
        \ Group |year=1993 |isbn=978-0-313-28731-2}}</ref> Several religious writers,\
        \ now considered saints, had works listed. In early modern Spain, books required\
        \ prepublication approval from secular and religious authorities, sometimes\
        \ with modifications. Even approved texts faced later censorship, occasionally\
        \ decades after publication. As Catholic theology evolved, some texts were\
        \ removed from the Index. Initially, inclusion meant total prohibition, but\
        \ this proved impractical and counterproductive for educating clergy. Inquisition\
        \ officials began expurgating texts by blotting out specific words or passages,\
        \ allowing these versions to circulate. Some historians argue that strict\
        \ control was unenforceable, permitting more cultural freedom than commonly\
        \ thought. Irving Leonard revealed that romances like ''[[Amadis de Gaula|Amadis\
        \ of Gaul]]'' reached the New World despite royal bans, with Inquisition approval.\
        \ In the 18th century, the [[Age of Enlightenment]] led to more licenses for\
        \ possessing prohibited texts.\n\nThe Inquisition's censorship did not halt\
        \ the [[Spanish Golden Age|Siglo de Oro]], though many major authors, including\
        \ [[Bartolomé Torres Naharro]], [[Juan del Enzina]], [[Jorge de Montemayor]],\
        \ [[Juan de Valdés]], [[Lope de Vega]], the anonymous ''[[Lazarillo de Tormes]]'',\
        \ and Hernando del Castillo's ''Cancionero General'', appeared on the Index.\
        \ ''[[La Celestina]]'' faced expurgation in 1632 and a full ban in 1790. Non-Spanish\
        \ authors like [[Ovid]], [[Dante]], [[Rabelais]], [[Ariosto]], [[Machiavelli]],\
        \ [[Erasmus]], [[Jean Bodin]], [[Valentin Naboth#cite note-13|Valentine Naibod]],\
        \ and [[Thomas More|Tomás Moro]] were prohibited. A prominent case involved\
        \ [[Fray Luis de León]], a converso humanist and religious writer, imprisoned\
        \ from 1572 to 1576 for translating the [[Song of Songs]] from Hebrew.\n\n\
        The Inquisition stifled free and scientific thought. One exiled Spaniard lamented,\
        \ \"Our country is a land of pride and envy ... barbarism; one cannot produce\
        \ culture without suspicion of heresy, error, and Judaism\".<ref name=\"Walkley2010\"\
        >{{cite book |last=Walkley |first=Clive |url={{google books|plainurl=y|id=RzDMukD8yYAC|page=7}}\
        \ |title=Juan Esquivel: A Master of Sacred Music During the Spanish Golden\
        \ Age |publisher=Boydell & Brewer |year=2010 |isbn=978-1-84383-587-5}}</ref>\
        \ While Europe embraced the Enlightenment, Spain stagnated, though this view\
        \ is debated.{{according to whom|date=October 2021}}\n\nCensorship proved\
        \ ineffective, as banned books circulated widely. The Inquisition rarely targeted\
        \ scientists, and few scientific works appeared on the Index. Spain enjoyed\
        \ more political freedom than other absolute monarchies from the 16th to 18th\
        \ centuries, influenced by [[hermeticist]] religious ideas and early [[enlightened\
        \ absolutism]].{{sfn|Kamen|2005|pp=126–130}} The Index aimed to protect laypeople\
        \ from misinterpreting symbolic or complex texts, not to condemn the works\
        \ outright. Scholars often accessed these books freely, and most banned texts,\
        \ carefully collected by [[Philip II of Spain|Philip II]] and [[Philip III\
        \ of Spain|Philip III]], remain in the [[Monasterio del Escorial]] library,\
        \ accessible to intellectuals and clergy after Philip II's death. The Inquisition\
        \ rarely intervened, though it occasionally urged the king to limit collecting\
        \ grimoires or magic-related texts.{{citation needed|date=October 2021}}\n\
        \n=== Offenses ===\nIn 15th-century Spain, no distinction existed between\
        \ religious and civil law.{{dubious|date=November 2025}} Breaking a religious\
        \ law equated to violating tax laws–the Inquisition did not distinguish them.\
        \ It prosecuted crimes often unnoticed by the public, including domestic offenses,\
        \ crimes against vulnerable groups, administrative violations, forgeries,\
        \ organized crime, and offenses against the Crown.{{citation needed|date=February\
        \ 2024}}\n\nThese crimes encompassed sexual and family-related offenses, including\
        \ [[rape]] and [[sexual violence]]—which the Inquisition uniquely prosecuted\
        \ nationwide—[[bestiality]], [[pedophilia]] (often overlapping with sodomy),\
        \ [[incest]], [[child abuse]], [[child neglect|neglect]], and [[bigamy]].\
        \ Non-religious offenses included [[procurement]] (not [[prostitution]]),\
        \ [[human trafficking]], [[smuggling]], forgery of [[counterfeit currency|currency]],\
        \ documents, or [[signature forgery|signatures]], tax [[fraud]], illegal weapons,\
        \ [[wikt:swindle|swindles]], disrespect to the Crown or its institutions (including\
        \ the Inquisition, church, guard, and kings), [[espionage]], [[conspiracy]],\
        \ and [[treason]].<ref>{{Cite web |title=INQUISICIÓN, L.960 - Libro de ejemplares\
        \ del Tribunal de Valencia |url=http://pares.mcu.es/ParesBusquedas20/catalogo/description/3241610\
        \ |access-date=2024-02-08 |website=PARES}}</ref><ref name=\"IY\">{{Cite book\
        \ |last=Barea |first=María Elvira Roca |author-link=Elvira Roca Barea |title=Imperiofobia\
        \ Y Leyenda Negra: Roma, Rusia, Estados Unidos Y El Imperio Español |publisher=Siruela\
        \ |year=2016 |language=es}}</ref>\n\nNon-religious crimes formed a significant\
        \ portion of Inquisition investigations, though distinguishing them from religious\
        \ crimes in records is challenging, as no official divide existed. Many crimes\
        \ fell under the same legal article; for instance, \"sodomy\" included pedophilia\
        \ as a subtype, with some data on male homosexuality prosecutions actually\
        \ reflecting pedophilia convictions. Religious and non-religious crimes, while\
        \ distinct, were often treated equivalently. Public blasphemy and street swindling,\
        \ both seen as misleading the public, received similar punishments. Likewise,\
        \ counterfeiting currency and heretical proselytism, viewed as spreading falsifications,\
        \ faced death penalties and similar subdivisions. Heresy and material forgeries\
        \ were treated comparably, suggesting equivalence in the Inquisition's view.<ref\
        \ name=\"IY\" /> Trials were complicated by witnesses or victims adding charges,\
        \ particularly [[witchcraft]]. As with [[Eleno de Céspedes]], such accusations\
        \ were typically dismissed but often appeared in investigation statistics.{{citation\
        \ needed|date=February 2024}}\n\n==== Witchcraft and superstition ====\nThe\
        \ Spanish Inquisition prosecuted witchcraft less intensely than France, Scotland,\
        \ or Germany. A notable case involved the \"witches\" of [[Zugarramurdi]]\
        \ in [[Navarre]], persecuted during the [[Logroño witch trials]]. An ''[[auto-da-fé|auto\
        \ de fe]]'' in Logroño on 7–8 November 1610 burned six people and another\
        \ five in effigy. The Inquisition's role in witchcraft cases was limited,\
        \ with secular authorities retaining jurisdiction over sorcery and witchcraft\
        \ long after the Inquisition's establishment.{{sfn|Kamen|1998}}{{Page needed|date=March\
        \ 2024}} The Inquisition generally viewed witchcraft as baseless superstition.\
        \ After the Logroño trials, [[Alonso Salazar Frias|Alonso de Salazar Frías]],\
        \ who delivered the Edict of Faith across Navarre, reported to the Suprema\
        \ that \"neither witches nor bewitched existed in a village until they were\
        \ discussed or written about.\"<ref>{{Cite book |editor-last=Henningsen |editor-first=Gustav\
        \ |url={{google books|plainurl=y|id=rxNYEAAAQBAJ}} |title=The Salazar Documents:\
        \ Inquisitor Alonso de Salazar Frías and Others on the Basque Witch Persecution\
        \ |date=2004-08-01 |publisher=Koninklijke Brill |isbn=978-90-474-0466-8 |language=en\
        \ |chapter=Cultures, Beliefs, and Traditions: Medieval and Early Modern Peoples\
        \ |volume=21 |page=352 |quote=An account of the whole visitation and publication\
        \ of the Edict with special reference to the witches' sect}}</ref>\n\n====\
        \ Blasphemy ====\nThe Inquisition prosecuted verbal offenses as \"heretical\
        \ propositions\" including outright [[blasphemy]], questionable statements\
        \ about religious beliefs, sexual morality, or clerical misconduct. Many faced\
        \ trials for claiming that fornication was not sinful or doubting aspects\
        \ of [[Christianity|Christian]] faith, such as [[Transubstantiation]] or the\
        \ virginity of [[Blessed Virgin Mary|Mary]].{{sfn|Green|2007|pp=7, 223–224}}\
        \ Clergy occasionally faced accusations of such offenses. These cases rarely\
        \ led to severe penalties.<ref>{{Cite web |last=Kamen |first=Henry |date=1981-02-02\
        \ |title=500 Years of the Spanish Inquisition |url=https://www.historytoday.com/archive/500-years-spanish-inquisition\
        \ |access-date=2024-02-21 |website=History Today Volume 31 Issue 2}}</ref>\n\
        \n==== Sodomy ====\nIn 1524, [[Pope Clement VII]] granted the Inquisition\
        \ in Aragon jurisdiction over [[sodomy]] following a petition from the Zaragoza\
        \ tribunal.{{sfn|Monter|1990|p=259}} Castile's Inquisition declined similar\
        \ authority, creating a significant regional disparity. Within Aragon, prosecution\
        \ varied by local law, with Zaragoza's tribunal notably harsh.{{sfn|Monter|1990|p=279}}{{sfn|Kamen|1977|p=192}}\n\
        \nIn 1541, the Inquisition executed Salvador Vidal, a priest, for sodomy,\
        \ marking the first known case. Convicted individuals faced penalties like\
        \ fines, burning in effigy, public whipping, or galley service.{{sfn|Monter|1990|pp=280-282}}\
        \ Valencia recorded the first burning for sodomy in 1572.{{sfn|Kamen|1998|p=277}}\n\
        \nThe term \"sodomy\" encompassed non-procreative sexual acts condemned by\
        \ the Church, including [[coitus interruptus]], [[masturbation]], [[fellatio]],\
        \ and [[Anal sex|anal coitus]], whether heterosexual or homosexual.{{sfn|Pérez|2005|p=91}}\
        \ A 1560 ruling excluded lesbian sex without a [[dildo]] from prosecution,\
        \ but bestiality faced routine charges, especially in Zaragoza during the\
        \ 1570s.{{sfn|Monter|1990|pp=281-283}} Husbands also faced accusations for\
        \ heterosexual sodomy with their wives.{{sfn|Monter|1990|pp=284-285}}\n\n\
        Accused individuals included 19.0% clergy, 6.0% nobles, 37.0% workers, 19.0%\
        \ servants, and 18.0% soldiers and sailors.{{sfn|Kamen|1998|p=277}}{{Failed\
        \ verification|date=February 2024}} Nearly all of the roughly 500 cases involved\
        \ [[pederasty|relationships between an older man and an adolescent]], often\
        \ coercive, with few involving consenting [[homosexual]] adults. About 100\
        \ cases alleged child abuse. Adolescents, especially those under twelve or\
        \ victims of rape, typically received lighter punishment or none.{{sfn|Monter|1990|pp=276-299}}\n\
        \nProsecutions declined after the Suprema limited publicity. After 1579, public\
        \ ''autos de fe'' excluded sodomy convicts unless sentenced to death/ After\
        \ 1610, even death sentences avoided public announcement. In 1589, Aragon\
        \ set the minimum age for sodomy executions at 25, and by 1633, such executions\
        \ largely ceased.{{sfn|Monter|1990|pp=276-299}}\n\n==== Bigamy ====\nThe Inquisition\
        \ prosecuted crimes against morals and social order, often clashing with civil\
        \ tribunals. It frequently tried [[bigamy]], common in a society allowing\
        \ divorce (more accurately, annulment) only in extreme cases.{{sfn|Green|2007|p=296}}\
        \ Men convicted faced 200 lashes and five to ten years of \"service to the\
        \ Crown\", typically five years as a galley oarsman for unskilled individuals—a\
        \ potential death sentence due to harsh conditions<ref>{{cite book |last=Crowley\
        \ |first=Roger |title=Empires of the sea: The siege of Malta, the battle of\
        \ Lepanto, and the contest for the center of the world |publisher=Random House\
        \ Trade Paperbacks |location=New York |year=2009 |isbn=978-0-8129-77646 |pages=77–78}}</ref>\
        \ or ten years unpaid work in a hospital or charitable institution for skilled\
        \ workers such as doctors or lawyers.<ref>{{Cite book |url={{google books|plainurl=y|id=s6Bjeb6Rc1kC|page=572}}\
        \ |title=Enciclopedia española de derecho y administración o Nuevo teatro\
        \ universal de la legislación de España e Indias: Cas-Ciu |date=1855 |publisher=Tip.\
        \ de Antonio Rius y Rossell |language=es|page=572}}</ref> In Portugal, the\
        \ penalty was five to seven years as an oarsman.\n\n==== Unnatural marriage\
        \ ====\nThe Inquisition classified marriages between individuals unable to\
        \ procreate as \"unnatural\". The Catholic Church, particularly in war-torn\
        \ Spain, prioritized reproduction in marriage.<ref>{{cite book |first=Fernando\
        \ |last=Cc̀eres |title=Estudios Sobre Cultura, Guerra y Política en la Corona\
        \ de Castilla |trans-title=Studies on War Culture and Politics in the Kingdom\
        \ of Castile |publisher=Editorial Csic Consejo Superior de Investigaciones\
        \ Científicas |year=2007}}</ref><ref>{{cite book |last=Kaler |first=Amy |title=Fertility,\
        \ Gender and War: The culture of contraception |publisher=University of Minnesota\
        \ Press |year=1998}}</ref>\n\nThe policy applied equally to all, deeming non-reproductive\
        \ marriages unnatural and reproductive ones natural, regardless of gender.\
        \ Male sterility, caused by castration, war injuries (''capón''), or genetic\
        \ conditions preventing puberty (''lampiño''), rendered a marriage unnatural.\
        \ Female sterility, though harder to prove, also qualified. A notable case\
        \ involving marriage, sex, and gender was the trial of [[Eleno de Céspedes]].{{citation\
        \ needed|date=September 2025}}\n\n==Organization==\nBeyond its role in religious\
        \ affairs, the Inquisition was an institution at the service of the monarchy.\
        \ The Inquisitor General, in charge of the Holy Office, was designated by\
        \ the crown. He was the only public office whose authority stretched to all\
        \ parts of the Spanish empire (including the American viceroyalties), except\
        \ for a brief period (1507–1518) during which one Inquisitor General handled\
        \ the kingdom of Castile, and another in [[Aragon]].\n\n=== Inquisitor General\
        \ ===\n[[File:Auto de fe Lima.jpg|thumb|right|''Auto de fe'', [[Plaza Mayor,\
        \ Lima|Plaza Mayor]] in [[Lima]], Viceroyalty of Peru (17th century)]]\n\n\
        The [[Grand Inquisitor|Inquisitor General]] presided over the Council of the\
        \ Supreme and General Inquisition (commonly abbreviated as \"Council of the\
        \ Suprema\"), created in 1483, which generally had six members (but as many\
        \ as ten) named by the crown. Over time, the authority of the Suprema grew\
        \ at the expense of the Inquisitor General.\n\n=== The Council of Castile\
        \ and the Council of the Supreme and General Inquisition ===\nBy the 17th\
        \ century, two councilors from the Royal [[Council of Castile]] played a key\
        \ role in overseeing the Council of the Spanish Inquisition, advising the\
        \ monarchy on legal and religious matters. At this time, the Spanish Inquisition\
        \ consisted of six primary councilors, two afternoon members from the Royal\
        \ Council of Castile, and a permanent [[Dominican Order|Dominican]] seat.\
        \ Additionally, the ''fiscal'' ([[prosecutor]]) was responsible for managing\
        \ inquisitorial trials and legal proceedings. With royal approval, the Council\
        \ adjusted its structure to improve efficiency, including chamber divisions\
        \ for handling cases. Notable members included:<ref name=\"EO\">Fernández\
        \ Gimén, María del Camino. \"''El Origen y Fundación de las Inquisiciones\
        \ de España''\" by José de Rivera. Universidad Nacional de Educación a Distancia,\
        \ vol. 23, pp. 11–46. {{ISSN|1131-5571}}.\n\n</ref>\n\n* Joseph González,\
        \ Commissary General of the Crusade, Councilor of Castile\n* Juan Martínez,\
        \ Dominican friar\n* [[Diego Sarmiento Valladares|Diego Sarmiento de Valladares]]\n\
        * Gabriel de la Calle y Heredia\n* Bernardino de León de la Rocha\n* Francisco\
        \ de Lara\n* Martín de Castejón\n* [[Doctor of Canon Law (Catholic Church)|Doctor]]\
        \ Gaspar de Medrano, the second-ranking Councilor of Castile\n\nThe Royal\
        \ Council and the Inquisition remained deeply intertwined, enforcing religious\
        \ conformity while serving as an instrument of monarchical control.<ref name=\"\
        EO\" />\n\n=== Schedule ===\nThe ''Suprema'' met every morning, except for\
        \ holidays, and for two hours in the afternoon on Tuesdays, Thursdays, and\
        \ Saturdays. The morning sessions were devoted to questions of faith, while\
        \ the afternoons were reserved for \"minor heresies\",<ref>{{Cite book |last=Alcalá\
        \ |first=Angel |url={{google books|plainurl=y|id=hi_ZAAAAMAAJ|page=220}}|title=The\
        \ Spanish Inquisition and the Inquisitorial Mind |date=1987 |publisher=Social\
        \ Science Monographs |isbn=978-0-88033-952-0 |language=en|page= 220}}</ref>\
        \ cases of unacceptable sexual behavior, [[bigamy]], [[witchcraft]], etc.{{sfn|García\
        \ Cárcel|1976|p=21}}\n\n=== Tribunals ===\nBelow the Suprema were various\
        \ tribunals tasked to combat heresy, initially itinerant, but later settled.\
        \ During the first phase, numerous tribunals were established, but after 1495\
        \ tended to centralize.\n\nIn Castile, permanent tribunals of the Inquisition\
        \ were established:\n* 1482 In [[Seville]] and in [[Córdoba, Spain|Córdoba]]\n\
        * 1485 In [[Toledo, Spain|Toledo]] and in [[Llerena, Badajoz|Llerena]]\n*\
        \ 1488 In [[Valladolid]] and in [[Murcia]]\n* 1489 In [[Cuenca, Spain|Cuenca]]\n\
        * 1505 In [[Las Palmas]] ([[Canary Islands]])\n* 1512 In [[Logroño]]\n* 1526\
        \ In [[Granada]]\n* 1574 In [[Santiago de Compostela]]\n\nThe four tribunals\
        \ in the kingdom of [[Aragon]] were: [[Zaragoza]] and [[Valencia (autonomous\
        \ community)|Valencia]] (1482), [[Barcelona]] (1484), and [[Mallorca]] (1488).{{sfn|Kamen|1998|p=141}}\
        \ [[Ferdinand the Catholic]] established a tribunal in [[Sicily]] (1513),\
        \ housed in [[Palermo]], and [[Sardinia]], in the town of [[Sassari]].{{efn|In\
        \ [[Sicily]], the Inquisition functioned until 30 March 1782, when it was\
        \ abolished by King [[Ferdinand IV of Naples]]. It is estimated that 200 people\
        \ were executed during this period.}} In the Americas, tribunals were established\
        \ in [[Lima]] and in [[Mexico City]] (1569) and, in 1610, in [[Cartagena,\
        \ Colombia|Cartagena]] (present-day [[Colombia]]).\n\n==Composition of the\
        \ tribunals==\n[[File:Estructura de la Inquisición.svg|thumb|Structure of\
        \ the Spanish Inquisition]]\n\nEach tribunal initially comprised two inquisitors,\
        \ ''calificadores'' (theologians), an ''alguacil'' (bailiff), and a ''fiscal''\
        \ (prosecutor), with other roles added as the institution evolved. Inquisitors\
        \ were preferably jurists rather than theologians; in 1608, Philip III required\
        \ all inquisitors to have a legal background. They typically served short\
        \ terms, averaging about two years in the Court of Valencia, for example.{{sfn|García\
        \ Cárcel|1976|p=24}} Most belonged to the secular clergy and held university\
        \ degrees.\n\nThe ''fiscal'' presented accusations, investigated denunciations,\
        \ and interrogated witnesses, often using physical or mental torture. ''Calificadores'',\
        \ usually theologians, determined if a defendant's conduct constituted a crime\
        \ against faith. Expert jurist consultants advised on procedural matters.\
        \ The court employed three secretaries: the ''notario de secuestros'' (Notary\
        \ of Property), who recorded the accused's possessions upon detention; the\
        \ ''notario del secreto'' (Notary of the Secret), who documented testimonies;\
        \ and the ''Escribano General'' (General Notary), who served as court secretary.\
        \ The ''alguacil'' detained, jailed, and tortured defendants. Other staff\
        \ included the ''nuncio'', who announced court notices, and the ''alcaide'',\
        \ who managed prisoner care.\n\nTwo auxiliary roles supported the Holy Office:\
        \ ''familiares'' and ''comissarios''. ''Familiares'', lay collaborators, served\
        \ permanently, and their role was an honor, signifying ''limpieza de sangre''\
        \ (Old Christian status) and granting privileges. Most were commoners, though\
        \ some were nobles. ''Comissarios'' were members of religious orders who assisted\
        \ occasionally.\n\nOne of the most striking aspects of the organization was\
        \ its form of financing: without a defined budget, the Inquisition depended\
        \ almost exclusively on the confiscation of the goods of the denounced.{{sfn|Kamen|1998|p=153}}\
        \ Many of those prosecuted were rich men. The situation was open to abuse,\
        \ as evidenced in a memorandum that a ''converso'' from [[Toledo, Spain|Toledo]]\
        \ directed to [[Charles V, Holy Roman Emperor|Charles I]]:\n\n<blockquote>Your\
        \ Majesty must provide, before all else, that the expenses of the Holy Office\
        \ do not come from the properties of the condemned, because if that is the\
        \ case if they do not burn they do not eat.{{sfn|Kamen|1998|p=153}}</blockquote>\n\
        \n==Mode of operation==\n===Accusation===\n\nUpon arriving in a city, the\
        \ Inquisition issued the Edict of Grace. After Sunday Mass, the inquisitor\
        \ read the edict, outlining possible heresies and urging the congregation\
        \ to confess at the tribunals to \"ease their consciences\". These edicts,\
        \ named for their grace period (typically 30–40 days), allowed self-accused\
        \ individuals to reconcile with the Church without harsh penalties.{{sfn|Kamen|1998|p=57}}{{sfn|Pérez|2005|pp=135,136}}\
        \ The promise of leniency prompted many to come forward voluntarily, often\
        \ encouraged to denounce others, making informants the Inquisition's main\
        \ information source. After around 1500, Edicts of Faith replaced the Edicts\
        \ of Grace, omitting the grace period and promoting denunciation of the guilty.{{sfn|Kamen|1998|p=174}}\n\
        \nDenunciations were anonymous, leaving defendants unaware of their accusers'\
        \ identities, a practice heavily criticized by opponents. False accusations\
        \ were common, driven by motives beyond genuine concern, such as targeting\
        \ nonconformists, harming neighbors, or eliminating rivals.{{sfn|Pérez|2005|pp=139,140}}\n\
        \nThat system turned everyone into a potential informer, elevating denunciation\
        \ to a religious duty. It filled the nation with spies, making individuals\
        \ objects of suspicion to neighbors, family, and strangers.{{sfn|Lea|1906|p=91\
        \ Volume 2}}\n\n===Detention===\n[[File:Mateo Zapata.jpg|thumb|right|[[Diego\
        \ Mateo Zapata|Diego Mateo López Zapata]] in his cell before his trial by\
        \ the Inquisition Court of Cuenca (engraved by [[Francisco Goya]])]]\n\nAfter\
        \ a denunciation, ''calificadores'' assessed whether heresy was involved,\
        \ followed by the accused's detention. Apologist [[William Thomas Walsh]]\
        \ noted that the process maintained strict secrecy, concealing accusations\
        \ from both the public and the accused, who might never learn that that they\
        \ had been suspected. {{sfn|Walsh|1940|p=163}} Occasionally, individuals faced\
        \ preventive detention, with some experiencing up to two years' imprisonment\
        \ before examination.{{sfn|Kamen|1998|p=183}} For example, in Valladolid's\
        \ tribunal in 1699, suspects, including a 9-year-old girl and a 14-year-old\
        \ boy, were jailed for up to two years without evaluation of their accusations.{{sfn|Kamen|1998|p=183}}\n\
        \nThe Inquisition seized the accused's property upon detention to cover its\
        \ costs and their maintenance, frequently leaving relatives in poverty. Instructions\
        \ issued in 1561 aimed to address that issue, but Llorente found no evidence\
        \ of provisions for the children of condemned heretics.{{sfn|Sabatini|1930|p=173}}\n\
        \nPrisoners remained isolated, barred from attending [[Mass (liturgy)|Mass]]\
        \ or receiving [[sacraments]]. Inquisition jails were comparable to secular\
        \ ones, although some accounts suggest they were significantly better.{{sfn|Walsh|1940|p=163}}\n\
        \n===Trial===\n[[File:An interrogation room of the Spanish Inquisition with\
        \ two pr Wellcome V0041642.jpg|thumb|280px|Two priests and a suspected heretic\
        \ in a Spanish Inquisition interrogation chamber ([[Bernard Picart]]'s engraving,\
        \ 1722). In contrast to the Inquisitor's armchair, Eymeric's manual suggests\
        \ that the accused be sat on a low bench.{{sfn|Saraiva|2001|pp=69-70}}]]\n\
        \nAt hearings, accusers and the defendant testified separately. The tribunal\
        \ assigned a defense counsel, a lawyer, to advise the accused and encourage\
        \ truthful testimony.{{Citation needed|date=February 2024}} Counsel had to\
        \ abandon the defense upon realizing the client's guilt.{{sfn|Sabatini|1930|p=195}}\n\
        \nThe ''fiscal'' led the prosecution. The ''notario del secreto'' recorded\
        \ the defendant's words during interrogation. Inquisition archives stand out\
        \ for their thorough documentation compared to other judicial systems of the\
        \ era.{{Citation needed|date=February 2024}}\n\nDefendants could defend themselves\
        \ through ''abonos'' (securing favorable character witnesses) or ''tachas''\
        \ (proving accusers' witnesses, whose identities remained unknown, were untrustworthy\
        \ or personal enemies).{{sfn|Homza|2006|pp=XXIV}}\n\nTrial structure resembled\
        \ later trials and, apologists claim, offered advanced fairness for the time.\
        \ The Inquisition, professional and efficient, relied on the King's political\
        \ power, without [[separation of powers]]. Apologists argue Inquisitorial\
        \ tribunals were among early modern Europe's fairest for laymen trials.<ref\
        \ name=\"SI\">{{Cite web |last=Madden |first=Thomas |date=1 October 2003 |title=The\
        \ Truth about the Spanish Inquisition |url=https://www.catholicity.com/commentary/madden/03481.html\
        \ |website=Mary Foundation |url-status=live |archive-url=https://web.archive.org/web/20220827232257/https://www.catholicity.com/commentary/madden/03481.html\
        \ |archive-date=27 Aug 2022}}</ref><ref>{{Cite book |last=Martínez Millán\
        \ |first=José |title=La Inquisición Española |publisher=Alianza Editorial\
        \ |year=2007 |language=es}}</ref> Former prisoners' testimonies suggest fairness\
        \ faltered when national or political interests were at stake.<ref>{{Cite\
        \ book |last=Kamen |first=Henry |url={{google books|plainurl=y|id=PEZKAAAACAAJ|page=191}}\
        \ |title=La Inquisición española: una revisión histórica |date=2004 |publisher=RBA\
        \ |isbn=978-84-473-3636-4 |language=es|pages= 191–192}}</ref> Historian [[Walter\
        \ Ullmann]] instead claimed, \"Hardly any aspect of the Inquisitorial procedure\
        \ aligns with justice; each element denies it or caricatures it [...] its\
        \ principles reject even the most basic concepts of natural justice [...]\
        \ That proceeding resembles no judicial trial but systematically perverts\
        \ it.{{sfn|Saraiva|2001|p=61-62}}\n[[File:The inside of a jail of the Spanish\
        \ Inquisition, with a prie Wellcome V0041650.jpg|thumb|An etching of an imagined\
        \ Inquisition jail, depicting a priest overseeing a scribe as prisoners are\
        \ tortured on pulleys, racks, or with torches (date unknown)]]\n\nThe Inquisition\
        \ used [[torture]], per the ''instrucciones'', to extract confessions or information.\
        \ Its frequency across the period is disputed.{{sfn|Lea|1906|pp=32-33 Volume\
        \ III}}\n\nTorture applied when heresy was \"half proven\" and could be repeated,\
        \ per Article XV of Torquemada's instructions.{{sfn|Sabatini|1930|p=162}}\
        \ Henry Lea estimated that the [[Toledo, Spain|Toledo]] court tortured about\
        \ 33.3% of those tried for Protestant heresy between 1575 and 1610. The Lima\
        \ tribunal likely tortured nearly all accused in cases from 1635 to 1639;\
        \ the Valladolid tribunal's 1624 report shows torture in eleven Jewish cases\
        \ and one Protestant case; in 1655, all nine Jewish cases involved torture.<ref>{{harvp|Lea|1906|page=\
        \ 33 Volume III }} Cited in {{harvp|Kamen|1998|p=185}}. {{harvp|García Cárcel|1976|p=43}}\
        \ reported the same statistics.</ref>\n\nVatican Archives suggest lower numbers.<ref\
        \ name=\"SI\" /><ref>{{Cite book |last=Messori |first=Vittorio |url={{google\
        \ books|plainurl=y|id=toN5zwEACAAJ}}|title=Leyendas negras de la Iglesia |date=2022\
        \ |publisher=Spíritu Media |isbn=978-84-125573-2-9 |language=es}} (Catholic\
        \ apologist)</ref>{{Page needed|date=February 2024}} Apologist Thomas Madden\
        \ claimed, \"The Inquisition brought order, justice, and compassion to counter\
        \ widespread secular and popular persecutions of heretics,\" concluding, \"\
        The Spanish people loved their Inquisition. That explains its longevity.\"\
        <ref name=\"SI\" /> Torture proportions varied significantly across periods.{{citation\
        \ needed|date=January 2025}}\n\n===Torture===\n[[File:Museo de la Tortura\
        \ Toledo 18.jpg|thumb|A rack on display at the Torture Museum in Toledo, Spain]]\n\
        \n[[File:Water cure.jpg|thumb|An engraved depiction of water torture (1556)]]\n\
        \n[[File:Theresiana-Hochziehen.jpg|thumb|In the ''strappado'' torture, the\
        \ victim's hands are tied behind their back and the body is suspended by the\
        \ wrists, resulting in dislocated shoulders. Weights can be added to the feet\
        \ (engraving, 1768)]]\n\nTorture was applied in all European civil and religious\
        \ trials. The Spanish Inquisition used it more restrictively than other courts,\
        \ with strict regulations on timing, methods, targets, frequency, duration,\
        \ and supervision.<ref name=\"Bethencourt, Francisco 1997\">{{Cite book |last=Bethencourt\
        \ |first=Francisco |url={{google books|plainurl=y|id=58wvTfVBgxwC}}|title=La\
        \ Inquisición en la época moderna |date=1997-12-11 |publisher=Ediciones AKAL\
        \ |isbn=978-84-460-0831-6 |language=es}}</ref>{{Page needed|date=February\
        \ 2024}}<ref>{{Cite journal |last=Hassner |first=Ron E. |date=2020 |title=The\
        \ Cost of Torture: Evidence from the Spanish Inquisition |journal=Security\
        \ Studies |volume=29 |issue=3 |pages=457–492 |doi=10.1080/09636412.2020.1761441\
        \ |s2cid=219405563 |issn=0963-6412 }}</ref> Haliczer and others claim that\
        \ the Inquisition tortured less frequently and more cautiously than secular\
        \ courts.{{sfn|Haliczer |1990 |p=79}}<ref>{{Cite book |last=Peters |first=Edward\
        \ |url={{google books|plainurl=y|id=TnqLow3iKd4C|}}|title=Inquisition |date=1989-04-14\
        \ |publisher=University of California Press |isbn=978-0-520-06630-4 |language=en}}</ref>{{rp|=92–93}}\n\
        \nKamen and others cited limited evidence of torture, based on newly opened\
        \ Inquisition archives. Claims of widespread torture were claimed to stem\
        \ from Protestant propaganda and popular misconceptions.<ref>{{cite web |last1=Somers\
        \ |first1=Michelle |title=Editor |url=https://www.youtube.com/watch?app=desktop&v=nEKPunno5K0\
        \ |website=Myth of the Spanish Inquisition |date=14 December 2019 |publisher=BBC\
        \ Documentary |access-date=14 December 2019}}</ref>\n\n* When: Torture applied\
        \ when guilt was \"half proven\" or presumed, per Article XV of Torquemada's\
        \ ''instrucciones'' and Eymerich's directions.{{sfn|Sabatini|1930|p=162, 197,198}}\
        \ Eymerich noted that tortured confessions were unreliable and should be a\
        \ last resort.{{sfn|Sabatini|1930|p=198}}\n* What: The Inquisition could not\
        \ \"maim, mutilate, draw blood, or cause permanent damage.\" Church law banned\
        \ ecclesiastical tribunals from shedding blood. Still, torture often caused\
        \ broken limbs, health issues, or death.{{sfn|Kamen|1998|pp=190–191}}\n* Supervision:\
        \ A physician was typically present and had to certify the prisoner's health\
        \ before torture, though harm still occurred.{{sfn|Kamen|1998|p=189}}<ref>{{Cite\
        \ book |last=Vargas |first=Pablo L. Crespo |url={{google books|plainurl=y|id=oHIenwEACAAJ|page=120}}|title=La\
        \ Inquisición Española Y Las Supersticiones en El Caribe Hispano, Siglo XVII\
        \ |date=2013 |publisher=Editorial Akelarre |isbn=978-1-4909-9571-7 |language=en|pages=120–130}}</ref>\n\
        * Permitted torture methods: ''garrucha'', ''toca'', and ''potro'', also used\
        \ in secular and ecclesiastical courts.{{sfn|Kamen|1998|pp=190–191}} The ''garrucha''\
        \ (or [[strappado]]) involved suspending victims by their wrists, tied behind\
        \ their back, sometimes with weights on their feet, causing violent pulls\
        \ and dislocations during lifts and drops.{{sfn|Sabatini|1930|p= 190}}\n\n\
        The ''toca'', or [[Water cure (torture)|water interrogation]] (now [[waterboarding]]),\
        \ forced victims to ingest water poured from a jar, simulating drowning.{{sfn|Scott|1959|p=171}}\
        \ The ''potro'' ([[rack (torture)|rack]]) stretched limbs apart and was likely\
        \ the most common method.<ref>{{Cite book |last=Carroll |first=James |url={{google\
        \ books|plainurl=y|id=FewzTELynqUC|page=356}}|title=Constantine's Sword: The\
        \ Church and the Jews |date=2002 |publisher=Houghton Mifflin Harcourt |isbn=978-0-618-21908-7\
        \ |language=en|page=356}}</ref> Confessions were deemed \"true, not forced\
        \ by torture,\" though recanting risked further torture.{{sfn|Peters|1989||p=\
        \ 65}} Murphy claimed that under torture, people will say anything.{{sfn|Homza|2006|p=XXV}}{{sfn|Murphy|2012|p=89}}\
        \ [[Bernard Délicieux]], a Franciscan friar tortured by the Inquisition, died\
        \ in prison and claimed its tactics could have branded [[Saint Peter|St. Peter]]\
        \ and [[Paul the Apostle|St. Paul]] heretics.{{sfn|Scott|1959|p=32}}\n\nAfter\
        \ the trial, inquisitors, a bishop's representative, and ''consultores'' (experts\
        \ in [[theology]] or [[Canon Law]]) met for the ''consulta de fe'' to vote\
        \ unanimously on the sentence. Discrepancies required reporting to the ''Suprema''.{{citation\
        \ needed|date=February 2024}}\n\n===Sentencing===\n\nTrial outcomes included\
        \ the following:\n* Acquittal, though rare, reflected badly on the inquisitors.\
        \ A not guilty verdict, if reached, occurred in private.{{sfn|Bergemann|2019|p=58}}\n\
        * Suspension allowed the defendant to go free, with the possibility of the\
        \ case reopening later.{{sfn|Bergemann|2019|p=45}}\n* Penance required the\
        \ guilty to publicly renounce their crimes—''de levi'' for minor offenses,\
        \ ''de vehementi'' for serious ones—and face punishments such as wearing a\
        \ ''[[sanbenito]]'', mandatory church attendance, exile, flogging, fines,\
        \ or serving as a galley oarsman.{{sfn|Bergemann|2019|p=45-46}}\n* Reconciliation\
        \ involved a public ceremony to rejoin the Catholic Church, alongside harsher\
        \ penalties such as long jail or galley terms, property confiscation, and\
        \ physical punishments such as whipping. The reconciled faced bans on professions\
        \ including advocacy, pharmacy, or medicine, and restrictions on carrying\
        \ weapons, wearing jewelry or gold, and riding horses. These restrictions\
        \ also applied to their descendants.{{sfn|Bergemann|2019|p=45-46}}\n* Relaxation\
        \ to the [[secular arm]], i.e., [[Death by burning|burning at the stake]],\
        \ targeted unrepentant or relapsed heretics. Public executions allowed repentance,\
        \ with the condemned [[garrote]]d before burning; otherwise, they burned alive.\
        \ Secular authorities, barred from trial details, enforced sentences under\
        \ threat of heresy charges.{{sfn|Lea|1906|p=183-185 Volume III}}{{sfn|Haliczer|1990|p=83-85}}{{sfn|Bergemann|2019|p=46}}\n\
        \nCases often proceeded ''in absentia''. If the accused died before trial\
        \ completion, they were burned in effigy. Inquisitorial actions persisted\
        \ even decades after death; proven heretics had their corpses exhumed and\
        \ burned, property seized, and heirs disinherited.{{sfn|Sabatini|1930|p=169-172,\
        \ 222, 277-279, 432}}{{sfn|Homza|2006|p=XIV}}{{sfn|Pérez|2005|p=136}}\n\n\
        Punishment frequency varied over time. García Cárcel notes the [[Valencia\
        \ (autonomous community)|Valencia]] court imposed death in 40% of cases before\
        \ 1530, dropping to 3% later.{{sfn|García Cárcel|1976|p=39}} By the mid-16th\
        \ century, courts deemed torture unnecessary, and death sentences grew rare.<ref>{{Cite\
        \ web |title=Spain – The conquest of Granada |url=https://www.britannica.com/place/Spain/The-conquest-of-Granada\
        \ |access-date=2022-05-25 |website=www.britannica.com |language=en}}</ref>{{Failed\
        \ verification|date=March 2024}}\n\n=== ''Auto de fe'' ===\n{{Main|Auto-da-fé}}\n\
        \n[[File:Francisco rizi-auto de fe.jpg|thumb|Rizi's 1683 painting of the 1680\
        \ ''auto de fe'', [[Plaza Mayor, Madrid|Plaza Mayor]] in Madrid]]\n\nA condemnatory\
        \ sentence required the convicted to participate in an ''auto de fe'', a ceremony\
        \ formalizing their return to the Church or punishment as unrepentant heretics.\
        \ These could be public (''auto publico'' or ''auto general'') or private\
        \ (''auto particular'').\n\nInitially, public ''autos'' lacked grandeur or\
        \ large crowds, but they evolved into elaborate, costly ceremonies showcasing\
        \ Church and State power, drawing festive public audiences. The ''auto de\
        \ fe'' became a [[baroque]] spectacle, staged for maximum impact in large\
        \ city plazas, often on holidays. Rituals began at night with the \"procession\
        \ of the Green Cross\" and could last the entire following day.<ref>{{Cite\
        \ journal |last=Martínez |first=Doris Moreno |date=1997 |title=Cirios, trompetas\
        \ y altares. El auto de fe como fiesta |url=https://www.researchgate.net/publication/342894899\
        \ |journal=Espacio. Tiempo y Forma, Serie IV História Moderna |pages=143–171}}</ref>{{sfn|Sabatini|1930|p=270-280}}\n\
        \nArtists often depicted the ''auto de fe''; a notable example is [[Francisco\
        \ Rizi]]'s 1683 painting, held by the [[Prado]] Museum in [[Madrid]], showing\
        \ the ''auto de fe'' in Plaza Mayor on 30 June 1680. The last public ''auto''\
        \ occurred in 1691.{{Citation needed|date=February 2024}}\n\n[[File:Execution\
        \ of Mariana de Carabajal.jpg|thumb|right|Execution of [[Francisca Nuñez de\
        \ Carabajal|Mariana de Carabajal]], a converted Jew, in Mexico City, 1601]]\n\
        \nThe ''auto de fe'' included a Catholic Mass, prayers, a public procession\
        \ of the convicted, and a reading of their sentences.{{sfn|Peters|1988|pp=93–94}}\
        \ Held in public squares, these events lasted hours with ecclesiastical and\
        \ civil authorities present. Artistic depictions often show torture or burning\
        \ at the stake, but these occurred separately, as the ''auto'' was a religious\
        \ act. Torture followed trials, and executions happened afterward, though\
        \ observers and the condemned might have perceived little distinction.{{sfn|Kamen|1998|pp=192–213}}\n\
        \nThe first recorded ''auto de fe'' took place in Paris in 1242 under Louis\
        \ IX.{{sfn|Stavans| 2005|p= xxxiv}} In Spain, the first occurred in Seville\
        \ in 1481, with six participants later burned alive.\n\n{{anchor|Enlightenment\
        \ era and the Inquisition's transformation}}\n\n==Transformation in the Enlightenment\
        \ ==\n\nThe [[Age of Enlightenment|Enlightenment]] in Spain reduced inquisitorial\
        \ activity. In the early 18th century, courts condemned 111 people to burning\
        \ in person and 117 in effigy, mostly for [[Judaizers|judaizing]].{{dubious|date=March\
        \ 2025}} During [[Philip V of Spain|Philip V]]'s reign, 125 ''autos de fe''\
        \ occurred, but only 44 took place under [[Charles III of Spain|Charles III]]\
        \ and [[Charles IV of Spain|Charles IV]].{{Citation needed|date=February 2024}}\n\
        \n[[File:An auto da fe in the Town of San Bartolomé Otzolotepec - Google Art\
        \ Project.jpg|thumb|left|Auto-da-fé in the Viceroyalty of [[New Spain]], 18th\
        \ century]]\n\nIn the 18th century, Enlightenment ideas became the primary\
        \ disturbance. Leading Spanish Enlightenment figures, including [[Pablo de\
        \ Olavide|Olavide]] (1776), [[Tomás de Iriarte y Oropesa|Iriarte]] (1779),\
        \ and [[Gaspar Melchor de Jovellanos|Jovellanos]] (1796), faced Inquisition\
        \ trials. Jovellanos criticized the courts' inefficiency and their operators'\
        \ ignorance, describing them as \"friars who take [the position] only to gather\
        \ gossip and avoid choir duties; ignorant of foreign languages, knowing only\
        \ a little [[scholastic theology]]\".<ref>{{Cite book |last=Elorza |first=Antonio\
        \ |url={{google books|plainurl=y|id=QCX7ygEACAAJ}}|title=La Inquisición y\
        \ el pensamiento ilustrado |date=1986 |language=es}}</ref>{{rp|81}}\n\nThe\
        \ Inquisition shifted to censoring publications, but struggled as [[Charles\
        \ III of Spain|Charles III]] secularized censorship, often favoring the [[Council\
        \ of Castile]]'s less rigid stance. As an arm of the state within the Council,\
        \ the Inquisition lost influence. Prominent nobles and government officials,\
        \ who obtained special licenses to import foreign Enlightenment texts like\
        \ [[Diderot's Encyclopedia]], further diminished its control.\n\nPost-[[French\
        \ Revolution]], the Council of Castile, fearing revolutionary ideas, reactivated\
        \ the Inquisition to target French works. A December 1789 edict, supported\
        \ by [[Charles IV of Spain|Charles IV]] and [[José Moñino y Redondo, conde\
        \ de Floridablanca|Floridablanca]], banned 39 French texts for promoting \"\
        a theoretical and practical code of independence from legitimate powers...\
        \ destroying political and social order\", under penalty of fines.{{sfn|Elorza|1986|p=\
        \ 84}}\n\nOpposition to the Inquisition remained clandestine. Texts praising\
        \ [[Voltaire]] and [[Montesquieu]] emerged in 1759. After the Council of Castile\
        \ lifted pre-publication censorship in 1785, ''[[El Censor]]'' published rationalist\
        \ critiques of the Holy Office. [[Valentin de Foronda]]'s ''Espíritu de los\
        \ Mejores Diarios'' advocated freedom of expression, widely read in salons.\
        \ Similarly, Manuel de Aguirre promoted toleration in ''El Censor'', ''El\
        \ Correo de los Ciegos'', and ''El Diario de Madrid''.\n\n==End of the Inquisition==\n\
        [[File:Penitenciado por la Inquisición.jpg|thumb|The [[Peruvian Inquisition]],\
        \ based in Lima, ended in 1820]]\n\nDuring [[Charles IV of Spain|Charles IV]]'s\
        \ reign (1788–1808), despite fears sparked by the [[French Revolution]], several\
        \ factors hastened the Inquisition's decline. The state shifted focus from\
        \ social organization to public welfare, questioning the Church's vast landholdings\
        \ in regions like [[Castile and León]], [[Extremadura]], and [[Andalucía]].\
        \ These properties, including those of the Holy Office, were leased to farmers\
        \ or communities under restrictive feudal terms, with rent often paid in cash.\
        \ The throne's growing power offered Enlightenment thinkers like [[Manuel\
        \ Godoy]] and [[Antonio Alcalá Galiano]] better protection for their ideas.\
        \ They opposed the Inquisition, now reduced to censorship and emblematic of\
        \ the [[Black Legend of the Spanish Inquisition|Black Legend]], as it clashed\
        \ with contemporary political interests:\n\n<blockquote>The Inquisition? Its\
        \ old power no longer exists: the horrible authority that this bloodthirsty\
        \ court had exerted in other times was reduced... the Holy Office had come\
        \ to be a species of commission for book censorship, nothing more...{{sfn|Elorza|1986|p=\
        \ 88}}</blockquote>\n\nThe Inquisition was abolished during [[Napoleon]]'s\
        \ rule under [[Joseph Bonaparte]] (1808–1812). In 1813, the liberal [[Cortes\
        \ of Cádiz]] also secured its abolition, largely due to the Holy Office's\
        \ condemnation of the revolt against French invasion.<ref>{{Cite book |last=Puigblanch\
        \ |first=Antonio |author-link=Antonio Puigblanch|url={{google books|plainurl=y|id=4BLelyli1d4C}}\
        \ |title=La inquisicion sin máscara: ó disertacion, en que se prueban ...\
        \ los vicios de este tribunal |date=1811 |publisher=Niel |language=es}}</ref>\n\
        \nHowever, [[Ferdinand VII of Spain|Ferdinand VII]] restored it on 1 July\
        \ 1814. [[Juan Antonio Llorente]], the Inquisition's general secretary in\
        \ 1789, turned [[Afrancesado|Bonapartist]] and published a critical history\
        \ in 1817 from French exile, leveraging his access to its archives.{{sfn|Kamen|2014|p=382}}\n\
        \nThe Inquisition was abolished again during the [[Trienio Liberal]] (1820–1823),\
        \ but it persisted informally during the [[Ominous Decade]] through the Congregation\
        \ of the Meetings of Faith (''Juntas da Fé''), established in dioceses by\
        \ [[Ferdinand VII]]. The last execution for heresy, of schoolteacher [[Cayetano\
        \ Ripoll]] for teaching [[deist]] principles, occurred on 26 July 1826 in\
        \ [[Valencia (autonomous community)|Valencia]], sparking a Europe-wide scandal\
        \ over Spain's despotic practices.<ref name=\"DailyInquisition\">{{Cite book\
        \ |last=Anderson |first=James Maxwell |url={{google books|plainurl=y|id=XxUvfIko1TUC}}\
        \ |title=Cayetano Ripoll |publisher=Greenwood Publishing Group |year=2002\
        \ |isbn=0-313-31667-8 |edition=illustrated |page=83 |access-date=2009-03-03}}</ref><ref\
        \ name=\"HangingOfRipoll\">{{cite web |year=2010 |title=Reflections |url=https://translate.google.com/translate?js=y&prev=_t&hl=en&ie=UTF-8&layout=1&eotf=1&u=http%3A%2F%2Fquienabuenarbol.blogspot.com%2F2009_07_01_archive.html&sl=es&tl=en\
        \ |access-date=2010-04-28}} English translation of an account of Ripoll's\
        \ trial and execution.</ref>{{sfn|Pérez|2005|p=100}}{{sfn|Kamen|2014|pp=372-373}}\n\
        \nOn 15 July 1834, regent [[Maria Christina of the Two Sicilies]], Ferdinand\
        \ VII's liberal widow, abolished the Inquisition by Royal Decree during the\
        \ [[Minority of Isabella II of Spain|minority]] of [[Isabella II of Spain|Isabella\
        \ II]], with approval from Cabinet President [[Francisco Martínez de la Rosa]].\n\
        \nThe [[Alhambra Decree]] was rescinded on 16 December 1968 by [[Francisco\
        \ Franco]], following the [[Second Vatican Council]]'s rejection of [[Jewish\
        \ deicide]].<ref>{{Cite news |last=Times |first=Richard Ederspecial To the\
        \ New York |date=1968-12-17 |title=1492 Ban on Jews Is Voided by Spain; 1492\
        \ BAN ON JEWS IS VOIDED IN SPAIN |url=https://www.nytimes.com/1968/12/17/archives/1492-ban-on-jews-is-voided-by-spain-1492-ban-on-jews-is-voided-in.html\
        \ |access-date=2024-02-11 |work=The New York Times |language=en-US |issn=0362-4331}}</ref>\n\
        \n==Outcomes==\n===Confiscations===\nThe amount of confiscated wealth remains\
        \ unclear. In one year, seizures in the small town of Guadaloupe funded a\
        \ royal residence.<ref>{{Cite book |last=Anderson |first=James M. |url={{google\
        \ books|plainurl=y|id=-86MPwAACAAJE}} |title=Daily Life During the Spanish\
        \ Inquisition: Online |date=2002-12-30 |publisher=ABC-CLIO, LLC |isbn=978-0-313-32676-9\
        \ |language=en}}</ref> Many Spaniards claimed the Inquisition simply aimed\
        \ to seize property. A Cuenca resident claimed, \"They were burnt only for\
        \ their money,\" while another said, \"They burn only the well-off.\" In 1504,\
        \ an accused person stated, \"Only the rich were burnt.\" In 1484, Catalina\
        \ de Zamora asserted, \"The fathers carry out this Inquisition to take property\
        \ from conversos as much as to defend the faith. The goods are the heretics.\"\
        \ This phrase became common in Spain. In 1524, a treasurer reported to Charles\
        \ V that his predecessor collected ten million ducats from conversos (unverified).\
        \ In 1592, an inquisitor noted most of the fifty women he arrested were wealthy.\
        \ In 1676, the Suprema claimed over 700,000 ducats for the royal treasury,\
        \ after covering its own budget, which in one case was just 5% of the amount\
        \ seized. Mallorca's confiscated property in 1678 exceeded 2,500,000 ducats.{{sfn|Kamen|1998|p=150}}\n\
        \n=== Death tolls and sentenced ===\n[[File:Contemporary illustration of the\
        \ Auto-da-fe held at Validolid Spain 21-05-1559..jpg|thumb|Contemporary illustration\
        \ of the auto de fe in [[Valladolid]], where fourteen Protestants were burned\
        \ for their faith, 21 May 1559]]\n\nCárcel estimated a total of 150,000 prosecutions\
        \ throughout the Inquisition's history. Using a 2% execution rate from 1560–1700\
        \ trials, about 3,000 were put to death. Some scholars, citing Dedieu and\
        \ Cárcel's data for Toledo and Valencia, suggest 3,000–5,000 executions.<ref\
        \ name=\"Levack, Brian P. 19952\"/> Others estimate a 1–5% death rate, including\
        \ religious and non-religious cases, depending on the period.<ref name=\"\
        Bethencourt, Francisco 1997\"/><ref>{{Cite book |last=Eire |first=Carlos M.\
        \ N. |url={{google books|plainurl=y|id=s3lJDAAAQBAJ}}|title=Reformations:\
        \ The Early Modern World, 1450-1650 |date=2016-01-01 |publisher=Yale University\
        \ Press |isbn=978-0-300-11192-7 |language=en}}</ref> This remains lower than\
        \ the 40,000–60,000 executed for [[Witch trials in Early Modern Europe|witchcraft\
        \ in Europe]] during a similar period.<ref name=\"Levack, Brian P. 19952\"\
        /> The Suprema's archives, held in the [[National Historical Archive (Spain)|National\
        \ Historical Archive of Spain]], document 44,674 judgments from 1540–1700,\
        \ including 826 executions ''in persona'' and 778 ''in effigie''. These records\
        \ are incomplete, omitting tribunals like Cuenca and showing gaps for others,\
        \ such as Valladolid. Additional cases, not reported to the Suprema, appear\
        \ in other sources but are excluded from Contreras-Henningsen's statistics\
        \ for methodological reasons.<ref>{{Cite book |last1=Mohnhaupt |first1=Heinz\
        \ |url={{google books|plainurl=y|id=A_Sdchs7yAkC}} |title=Vorträge zur Justizforschung:\
        \ Geschichte und Theorie |last2=Simon |first2=Dieter |date=1992 |publisher=V.\
        \ Klostermann |isbn=978-3-465-02627-3 |language=de}}</ref> Monter estimates\
        \ 1,000 executions from 1530–1630 and 250 from 1630–1730.<ref>{{Cite book\
        \ |last1=Monter |first1=E. William |url={{google books|plainurl=y|id=ROnDOB-HHVIC|page=53}}|title=Frontiers\
        \ of Heresy: The Spanish Inquisition from the Basque Lands to Sicily |last2=Monter\
        \ |first2=William |date=2003-11-13 |publisher=Cambridge University Press |isbn=978-0-521-52259-5\
        \ |language=en|page= 53}}</ref>\n\nPre-1560 data rely on local tribunal archives,\
        \ many lost to time or events. Surviving records from Toledo (12,000 heresy-related\
        \ judgments, mostly minor \"blasphemy\") and Valencia show the Inquisition\
        \ was most active from 1480–1530, with a higher execution rate then. Modern\
        \ estimates suggest about 2,000 executions ''in persona'' in Spain up to 1530.{{sfn|Kamen|2005|p=15}}\n\
        \n====Statistics for 1540–1700====\nHenningsen and Contreras' statistics are\
        \ based entirely on ''relaciones de causas''. The number of years for which\
        \ cases are documented varies for different tribunals. Data for the Aragonese\
        \ Secretariat are probably complete, lacunae may concern only Valencia and\
        \ possibly Sardinia and Cartagena, but the numbers for Castilian Secretariat—except\
        \ Canaries and Galicia are considered as minimal due to documentation gaps.\
        \ In some cases the number does not concern the whole period 1540–1700.\n\n\
