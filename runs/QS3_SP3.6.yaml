        ## Result 1
        Title: List of British monarchs
        URL: https://en.wikipedia.org/wiki/List_of_British_monarchs
        Extract: There have been 13 British monarchs since the political union of the Kingdom of England and the Kingdom of Scotland, which occurred on 1 May 1707 upon the commencement of the Acts of Union. The first British monarch was Anne, who reigned between 1707 and 1714; the current monarch is Charles III, who acceded to the throne in September 2022. Although the style of "King of Great Britain" had been in use since the personal union of England and Scotland on 24 March 1603 under James VI and I, the official title came into effect legislatively in 1707 and therefore, apart from Anne, this list of British monarchs does not include the four earlier kings and one queen who ruled as monarchs of England and Scotland at the same time.
        On 1 January 1801, the Kingdom of Great Britain and the Kingdom of Ireland merged to create the United Kingdom of Great Britain and Ireland. This later became the United Kingdom of Great Britain and Northern Ireland upon the secession of the Irish Free State (now the Republic of Ireland) in the 1920s. British monarchs have also held various other titles reflecting their claims outside of the United Kingdom, including King of Hanover, Emperor of India, and Head of the Commonwealth. The title of monarch also comes with various secondary titles for land within the United Kingdom, such as the Duchy of Lancaster.

        ## Result 2
        Title: Monarchy of the United Kingdom
        URL: https://en.wikipedia.org/wiki/Monarchy_of_the_United_Kingdom
        Extract: The monarchy of the United Kingdom, commonly referred to as the British monarchy, is the form of government used by the United Kingdom by which a hereditary monarch reigns as the head of state, with their powers regulated by the British constitution. The term may also refer to the role of the royal family within the United Kingdom's broader political structure. The monarch since 8 September 2022 is King Charles III, who ascended the throne on the death of his mother, Queen Elizabeth II.
        The monarch and their immediate family undertake various official, ceremonial, diplomatic and representational duties. Although formally the monarch has authority over the government—which is known as "His/Her Majesty's Government"—this power may only be used according to laws enacted in Parliament and within constraints of convention and precedent. In practice the monarch's role, including that of Head of the Armed Forces, is limited to functions such as bestowing honours and appointing the prime minister, which are performed in a non-partisan manner. The UK Government has called the monarchy "a unique soft power and diplomatic asset". The Crown also occupies a unique cultural role, serving as an unofficial brand ambassador for British interests and values abroad, increasing tourism at home, and promoting charities throughout civil society.
        The British monarchy traces its origins from the petty kingdoms of Anglo-Saxon England and early medieval Scotland, which had consolidated into the separate kingdoms of England and Scotland by the 10th century. England was conquered by the Normans in 1066, after which Wales also gradually came under the control of Anglo-Normans. The process was completed in the 13th century when the Principality of Wales became a client state of the English kingdom. The Anglo-Normans also established the Lordship of Ireland. Meanwhile, the Magna Carta began the process of reducing the English monarch's political powers. In the 16th century, English and Scottish monarchs played a central role in what became the religious English Reformation and Scottish Reformation, and the English king became King of Ireland. Beginning in 1603, the English and Scottish kingdoms were ruled by a single sovereign when the Scottish King James VI acceded to the throne of England as James I. From 1649 to 1660, the tradition of monarchy was broken by the republican Commonwealth of England, which followed the Wars of the Three Kingdoms. Following the installation of William III and Mary II as co-monarchs in the Glorious Revolution, the Bill of Rights 1689, and its Scottish counterpart the Claim of Right Act 1689, further curtailed the power of the monarchy and excluded Catholics from succession to the throne. In 1707, the kingdoms of England and Scotland were merged to create the Kingdom of Great Britain, and in 1801, the Kingdom of Ireland joined to create the United Kingdom of Great Britain and Ireland.
        Beginning in the 16th century, the monarch was the nominal head of what came to be the vast British Empire, which covered a quarter of the world's land area at its greatest extent in 1921.  The title Emperor of India was added to the British monarch's titles between 1876 and 1948. The Balfour Declaration of 1926 recognised the evolution of the Dominions of the Empire into separate, self-governing countries within a Commonwealth of Nations. Also in this period, the monarchy in Ireland eventually became limited to Northern Ireland. In the years after World War II, the vast majority of British colonies and territories became independent, effectively bringing the Empire to an end. George VI and his successors adopted the title Head of the Commonwealth as a symbol of the free association of its independent member states. The United Kingdom and fourteen other independent sovereign states that share the same person as their monarch are called Commonwealth realms. Although the monarch is shared, each country is sovereign and independent of the others, and the monarch has a different, specific, and official national title and style for each realm.  Although the term is rarely used today, the fifteen Commonwealth realms are, with respect to their monarch, in personal union. The monarch is also head of state of the Crown Dependencies and the British Overseas Territories.

        ## Result 3
