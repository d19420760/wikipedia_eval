        \ quantity with dimension of reciprocal length, expressed in SI units of cycles\
        \ per metre or reciprocal metre (m−1). Angular wavenumber, defined as the\
        \ wave phase divided by length, is a quantity with dimension of angle per\
        \ length and SI units of radians per metre. They are analogous to temporal\
        \ frequency, respectively the ordinary frequency, defined as the number of\
