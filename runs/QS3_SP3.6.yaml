        \ causality, and they all require fanciful mechanisms to work (such as requiring\
        \ exotic matter).\n\n## Result 3\nTitle: One-way speed of light\nURL: https://en.wikipedia.org/wiki/One-way_speed_of_light\n\
        Extract: When using the term \"the speed of light\" it is sometimes necessary\
        \ to make the distinction between its one-way speed and its two-way speed.\
        \ The \"one-way\" speed of light, from a source to a detector, cannot be measured\
        \ independently of a convention as to how to synchronize the clocks at the\
        \ source and the detector. What can however be experimentally measured is\
