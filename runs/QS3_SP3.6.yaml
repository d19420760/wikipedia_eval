        \ it the most-watched Oscars broadcast in history.\n\n## Result 3\nTitle:\
        \ List of accolades received by Titanic\nURL: https://en.wikipedia.org/wiki/List_of_accolades_received_by_Titanic\n\
        Extract: Titanic is a 1997 American epic romance and disaster film directed,\
        \ written, co-produced, and co-edited by James Cameron. Incorporating both\
        \ historical and fictionalized aspects, it is based on accounts of the sinking\
        \ of the Titanic, and stars Leonardo DiCaprio and Kate Winslet as members\
        \ of different social classes who fall in love aboard the ship during its\
        \ ill-fated maiden voyage.\nRegarded as one of the greatest films ever made,\
        \ Titanic grossed a worldwide total of over $2.2 billion on a production budget\
        \ of $200 million, being the first and second film to reach the mark of one\
        \ and two billion dollars, respectively. It became the highest-grossing film\
        \ of all time in 1998, and remained so for twelve years, until Avatar (2009),\
        \ also written and directed by Cameron, surpassed it in 2010. On review aggregator\
        \ website Rotten Tomatoes, the film has an approval rating of 87% based on\
