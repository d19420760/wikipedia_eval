        \ democracy (1)\n| government3 = \n| government4 = \n| subdivision = \n| subdivision1\
        \ = \n| subdivision2 = \n| subdivision3 = \n| subdivision4 = \n}}\n\nThe [[European\
        \ Union]] (EU) is a [[supranational union]] of [[#List|27 member states]]\
        \ that are party to the EU's [[Treaties of the European Union|founding treaties]],\
        \ and thereby subject to the privileges and obligations of membership. They\
        \ have agreed by the treaties to share their own sovereignty through the [[institutions\
        \ of the European Union]] in certain aspects of government. State governments\
        \ must agree unanimously in the [[Council of the European Union|Council]]\
        \ for the union to adopt some policies; for others, collective decisions are\
        \ made by [[qualified majority voting]]. These obligations and sharing of\
        \ sovereignty (also known by some as \"pooling of sovereignty\") within the\
        \ EU make it unique among international organisations, as it has established\
        \ its own legal order which by the provisions of the founding treaties is\
        \ [[Primacy of European Union law|both legally binding and supreme]] on all\
        \ the member states (after [[Costa v ENEL|a landmark ruling of the ECJ in\
        \ 1964]]). A founding principle of the union is [[subsidiarity]], meaning\
        \ that decisions are taken collectively if and only if they cannot realistically\
        \ be taken individually.\n\nEach member country appoints to the [[European\
        \ Commission]] a [[European commissioner]]. The commissioners do not represent\
        \ their member state, but instead work collectively in the interests of all\
        \ the member states within the EU.\n\nIn the 1950s, [[Inner Six|six core states]]\
        \ founded the EU's predecessor [[European Communities]] ([[Belgium]], [[France]],\
        \ [[Italy]], [[Luxembourg]], the [[Netherlands]], and [[West Germany]]). The\
        \ remaining states have acceded in subsequent [[Enlargement of the European\
        \ Union|enlargements]]. To accede, a state must fulfil the economic and political\
        \ requirements known as the [[Copenhagen criteria]], which require a candidate\
        \ to have a democratic government and [[free-market]] economy together with\
        \ the corresponding freedoms and institutions, and respect for the [[rule\
        \ of law]]. Enlargement of the Union is also contingent upon the consent of\
        \ all existing members and the candidate's adoption of the existing body of\
        \ EU law, known as the ''[[acquis communautaire]]''.\n\nThe [[United Kingdom]],\
        \ which had acceded to the EU's predecessor in 1973, ceased to be an EU member\
        \ state on 31 January 2020, in a political process known as [[Brexit]]. No\
        \ other member state has withdrawn from the EU and none has been suspended,\
        \ although some dependent territories or semi-autonomous areas [[#Withdrawal|have\
        \ left]].\n\n{{TOC limit|limit=4}}\n{{clear}}\n\n== List ==\n{{sticky header}}{{table\
