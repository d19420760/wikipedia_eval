        ## Result 1
        Title: Member states of NATO
        URL: https://en.wikipedia.org/wiki/Member_states_of_NATO
        Extract: {{Short description|none}}
        {{Use dmy dates|date=June 2025}}
        {{Use Canadian English|date=April 2022}}
        {{For|the history of states becoming NATO members|Enlargement of NATO}}
        [[File:NATO members (blue).svg|thumb|upright=1.5|NATO in 2025 ]]
        The [[North Atlantic Treaty Organization]] (NATO) is an international [[military alliance]] consisting of 32 [[member states]] from [[Europe]] and [[North America]].<!-- Please do not add Asia because of Turkey. Current consensus is to consider Turkey as European for this purpose. See note to editors in the following paragraph for a more detailed explanation.--> It was established at the signing of the [[North Atlantic Treaty]] on 4 April 1949. Of the 32 member countries, 30 are in Europe<!-- Please do not change into something like "27 in Europe and 1 in Asia" (or "1&nbsp;transcontinental" or "1&nbsp;Eurasian") because of Turkey. Current consensus, as established in [[Talk:NATO/Archive 4#Eurasian?]], is to consider Turkey as European for this purpose (the definition of 'Europe' here is more political than geographical). If we were going to be geographically rigorous, we would have to remember that Portugal, Spain, France, the Netherlands and the UK all have territory in several other continents as well.--> and 2 are in North America. Between 1994 and 1997, wider forums for regional cooperation between NATO and its neighbours were set up, including the [[Partnership for Peace]], the [[Mediterranean Dialogue]] initiative, and the [[Euro-Atlantic Partnership Council]]. The majority of NATO members are also [[Member state of the European Union|member states of the European Union]].

        All members have militaries, except for [[Iceland]], which does not have a [[Military of Iceland|typical army]] (but it does have a [[Icelandic Coast Guard|coast guard]] and a small unit of civilian specialists for NATO operations). Three of NATO's members are [[List of states with nuclear weapons|nuclear weapons states]]: [[France]], the [[United Kingdom]], and the [[United States]]. NATO has 12&nbsp;original founding member states. Three more members joined between 1952 and 1955, and a fourth ([[Spain]]) joined in 1982. Since the end of the [[Cold War]], NATO has added 16&nbsp;more members from 1999 to 2024.<ref>{{Cite web |last=Center |first=Notre Dame International Security |date=23 March 2023 |title=The Addition of NATO Members Over Time (1949–2023) |url=https://ndisc.nd.edu/news-media/news/the-addition-of-nato-members-over-time-1949-2023/ |access-date=11 July 2023 |website=ND International Security Center |language=en |archive-date=21 January 2024 |archive-url=https://web.archive.org/web/20240121034928/https://ndisc.nd.edu/news-media/news/the-addition-of-nato-members-over-time-1949-2023/ |url-status=live }}</ref> [[North Atlantic Treaty#Article 5|Article&nbsp;5]] of the treaty states that if an armed attack occurs against one of the member states, it shall be [[Collective security#Collective defense|considered an attack against all members]], and other members shall assist the attacked member, with [[armed forces]] if necessary.<ref>{{Cite web |date=4 April 1949 |title=The North Atlantic Treaty |url=http://www.nato.int/cps/en/natohq/faq.htm |access-date=16 June 2008 |publisher=North Atlantic Treaty Organization |archive-date=1 March 2022 |archive-url=https://web.archive.org/web/20220301091750/https://www.nato.int/cps/en/natohq/faq.htm |url-status=live }}</ref> [[North Atlantic Treaty#Article 6|Article&nbsp;6]] of the treaty limits the scope of Article&nbsp;5 to the islands north of the [[Tropic of Cancer]], the North American and European mainlands, the entirety of [[Turkey]], and [[French Algeria]], the last of which has been moot since July 1962. Thus, an attack on [[Hawaii]], [[Puerto Rico]], [[French Guiana]], the [[Falkland Islands]], [[Ceuta]] or [[Melilla]], among other places, would not trigger an Article&nbsp;5 response.

        NATO recognizes [[Accession of Bosnia and Herzegovina to NATO|Bosnia and Herzegovina]], [[Georgia–NATO relations|Georgia]], and [[Ukraine–NATO relations|Ukraine]] as aspiring members as part of their [[NATO open door policy|Open Door]] [[Enlargement of NATO|enlargement policy]].<ref name="Englargement five">{{Cite web |date=10 June 2022 |title=Enlargement and Article 10 |url=https://www.nato.int/cps/en/natolive/topics_49212.htm |access-date=1 July 2022 |publisher=[[NATO]] |quote=Currently, five partner countries have declared their aspirations to NATO membership: Bosnia and Herzegovina, Finland, Georgia, Sweden and Ukraine. |archive-date=9 June 2021 |archive-url=https://web.archive.org/web/20210609182044/https://www.nato.int/cps/en/natolive/topics_49212.htm |url-status=live }}</ref>
        [[File:NATO 32 Members.png|thumb|Map of NATO in Europe:{{Legend|#2F66CD|Current members}}{{Legend|#6699fe|[[Membership Action Plan]]}}{{Legend|#9a009a|Countries seeking membership}}{{Legend|#9a9a9a|Countries where membership is not a goal}}{{Legend|#cd3030|[[Collective Security Treaty Organization]] (CSTO)}}]]

        ==Founding members and enlargement==
        {{main|Enlargement of NATO}}
        NATO was established on 4 April 1949 via the signing of the [[North Atlantic Treaty]] (Washington Treaty). The 12&nbsp;founding members of the Alliance were: [[Belgium]], [[Canada]], [[Denmark]], France, [[Iceland]], [[Italy]], [[Luxembourg]], the [[Netherlands]], [[Norway]], [[Portugal]], the United Kingdom, and the United States.<ref name="Members">{{Cite web |last=NATO |title=Member countries |url=https://www.nato.int/cps/en/natohq/topics_52044.htm |access-date=29 June 2022 |website=NATO |language=en |archive-date=19 November 2014 |archive-url=https://web.archive.org/web/20141119033339/https://www.nato.int/cps/en/natohq/topics_52044.htm |url-status=live }}</ref>

        The various allies all signed the Ottawa Agreement,<ref name="Mosquera 2019" /> which is a 1951 document that acts to embody civilian oversight of the Alliance.<ref name="Mosquera 2019">{{Cite news |last=Mosquera |first=Andrés B. Muñoz |date=2019 |title=The North Atlantic Treaty: Article&nbsp;9 and NATO's Institutionalization |url=https://scholarlycommons.law.emory.edu/cgi/viewcontent.cgi?article=1228&context=eilr |work=Volume 34 |publisher=Emory International Law Review |quote=Really, the ''Agreement on the Status of the North Atlantic Treaty Organisation, National Representatives and International Staff signed in Ottawa'' |access-date=3 July 2022 |archive-date=26 November 2022 |archive-url=https://web.archive.org/web/20221126234324/https://scholarlycommons.law.emory.edu/cgi/viewcontent.cgi?article=1228&context=eilr |url-status=live }}</ref><ref>{{Cite news |title=03. Agreement on the Status of the North Atlantic Treaty Organisation, National Representatives and International Staff, done at Ottawa September 20, 1951 |url=https://www.state.gov/north-atlantic-treaty-ottawa-agreement |publisher=US Department of State |access-date=3 July 2022 |archive-date=30 November 2022 |archive-url=https://web.archive.org/web/20221130031209/https://www.state.gov/north-atlantic-treaty-ottawa-agreement |url-status=live }}</ref>

        Current membership consists of 32&nbsp;countries. In addition to the 12&nbsp;founding countries, four new members joined during the Cold War: [[Greece]] and [[Turkey]] (1952), [[West Germany]] (1955) and [[Spain]] (1982). Additionally, NATO experienced territorial expansion during this period without adding new member states when [[Free Territory of Trieste#Dissolution|Zone A of the Free Territory of Trieste]] was annexed by Italy in 1954, and the territory of the former [[East Germany]] was added with the [[German reunification|reunification of Germany]] in 1990. NATO further expanded after the Cold War, adding the [[Czech Republic]], [[Hungary]], and [[Poland]] (1999); [[Bulgaria]], [[Estonia]], [[Latvia]], [[Lithuania]], [[Romania]], [[Slovakia]], and [[Slovenia]] (2004); [[Albania]] and [[Croatia]] (2009); [[Montenegro]] (2017); [[North Macedonia]] (2020); [[Finland]] (2023); and [[Sweden]] (2024).<ref name="Members" /> Of the territories and members added between 1990 and 2024, all except for [[Finland]] and [[Sweden]] were either formerly part of the [[Warsaw Pact]] (including the formerly Soviet [[Baltic states]]) or territories of the former [[Yugoslavia]]. No countries have left NATO since its founding, although [[France and NATO|France withdrew from NATO unified command]] between 1966 and 2009.

        Since the accession of Sweden on 7 March 2024, the North Atlantic Treaty Organization covers a total area of {{convert|27580492|km2|sqmi|abbr=on}}.

