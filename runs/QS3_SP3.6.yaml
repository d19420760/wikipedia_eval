      content: "## Result 1\nTitle: Pope Leo XIV\nURL: https://en.wikipedia.org/wiki/Pope_Leo_XIV\n\
        Extract: Pope Leo XIV (born Robert Francis Prevost, pronounced  PREE-vohst;\
        \ September 14, 1955) is the head of the Catholic Church and sovereign of\
        \ Vatican City. He is the first pope to have been born in the United States,\
        \ the first to hold either U.S. or Peruvian citizenship, the first from the\
        \ Order of Saint Augustine, and the second (after his immediate predecessor\
        \ Pope Francis) from the Americas.\nPrevost was born in Chicago and raised\
        \ in the neighboring town of Dolton, Illinois. He became a friar in the Order\
        \ of Saint Augustine in 1977 and was ordained as a priest in 1982. He earned\
        \ a Doctor of Canon Law (JCD) degree in 1987 from the Pontifical University\
        \ of St. Thomas Aquinas in Rome. His service includes extensive missionary\
        \ work in Peru in the 1980s and 1990s, during which he worked as a parish\
        \ pastor, diocesan official, seminary teacher, and administrator. Elected\
        \ prior general of the Order of Saint Augustine, he was based in Rome from\
        \ 2001 to 2013, and traveled extensively as part of this work, including to\
        \ the order's many provinces and missions around the world. He then returned\
        \ to Peru as Bishop of Chiclayo from 2015 to 2023. In 2023, Pope Francis appointed\
        \ him prefect of the Dicastery for Bishops in Rome, and president of the Pontifical\
        \ Commission for Latin America. Upon his return to Rome, Prevost was made\
        \ a cardinal.\nAs a cardinal, Prevost emphasized synodality, missionary dialogue,\
        \ and engagement with social and technological challenges. He has also addressed\
        \ issues such as climate change, international migration, church governance,\
        \ and human rights. Prevost's election in the 2025 conclave was unexpected\
        \ by observers; he was a dark horse candidate, with Vatican insiders believing\
        \ the prospect of a pope from the United States to be unrealistic given its\
        \ status as a superpower. Following the precedent of Pope Leo XIII, who developed\
        \ modern Catholic social teaching amid the tumult of the Second Industrial\
        \ Revolution, Prevost chose the papal name Leo XIV—both to echo Leo XIII's\
        \ concern for workers and fairness, and as a response to the challenges of\
        \ a new industrial revolution and artificial intelligence.\nAs pope, Leo has\
        \ consistently opposed armed conflict and nationalism while advocating for\
        \ the rights of immigrants. He has introduced new warnings about the use of\
        \ artificial intelligence technology. Leo has affirmed the teachings of his\
        \ predecessors, including social teachings on the environment, marriage, and\
        \ sexuality. He has consistently pointed to the teachings of the Second Vatican\
        \ Council as the \"guiding star\" of the church.\n\n## Result 2\nTitle: Catholic\
        \ Church\nURL: https://en.wikipedia.org/wiki/Catholic_Church\nExtract: The\
        \ Catholic Church (Latin: Ecclesia Catholica), commonly called the Roman Catholic\
        \ Church, is the largest Christian church, with an estimated 1.28 to 1.41\
        \ billion baptized members worldwide as of 2026. It consists of 24 autonomous\
        \ (sui iuris) churches—the Latin Church and 23 Eastern Catholic Churches—organized\
        \ into nearly 3,500 dioceses and eparchies governed by bishops. Throughout\
        \ history, the church has had a large role in the development of Western civilization.\
        \ Catholic communities are present worldwide through missions, immigration,\
        \ and conversions. The majority of Catholics live in the Global South, reflecting\
        \ rapid demographic growth in Africa, Asia, and Latin America, as well as\
        \ secularization in parts of Europe and North America.\nCatholic doctrine\
        \ is rooted in the Nicene Creed and holds that the church is the \"one, holy,\
        \ catholic and apostolic Church\" founded by Jesus Christ. It teaches that\
        \ bishops are the successors of the apostles and that the pope—the bishop\
        \ of Rome—is the successor of Saint Peter the Apostle, entrusted with a unique\
        \ and primary pastoral role. The pope serves as the head of the church; the\
        \ Diocese of Rome forms his local jurisdiction, while the Holy See serves\
        \ as the church's central governing authority through the Roman Curia. Apostolic\
        \ teaching is understood to be transmitted through Scripture and sacred tradition,\
        \ interpreted by the magisterium, the church's teaching authority. Catholic\
        \ liturgical life includes the Roman Rite, other rites of the Latin Church,\
        \ and the liturgical traditions of the Eastern Catholic Churches. Religious\
        \ orders, monastic communities, and lay movements contribute to a wide range\
        \ of theological and devotional expressions within Catholicism globally.\n\
        Among the church's seven sacraments, the Eucharist is seen as the source and\
        \ summit of the Christian life and is celebrated in the Mass. Catholics believe\
        \ that through consecration by a priest, the bread and wine become the body\
        \ and blood of Christ. The Virgin Mary is venerated as the Mother of God and\
        \ honored through dogmas such as the Immaculate Conception, perpetual virginity,\
        \ and Assumption, including devotional practices. Catholic social teaching\
        \ emphasizes care for the poor, the sick, and the marginalized. The church\
        \ operates tens of thousands of educational, medical, and charitable institutions\
        \ worldwide, becoming the largest non-governmental provider of education and\
        \ health care.\nIts relations with other Christian traditions have been shaped\
        \ by divisions. The separation between the church and Eastern Orthodox churches\
        \ within the state Roman church developed gradually and was solidified by\
        \ the Fourth Crusade, amidst theological and political disputes, especially\
        \ over papal authority. Earlier schisms occurred with the Church of the East\
        \ after the Council of Ephesus (431) and with the Oriental Orthodox Churches\
        \ following the Council of Chalcedon (451). The 16th-century Protestant Reformation\
        \ led to new Christian traditions and prompted the Catholic Counter‑Reformation.\
        \ Since the late 20th century, the church has faced criticism on its teachings\
        \ on sexuality, clerical celibacy, the ordination of women, and its handling\
        \ of clerical sexual abuse.\n\n## Result 3\nTitle: Palmarian Catholic Church\n\
        URL: https://en.wikipedia.org/wiki/Palmarian_Catholic_Church\nExtract: The\
        \ Palmarian Catholic Church (Spanish: Iglesia Católica Palmariana), officially\
        \ registered as the Palmarian Christian Church and also known as the Palmarian\
        \ Church, is a Christian church with an episcopal see in El Palmar de Troya,\
        \ Andalusia, Spain. The Palmarian Church claims to be the exclusive One, Holy,\
        \ Catholic and Apostolic Church founded by Jesus Christ. It claims that the\
        \ Holy See, the institution of the Papacy and the headquarters of the Catholic\
        \ Church was moved to El Palmar de Troya at the Cathedral-Basilica of Our\
        \ Crowned Mother of Palmar, under the auspices of the Patriarchate of El Palmar\
        \ de Troya, in 1978, due to the alleged apostasy of the Roman Catholic Church\
        \ from the Catholic faith.\nThe origins of the Palmarians as a distinct body\
        \ can be traced back to the alleged Marian apparitions of Our Lady of Palmar,\
        \ which took place in Andalusia, Spain, from 1968 onward. Two men became particularly\
        \ associated with this movement as time went on, Clemente Domínguez y Gómez\
        \ and Manuel Alonso Corral. The former was known as a charismatic visionary\
        \ and seer, while the latter the intellectual éminence grise. The messages\
        \ of these visions were favourable to a traditionalist Catholic pushback to\
        \ the liberalising changes introduced by the Second Vatican Council and alleged\
        \ a Masonic infiltration of the Roman Catholic Church. In 1975, the Palmarians\
        \ founded a religious order known as the Carmelites of the Holy Face and had\
        \ a number of priests ordained, then consecrated as bishops by Archbishop\
        \ Ngô Đình Thục, giving them holy orders. After the death of Pope Paul VI\
        \ in 1978, Clemente Domínguez claimed that he had been mystically crowned\
        \ pope of the Catholic Church by Jesus Christ and was to reign as Pope Gregory\
        \ XVII from El Palmar de Troya.\nFour subsequent Palmarian popes have reigned.\
        \ Its current head since 2016 is Pope Peter III. Critical scholars, journalists\
        \ and former followers often describe the organization as a religious cult.\
        \ Members of the Church are required to comply with a wide range of compulsory\
        \ moral and behavioural standards known as the Norms, from strict modesty\
        \ in dress, to restricted media consumption and limitations on social interaction\
        \ with non-Palmarians, among many other rules. Non-compliance can lead to\
        \ excommunication for members, which has led some Palmarians to engage in\
        \ shunning of those who have either been expelled or apostatized from the\
        \ Palmarian Church.\n\n## Result 4\nTitle: Pope John Paul II\nURL: https://en.wikipedia.org/wiki/Pope_John_Paul_II\n\
        Extract: Pope John Paul II (born Karol Józef Wojtyła; 18 May 1920 – 2 April\
        \ 2005) was head of the Catholic Church and sovereign of Vatican City from\
        \ 16 October 1978 until his death in 2005. He was the first non-Italian pope\
        \ since Adrian VI in the 16th century, as well as the third-longest-serving\
        \ pope in history, after St. Peter and Pius IX.\nIn his youth, Wojtyła dabbled\
        \ in stage acting. He graduated with excellent grades from an all-boys high\
        \ school in Wadowice, Poland, in 1938, soon after which World War II broke\
        \ out. During the war, to avoid being kidnapped and sent to a German forced\
        \ labour camp, he signed up for work in harsh conditions in a quarry. Wojtyła\
        \ eventually took up acting and developed a love for the profession and participated\
        \ at a local theatre. The linguistically skilled Wojtyła wanted to study Polish\
        \ in university. During his studies, he was encouraged by a conversation with\
        \ Adam Stefan Sapieha to study theology and become a priest. Eventually, Wojtyła\
        \ rose to the position of Archbishop of Kraków and then a cardinal, both positions\
        \ held by his mentor. Wojtyła was elected pope on the third day of the October\
        \ 1978 conclave, becoming one of the youngest popes in over a century. The\
        \ conclave was called after the death of John Paul I, who served only 33 days\
        \ as pope. Wojtyła adopted the name of his predecessor in tribute to him.\n\
        Pope John Paul II attempted to improve the Catholic Church's relations with\
        \ Judaism, Islam, and the Eastern Orthodox Church in the spirit of ecumenism,\
        \ holding atheism as the greatest threat. He maintained the Church's previous\
        \ positions on such matters as abortion, artificial contraception, the ordination\
        \ of women, and a celibate clergy, and although he supported the reforms of\
        \ the Second Vatican Council, he was seen as generally conventional in their\
        \ interpretation. He put emphasis on family and identity, while questioning\
        \ consumerism, hedonism and the pursuit of wealth. He was one of the most-travelled\
        \ world leaders in history, visiting 129 countries during his pontificate.\
        \ As part of his special emphasis on the universal call to holiness, Pope\
        \ John Paul II beatified 1,344 people, and canonised 483 saints, more than\
        \ the combined tally of his predecessors during the preceding five centuries.\
        \ By the time of his death, he had named most of the College of Cardinals,\
        \ consecrated or co-consecrated many of the world's bishops, and ordained\
        \ many priests. Pope John Paul II died on 2 April 2005, and was succeeded\
        \ by Pope Benedict XVI.\nPope John Paul II has been credited with fighting\
        \ against dictatorships and with helping to end communist rule in his native\
        \ Poland and the rest of Europe. Under John Paul II, the Catholic Church greatly\
        \ expanded its influence in Africa and Latin America and retained its influence\
        \ in Europe and the rest of the world. He was proclaimed venerable by Pope\
        \ Benedict XVI on 19 December 2009, and on 1 May 2011 (Divine Mercy Sunday)\
        \ he was beatified. On 27 April 2014, Pope John Paul II was canonised by Pope\
        \ Francis, alongside Pope John XXIII. He has been criticised for allegedly,\
        \ as archbishop under Communist Poland, having been insufficiently harsh in\
        \ acting against the sexual abuse of children by priests. After his canonisation,\
        \ he has been referred to by some Catholics as Pope Saint John Paul the Great,\
        \ though that title is not official.\nUnder Pope John Paul II, two of the\
        \ most important documents of the contemporary Catholic Church were drafted\
        \ and promulgated: the 1983 Code of Canon Law, which revised and updated the\
        \ 1917 Code of Canon Law, and the Catechism of the Catholic Church, the first\
        \ universal catechism to be issued since the Roman Catechism.\n\n## Result\
        \ 5\nTitle: Cardinal (Catholic Church)\nURL: https://en.wikipedia.org/wiki/Cardinal_(Catholic_Church)\n\
        Extract: A cardinal is a senior member of the clergy of the Catholic Church.\
        \ As titular members of the clergy of the Diocese of Rome, they serve as advisors\
        \ to the pope, who is the bishop of Rome and the visible head of the worldwide\
        \ Catholic Church. Cardinals are chosen and formally created by the pope,\
        \ and typically hold the title for life. Collectively, they constitute the\
        \ College of Cardinals. The most solemn responsibility of the cardinals is\
        \ to elect a new pope in a conclave when the Holy See is vacant. With a few\
        \ historical exceptions, popes are elected from among the College of Cardinals.\n\
        During the period between a pope's death or resignation and the election of\
        \ his successor, the day-to-day governance of the Holy See is in the hands\
        \ of the College of Cardinals. The right to participate in a conclave is limited\
        \ to cardinals who have not reached the age of 80 years by the day the vacancy\
        \ occurs. With the pope, cardinals collectively participate in papal consistories,\
        \ in which matters of importance to the Church are considered and new cardinals\
        \ may be created. Cardinals of working age are also often appointed to roles\
        \ overseeing dicasteries (departments) of the Roman Curia, the central administration\
        \ of the Catholic Church.\nCardinals are drawn from a variety of backgrounds,\
        \ being appointed as cardinals in addition to their existing roles within\
        \ the Church. Most cardinals are bishops and archbishops leading dioceses\
        \ and archdioceses around the world – often the most prominent diocese or\
        \ archdiocese in their country. Others are titular bishops who are current\
        \ or former officials within the Roman Curia, generally the heads of dicasteries\
        \ and other bodies linked to the Curia. A very small number are priests recognised\
        \ by the pope for their service to the Church. Canon law requires them to\
        \ be generally consecrated as bishops before they are made cardinals, but\
        \ some are granted a papal dispensation. There are no strict criteria for\
        \ elevation to the College of Cardinals. Since 1917, a potential cardinal\
        \ must already be at least a priest, but laymen have been cardinals in the\
        \ past. The selection is entirely up to the pope, and tradition is his only\
        \ guide.\nAs of 22 May 2026, there are 242 serving cardinals, of whom 117\
        \ are eligible to vote in a conclave to elect a new pope.\n\n## Result 6\n\
        Title: Evolution and the Catholic Church\nURL: https://en.wikipedia.org/wiki/Evolution_and_the_Catholic_Church\n\
        Extract: The Catholic Church holds no official position on the theory of creation\
        \ or evolution, leaving the specifics of either theistic evolution or literal\
        \ creationism to the individual within certain parameters established by the\
        \ Church. According to the Catechism of the Catholic Church, any believer\
        \ may accept either literal or special creation within the period of an actual\
        \ six-day, twenty-four-hour period, or they may accept the belief that the\
        \ earth evolved over time under the guidance of God. Catholicism holds that\
        \ God initiated and continued the process of his creation, that Adam and Eve\
        \ were real people, and that all humans, whether specially created or evolved,\
        \ have and have always had specially created souls for each individual.\n\
        Early contributions to biology were made by Catholic scientists such as the\
        \ Augustinian friar Gregor Mendel. Since the publication of Charles Darwin's\
        \ On the Origin of Species in 1859, the attitude of the Catholic Church on\
        \ the theory of evolution has slowly been refined. For nearly a century, the\
        \ papacy offered no authoritative pronouncement on Darwin's theories. In the\
        \ 1950 encyclical Humani generis, Pope Pius XII confirmed that there is no\
        \ intrinsic conflict between Christianity and the theory of evolution, provided\
        \ that Christians believe that God created all things and that the individual\
        \ soul is a direct creation by God and not the product of purely material\
        \ forces. Today, the Church supports theistic evolution, also known as evolutionary\
        \ creation.\nCatholic schools teach evolution as part of their science curriculum.\
        \ They teach the fact that evolution occurs and that modern evolutionary synthesis\
        \ is how evolution proceeds.\n\n## Result 7\nTitle: Catholic Church sexual\
        \ abuse cases\nURL: https://en.wikipedia.org/wiki/Catholic_Church_sexual_abuse_cases\n\
        Extract: Reports of the sexual abuse of minors by Catholic clergy and members\
        \ of religious orders have been documented in numerous countries. Beginning\
        \ in the late 20th century, allegations and subsequent investigations revealed\
        \ long-term patterns of misconduct and, in some instances, failures by Church\
        \ authorities to address or disclose allegations. Victims were primarily boys,\
        \ though girls were also affected, with reported ages ranging from early childhood\
        \ to adolescence. Public awareness increased as many adults came forward years\
        \ after the alleged incidents, prompting criminal prosecutions, civil litigation,\
        \ and internal Church reviews. \nBy the 1990s and early 2000s, major inquiries\
        \ in several countries identified systemic shortcomings in how abuse was reported\
        \ and handled. The Boston Globe's 2002 investigation — later depicted in the\
        \ film Spotlight — brought significant attention to the issue in the United\
        \ States and contributed to broader international scrutiny. Between 2001 and\
        \ 2010, the Holy See reviewed approximately 3,000 cases involving priests,\
        \ some of which dated back decades. Scholars have noted that sexual abuse\
        \ is often underreported, making it difficult to determine the full extent\
        \ of the problem.\nSuccessive popes have issued statements and implemented\
        \ reforms in response to the crisis. John Paul II described sexual abuse within\
        \ the Church as \"a profound contradiction of the teaching and witness of\
        \ Jesus Christ\". Benedict XVI met with victims, expressed \"shame\" for the\
        \ harm caused, and criticized failures by Church leaders. Pope Francis initially\
        \ faced criticism for comments related to a Chilean case but later apologized\
        \ for what he called a \"tragic error,\" convened a global meeting of episcopal\
        \ conference presidents in 2019, and introduced measures intended to increase\
        \ transparency and accountability. Pope Leo XIV, while serving as a bishop,\
        \ publicly encouraged victims to report abuse and rejected secrecy in an interview,\
        \ though some critics have alleged that he mishandled cases during his tenure\
        \ in Chiclayo.\nDebate has continued regarding the extent and framing of media\
        \ coverage. Some commentators argue that reporting has at times reflected\
        \ anti-Catholic bias and emphasize that abuse also occurs in other religious\
        \ and secular institutions. Studies cited by psychologists, including Thomas\
        \ G. Plante, have found no evidence that Catholic clergy abuse minors at higher\
        \ rates than other adult men or clergy from other traditions. Others maintain\
        \ that the global scale of documented cases within the Church warrants sustained\
        \ scrutiny, focusing on how institutional structures, cultural norms, and\
        \ patterns of clerical authority may contribute to abuse or impede accountability.\n\
        \n## Result 8\nTitle: Catholic Church and capital punishment\nURL: https://en.wikipedia.org/wiki/Catholic_Church_and_capital_punishment\n\
        Extract: Since 2018, the Catechism of the Catholic Church has stated that\
        \ the Catholic Church opposes the death penalty. That year, Pope Francis had\
        \ revised the Catechism to read that the death penalty is \"inadmissible\"\
        \ and that the Church works \"for its abolition worldwide.\" Prior to this,\
        \ the 1992 Catechism promulgated by Pope John Paul II had permitted the practice,\
        \ reading that \"the traditional teaching of the Church does not exclude recourse\
        \ to the death penalty\", though he stated that the practice must be limited\
        \ only to extreme circumstances. The Catechism is not regarded as an infallible\
        \ document by the church.\nHistorically, the Catholic Church has supported\
        \ the death penalty. Figures including Pope Innocent I, Pope Innocent III,\
        \ Thomas Aquinas, Francisco de Vitoria, Francisco Suárez, Pope Pius V, Robert\
        \ Bellarmine, Alphonsus Liguori, Thomas More, John Henry Newman, Pope Pius\
        \ X, and Pope Pius XII all wrote in support of the practice. Conversely, several\
        \ theologians and Church Fathers prior to the 5th century including Justin\
        \ Martyr, Tertullian, Origen, and Cyprian of Carthage have opposed it.\nUnder\
        \ the Papal States, the church employed state executioners, notably including\
        \ Giovanni Battista Bugatti. Under Vatican City, the death penalty was legal\
        \ between 1929 to 1969, but was never applied.\nIn the modern era, many Catholic\
        \ theologians and philosophers argue that the death penalty is intrinsically\
        \ evil, though this view is disputed by others. Development of church doctrine\
        \ led to increasing criticism of the practice during the 20th century. Modern\
        \ Church figures such as Pope John Paul II and the United States Conference\
        \ of Catholic Bishops actively discouraged the imposition of the death penalty\
        \ and advocated for its abolition. Others, including Avery Dulles, Charles\
        \ J. Chaput, and Pope Benedict XVI have personally opposed the death penalty,\
        \ while defending the rights of Catholics to support the practice. \nPope\
        \ Francis has strengthened opposition to the practice, including with the\
        \ 2024 declaration Dignitas Infinita. In September 2025, Leo XIV described\
        \ supporters of the practice as not being truly \"pro-life\". Their views\
        \ have been controversial and led to backlash from some Catholics, including\
        \ Raymond Leo Burke, Gerhard Ludwig Müller, Athanasius Schneider, Scott Hahn,\
        \ Edward Feser, and the Society of Saint Pius X.\n\n## Result 9\nTitle: Eastern\
        \ Catholic Churches\nURL: https://en.wikipedia.org/wiki/Eastern_Catholic_Churches\n\
        Extract: The Eastern Catholic Churches or Oriental Catholic Churches, also\
        \ known as the Eastern-Rite Catholic Churches, Eastern Rite Catholicism, or\
        \ simply the Eastern Churches, are 23 Eastern Christian autonomous (sui iuris)\
        \ particular churches of the Catholic Church in full communion with the pope\
        \ in Rome. Although they are distinct theologically, liturgically, and historically\
        \ from the Latin Church, they are all in full communion with it and with each\
        \ other. Eastern Catholics are a minority within the Catholic Church; of the\
        \ 1.3 billion Catholics in communion with the pope, approximately 18 million\
        \ are members of the Eastern churches. The largest numbers of Eastern Catholics\
        \ are found in Eastern Europe, Eastern Africa, the Middle East, and India.\
        \ As of 2022, the Syro-Malabar Church is the largest Eastern Catholic Church,\
        \ followed by the Ukrainian Greek Catholic Church.\nWith the exception of\
        \ the Maronite Church, the Eastern Catholic Churches are groups that, at different\
        \ points in the past, used to belong to the Eastern Orthodox Church, the Oriental\
        \ Orthodox churches, or the Church of the East; these churches underwent various\
        \ schisms through history. Eastern Catholic Churches that were formerly part\
        \ of other communions have been points of controversy in ecumenical relations\
        \ with the Eastern Orthodox and other non-Catholic churches. The five historic\
        \ liturgical traditions of Eastern Christianity, namely the Alexandrian Rite,\
        \ the Armenian Rite, the Byzantine Rite, the East Syriac Rite, and the West\
        \ Syriac Rite, are all represented within Eastern Catholic liturgy. On occasion,\
        \ this leads to a conflation of the liturgical word \"rite\" and the institutional\
        \ word \"church\". Some Eastern Catholic jurisdictions admit members of churches\
        \ not in communion with Rome to the Eucharist and the other sacraments.\n\
        Full communion with the bishop of Rome constitutes mutual sacramental sharing\
        \ between the Eastern Catholic Churches and the Latin Church and the recognition\
        \ and acceptance of papal supremacy and infallibility. Provisions within the\
        \ 1983 Latin canon law and the 1990 Code of Canons of the Eastern Churches\
        \ govern the relationship between the Eastern and Latin churches. Historically,\
        \ pressure to conform to the norms of the Western Christianity practiced by\
        \ the majority Latin Church led to a degree of encroachment (Latinization)\
        \ on some of the Eastern Catholic traditions. The Second Vatican Council document,\
        \ Orientalium Ecclesiarum, built on previous reforms to reaffirm the right\
        \ of Eastern Catholics to maintain their distinct practices.\nThe 1990 Code\
        \ of Canons of the Eastern Churches was the first codified body of canon law\
        \ governing the Eastern Catholic Churches collectively, although each church\
        \ also has its own internal canons and laws on top of this. Members of Eastern\
        \ Catholic churches are obliged to follow the norms of their particular church\
        \ regarding celebration of church feasts, marriage, and other customs. Notable\
        \ distinct norms include many Eastern Catholic Churches regularly allowing\
        \ the ordination of married men to the priesthood (although not as bishops\
        \ to the episcopacy), in contrast to the stricter clerical celibacy of the\
        \ Latin Church. Both Latin and Eastern Catholics may freely attend a Catholic\
        \ liturgy celebrated in any rite.\n\n## Result 10\nTitle: Ethiopian Catholic\
        \ Church\nURL: https://en.wikipedia.org/wiki/Ethiopian_Catholic_Church\nExtract:\
        \ The Ethiopian Catholic Church is a sui iuris (autonomous) Eastern Catholic\
        \ church that is based in Ethiopia. As a particular church of the Catholic\
        \ Church, it is in full communion with the Holy See. Established in 1930,\
        \ the church is organised under a metropolitan bishop who exercises oversight\
        \ of a number suffragan dioceses. In its liturgical services, it uses the\
        \ Alexandrian Rite in the Geʽez language (a local liturgical language).\n\
        It holds to the Christological doctrines defined at the Council of Chalcedon\
        \ and accepts the universal jurisdiction of the pope. These points distinguish\
        \ it from the Ethiopian Orthodox Tewahedo Church, an Oriental Orthodox church\
        \ which comprises most Christians in the country."
