        ===Special arrangements===
        The three [[Nordic countries]] which joined NATO as founding members, Denmark, Iceland and Norway, chose to limit their participation in three areas: there would be no permanent peacetime bases, no nuclear warheads and no Allied military activity (unless invited) permitted on their territory. However, Denmark allowed the US to maintain an existing base, [[Pituffik Space Base|Thule Air Base (now Pituffik Space Base)]], in Greenland.<ref>{{Cite web |title=Denmark and NATO – 1949 |url=https://www.nato.int/cps/en/natohq/declassified_162357.htm |access-date=13 April 2022 |archive-date=13 April 2022 |archive-url=https://web.archive.org/web/20220413192145/https://www.nato.int/cps/en/natohq/declassified_162357.htm |url-status=live }}</ref>

        From the mid-1960s to the mid-1990s, [[France]] pursued a military strategy of independence from NATO under a policy dubbed "Gaullo-Mitterrandism".<ref>{{Cite web |date=29 April 2019 |title=Why the concept of Gaullo-Mitterrandism is still relevant |url=https://www.iris-france.org/136272-why-the-concept-of-gaullo-mitterrandism-is-still-relevant/ |url-status=live |archive-url=https://web.archive.org/web/20220307043522/https://www.iris-france.org/136272-why-the-concept-of-gaullo-mitterrandism-is-still-relevant/ |archive-date=7 March 2022 |access-date=7 March 2022 |website=IRIS}}</ref> [[Nicolas Sarkozy]] negotiated the return of France to the integrated military command and the Defence Planning Committee in 2009, the latter being disbanded the following year. France remains the only NATO member outside the [[NATO Nuclear Planning Group|Nuclear Planning Group]] and unlike the United States and the United Kingdom, will not commit its nuclear-armed submarines to the alliance.<ref>{{Cite news |last=Cody |first=Edward |date=12 March 2009 |title=After 43 Years, France to Rejoin NATO as Full Member |url=https://www.washingtonpost.com/wp-dyn/content/article/2009/03/11/AR2009031100547.html |url-status=live |archive-url=https://web.archive.org/web/20171026171515/http://www.washingtonpost.com/wp-dyn/content/article/2009/03/11/AR2009031100547.html |archive-date=26 October 2017 |access-date=19 December 2011 |newspaper=[[The Washington Post]]}}</ref><ref>{{Cite news |last=Stratton |first=Allegra |date=17 June 2008 |title=Sarkozy military plan unveiled |url=https://www.theguardian.com/world/2008/jun/17/france.military |url-status=live |archive-url=https://web.archive.org/web/20160307184804/http://www.theguardian.com/world/2008/jun/17/france.military |archive-date=7 March 2016 |access-date=17 December 2016 |work=The Guardian |location=UK}}</ref>

        ==Membership aspirations==
        {{As of|2024|March}}, three additional states have formally informed NATO of their membership aspirations: [[Bosnia and Herzegovina]], [[Georgia (country)|Georgia]], and [[Ukraine]].<ref name="Englargement five" />
        * NATO members agreed at the [[2008 Bucharest summit|2008 Bucharest Summit]] that [[Georgia (country)|Georgia]] and [[Ukraine]] "will become members of NATO in the future".<ref name="Enlargement" />
        * [[Bosnia and Herzegovina]] was invited by NATO to join the Membership Action Plan (MAP) in April 2010.<ref name="Enlargement">{{Cite web |last=NATO |title=Enlargement and Article 10 |url=https://www.nato.int/cps/en/natohq/topics_49212.htm |access-date=29 June 2022 |website=NATO |language=en |archive-date=11 March 2018 |archive-url=https://web.archive.org/web/20180311021319/https://www.nato.int/cps/en/natohq/topics_49212.htm |url-status=live }}</ref>

        ==Withdrawal==
        No state has ever [[withdrawal from NATO|withdrawn from NATO]], but some dependencies of member states have not requested membership after becoming independent:
        * {{flag|Cyprus}} (independence from the United Kingdom in 1960)
        * {{flag|Algeria}} (independence from France in 1962)
        * {{flag|Malta}} (independence from the United Kingdom in 1964)

