        \ plants. It was estimated that the S-50 plant had sped up production of enriched\
        \ uranium used in the Little Boy bomb employed in the atomic bombing of Hiroshima\
        \ by a week.\nThe S-50 plant ceased production in September 1945, but it was\
        \ reopened in May 1946, and used by the United States Army Air Forces Nuclear\
        \ Energy for the Propulsion of Aircraft (NEPA) project. The plant was demolished\
        \ in the late 1940s.\n\n## Result 9\nTitle: British contribution to the Manhattan\
        \ Project\nURL: https://en.wikipedia.org/wiki/British_contribution_to_the_Manhattan_Project\n\
        Extract: Britain initiated the world's first research project to design an\
        \ atomic bomb in 1941. Building on this work, Britain prompted the United\
        \ States to recognise how important this type of research was, helped the\
        \ U.S. to start the Manhattan Project in 1942, and supplied crucial expertise\
        \ and materials that contributed to the project's successful completion in\
        \ time to influence the end of the Second World War.\nFollowing the discovery\
        \ of nuclear fission in uranium, scientists Rudolf Peierls and Otto Frisch\
        \ at the University of Birmingham calculated, in March 1940, that the critical\
        \ mass of a metallic sphere of pure uranium-235 was as little as 1 to 10 kilograms\
        \ (2.2 to 22.0 lb), and would explode with the power of thousands of tons\
        \ of dynamite. The Frisch–Peierls memorandum prompted Britain to create an\
        \ atomic bomb project, known as Tube Alloys. Mark Oliphant, an Australian\
        \ physicist working in Britain, was instrumental in making the results of\
        \ the British MAUD Report known in the United States in 1941 by a visit in\
        \ person. Initially the British project was larger and more advanced, but\
        \ after the United States entered the war, the American project soon outstripped\
