        |}\n\n===2020 census===\nAs of the [[2020 United States census|2020 census]],\
        \ Ithaca had a population of 32,108. The median age was 22.9 years. 8.8% of\
        \ residents were under the age of 18 and 8.1% of residents were 65 years of\
        \ age or older. For every 100 females there were 104.3 males, and for every\
        \ 100 females age 18 and over there were 105.6 males age 18 and over.<ref\
        \ name=\"Census2020DP\">{{cite web|title=2020 Decennial Census Demographic\
        \ Profile (DP1)|url=https://api.census.gov/data/2020/dec/dp?get=NAME%2CDP1_0021P%2CDP1_0024P%2CDP1_0025C%2CDP1_0049C%2CDP1_0045C%2CDP1_0069C%2CDP1_0073C%2CDP1_0125P%2CDP1_0126P%2CDP1_0129P%2CDP1_0133P%2CDP1_0137P%2CDP1_0138P%2CDP1_0139P%2CDP1_0141P%2CDP1_0142P%2CDP1_0143P%2CDP1_0145P%2CDP1_0146P%2CDP1_0147C%2CDP1_0148C%2CDP1_0149C%2CDP1_0156C%2CDP1_0157C%2CDP1_0158C%2CDP1_0159P%2CDP1_0160P&for=place%3A38077&in=state%3A36|website=United\
        \ States Census Bureau|year=2021|access-date=April 11, 2026|df=mdy}}</ref><ref\
        \ name=\"Census2020PL\"/>\n\n100.0% of residents lived in urban areas, while\
        \ 0.0% lived in rural areas.<ref name=\"Census2020DHC\">{{cite web|title=2020\
        \ Decennial Census Demographic and Housing Characteristics (DHC)|url=https://api.census.gov/data/2020/dec/dhc?get=NAME%2CP2_002N%2CP2_003N&for=place%3A38077&in=state%3A36|website=United\
        \ States Census Bureau|year=2023|access-date=April 11, 2026|df=mdy}}</ref>\n\
        \nThere were 12,440 households in Ithaca, of which 12.6% had children under\
        \ the age of 18 living in them. Of all households, 16.8% were married-couple\
        \ households, 36.1% were households with a male householder and no spouse\
        \ or partner present, and 40.9% were households with a female householder\
        \ and no spouse or partner present. About 49.5% of all households were made\
        \ up of individuals and 8.1% had someone living alone who was 65 years of\
        \ age or older.<ref name=\"Census2020DP\"/>\n\nThere were 14,011 housing units,\
        \ of which 11.2% were vacant. The homeowner vacancy rate was 1.6% and the\
        \ rental vacancy rate was 6.8%.<ref name=\"Census2020DP\"/>\n\nThe most reported\
        \ ancestries in [[2020 United States census|2020]] were:<ref>{{cite web |title=TOTAL\
        \ POPULATION |url=https://data.census.gov/table?t=-06:-1000E:-3000F:-4000G:-5000K:-7000E:-8000B&g=160XX00US3638077&d=DEC+Detailed+Demographic+and+Housing+Characteristics+File+A\
        \ |website=data.census.gov |publisher=U.S. Census Bureau}}</ref>\n* [[Germans|German]]\
        \ (12.6%)\n* [[Irish people|Irish]] (11.6%)\n* [[English people|English]]\
        \ (11.2%)\n* [[Chinese people|Chinese]] (6.8%)\n* [[Italians|Italian]] (6.6%)\n\
