        \ |archive-date=June 29, 2007 }}, [[Office of Management and Budget]], May\
        \ 11, 2007. Retrieved 2008-08-01.</ref><ref>{{cite web|url=https://www.census.gov/population/www/estimates/metro_general/2006/List6.txt\
        \ |title=Archived copy |access-date=June 29, 2007 |url-status=dead |archive-url=https://web.archive.org/web/20070629011223/http://www.census.gov/population/www/estimates/metro_general/2006/List6.txt\
        \ |archive-date=June 29, 2007 }}, [[Office of Management and Budget]], May\
        \ 11, 2007. Retrieved 2008-08-01.</ref> which had a combined population of\
        \ 145,100 at the [[2000 United States census|2000 census]].<ref name=\"GR2\"\
        >{{Cite web|url=https://www.census.gov/|publisher=[[United States Census Bureau]]|access-date=January\
        \ 31, 2008|title=U.S. Census website|archive-date=May 12, 2015|archive-url=https://web.archive.org/web/20150512074548/http://quickfacts.census.gov/qfd/states/08000.html|url-status=live}}</ref>\n\
        \n===2000 census===\nAs of the census of 2000, there were 29,287 people, 10,287\
        \ households, and 2,962 families residing in the city.<ref name=\"GR2\" />\
        \ The [[population density]] was {{convert|5,360.9|/mi2|/km2|disp=preunit|people&nbsp;|people}}.\
        \ There were 10,736 housing units at an average density of {{convert|1,965.2|/mi2|/km2}}.\
        \ The racial makeup of the city was 73.97% [[White (U.S. Census)|White]],\
        \ 13.65% [[Asian (U.S. Census)|Asian]], 6.71% [[African American (U.S. census)|Black]]\
        \ or [[Race (United States Census)|African American]], 0.39% [[Native American\
        \ (U.S. Census)|Native American]], 0.05% [[Pacific Islander (U.S. Census)|Pacific\
        \ Islander]], 1.86% from [[Race (United States Census)|other races]], and\
        \ 3.36% from two or more races. [[Hispanic (U.S. Census)|Hispanic]] or [[Latino\
        \ (U.S. Census)|Latino]] of any race were 5.31% of the population.\n\nThere\
        \ were 10,287 households, out of which 14.2% had children under the age of\
        \ 18 living with them, 19.0% were married couples living together, 7.8% had\
        \ a female householder with no husband present, and 71.2% were non-families.\
        \ 43.3% of all households were made up of individuals, and 7.4% had someone\
        \ living alone who was 65 years of age or older. The average household size\
        \ was 2.13 and the average family size was 2.81.\n\nIn the city, the population\
        \ was spread out, with 9.2% under the age of 18, 53.8% from 18 to 24, 20.1%\
        \ from 25 to 44, 10.6% from 45 to 64, and 6.3% who were 65 years of age or\
        \ older. The median age was 22 years. For every 100 females, there were 102.6\
        \ males. For every 100 females age 18 and over, there were 102.2 males.\n\n\
        The median income for a household in the city was $21,441, and the median\
        \ income for a family was $42,304. Males had a median income of $29,562 versus\
        \ $27,828 for females. The [[per capita income]] for the city was $13,408.\
        \ About 13.2% of individuals and 4.2% of families were below the [[poverty\
        \ line]].\n\n===Greater Ithaca===\n[[File:Ithaca-Cortland CSA.png|thumb|Location\
        \ of the Ithaca-Cortland census designated area and its components: {{legend|#FF0000|Ithaca\
        \ Metropolitan Statistical Area}} {{legend|#FFFF00|Cortland Micropolitan Statistical\
        \ Area}}]]\nThe term \"Greater Ithaca\" encompasses both the City and Town\
        \ of Ithaca, as well as several smaller settled places within or adjacent\
        \ to the Town:\n\n'''Municipalities'''\n{{Div col}}\n* [[Groton (village),\
        \ New York|Village of Groton]]\n* [[Lansing (village), New York|Village of\
        \ Lansing]]\n* the southern part of the [[Lansing (town), New York|Town of\
        \ Lansing]]\n* [[Cayuga Heights, New York|Village of Cayuga Heights]]\n* [[Forest\
        \ Home, New York|Hamlet of Forest Home]]\n* [[South Hill, New York|Hamlet\
        \ of South Hill]]\n{{div col end}}\n\n'''[[Census-designated place]]s'''\n\
        {{Div col}}\n* [[East Ithaca, New York|East Ithaca]]\n* [[Northeast Ithaca,\
        \ New York|Northeast Ithaca]]\n* [[Northwest Ithaca, New York|Northwest Ithaca]]\n\
        {{div col end}}\n\n==Economy==\n[[File:Ithaca Farmers Market, Steamboat Landing,\
        \ Ithaca NY.jpg|thumb|Ithaca Farmer's market at Steamboat Landing]]\nThe economy\
        \ of Ithaca is based on education and further supported by agriculture, technology\
        \ and tourism. As of 2006, Ithaca has continued to have one of the few expanding\
        \ economies in New York State outside New York City. It draws commuters for\
        \ work from the neighboring rural counties of [[Cortland County, New York|Cortland]],\
        \ [[Tioga County, New York|Tioga]], and [[Schuyler County, New York|Schuyler]],\
        \ as well as from the more urbanized [[Chemung County, New York|Chemung County]].\n\
        \nIthaca has tried to maintain its traditional downtown shopping area with\
        \ its pedestrian orientation; this includes the [[Ithaca Commons]] pedestrian\
        \ mall, Press Bay Alley, and Press Bay Court. Another commercial center, Collegetown,\
        \ is located next to the Cornell campus. It features a number of restaurants,\
        \ shops and bars, and an increasing number of high-rise apartments. It is\
        \ primarily frequented by Cornell University students.\n\nIthaca has many\
        \ of the businesses characteristic of small American university towns: bookstores,\
        \ art-house cinemas, craft stores and vegetarian-friendly restaurants. [[Moosewood\
        \ Restaurant]], founded as a collective in 1973, published a number of vegetarian\
        \ cookbooks.<ref name=facts /> ''[[Bon Appetit]]'' magazine ranked it among\
        \ the thirteen most influential restaurants of the 20th century.<ref>{{Cite\
        \ web|url=https://www.newyorkupstate.com/ithaca/2016/01/moosewood_ithacas_nationally_known_vegetarian_restaurant_destination_photos.html|title=Moosewood:\
        \ Ithaca's acclaimed vegetarian restaurant destination (photos)|last=Schild|first=Scott|date=January\
        \ 14, 2016|website=New York Upstate|access-date=April 9, 2020|archive-date=August\
        \ 1, 2020|archive-url=https://web.archive.org/web/20200801231721/https://www.newyorkupstate.com/ithaca/2016/01/moosewood_ithacas_nationally_known_vegetarian_restaurant_destination_photos.html|url-status=live}}</ref>\
        \  Ithaca has many local restaurants and chains, both in the city and town,\
        \ with a range of ethnic foods.\n\nThe Ithaca Farmers Market, a cooperative,\
        \ first opened for business on Saturdays in 1973. It is located at Steamboat\
        \ Landing, where steamboats from Cayuga Lake used to dock.<ref>{{Cite web|url=https://ithacamarket.com/history-mission/|title=History\
        \ & Mission|date=March 20, 2019|access-date=August 2, 2019|archive-date=August\
        \ 2, 2019|archive-url=https://web.archive.org/web/20190802151444/https://ithacamarket.com/history-mission/|url-status=live}}</ref>\n\
        \nThe South Hills Business Campus originally opened in 1957 as the regional\
        \ headquarters of the [[National Cash Register]] Company. Running three full\
        \ factory shifts, NCR was a major employer. Although it was sold in 1991 to\
        \ [[American Telephone and Telegraph]] and later acquired by Cognitive TPG,\
        \ it remains a major tenant of the South Hill Business Campus, which is now\
        \ owned by a group of private investors.<ref>{{Cite web|url=http://southhillbusinesscampus.com/southhill/history.html|archive-url=https://web.archive.org/web/20150927201925/http://southhillbusinesscampus.com/southhill/history.html|url-status=dead|title=Heffner,\
        \ Mary C., \"History of the South Hill Business Campus\"|archive-date=September\
        \ 27, 2015|access-date=August 2, 2019}}</ref>\n\n===Agriculture===\nIthaca,\
        \ home to the [[New York State College of Agriculture and Life Sciences at\
        \ Cornell University|Cornell University College of Agriculture and Life Sciences]],\
        \ has a deep connection to Central New York's farming and dairy industries.\
        \ About 60 small farms are located in the greater Ithaca/Trumansburg area,<ref>{{cite\
        \ web |title=Local Farms near Ithaca, NY |url=https://www.localharvest.org/ithaca-ny/farms\
        \ |website=Local Harvest |publisher=The LocalHarvest National Directory |access-date=January\
        \ 5, 2019 |archive-date=January 6, 2019 |archive-url=https://web.archive.org/web/20190106010221/https://www.localharvest.org/ithaca-ny/farms\
        \ |url-status=live }}</ref> including a number of research farms managed by\
        \ the Cornell University Agricultural Experiment Station.<ref>{{cite web |title=Research\
        \ Farms |url=https://cuaes.cals.cornell.edu/farms/ |website=Cornell University\
        \ Agricultural Experiment Station |publisher=Cornel College of Agriculture\
        \ and Life Sciences |access-date=January 5, 2019 |archive-date=January 5,\
        \ 2019 |archive-url=https://web.archive.org/web/20190105201208/https://cuaes.cals.cornell.edu/farms/\
        \ |url-status=live }}</ref> Cornell's Dairy Research Facility is a center\
        \ of research and support for New York's large and growing milk and yogurt\
        \ industries.<ref>{{cite news |title=Cornell summit: Milk means money |url=https://www.ithacajournal.com/story/news/local/2014/10/15/cornell-dairy-summit/17325081/\
        \ |access-date=January 5, 2019 |publisher=The Ithaca Journal |date=October\
        \ 15, 2014 |archive-date=August 13, 2020 |archive-url=https://web.archive.org/web/20200813084344/https://www.ithacajournal.com/story/news/local/2014/10/15/cornell-dairy-summit/17325081/\
        \ |url-status=live }}</ref>\n\n==Arts and culture==\n[[File:ClintonHouseInIthacaNY.jpg|thumb|[[Clinton\
        \ House (Ithaca, New York)|Clinton House]], a 19th-century building in downtown\
        \ Ithaca]]\nFounded in 1983, the [[Sciencenter]] is a non-profit hands-on\
        \ science museum, accredited by the American Alliance of Museums (AAM). It\
        \ is a member of the Association of Science-Technology Centers (ASTC) and\
        \ Association of Children's Museums (ACM).<ref>{{Cite web|url=http://www.sciencenter.org/about-us.html|title=About\
        \ Us &#124; Staff &#124; Board &#124; Press &#124; Sciencenter|website=www.sciencenter.org|access-date=August\
        \ 2, 2019|archive-date=July 25, 2019|archive-url=https://web.archive.org/web/20190725163156/http://www.sciencenter.org/about-us.html|url-status=dead}}</ref>\n\
        \nThe [[Museum of the Earth]] is a [[natural history museum]] created in 2003\
        \ by the [[Paleontological Research Institution]] (PRI). The PRI was founded\
        \ in Ithaca in 1932 and is the publisher of the oldest journal of [[paleontology]]\
        \ in the [[Western Hemisphere]]. Exhibits cover the 4.5-billion-year history\
        \ of the Earth in an accessible manner, including interactive displays. As\
        \ of 2004, the PRI is now formally affiliated with Cornell.<ref>{{Cite web\
        \ |url=http://www.priweb.org/about.php?page=who_we_are%2FPRI_history |title=Mission\
        \ and History Accessed Feb 29, 2016 |access-date=August 25, 2018 |archive-url=https://web.archive.org/web/20171114115551/http://www.priweb.org/about.php?page=who_we_are%2FPRI_history\
        \ |archive-date=November 14, 2017 |url-status=dead }}</ref>\n\nThe [[Cayuga\
        \ Nature Center]] occupies the site of the 1914 Cayuga Preventorium, a facility\
        \ for children with [[tuberculosis]]; treatment of what was then considered\
        \ an incurable disease was based on rest and good nutrition. In 1981, the\
        \ Cayuga Nature Center was incorporated as an independent, private, non-profit\
        \ educational organization, offering environmental education to local school\
        \ districts.<ref>{{Cite web|url=http://www.priweb.org/outreach.php?page=ednaturectr/cnchistory|title=Cayuga\
        \ Nature Center - Paleontological Research Institution|website=www.priweb.org|access-date=August\
        \ 2, 2019|archive-url=https://web.archive.org/web/20170815180118/http://www.priweb.org/outreach.php?page=ednaturectr%2Fcnchistory|archive-date=August\
        \ 15, 2017|url-status=dead}}</ref> In 2011, the PRI merged with the Cayuga\
        \ Nature Center, making it a sister organization to the Museum of the Earth.\n\
        \nThe [[Cornell Lab of Ornithology]] is located in the Imogene Powers Johnson\
        \ Center for Birds and Biodiversity. The Lab's Visitors' Center and observation\
        \ areas are open to the public. Displays include a surround-sound theater,\
        \ object-theater presentation, sound studio and informational kiosks featuring\
        \ bird sounds and information.<ref>{{Cite web|url=http://www.discoverytrail.com/discovering/cloo.php|title=Ithaca's\
        \ Discovery Trail: Cornell Lab of Ornithology|website=www.discoverytrail.com|access-date=August\
        \ 2, 2019|archive-date=June 13, 2019|archive-url=https://web.archive.org/web/20190613234922/http://www.discoverytrail.com/discovering/cloo.php|url-status=dead}}</ref>\n\
        \nThe [[Herbert F. Johnson Museum of Art]] at Cornell houses one of the finest\
        \ collections of art in upstate New York.<ref name=\"muse\" /> Special exhibitions\
        \ are mounted each year, plus selections from a global permanent collection,\
        \ which is displayed on six public floors. The collection includes art from\
        \ throughout Asia, Africa, Europe, the Americas, graphic arts, medallic art\
        \ and Tiffany glass, ranging from the ancient to the contemporary.<ref name=\"\
        muse\">{{Cite web|url=https://museum.cornell.edu/|title=Home &#124; Herbert\
        \ F. Johnson Museum of Art|website=museum.cornell.edu|access-date=August 2,\
        \ 2019|archive-date=January 5, 2014|archive-url=https://web.archive.org/web/20140105062925/http://www.museum.cornell.edu/|url-status=live}}</ref>\n\
        \nIthaca has a number of active professional theaters. The Center for the\
        \ Arts at Ithaca, Inc., operates the \"[[Hangar Theatre]]\". Opened in 1975\
        \ in a renovated municipal airport hangar, the Hangar hosts a summer season\
        \ and brings a range of theatre to regional audiences including students,\
        \ producing a school tour and Artists-in-the-Schools programs.<ref>{{Cite\
        \ web |url=http://www.hangartheatre.org/history-of-the-hangar-theatre.html\
        \ |title=\"Mission & History\", Hangar Theatre |access-date=August 11, 2015\
        \ |archive-url=https://web.archive.org/web/20150717043747/http://www.hangartheatre.org/history-of-the-hangar-theatre.html\
        \ |archive-date=July 17, 2015 |url-status=dead }}</ref>\nIthaca is also the\
        \ home to [[Kitchen Theatre Company]], a non-profit professional company founded\
        \ in 1991 with a theatre on West State Street.<ref>{{Cite web |url=https://www.kitchentheatre.org/about-ktc\
        \ |title=\"Our Story\", Kitchen Theatre Company |access-date=September 7,\
        \ 2024}}</ref> \nThe Cherry Arts was founded in 2017, operating a flexible\
        \ theatre, the Cherry Artspace. They present productions of international\
        \ and unusual works by the Cherry Artists' Collective, as well as hosting\
        \ performances by other artists and organizations. They also operate the Cherry\
        \ Gallery, which presents solo and group exhibitions, often in dialogue with\
        \ their performance works, and the Camilla Schade Studio, which houses rehearsals,\
        \ salon performances, and the Cherry Art Hive.<ref>{{Cite web |url=https://thecherry.org/about/\
        \ |title=\"About\", Cherry Arts |access-date=September 7, 2024}}</ref>  \n\
        Beyond these three theaters, Civic Ensemble is a creative collaborative ensemble\
        \ (without its own performance space) staging emerging playwrights' work and\
        \ community-based original productions.<ref>{{Cite web|url=http://civicensemble.org/|title=Civic\
        \ Ensemble • Ithaca's Civic-minded Theatre Company: Engaging The Community\
        \ • Employing Local Talent • Championing New Plays • Starting New Discussions|access-date=August\
        \ 2, 2019|archive-date=March 4, 2016|archive-url=https://web.archive.org/web/20160304104329/http://civicensemble.org/|url-status=live}}</ref>\n\
        \nIthaca is noted for its annual community celebration, The Ithaca Festival.\
        \ Ithaca also hosts one of the largest used-book sales in the United States.<ref>{{Cite\
        \ web |url=http://www.lifeinthefingerlakes.com/ithacas-booming-book-sale/\
        \ |title=Ithaca's Booming Book Sale – Life in the Finger Lakes, Summer 2014\
        \ |date=May 2014 |access-date=February 29, 2016 |archive-date=March 6, 2016\
        \ |archive-url=https://web.archive.org/web/20160306122248/http://www.lifeinthefingerlakes.com/ithacas-booming-book-sale/\
        \ |url-status=live }}</ref>\n\nThe Constance Saltonstall Foundation for the\
        \ Arts supports New York State artists and writers through two key programs:\
        \ free stipend-supported, juried residencies and a self-directed, non-juried,\
        \ low-cost retreats. Saltonstall was founded in 1995 and is located eight\
        \ miles outside Ithaca. Between 1996 and 2008, the Saltonstall Foundation\
        \ provided grants to individual artists and writers from central and western\
        \ New York counties. Saltonstall hosts Open House events for the public to\
        \ meet the current artists and writers at the residency and to learn about\
        \ the foundation.<ref>{{Cite web |title=About Saltonstall |url=https://www.saltonstall.org/about-us/about-saltonstall/\
        \ |access-date=February 13, 2024 |website=Constance Saltonstall Foundation\
        \ for the Arts |archive-date=February 17, 2024 |archive-url=https://web.archive.org/web/20240217223201/https://www.saltonstall.org/about-us/about-saltonstall/\
        \ |url-status=live }}</ref><ref>{{Cite web |title=Constance Saltonstall Foundation\
        \ for the Arts {{!}} Artist Communities Alliance |url=https://artistcommunities.org/directory/organizations/constance-saltonstall-foundation-arts\
        \ |access-date=2024-02-14 |website=artistcommunities.org |archive-date=March\
        \ 27, 2024 |archive-url=https://web.archive.org/web/20240327065336/https://artistcommunities.org/directory/organizations/constance-saltonstall-foundation-arts\
        \ |url-status=live }}</ref><ref>{{Cite web |last=Citranglo |first=Christie\
        \ |date=August 21, 2017 |title=A Look at Saltonstall's Upcoming Open House\
        \ |url=https://www.ithaca.com/entertainment/a-look-at-saltonstalls-upcoming-open-house/article_474487d0-82a1-11e7-aabc-33e58a4e3a6c.html\
        \ |archive-url=https://web.archive.org/web/20240215001917/https://www.ithaca.com/entertainment/a-look-at-saltonstalls-upcoming-open-house/article_474487d0-82a1-11e7-aabc-33e58a4e3a6c.html\
        \ |archive-date=February 15, 2024 |access-date=February 14, 2024 |website=Ithica.com}}</ref>\n\
        \nFounded in 1992, the [[Namgyal Monastery Institute of Buddhist Studies|Namgyal\
        \ Monastery in Ithaca]] is the North American [[Family seat|seat]] of the\
        \ [[14th Dalai Lama|Dalai Lama]]'s [[Namgyal Monastery]].<ref>{{Cite web |title=Namgyal\
        \ Monastery |publisher=Institute of Buddhist Studies |year=2007 |url=http://www.namgyal.org/\
        \ |access-date=August 16, 2007}}</ref>\n\nThe city and town also sponsor The\
        \ Apple Festival in the fall, the Chili Fest in February, the Finger Lakes\
        \ International Dragon Boat Festival in July, [[Porchfest]] in late September\
        \ and the Ithaca Brew Fest in [[Stewart Park (Ithaca, New York)|Stewart Park]]\
        \ in September.\n\nIthaca has also pioneered the [[Ithaca Health Fund]], a\
        \ popular cooperative health insurance. Ithaca is home to [[Ithaca Hours]],\
        \ one of the first [[local currency]] systems in the United States. It was\
        \ developed by [[Paul Glover (activist)|Paul Glover]].\n\n===Music===\nIthaca\
        \ is the home of the [[Cayuga Chamber Orchestra]].\n\nThe Cornell Concert\
        \ Series<ref>{{Cite web|url=http://www.cornellconcertseries.com/|title=Home|website=Cornell\
        \ Concert Series|access-date=August 2, 2019}}</ref> has been hosting musicians\
        \ and ensembles of international stature since 1903. For its initial 84 years,\
        \ the series featured Western classical artists exclusively. In 1987, however,\
        \ the series broke with tradition to present Ravi Shankar and has since grown\
        \ to encompass a broader spectrum of the world's great music. Now, it balances\
        \ a mix of Western classical music, traditions from around the world, jazz,\
        \ and new music in these genres. In a single season, Cornell Concert Series\
        \ presents performers ranging from the Leipzig Tomanerchor and Danish Quartet\
        \ to Simon Shaheen, Vida Guitar Quartet, and Eighth Blackbird.<ref>{{Cite\
        \ web|url=http://www.cornellconcertseries.com/visit/past-highlights/|title=Past\
        \ Highlights|website=Cornell Concert Series|access-date=August 2, 2019|archive-date=August\
        \ 2, 2019|archive-url=https://web.archive.org/web/20190802151441/http://www.cornellconcertseries.com/visit/past-highlights/|url-status=dead}}</ref>\n\
        \nThe [[Ithaca College School of Music|School of Music]] at Ithaca College\
        \ was founded in 1892 by [[William Egbert]] as a music conservatory on Buffalo\
        \ Street. Among the degree programs offered are those in Performance, Theory,\
        \ Music Education and Composition. Since 1941, the School of Music has been\
        \ accredited by the National Association of Schools of Music.<ref>{{Cite web|url=https://www.ithaca.edu/academics/school-music|title=School\
        \ of Music|website=Ithaca College|access-date=August 2, 2019|archive-date=May\
        \ 1, 2019|archive-url=https://web.archive.org/web/20190501105913/https://www.ithaca.edu/academics/school-music|url-status=live}}</ref>\n\
        \nIthaca's [[Suzuki Method|Suzuki]] school, Ithaca Talent Education, provides\
        \ musical training for children of all ages and also teacher training for\
        \ undergraduate and graduate-level students. The Community School of Music\
        \ and Art uses an extensive scholarship system to offer classes and lessons\
        \ to any student, regardless of age, background, economic status or artistic\
        \ ability.<ref>{{Cite web|url=http://www.csma-ithaca.org/Info.html|archive-url=https://web.archive.org/web/20021024163928/http://www.csma-ithaca.org/Info.html|url-status=dead|archive-date=October\
        \ 24, 2002|title=About CSMA|date=October 24, 2002|access-date=August 2, 2019}}</ref>\n\
        \nA number of musicians call Ithaca home, most notably [[Samite (musician)|Samite]]\
        \ of Uganda, [[The Burns Sisters]], [[The Horse Flies]], [[Johnny Dowd]],\
        \ [[Mary Lorson]], cellist [[Hank Roberts]], [[Anna Coogan]], [[John Brown's\
        \ Body (band)|John Brown's Body]], [[Kurt Riley]], [[X Ambassadors]], and\
        \ [[Alex Kresovich]]. [[Old-time music]] is a staple, and folk music is featured\
        \ weekly on [[WVBR-FM]]'s ''Bound for Glory'', North America's longest-running\
        \ live folk concert broadcast. The [[Finger Lakes GrassRoots Festival of Music\
        \ and Dance]], hosted by local band [[Donna the Buffalo]], is held annually\
        \ during the third week in July in the nearby village of [[Trumansburg, New\
        \ York|Trumansburg]], with more than 60 local, national and international\
        \ acts.\n\nIthaca is the center of a thriving live music scene, featuring\
        \ more than 200 groups playing most genres of American popular and world music,\
        \ the predominant genres being folk, rock, blues, jazz, country, lo-fi and\
        \ reggae.<ref name=\"auto\">{{Cite web|url=http://ithacamusic.net/org.php?c=venue|title=Music\
        \ Venues : Ithaca Music Scene : A catalog of musicians, venues, and services\
        \ in the Ithaca, NY area|website=ithacamusic.net|access-date=August 2, 2019|archive-date=July\
        \ 19, 2019|archive-url=https://web.archive.org/web/20190719235424/http://ithacamusic.net/org.php?c=venue|url-status=live}}</ref>\
        \ There are more than 80 live music venues within a 40-mile radius of the\
        \ city, including cafes, pubs, clubs and concert halls.<ref name=\"auto\"\
        />\n\n==Government==\n{{see also|List of mayors of Ithaca, New York}}\n[[File:Ithaca\
        \ City Hall, Green Street.jpg|thumb|Ithaca City Hall at 108 East Green Street]]\n\
        There are two governmental entities in the area: the [[Ithaca (town), New\
        \ York|Town of Ithaca]] and the [[Ithaca (city), New York|City of Ithaca]].\
        \ The Town of Ithaca is one of the nine towns comprising Tompkins County.\
        \ The City of Ithaca is surrounded by, but legally independent of the Town\
        \ of Ithaca.\n\nThe City of Ithaca has a [[council–manager government]].<ref>{{Cite\
        \ web |last=Lucas |first=Judy |date=2023-05-26 |title=City Manager duties\
        \ under review at special Common Council meeting |url=https://ithacavoice.org/2023/05/city-manager-duties-under-review-at-special-common-council-meeting-may-31/\
        \ |access-date=2024-10-21 |website=The Ithaca Voice |language=en-US}}</ref>\
        \ The charter of the City of Ithaca provides for a full-time mayor and the\
        \ Uniform City Court Act provides for two, full-time city court judges.<ref>{{Cite\
        \ web |date=September 27, 2024 |title=New York Uniform City Court Act, Section\
        \ 2104 |url=https://www.nysenate.gov/legislation/laws/UCT/2104}}</ref> Since\
        \ 1995, the mayor has been elected to a four-year term, and since 1989, the\
        \ city court judges have been elected to a ten-year term. At a referendum\
        \ in 2022, city voters approved a city charter amendment adopting from a [[council–manager\
        \ government]] in place of a [[mayor–council government]].<ref>{{Cite web\
        \ |date=November 2022 |title=City of Ithaca, 2022 General Elections Results\
        \ |url=https://tompkinscountyny.gov/files2/boe/Additional_Information/Past_Results_files/2022/22GE%20Results_City.pdf\
        \ |access-date=October 21, 2024 |website=Tompkins County Board of Elections}}</ref>\
        \ The city's first city manager, Deb Mohlenhoff, took office on January 1,\
        \ 2024.<ref>{{Cite web |last=Dougherty |first=Matt |date=2024-01-24 |title=New\
        \ City Manager Outlines Vision for Ithaca's Future |url=https://www.ithaca.com/news/ithaca/new-city-manager-outlines-vision-for-ithacas-future/article_d577b1ee-bada-11ee-b6ec-03789358b908.html#:~:text=On%20January%201,%202024,%20Deb,council-manager%20form%20of%20government.\
        \ |access-date=2024-10-28 |website=Ithaca Times |language=en}}</ref> Mohlenhoff\
        \ resigned, effective December 31, 2026, following a request by the Common\
        \ Council.<ref>{{Cite web |last=Butler |first=Jimmy Jordan, Matt |date=2025-12-04\
        \ |title=City manager resigns at Common Council’s request |url=https://ithacavoice.org/2025/12/city-manager-resigns-at-common-councils-request/\
        \ |access-date=2026-05-09 |website=The Ithaca Voice |language=en-US}}</ref>\
        \ \n\nSince 1983, the city has been divided into five wards. Each elects two\
        \ representatives to the city council, known as the Common Council, for staggered\
        \ four-year terms. In March 2015, the Common Council unanimously adopted a\
        \ [[Resolution (law)|resolution]] recognizing freedom from [[domestic violence]]\
        \ as a fundamental [[human right]].<ref>{{Cite web|last1=Hill|first1=David|title=City:\
        \ Freedom from domestic violence is a human right|url=http://www.ithacajournal.com/story/news/local/2015/03/15/council-backs-fighting-domestic-violence/70297186/|website=www.ithacajournal.com|publisher=Ithaca\
        \ Journal|access-date=March 15, 2015|archive-date=April 2, 2015|archive-url=https://web.archive.org/web/20150402163348/http://www.ithacajournal.com/story/news/local/2015/03/15/council-backs-fighting-domestic-violence/70297186/|url-status=live}}</ref>\
        \  In September 2023, the Common Council unanimously passed an extensive local\
        \ ordinance to \"protect, defend and shield transgender individuals\".<ref>{{cite\
        \ web | url=https://www.lgbtqnation.com/2023/09/ithaca-new-york-declares-itself-a-safe-haven-for-trans-people/\
        \ | title=Ithaca, New York declares itself a safe haven for trans people |\
        \ date=September 14, 2023 | access-date=June 7, 2024 | archive-date=March\
        \ 21, 2024 | archive-url=https://web.archive.org/web/20240321063318/https://www.lgbtqnation.com/2023/09/ithaca-new-york-declares-itself-a-safe-haven-for-trans-people/\
        \ | url-status=live }}</ref>\n\nIn December, 2005, the City and Town governments\
        \ began discussing opportunities for increased government consolidation, including\
        \ the possibility of joining the two into a single entity. This topic had\
        \ been previously discussed in 1963 and 1969. [[Cayuga Heights, New York|Cayuga\
        \ Heights]], a village adjacent to the city on its northeast, voted against\
        \ annexation into the city of Ithaca in 1954. The City of Ithaca and the Town\
        \ of Ithaca do share several services. The town contracts with the city for\
        \ fire protection services, which are provided by the Ithaca Fire Department,\
        \ and the two are co-owners of the Ithaca Area Waste Water Treatment Facility.<ref>{{Cite\
        \ web |last=Aceto |first=Matt |date=2024-12-31 |title=Town of Ithaca reaches\
        \ deal for fire protection services - 607 News Now |url=https://607newsnow.com/news/258852-town-of-ithaca-reaches-deal-for-fire-protection-services/\
        \ |access-date=2026-05-10 |language=en-US}}</ref><ref>{{Cite web |last=Hughes\
