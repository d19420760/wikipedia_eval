      content: "## Result 1\nTitle: Paris\nURL: https://en.wikipedia.org/wiki/Paris\n\
        Extract: Paris is the capital and largest city of France, with an estimated\
        \ city population of 2.04 million in an area of 105.4 km2 (40.7 sq mi), and\
        \ a metropolitan population of 13.2 million as of January 2026. Located on\
        \ the river Seine in the centre of the Île-de-France region, it is the largest\
        \ metropolitan area and fourth-most populous city in the European Union (EU).\
        \ Nicknamed the \"City of Light\", partly because of its role in the Age of\
        \ Enlightenment, Paris has been one of the world's major centres of finance,\
        \ diplomacy, commerce, culture, fashion, and gastronomy since the 17th century\
        \ \nAdministratively, Paris is divided into twenty arrondissements (districts),\
        \ each having their own cultural identity. Haussmann's renovation of Paris,\
        \ which created new boulevards, parks, and public works, gave birth to a modern\
        \ city known as the \"capital of the 19th century\". Paris is a major railway,\
        \ motorway, and air-transport hub; in 2024 Charles de Gaulle Airport was the\
        \ EU's busiest airport. Paris has one of the most sustainable transportation\
        \ systems in the world and is one of only two cities that have received the\
        \ Sustainable Transport Award twice. Its Art Nouveau-decorated Métro has become\
        \ a symbol of the city. Paris is known for its museums and architectural landmarks:\
        \ the Musée d'Orsay, Musée Marmottan Monet, and Musée de l'Orangerie are noted\
        \ for their collections of French Impressionist art, while the Musée National\
        \ d'Art Moderne, Musée Rodin, and Musée Picasso are noted for their collections\
        \ of modern and contemporary art. Parts of the city along the Seine have been\
        \ designated as a UNESCO World Heritage Site since 1991.\nThe president of\
        \ France and both houses of the French Parliament sit in Paris. Paris is home\
        \ to several United Nations organisations, including UNESCO, as well as other\
        \ international organisations such as the OECD, the International Bureau of\
        \ Weights and Measures (in neighbouring Saint-Cloud), the International Energy\
        \ Agency, the Organisation internationale de la Francophonie, the International\
        \ Federation for Human Rights, and the Fédération internationale de l'Automobile,\
        \ along with European bodies such as the European Space Agency, the European\
        \ Banking Authority, and the European Securities and Markets Authority. The\
        \ city hosts many sporting events, such as the French Open, and is the home\
        \ of the association football club Paris Saint-Germain and the rugby union\
        \ club Stade Français. Paris has also hosted the Summer Olympics three times.\n\
        \n## Result 2\nTitle: Demographics of Paris\nURL: https://en.wikipedia.org/wiki/Demographics_of_Paris\n\
        Extract: The city of Paris (also called the Commune or Department of Paris)\
        \ had a population of 2,165,423 people within its administrative city limits\
        \ as of 1 January 2019. It is surrounded by the Paris unité urbaine, or urban\
        \ area, the most populous urban area in the European Union.\nIn 2018 the unité\
        \ urbaine had a population of 10,816,803 in 2,854 km2 (1,102 sq mi). The Paris\
        \ Region, or Île-de-France, covers 12,012 km2 (4,638 sq mi), and has its own\
        \ regional council and president. It has a population of 12,213,447 as of\
        \ January 2018, or 18.3 percent of the population of France. The metropolitan\
        \ or functional area (aire d'attraction) of Paris covers 18,941 km2 (7,313\
        \ sq mi) and has 13,064,617 inhabitants (2018).\nThe population of the city\
        \ of Paris reached a historic high of 2.9 million in 1921 but then declined;\
        \ between 1954 and 1999 it declined at every census, falling to 2,125,246\
        \ in 1999. After that it began to climb again, reaching 2,240,621 in 2012,\
        \ but falling to 2,187,526 in 2017.\nThe city's population loss reflected\
        \ the experience of most other core cities in the developed world that have\
        \ not expanded their boundaries. The principal factors in the process were\
        \ a significant decline in household size, and a dramatic migration of residents\
        \ to the suburbs between 1962 and 1975.  Factors in the migration included\
        \ deindustrialisation, high rent, the gentrification of many inner quarters,\
        \ the transformation of living space into offices, and greater affluence among\
        \ working families. The city's population loss was one of the most severe\
        \ among international municipalities and the largest for any that had achieved\
        \ more than 2,000,000 residents.  Since then, an influx of younger residents\
        \ and immigrants has contributed to the growth of the city.\n\n## Result 3\n\
        Title: Paris, Ontario\nURL: https://en.wikipedia.org/wiki/Paris,_Ontario\n\
        Extract: Paris (2021 population, 14,956) is a community located in the County\
        \ of Brant, Ontario, Canada. It lies just northwest from the city of Brantford\
        \ at the spot where the Nith River empties into the Grand River. Paris was\
        \ voted \"the Prettiest Little Town in Canada\" by Harrowsmith Magazine. The\
        \ town was established in 1850. In 1999, its town government was amalgamated\
        \ into that of the County of Brant, ending 149 years as a separate incorporated\
        \ municipality, with Paris as the largest population centre in the county.\n\
        \n## Result 4\nTitle: Haussmann's renovation of Paris\nURL: https://en.wikipedia.org/wiki/Haussmann%27s_renovation_of_Paris\n\
        Extract: Haussmann's renovation of Paris (known in French as the travaux haussmanniens,\
        \ [tʁavo osmanjɛ̃], lit. 'Haussmannian works') was a vast public works programme\
        \ commissioned by French Emperor Napoleon III and directed by his prefect\
        \ of Seine, Georges-Eugène Haussmann, between 1853 and 1870.\nIt included\
        \ the demolition of medieval neighbourhoods that were deemed overcrowded and\
        \ unhealthy by officials at the time, the building of wide avenues, new parks\
        \ and squares, the annexation of the suburbs surrounding Paris, and the construction\
        \ of new sewers, fountains and aqueducts. Haussmann's work was met with fierce\
        \ opposition, and he was ultimately dismissed by Napoleon III in 1870. The\
        \ renovation allowed Paris to shine during the Belle Époque (1871–1914); work\
        \ on his projects continued until 1927. The street plan and distinctive appearance\
        \ of the centre of Paris today are largely the result of Haussmann's renovation.\n\
        Haussmann's renovation attracted a number of painters; the closest associated\
        \ with that period remains Gustave Caillebotte, whose paintings of the transformed\
        \ city are \"unprecedented, [as] no artist had ever depicted Paris in this\
        \ way\".\n\n## Result 5\nTitle: List of European cities by population within\
        \ city limits\nURL: https://en.wikipedia.org/wiki/List_of_European_cities_by_population_within_city_limits\n\
        Extract: This list ranks European cities by population within city limits.\
        \ The largest cities in Europe have official populations of over one million\
        \ inhabitants within their city boundaries. These rankings are based on populations\
        \ contained within city administrative boundaries, as opposed to urban areas\
        \ or metropolitan areas, which necessarily have larger populations than the\
        \ cities at their core.\nThe limits of a city proper can differ greatly from\
        \ the size of the city's urban area, so the figures in this list may not give\
        \ an accurate view of the comparative population of different urban areas\
        \ and should be treated with caution. For example, the Paris metropolitan\
        \ area is the fourth most populous in Europe, but the strict definition of\
        \ the administrative limits of the City of Paris results in a far lower population.\n\
        \n## Result 6\nTitle: Île-de-France\nURL: https://en.wikipedia.org/wiki/%C3%8Ele-de-France\n\
        Extract: The Île-de-France (; French: [il də fʁɑ̃s] ; lit. 'Island of France')\
        \ is the most populous of the eighteen regions of France, with an official\
        \ estimated population of 12,271,794 residents on 1 January 2023. Containing\
        \ the capital city of France, Paris, it is located in the north-central part\
        \ of the country and often called the Paris Region (French: Région parisienne,\
        \ pronounced [ʁeʒjɔ̃ paʁizjɛn]). Île-de-France is densely populated and retains\
        \ a prime economic position on the national stage, and it covers 12,012 square\
        \ kilometres (4,638 square miles), about 2% of metropolitan French territory.\
        \ Its 2017 population was nearly one-fifth of the national total.\nThe region\
        \ is made up of eight administrative departments: Paris, Essonne, Hauts-de-Seine,\
        \ Seine-Saint-Denis, Seine-et-Marne, Val-de-Marne, Val-d'Oise and Yvelines.\
        \ It was created as the \"District of the Paris Region\" in 1961. In 1976,\
        \ when its status was aligned with the French administrative regions created\
        \ in 1972, it was renamed after the historic province of Île-de-France. Residents\
        \ are sometimes referred to as Franciliens, an administrative word created\
        \ in the 1980s. The GDP of the region in 2019 was nearly one-third of the\
        \ total for France, and 5% of the European Union's. It has the highest per\
        \ capita GDP of any French region.\nBeyond the city limits of Paris, the region\
        \ has many other important historic sites, including the palaces of Versailles\
