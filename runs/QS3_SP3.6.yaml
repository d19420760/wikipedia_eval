        \ number of items offered on the menu has grown significantly. By 2007, McDonald's\
        \ reportedly had 85 items on its menu; by 2013 this number had increased to\
        \ 145 items.\n\n## Result 7\nTitle: Metro (restaurant chain)\nURL: https://en.wikipedia.org/wiki/Metro_(restaurant_chain)\n\
        Extract: Metro is an Icelandic fast food restaurant chain. It replaced McDonald's\
        \ after it left Iceland on 30 October 2009 as a result of the 2008–2011 Icelandic\
        \ financial crisis and high tariffs on imported ingredients. The franchise\
        \ holder, Lyst Hr., refused to increase the prices of their products, to stay\
        \ competitive with local restaurants who used ingredients sourced locally.\
        \ The franchise owner decided to close down all McDonald's operations and\
        \ replaced them with their own franchise, Metro.\nIn contrast with McDonald's,\
        \ Metro uses cheaper, locally supplied ingredients, which enables them to\
        \ sell their products at lower prices. Some original McDonald's menu items\
        \ are on the Metro menu along with domestic products, with menu items previously\
        \ used in McDonald's now translated to the Icelandic language.\n\n## Result\
        \ 8\nTitle: CosMc's\nURL: https://en.wikipedia.org/wiki/CosMc%27s\nExtract:\
        \ CosMc's (, KAHZ-miks) was an American concept fast food restaurant and spinoff\
        \ brand by McDonald's. Its menu focused on hot and cold speciality drinks.\
        \ It launched on December 7, 2023, with a drive-thru only location in the\
        \ Chicago suburb of Bolingbrook, Illinois. Nine locations were planned to\
        \ open in Texas in 2024. CosMc's offered McCafe products, some of which are\
        \ also available at McDonald's locations, alongside exclusive drinks and food.\n\
        \n## Result 9\nTitle: Fast-food restaurant\nURL: https://en.wikipedia.org/wiki/Fast-food_restaurant\n\
        Extract: A fast-food restaurant, also known as a quick-service restaurant\
        \ (QSR) within the industry, is a specific type of restaurant that serves\
        \ fast-food cuisine and has minimal table service. The food served in fast-food\
        \ restaurants is typically part of a \"meat-sweet diet\", offered from a limited\
        \ menu, cooked in bulk in advance and kept hot, finished and packaged to order,\
        \ and usually available for take away, though seating may be provided. Fast-food\
        \ restaurants are typically part of a restaurant chain or franchise operation\
        \ that provides standardized ingredients and/or partially prepared foods and\
        \ supplies to each restaurant through controlled supply channels. The term\
        \ \"fast food\" was recognized in a dictionary by Merriam–Webster in 1951.\n\
        While the first fast-food restaurant in the United States was a White Castle\
        \ in 1921, fast-food restaurants had been operating elsewhere much earlier,\
        \ such as the Japanese fast food company Yoshinoya, started in Tokyo in 1899.\
        \ Today, American-founded fast-food chains such as McDonald's (est. 1940)\
        \ and KFC (est. 1952) are multinational corporations with outlets across the\
        \ globe.\nVariations on the fast-food restaurant concept include fast-casual\
        \ restaurants and catering trucks. Fast-casual restaurants have higher sit-in\
        \ ratios, offering a hybrid between counter-service typical at fast-food restaurants\
        \ and a traditional table service restaurant. Catering trucks (also called\
        \ food trucks) often park just outside worksites and are popular with factory\
        \ workers.\n\n## Result 10\nTitle: McDonald's France\nURL: https://en.wikipedia.org/wiki/McDonald%27s_France\n\
        Extract: McDonald's France, colloquially called McDo, is the French subsidiary\
        \ of the international fast food restaurant chain McDonald's. Its first location\
        \ opened in 1972 by franchisee Raymond Dayan in Creteil, France, although\
        \ the company itself still recognizes the first outlet as opening in Strasbourg\
        \ in 1979. McDonald's France currently has over 1,485 restaurants operating\
        \ nationwide, serving an estimated forty-six million people each week.\nMcDonald's\
        \ French operations are based in Guyancourt, Yvelines."
