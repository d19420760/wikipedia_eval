        \ The refractive index determines how much the path of light is bent, or refracted,\
        \ when entering a material, as described by Snell's law of refraction, n1\
        \ sin θ1 = n2 sin θ2, where θ1 and θ2 are the angle of incidence and angle\
        \ of refraction, respectively, of a ray crossing the interface between two\
        \ media with refractive indices n1 and n2. The refractive indices also determine\
        \ the amount of light that is reflected when reaching the interface, as well\
        \ as the critical angle for total internal reflection, their intensity (Fresnel\
        \ equations) and Brewster's angle.\nThe refractive index, \n  \n    \n   \
