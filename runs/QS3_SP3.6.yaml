        \ engineers, sound designers, testers, marketers, and customer support staff.\
        \ Video games have gradually gained increasing relevance as a widespread cultural\
        \ phenomenon, exerting significant influence on many areas of contemporary\
        \ society. These influences extend to the economy and the labor market, education,\
        \ consumption patterns and daily habits, architecture and urban planning,\
        \ and sectors such as healthcare, the automotive industry, cinema and television,\
        \ fashion, and sports.\nThe video game industry has grown from niche to mainstream.\
        \ As of July 2018, video games generated US$134.9 billion annually in global\
        \ sales. In the US, the industry earned about $9.5 billion in 2007, $11.7\
        \ billion in 2008, and US$25.1 billion in 2010, as per the ESA annual report.\
        \ Research from Ampere Analysis indicated three points: the sector has consistently\
        \ grown since at least 2015 and expanded 26% from 2019 to 2021, to a record\
