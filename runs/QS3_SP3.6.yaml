        |}\n\n===Abuse of power===\nAccording to [[Toby Green]], the unchecked power\
        \ given to inquisitors left them \"widely seen as above the law\". They sometimes\
        \ had motives that had nothing to do with punishing religious nonconformity.{{sfn|Green|2007|pp=[https://archive.org/details/inquisitionreign00gree/page/4\
        \ 4–5]}}<ref>{{Cite book |last= |first=|url={{google books|plainurl=y|id=tBARswEACAAJ}}|title=Archivo\
        \ General de Indias |date=2000 |publisher=Ministerio de Educación, Cultura\
        \ y Deporte, Subdirección General de los Archivos Estatales |language=en}}\
        \ Expediente 63, Expediente 81A, n. 33</ref> Green quotes a complaint by historian\
        \ Manuel Barrios{{sfn|Green|2007|p=[https://archive.org/details/inquisitionreign00gree/page/65\
        \ 65]}} about one Inquisitor, [[Diego Rodriguez Lucero]], who in Cordoba in\
        \ 1506 burned to death the husbands of two women; he then kept the women as\
        \ mistresses. According to Barrios:\n\n<blockquote>...the daughter of Diego\
        \ Celemin was exceptionally beautiful, her parents and her husband did not\
        \ want to give her to [Lucero], and so Lucero had the three of them burnt\
        \ and now has a child by her, and he has kept for a long time in the [[Alcázar\
        \ of Seville|alcazar]] as a mistress.<ref name=\"Barrios-1991-58\">{{cite\
        \ book |last=Barrios |first=Manuel |title=El Tribunal de la Inquisicion en\
        \ Andalucia: Seleccion de Textos y Documentos |date=1991 |publisher=J. Rodriguez\
        \ Castillejo S.A. |location=Seville |page=58}}</ref></blockquote>\n\nSome\
        \ writers disagree{{clarify|reason=About what? If they don't deny the abused\
        \ occurred, why are they complaining about Green's conclusion? If this is\
        \ a which-flavor-of-authoritarianism-is-less-violent-and-therefore-\"wins\"\
        \ thing, there's no indication of that here|date=April 2025}} with Green.<ref\
        \ name=\"IY\" />{{Page needed|date=March 2024}}<ref>{{Cite news |last=Blanco\
        \ |first=Patricia R. |date=2019-12-20 |title=Las citas tergiversadas del superventas\
        \ sobre la leyenda negra española |url=https://elpais.com/cultura/2019/12/19/actualidad/1576745125_565402.html\
        \ |work=El País |language=es |issn=1134-6582}}</ref> These authors do not\
        \ necessarily deny the abuses of power, but classify them as politically instigated\
        \ and comparable to those of any other law enforcement body of the period.\
        \ Criticisms, usually indirect, include suspiciously sexual overtones or similarities\
        \ to unrelated older antisemitic accounts of kidnap and torture,<ref name=\"\
        IY\" />{{Page needed|date=March 2024}} and proofs of control that the king\
        \ had over the institution, to the sources used by Green,<ref>{{Cite book\
        \ |editor-last=Henningsen |editor-first=Gustav |url={{google books|plainurl=y|id=TjZ_zQEACAAJ}}|title=The\
        \ Inquisition in Early Modern Europe: Studies on Sources and Methods |date=1986\
        \ |publisher=Northern Illinois University Press |language=en|last1=Contreras\
        \ |first1=Jaime |first2= Gustav |last2=Henningsen |chapter=Forty-four thousand\
        \ cases of the Spanish Inquisition (1540–1700): analysis of a historical data\
        \ bank}}</ref> or just by reaching completely different conclusions.<ref>{{Cite\
        \ book |last=Perez |first=Joseph Francis |url={{google books|plainurl=y|id=xBrsxQEACAAJ|page=173}}|title=The\
        \ Spanish Inquisition: A History |date=2006 |publisher=Profile |language=en|page=\
        \ 173}}</ref><ref>{{Cite book |last=Llorente |first=Juan Antonio |url={{google\
        \ books|plainurl=y|id=WToNAAAAYAAJ|page=183}}|title=Historia crítica de la\
        \ inquisición de España: obra original conforme á lo que resulta de los archivos\
        \ del real Consejo de la Suprema, y de los tribunales del Santo-Oficio de\
        \ las provincias |date=1822 |publisher=en la Imprenta del Censor |language=es|volume=IV\
        \ |page= 183}}</ref>\n\n=== Long-term economic effects ===\nAccording to a\
        \ 2021 study, \"municipalities of Spain with a history of a stronger inquisitorial\
        \ presence show lower economic performance, educational attainment, and trust\
        \ today.\"<ref>{{Cite journal |last1=Drelichman |first1=Mauricio |last2=Vidal-Robert\
        \ |first2=Jordi |last3=Voth |first3=Hans-Joachim |date=2021 |title=The long-run\
        \ effects of religious persecution: Evidence from the Spanish Inquisition\
        \ |journal=Proceedings of the National Academy of Sciences |language=en |volume=118\
        \ |issue=33 |article-number=e2022881118 |doi=10.1073/pnas.2022881118 |issn=0027-8424\
        \ |pmid=34389666 |pmc=8379970 |bibcode=2021PNAS..11822881D |doi-access=free}}</ref>\n\
        \n=== Effect on scientific inquiry ===\nA 2025 study found that the Spanish\
        \ Inquisition \"had important chilling effects, reducing scholars' willingness\
        \ to interact with others and inducing them to divert their efforts away from\
        \ [[STEM]] fields (or to pursue them outside Spain)\". It led to \"reversals\
        \ in previously upward trends in university attendance and book output in\
        \ STEM fields\". STEM scholars typically left Spain or reduced their scientific\
        \ output in fields that might fall afoul of the inquisitors.<ref>{{Cite journal\
        \ |last1=Cox |first1=Gary W. |last2=Figueroa |first2=Valentin |date=2025 |title=The\
        \ inquisition and the decline of science in Spain |url=https://www.sciencedirect.com/science/article/pii/S0014498325000464\
        \ |journal=Explorations in Economic History |volume=98 |article-number=101699\
        \ |doi=10.1016/j.eeh.2025.101699 |issn=0014-4983 |url-access=subscription}}</ref>\n\
        \n==Causes==\n{{Excerpt|Historiography of the Spanish Inquisition|Causes|paragraphs=1}}\n\
        {{anchor|Philosophical and religious reasons}}\n\n== Historiography ==\n{{Excerpt|Historiography\
        \ of the Spanish Inquisition}}\n\n==In popular culture==\n{{in popular culture|date=July\
        \ 2023}}\n\n===Literature===\n[[File:Ф.Гойя. Из цикла Los Caprichos 1797-98.jpg|thumb|right|''There\
        \ was no remedy'', from ''[[Caprichos|Los Caprichos]]'', 1797–98, by Francisco\
        \ de Goya.]]\n\n18th-century literature critiques the Spanish Inquisition,\
        \ portraying it as a symbol of intolerance and arbitrary justice. In [[Voltaire]]'s\
        \ ''[[Candide]]'', it epitomizes European oppression.\n\nDuring the [[Romanticism|Romantic\
        \ Period]], the [[Gothic novel]], primarily a Protestant genre, often linked\
        \ Catholicism to terror and repression. This view appears in works such as\
        \ [[Matthew Gregory Lewis]]'s ''[[The Monk]]'' (1796), set in Inquisition-era\
        \ Madrid, but reflecting on the [[French Revolution]] and [[Reign of Terror|the\
        \ Terror]]; [[Charles Robert Maturin]]'s ''[[Melmoth the Wanderer]]'' (1820);\
        \ and [[Jan Potocki]]'s ''[[The Manuscript Found in Saragossa]]''.\n\n19th-century\
        \ literature emphasizes the Inquisition's use of torture. The French [[epistolary\
        \ novel]] ''Cornelia Bororquia, or the Victim of the Inquisition'', attributed\
        \ to Spaniard Luiz Gutiérrez and based on [[María de Bohórquez]], sharply\
        \ condemns the Inquisition.\n\nIn [[Fyodor Dostoevsky]]'s ''[[The Brothers\
        \ Karamazov]]'' (1880), the chapter \"[[The Grand Inquisitor]]\" depicts [[Jesus|Jesus\
        \ Christ]] appearing in Seville during the Inquisition. Arrested by an aged\
        \ Cardinal Grand Inquisitor, he faces death as a heretic. The Inquisitor questions\
        \ him: \"Is it You? [...] Don't answer, remain silent. You have no right to\
        \ add to what You've said. Why have You come to disturb us? You know You have.\"\
        \ Christ silently kisses him, and the Inquisitor releases him, saying, \"\
        Go and don't come back... never, never, never!\"<ref>{{cite web |last1=Morsen\
        \ |first1=Gary Saul |title=The Brothers Karamazov |url=https://www.britannica.com/biography/Fyodor-Dostoyevsky/The-Brothers-Karamazov\
        \ |website=Britannica |access-date=5 September 2024 |date=16 August 2024}}</ref><ref>{{Cite\
        \ book |last=Dostoyevsky |first=Fyodor |title=The Karamazov Brothers |publisher=Oxford\
        \ University Press |isbn=978-0-19-283509-3 |publication-date=2007 |pages=309–332\
        \ |translator-last=Avsey |translator-first=Ignat}}</ref>\n\n[[Edgar Allan\
        \ Poe]]'s \"[[The Pit and the Pendulum]]\" explores Inquisitorial torture.<ref>{{Cite\
        \ journal |last=Alterton |first=Margaret |title=An Additional Source for Poe's\
        \ 'The Pit and the Pendulum' |journal=Modern Language Notes |volume=48 |issue=6\
        \ |date=June 1933 |pages=349–356 |doi=10.2307/2912531 |jstor=2912531 |url=https://www.jstor.org/stable/i346625\
        \ |access-date=2025-09-21|url-access=subscription }}</ref>\n\n20th-century\
        \ works continue this theme. [[Marcos Aguinis]]'s ''La Gesta del Marrano''\
        \ depicts the Inquisition's reach in 16th- and 17th-century Argentina. [[Les\
        \ Daniels]]'s ''The Black Castle'' (1978), part of the \"Don Sebastian Vampire\
        \ Chronicles,\" set in 15th-century Spain, describes Inquisitorial questioning,\
        \ an [[auto-da-fé|auto de fe]], and features [[Tomás de Torquemada]]. In [[Marvel\
        \ Comics]]'s ''[[Marvel 1602]]'', the Inquisition targets [[Mutant (Marvel\
        \ Comics)|Mutants]] for \"blasphemy,\" with [[Magneto (Marvel Comics)|Magneto]]\
        \ as the [[Grand Inquisitor]]. The second [[Captain Alatriste]] novel by [[Arturo\
        \ Pérez-Reverte]] includes the narrator's torture by the Inquisition. [[Miguel\
        \ Delibes]]'s 1998 novel ''[[The Heretic: A Novel of the Inquisition|The Heretic]]''\
        \ portrays the Inquisition's repression of [[Valladolid]]'s Protestants. [[Samuel\
        \ Shellabarger]]'s ''[[Captain from Castile]]'' directly addresses the Inquisition.\
        \ [[Ildefonso Falcones]]'s 2006 novel ''[[Cathedral of the Sea|La Catedral\
        \ del Mar]]'', set in 14th-century Spain, depicts Inquisition investigations\
        \ in small towns and a major scene in Barcelona.<ref>{{cite web |title=Magnificent\
        \ Epic: Cathedral of the Sea by Ildefonso Falcones |url=https://thehistorylady.wordpress.com/2012/06/30/magnificent-epic-cathedral-of-the-sea-by-ildefonso-falcones/\
        \ |website=The History Lad |date=30 June 2012 |access-date=5 September 2024}}</ref>{{Better\
        \ source needed|date=September 2024}}\n\n===Film===\n* The 1947 epic ''[[Captain\
        \ from Castile]]'' by [[Darryl F. Zanuck]], starring [[Tyrone Power]], uses\
        \ the Inquisition as the major plot point. It tells how powerful families\
        \ used its evils to ruin their rivals.\n* The [[The History of the World Part\
        \ 1#The Spanish Inquisition|Spanish Inquisition segment]] of the 1981 [[Mel\
        \ Brooks]] movie ''[[History of the World Part I]]'' is a comedic musical\
        \ performance based on the activities of the first [[Inquisitor General]]\
        \ of Spain, [[Tomás de Torquemada]].\n* The film ''[[The Fountain]]'' (2006),\
        \ by [[Darren Aronofsky]], features the Spanish Inquisition as part of a plot\
        \ in 1500 when the Grand Inquisitor threatens Queen Isabella's life.\n* ''[[Goya's\
        \ Ghosts]]'' (2006) by [[Miloš Forman]] is set in Spain between 1792 and 1809\
        \ and focuses realistically on the role of the Inquisition and its end under\
        \ Napoleon's rule.\n* The film ''[[Assassin's Creed (film)|Assassin's Creed]]''\
        \ (2016) by [[Justin Kurzel]], starring [[Michael Fassbender]], is set in\
        \ both modern times and Spain during the Inquisition. The film follows Callum\
        \ Lynch (played by Fassbender) as he is forced to relive the memories of his\
        \ ancestor, Aguilar de Nerha (also played by Fassbender), an Assassin during\
        \ the Spanish Inquisition.\n* The many film adaptations of the [[Edgar Allan\
        \ Poe]] short story \"[[The Pit and the Pendulum]]\", including the [[The\
        \ Pit and the Pendulum (1961 film)|1961 film]] and the [[The Pit and the Pendulum\
        \ (1991 film)|1991 film]].\n*''[[Akelarre]]'' (Pedro Olea, 1984), a film,\
        \ about the [[Logroño]] trial of the Zugarramurdi witches.\n*[[Tomás de Torquemada]]\
        \ is portrayed in ''[[1492: The Conquest of Paradise]]'' (1992).\n\n===Theatre,\
        \ music, television, and video games===\n* The Grand Inquisitor plays a part\
        \ in ''[[Don Carlos (play)|Don Carlos]]'' (1867), a play by [[Friedrich Schiller]]\
        \ (which was the basis for the opera ''[[Don Carlos]]'' in five acts by [[Giuseppe\
        \ Verdi]], in which the Inquisitor is also featured, and the third act is\
        \ dedicated to an ''auto de fe'').\n* The 1965 musical ''[[Man of La Mancha]]''\
        \ depicts a fictionalized account of the author [[Miguel de Cervantes]]' run-in\
        \ with Spanish authorities. The character of Cervantes produces a play-within-a-play\
        \ of his unfinished manuscript, [[Don Quixote]], while he awaits sentencing\
        \ by the Inquisition.\n[[file:Monty_Python_Live_02-07-14_12_46_43_(14415411808).jpg|thumb|[[Monty\
        \ Python]] members Terry Gilliam, Michael Palin and Terry Jones performing\
        \ \"[[The Spanish Inquisition (Monty Python)|The Spanish Inquisition]]\" sketch\
        \ during the 2014 Python reunion.]]\n* In the [[Monty Python]] comedy team's\
        \ [[The Spanish Inquisition (Monty Python)|Spanish Inquisition sketches]],\
        \ an inept group of Inquisitors repeatedly burst into scenes, after someone\
        \ utters the words \"I didn't expect a kind of Spanish Inquisition\", screaming\
        \ \"Nobody expects the Spanish Inquisition!\" The Inquisition then uses ineffectual\
        \ forms of [[torture]], including a dish-drying [[Rack (torture)|rack]], soft\
        \ cushions and a comfy chair.\n*The Spanish Inquisition features as a main\
        \ plotline element of the 2009 video game ''[[Assassin's Creed II: Discovery]]''.\n\
        * The Universe of ''[[Warhammer 40,000]]'' borrows several elements and concepts\
        \ of the Catholic church Imaginarium, including the notion of the Black Legend's\
        \ ideal of a fanatic Inquisitors, for some of its troops in ''[[Warhammer\
        \ 40,000: Inquisitor – Martyr]]''.\n* The video game ''[[Blasphemous (video\
        \ game)|Blasphemous]]'' portrays a nightmarish version of the Spanish Inquisition,\
        \ where the protagonist, named 'The Penitent one' wears a [[capirote]] (cone-shaped\
        \ hat). The Penitent one battles twisted religious iconography and meets many\
        \ characters attempting to atone for their sins along the way.\n\n==See also==\n\
