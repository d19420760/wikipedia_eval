        Extract: The Apollo/Skylab space suit (sometimes called the Apollo 11 Spacesuit\
        \ for being used in the Apollo 11 Mission) is a class of space suits used\
        \ in the Apollo and Skylab missions. In both missions, the space suit was\
        \ referred to as the Extravehicular Mobility Unit (EMU). The Apollo EMU consisted\
        \ of a Pressure Garment Assembly (PGA) and a Portable Life Support System\
        \ (PLSS) that was more commonly called the \"backpack\".\nThe A7L was the\
        \ PGA model used on the Apollo 7–14 lunar missions. The subsequent Apollo\
        \ 15-17 missions, Skylab and Apollo–Soyuz used A7LB pressure suits. Additionally,\
        \ these pressure suits varied by program usage. For the Skylab EMU, NASA elected\
        \ to use an umbilical life support system named the Astronaut Life Support\
        \ Assembly.\nThe suits used during lunar EVAs had a weight of about 81.6 kg\
        \ (180 lb), and under lunar surface gravity a weight equivalent to 13.6 kg\
        \ (30 lb). The low surface gravity and suit pressurization put considerable\
        \ constraints on its use.\n\n## Result 10\nTitle: Apollo TV camera\nURL: https://en.wikipedia.org/wiki/Apollo_TV_camera\n\
        Extract: The Apollo program used several television cameras in its space missions\
        \ in the late 1960s and 1970s; some of these Apollo TV cameras were also used\
