        URL: https://en.wikipedia.org/wiki/Glossary_of_chemical_formulae
        Extract: This is a list of common chemical compounds with chemical formulae and CAS numbers, indexed by formula. This complements alternative listing at list of inorganic compounds.

        ## Result 3
        Title: Sodium chloride
        URL: https://en.wikipedia.org/wiki/Sodium_chloride
        Extract: Sodium chloride , is an ionic compound with the chemical formula NaCl, representing a 1:1 ratio of sodium and chloride ions. It is transparent or translucent, brittle, hygroscopic, and occurs as the mineral halite. In its edible form, it is commonly used as a condiment and food preservative. Large quantities of sodium chloride are used in many industrial processes, and it is a major source of sodium and chlorine compounds used as feedstocks for further chemical syntheses. Another major application of sodium chloride is de-icing of roadways in sub-freezing weather.

        ## Result 4
        Title: Sodium
        URL: https://en.wikipedia.org/wiki/Sodium
        Extract: Sodium is a chemical element; it has symbol Na (from Neo-Latin natrium) and atomic number 11. It is a soft, silvery-white, highly reactive metal. Sodium is an alkali metal, being in group 1 of the periodic table. Its only stable isotope is 23Na. The free metal does not occur in nature and must be prepared from compounds. Sodium is the sixth most abundant element in the Earth's crust and exists in numerous minerals such as feldspars, sodalite, and halite (NaCl). Many salts of sodium are highly water-soluble: sodium ions have been leached by the action of water from the Earth's minerals over eons, and thus sodium and chlorine are the most common dissolved elements by weight in the oceans.
        Sodium was first isolated by Humphry Davy in 1807 by the electrolysis of sodium hydroxide. Among many other useful sodium compounds, sodium hydroxide (lye) is used in soap manufacture, and sodium chloride (edible salt) is a de-icing agent and a nutrient for animals including humans.
        Sodium is an essential element for all animals and some plants. Sodium ions are the major cation in the extracellular fluid (ECF) and as such are the major contributor to the ECF osmotic pressure. Animal cells actively pump sodium ions out of the cells by means of the sodium–potassium pump, an enzyme complex embedded in the cell membrane, in order to maintain a roughly ten-times higher concentration of sodium ions outside the cell than inside. In nerve cells, the sudden flow of sodium ions into the cell through voltage-gated sodium channels enables transmission of a nerve impulse in a process called the action potential.

        ## Result 5
        Title: Potassium nitrate
        URL: https://en.wikipedia.org/wiki/Potassium_nitrate
        Extract: Potassium nitrate is a chemical compound with a sharp, salty, bitter taste and the chemical formula KNO3. It is a potassium salt of nitric acid. This salt consists of potassium cations K+ and nitrate anions NO−3, and is therefore an alkali metal nitrate. It occurs in nature as a mineral, niter (or nitre outside the United States). It is a source of nitrogen, and nitrogen was named after niter. Potassium nitrate is one of several nitrogen-containing compounds collectively referred to as saltpetre (or saltpeter in American English).
        Major uses of potassium nitrate are in fertilizers, tree stump removal, rocket propellants and fireworks. It is one of the major constituents of traditional gunpowder (black powder). In processed meats, potassium nitrate reacts with hemoglobin and myoglobin generating a red color.

        ## Result 6
        Title: Chemical compound
        URL: https://en.wikipedia.org/wiki/Chemical_compound
        Extract: A chemical compound is a chemical substance composed of many identical molecules (or molecular entities) containing atoms from more than one chemical element held together by chemical bonds. A molecule consisting of atoms of only one element is therefore not a compound. A compound can be transformed into a different substance by a chemical reaction, which may involve interactions with other substances. In this process, bonds between atoms may be broken or new bonds formed or both.
        There are four major types of compounds, distinguished by how the constituent atoms are bonded together. Molecular compounds are held together by covalent bonds, ionic compounds are held together by ionic bonds, intermetallic compounds are held together by metallic bonds, and coordination complexes are held together by coordinate covalent bonds. Non-stoichiometric compounds form a disputed marginal case.
        A chemical formula specifies the number of atoms of each element in a compound molecule, using the standard chemical symbols with numerical subscripts. Many chemical compounds have a unique CAS number identifier assigned by the Chemical Abstracts Service. Globally, more than 350,000 chemical compounds (including mixtures of chemicals) have been registered for production and use.

        ## Result 7
        Title: History of salt
        URL: https://en.wikipedia.org/wiki/History_of_salt
        Extract: Salt, also referred to as table salt or by its chemical formula NaCl (sodium chloride), is an ionic compound made of sodium and chloride ions. All life depends on its chemical properties to survive. It has been used by humans for thousands of years, from food preservation to seasoning. Salt's ability to preserve food was a founding contributor to the development of civilization. It helped eliminate dependence on seasonal availability of food, and made it possible to transport food over large distances. However, salt was often difficult to obtain, so it was a highly valued trade item, and was considered a form of currency by many societies, including Rome. According to Pliny the Elder, Roman soldiers were paid in salt, from which the word salary is derived, although this is disputed by historians. Many salt roads, such as the Via Salaria in Italy, had been established by the Bronze Age.
