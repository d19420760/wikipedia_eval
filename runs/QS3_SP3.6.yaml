        \ mixed doubles–is considered winning a \"boxed set\" of Grand Slam titles.\
        \ \nThe current Grand Slams are the four most prestigious tournaments in the\
        \ world held every year, they are distinguished by participation from almost\
        \ every top player and by their two-week duration, 128-player draw in women's\
        \ singles. It's extremely rare for a player to win all four tournaments, \"\
        the Grand Slam\", in one calendar year. This was only achieved three times\
