        ## Result 2
        Title: Cornell University
        URL: https://en.wikipedia.org/wiki/Cornell_University
        Extract: Cornell University ( korr-NEHL) is a private Ivy League research university based in Ithaca, New York, United States. The university was co-founded by American philanthropist Ezra Cornell and historian and educator Andrew Dickson White in 1865. Since its founding, Cornell University has been a co-educational and nonsectarian institution. As of fall 2024, the student body included 16,128 undergraduate and 10,665 postgraduate students from all 50 U.S. states and 130 countries.
        The university is organized into eight undergraduate colleges and seven graduate divisions on its main Ithaca campus. Each college and academic division has near autonomy in defining its respective admission standards and academic curriculum. In addition to its primary campus in Ithaca, Cornell University administers three satellite campuses, including two in New York City, the medical school and Cornell Tech, and a branch of the medical school in Al Rayyan in Education City, Qatar.
        Cornell is one of three private land-grant universities in the United States. Among the university's eight undergraduate colleges, three are state-supported statutory or contract colleges partly financed through the State University of New York – the College of Agriculture and Life Sciences, the College of Human Ecology, and the Industrial and Labor Relations School – as is one of the graduate divisions, the Veterinary Medicine College. The main campus of Cornell University in Ithaca spans 745 acres (301 ha).
        As of October 2024, 64 Nobel laureates, 4 Turing Award winners, and 1 Fields Medalist have been affiliated with Cornell University. The institution counts more than 250,000 living alumni, which include 34 Marshall Scholars, 33 Rhodes Scholars, 29 Truman Scholars, 63 Olympic medalists, 10 current Fortune 500 CEOs, and 35 billionaires.

        ## Result 3
        Title: History of Cornell University
        URL: https://en.wikipedia.org/wiki/History_of_Cornell_University
        Extract: The history of Cornell University begins when its two founders, Andrew Dickson White of Syracuse and Ezra Cornell of Ithaca, met in the New York State Senate in January 1864. Together, they established Cornell University in Ithaca, New York, in 1865. The university was initially funded by Ezra Cornell's $400,000 endowment and by New York's 989,920-acre (4,006.1 km2) allotment of the Morrill Land Grant Act of 1862.
        However, even before Ezra Cornell and Andrew White met in the New York Senate, each had separate plans and dreams that would draw them toward their collaboration in founding Cornell. White believed in the need for a great university for the nation that would take a radical new approach to education; and Cornell, who had great respect for education and philanthropy, desired to use his money "to do the greatest good." Abraham Lincoln's signing of Vermont Senator Justin Morrill's Land Grant Act into law was also critical to the formation of many universities, including Cornell, in the post–Civil War era.

        ## Result 4
        Title: Syracuse University
        URL: https://en.wikipedia.org/wiki/Syracuse_University
        Extract: Syracuse University (informally 'Cuse or SU) is a private research university in Syracuse, New York, United States. It was established in 1870 with roots in the Methodist Episcopal Church but has been nonsectarian since 1920. Located in the city's University Hill neighborhood, east and southeast of downtown Syracuse, the large campus features an eclectic mix of architecture, ranging from nineteenth-century Romanesque Revival to contemporary buildings. Syracuse University is organized into 13 schools and colleges and is classified among "R1: Doctoral Universities – Very high research activity".
        Syracuse University athletic teams, the Orange, participate in 20 intercollegiate sports. SU is a member of the Atlantic Coast Conference (ACC) for all NCAA Division I athletics, except for the men's rowing and women's ice hockey teams. SU is also a member of the Eastern College Athletic Conference. Alumni, faculty, and affiliates include former president Joe Biden, 36 Olympic Medalists, Academy Award winners, Emmy Award winners, Grammy Award winners, governors, and members of the U.S. Senate and House of Representatives.

        ## Result 5
        Title: List of Harvard University people
        URL: https://en.wikipedia.org/wiki/List_of_Harvard_University_people
        Extract: This list of Harvard University alumni includes notable graduates, professors, and administrators affiliated with Harvard University. For a list of notable non-graduates of Harvard, see the list of Harvard University non-graduate alumni. For a list of Harvard's presidents, see President of Harvard University.
        Eight presidents of the United States have graduated from Harvard University: John Adams, John Quincy Adams, Rutherford B. Hayes, John F. Kennedy, Franklin Delano Roosevelt, Theodore Roosevelt, George W. Bush, and Barack Obama. Bush graduated from Harvard Business School, Hayes and Obama from Harvard Law School, and the others from Harvard College.
        Over 150 Nobel Prize winners have been associated with the university as alumni, researchers or faculty.

        ## Result 6
        Title: Bibliography of the United States Constitution
        URL: https://en.wikipedia.org/wiki/Bibliography_of_the_United_States_Constitution
        Extract: The bibliography of the United States Constitution is a comprehensive selection of books, journal articles and various primary sources about and primarily related to the Constitution of the United States that have been published since its ratification in 1788. Many of the delegates at the Constitutional Convention set out to improve on the inadequate Articles of Confederation, but after much deliberation over state's rights a new Federal Constitution was approved.  To allow delegates to make compromises and changes without speculation from the public and newspapers it was decided that the debates and drafting during the Convention be conducted in secret, which is why definitive accounts of the Convention did not appear until 1840, while many books on the Constitution begin after the Convention of 1787. On September 17, 1787, the new Constitution was signed by the delegates, and ratified the following year, which established the government of the United States in March 1789. Since then, many historians and political scientists, some of them critical and controversial, have written about the Constitution, and the Founding Fathers who framed it.
