        \ with drug (vaccine) to train them to differentiate and fight cancer cells.\n\
        \n## Result 6\nTitle: Conjugate vaccine\nURL: https://en.wikipedia.org/wiki/Conjugate_vaccine\n\
        Extract: A conjugate vaccine is a type of subunit vaccine which combines a\
        \ weak antigen with a strong antigen as a carrier so that the immune system\
        \ has a stronger response to the weak antigen.\nVaccines are used to prevent\
        \ diseases by invoking an immune response to an antigen, part of a bacterium\
