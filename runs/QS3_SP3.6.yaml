        \ EST. During the show, AMPAS presented Academy Awards (commonly referred\
        \ to as Oscars) in 24 categories honoring films released in 1997. The ceremony,\
        \ which was televised in the United States by ABC, was produced by Gil Cates\
        \ and directed by Louis J. Horvitz. Actor Billy Crystal hosted the show for\
        \ the sixth time. He had first hosted the 62nd ceremony held in 1990, and\
        \ most recently the previous year's awards. Nearly a month earlier in an event\
        \ held at the Regent Beverly Wilshire Hotel in Beverly Hills, California on\
        \ February 28, the Academy Awards for Technical Achievement were presented\
        \ by host Ashley Judd.\nTitanic won 11 awards, including Best Picture, a number\
        \ that is tied with Ben-Hur and The Lord of the Rings: The Return of the King.\
        \ Other winners included As Good as It Gets, Good Will Hunting, and L.A. Confidential\
        \ with two awards, and Character, The Full Monty, Geri's Game, The Long Way\
        \ Home, Men in Black, A Story of Healing, and Visas and Virtue with one. The\
