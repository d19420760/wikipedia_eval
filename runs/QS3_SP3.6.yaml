        \ respects closely resemble Galician (Western Ukrainian) villages of the 19th\
        \ century.\n\n## Result 7\nTitle: Brazil\nURL: https://en.wikipedia.org/wiki/Brazil\n\
        Extract: Brazil, officially the Federative Republic of Brazil, is the largest\
        \ country in South America. It is also the world's fifth-largest country by\
