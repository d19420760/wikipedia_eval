        \ the Stars on 11 March 2015.\n\n## Result 4\nTitle: The Manhattan Project\
        \ (film)\nURL: https://en.wikipedia.org/wiki/The_Manhattan_Project_(film)\n\
        Extract: The Manhattan Project is a 1986 American science fiction thriller\
