      content: "## Result 1\nTitle: List of World Heritage Sites in Italy\nURL: https://en.wikipedia.org/wiki/List_of_World_Heritage_Sites_in_Italy\n\
        Extract: The United Nations Educational, Scientific and Cultural Organization\
