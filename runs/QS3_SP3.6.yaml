        Extract: Border control comprises measures taken by governments to monitor\
        \ and regulate the movement of people, animals, and goods across land, air,\
        \ and maritime borders. While border control is typically associated with\
        \ international borders, it also encompasses controls imposed on internal\
        \ borders within a single state.\nBorder control measures serve a variety\
        \ of purposes, ranging from enforcing customs, sanitary and phytosanitary,\
        \ or biosecurity regulations to restricting migration. While some borders\
        \ (including most states' internal borders and international borders within\
        \ the Schengen Area) are open and completely unguarded, others (including\
        \ the vast majority of borders between countries as well as some internal\
        \ borders) are subject to some degree of control and may be crossed legally\
        \ only at designated checkpoints. Border controls in the 21st century are\
        \ tightly intertwined with intricate systems of travel documents, visas, and\
        \ increasingly complex policies that vary between countries.\nBorder controls\
        \ have high human and economic costs, including tens of thousands of border\
