      content: "## Result 1\nTitle: France–Spain border\nURL: https://en.wikipedia.org/wiki/France%E2%80%93Spain_border\n\
        Extract: The France–Spain border was formally defined in 1659. It separates\
        \ the two countries from the Basque cities of Hendaye and Irun in the west,\
        \ running through the Pyrenees to Cerbère and Portbou on the Mediterranean\
        \ Sea. It runs roughly along the drainage divide defined by the Pyrenees,\
        \ though with several exceptions.\n\n## Result 2\nTitle: List of countries\
        \ and territories by number of land borders\nURL: https://en.wikipedia.org/wiki/List_of_countries_and_territories_by_number_of_land_borders\n\
        Extract: This list gives the number of distinct land borders of each country\
        \ or territory,but not the neighbouring countries and territories. The length\
        \ of each border is included, as is the total length of each country's or\
        \ territory's borders.\nCountries or territories that are connected only by\
        \ man-made structures such as bridges, causeways or tunnels are not considered\
        \ to have land borders. However, borders along lakes, rivers, and other internal\
        \ waters are considered land borders for the purposes of this article.\n\n\
        ## Result 3\nTitle: Borders of Spain\nURL: https://en.wikipedia.org/wiki/Borders_of_Spain\n\
        Extract: Spain, formally known as the Kingdom of Spain (Spanish: Reino de\
        \ España), is a sovereign nation primarily situated on the Iberian Peninsula\
        \ in South Europe. It also includes the archipelagos Canary Islands and Balearic\
        \ Islands, along with overseas territories bordering Morocco located in North\
        \ Africa. The mainland is bordered by the Mediterranean Sea to the south and\
        \ east, except for a small land border with Gibraltar. To the north and northeast,\
        \ it shares borders with France, Andorra, and the Bay of Biscay, while Portugal\
        \ and the Atlantic Ocean lie to the west and northwest. Spain is one of only\
        \ three countries, along with France and Morocco, to have coastlines on both\
        \ the Atlantic and Mediterranean. The Portugal–Spain border, stretching 1,214\
        \ km (754 mi), is the longest continuous border within the European Union.\
        \ As a matter of fact, the total length of the border shared by Spain reaches\
        \ 1,928 kilometres (1,198 mi) long.\n\n## Result 4\nTitle: List of countries\
        \ that border only one other country\nURL: https://en.wikipedia.org/wiki/List_of_countries_that_border_only_one_other_country\n\
        Extract: This is a list of sovereign state that have a land border with only\
        \ one other. Some on this list have a maritime border with additional countries.\
        \ Some which are not listed here have no land border but do have a maritime\
        \ border with a single other state; an example is Sri Lanka.\nThere are generally\
        \ three arrangements by which a state would have a single land border:\n\n\
        an island divided between two states, such as Haiti and the Dominican Republic,\
        \ or Republic of Ireland and the United Kingdom.\na peninsula or a semi-enclave,\
        \ where one state has a land border with a neighbouring one but is otherwise\
        \ surrounded by sea, while the neighbour borders other states—examples are\
        \ Portugal (neighbouring Spain), The Gambia (surrounded by Senegal) and Brunei\
        \ (surrounded by Malaysia).\nthe three states that are landlocked enclaves,\
        \ surrounded by a larger state: San Marino and Vatican City (within Italy)\
        \ and Lesotho (within South Africa).\nTerritory leased or ceded by one country\
        \ to another for perpetual use, but not in sovereignty, such as Guantanamo\
        \ Bay Naval Base in Cuba, or memorials, such as the American Cemetery in France,\
        \ do not constitute true territorial borders because the land occupied remains\
        \ a formal part of the host country.\nThis list is based on the Correlates\
        \ of War Direct Contiguity data set, with maritime causeways, bridges and\
        \ artificial islands not being counted.\n\n## Result 5\nTitle: List of islands\
        \ of Spain\nURL: https://en.wikipedia.org/wiki/List_of_islands_of_Spain\n\
        Extract: This list of islands in Spain encapsulates the country's islands\
        \ both within its territorial borders and its overseas possessions. The total\
        \ number of islands is 179.\n\n## Result 6\nTitle: Brazil–France border\n\
        URL: https://en.wikipedia.org/wiki/Brazil%E2%80%93France_border\nExtract:\
        \ The Brazil–France border is the line, located in the Amazon rainforest,\
        \ that limits the territories of Brazil and France. The border is located\
        \ between the Brazilian state of Amapá and French Guiana. It is 730 kilometres\
        \ (450 mi) in length.\nIt is the longest border France shares with another\
        \ country, despite not being located in metropolitan France. The second longest\
        \ is the one with Spain, at \n623 kilometres (387 mi). The Oyapock River defines\
        \ part of the border and is spanned by the Oyapock River Bridge, the only\
        \ bridge crossing the border, which connects the towns of Saint-Georges (French\
        \ Guiana) and Oiapoque (Brazil).\n\n## Result 7\nTitle: Schengen Area\nURL:\
        \ https://en.wikipedia.org/wiki/Schengen_Area\nExtract: The Schengen Area\
        \ (English:  SHENG-ən, Luxembourgish: [ˈʃæŋən] ) is a system of open borders\
        \ that encompass 29 European countries that have officially abolished border\
        \ controls at their common borders. As an element within the wider area of\
        \ freedom, security and justice (AFSJ) policy of the European Union (EU),\
        \ it mostly functions as a single jurisdiction under a common visa policy\
        \ for international travel purposes. The area is named after the 1985 Schengen\
        \ Agreement and the 1990 Schengen Convention, both signed in Schengen, Luxembourg.\n\
        Of the 27 EU member states, only two, Cyprus and Ireland, are not members\
        \ of the Schengen Area. Cyprus is committed by treaty to join the system and\
        \ aims to do so in 2026, although its participation has been complicated by\
        \ the occupation of Northern Cyprus by Turkey since 1974. Ireland maintains\
        \ an opt-out in order to maintain the Common Travel Area with non-EU member\
        \ United Kingdom and operates its own visa policy.\nIn addition to the member\
        \ states of the European Union, all member states of the European Free Trade\
        \ Association, namely Iceland, Liechtenstein, Norway, and Switzerland, have\
        \ signed association agreements with the EU to be part of the Schengen Area.\
        \ The microstate of Monaco is de facto part of the Schengen Area as border\
        \ controls are administered as part of France. Three other microstates – Andorra,\
        \ San Marino, and Vatican City – have open borders with the Schengen Area\
        \ due to their small size and difficulty of maintaining active border controls.\n\
        The Schengen Area has a population of more than 450 million people and an\
        \ area of about 4,595,000 km2 (1,774,000 sq mi). About 1.7 million people\
        \ commute to work across an internal European border each day, and in some\
        \ regions these international commuters constitute up to a third of the workforce.\
        \ In 2015, there were 1.3 billion crossings of Schengen borders in total.\
        \ 57 million crossings were due to the transport of goods by road, with a\
        \ value of €2.8 trillion. The decrease in the cost of trade due to Schengen\
        \ varies from 0.42% to 1.59% depending on geography, trade partners, and other\
        \ factors. Countries outside of the Schengen Area also benefit. States in\
        \ the Schengen Area have strengthened border controls with non-Schengen countries.\n\
        The Schengen Area is the world's most visited travel zone, accounting for\
        \ the vast majority of Europe's 793 million international tourist arrivals\
        \ in 2025. Schengen member states processed 11.7 million visa applications\
        \ in 2024, issuing approximately 9.7 million visas to travelers from around\
        \ the world.\n\n## Result 8\nTitle: Basque Country (greater region)\nURL:\
        \ https://en.wikipedia.org/wiki/Basque_Country_(greater_region)\nExtract:\
        \ The Basque Country (Basque: Euskal Herria; Spanish: País Vasco; French:\
        \ Pays basque) is the name given to the home of the Basque people. The Basque\
        \ Country is located in the western Pyrenees, straddling the border between\
        \ France and Spain on the coast of the Bay of Biscay.\nEncompassing the Autonomous\
        \ Communities of the Basque Country and Navarre in Spain and the Northern\
        \ Basque Country in France, the region is home to the Basque people (Basque:\
        \ Euskaldunak), their language (Basque: Euskara), culture and traditions.\
        \ The area is neither linguistically nor culturally homogeneous, and certain\
        \ areas have a majority of people who do not consider themselves Basque, such\
        \ as the south of Navarre. The concept is still highly controversial, and\
        \ the Supreme Court of Navarre has upheld a denial of government funding to\
        \ school books that include the Navarre community within the Basque Country\
        \ area.\n\n## Result 9\nTitle: France\nURL: https://en.wikipedia.org/wiki/France\n\
        Extract: France, officially the French Republic, is a country primarily located\
        \ in Western Europe. Its overseas regions and territories include French Guiana\
        \ in South America, Saint Pierre and Miquelon in the North Atlantic, the French\
        \ West Indies, and many islands in Oceania and the Indian Ocean. Metropolitan\
        \ France shares borders with Belgium and Luxembourg to the north; Germany\
        \ to the northeast; Switzerland to the east; Italy and Monaco to the southeast;\
        \ Andorra and Spain to the south; and a maritime border with the United Kingdom\
        \ to the northwest. Its metropolitan area extends from the Rhine to the Atlantic\
        \ Ocean and from the Mediterranean Sea to the English Channel and the North\
        \ Sea. Its 18 integral regions—five of which are overseas—span a combined\
        \ area of 632,702 km2 (244,288 sq mi), with a total population estimated at\
        \ over 69.1 million in 2026. Its capital, largest city and main cultural and\
        \ economic centre is Paris.\nMetropolitan France was settled during the Iron\
        \ Age by Celtic tribes known as Gauls before Rome annexed the area in 51 BC,\
        \ leading to a distinct Gallo-Roman culture. In the Early Middle Ages, the\
        \ Franks formed the kingdom of Francia, which became the heartland of the\
        \ Carolingian Empire. The Treaty of Verdun of 843 partitioned the empire,\
        \ with West Francia evolving into the Kingdom of France. In the High Middle\
        \ Ages, France was a powerful but decentralised feudal kingdom, but from the\
        \ mid-14th to the mid-15th centuries, France was plunged into a dynastic conflict\
        \ with England known as the Hundred Years' War. In the 16th century, French\
        \ culture flourished during the French Renaissance, and a French colonial\
        \ empire emerged. Internally, France was dominated by the conflict with the\
        \ House of Habsburg and the French Wars of Religion between Catholics and\
        \ Huguenots. France was successful in the Thirty Years' War and further increased\
        \ its influence during the reign of Louis XIV.\nThe French Revolution of 1789\
        \ overthrew the Ancien Régime and produced the Declaration of the Rights of\
        \ Man, which expresses the nation's ideals to this day. France reached its\
        \ political and military zenith in the early 19th century under Napoleon Bonaparte,\
        \ subjugating much of continental Europe and establishing the First French\
        \ Empire. Its collapse initiated a period of relative decline during which\
        \ France endured the Bourbon Restoration until the founding of the French\
        \ Second Republic, which was succeeded by the Second French Empire upon Napoleon\
        \ III's takeover. His empire collapsed during the Franco-Prussian War in 1870.\
        \ This led to the establishment of the French Third Republic, and a period\
        \ of economic prosperity and cultural and scientific flourishing known as\
        \ the Belle Époque. France was one of the major participants of World War\
        \ I, from which it emerged victorious at great human and economic cost. It\
        \ was among the Allies of World War II, but it surrendered and was occupied\
        \ by Germany in 1940. Following its liberation in 1944, the short-lived Fourth\
        \ Republic was established and later dissolved over the course of the Algerian\
        \ War. The current Fifth Republic, a semi-presidential system, was formed\
        \ in 1958 by Charles de Gaulle. Algeria and most French colonies became independent\
        \ in the 1960s, with the majority retaining close economic and military ties\
        \ with France.\nFrance retains its centuries-long status as a global centre\
        \ of art, science, cuisine and philosophy. It hosts the fourth-largest number\
        \ of UNESCO World Heritage Sites, with 54 in total, and is the world's leading\
        \ tourist destination, having received 102 million foreign visitors in 2025.\
        \ A developed country, France has a high nominal per capita income globally,\
        \ and its economy ranks among the largest in the world by both nominal GDP\
        \ and PPP-adjusted GDP. It is a great power, being one of the five permanent\
        \ members of the United Nations Security Council and an official nuclear-weapon\
        \ state. The country is part of multiple international organisations and forums.\n\
        \n## Result 10\nTitle: Andorra–France border\nURL: https://en.wikipedia.org/wiki/Andorra%E2%80%93France_border\n\
