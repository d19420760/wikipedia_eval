- question: Which countries are members of both NATO and the European Union?
  category: Multi
  answer: |-
    By cross-referencing both lists, the **23 countries** that are members of both NATO and the European Union are:

    1. **Belgium**
    2. **Bulgaria**
    3. **Croatia**
    4. **Czech Republic**
    5. **Denmark**
    6. **Estonia**
    7. **Finland**
    8. **France**
    9. **Germany**
    10. **Greece**
    11. **Hungary**
    12. **Italy**
    13. **Latvia**
    14. **Lithuania**
    15. **Luxembourg**
    16. **Netherlands**
    17. **Poland**
    18. **Portugal**
    19. **Romania**
    20. **Slovakia**
    21. **Slovenia**
    22. **Spain**
    23. **Sweden**

    The four EU members **not** in NATO are Austria, Cyprus, Ireland, and Malta. The NATO members **not** in the EU include Canada, the United States, the United Kingdom, Turkey, Norway, Iceland, Albania, Montenegro, North Macedonia, and (as of its 2024 accession to NATO) — all already accounted for above.
