        \ ArtStation or YouTube can't be used to change this per [[WP:SPS]]. -->\n\
        | composer = {{ubl|Ronan de Castel|ClascyJitto|Post Elvis}}\n| engine = [[GameMaker]]\n\
        | released = {{Collapsible list|title={{nobold|January 26, 2023}}\n  |'''Windows'''\n\
        \  |January 26, 2023 \n  |'''Nintendo Switch'''\n  |August 27, 2024\n}}\n\
        | platforms = {{ubl|[[Windows]]|[[Nintendo Switch]]}}\n| genre = [[Platform\
        \ game|Platform]]\n| modes = [[Single-player]], [[multiplayer]]\n| caption\
        \ = Cover art design by McPig<!-- Do not change to Geoffroy Lanctôt unless\
        \ the name is published in a reliable source. His ArtStation or YouTube can't\
        \ be used to change this per [[WP:SPS]]. -->\n}}\n'''''Pizza Tower''''' is\
        \ a 2023 [[platform game]] created by the [[indie game|indie]] developer Tour\
        \ De Pizza. It follows the [[pizza]] chef Peppino Spaghetti, who must scale\
        \ a tower to prevent the destruction of his [[pizzeria]]. Across 20 [[side-scrolling]]\
        \ [[level (video games)|levels]], the player increases their [[Score (game)|score]]\
        \ by gathering collectibles and defeating enemies to build [[Combo (video\
        \ games)|combos]]. At the end of each level, they activate an escape sequence\
        \ and must return to the beginning within a [[time limit]]. ''Pizza Tower''\
        \ does not use [[Health (game terminology)|health]] or [[Life (video games)|lives]],\
        \ and its [[difficulty level|difficulty]] depends on what the player chooses\
        \ to achieve.\n\nThe five-year development was led by the [[pseudonym]]ous\
        \ designer McPig and programmer Sertif. ''Pizza Tower'' began as a [[role-playing\
        \ video game]] with [[survival horror]] elements before evolving into a platformer\
        \ inspired by [[Nintendo]]'s dormant ''[[Wario (series)#Wario Land series|Wario\
        \ Land]]'' series, to which McPig wanted to provide a [[spiritual successor]].\
        \ It was developed with [[GameMaker]] and features a cartoonish, high-resolution\
        \ [[pixel art]] style inspired by ''[[SpongeBob SquarePants]]'' and [[French\
        \ comics]]. ''[[Wario Land 4]]'' (2001) served as the basis for the gameplay\
        \ and [[level design]].\n\n''Pizza Tower'' developed a large fandom during\
        \ its development through [[early access]] builds offered to [[Patreon]] backers\
        \ and [[game demo]]s. It was released for [[Windows]] on January 26, 2023.\
        \ ''Pizza Tower'' received positive reviews and nominations for year-end accolades.\
        \ Critics praised its gameplay, music, visuals, and humor. Critics favorably\
        \ compared its art style to 1990s [[Nicktoons]] and the sense of speed to\
        \ the ''[[Sonic the Hedgehog]]'' series. They considered it a worthy substitute\
        \ for ''Wario Land'', some calling it better than its inspiration. Tour De\
        \ Pizza supported the game with [[Patch (computing)|updates]] adding new content\
        \ into 2024, alongside a [[Video game port|port]] for the [[Nintendo Switch]].\n\
        \n==Gameplay==\n[[File:Pizza Tower Screenshot.jpg|thumb|left|alt=Peppino dashing\
        \ during the \"Pizza Time\" escape phase in the first level. Gustavo can be\
        \ seen pointing to the exit, while Pizzaface is on the Pizza Time timer; following\
        \ Peppino are three Toppins. In this screenshot, the player is picking up\
        \ collectibles (the red clocks) to increase their score and maintain their\
        \ combo.|Peppino, the [[player character]], dashes towards the [[Level (video\
        \ games)|level]]'s entrance during the \"Pizza Time\" phase.]]\n\n''Pizza\
        \ Tower'' is a [[side-scrolling]] [[platform game]]. Its story begins when\
        \ Peppino Spaghetti, an Italian [[Pizzaiolo|pizza chef]] and the owner of\
        \ a struggling [[pizzeria]], is approached by Pizzaface, a sentient floating\
        \ pizza.<ref name=\"PCGamerReview\" /> Pizzaface threatens to destroy Peppino's\
        \ pizzeria with a [[Nuclear pumped laser|nuclear laser]] atop a nearby tower.\
        \ Frightened and angered, Peppino sets out to ascend the tower and defeat\
        \ Pizzaface to save his pizzeria.<ref name=\"DenOfGeek\" /> The tower serves\
        \ as the setting and [[overworld#Platform games|hub world]] of the [[single-player]]\
        \ game. It has five floors,<ref name=\"IGNReview\" /> each containing four\
        \ [[Level (video games)|levels]] and a [[Boss (video games)|boss]]. Each level\
        \ has a distinct theme and unique [[game mechanics]],<ref name=\"PCGamerReview\"\
        \ /> such as a cemetery with surfable corpses and a ''[[Five Nights at Freddy's]]''\
        \ homage with [[jump scare]]s.<ref name=\"IGNReview\" /><ref name=\"MultiItReview\"\
        \ />\n\nPeppino, the primary [[player character]], can walk, run, jump, roll,\
        \ and slide. His attacks include a body slam, grabbing and throwing enemies,\
        \ and a parry.<ref name=\"IGNReview\" /><ref name=\"PolyReview\" /> If Peppino\
        \ runs for long enough, he begins to dash, allowing him to run up walls and\
        \ plow through enemies and objects.<ref name=\"PolyReview\" /> Defeating an\
        \ enemy initiates a [[Combo (video games)|combo]] that lasts seven seconds;\
        \ to maintain it, the player must defeat more enemies and collect items.<ref\
        \ name=\"MSReview\" /> Certain levels feature [[power-up]]s that alter Peppino's\
        \ abilities, such as guns or knight armor,<ref name=\"IGNReview\" /><ref name=\"\
        PolyReview\" /> and Gustavo, an alternate player character who rides on the\
        \ back of his giant pet rat named Brick.<ref name=\"RPSReview\" /> [[Palette-swap]]\
        \ outfits for Peppino can be acquired through completing challenges and obtaining\
        \ [[Achievement (video games)|achievements]].<ref>{{Cite web |last=Wilson\
        \ |first=Adele |date=March 6, 2023 |title=''Pizza Tower'' Outfits – How to\
        \ Unlock Them All |url=https://www.gamezebo.com/walkthroughs/pizza-tower-outfits/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230327202938/https://www.gamezebo.com/walkthroughs/pizza-tower-outfits/\
        \ |archive-date=March 27, 2023 |access-date=March 27, 2023 |website=[[Gamezebo]]}}</ref>\n\
        \nEach level contains various secrets: pizza topping creatures (which are\
        \ called Toppins) that the player rescues to unlock boss fights;<ref name=\"\
        PCGamerReview\" /> a treasure locked behind a door that can only be opened\
        \ by a janitor the player must find; and three hidden rooms that provide points.<ref\
        \ name=\"IGNReview\" /> At the end of most levels, the player finds a pillar\
        \ they must destroy.<ref name=\"PolyReview\" /> This activates \"Pizza Time\"\
        , a phase in which the player must return to the level's entrance within a\
        \ [[time limit]] to avoid being caught by Pizzaface.<ref name=\"IGNReview\"\
        \ /><ref name=\"MultiItReview\" /><ref>{{Cite web |last=Dunn |first=Jeff |date=September\
        \ 4, 2023 |title=''Pizza Tower'' is the ''Wario Land'' + ''Sonic'' crossover\
        \ I didn't know I wanted |url=https://www.engadget.com/pizza-tower-is-the-wario-land--sonic-crossover-i-didnt-know-i-wanted-130022186.html\
        \ |access-date=October 21, 2023 |website=[[Engadget]] |archive-date=November\
        \ 13, 2023 |archive-url=https://web.archive.org/web/20231113195506/https://www.engadget.com/pizza-tower-is-the-wario-land--sonic-crossover-i-didnt-know-i-wanted-130022186.html\
        \ |url-status=live}}</ref> The player is forced to restart the level if they\
        \ fail.<ref name=\"IGNReview\" /> A portal allows the player to do an optional\
        \ second lap in which they return to the end and must make their way back\
        \ to the entrance again for bonus points.<ref name=\"IGNReview\" /> After\
        \ completing each level, the player is given a [[letter grade]] based on their\
        \ score and performance. The highest rank, P, can only be acquired if the\
        \ player obtains enough points, finds the three secrets, collects the treasure,\
        \ and completes a second lap while maintaining a single, uninterrupted combo.<ref>{{Cite\
        \ web |last=Wasilowski |first=Zak |date=February 1, 2023 |title=''Pizza Tower''\
        \ Ranks – All Ranks Explained |url=https://www.gamezebo.com/walkthroughs/pizza-tower-ranks/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230326060811/https://www.gamezebo.com/walkthroughs/pizza-tower-ranks/\
        \ |archive-date=March 26, 2023 |access-date=March 27, 2023 |website=[[Gamezebo]]}}</ref>\n\
        \n''Pizza Tower'' does not feature traditional [[difficulty level]]s; rather,\
        \ the difficulty depends on what the player chooses to achieve.<ref name=\"\
        PolyReview\" /> Secrets are optional and there are no [[Life (video games)|lives]]\
        \ or [[Health (game terminology)|health]]. Colliding with an obstacle does\
        \ not hurt Peppino, though it lowers the player's score and subtracts two\
        \ seconds from the combo timer.<ref name=\"PCGamerReview\" /><ref name=\"\
        MSReview\" /> The only stages where Peppino can be harmed are the boss fights,\
        \ arena battles against foes such as Pepperman, a large anthropomorphic [[bell\
        \ pepper]]; the Vigilante, a cheese cowboy; and <!-- [[WP:THE]], do not capitalize\
        \ the \"the\"-->the<!-- [[WP:THE]], do not capitalize the \"the\"--> Noise,\
        \ a TV star and Peppino's archenemy.<ref name=\"PCGamerReview\" /><ref name=\"\
        IGNReview\" /> The player must dodge the bosses' attacks and deplete their\
        \ health to proceed.<ref>{{Cite web |last=Green |first=Meriel |date=April\
        \ 5, 2023 |title=''Pizza Tower'' Bosses Guide – All Bosses And How To Fight\
        \ Them |url=https://www.gamezebo.com/walkthroughs/pizza-tower-bosses/ |url-status=live\
        \ |archive-url=https://web.archive.org/web/20230320231850/https://www.gamezebo.com/walkthroughs/pizza-tower-bosses/\
        \ |archive-date=March 20, 2023 |access-date=May 4, 2023 |website=[[Gamezebo]]}}</ref>\
        \ A [[New Game Plus]] mode featuring the Noise as a playable character was\
        \ added in a free [[Patch (computing)|update]] on March 12, 2024.<ref name=\"\
        PCGamer: Noise\">{{cite web |last1=Litchfield |first1=Ted |title=Pizza Tower,\
        \ 2023's best platformer, is getting a free update where you play as one of\
        \ the villains with his own music and moveset: 'Think of it as a sort of New\
        \ Game+' |url=https://www.pcgamer.com/pizza-tower-2023s-best-platformer-is-getting-a-free-update-where-you-play-as-one-of-the-villains-with-his-own-music-and-moveset-think-of-it-as-a-sort-of-new-game/\
        \ |website=[[PC Gamer]] |access-date=February 29, 2024 |date=January 26, 2024\
        \ |archive-date=February 29, 2024 |archive-url=https://web.archive.org/web/20240229085116/https://www.pcgamer.com/pizza-tower-2023s-best-platformer-is-getting-a-free-update-where-you-play-as-one-of-the-villains-with-his-own-music-and-moveset-think-of-it-as-a-sort-of-new-game/\
        \ |url-status=live}}</ref><ref>{{cite web |last=Chandler |first=Sam |date=March\
        \ 11, 2024 |title=Pizza Tower Noise Update releases with playable boss mode\
        \ |url=https://www.shacknews.com/article/139079/pizza-tower-noise-update-playable-boss\
        \ |archive-date=March 12, 2024 |archive-url=https://web.archive.org/web/20240312155200/https://www.shacknews.com/article/139079/pizza-tower-noise-update-playable-boss\
        \ |url-status=live |access-date=March 12, 2024}}</ref> The Noise controls\
        \ similarly to Peppino,<ref name=\"PCGamer: Noise\" /> but has a slightly\
        \ different moveset revolving around his skateboard and jet pack.<ref>{{cite\
        \ web |last1=Denzer |first1=TJ |title=Pizza Tower will make one of its bosses\
        \ playable in free update |url=https://www.shacknews.com/article/138471/pizza-tower-free-update-the-noise\
        \ |website=Shacknews |access-date=March 18, 2024 |date=January 26, 2024 |archive-date=March\
        \ 29, 2024 |archive-url=https://web.archive.org/web/20240329132622/https://www.shacknews.com/article/138471/pizza-tower-free-update-the-noise\
        \ |url-status=live}}</ref> Playing as <!-- [[WP:THE]], do not capitalize the\
        \ \"the\"-->the<!-- [[WP:THE]], do not capitalize the \"the\"--> Noise also\
        \ alters the [[user interface]] elements and music.<ref name=\"PCGamer: Noise\"\
        \ />\n\nAfter completing the game as the Noise, the player can uncover an\
        \ [[Easter egg (media)|Easter egg]] that unlocks Swap Mode,<ref name=\":0\"\
        >{{Cite web |date=March 18, 2024 |title=How to Unlock Swap Mode in Pizza Tower\
        \ |url=https://www.gamepressure.com/newsroom/how-to-unlock-swap-mode-in-pizza-tower/z06ade\
        \ |access-date=February 27, 2025 |website=Gamepressure.com |language=en}}</ref>\
        \ a [[multiplayer]] mode that allows two players to compete for the most points\
        \ as Peppino and the Noise.<ref name=\":0\" /> The first player starts with\
        \ full control while the second player follows.<ref name=\":0\" /> To switch\
        \ control between players, the first player must get hit, get grabbed by the\
        \ second player, or willingly allow the second player to take control.<ref\
        \ name=\":0\" />\n\n==Development==\n===Conception===\n''Pizza Tower'' was\
        \ the debut project of the indie developer Tour De Pizza, which developed\
        \ it for around five years.<ref name=\"GRadar: Steam\">{{Cite web |last=Gerblick\
        \ |first=Jordan |date=January 27, 2023 |title=2023's third highest-rated Steam\
        \ game is a ''Wario Land''-inspired pizza platformer |url=https://www.gamesradar.com/2023s-third-highest-rated-steam-game-is-a-wario-land-inspired-pizza-platformer/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230129211128/https://www.gamesradar.com/2023s-third-highest-rated-steam-game-is-a-wario-land-inspired-pizza-platformer/\
        \ |archive-date=January 29, 2023 |access-date=January 30, 2023 |website=[[GamesRadar+]]}}</ref>\
        \ Development was led by the pseudonymous designer and artist McPig,<ref name=\"\
        PCGamer: DeCastel\" /> also known as Pizza Tower Guy,<ref name=\"GReinvented:\
        \ Interview\" /> and funded through [[Patreon]].<ref name=\"GameDevInter\"\
        \ /> The concept originated from the Peppino character, who McPig created\
        \ for comics and drawings in which he imagined pizza monsters appearing in\
        \ his restaurant at night. McPig conceived a role-playing video game (RPG)\
        \ with survival horror elements similar to ''[[Resident Evil]]'' in which\
        \ Peppino traversed his restaurant while battling pizza monsters. It featured\
        \ a cartoonish but dark style that McPig compared to ''[[Courage the Cowardly\
        \ Dog]]''.<ref name=\"GReinvented: Interview\" />\n\nMcPig attempted to develop\
        \ the game using [[RPG Maker]], but the [[game engine]]'s limitations prevented\
        \ him from achieving the animation quality he desired.<ref name=\"GReinvented:\
        \ Interview\">{{Cite web |author=CM30 |date=February 1, 2019 |title=An Interview\
        \ With: The Developer of ''Wario Land'' Successor ''Pizza Tower'' |url=https://gamingreinvented.com/interview/an-interview-with-the-developer-of-wario-land-successor-pizza-tower/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230324154642/https://gamingreinvented.com/interview/an-interview-with-the-developer-of-wario-land-successor-pizza-tower/\
        \ |archive-date=March 24, 2023 |access-date=March 24, 2023 |website=Gaming\
        \ Reinvented}}</ref> McPig switched to GameMaker since it was accessible and\
        \ he had seen other developers use it for smaller projects. He began developing\
        \ ''Weenie Cop'', a platform game featuring a sentient [[hot dog]] who battled\
        \ [[junk food]] criminals. Though he described this project as \"all over\
        \ the place in the gameplay department because it wasn't very well conceptualized\"\
        , it got him accustomed to GameMaker.<ref name=\"GReinvented: Interview\"\
        \ /> He also conceived a game in which Peppino attacked using a [[pizza cutter]]\
        \ chainsaw, inspired by [[Wario]]'s dash from the ''Wario Land'' series.<ref\
        \ name=\"GReinvented: Interview\" />\n\nWanting to work from a point of reference,\
        \ McPig switched to a ''Wario Land''-inspired platformer. The series had been\
        \ dormant since ''[[Wario Land: Shake It!]]'' (2008) and McPig felt it needed\
        \ a spiritual successor in the vein of games like ''[[A Hat in Time]]'' (2017),\
        \ ''[[Bloodstained: Ritual of the Night]]'' (2019), and ''[[Wargroove]]''\
        \ (2019) to show its publisher, [[Nintendo]], that fans were still interested.<ref\
        \ name=\"GReinvented: Interview\" /> He decided to use Peppino as the protagonist—thinking\
        \ he \"was just fun to draw and relatable enough in his character traits\"\
        —and retained the basic concept of \"a scared crazy pizza man fighting pizza\
        \ monsters\" from the RPG.<ref name=\"GReinvented: Interview\" /> The title,\
        \ ''Pizza Tower'', came from the [[Leaning Tower of Pisa]], as the \"[[Pisa]]\"\
        \ reminded McPig of \"pizza\".<ref name=\"GReinvented: Interview\" /> Development\
        \ began around 2018, and the pseudonymous Sertif joined as the programmer\
        \ in early 2020.<ref name=\"GameDevInter\">{{Cite web |last=Couture |first=Joel\
        \ |date=April 20, 2023 |title=How speedy implementation fed the fast-paced\
        \ platforming of ''Pizza Tower'' |url=https://www.gamedeveloper.com/design/how-speedy-implementation-high-paced-platformer-pizza-tower#close-modal\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230424211228/https://www.gamedeveloper.com/design/how-speedy-implementation-high-paced-platformer-pizza-tower#close-modal\
        \ |archive-date=April 24, 2023 |access-date=April 24, 2023 |website=[[Game\
        \ Developer (website)|Game Developer]]}}</ref>\n\n===Design===\nMcPig initially\
        \ designed ''Pizza Tower'' as a maze-like, puzzle-oriented platform game similar\
        \ to ''Wario Land''.<ref name=\"GameDevInter\" /> To prepare, he played every\
        \ ''Wario Land'' game and dropped Peppino's chainsaw to make the gameplay\
        \ more similar. The [[Game Boy Advance]] entry ''[[Wario Land 4]]'' (2001)\
        \ was the biggest inspiration, with McPig likening ''Pizza Tower''{{'s}} [[level\
        \ design]] to ''Wario Land 4''{{'s}} with a greater emphasis on dashing. He\
        \ modeled the level progression on ''Wario Land 4''{{'s}} \"frog switch\"\
        \ [[game mechanic]] and use of power-up-based puzzles.<ref name=\"GReinvented:\
        \ Interview\" /> Power-ups were originally designed in the style of ''Wario\
        \ Land'', opening new areas while slowing the player down. In 2021, the game\
        \ underwent a change in direction and became more speed-oriented. The levels\
        \ were streamlined and McPig and Sertif changed how they handled power-ups\
        \ so they would fit the speed without feeling like a burden.<ref name=\"GameDevInter\"\
        \ />\n\n[[File:Peppino Spaghetti McPig concept art.jpg|thumb|right|Concept\
        \ art by McPig for the [[player character]], Peppino Spaghetti]]\nPeppino's\
        \ basic moveset was based on Wario's from ''Wario Land 4''. It evolved as\
        \ McPig and Sertif observed how players played a 2019 demo that experimented\
        \ \"with a more free-form moveset\" and decided to emphasize speed and score-attack\
        \ elements.<ref name=\"GameDevInter\" /> They linked Peppino's different abilities,\
        \ which Sertif described as \"an absolute nightmare when doing level design\"\
        \ since it complicated the [[game balance]].<ref name=\"GameDevInter\" />\
        \ McPig and Sertif experimented with limitations, but found them unfun and\
        \ chose to go with the freer moveset. Early versions included a traditional\
        \ health system, but McPig and Sertif removed it to make the gameplay more\
        \ accessible; the ranking system was included to reward skilled players.<ref\
        \ name=\"GameDevInter\" />\n\nMcPig and Sertif introduced the secondary playable\
        \ character, Gustavo, to streamline a [[pizza delivery]]-based level as they\
        \ reduced the maze-like design.<ref name=\"GameDevInter\" /> They also experimented\
        \ with playable versions of the Vigilante and Noise, though neither was playable\
        \ at launch. Whereas Gustavo was a distinct character with dedicated segments,\
        \ the Vigilante and Noise were playable in Peppino's levels and thus closer\
        \ to him in feel. ''[[PC Gamer]]'' theorized that the number of power-ups\
        \ changing Peppino's moveset made the addition of multiple characters with\
        \ unique [[Sprite (computer graphics)|sprites]] unfeasible.<ref name=\"PCGamer:\
        \ Noise\" /> When Gustavo was first designed, he had nothing to do with the\
        \ character, Brick, Gustavo was given an ally, Brick to make the gameplay\
        \ more interesting.<ref name=\":2\">{{Cite book |author=McPig |title=Pizza\
        \ Tower concept art booklet |date=October 10, 2025 |publisher=[[Fangamer]]\
        \ | edition= |location= | language=en}}</ref> During the development of <!--\
        \ [[WP:THE]], do not capitalize the \"the\"--> the <!-- [[WP:THE]], do not\
        \ capitalize the \"the\"--> Noise campaign, McPig had the idea for the character,\
        \ Mr Stick to replace Brick in the Gustavo segments.<ref name=\":2\" /> However,\
        \ due to Peppino, Gustavo and Mr Stick being \"censored\" in Noise's campaign,\
        \ McPig felt the idea wasn't worthwhile.<ref name=\":2\" /> In phase three\
        \ of the final boss, Pizzahead was originally meant to get enraged at Peppino,\
        \ but as time passed, McPig felt it was out of character for Pizzahead to\
        \ get angry and didn't want the power dynamic to shift, as he felt that Peppino\
        \ was the only one supposed to be angry.<ref name=\":2\" />\n\nEach level\
        \ began as a basic theme, such as a city or space. McPig and Sertif conceived\
        \ around 28 levels; they cut and combined themes to make development feasible.\
        \ They wanted each level to feel distinct and accessible to both skilled and\
        \ unskilled players. Sertif said that after conceiving a game mechanic, generally,\
        \ he would begin prototyping while McPig created animations in [[Aseprite]].\
        \ Sertif described this process as challenging since it meant many ideas ended\
        \ up scrapped, but felt it was for the best since they both worked quickly:\
        \ \"we implemented a lot of things we wouldn't have otherwise, scrapping the\
        \ bad ideas, leaving only the decent or good ones.\"<ref name=\"GameDevInter\"\
        \ /> Sertif estimated that every level was redesigned two or three times between\
        \ 2020 and 2023.<ref name=\"GameDevInter\" /> Members of McPig's [[Discord]]\
        \ server provided feedback throughout the development.<ref name=\"GReinvented:\
        \ Interview\" /><ref name=\"GameDevInter\" />\n\n''[[SpongeBob SquarePants]]''\
        \ and the [[French comics]] McPig had grown up reading inspired ''Pizza Tower''{{'s}}\
        \ [[pixel art]] style.<ref name=\"GReinvented: Interview\" /> McPig chose\
        \ a cartoon style because it was the only one he felt confident using. Additionally,\
        \ he felt low-resolution pixel art evocative of the [[Nintendo Entertainment\
        \ System]] (NES) and [[Super NES]] era was too common in the indie game scene,\
        \ and that ''Pizza Tower''{{'s}} style and higher resolution art would make\
        \ it stand out.<ref name=\"GReinvented: Interview\" /> Sertif described Peppino\
        \ as \"an absolute mess, and we (or rather McPig) wanted to convey that in\
        \ every animation.\"<ref name=\"GameDevInter\" /> McPig colored Peppino like\
        \ Wario's sprite from ''[[Wario Land 3]]'' (2000) and his pants black to make\
        \ animating them easier.<ref name=\"GReinvented: Interview\" /> He based <!--\
        \ [[WP:THE]], do not capitalize the \"the\"-->the<!-- [[WP:THE]], do not capitalize\
        \ the \"the\"--> Noise on [[the Noid]], an advertising mascot used by the\
        \ pizza chain [[Domino's]], feeling he would be a suitable villain for a pizza-based\
        \ game. McPig did not put much thought into the character and enemy designs,\
        \ preferring to \"make it up as [he went] along\".<ref name=\"GReinvented:\
        \ Interview\" />\n\n===Music===\n{{Listen\n| filename = Pizza_Tower_It's_Pizza_Time.mp3\n\
        | title = \"It's Pizza Time!\"\n| description = A 23-second excerpt from \"\
        It's Pizza Time!\", the escape theme. It was the first track de Castel wrote\
        \ for ''Pizza Tower'' and the initial [[Demo (music)|demo]] convinced McPig\
        \ to recruit him as composer. It is also the very first song made for the\
        \ game.}}\n\nThe soundtrack was composed by Ronan \"Mr. Sauceman\" de Castel\
        \ and the pseudonymous ClascyJitto.<ref name=\"PCGamer: DeCastel\">{{Cite\
        \ web |last=Litchfield |first=Ted |date=March 3, 2023 |title=Despite music\
        \ being just 'a hobby' this composer co-created one of the year's best soundtracks\
        \ |url=https://www.pcgamer.com/despite-music-being-just-a-hobby-this-composer-co-created-one-of-the-years-best-soundtracks/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230314212334/https://www.pcgamer.com/despite-music-being-just-a-hobby-this-composer-co-created-one-of-the-years-best-soundtracks/\
        \ |archive-date=March 14, 2023 |access-date=March 25, 2023 |website=[[PC Gamer]]}}</ref>\
        \ It was de Castel's first published work; composition was mostly a hobby\
        \ for him and he never released any of his music out of insecurity. He learned\
        \ about ''Pizza Tower'' around the time he was beginning to take composing\
        \ seriously and was mesmerized by the gameplay videos he saw on [[Twitter]].<ref\
        \ name=\"PCGamer: DeCastel\" /> He wrote a [[Demo (music)|demo]] track and\
        \ emailed it to McPig. To de Castel's surprise, McPig loved the track and\
        \ asked him to join the project.<ref name=\"PCGamer: DeCastel\" /> The track,\
        \ which McPig felt \"sounded perfectly insane and dynamic\",<ref name=\"GReinvented:\
        \ Interview\" /> became \"It's Pizza Time!\", the escape theme.<ref name=\"\
        PCGamer: DeCastel\" /> McPig recruited ClascyJitto, a high school student\
        \ who published music on [[SoundCloud]] and [[Bandcamp]] in their spare time,\
        \ after they shared remixes of de Castel's work in the Discord server.<ref\
        \ name=\"PCGamer: ClascyJitto\">{{Cite web |last=Litchfield |first=Ted |date=May\
        \ 20, 2023 |title=2023's best gaming soundtrack was co-created by a high school\
        \ student and a first-time composer |url=https://www.pcgamer.com/2023s-best-gaming-soundtrack-was-co-created-by-a-high-school-student-and-a-first-time-composer/\
        \ |access-date=May 20, 2023 |website=[[PC Gamer]] |archive-date=June 3, 2023\
        \ |archive-url=https://web.archive.org/web/20230603184155/https://www.pcgamer.com/2023s-best-gaming-soundtrack-was-co-created-by-a-high-school-student-and-a-first-time-composer/\
        \ |url-status=live}}</ref>\n\nDe Castel and ClascyJitto, who worked in France\
        \ and the United States, respectively, each composed about half the soundtrack,<ref\
        \ name=\"PCGamer: ClascyJitto\" /> while the pseudonymous Post Elvis composed\
        \ the title screen theme.<ref name=\"PCGamer: DeCastel\" /> De Castel's video\
        \ game inspirations included ''[[Sonic CD]]'' (1993) and the ''Wario Land''\
        \ series, specifically ''Wario Land 4''. He also looked to the [[electronic\
        \ music|electronic]], [[funk]], and [[House music|house]] music of artists\
        \ such as [[Chick Corea]], [[Daft Punk]], [[Mr. Oizo]], and [[Justice (band)|Justice]].<ref\
        \ name=\"PCGamer: DeCastel\" /> ClascyJitto, whose prior work relied heavily\
        \ on [[Sampling (music)|sampling]] and remixes, described working on ''Pizza\
        \ Tower'' as \"sort of like a fun little game for [them]\", since it required\
        \ them to put more time into each composition.<ref name=\"PCGamer: ClascyJitto\"\
        \ />\n\n==Release==\nMcPig started promoting ''Pizza Tower'' in 2018 by sharing\
        \ screenshots on [[Tumblr]], before moving to Twitter to raise its profile.\
        \ He also started the Discord server to get feedback.<ref name=\"GameDevInter\"\
        \ /> McPig released two [[game demo]]s in 2018, and opened a Patreon where\
        \ he offered [[early access]] builds for those who pledged $5 monthly.<ref\
        \ name=\"GameDevInter\" /> After Sertif joined, McPig began streaming development\
        \ on [[Twitch (service)|Twitch]] and releasing builds yearly rather than monthly.<ref\
        \ name=\"GameDevInter\" />\n\n''Pizza Tower'' was released for [[Windows]]\
        \ via [[Steam (service)|Steam]] on January 26, 2023.<ref>{{Cite web |last=Norman\
        \ |first=Jim |date=January 27, 2023 |title=''Pizza Tower'' Is Giving Us Serious\
        \ Wario Land Vibes On PC And Now We Knead It On Switch |url=https://www.nintendolife.com/news/2023/01/pizza-tower-is-giving-us-serious-wario-land-vibes-on-pc-and-now-we-knead-it-on-switch\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230129072725/https://www.nintendolife.com/news/2023/01/pizza-tower-is-giving-us-serious-wario-land-vibes-on-pc-and-now-we-knead-it-on-switch\
        \ |archive-date=January 29, 2023 |access-date=March 25, 2023 |website=[[Nintendo\
        \ Life]]}}</ref> Tour De Pizza stated that post-release development was underway\
        \ in September.<ref>{{Cite tweet |number=1701120267169181753 |user=PizzaTowergame\
        \ |title=Working on ''Pizza Tower'' again, but also some other projects! (Not\
        \ to be released anytime soon) |author=Tour De Pizza |date=September 11, 2023\
        \ |access-date=November 1, 2023}}</ref> A [[Halloween]]-themed update, released\
        \ on October 23, added a secret level, collectible pumpkins, and [[Steam Community]]\
        \ features.<ref>{{Cite web |last=Tour De Pizza |date=October 23, 2023 |title=Happy\
        \ Halloween! + A Secret Level + Pumpkin Hunt + Steam Items + v1.0.594 |url=https://store.steampowered.com/news/app/2231450/view/3729602312222631144\
        \ |access-date=November 1, 2023 |website=[[Steam (service)|Steam]] |archive-date=November\
        \ 1, 2023 |archive-url=https://web.archive.org/web/20231101142441/https://store.steampowered.com/news/app/2231450/view/3729602312222631144\
        \ |url-status=live}}</ref> An update adding <!-- [[WP:THE]], do not capitalize\
        \ the \"the\"-->the<!-- [[WP:THE]], do not capitalize the \"the\"--> Noise\
        \ as a playable character was released on March 12, 2024.<ref name=\"PCGamer:\
        \ Noise\" />\n\n''Pizza Tower'' has developed a large fandom, which Sertif\
        \ attributed to the demos, Patreon builds, and [[Video game livestreaming|livestreamers]]\
        \ such as [[Vinesauce]] showcasing it.<ref name=\"GameDevInter\" /> Following\
        \ the release, Tour De Pizza collaborated with [[Fangamer]] to produce merchandise\
        \ including plushies, T-shirts, and pins,<ref>{{Cite web |last=Swalley |first=Kirstin\
        \ |date=January 27, 2023 |title=Fangamer Shares Brand New ''Pizza Tower''\
        \ Merchandise Following Indie Release |url=https://hardcoregamer.com/news/fangamer-shares-brand-new-pizza-tower-merchandise-following-indie-release/436610/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230324154541/https://hardcoregamer.com/news/fangamer-shares-brand-new-pizza-tower-merchandise-following-indie-release/436610/\
        \ |archive-date=March 24, 2023 |access-date=March 25, 2023 |website=Hardcore\
        \ Gamer}}</ref> and the Discord server's membership grew from 5,000 to 20,000\
        \ before McPig and Sertif discontinued it.<ref name=\"GameDevInter\" /> The\
        \ game's Steam player count spiked to over 9,000 playing at once following\
        \ the release of <!-- [[WP:THE]], do not capitalize the \"the\"-->the<!--\
        \ [[WP:THE]], do not capitalize the \"the\"--> Noise update.<ref>{{cite web\
        \ |last1=Williams |first1=Nelson |title=10/10 indie game hits new heights\
        \ on Steam after big free update |url=https://www.pcgamesn.com/pizza-tower/the-noise-update\
        \ |website=[[PCGamesN]] |access-date=March 18, 2024 |date=March 13, 2024 |archive-date=March\
        \ 18, 2024 |archive-url=https://web.archive.org/web/20240318112831/https://www.pcgamesn.com/pizza-tower/the-noise-update\
        \ |url-status=live}}</ref>\n\nIn 2019, McPig stated that while he was open\
        \ to [[porting]] ''Pizza Tower'' to other platforms, he would not consider\
        \ it until finishing the Windows version.<ref name=\"GReinvented: Interview\"\
        \ /> A [[Nintendo Switch]] version was announced during a ''[[Nintendo Direct#Types\
        \ of Nintendo Direct presentations|Nintendo Indie World + Nintendo Direct\
        \ Partner Showcase]]'' presentation on August 27, 2024, and was released via\
        \ the [[Nintendo eShop]] later that day.<ref>{{cite web |last1=Norman |first1=Jim\
        \ |title=Pizza Tower Finally Dashes Onto Switch Today |url=https://www.nintendolife.com/news/2024/08/pizza-tower-finally-dashes-onto-switch-today\
        \ |website=[[Nintendo Life]] |access-date=August 28, 2024 |date=August 27,\
        \ 2024}}</ref> On the same day, Fangamer announced that they would publish\
        \ a physical edition sometime in 2025, alongside a [[collector's edition]]\
        \ containing a Peppino-themed [[egg timer]].<ref>{{cite web |date=August 27,\
        \ 2024 |title=Pizza Tower Collector's Edition |url=https://www.fangamer.com/pages/pizza-tower-physical-edition\
        \ |access-date=August 28, 2024 |publisher=[[Fangamer]]}}</ref>\n\nOn April\
        \ 17, 2024, Fangamer announced pre-orders for the standard physical edition\
        \ of the game containing a poster and two sticker sheets, with a set release\
        \ date of September 2025.<ref name=\":1\">{{Cite web |date=April 17, 2025\
        \ |title=Fangamer Delays Pre-Orders For Pizza Tower Collector's Edition |url=https://www.nintendolife.com/news/2025/04/fangamer-delays-pre-orders-for-pizza-tower-collectors-edition\
        \ |access-date=April 23, 2025 |website=Nintendo Life |language=en-GB}}</ref>\
        \ They also announced a collector's edition for the game which featured the\
        \ contents of the standard edition alongside a Peppino egg timer, art cards,\
        \ a custom pizza stained cloth and an art booklet containing concept art and\
        \ notes by McPig for ''Pizza Tower.''<ref name=\":1\" /> However, pre-orders\
        \ of the collector's edition were delayed indefinitely due to [[Donald Trump]]'s\
        \ [[Tariffs in the second Trump administration|second tariffs]]; Fangamer\
        \ planned pre-orders in May 2025 with hopes that the collector's edition will\
        \ release alongside the standard edition.<ref>{{Cite web |last=Yoerider |date=April\
        \ 17, 2025 |title=Fangamer Delays Pizza Tower Collector's Edition Pre-Orders\
        \ Due To Uncertainty Around Tariffs |url=https://nintendosoup.com/fangamer-delays-pizza-tower-collectors-edition-pre-orders-due-to-uncertainty-around-tariffs/\
        \ |access-date=April 23, 2025 |website=NintendoSoup |language=en-US}}</ref>\
        \ Pre-orders for the Collector's edition were made available in July 2025.<ref>{{Cite\
        \ web |date=April 16, 2025 |title=Fangamer delays pre-orders for Pizza Tower\
        \ Collector's Edition due to uncertainty surrounding Trump tariffs |url=https://nintendowire.com/news/2025/04/16/fangamer-delays-pre-orders-for-pizza-tower-collectors-edition-due-to-uncertainty-surrounding-trump-tariffs/\
        \ |access-date=October 13, 2025 |website=Nintendo Wire}}</ref> The standard\
        \ and collector's edition of the game released on October 10, 2025.<ref group=\"\
        ‡\">{{Cite web |url=https://x.com/Fangamer/status/1976694465063780513|title=It's\
        \ finally Pizza Time! Our Pizza Tower physical editions are out of preorder\
        \ and available now. Pick the standard edition up in store or online, or buy\
        \ the collector's edition—with a Peppino timer, a concept art booklet, art\
        \ cards, and more—right here: https://fanga.me/r/pizza-tower-ce-street-date\
        \ (@Fangamer) / X |website=[[X (Twitter)]] |access-date=October 13, 2025}}</ref>\n\
        \n==Reception==\n{{Video game reviews\n| MC = 89/100{{efn|Score based on eight\
        \ reviews<ref name=\"MC\" />}}<ref name=\"MC\" />\n| OC = 100%{{efn|Rating\
        \ based on eight reviews}}<ref name=\"OC\">{{cite web |title=Pizza Tower reviews\
        \ |url=https://opencritic.com/game/14233/pizza-tower |publisher=[[OpenCritic]]\
        \ |access-date=August 31, 2024}}</ref>\n| IGN = 9/10<ref name=\"IGNReview\"\
        >{{Cite web |last=Saltzman |first=Mitchell |date=March 16, 2023 |title=''Pizza\
        \ Tower'' Review |url=https://www.ign.com/articles/pizza-tower-review |url-status=live\
        \ |archive-url=https://web.archive.org/web/20230325073843/https://www.ign.com/articles/pizza-tower-review\
        \ |archive-date=March 25, 2023 |access-date=March 25, 2023 |website=[[IGN]]}}</ref>\n\
        | MS = 9/10<ref name=\"MSReview\">{{Cite web |last=de Garayo |first=José Luis\
        \ Lópes |date=March 28, 2023 |title=''Pizza Tower'', análisis: la nueva revolución\
        \ indie |trans-title=''Pizza Tower'', analysis: the new indie revolution |url=https://as.com/meristation/analisis/pizza-tower-analisis-la-nueva-revolucion-indie-n/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230426154017/https://as.com/meristation/analisis/pizza-tower-analisis-la-nueva-revolucion-indie-n/\
        \ |archive-date=April 26, 2023 |access-date=April 26, 2023 |website=[[MeriStation]]\
        \ |language=Spanish}}</ref>\n| NLife = 9/10<ref name=\"NLife: Review\">{{cite\
        \ web |last1=Vogel |first1=Mitch |title=''Pizza Tower'' Review (Switch eShop)\
        \ |url=https://www.nintendolife.com/reviews/switch-eshop/pizza-tower |website=[[Nintendo\
        \ Life]] |access-date=September 6, 2024 |date=September 4, 2024}}</ref>\n\
        | PCGUS = 90/100<ref name=\"PCGamerReview\">{{Cite web |last=McCrae |first=Scott\
        \ |date=January 26, 2023 |title=''Pizza Tower'' review: Madcap platforming\
        \ at 100mph |url=https://www.pcgamer.com/pizza-tower-review-madcap-platforming-at-100mph/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230129072724/https://www.pcgamer.com/pizza-tower-review-madcap-platforming-at-100mph/\
        \ |archive-date=January 29, 2023 |access-date=March 25, 2023 |website=[[PC\
        \ Gamer]]}}</ref>\n| rev1 = ''Multiplayer.it''\n| rev1Score = 8/10<ref name=\"\
        MultiItReview\">{{Cite web |last=Gerli |first=Damiano |date=February 5, 2023\
        \ |title=''Pizza Tower'', la recensione di un capriccioso ritorno del platform\
        \ 2D |trans-title=''Pizza Tower'', the review of a capricious return of 2D\
        \ platforming |url=https://multiplayer.it/recensioni/pizza-tower-recensione.html\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230307011821/https://multiplayer.it/recensioni/pizza-tower-recensione.html\
        \ |archive-date=March 7, 2023 |access-date=March 25, 2023 |website=Multiplayer.it\
        \ |language=Italian}}</ref>\n| Poly = Recommended<ref name=\"PolyReview\"\
        \ />\n}}\n\n''Pizza Tower'' received \"generally favorable reviews\" according\
        \ to the [[review aggregate]] website [[Metacritic]],<ref name=\"MC\">{{Cite\
        \ web |title=''Pizza Tower'' for PC Reviews |url=https://www.metacritic.com/game/pizza-tower/critic-reviews/?platform=pc\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230317080444/https://www.metacritic.com/game/pc/pizza-tower\
        \ |archive-date=March 17, 2023 |access-date=November 1, 2023 |website=[[Metacritic]]}}</ref>\
        \ and a \"Mighty\" approval rating on the aggregator [[OpenCritic]].<ref name=\"\
        OC\" /> It became one of the highest rated games of 2023 on Steam within a\
        \ day of its release;<ref name=\"GRadar: Steam\" /> as of August 2024, it\
        \ is the highest rated 2D platformer on Steam, ahead of games such as ''[[Super\
        \ Meat Boy]]'' (2010), ''[[Celeste (video game)|Celeste]]'' (2018), and ''[[Katana\
        \ Zero]]'' (2019).<ref>{{cite web |last1=Bailey |first1=Dustin |title=Pizza\
        \ Tower hits Switch today, and after 19 months of begging, fans of the Wario\
        \ Land throwback couldn't be happier: 'My Switch has a purpose now' |url=https://www.gamesradar.com/games/platformer/pizza-tower-hits-switch-today-and-after-19-months-of-begging-fans-of-the-wario-land-throwback-couldnt-be-happier-my-switch-has-a-purpose-now/\
        \ |website=[[GamesRadar+]] |access-date=January 10, 2025 |date=August 27,\
        \ 2024}}</ref> Critics were surprised by ''Pizza Tower''{{'s}} quality and\
        \ considered it a worthy substitute for ''Wario Land'',{{efn|Attributed to\
        \ multiple references: ''[[PC Gamer]]'',<ref name=\"PCGamerReview\" /> ''[[IGN]]'',<ref\
        \ name=\"IGNReview\" /> ''Multiplayer.it'',<ref name=\"MultiItReview\" />\
        \ ''[[Den of Geek]]'',<ref name=\"DenOfGeek\">{{Cite web |last=Byrd |first=Matthew\
        \ |date=February 2, 2023 |title=''Pizza Tower'' Is the Best New ''Wario Land''\
        \ Game We'll Probably Ever Get |url=https://www.denofgeek.com/games/pizza-tower-wario-land-review/\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230204074344/https://www.denofgeek.com/games/pizza-tower-wario-land-review/\
        \ |archive-date=February 4, 2023 |access-date=March 28, 2023 |website=[[Den\
        \ of Geek]]}}</ref> and ''[[Polygon (website)|Polygon]]''<ref name=\"PolyReview\"\
        >{{Cite web |last=Gill |first=Patrick |date=February 9, 2023 |title=''Pizza\
        \ Tower'' is paradise for Wario freaks |url=https://www.polygon.com/reviews/23590917/pizza-tower-review-wario-land-best-platformers-wahaha\
        \ |url-status=live |archive-url=https://web.archive.org/web/20230323230141/https://www.polygon.com/reviews/23590917/pizza-tower-review-wario-land-best-platformers-wahaha\
        \ |archive-date=March 23, 2023 |access-date=March 25, 2023 |website=[[Polygon\
        \ (website)|Polygon]]}}</ref>}} some calling it a rare spiritual successor\
        \ that is better than its inspiration.{{efn|Attributed to multiple references:\
        \ ''IGN'',<ref name=\"IGNReview\" /> ''[[Nintendo Life]]'',<ref name=\"NLife:\
        \ Review\" /> ''PC Gamer'',<ref name=\"PCGamerReview\" /> and ''Polygon''<ref\
        \ name=\"PolyReview\" />}} ''[[Polygon (website)|Polygon]]'' said ''Pizza\
        \ Tower'' \"has sharpened, tuned, evolved, and damn near ''perfected'' [''Wario\
        \ Land''{{'s}}] odd niche of platforming\",<ref name=\"PolyReview\" /> and\
        \ ''[[PC Gamer]]'' found it difficult to expect a potential ''Wario Land''\
        \ revival to be as invigorating and inventive.<ref name=\"PCGamerReview\"\
        \ /> ''[[MeriStation]]'' said ''Pizza Tower'' was \"an instant classic\" and\
        \ a breath of fresh air in the side-scrolling indie scene, which they felt\
        \ was lacking creativity.<ref name=\"MSReview\" />\n\nReviewers favorably\
        \ compared the visuals to 1990s [[Nicktoons]] like ''[[The Ren & Stimpy Show]]'',\
        \ [[Cartoon Network]] shows, and [[Microsoft Paint]] art.{{efn|Attributed\
        \ to multiple references: ''[[PC Gamer]]'',<ref name=\"PCGamerReview\" />\
        \ ''[[IGN]]'',<ref name=\"IGNReview\" /> ''Multiplayer.it'',<ref name=\"MultiItReview\"\
        \ /> ''[[Rock Paper Shotgun]]'',<ref name=\"RPSReview\" /> and ''[[Polygon\
        \ (website)|Polygon]]''<ref name=\"PolyReview\" />|name=Visuals/MusicRef}}\
        \ ''[[IGN]]'' said the intentionally cheap-looking art style lent ''Pizza\
        \ Tower'' a striking, idiosyncratic appearance,<ref name=\"IGNReview\" />\
        \ and ''Multiplayer.it'' said the levels were so detailed that players would\
        \ continue to find new animations for hours.<ref name=\"MultiItReview\" />\
        \ The animation quality was also commended,{{efn|Attributed to multiple references:\
        \ ''[[PC Gamer]]'',<ref name=\"PCGamerReview\" /> ''[[IGN]]'',<ref name=\"\
        IGNReview\" /> ''Multiplayer.it'',<ref name=\"MultiItReview\" /> and ''[[Polygon\
        \ (website)|Polygon]]''<ref name=\"PolyReview\" />|name=AnimationQuality/WarioFormula}}\
        \ as was the humor.{{efn|Attributed to multiple references: ''[[Den of Geek]]'',<ref\
        \ name=\"DenOfGeek\" /> ''[[IGN]]'',<ref name=\"IGNReview\" /> ''Multiplayer.it'',<ref\
        \ name=\"MultiItReview\" /> and ''[[Rock Paper Shotgun]]''<ref name=\"RPSReview\"\
        \ />}} ''IGN'' enjoyed ''Pizza Tower''{{'s}} use of the cartoon trope in which\
        \ characters are depicted in a different style for comedic effect,<ref name=\"\
        IGNReview\" /> and alongside ''PC Gamer'' and ''[[Rock Paper Shotgun]]'',\
        \ praised the expressiveness of Peppino.<ref name=\"PCGamerReview\" /><ref\
        \ name=\"IGNReview\" /><ref name=\"RPSReview\">{{Cite web |last=Richardson\
        \ |first=Liam |date=January 27, 2023 |title=''Pizza Tower'' is a bizarre homage\
        \ to Wario Land that really makes me laugh |url=https://www.rockpapershotgun.com/pizza-tower-is-a-bizarre-homage-to-wario-land-that-really-makes-me-laugh\
        \ |url-access=subscription |url-status=live |archive-url=https://web.archive.org/web/20230129072726/https://www.rockpapershotgun.com/pizza-tower-is-a-bizarre-homage-to-wario-land-that-really-makes-me-laugh\
        \ |archive-date=January 29, 2023 |access-date=March 25, 2023 |website=[[Rock\
        \ Paper Shotgun]]}}</ref> ''PC Gamer'' said Peppino's animations made him\
        \ feel like a fleshed-out character despite never speaking.<ref name=\"PCGamerReview\"\
        \ />\n\nThe soundtrack was acclaimed for its intensity.{{efn|name=Visuals/MusicRef}}\
        \ ''MeriStation'' said it complimented the visuals,<ref name=\"MSReview\"\
        \ /> ''Multiplayer.it'' wrote it combined funk with [[Heavy metal music|metal]]\
        \ while remaining true to the style of 1990s platform games,<ref name=\"MultiItReview\"\
        \ /> and ''PC Gamer'' likened its \"clever\" blend of a retro style and [[Sampling\
        \ (music)|samples]] to ''[[Jet Set Radio]]'' (2000).<ref name=\"PCGamerReview\"\
        \ /> ''IGN'' said the soundtrack did an excellent job conveying the distinct\
        \ atmosphere of each level.<ref name=\"IGNReview\" /> ''IGN'' and ''PC Gamer''\
        \ considered \"It's Pizza Time!\" a particular highlight.<ref name=\"PCGamerReview\"\
        \ /><ref name=\"IGNReview\" /> Beyond the soundtrack, ''Multiplayer.it'' praised\
        \ the [[sound design]], describing the sound effects as instantly iconic.<ref\
        \ name=\"MultiItReview\" />\n\nCritics commended ''Pizza Tower''{{'s}} gameplay.\
        \ They enjoyed each level's distinct theme and mechanics as well as the secrets\
        \ scattered throughout,{{efn|Attributed to multiple references: ''[[PC Gamer]]'',<ref\
        \ name=\"PCGamerReview\" /> ''[[IGN]]'',<ref name=\"IGNReview\" /> ''[[Polygon\
        \ (website)|Polygon]]'',<ref name=\"PolyReview\" /> and ''[[MeriStation]]''<ref\
        \ name=\"MSReview\" />}} and compared the sense of speed to the ''[[Sonic\
        \ the Hedgehog]]'' series.<ref name=\"PCGamerReview\" /><ref name=\"IGNReview\"\
        \ /><ref name=\"MultiItReview\" /> Reviewers felt it improved and expanded\
        \ on the ''Wario Land'' formula,{{efn|name=AnimationQuality/WarioFormula}}\
        \ with ''[[Den of Geek]]'' calling it \"faster, crazier, [and] sillier\".<ref\
        \ name=\"DenOfGeek\" /> ''Polygon'' and ''IGN'' highlighted the escape sequences,<ref\
        \ name=\"IGNReview\" /><ref name=\"PolyReview\" /> ''Multiplayer.it'' said\
        \ the power-ups surpassed ''Wario Land''{{'s}} in terms of surrealness and\
        \ fun,<ref name=\"MultiItReview\" /> and ''PC Gamer'' said the final boss's\
        \ spectacle rivaled that of the ''[[Bayonetta]]'' series.<ref name=\"PCGamerReview\"\
        \ /> ''IGN'' said that while ''Pizza Tower'' would only take five to six hours\
        \ to finish, the secrets and ranking system provided substantial [[replay\
        \ value]],<ref name=\"IGNReview\" /> and ''MeriStation'' said replaying levels\
        \ to obtain P ranks was where the gameplay was at its best.<ref name=\"MSReview\"\
        \ /> ''Polygon'' thought allowing the player to choose what they liked to\
        \ achieve instead of featuring traditional difficulty levels was an \"elegant-ass\
        \ approach to game difficulty\".<ref name=\"PolyReview\" /> ''[[Nintendo Life]]''{{'s}}\
        \ only complaint was that the bosses were somewhat frustrating due to a reliance\
        \ on randomness.<ref name=\"NLife: Review\" />\n\n''IGN'',<ref name=\"IGNReview\"\
        \ /> ''MeriStation'',<ref name=\"MSReview\" /> ''PC Gamer'',<ref name=\"PCGamerReview\"\
        \ /> and ''Polygon'' found controlling Peppino satisfying,<ref name=\"PolyReview\"\
        \ /> ''PC Gamer'' likening his moveset to a [[Swiss Army knife]] for its versatility.<ref\
        \ name=\"PCGamerReview\" /> ''Polygon'' described Peppino's abilities as limited\
        \ but intuitive and excellently complementing the level design.<ref name=\"\
        PolyReview\" /> Conversely, ''Multiplayer.it'' and ''Rock Paper Shotgun''\
        \ felt it was challenging to become accustomed to controlling Peppino since\
        \ he requires considerable precision,<ref name=\"MultiItReview\" /><ref name=\"\
        RPSReview\" /> which ''Rock Paper Shotgun'' said was ''Pizza Tower''{{'s}}\
        \ biggest flaw. While its levels were still designed in ''Wario Land''{{'s}}\
        \ slow and methodical fashion, ''Rock Paper Shotgun'' wrote, ''Pizza Tower''\
        \ expects the player to move fast, leading to the repeated frustration of\
        \ losing momentum. They said this meant the game would not be for everyone,\
        \ though some would consider the \"rough edges... an essential part of the\
        \ appeal\".<ref name=\"RPSReview\" />\n\n=== Awards ===\n{| class=\"wikitable\
        \ plainrowheaders sortable\" width=\"auto\"\n|+ Awards and nominations\n!\
        \ scope=\"col\"| Year\n! scope=\"col\"| Ceremony\n! scope=\"col\"| Category\n\
        ! scope=\"col\"| Result\n! scope=\"col\" class=\"unsortable\"| {{Abbr|Ref.|References}}\n\
