        Extract: The national language of Andorra is Catalan, a Romance language in the Western Romance group, spoken by over 9 million people in nearby regions of Spain and France. While Catalan is the only official language, Spanish is particularly widespread, and French and Portuguese are also commonly spoken due to immigration and geographic proximity. Most residents of Andorra are multilingual, typically speaking Catalan and their native language, as a significant portion of the population was born outside the country.

