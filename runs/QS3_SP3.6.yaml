        \ inhabited territories each have limited autonomy and territorial legislatures\
        \ and governors. Residents cannot vote in federal elections, although all\
        \ are represented by non-voting delegates in the House.\nThe largest state\
        \ by population is California, with a population of 39,538,223 people. The\
