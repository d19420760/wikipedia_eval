        \ Icelandic parliamentary election|2016 election]].<ref>{{cite news|author=Sylvía\
        \ Rut Sigfúsdóttir|title=Ekki færri konur á Alþingi síðan árið 2007|url=http://www.visir.is/g/2017171028687|publisher=Vísir|date=29\
        \ October 2017|accessdate=3 November 2017|archive-date=7 November 2017|archive-url=https://web.archive.org/web/20171107024800/http://www.visir.is/g/2017171028687|url-status=live}}</ref>\
        \ Of those elected to the Althing, 19 were new, but this was considerably\
        \ lower than in 2016 with 32.<ref>{{cite news|author=Bjarki Ármannsson|title=Nítján\
        \ nýir þingmenn taka sæti|url=http://www.visir.is/g/2017171028689|publisher=Vísir|date=29\
        \ October 2017|accessdate=3 November 2017|archive-date=7 November 2017|archive-url=https://web.archive.org/web/20171107004417/http://www.visir.is/g/2017171028689|url-status=live}}</ref>\n\
        \n=== Government formation ===\n{{main|2017 Icelandic parliamentary election#Government\
        \ formation}}\nOn 30 October 2017 [[President of Iceland|President]] [[Guðni\
        \ Th. Jóhannesson]] met with the leaders of the eight parliamentary parties.<ref>{{cite\
        \ news|author=Ásrún Brynja Ingvarsdóttir|title=Forsetinn boðar forystumenn\
        \ á sinn fund|url=http://www.ruv.is/frett/forsetinn-bodar-forystumenn-a-sinn-fund|publisher=RÚV|date=29\
        \ October 2017|accessdate=3 November 2017|archive-date=2 November 2017|archive-url=https://web.archive.org/web/20171102012109/http://ruv.is/frett/forsetinn-bodar-forystumenn-a-sinn-fund|url-status=live}}</ref>\
        \ The four former opposition parties held informal talks,<ref>{{cite news|title=\"\
        Afslappað og ágætt svona\"|url=http://www.mbl.is/frettir/kosning/2017/10/31/afslappad_og_agaett_svona/|newspaper=Morgunblaðið|date=31\
        \ October 2017|accessdate=3 November 2017|archive-date=3 November 2017|archive-url=https://web.archive.org/web/20171103153555/http://www.mbl.is/frettir/kosning/2017/10/31/afslappad_og_agaett_svona/|url-status=live}}</ref>\
        \ with the Progressive Party in pole position to determine whether the Independence\
        \ Party or the Left-Greens would lead the next government.<ref>{{cite news|author=Brynjólfur\
        \ Þór Guðmundsson|title=Framsókn í lykilaðstöðu|url=http://www.ruv.is/frett/framsokn-i-lykiladstodu|publisher=RÚV|date=30\
        \ October 2017|accessdate=3 November 2017|archive-date=2 November 2017|archive-url=https://web.archive.org/web/20171102174229/http://www.ruv.is/frett/framsokn-i-lykiladstodu|url-status=live}}</ref>\
        \ After meeting with Jóhannesson, Left-Green leader Katrín Jakobsdóttir declared\
        \ that she wanted to form a government with the four former opposition parties,<ref>{{cite\
        \ news|author=Hulda Hólmkelsdóttir|title=Katrín byrjuð að ræða ríkisstjórnarsamstarf\
        \ við hina stjórnarandstöðuflokkana|url=http://www.visir.is/g/2017171039938|publisher=Vísir|date=30\
        \ October 2017|accessdate=3 November 2017|archive-date=3 November 2017|archive-url=https://web.archive.org/web/20171103134352/http://www.visir.is/g/2017171039938|url-status=live}}</ref>\
        \ noting that though a coalition with additional parties would provide more\
        \ than 32 seats, it was out of consideration before a four-party coalition\
        \ was first attempted.<ref>{{cite news|author=Sólrún Lilja Ragnarsdóttir|title=Þarf\
        \ að ákveða að fara áfram eða hætta|url=http://www.mbl.is/frettir/kosning/2017/11/01/tharf_ad_akveda_ad_fara_afram_eda_haetta/|newspaper=Morgunblaðið|date=1\
        \ November 2017|accessdate=3 November 2017|archive-date=3 November 2017|archive-url=https://web.archive.org/web/20171103182846/http://www.mbl.is/frettir/kosning/2017/11/01/tharf_ad_akveda_ad_fara_afram_eda_haetta/|url-status=live}}</ref>\
        \ On 2 November, Guðni Th. Jóhannesson granted Katrín Jakobsdóttir, leader\
        \ of the Left-Green Movement, the mandate to form a coalition between her\
        \ party, the Progressives, Social Democratic Alliance, and Pirates,<ref>{{cite\
        \ news|title=Katrín komin með umboðið|url=http://www.mbl.is/frettir/kosning/2017/11/02/katrin_komin_med_umbodid/|newspaper=Morgunblaðið|date=2\
        \ November 2017|accessdate=2 November 2017|archive-date=4 November 2017|archive-url=https://web.archive.org/web/20171104231927/http://www.mbl.is/frettir/kosning/2017/11/02/katrin_komin_med_umbodid/|url-status=live}}</ref>\
        \ the four having agreed to begin formal coalition talks.<ref>{{cite news|author=Elín\
        \ Margrét Böðvarsdóttir|title=Katrín mætt á fund forseta|url=http://www.mbl.is/frettir/kosning/2017/11/02/katrin_maett_a_fund_forseta/|newspaper=Morgunblaðið|date=2\
        \ November 2017|accessdate=3 November 2017|archive-date=2 November 2017|archive-url=https://web.archive.org/web/20171102185922/http://www.mbl.is/frettir/kosning/2017/11/02/katrin_maett_a_fund_forseta/|url-status=live}}</ref>\n\
        \nOn 6 November, after the Progressives announced that they would not continue\
        \ talks over difficult issues with such a thin majority, Katrín Jakobsdóttir\
        \ announced that she would return her mandate.<ref>{{cite news|author=Sólrún\
        \ Lilja Ragnarsdóttir|title=Katrín skilar forsetanum umboðinu|url=http://www.mbl.is/frettir/kosning/2017/11/06/katrin_skilar_forsetanum_umbodinu/|newspaper=Morgunblaðið|date=6\
        \ November 2017|accessdate=6 November 2017|archive-date=6 November 2017|archive-url=https://web.archive.org/web/20171106192405/http://www.mbl.is/frettir/kosning/2017/11/06/katrin_skilar_forsetanum_umbodinu/|url-status=live}}</ref>\
        \ In the following days, the leaders of the Left-Greens, Independence Party,\
        \ and Progressive Party discussed the possibility of forming a coalition together,\
        \ with the Left-Greens insistent that Katrín become prime minister in that\
        \ case,<ref>{{cite news|author=Agnes Bragadóttir|title=Þrír að hefja viðræður|url=http://www.mbl.is/frettir/kosning/2017/11/09/thrir_ad_hefja_vidraedur/|newspaper=Morgunblaðið|date=9\
        \ November 2017|accessdate=10 November 2017|archive-date=10 November 2017|archive-url=https://web.archive.org/web/20171110114355/http://www.mbl.is/frettir/kosning/2017/11/09/thrir_ad_hefja_vidraedur/|url-status=live}}</ref>\
        \ an idea supported by the Progressives;<ref>{{cite news|author=Sólrún Lilja\
        \ Ragnarsdóttir|title=Þrír flokkar halda áfram óformlegum viðræðum|url=http://www.mbl.is/frettir/kosning/2017/11/10/oformlegum_vidraedum_haldid_afram/|newspaper=Morgunblaðið|date=10\
        \ November 2017|accessdate=10 November 2017|archive-date=10 November 2017|archive-url=https://web.archive.org/web/20171110140123/http://www.mbl.is/frettir/kosning/2017/11/10/oformlegum_vidraedum_haldid_afram/|url-status=live}}</ref>\
        \ in exchange, demissionary prime minister [[Bjarni Benediktsson (born 1970)|Bjarni\
        \ Benediktsson]] would be appointed [[Ministry of Finance (Iceland)|finance\
        \ minister]].<ref>{{cite news|author=Agnes Bragadóttir|title=Sætta sig við\
        \ Katrínu í forsæti|url=http://www.mbl.is/frettir/kosning/2017/11/11/saetta_sig_vid_katrinu_i_forsaeti/|newspaper=Morgunblaðið|date=11\
        \ November 2017|accessdate=11 November 2017|archive-date=11 November 2017|archive-url=https://web.archive.org/web/20171111093959/http://www.mbl.is/frettir/kosning/2017/11/11/saetta_sig_vid_katrinu_i_forsaeti/|url-status=live}}</ref>\
        \ Talks between the three parties were completed swiftly, and after meeting\
        \ with Katrín on 28 November, president Guðni formally granted her the mandate\
        \ to lead a government with the Independence Party and Progressive Party,\
        \ pending the support of each of the parties, with the new government seated\
        \ on 30 November.<ref>{{cite news|author=Jón Pétur Jónsson|title=Katrín fær\
        \ stjórnarmyndunarumboðið|url=http://www.mbl.is/frettir/kosning/2017/11/28/katrin_faer_stjornarmyndunarumbodid/|newspaper=Morgunblaðið|date=28\
        \ November 2017|accessdate=28 November 2017|archive-date=28 November 2017|archive-url=https://web.archive.org/web/20171128122613/http://www.mbl.is/frettir/kosning/2017/11/28/katrin_faer_stjornarmyndunarumbodid/|url-status=live}}</ref>\
        \ According to Article 22 of the [[Constitution of Iceland|constitution]],\
        \ the president must convene the newly elected Althing within 10 weeks of\
        \ the election.<ref>{{cite news|author=Sigtryggur Sigtryggsson|title=Fjárlög\
        \ knýja á um að Alþingi komi saman|url=http://www.mbl.is/frettir/kosning/2017/11/01/fjarlog_knyja_a_um_ad_althingi_komi_saman/|newspaper=Morgunblaðið|date=1\
        \ November 2017|accessdate=3 November 2017|archive-date=3 November 2017|archive-url=https://web.archive.org/web/20171103191055/http://www.mbl.is/frettir/kosning/2017/11/01/fjarlog_knyja_a_um_ad_althingi_komi_saman/|url-status=live}}</ref>\n\
        \n== Electoral system ==\n{{further|Elections in Iceland|Politics of Iceland}}\n\
        The 63 members of the [[Althing]] were elected by [[open list]] [[proportional\
        \ representation]] in six multi-member [[Constituencies of Iceland|constituencies]],\
        \ with 54 seats distributed between parties at the constituency level with\
        \ no [[electoral threshold]] and 9 [[leveling seat]]s assigned to party lists\
        \ at the national level with a threshold of 5 percent required in order to\
        \ ensure proportionality with the election result.<ref name=\"OSCE\">{{cite\
        \ report|title=Ísland, Alþingiskosningar, 27. April 2013: Úttektarskýrsla|url=http://www.osce.org/is/odihr/elections/iceland/103314?download=true|publisher=OSCE/ODIHR|date=24\
        \ June 2013|accessdate=30 October 2017|archive-date=14 September 2016|archive-url=https://web.archive.org/web/20160914235149/http://www.osce.org/is/odihr/elections/iceland/103314?download=true|url-status=live}}</ref>\
        \ The 54 constituency seats were distributed within each constituency according\
        \ to the [[D'Hondt method]].<ref>{{cite web|title=Útreikningar við úthlutun\
        \ jöfnunarsæta|url=http://www.kosning.is/upplysingar/jofnunarsaeti/|publisher=Kosningavefur\
        \ Dómsmála- og Mannréttindaráðuneytisins|date=27 April 2013|accessdate=30\
        \ October 2017|archive-date=2 November 2017|archive-url=https://web.archive.org/web/20171102015341/http://www.kosning.is/upplysingar/jofnunarsaeti/|url-status=live}}</ref>\
        \ Election lists were determined by parties. Voters had the option of marking\
        \ preferential votes for particular candidates of the party they vote for,\
        \ which can result in the order of the candidates being altered.<ref name=\"\
        OSCE\"/><ref>{{Cite web|last=Helgason|first=Þorkell|date=2009-03-01|title=Apportionment\
        \ of Seats to the Althingi, the Icelandic Parliament|url=https://www.landskjor.is/media/frettir/AnalysisIcelandElectionApril2009.pdf|url-status=live|archive-date=8\
        \ December 2020|access-date=28 November 2020|archive-url=https://web.archive.org/web/20201208200221/https://www.landskjor.is/media/frettir/AnalysisIcelandElectionApril2009.pdf}}</ref>\n\
        \nIn the 2017 election, the Social Democratic Alliance received 7 seats –\
        \ fewer than the Progressive Party, which came third in number of seats –\
        \ despite the fact that it came third in the overall vote,<ref>{{cite news|author=Jóhann\
        \ Ólafsson|title=\"Haa, nei! Ég var að skoða þetta\"|url=http://www.mbl.is/frettir/kosning/2017/10/29/haa_nei_eg_var_ad_skoda_thetta/|newspaper=Morgunblaðið|date=29\
        \ October 2017|accessdate=3 November 2017|archive-date=1 November 2017|archive-url=https://web.archive.org/web/20171101235653/http://www.mbl.is/frettir/kosning/2017/10/29/haa_nei_eg_var_ad_skoda_thetta/|url-status=live}}</ref>\
        \ with the Centre Party similarly receiving more votes but securing fewer\
        \ seats than the Progressive Party.<ref name=\"2017result\"/> In the aftermath\
        \ of the election, two professors at the [[University of Akureyri]] suggested\
        \ that there was no need for a national constituency to allocate equalization\
        \ seats, and that 15 leveling seats would be necessary to ensure proportionality\
        \ in the future.<ref>{{cite news|author=Ingvar Þór Björnsson|title=Fjölga\
        \ þurfi jöfnunarsætum í fimmtán|url=http://www.visir.is/g/2017171028631|publisher=Vísir|date=29\
        \ October 2017|accessdate=3 November 2017|archive-date=7 November 2017|archive-url=https://web.archive.org/web/20171107030612/http://www.visir.is/g/2017171028631|url-status=live}}</ref>\
        \ In addition, the imbalance in number of votes between constituencies nearly\
        \ violated the level stipulated in the [[Constitution of Iceland|constitution]],\
        \ with 2,690 eligible voters per seat in the [[Northwest (Althing constituency)|Northwest]]\
        \ constituency compared to 5,346 in the [[Southwest (Althing constituency)|Southwest]]\
        \ constituency, a ratio of 199%, just short of the constitutional limit of\
        \ 200%.<ref>{{cite news|title=Vægi atkvæða nær tvöfalt í NV-kjördæmi|url=http://www.mbl.is/frettir/innlent/2017/10/31/vaegi_atkvaeda_naer_tvofalt_i_nv_kjordaemi/|newspaper=Morgunblaðið|date=31\
        \ October 2017|accessdate=3 November 2017|archive-date=2 November 2017|archive-url=https://web.archive.org/web/20171102114351/http://www.mbl.is/frettir/innlent/2017/10/31/vaegi_atkvaeda_naer_tvofalt_i_nv_kjordaemi/|url-status=live}}</ref>\n\
        \n=== Date ===\nPer Article 20 in Chapter V of Act No. 24 from the 16 May\
        \ 2000 Law Concerning Parliamentary Elections to the Althing, last amended\
        \ in 2017, elections must be held no later than the same weekday of the month\
        \ four years after the previous elections, counting from the turn of the month;<ref>{{cite\
        \ web|title=24/2000: Lög um kosningar til Alþingis|url=https://www.althingi.is/lagas/nuna/2000024.html|publisher=Alþingi|date=1\
        \ September 2017|accessdate=30 October 2017|archive-date=30 October 2017|archive-url=https://web.archive.org/web/20171030004146/http://www.althingi.is/lagas/nuna/2000024.html|url-status=live}}</ref>\
        \ because the 2017 parliamentary took place on the fourth Saturday in October,\
        \ the latest possible date for the next election would be 23 October 2021.<ref>{{cite\
        \ news|title=Atkvæðagreiðsla utan kjörfundar hefst í dag|url=http://www.mbl.is/frettir/kosning/2017/09/20/atkvaedagreidsla_utan_kjorfundar_hefst_i_dag/|newspaper=Morgunblaðið|date=20\
        \ September 2017|accessdate=30 October 2017|archive-date=7 November 2017|archive-url=https://web.archive.org/web/20171107055200/http://www.mbl.is/frettir/kosning/2017/09/20/atkvaedagreidsla_utan_kjorfundar_hefst_i_dag/|url-status=live}}</ref>\n\
        \nMembers of the opposition parties had called for the election to be scheduled\
        \ for the spring of 2021, arguing that Icelandic elections are traditionally\
        \ held during the spring — a tradition broken only by the premature elections\
        \ in autumn of 2016 and 2017 – and that autumn elections give a newly-formed\
        \ government too little time to prepare next year's budget.<ref>{{Cite news|date=2020-02-26|title=Lýðræðismál\
        \ að kjósa að vori|work=mbl.is|url=https://www.mbl.is/frettir/innlent/2020/02/26/lydraedismal_ad_kjosa_ad_vori/|access-date=1\
        \ December 2020|archive-date=28 February 2020|archive-url=https://web.archive.org/web/20200228052749/https://www.mbl.is/frettir/innlent/2020/02/26/lydraedismal_ad_kjosa_ad_vori/|url-status=live}}</ref>\
        \ Finance Minister [[Bjarni Benediktsson (born 1970)|Bjarni Benediktsson]]\
        \ dismissed those arguments, saying that gaining power had involved \"blood,\
        \ sweat and tears\", and he had no interest in giving it away half a year\
        \ earlier than required.<ref>{{Cite news|date=2020-02-23|title=Bjarni í Silfrinu:\
        \ \"Það kostaði blóð svita og tár að komast til valda\"|work=DV|url=https://www.dv.is/frettir/2020/02/23/bjarni-silfrinu-thad-kostadi-blod-svita-og-tar-ad-komast-til-valda/|access-date=1\
        \ December 2020|archive-date=24 February 2020|archive-url=https://web.archive.org/web/20200224154019/https://www.dv.is/frettir/2020/02/23/bjarni-silfrinu-thad-kostadi-blod-svita-og-tar-ad-komast-til-valda/|url-status=live}}</ref>\
        \ On 24 July 2020, Prime Minister [[Katrín Jakobsdóttir]] announced that the\
        \ it would take place on 25 September 2021, a month earlier than required,\
        \ calling the decision \"a compromise\".<ref name=\":0\"/>\n\n=== Political\
