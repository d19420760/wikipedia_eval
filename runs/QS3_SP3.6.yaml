        The novel received positive reviews, and won the 2016 Arthur C. Clarke Award for best science fiction novel. The director of the award program praised the novel as having "universal scale and sense of wonder reminiscent of Clarke himself."
        The next in the series, Children of Ruin, was published on May 14, 2019. The third book, Children of Memory, was published on November 24, 2022. The fourth and latest book, Children of Strife, was published on March 13, 2026. In 2023, the series was awarded the Hugo Award for Best Series.

