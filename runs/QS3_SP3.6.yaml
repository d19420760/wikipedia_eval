      content: "## Result 1\nTitle: Philosophiæ Naturalis Principia Mathematica\n\
        URL: https://en.wikipedia.org/wiki/Philosophi%C3%A6_Naturalis_Principia_Mathematica\n\
        Extract: Philosophiæ Naturalis Principia Mathematica (English: The Mathematical\
        \ Principles of Natural Philosophy), often called simply the Principia (),\
        \ is a book by Sir Isaac Newton that expounds Newton's laws of motion and\
        \ his law of universal gravitation.\nThe Principia is written in Latin and\
        \ comprises three volumes, and was authorized (imprimatur) by Samuel Pepys,\
        \ then-President of the Royal Society on 5 July 1686 and first published in\
        \ 1687. After annotating and correcting his personal copy of the first edition,\
        \ Newton published two further editions, one of 1713 with errors in the 1687\
        \ version corrected, and another, improved one of 1726.\nThe Principia forms\
        \ a mathematical foundation for the theory of classical mechanics, and is\
        \ generally considered to be one of the most important works in the history\
        \ of science. It has been referred to as \"the greatest scientific work in\
        \ history\" and \"the supreme expression in human thought of the mind's ability\
        \ to hold the universe fixed as an object of contemplation\". \nIn formulating\
        \ his physical laws, Newton developed and used mathematical methods now included\
        \ in the field of calculus, expressing them in the form of geometric propositions\
        \ about \"vanishingly small\" shapes. In a revised conclusion to the Principia\
        \ (see § General Scholium), Newton emphasized the empirical nature of the\
        \ work with the expression Hypotheses non fingo (\"I frame/feign no hypotheses\"\
        ). Among other achievements, Newton provides an explanation for Johannes Kepler's\
        \ laws of planetary motion, which Kepler had obtained empirically.\n\n## Result\
        \ 2\nTitle: Isaac Newton\nURL: https://en.wikipedia.org/wiki/Isaac_Newton\n\
        Extract: Sir Isaac Newton ( ; 4 January [O.S. 25 December] 1642 – 31 March\
        \ [O.S. 20 March] 1727) was an English polymath who was a mathematician, physicist,\
        \ astronomer, alchemist, theologian, author and inventor. He was a key figure\
        \ in the Scientific Revolution and the Enlightenment that followed. His book\
        \ Philosophiæ Naturalis Principia Mathematica (Mathematical Principles of\
        \ Natural Philosophy), first published in 1687, achieved the first great unification\
        \ in physics and established classical mechanics. Newton also made seminal\
        \ contributions to optics, and shares credit with the German mathematician\
        \ Gottfried Wilhelm Leibniz for formulating infinitesimal calculus, although\
        \ he developed calculus years before Leibniz. Newton contributed to and refined\
        \ the scientific method, and his work is considered the most influential in\
        \ bringing forth modern science.\nIn the Principia, Newton formulated the\
        \ laws of motion and universal gravitation that formed the dominant scientific\
        \ viewpoint for centuries until it was superseded by the theory of relativity.\
        \ While this is the case, his laws still serve as excellent approximations\
        \ for the vast majority of physical phenomena involving low speeds (much less\
        \ than the speed of light) and weak gravitational fields. He used his mathematical\
        \ description of gravity to derive Kepler's laws of planetary motion, account\
        \ for tides, the trajectories of comets, the precession of the equinoxes and\
        \ other phenomena, eradicating doubt about the Solar System's heliocentricity.\
        \ Newton solved the two-body problem and introduced the three-body problem.\
        \ He demonstrated that the motion of objects on Earth and celestial bodies\
        \ could be accounted for by the same principles. Newton's inference that the\
        \ Earth is an oblate spheroid was later confirmed by the geodetic measurements\
        \ of Alexis Clairaut, Charles Marie de La Condamine, and others, convincing\
        \ most European scientists of the superiority of Newtonian mechanics over\
        \ earlier systems. He was also the first to calculate the age of Earth by\
        \ experiment, and described a precursor to the modern wind tunnel. Further,\
        \ he was the first to provide a quantitative estimate of the solar mass.\n\
        Newton built the first reflecting telescope and developed a sophisticated\
        \ theory of colour based on the observation that a prism separates white light\
        \ into the colours of the visible spectrum. His work on light was collected\
        \ in his book Opticks, published in 1704. He originated prisms as beam expanders\
        \ and multiple-prism arrays, which would later become integral to the development\
        \ of tunable lasers. Newton invented a double-reflecting quadrant and was\
        \ the first to theorise the Goos–Hänchen effect. He also formulated an empirical\
        \ law of cooling, which was the first heat transfer formulation and serves\
        \ as the formal basis of convective heat transfer, made the first theoretical\
        \ calculation of the speed of sound, and introduced the notions of a Newtonian\
        \ fluid and a black body. He was also the first to explain the Magnus effect.\
        \ Moreover, he was the first to analyse Couette flow. In addition to his creation\
        \ of calculus, Newton's work on mathematics was extensive. He generalised\
        \ the binomial theorem to any real number, introduced the Puiseux series,\
        \ was the first to state Bézout's theorem, classified most of the cubic plane\
        \ curves, contributed to the study of Cremona transformations, developed a\
        \ method for approximating the roots of a function, originated the Newton–Cotes\
        \ formulas used for numerical integration, and further produced the earliest\
        \ explicit enunciation of the general Taylor series. Additionally, Newton\
        \ initiated the field of calculus of variations, formulated and solved the\
        \ earliest problem in geometric probability, devised the earliest form of\
        \ linear regression, and was a pioneer of vector analysis.\nNewton was a fellow\
        \ of Trinity College and the second Lucasian Professor of Mathematics at the\
        \ University of Cambridge; he was appointed at the age of 26. He was a devout\
        \ but unorthodox Christian who privately rejected the doctrine of the Trinity.\
        \ He refused to take holy orders in the Church of England, unlike most members\
        \ of the Cambridge faculty of the day. Beyond his work on the mathematical\
        \ sciences, Newton dedicated much of his time to the study of alchemy and\
        \ biblical chronology, but most of his work in those areas remained unpublished\
        \ until long after his death. Politically and personally tied to the Whigs,\
        \ Newton served two brief terms as Member of Parliament for the University\
        \ of Cambridge, in 1689–1690 and 1701–1702. He was knighted by Queen Anne\
        \ in 1705 and spent the last three decades of his life in London, serving\
        \ as Warden (1696–1699) and Master (1699–1727) of the Royal Mint, in which\
        \ he increased the accuracy and security of British coinage. He was also the\
        \ president of the Royal Society (1703–1727).\n\n## Result 3\nTitle: Early\
        \ life of Isaac Newton\nURL: https://en.wikipedia.org/wiki/Early_life_of_Isaac_Newton\n\
        Extract: The following article is part of a biography of Sir Isaac Newton,\
        \ the English mathematician and scientist, author of the Principia. It portrays\
        \ the years after Newton's birth in 1643, his education, as well as his early\
        \ scientific contributions, before the writing of his main work, the Principia\
        \ Mathematica, in 1685.\n\n## Result 4\nTitle: Newton's law of universal gravitation\n\
        URL: https://en.wikipedia.org/wiki/Newton%27s_law_of_universal_gravitation\n\
        Extract: Newton's law of universal gravitation describes gravity as a force\
        \ by stating that every particle attracts every other particle in the universe\
        \ with a force that is proportional to their masses and inversely proportional\
        \ to the square of the distance between their centers of mass. Separated,\
        \ spherically symmetrical objects attract and are attracted as if all their\
        \ mass were concentrated at their centers. The publication of the law has\
        \ become known as the \"first great unification\", as it marked the unification\
        \ of the previously described phenomena of gravity on Earth with known astronomical\
        \ behaviors.\nThis is a general physical law derived from empirical observations\
        \ by what Isaac Newton called inductive reasoning. It is a part of classical\
        \ mechanics and was formulated in Newton's work Philosophiæ Naturalis Principia\
        \ Mathematica (Latin for 'Mathematical Principles of Natural Philosophy' (the\
        \ Principia)), first published on 5 July 1687. \nThe equation for universal\
        \ gravitation thus takes the form:\n\n  \n    \n      \n        F\n      \
        \  =\n        G\n        \n          \n            \n              \n    \
        \            m\n                \n                  1\n                \n\
        \              \n              \n                m\n                \n   \
        \               2\n                \n              \n            \n      \
        \      \n              r\n              \n                2\n            \
        \  \n            \n          \n        \n        ,\n      \n    \n    {\\\
        displaystyle F=G{\\frac {m_{1}m_{2}}{r^{2}}},}\n  \n\nwhere F is the gravitational\
        \ force acting between two objects, m1 and m2 are the masses of the objects,\
        \ r is the distance between the centers of mass, and G is the gravitational\
        \ constant, (6.674×10−11 m3⋅kg−1⋅s−2).\nThe first test of Newton's law of\
        \ gravitation between masses in the laboratory was the Cavendish experiment\
        \ conducted by the British scientist Henry Cavendish in 1798. It took place\
        \ 111 years after the publication of Newton's Principia and approximately\
        \ 71 years after his death.\nNewton's law of gravitation resembles Coulomb's\
        \ law of electrical forces, which is used to calculate the magnitude of the\
        \ electrical force arising between two charged bodies. Both are inverse-square\
        \ laws, where force is inversely proportional to the square of the distance\
