        '''Ithaca''' ({{IPAc-en|ˈ|ɪ|θ|ə|k|ə}}) is a [[Administrative divisions of\
        \ New York (state)|city]] in the [[U.S. state]] of [[New York (state)|New\
        \ York]]. It is situated on the southern shore of [[Cayuga Lake]] in the [[Finger\
        \ Lakes]] region of [[Upstate New York]]. With a population of 32,108 as of\
        \ the [[2020 United States census|2020 census]],<ref name=\"Census Bureau\
        \ QuickFacts 2023\">{{cite web |date=2023-07-01 |title=U.S. Census Bureau\
        \ QuickFacts: Ithaca city, New York |url=https://www.census.gov/quickfacts/fact/table/ithacacitynewyork/PST045223\
        \ |access-date=2024-03-11 |website=Census Bureau QuickFacts}}</ref> Ithaca\
        \ is the largest community in the Ithaca [[metropolitan statistical area]],\
        \ which includes all 103,558 residents of [[Tompkins County, New York|Tompkins\
        \ County]],<ref>{{Cite web |title=Census profile: Ithaca, NY Metro Area |url=http://censusreporter.org/profiles/31000US27060-ithaca-ny-metro-area/\
        \ |access-date=2025-09-06 |website=Census Reporter |language=en}}</ref> of\
        \ which it is the [[county seat]]. The city is named after the Greek island\
        \ of [[Ithaca (island)|Ithaca]], [[Homer's Ithaca|home]] of the protagonist\
        \ [[Odysseus]] in [[Homer]]'s ''[[Odyssey]]''.<ref>{{Cite book |url=https://archive.org/details/bub_gb_9V1IAAAAMAAJ\
        \ |title=The Origin of Certain Place Names in the United States |publisher=Govt.\
        \ Print. Off. |author=Gannett, Henry |year=1905 |page=[https://archive.org/details/bub_gb_9V1IAAAAMAAJ/page/n166\
        \ 167]}}</ref>\n\nIthaca is a [[college town]] best known for hosting [[Cornell\
        \ University]], an [[Ivy League]] university founded in 1865,<ref name=\"\
        hoiatc\">{{Cite web|url=http://www.ci.ithaca.ny.us/index.asp?Type=B_BASIC&SEC={480C93FC-88B9-4C3D-811D-BD7EE0E3F926}&DE={0F21E16C-E234-456D-8841-FF5C2F491300}\
        \ |title=History of Ithaca and Tompkins County |author=Carol Kammen |publisher=City\
        \ of Ithaca |access-date=August 16, 2007 |url-status=dead |archive-url=https://web.archive.org/web/20070927012044/http://www.ci.ithaca.ny.us/index.asp?Type=B_BASIC&SEC=%7B480C93FC-88B9-4C3D-811D-BD7EE0E3F926%7D&DE=%7B0F21E16C-E234-456D-8841-FF5C2F491300%7D\
        \ |archive-date=September 27, 2007 }}</ref> as well as [[Ithaca College]].<ref>{{Cite\
        \ web |url=http://www.tc3.edu/ |title=TC3 – Tompkins Cortland Community College\
        \ |publisher=Tc3.edu |access-date=April 30, 2015 |archive-date=August 9, 2018\
        \ |archive-url=https://web.archive.org/web/20180809090259/http://tc3.edu/\
        \ |url-status=live }}</ref> Until the late 18th century, present-day Ithaca\
        \ was inhabited by the [[Cayuga people]] of the [[Haudenosaunee Confederacy|Haudenosaunee\
        \ (Iroquois) Confederacy]]. In 1789, the federal and state governments began\
        \ granting land in the area, known as the [[Central New York Military Tract]],\
        \ to compensate [[Continental Army|veterans]] of the [[American Revolutionary\
        \ War]]. Located in the township of [[Ulysses, New York|Ulysses]], or Tract\
        \ 22, Ithaca was populated by white settlers in 1794 and formally established\
        \ in 1821.\n\n==History==\n===17th century===\n[[File:Cascadilla Gorge.jpg|thumb|[[Cascadilla\
        \ Creek]] gorge]]\n[[File:Ithaca, N.Y. LOC 95685698.tif|thumb|An 1882 [[perspective\
        \ map]] of Ithaca]]\nNative Americans lived in this area for thousands of\
        \ years. When reached by Europeans, this area was controlled by the [[Cayuga\
        \ people|Cayuga]] ({{lang|cay|Gayogo̱hó꞉nǫʼ}}), one of the five tribes comprising\
        \ the [[Iroquois|Iroquois Confederacy]] (Haudenosaunee). [[Jesuit]] [[missionaries]]\
        \ from [[New France]] in present-day [[Quebec]] had a mission to convert the\
        \ Cayuga as early as 1657.<ref name=first>{{Cite web|url=https://books.google.com/books?id=Tk5IAAAAYAAJ&q=History+of+Ithaca%2C+New+York&pg=PA160|title=History\
        \ of the First Presbyterian Church of Ithaca, New York, During One Hundred\
        \ Years: The Anniversary Exercises, January Twenty-first to Twenty-fourth,\
        \ 1904|first1=Ithaca (N Y. ) First Presbyterian|last1=church|first2=Ithaca,\
        \ N. Y. First Presbyterian|last2=church|date=August 2, 1904|publisher=Press\
        \ of Andrus & Church|access-date=August 2, 2019|via=Google Books}}</ref>\n\
        \n===18th century===\n[[Saponi]] and [[Tutelo]] peoples, Siouan-speaking tribes,\
        \ later occupied lands at the south end of [[Cayuga Lake]]. Dependent tributaries\
        \ of the Cayuga, they had been permitted to settle on the tribe's hunting\
        \ lands at the south end of Cayuga Lake, and in Pony (originally Sapony) Hollow\
        \ of present-day [[Newfield, New York]] and [[Cayuta, New York]]. Remnants\
        \ of these tribes had been forced from [[Virginia]] and [[North Carolina]]\
        \ by tribal conflicts and European colonial settlement. Similarly, the [[Tuscarora\
        \ people]], an Iroquoian-speaking tribe from the Carolinas, migrated after\
        \ defeat in the [[Yamasee War]]; they settled with the [[Oneida people]] and\
        \ became the sixth nation of the Haudenosaunee, with chiefs stating the migration\
        \ was complete in 1722.\n\nDuring the [[American Revolutionary War]], four\
        \ of the then six Iroquois nations helped the [[Kingdom of Great Britain|British]]\
        \ attempt to crush the revolution, although bands made decisions on fighting\
        \ in a highly decentralized way. Conflict with the rebel colonists was fierce\
        \ throughout the [[Mohawk Valley]] and [[Western New York]]. In retaliation\
        \ for conflicts to the east and resentment at the way in which the Iroquois\
        \ made war, the 1779 [[Sullivan Expedition]] was conducted against the Iroquois\
        \ in the west of the state, destroying more than 40 villages and stored winter\
        \ crops and forcing their retreat from the area.<ref name=dhs>\"Ithaca: History\"\
        , The DeWitt Historical Society of Tompkins County Library & Archive</ref>\
        \ It destroyed the Tutelo village of [[Coreorgonel]], located near what is\
        \ now the junction of state routes [[New York State Highway 13|13]] and [[New\
        \ York State Route 13A|13A]] just south of Ithaca. Most Iroquois were forced\
        \ from the state after the Revolutionary War, but some remnants remained.\
        \ The state sold off the former Iroquois lands to stimulate development and\
        \ settlement by non-indigenous Americans; lands were also granted as payment\
        \ to veterans of the war.\n\nWithin the current boundaries of Ithaca, Native\
        \ Americans maintained a temporary hunting camp at the base of Cascadilla\
        \ Gorge. In 1788, eleven men from [[Kingston, New York]], came to the area\
        \ with two [[Lenape]] guides, to explore what they considered wilderness.\
        \ The following year Jacob Yaple, Isaac Dumond, and Peter Hinepaw returned\
        \ with their families and constructed log cabins.<ref name=first /> That same\
        \ year Abraham Bloodgood of Albany obtained a patent from the state for 1,400\
        \ acres, which included all of the present downtown west of Tioga Street.<ref\
        \ name=Daniel>{{Cite web |url=http://tcpl.org/local-history/documents/ithaca-tc/Ithaca_and_its_Past/001to48.pdf\
        \ |title=Snodderly, Daniel R., \"Ithaca and its Past\", DeWitt Historical\
        \ Society of Tompkins County, 1982 |access-date=August 10, 2015 |archive-url=https://web.archive.org/web/20160113164659/http://tcpl.org/local-history/documents/ithaca-tc/Ithaca_and_its_Past/001to48.pdf\
        \ |archive-date=January 13, 2016 |url-status=dead }}</ref>\n\nIn 1790, the\
        \ [[Federal government of the United States|federal government]] and [[Government\
        \ of New York (state)|state]] began an official program to grant land in the\
        \ area, known as the [[Central New York Military Tract]], as payment for service\
        \ to [[Continental Army]] soldiers of the Revolutionary War, when the newly\
        \ established federal government was cash poor. Most local land titles trace\
        \ back to these Revolutionary war grants. However, the Bloodgood tract was\
        \ not part of the state bounties to veterans. It was originally granted to\
        \ a member of the state militia, Martinus Zielie, as a bounty under a different\
        \ law for recruiting men to enlist in the Continental Army.\n\nAs part of\
        \ this process, the [[Central New York Military Tract]], which included northern\
        \ Tompkins County, was surveyed under the direction of [[Simeon De Witt]],\
        \ Bloodgood's son-in-law and the Surveyor General of New York. Simeon commissioned\
        \ his first cousin, Moses De Witt, after whom [[DeWitt, New York]], is named,\
        \ to survey the area around the south end of Cayuga Lake. Both Simeon and\
        \ Moses were first cousins of [[DeWitt Clinton]] through his mother, Mary\
        \ De Witt, who married James Clinton, brother of Governor [[George Clinton\
        \ (vice president)|George Clinton]]. The Commissioners of Lands of New York\
        \ State (chairman Gov. George Clinton) met in 1790. The Military Tract township\
        \ in which Ithaca is located was named the [[Ulysses, New York|Town of Ulysses]].\
        \ A few years later De Witt moved to Ithaca, then called variously \"The Flats,\"\
        \ \"The City,\" or \"Sodom\";<ref name=first /><ref name=facts /> he (or his\
        \ clerk, [[Robert Harpur]]<ref name=James>{{cite book\n|title=Classical Place\
        \ Names in New York State\n|first=William R.\n|last=Farrell\n|location=[[Jamesville,\
        \ New York]]\n|year=2002\n|publisher=Pine Grove Press\n|isbn=1890691089}}</ref>{{rp|1–2}}{{example\
        \ needed|reason=This is an amorphous claim; several cited examples are needed.|date=September\
        \ 2024}}) renamed it for the Greek island home of Ulysses in the spirit of\
        \ the multitude of settlement names in the region derived from [[classical\
        \ literature]], such as [[Aurelius, New York|Aurelius]], [[Ovid, New York|Ovid]],\
        \ [[Troy, New York|Troy]], and especially of [[Ulysses, New York]], the town\
        \ that contained Ithaca at the time.<ref name=dhs />\n\nAround 1791, De Witt\
        \ surveyed what is now the downtown area into lots and sold them at modest\
        \ prices. That same year John Yaple built a grist mill on Cascadilla Creek.\n\
        \nOn November 11, 1794, the [[Treaty of Canandaigua]] was ratified between\
        \ approximately 50 [[Sachem]]s and leaders of the [[Iroquois]] and [[Timothy\
        \ Pickering]] on behalf of [[President of the United States|President]] [[George\
        \ Washington]] and the [[United States|United States of America]].<ref>{{Cite\
        \ web |title=Treaty of Canandaigua, 1794 {{!}} Nation to Nation |url=https://americanindian.si.edu/nationtonation/treaty-of-canandaigua.html\
        \ |access-date=2025-07-07 |website=americanindian.si.edu}}</ref> Among the\
        \ treaty's numerous provisions, the [[Cayuga people|Cayuga]] agreed to officially\
        \ cede their right to all land in present-day Tompkins County in exchange\
        \ for an approximately 64,000 acre reservation at the north end of [[Cayuga\
        \ Lake]].<ref>{{Cite web |title=Treaty with the Six Nations, 1794 |url=https://treaties.okstate.edu/treaties/treaty-with-the-six-nations-1794-0034\
        \ |access-date=2025-07-07 |website=treaties.okstate.edu}}</ref><ref>''Cayuga\
        \ Indian Nation v. Carey'', 89 F.R.D. 627 (N.D.N.Y. 1981).</ref><ref>{{Cite\
        \ web |last=GABLE |first=WALT |date=2022-09-24 |title=LOOKING BACK: A quick\
        \ primer on treaties with the Cayugas |url=https://www.fltimes.com/lifestyle/looking-back-a-quick-primer-on-treaties-with-the-cayugas/article_ab0c4632-fcd1-52ae-9c90-9a4afe449358.html\
        \ |access-date=2025-07-07 |website=Finger Lakes Times |language=en}}</ref>\
        \ Today, the [[Cayuga Nation of New York]], the Cayuga signatories' ancestors,\
        \ still point to the Treaty of Canandaigua as evidence of their legal sovereignty.<ref>{{Cite\
        \ web |title=History & Culture - Haudenosaunee Traditions {{!}} Cayuga Nation\
        \ |url=https://cayuganation-nsn.gov/about/history-and-culture/ |access-date=2025-07-07\
        \ |website=cayuganation-nsn.gov |language=en-US}}</ref><ref>{{Cite web |title=Tentative\
        \ Agreement Reached on Cayuga Indian New York Land Claim {{!}} Indian Affairs\
        \ |url=https://www.bia.gov/as-ia/opa/online-press-release/tentative-agreement-reached-cayuga-indian-new-york-land-claim\
        \ |archive-url=https://web.archive.org/web/20250303015543/https://www.bia.gov/as-ia/opa/online-press-release/tentative-agreement-reached-cayuga-indian-new-york-land-claim\
        \ |archive-date=March 3, 2025 |access-date=2025-07-07 |website=www.bia.gov\
        \ |language=en |url-status=live }}</ref><ref>{{Cite news |last=McKinley |first=Jesse\
        \ |date=2023-03-13 |title=Bulldozing. Kidnapping Claims. Inside a Battle Over\
        \ a Tribe's Future. |url=https://www.nytimes.com/2023/03/13/nyregion/cayuga-nation-tribe-new-york.html\
        \ |access-date=2025-07-07 |work=The New York Times |language=en-US |issn=0362-4331}}</ref>\n\
        \nIthaca's first frame house was erected in 1800 by Abram Markle.<ref name=\"\
        first\" /> In 1804, the village had a postmaster and, in 1805, a tavern.<ref\
        \ name=\"Kammen\">{{Cite book |last1=Kammen |first1=Carol |url=https://books.google.com/books?id=zXF0CQAAQBAJ\
        \ |title=Ithaca: A Brief History |date=October 20, 2008 |publisher=The History\
        \ Press |isbn=978-1-59629-515-5 |publication-place=Charleston, SC |lccn=2008038823\
        \ |id=2008 print edition; 2011 e-book edition: {{ISBN|978-1-61423-067-0}}\
        \ |access-date=2024-11-12}}</ref>{{Rp|page=[https://www.google.com/books/edition/Ithaca/zXF0CQAAQBAJ?hl=en&gbpv=1&bsq=1804%20postmaster%20tavern\
        \ 1807]}}\n\n===19th century===\n[[File:State Street - Ithaca, New York.jpg|thumb|State\
        \ Street in Ithaca, {{Circa|1901}}]]\n[[File:Ithaca-guns 1916 a-oakley.jpg|thumb|Ithaca\
        \ Gun Company's [[Annie Oakley]] gun in 1916]]\nIthaca became a transshipping\
        \ point for salt from curing beds near [[Salina, New York]], to buyers south\
        \ and east. This prompted construction in 1810 of the Owego Turnpike.<ref\
        \ name=Kammen />{{Rp|page=[https://www.google.com/books/edition/Ithaca/zXF0CQAAQBAJ?hl=en&gbpv=1&bsq=Salina%201810%20Owego\
        \ 1809]}} When the [[War of 1812]] cut off access to [[gypsum]] in [[Nova\
        \ Scotia]], which was used for fertilizer, Ithaca became the center of trade\
        \ in Cayuga gypsum.<ref name=Daniel /> The Cayuga Steamboat Company was organized\
        \ in 1819 and, in 1820, launched the first [[steamboat]] on Cayuga Lake, the\
        \ ''Enterprise.''<ref name=Daniel /> In 1821, the village was incorporated\
        \ at the same time the Town of Ithaca was organized and separated from the\
        \ parent Town of Ulysses. In 1834, the Ithaca and Owego Railroad's first horse\
        \ drawn train began service,<ref name=dhs /> connecting traffic on the east–west\
        \ [[Erie Canal]], which was completed in 1825, with the [[Susquehanna River]]\
        \ to the south to expand the trade network.\n\nWith the [[Long Depression]]\
        \ of 1837, the Ithaca and Owego Railroad was re-organized as the [[Cayuga\
        \ and Susquehanna Railroad]]. It was re-engineered with switchbacks downhill\
        \ into Ithaca in the late 1840s. In the late 20th century, a short section\
        \ of its abandoned right-of-way in the City and Town of Ithaca was used for\
        \ the [[Trails in Ithaca, New York#South Hill Recreation Way|South Hill Recreation\
        \ Way]].\n\nHowever, easier early railroad routes were constructed that bypassed\
        \ Ithaca, such as that of the Syracuse, Binghamton & New York, built in 1854.\
        \ In the decade following the [[American Civil War]], railroads were built\
        \ from Ithaca to [[Auburn, New York|Auburn]], [[Geneva, New York|Geneva]],\
        \ [[Cayuga, New York|Cayuga]], [[Cortland, New York|Cortland]], [[Elmira,\
        \ New York|Elmira]], and [[Athens, Pennsylvania]], mainly with financing from\
        \ [[Ezra Cornell]]. These were all branch-lines, since the city, located on\
        \ a steep hill by the lake, prevented it from being directly connected to\
        \ a major transportation artery.\n\nIn 1892, when the [[Bethlehem, Pennsylvania]]-based\
        \ [[Lehigh Valley Railroad]] built its main, double-track freight line from\
        \ Van Etten Junction to Geneva and on to [[Buffalo, New York]], it bypassed\
        \ Ithaca and Auburn to the west, running via Burdett and eastern [[Schuyler\
        \ County, New York|Schuyler County]] on easier grades, just as the [[Delaware,\
        \ Lackawanna and Western Railroad]] had  done a decade earlier, in 1882, with\
        \ its own, new Binghamton-Buffalo mainline extension to the south and west,\
        \ via Owego, Waverly, Bath, and Dansville. Two of three daily [[New York City]]-Buffalo\
        \ roundtrip passenger trains served Ithaca on the older, original Lehigh Valley\
        \ Ithaca Branch between Van Etten Junction and Geneva, until discontinuance\
        \ of the ''[[Black Diamond (train)|Black Diamond]]'' daylight train, on May\
        \ 11, 1959. On May 25, 1959, the overnight \"Maple Leaf\" train was shifted\
        \ back to the Ithaca Branch from the main line via Burdett, and operated on\
        \ this route until the Lehigh Valley Railroad discontinued this last passenger\
        \ service on February 4, 1961.<ref>Lehigh Valley passenger timetable, January\
        \ 14, 1958.</ref>\n\nIn the late 19th century, more industry developed in\
        \ Ithaca. In 1883, William Henry Baker and his partners founded the [[Ithaca\
        \ Gun Company]], which manufactured shotguns. The original factory was located\
        \ in the Fall Creek neighborhood of the city, on a slope later known as Gun\
        \ Hill, where the nearby waterfall supplied the main source of energy for\
        \ the plant. The company became an icon in the hunting and shooting world,\
        \ and its shotguns were known for their fine decorative work. Wooden gunstocks\
        \ with knots or other imperfections were donated to the high school woodworking\
        \ shop to be made into lamps.<ref>{{Cite news |last=Johnson |first=Kirk |date=October\
        \ 15, 2000 |title=Ithaca Journal: Sweet Fishing and a Gorgeous Gorge, if You\
        \ Don't Mind All That Old Lead |url=https://www.nytimes.com/2000/10/15/nyregion/ithaca-journal-sweet-fishing-gorgeous-gorge-if-you-don-t-mind-all-that-old-lead.html\
        \ |newspaper=[[The New York Times]] |access-date=March 2, 2016 |archive-date=September\
        \ 13, 2020 |archive-url=https://web.archive.org/web/20200913002130/https://www.nytimes.com/2000/10/15/nyregion/ithaca-journal-sweet-fishing-gorgeous-gorge-if-you-don-t-mind-all-that-old-lead.html\
        \ |url-status=live }}</ref> [[John Philip Sousa]] and [[Exhibition shooting|trick-shooter]]\
        \ [[Annie Oakley]] favored Ithaca Gun Company guns. In 1937, the company began\
        \ producing the [[Ithaca 37]], based on a 1915 patent by noted firearms designer\
        \ [[John Browning]]. Its 12-gauge shotguns were the standard used for decades\
        \ by the [[New York City Police Department]] and [[Los Angeles Police Department]].<ref\
        \ name=\"nyt thai\">{{Cite news|url=https://query.nytimes.com/gst/fullpage.html?res=990DE0DB123BF933A05755C0A964948260|title=Ithaca\
        \ Gun Co. Has Thai Order|work=[[The New York Times]]|agency=Associated Press|date=June\
        \ 30, 1982}}</ref>\n\nIn 1885, Ithaca Children's Home was established on West\
        \ Seneca Street. The orphanage had two programs at the time: a residential\
        \ home for both orphaned and destitute children, and a day nursery.<ref>{{Cite\
        \ web |url=http://www.fcsith.org/history/ |title=\"History\", Family & Children's\
        \ Service of Ithaca |access-date=August 11, 2015 |archive-url=https://web.archive.org/web/20150815021311/http://fcsith.org/history/\
        \ |archive-date=August 15, 2015 |url-status=dead }}</ref> The village established\
        \ its first trolley in 1887. Ithaca developed as a small manufacturing and\
        \ retail center and was incorporated as a city in 1888. The largest industrial\
        \ company in the area was Morse Chain, elements of which were absorbed into\
        \ [[Emerson Electric Company|Emerson]] Power Transmission on South Hill and\
        \ [[BorgWarner|Borg Warner Automotive]] in [[Lansing (town), New York|Lansing,\
        \ New York]].\n\nIthaca claims to be the birthplace of the [[Sundae|ice cream\
        \ sundae]], created in 1892 when fountain shop owner [[Chester Platt]] \"\
        served his local priest vanilla ice cream covered in cherry syrup with a dark\
        \ candied cherry on top. The priest suggested the dessert be named after the\
        \ day, Sunday, although the spelling was later changed out of fear some would\
        \ find it offensive.\"<ref>{{Cite news |last=York |first=Michelle |date=August\
        \ 6, 2006 |title=Ithaca Journal: The Ice Cream Sundae's Birthplace? That's\
        \ the 64,000-Calorie Question |url=https://www.nytimes.com/2006/08/06/nyregion/06sundae.html\
        \ |newspaper=[[The New York Times]] |access-date=March 2, 2016 |archive-date=March\
        \ 30, 2016 |archive-url=https://web.archive.org/web/20160330013326/http://www.nytimes.com/2006/08/06/nyregion/06sundae.html\
        \ |url-status=live }}</ref> The local [[Unitarianism|Unitarian]] church, where\
        \ the priest, Rev. John Scott, preached, has an annual \"Sundae Sunday\" every\
        \ September in commemoration.<ref name=facts /><ref>{{Cite web|url=http://www.icecreamsundae.com/?action=history|title=The\
        \ Official Website of the Ice Cream Sundae|website=www.icecreamsundae.com|access-date=August\
        \ 2, 2019|archive-date=September 12, 2019|archive-url=https://web.archive.org/web/20190912192454/http://www.icecreamsundae.com/?action=history|url-status=live}}</ref>\
        \ Ithaca's claim has long been disputed by [[Two Rivers, Wisconsin]]. Also\
        \ in 1892, the [[Ithaca Kitty]] became one of the first mass-produced stuffed\
        \ animal toys in the United States.<ref>{{Cite news|url=http://www.ithacajournal.com/story/news/local/2016/07/28/ithaca-kitty-success-across-america/87666422/|title=Ithaca\
        \ Kitty was a success across America|last=Sachse|first=Gretchen|date=July\
        \ 28, 2016|newspaper=[[The Ithaca Journal]]|location=Ithaca, New York|access-date=August\
        \ 2, 2016|archive-date=March 22, 2019|archive-url=https://web.archive.org/web/20190322023513/https://www.ithacajournal.com/story/news/local/2016/07/28/ithaca-kitty-success-across-america/87666422/|url-status=live}}</ref>\n\
        \n===20th century===\n[[File:Wallingford.001.jpg|thumb|''The New Adventures\
        \ of J. Rufus Wallingford'', a [[Wharton Studio]] production still]]\nIn 1900,\
        \ [[Cornell University]] anatomy professor [[G. S. Moler]] made an early movie\
        \ using frame-by-frame technology. For ''The Skeleton Dance,'' he took single-frame\
        \ photos of a human skeleton in varying positions, giving the illusion of\
        \ a dancing skeleton. During the early 20th century, Ithaca was an important\
        \ center in the [[silent film]] industry. These films often featured the local\
        \ natural scenery. Many of these films were the work of [[Leopold Wharton]]\
        \ and his brother [[Theodore Wharton|Theodore]]; [[The Wharton Studio]] was\
        \ on the site of what is now [[Stewart Park (Ithaca, New York)|Stewart Park]].<ref\
        \ name=facts>{{Cite web|url=https://www.visitithaca.com/facts-trivia|title=Facts\
        \ About Ithaca, NY &#124; Visit Ithaca, NY|website=www.visitithaca.com|access-date=August\
        \ 2, 2019}}</ref>\n\nIn 1903, a [[typhoid]] [[epidemic]] resulting from poor\
        \ sanitation infrastructure devastated the city. Not having access to unpolluted\
        \ water was one suspicion to the cause of the outbreak because \"[r]efuse\
        \ and the contents of the early sewer system dumped directly into the inlet\"\
        .<ref>{{Cite book|last=Kammen|first=Carol|title=Ithaca: A Brief History|publisher=History\
        \ Press|year=2008|isbn=978-1-59629-515-5|location=Charleston, SC|pages=84}}</ref>\
        \ One out of ten citizens fell ill or died.<ref>{{Cite web|last1=Seely|first1=Hart|last2=Post-St|first2=The|last3=ard|date=2011-01-30|title=The\
        \ story behind a deadly typhoid epidemic in Ithaca|url=https://www.syracuse.com/cny/2011/01/the_story_behind_a_deadly_typhoid_epidemic_in_ithaca.html|access-date=2021-10-02|website=syracuse|language=en|archive-date=October\
        \ 2, 2021|archive-url=https://web.archive.org/web/20211002121853/https://www.syracuse.com/cny/2011/01/the_story_behind_a_deadly_typhoid_epidemic_in_ithaca.html|url-status=live}}</ref>\
        \ Local residents lost fifty-one people to the illness that year, but there\
        \ was \"an average of thirty-nine cases each year\" for the consecutive ten\
        \ years following.<ref>{{Cite book|last=Kammen|first=Carol|title=Ithaca: A\
        \ Brief History|publisher=History Press|year=2008|isbn=978-1-59629-515-5|location=Charleston,\
        \ SC|pages=85}}</ref>\n\nThe Star Theatre on East Seneca Street was built\
        \ in 1911 and became the most popular vaudeville venue in the region. Wharton\
        \ movies were also filmed and shown there.<ref>{{Cite web|url=http://www.whartonstudiomuseum.org/history/ithaca-silent-movie-history/|archive-url=https://web.archive.org/web/20150808055532/http://www.whartonstudiomuseum.org/history/ithaca-silent-movie-history/|url-status=dead|title=Simmons-Lynch,\
        \ Julie. \"Ithaca and the Silver Screen\", Wharton Studio Museum|archive-date=August\
        \ 8, 2015|access-date=August 2, 2019}}</ref> After the film industry centralized\
        \ in Hollywood, production in Ithaca effectively ceased. Few of the silent\
        \ films made in Ithaca have been preserved.\n\nIthaca had film studio activity\
        \ during the silent film era including [[Wharton Studio]].<ref>{{cite web\
        \ | url=https://www.ithaca.com/entertainment/when-ithaca-was-the-silent-hollywood/article_6243a016-aa52-11e1-916b-001a4bcf887a.html\
        \ | title=When Ithaca Was the Silent Hollywood | date=March 28, 2015 }}</ref>\n\
        \nAfter [[World War II]], the Langmuir Research Labs of [[General Electric]]\
        \ developed as a major employer; the defense industry continued to expand.\
        \ GE's headquarters were in Schenectady, New York, to the northeast in the\
        \ Mohawk Valley.\n\nAlthough Ithaca has a history of [[Ku Klux Klan]] activity,\
        \ including a cross-burning in 1923 and 1924, \"the peak years of Klan activity\
        \ in Ithaca were 1923-1925\" and it represented only a fraction of the population.<ref>{{Cite\
        \ book|last=Kammen|first=Carol|title=Ithaca: A Brief History|publisher=History\
        \ Press|year=2008|isbn=978-1-59629-515-5|location=Charleston, SC|pages=97}}</ref>\
        \ Ithaca is known for its political activism regarding civil rights and environmental\
        \ issues.<ref name=\":0\">{{Cite book|last=Kammen|first=Carol|title=Ithaca:\
        \ A Brief History|publisher=History Press|year=2008|isbn=978-1-59629-515-5|location=Charleston,\
        \ SC|pages=102}}</ref> “Martin Luther King Jr. came to speak twice in Ithaca,\
        \ in 1960 and 1961”.<ref name=\":0\" /> The annual Ithaca Festival, which\
        \ often takes place on the [[Ithaca Commons]] or [[Stewart Park (Ithaca, New\
        \ York)|Stewart Park]], frequently centers around themes promoting \"a political\
        \ statement into a cultural and festive event”<ref>{{Cite book|last=Kammen|first=Carol|title=Ithaca:\
        \ A Brief History|publisher=History Press|year=2008|isbn=978-1-59629-515-5|location=Charleston,\
        \ SC|pages=107}}</ref>\n\nThe first African-American elected to the Common\
        \ Council was Jerome Holland in 1967. Holland represented the Second Ward\
        \ from 1968 to 1972.<ref>{{Cite web |last=Holland |first=Marjorie Olds and\
        \ Melissa |date=2024-02-21 |title=The Story of the First Black Ithaca Common\
        \ Council Member |url=https://www.ithaca.com/opinion/columnists/community_connections/the-story-of-the-first-black-ithaca-common-council-member/article_a4f99a34-d0db-11ee-b735-6f90f488ec0b.html\
        \ |access-date=2026-05-10 |website=Ithaca Times |language=en}}</ref> \n\n\
        ===21st century===\n[[File:Ithaca Commons (New York).jpg|thumb|The west entrance\
        \ to [[Ithaca Commons]] at Cayuga Street]]\nThe [[Ithaca Gun Company]] tested\
        \ their shotguns behind the plant on Lake Street; the shot fell into the [[Fall\
        \ Creek (New York)|Fall Creek]] gorge at the base of [[Ithaca Falls]]. Lead\
        \ accumulated in the soil in and around the factory and gorge. A major lead\
        \ clean-up effort sponsored by the United States [[Superfund (environmental\
        \ law)|Superfund]] took place from 2002 to 2004, managed through the [[United\
        \ States Environmental Protection Agency|Environmental Protection Agency]].<ref>[http://yosemite.epa.gov/opa/admpress.nsf/b1ab9f485b098972852562e7004dc686/1d33c848fd4ada78852571220072d73d!OpenDocument\
        \ \"EPA Finishes $4.8 Million Cleanup at Ithaca Gun\"] {{Webarchive|url=https://web.archive.org/web/20170705150146/https://yosemite.epa.gov/opa/admpress.nsf/b1ab9f485b098972852562e7004dc686/1d33c848fd4ada78852571220072d73d!OpenDocument\
        \ |date=July 5, 2017 }}, United States Environmental Protection Agency, October\
        \ 29, 2004. Retrieved March 25, 2006.</ref> The old Ithaca Gun building has\
        \ been dismantled, though its iconic smokestack remains standing. It was scheduled\
        \ to be replaced by the development of an apartment complex on the cleaned\
        \ land.\n\nThe former Morse Chain company factory on South Hill, now owned\
        \ by Emerson Power Transmission, was the site of extensive groundwater and\
        \ [[soil contamination]] from its industrial operations.<ref>[http://www.dec.ny.gov/chemical/8669.html\
        \ \"Public Meeting – Emerson Power Transmission Environmental Investigation\"\
        ] {{webarchive|url=https://web.archive.org/web/20141008052248/http://www.dec.ny.gov/chemical/8669.html\
        \ |date=October 8, 2014}}, New York State Department of Environmental Conservation.\
        \ June 22, 2005. Retrieved December 6, 2008.</ref> Emerson Power Transmission\
        \ has been working with the state and South Hill residents to determine the\
        \ extent and danger of the contamination and aid in cleanup. in 2026, New\
        \ York State awarded the project $38 million to facilitate redevelopment efforts.<ref>{{Cite\
        \ web |last=Jordan |first=Jimmy |date=2025-12-29 |title=SouthWorks receives\
        \ $38M in state support |url=https://ithacavoice.org/2025/12/southworks-receives-38m-in-state-support/\
        \ |access-date=2026-05-09 |website=The Ithaca Voice |language=en-US}}</ref>\n\
        \nIn 2004, Gayraud Townsend, a 20-year-old senior in Cornell's School of Industrial\
        \ and Labor Relations, was sworn in as alderman of the city council: the youngest\
        \ African American to be elected to office in the United States.<ref name=\"\
        american\">[ \"Gayraud Townsend\"], Young Elected Officials Network, Inaugural\
        \ National Convening, Washington, DC, January 13–15, 2006, People of the American\
        \ Way Foundation</ref> He served his full term and has mentored other student\
        \ politicians.<ref name=\"cornell\">[http://cornellsun.com/blog/2007/05/02/the-sun-speaks-to-townsend-05/\
        \ Susan Hoffman, \"The Sun Speaks to Gayraud Townsend '05\"] {{Webarchive|url=https://web.archive.org/web/20141213002250/http://cornellsun.com/blog/2007/05/02/the-sun-speaks-to-townsend-05/\
        \ |date=December 13, 2014 }}, ''Cornell Sun'' blog, May 2, 2007, accessed\
        \ September 14, 2014</ref> In 2011, [[Svante Myrick]], a 2009 [[Cornell University]]\
        \ graduate, was elected as the youngest mayor of the city of Ithaca.<ref name=\"\
        svante\">[http://www.syracuse.com/news/index.ssf/2011/11/svante_myrick_how_a_child_of_m.html\
        \ Teri Weaver, \"Svante Myrick: How a child of modest means became Ithaca's\
        \ youngest mayor-elect\"] {{Webarchive|url=https://web.archive.org/web/20150924125130/http://www.syracuse.com/news/index.ssf/2011/11/svante_myrick_how_a_child_of_m.html\
        \ |date=September 24, 2015 }}, Syracuse.com, November 20, 2011, accessed September\
        \ 14, 2014</ref> Myrick resigned in February 2022 to serve as executive director\
        \ of [[People for the American Way]]. \n\nIn 2023, President of the Cornell\
        \ Student Assembly Patrick Kuehl launched a secret write-in campaign and succeeded\
        \ in unseating Alderperson Jorge Defendini, another Cornell alumnus, from\
        \ the Ithaca Common Council.<ref>[https://ithacavoice.org/2023/11/cornell-students-planned-the-controversial-write-in-campaign-that-shocked-ithacas-political-scene/\
        \ \"Cornell students planned the controversial write-in campaign that shocked\
        \ Ithaca’s political scene\"]</ref> Kuehl had collaborated with fellow students\
        \ Alderperson Tiffany Kumar and canvassed for several weeks but did not publicly\
        \ express his intent to run for the seat until the evening of election day.<ref>[https://cornellsun.com/2023/11/13/despite-month-long-canvassing-kuehl-claims-he-was-not-running/\
        \ \"Despite Month-Long Canvassing, Kuehl Claims He Was “Not Running”\"]</ref>\
        \ Kuehl received an inordinate number of [[provisional ballots]] and [[absentee\
        \ ballots]] from residents of the [[Sigma Phi]] and [[Delta Kappa Epsilon]]\
        \ fraternity houses.<ref>[https://cornellsun.com/2023/11/21/in-low-turnout-election-city-candidates-found-crucial-votes-at-cornell-frats/\
        \ \"In Low-Turnout Election, City Candidates Found Crucial Votes at Cornell\
        \ Frats\"]</ref> Various Ithaca and Cornell groups condemned the secret campaign\
        \ as undemocratic.<ref>[https://cornellsun.com/2023/11/10/wilson-patrick-kuehls-secret-common-council-run-is-undemocratic/\
        \ \"Patrick Kuehl’s Secret Common Council Run Is Undemocratic\"]</ref>\n\n\
        The incumbent mayor is Robert Cantelmo who took office on January 1, 2024.<ref>{{Cite\
        \ web |title=Mayor's Office {{!}} Ithaca, NY - Official Website |url=https://www.cityofithacany.gov/131/Mayors-Office\
        \ |access-date=2026-05-09 |website=www.cityofithacany.gov}}</ref> Dominick\
        \ Recckio serves as the acting city manager.<ref>{{Cite web |title=City Manager\
        \ {{!}} Ithaca, NY - Official Website |url=https://www.cityofithacany.gov/780/City-Manager\
        \ |access-date=2026-05-09 |website=www.cityofithacany.gov}}</ref>\n\n==Geography==\n\
        [[File:Ithaca Hemlock Gorge.JPG|thumb|Hemlock Gorge along Fall Creek before\
        \ emptying into Beebe Lake on Cornell's campus]]\nThe valley in which [[Cayuga\
        \ Lake]] is located is long and narrow with a north–south orientation. Ithaca\
        \ is located at the southern end (the \"head\") of the lake, but the valley\
        \ continues to the southwest behind the city. Originally a river valley, it\
        \ was deepened and widened by the action of [[Pleistocene]] ice sheets over\
        \ the last several hundred thousand years.<ref name=Cayuga_Geology_Cornell>{{cite\
        \ conference |author=Department of Geology, Cornell University |title=Geology\
        \ of the Cayuga Lake Basin |conference=31st Annual Field Meeting of the New\
        \ York State Geological Association |pages=1–6 |date=May 1959 |location=Ithaca,\
        \ NY |edition=2 |url=https://ottohmuller.com/nysga2ge/Files/1959/NYSGA%201959%20Cornell%20Bookmarked.pdf\
        \ |access-date=3 November 2021 |archive-date=November 4, 2021 |archive-url=https://web.archive.org/web/20211104043021/https://ottohmuller.com/nysga2ge/Files/1959/NYSGA%201959%20Cornell%20Bookmarked.pdf\
        \ |url-status=live }}</ref>\nThese ice sheets gouged the land crosswise to\
        \ preexisting streams, producing [[Valley#Hanging valleys|hanging valleys]].\
        \ Once the last ice sheets receded — around twenty or thirty thousand years\
        \ ago — these streams cut deep into the steep hillsides, forming the many\
        \ distinctive gorges, rapids, and waterfalls seen in the region; examples\
        \ include Fall and Cascadilla Creeks in Ithaca, and nearby [[Buttermilk Falls\
        \ State Park|Buttermilk Falls]], [[Robert H. Treman State Park|Enfield Gorge]],\
        \ and [[Taughannock Falls State Park|Taughannock Falls]].<ref name=Cayuga_Geology_Cornell/>\
        \ Cayuga Lake is the most recent lake in a long series of lakes which developed\
        \ as the ice retreated northward.<ref name=Cayuga_Geology_Cornell/> The lake\
        \ drains to the north, and was formed behind a dam of glacial debris called\
        \ a [[moraine]].\n\nRock in the region is predominantly [[Devonian]] [[shale]]\
        \ and [[sandstone]].<ref name=Cayuga_Geology_Cornell/> North of Ithaca, it\
        \ is relatively fossil rich. The world-renowned fossils found in this area\
        \ can be examined at the [[Museum of the Earth]]. [[Glacial erratic]]s can\
        \ also be found in the area.\n\nIthaca was founded on flat land just south\
        \ of the lake — land that formed in fairly recent geological times when silt\
        \ filled the southern end of the lake. The city ultimately spread to the adjacent\
        \ hillsides, which rise several hundred feet above the central flats: East\
        \ Hill, West Hill, and South Hill. The Cornell campus is loosely bounded to\
        \ the north and south by Fall and Cascadilla Creeks, respectively.\n\nThe\
        \ natural vegetation of the Ithaca area is northern [[Temperate broadleaf\
        \ and mixed forests|temperate broadleaf forest]]. It is dominated by [[deciduous\
        \ plant|deciduous trees]], including maple, sycamore, black walnut, birch,\
        \ and oak; [[conifer|coniferous trees]] include white pine, Norway spruce,\
        \ and eastern hemlock.<ref name=Ithacas_Trees>{{cite report |first=Bryan |last=R.\
        \ Denig |title=Ithaca's Trees: Master Plan, Inventory, & Arboricultural Guidelines\
        \ for the Public Trees of the City of Ithaca, New York |pages=1–2 |publisher=The\
        \ City of Ithaca Shade Tree Advisory Committee |date=February 2014 |location=Ithaca,\
        \ NY |url=https://www.hort.cornell.edu/uhi/outreach/pdfs/Ithacas-Trees.pdf\
        \ |access-date=3 November 2021 |archive-date=November 4, 2021 |archive-url=https://web.archive.org/web/20211104043021/http://www.hort.cornell.edu/uhi/outreach/pdfs/Ithacas-Trees.pdf\
        \ |url-status=live }}</ref> The city of Ithaca has a rich diversity of tree\
        \ plantings, with over 190 species, including cherry, southern magnolia, and\
        \ ginkgo.<ref name=Ithacas_Trees/> In addition to visual beauty, this species\
        \ diversification helps reduce the impact of arboreal epidemics, such as that\
        \ caused by the [[emerald ash borer]].\n\n===Climate===\n{{Climate chart\n\
        | Ithaca\n|15.7|31.6|2.01\n|15.2|32.5|1.94\n|24.0|41.7|2.62\n|34.7|54.8|2.89\n\
        |44.6|67.1|3.33\n|53.8|76.2|3.64\n|58.4|80.9|3.61\n|56.7|78.9|3.50\n|50.1|71.8|3.41\n\
        |40.0|60.0|3.12\n|31.8|47.2|2.65\n|21.0|35.3|2.41\n|units = imperial\n|float\
        \ = right\n|clear = }}\nAccording to the [[Köppen climate classification]]\
        \ method, Ithaca experiences a warm-summer [[humid continental climate]],\
        \ also known as a hemiboreal climate (''Dfb''). Summers are warm but brief,\
        \ and it is cool-to-cold the rest of the year, with long, snowy winters; an\
        \ average of {{Convert|67|in|cm|abbr=on}} of snow falls per year. In addition,\
        \ frost may occur any time of year except mid-summer.\n\nWinter is typically\
        \ characterized by freezing temperatures, cloudy skies and light-to-moderate\
        \ snows, with some heavier falls; the largest snowfall in one day was {{Convert|26.0|in|cm|abbr=on}}\
        \ on February 14, 1914. But the season is also variable; there can be short\
        \ mild periods with some rain, but also outbreaks of frigid air with night\
        \ temperatures down to {{convert|-10|°F|0}} or lower. Summers usually bring\
        \ sunshine, along with moderate heat and humidity, but also frequent afternoon\
        \ thunderstorms. Nights are pleasant and sometimes cool. Occasionally, there\
        \ can be heatwaves, with temperatures rising into the {{Convert|95|°F}} to\
        \ {{Convert|100|°F}} range, but they tend to be brief.\n\nThe average date\
        \ of the first freeze is October 5, and the average date of the last freeze\
        \ is May 15, giving Ithaca a [[growing season]] of 141 days. The average date\
        \ of the first and last snowfalls are November 12 and April 7, respectively.\
        \ The [[hardiness zone]] is between 5b and 6a. Extreme temperatures range\
        \ from {{Convert|−25|°F|0}} as recently as February 2, 1961, up to {{Convert|103|°F|0}}\
        \ on July 9, 1936.<ref>{{Cite web |url=https://w2.weather.gov/climate/xmacis.php?wfo=bgm\
        \ |title=NowData – NOAA Online Weather Data |publisher=NOAA |access-date=December\
        \ 14, 2011 |archive-date=March 25, 2012 |archive-url=https://web.archive.org/web/20120325204622/https://w2.weather.gov/climate/xmacis.php?wfo=bgm\
        \ |url-status=live }}</ref>\n\nThe valley flatland has slightly cooler weather\
        \ in winter, and occasionally Ithaca residents experience simultaneous snow\
        \ on the hills and rain in the valley. The phenomenon of mixed precipitation\
        \ (rain, wind, and snow), common in the late fall and early spring, is known\
        \ tongue-in-cheek as ''ithacation'' to many of the local residents.<ref>{{Cite\
        \ web |url=http://www.tompkinsready.org/disaster/winter.html |title=Winter\
        \ Weather |publisher=TompkinsREADY |access-date=December 30, 2010 |archive-date=July\
        \ 28, 2011 |archive-url=https://web.archive.org/web/20110728114154/http://www.tompkinsready.org/disaster/winter.html\
        \ |url-status=dead }}</ref>\n\nDue to the [[microclimate]]s created by the\
        \ impact of the lakes, the region surrounding Ithaca ([[Finger Lakes AVA|Finger\
        \ Lakes American Viticultural Area]]) experiences a short but adequate growing\
        \ season for winemaking similar to the Rhine Valley wine district of Germany.\
        \ As such, the region is home to many wineries.\n{{Weather box\n|location\
