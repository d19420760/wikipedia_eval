        Extract: The 2013 FIA Formula One World Championship was the 67th season of FIA Formula One motor racing. It featured the 64th FIA Formula One World Championship, a motor racing series for Formula One cars, recognised by the Fédération Internationale de l'Automobile (FIA) – the governing body of motorsport – as the highest class of competition for open-wheel racing cars. Eleven teams and twenty-three drivers contested the nineteen Grands Prix that made up the calendar for the 2013 season, with the winning driver being crowned the World Drivers' Champion and the winning team the World Constructors' Champions. The season started in Australia on 17 March 2013 and ended in Brazil on 24 November 2013.
        The 2013 season was the final year the series used the 2.4-litre V8 engine configuration which was introduced in 2006 and for naturally-aspirated engines in general having been mandatory since 1989 as a 1.6-litre turbocharged hybrid V6 engine formula came into force for 2014. It was also the last season where engine manufacturer Cosworth competed in the sport.
        Sebastian Vettel successfully defended his World Championship, winning his fourth consecutive title in the fourth to last race of 2013. In doing so he became the third driver in Formula One's sixty-four years to win four consecutive World Drivers' Championships. It was one of the most dominant championship victories in the sport and the last won by a Red Bull driver until 2021 with Max Verstappen, it remains the last for a Renault-powered driver, as of October 2025. Vettel won the championship by a then-record 155 points, which was broken 10 years later by Max Verstappen. Vettel's 2013 season performance additionally saw him recognised by the Laureus World Sports Awards as the Sportsman of the Year, the second racing driver to be so recognised. He became the fourth driver to win at least four titles along with Alain Prost, Juan Manuel Fangio and Michael Schumacher.
        Vettel tied Schumacher's season record of 13 race wins and closed out the year with nine consecutive victories. 2013 would turn out to be the end of his title run, with Vettel remaining at four titles until his retirement in 2022. Fernando Alonso finished second in the championship for Ferrari for the third time in four seasons, which would also be the last time he would win a race or end up on the championship podium for at least nine years. Vettel's team Red Bull Racing, with the assistance of his teammate Mark Webber, successfully defended their World Constructors' Championship at the same race as their lead driver secured his title. Webber, who competed in his final season in Formula One, finished third before announcing his retirement having amassed nine Grand Prix wins across his twelve seasons in Formula One.
        This was also the last year that the largely Constructors' Championship-based car numbering system introduced in 1996 was used. From 2014 drivers would be allowed to pick a permanent car number between 2 and 99 for their whole career.

        ## Result 9
        Title: List of Formula One circuits
        URL: https://en.wikipedia.org/wiki/List_of_Formula_One_circuits
        Extract: Formula One, abbreviated to F1, is currently the highest class of open-wheeled auto racing defined by the Fédération Internationale de l'Automobile (FIA), motorsport's world governing body. The "formula" in the name refers to a set of rules to which all participants and vehicles must conform. The Formula One World Championship season consists of a series of races, known as Grands Prix, usually held on purpose-built circuits, and in a few cases on closed city streets. The results of each race are combined to determine two annual championships, one for drivers (World Drivers' Championship), and one for constructors (World Constructors' Championship).
        This list is for the circuits that hosted World Championship races from 1950 until now.

        ## Result 10
        Title: 2003 Formula One World Championship
        URL: https://en.wikipedia.org/wiki/2003_Formula_One_World_Championship
        Extract: The 2003 FIA Formula One World Championship was the 57th season of FIA Formula One motor racing. It featured the 2003 Formula One World Championship for Drivers and the 2003 Formula One World Championship for Constructors, which were contested concurrently over a sixteen-race series that commenced on 9 March and ended on 12 October.
        Defending champions Michael Schumacher and Scuderia Ferrari were again awarded the World Drivers' Championship and World Constructors' Championship, respectively. Schumacher's closest competitors were Kimi Räikkönen, driving for McLaren, and Juan Pablo Montoya, driving for Williams. It was Schumacher's sixth World Drivers' title overall, breaking Juan Manuel Fangio's 46-year-old record.
        This was also the first season to introduce a new points system during which the points from Sunday's race were allocated to the top 8 drivers on a 10–8–6–5–4–3–2–1-basis, with the points system being valid until the end of 2009 ahead of another major overhaul in terms of the scoring system in 2010.
