        ## Result 1
        Title: Sydney Opera House
        URL: https://en.wikipedia.org/wiki/Sydney_Opera_House
        Extract: The Sydney Opera House is a multi-venue performing arts centre in Sydney, New South Wales, Australia. Located on the foreshore of Sydney Harbour, it is widely regarded as one of the world's most famous and distinctive buildings, and a masterpiece of 20th-century architecture.
        Designed by Danish architect Jørn Utzon and completed by an Australian architectural team headed by Peter Hall, the building was formally opened by Queen Elizabeth II on 20 October 1973, 16 years after Utzon's 1957 selection as winner of an international design competition. The Government of New South Wales, led by the premier, Joseph Cahill, authorised work to begin in 1958 with Utzon directing construction. The government's decision to build Utzon's design is often overshadowed by circumstances that followed, including cost and scheduling overruns as well as the architect's ultimate resignation.
        The building and its surrounds occupy the whole of Bennelong Point on Sydney Harbour, between Sydney Cove and Farm Cove, adjacent to the Sydney central business district and the Royal Botanic Garden, and near to the Sydney Harbour Bridge.
        The building comprises multiple performance venues, which together host over 1,800 performances annually, attended by more than 1.4 million people. Performances are presented by numerous performing artists, with many resident companies such as Opera Australia, the Sydney Theatre Company and the Sydney Symphony Orchestra. As one of the most popular visitor attractions in Australia, the site is visited by more than ten million people annually, and approximately 350,000 visitors take a guided tour of the building each year. The building is managed by the Sydney Opera House Trust, an agency of the New South Wales State Government.
        In 2007, the Sydney Opera House became a UNESCO World Heritage Site, having been listed on the (now defunct) Register of the National Estate since 1980, the National Trust of Australia register since 1983, the City of Sydney Heritage Inventory since 2000, the New South Wales State Heritage Register since 2003, and the Australian National Heritage List since 2005. The Opera House was also a finalist in the New 7 Wonders of the World campaign list.

        ## Result 2
        Title: Government House, Sydney
        URL: https://en.wikipedia.org/wiki/Government_House,_Sydney
        Extract: Government House is the heritage-listed vice-regal residence of the governor of New South Wales. It is located on Conservatorium Road in the Sydney central business district, adjacent to the Royal Botanic Garden, and is situated south of the Sydney Opera House, overlooking Sydney Harbour. Constructed between 1837 and 1843, the property has been the primary vice-regal residence of the Governor since Sir George Gipps, except for two brief periods; the first between 1901 and 1914, when the property was leased to the Commonwealth of Australia as the residence of the Governor-General of Australia, and the second from 1996 to 2011.
        The property was returned as the Governor's residence in October 2011 and was managed by the Historic Houses Trust of New South Wales from March 1996 to December 2013. Completed in 1847 and constructed in the Gothic revival style, the building is listed on the New South Wales State Heritage Register.

        ## Result 3
        Title: Circular Quay
        URL: https://en.wikipedia.org/wiki/Circular_Quay
        Extract: Circular Quay is a harbour, former working port and now international passenger shipping terminal, public piazza and tourism precinct, heritage area, and transport node in Sydney, New South Wales, Australia. It is located on the northern edge of the Sydney central business district on Sydney Cove, between Bennelong Point and The Rocks. It is part of the local government area of the City of Sydney.
        The Circular Quay area is a popular neighbourhood for tourism and consists of walkways, pedestrian malls, parks and restaurants. It hosts a number of ferry wharves, bus stops, and a railway station. Often referred to as the "gateway to Sydney", the precinct has views of the Sydney Harbour Bridge and the Sydney Opera House and is a common location for viewing Sydney New Year's Eve fireworks.

        ## Result 4
        Title: Sydney
        URL: https://en.wikipedia.org/wiki/Sydney
        Extract: Sydney is the capital city of the state of New South Wales, and the most populous city in Australia. Located on Australia's east coast, the metropolis surrounds Sydney Harbour and extends about 80 kilometres (50 mi) from the Pacific Ocean in the east to the Blue Mountains in the west, and about 80 kilometres (50 mi) from Ku-ring-gai Chase National Park and the Hawkesbury River in the north and north-west, to the Royal National Park and Macarthur in the south and south-west. Greater Sydney consists of 658 suburbs, spread across 33 local government areas. Residents of the city are colloquially known as "Sydneysiders". The estimated population in June 2025 was 5,638,830, which is about 66% of the state's population. The city's nicknames include the Emerald City and the Harbour City.
        There is evidence that Aboriginal Australians inhabited the Greater Sydney region at least 30,000 years ago, and their engravings and cultural sites are common. The traditional custodians of the land on which modern Sydney stands are the clans of the Darug, Dharawal and Eora. During his first Pacific voyage in 1770, James Cook charted the eastern coast of Australia, making landfall at Botany Bay. In 1788, the First Fleet of convicts, led by Arthur Phillip, founded Sydney as a British penal colony, the first European settlement in Australia. After World War II, Sydney experienced mass migration and by 2021 over 40 per cent of the population was born overseas. Foreign countries of birth with the greatest representation are mainland China, India, the United Kingdom, Vietnam and the Philippines.
        Despite being one of the most expensive cities in the world, Sydney frequently ranks in the top ten most liveable cities. It is classified as an Alpha+ city by the Globalization and World Cities Research Network, indicating its influence in the region and throughout the world. Ranked eleventh in the world for economic opportunity, Sydney has an advanced market economy with strengths in education, finance, manufacturing and tourism. The University of Sydney and the University of New South Wales are ranked 18th and 19th in the world respectively.
        Sydney has hosted major international sporting events such as the 2000 Summer Olympics, the 2003 Rugby World Cup Final, and the 2023 FIFA Women's World Cup Final. The city is among the top fifteen most-visited cities worldwide, with millions of tourists coming each year to see the city's landmarks. The city has over 1,000,000 ha (2,500,000 acres) of nature reserves and parks, and its notable natural features include Sydney Harbour and Royal National Park. The Sydney Harbour Bridge and the World Heritage-listed Sydney Opera House are major tourist attractions. Central Station is the hub of Sydney's suburban train, metro and light rail networks and longer-distance services. The main passenger airport serving the city is Kingsford Smith Airport, one of the world's oldest continually operating airports.

        ## Result 5
        Title: Planning fallacy
        URL: https://en.wikipedia.org/wiki/Planning_fallacy
        Extract: The planning fallacy is a phenomenon in which predictions about how much time will be needed to complete a future task display an optimism bias and underestimate the time needed. This phenomenon sometimes occurs regardless of the individual's knowledge that past tasks of a similar nature have taken longer to complete than generally planned. The bias affects predictions only about one's own tasks. On the other hand, when outside observers predict task completion times, they tend to exhibit a pessimistic bias, overestimating the time needed. The planning fallacy involves estimates of task completion times more optimistic than those encountered in similar projects in the past.

        The planning fallacy was first proposed by Daniel Kahneman and Amos Tversky in 1979. In 2003, Lovallo and Kahneman proposed an expanded definition as the tendency to underestimate the time, costs, and risks of future actions and at the same time overestimate the benefits of the same actions. According to this definition, the planning fallacy results in not only time overruns, but also cost overruns and benefit shortfalls.

