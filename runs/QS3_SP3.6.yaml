        \ Gate section, a few meters from the Berlin Wall, reopened on 22 December\
        \ 1989, with full demolition of the Wall beginning on 13 June 1990 and concluding\
        \ in 1994. The fall of the Berlin Wall paved the way for German reunification,\
        \ which formally took place on 3 October 1990.\n\n## Result 3\nTitle: List\
        \ of Berlin Wall segments\nURL: https://en.wikipedia.org/wiki/List_of_Berlin_Wall_segments\n\
        Extract: Segments of the Berlin Wall have been given to various institutions\
        \ since the fall of the wall on November 9, 1989. Segments are occasionally\
        \ moved, so locations shown may not be accurate.\n\n## Result 4\nTitle: The\
        \ Wall – Live in Berlin\nURL: https://en.wikipedia.org/wiki/The_Wall_%E2%80%93_Live_in_Berlin\n\
        Extract: The Wall – Live in Berlin was a live concert performance by the English\
        \ rock musician Roger Waters and numerous guest artists, of Pink Floyd's eleventh\
        \ studio album The Wall (1979), itself largely written by Waters during his\
        \ time with the band. The show was held in Berlin on 21 July 1990, to commemorate\
        \ the fall of the Berlin Wall eight months earlier. A live album of the concert\
        \ was released in September 1990. A video of the concert was also commercially\
        \ released.\n\n## Result 5\nTitle: Berlin Wall graffiti art\nURL: https://en.wikipedia.org/wiki/Berlin_Wall_graffiti_art\n\
        Extract: The Berlin Wall was the site of a large volume of artwork during\
        \ its existence. Its highly contentious nature made it a popular place of\
        \ political and cultural expression. After its reconstruction in the 1980s,\
        \ graffiting on the wall became popular for artists worldwide and the art\
        \ made it a common tourist destination. Only the West Berlin side of the wall\
        \ had artwork, as citizens of East Berlin were not allowed to get close enough\
        \ to the wall to paint on it. \nOne of the first artists to paint on the wall\
        \ was Thierry Noir, who sought to express the emotions surrounding its presence.\
        \ It was one of the largest canvases in the world, and much of the artwork\
        \ was not claimed by artists. Almost all of the wall has been removed and\
        \ it only exists in places such as Potsdamer Platz, the East Side Gallery,\
        \ and Bernauer Straße; many segments are now exhibited in other countries;\
        \ see List of Berlin Wall segments.\n\n## Result 6\nTitle: List of deaths\
        \ at the Berlin Wall\nURL: https://en.wikipedia.org/wiki/List_of_deaths_at_the_Berlin_Wall\n\
        Extract: There were numerous deaths at the Berlin Wall, which stood as a barrier\
        \ between West Berlin and East Berlin from 13 August 1961 until 9 November\
        \ 1989. Before the construction of the Berlin Wall in 1961, 3.5 million East\
        \ Germans circumvented Eastern Bloc emigration restrictions, many by crossing\
        \ over the border from East Berlin into West Berlin. From there they could\
        \ then travel to West Germany and other Western European countries. Between\
        \ 1961 and 1989, the Wall prevented almost all such emigration.\nThe state-funded\
        \ Centre for Contemporary History (ZZF) in Potsdam has confirmed that \"at\
        \ least 140 people were killed at the Berlin Wall or died under circumstances\
        \ directly connected with the GDR border regime\", including people attempting\
        \ to escape, border guards, and innocent parties; however, researchers at\
        \ the Checkpoint Charlie Museum have estimated the death toll to be significantly\
        \ higher.\n\nEscape attempts claimed the lives of many, from a child as young\
        \ as one to an 80-year-old woman, and many died because of the accidental\
        \ or illegal actions of the guards. In numerous legal cases throughout the\
        \ 1990s, several border guards, along with political officials responsible\
        \ for the defence policies, were found guilty of manslaughter and served probation\
        \ or were jailed for their role in the Berlin Wall deaths.\n\n## Result 7\n\
        Title: Battle of Berlin\nURL: https://en.wikipedia.org/wiki/Battle_of_Berlin\n\
        Extract: The Battle of Berlin, designated as the Berlin Strategic Offensive\
        \ Operation by the Soviet Union, and also known as the Fall of Berlin, was\
        \ one of the last major offensives of the European theatre of World War II.\n\
        After the Vistula–Oder Offensive of January–February 1945, the Red Army had\
        \ temporarily halted on a line 60 km (37 mi) east of Berlin. On 9 March, Germany\
        \ established its defence plan for the city with Operation Clausewitz. The\
        \ first defensive preparations at the outskirts of Berlin were made on 20\
        \ March, under the newly appointed commander of Army Group Vistula, General\
        \ Gotthard Heinrici.\nWhen the Soviet offensive resumed on 16 April, two Soviet\
        \ fronts (army groups) attacked Berlin from the east and south, while a third\
        \ overran German forces positioned north of Berlin. Before the main battle\
        \ in Berlin commenced, the Red Army encircled the city after successful battles\
        \ of the Seelow Heights and Halbe. On 20 April 1945, Hitler's birthday, the\
        \ 1st Belorussian Front led by Marshal Georgy Zhukov, advancing from the east\
        \ and north, started shelling Berlin's city centre, while Marshal Ivan Konev's\
        \ 1st Ukrainian Front broke through Army Group Centre and advanced towards\
        \ the southern suburbs of Berlin. On 23 April General Helmuth Weidling assumed\
        \ command of the forces within Berlin. The garrison consisted of several depleted\
        \ and disorganised Army and Waffen-SS divisions, along with poorly trained\
        \ Volkssturm and Hitler Youth members. Over the course of the next week, the\
        \ Red Army gradually took the entire city.\nOn 30 April, Hitler killed himself.\
        \ The city's garrison surrendered on 2 May but fighting continued to the north-west,\
        \ west, and south-west of the city until the end of the war in Europe on 8\
        \ May (9 May in the Soviet Union) as some German units fought westward so\
        \ that they could surrender to the Western Allies rather than to the Soviets.\n\
        \n## Result 8\nTitle: Beloved Berlin Wall\nURL: https://en.wikipedia.org/wiki/Beloved_Berlin_Wall\n\
        Extract: Beloved Berlin Wall (German: Liebe Mauer) is a 2009 German romantic\
        \ comedy drama film written and directed by Peter Timm. It is set during the\
        \ fall of the Berlin Wall.\n\n## Result 9\nTitle: Tear down this wall!\nURL:\
        \ https://en.wikipedia.org/wiki/Tear_down_this_wall!\nExtract: On June 12,\
        \ 1987, at the Brandenburg Gate, then-United States president Ronald Reagan\
        \ delivered a speech commonly known by a key line from the middle part: \"\
        Mr. Gorbachev, tear down this wall!\" Reagan called for Soviet leader Mikhail\
        \ Gorbachev to open the Berlin Wall, which had encircled West Berlin since\
        \ 1961.\nThe following day, The New York Times carried Reagan’s picture on\
        \ the front page, below the title \"Reagan Calls on Gorbachev to Tear Down\
        \ the Berlin Wall\". In the post-Cold War era, it was often seen as one of\
        \ the most memorable performances of an American president in Berlin after\
        \ John F. Kennedy's 1963 speech \"Ich bin ein Berliner\". Reagan's speech\
        \ was written by Peter Robinson.\n\n## Result 10\nTitle: Brandenburg Gate\n\
        URL: https://en.wikipedia.org/wiki/Brandenburg_Gate\nExtract: The Brandenburg\
        \ Gate (German: Brandenburger Tor [ˈbʁandn̩ˌbʊʁɡɐ ˈtoːɐ̯] ) is an 18th-century\
        \ neoclassical monument in Berlin, Germany. One of the best-known landmarks\
        \ of the country, it was erected on the site of a former city gate that marked\
        \ the start of the road from Berlin to Brandenburg an der Havel, the former\
        \ capital of the Margraviate of Brandenburg. The current structure was built\
        \ from 1788 to 1791 by orders of King Frederick William II of Prussia, based\
        \ on designs by the royal architect Carl Gotthard Langhans. The bronze sculpture\
        \ of the quadriga crowning the gate is a work by the sculptor Johann Gottfried\
        \ Schadow.\nThe Brandenburg Gate is located in the western part of the city\
        \ centre within Mitte, at the junction of Unter den Linden and Ebertstraße.\
        \ The gate dominates the Pariser Platz to the east, while to the immediate\
        \ west it opens onto the Platz des 18. März beyond which the Straße des 17.\
        \ Juni begins. One block to the north stands the Reichstag building, home\
        \ to the German parliament (Bundestag), and further to the west is the Tiergarten\
        \ inner-city park. The gate also forms the monumental entry to Unter den Linden,\
        \ which leads directly to the former City Palace of the Prussian monarchs\
        \ (now housing the Humboldt Forum museum), and Berlin Cathedral.\nThroughout\
        \ its existence, the Brandenburg Gate was often a site for major historical\
        \ events. After World War II and during the Cold War, until its fall in 1989,\
        \ the Berlin Wall obstructed the gateway, and was for almost three decades\
        \ a marker of the city's division. Since German reunification in 1990, it\
        \ has been considered not only a symbol of the tumultuous histories of Germany\
        \ and Europe, but also of European unity and peace."
