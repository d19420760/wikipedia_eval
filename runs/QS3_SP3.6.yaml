        \ ''[[Hispanic and Latino Americans|Hispanic or Latino]] (of any race)'' ||\
        \ 3,206 || 10.0%\n|}\n\nIthaca is the principal city of the Ithaca-Cortland\
        \ Combined Statistical Area, which includes the Ithaca Metropolitan Statistical\
        \ Area ([[Tompkins County, New York|Tompkins County]]) and the Cortland Micropolitan\
        \ Statistical Area ([[Cortland County, New York|Cortland County]]),<ref>{{cite\
        \ web|url=https://www.census.gov/population/www/estimates/metro_general/2006/List4.txt\
        \ |title=Archived copy |access-date=May 26, 2007 |url-status=dead |archive-url=https://web.archive.org/web/20070526063716/http://www.census.gov/population/www/estimates/metro_general/2006/List4.txt\
