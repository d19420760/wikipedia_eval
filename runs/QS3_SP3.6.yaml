        URL: https://en.wikipedia.org/wiki/Interrogational_torture
        Extract: Interrogational torture is the use of torture to obtain information in interrogation, as opposed to the use of torture to extract a forced confession, regardless of whether it is true or false. Torture has been used throughout history during interrogation, although it is now illegal and a violation of international law.
        Beyond torture's moral repugnance, most experts who study interrogation consider torture an ineffective and counterproductive means of gathering accurate information, because it frequently generates false or misleading information and impairs subsequent information collection.

