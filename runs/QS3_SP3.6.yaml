        \ has its own constitution and government. All states and their residents\
        \ are represented in the federal Congress, a bicameral legislature consisting\
        \ of the Senate and the House of Representatives. Each state elects two senators,\
        \ while representatives are distributed among the states in proportion to\
        \ the most recent constitutionally mandated decennial census. \nEach state\
        \ is entitled to select a number of electors to vote in the Electoral College,\
