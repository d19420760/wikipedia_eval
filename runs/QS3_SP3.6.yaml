        ## Result 1
        Title: Saturn
        URL: https://en.wikipedia.org/wiki/Saturn
        Extract: Saturn is the sixth planet from the Sun and the second largest in the Solar System, after Jupiter. It is a gas giant, with an average radius of about 9 times that of Earth. It has an eighth of the average density of Earth, but is over 95 times more massive. Even though Saturn is almost as big as Jupiter, Saturn has less than a third of its mass. Saturn orbits the Sun at a distance of 9.59 AU (1,434 million km), with an orbital period of 29.45 years.
        Saturn's interior is thought to be composed of a rocky core, surrounded by a deep layer of metallic hydrogen, an intermediate layer of liquid hydrogen and liquid helium, and an outer layer of gas. Saturn has a pale yellow hue, due to ammonia crystals in its upper atmosphere. An electrical current in the metallic hydrogen layer is thought to give rise to Saturn's planetary magnetic field, which is weaker than Earth's, but has a magnetic moment 580 times that of Earth because of Saturn's greater size. Saturn's magnetic field strength is about a twentieth that of Jupiter. The outer atmosphere is generally bland and lacking in contrast, although long-lived features can appear. Wind speeds on Saturn can reach 1,800 kilometres per hour (1,100 miles per hour).
        The planet has a bright and extensive system of rings, composed mainly of ice particles, with a smaller amount of rocky debris and dust. At least 292 moons orbit the planet, of which 63 are officially named; these do not include the hundreds of moonlets in the rings. Titan, Saturn's largest moon and the second largest in the Solar System, is larger (but less massive) than the planet Mercury and is the only moon in the Solar System that has a substantial atmosphere.

        ## Result 2
        Title: Moons of Saturn
        URL: https://en.wikipedia.org/wiki/Moons_of_Saturn
        Extract: Saturn has 292 moons with confirmed orbits as of 9 April 2026, the most of any planet in the Solar System. Saturn's moons are diverse in size, ranging from tiny moonlets to Titan, which is larger than the planet Mercury and the second largest moon in the Solar System. Three of these moons possess particularly notable features: Titan has a nitrogen-rich, Earth-like atmosphere and a landscape featuring river networks and hydrocarbon lakes, Enceladus emits jets of ice from its south-polar region and is covered in a deep layer of snow, and Iapetus has contrasting black and white hemispheres as well as an extensive ridge of equatorial mountains which are among the tallest in the Solar System.
        Twenty-four of the confirmed moons are regular satellites; they have prograde orbits not greatly inclined to Saturn's equatorial plane (except Iapetus, which has a prograde but significantly inclined orbit). They include the seven rounded satellites, and four small moons that exist in a trojan orbit with some of the large moons. Four orbit inside of the diffuse G ring or between the major moons Mimas and Enceladus. Two moons are mutually co-orbital, Janus and Epimetheus. The relatively large Hyperion is locked in an orbital resonance with Titan. The remaining regular moons orbit near the edges of or within gaps in the main rings, some of which act as shepherd moons of the dense A Ring and the narrow F Ring. The regular satellites are traditionally named after Titans and Titanesses or other figures associated with the mythological Saturn, and one, S/2009 S 1, remains unnamed.
        The remaining 268 moons, with mean diameters ranging from 2 to 213 km (1 to 132 mi), orbit much farther from Saturn. They are irregular satellites, which have high orbital inclinations and eccentricities mixed between prograde and retrograde. These moons are probably captured minor planets, or fragments from the collisional breakup of such bodies after they were captured, creating collisional families. The irregular satellites are classified by their orbital characteristics into the prograde Inuit and Gallic groups and the large retrograde Norse group, and their names are chosen from the corresponding mythologies (with the Gallic group corresponding to Celtic mythology). Phoebe, the largest irregular Saturnian moon, is the sole exception to this naming system; it is part of the Norse group but named for a Greek Titaness. As of April 2026, 228 of Saturn's irregular moons are unnamed.
        The rings of Saturn are made of objects ranging in size from microscopic to moonlets hundreds of meters across, each in its own orbit around Saturn. The number of moons given above does not include these moonlets, nor hundreds of possible kilometer-sized distant moons that have been observed on single occasions. Thus an absolute number of Saturnian moons cannot be given, because there is no consensus on a boundary between the countless small unnamed objects that form Saturn's ring system and the larger objects that have been named as moons. Over 150 moonlets embedded in the rings have been detected by the disturbance they create in the surrounding ring material, though this is thought to be only a small sample of the total population of such objects.

        ## Result 3
        Title: Planet
        URL: https://en.wikipedia.org/wiki/Planet
        Extract: A planet is a large, rounded astronomical body that is generally required to be in orbit around a star, stellar remnant, or brown dwarf, and is not one itself. The Solar System has eight planets by the most restrictive definition of the term: the terrestrial planets Mercury, Venus, Earth, and Mars, and the giant planets Jupiter, Saturn, Uranus, and Neptune. The best available theory of planet formation is the nebular hypothesis, which posits that an interstellar cloud collapses out of a nebula to create a young protostar orbited by a protoplanetary disk. Planets grow in this disk by the gradual accumulation of material driven by gravity, a process called accretion.
        The word planet comes from the Greek πλανήται (planḗtai) 'wanderers'. In antiquity, this word referred to the Sun, Moon, and five points of light visible to the naked eye that moved across the background of the stars—namely, Mercury, Venus, Mars, Jupiter, and Saturn. Planets have historically had religious associations: multiple cultures identified celestial bodies with gods, and these connections with mythology and folklore persist in the schemes for naming newly discovered Solar System bodies. Earth itself was recognized as a planet when heliocentrism supplanted geocentrism during the 16th and 17th centuries.
        With the development of the telescope, the meaning of planet broadened to include objects only visible with assistance: the moons of the planets beyond Earth; the ice giants Uranus and Neptune; Ceres and other bodies later recognized to be part of the asteroid belt; and Pluto, later found to be the largest member of the collection of icy bodies known as the Kuiper belt. The discovery of other large objects in the Kuiper belt, particularly Eris, spurred debate about how exactly to define a planet. In 2006, the International Astronomical Union (IAU) adopted a definition of a planet in the Solar System, placing the four terrestrial planets and the four giant planets in the planet category; Ceres, Pluto, and Eris are in the category of dwarf planet. Many planetary scientists have nonetheless continued to apply the term planet more broadly, including dwarf planets as well as rounded satellites like the Moon.
        Further advances in astronomy led to the discovery of over 5,900 planets outside the Solar System, termed exoplanets. These often show unusual features that the Solar System planets do not show, such as hot Jupiters—giant planets that orbit close to their parent stars, like 51 Pegasi b—and extremely eccentric orbits, such as HD 20782 b. The discovery of brown dwarfs and planets larger than Jupiter also spurred debate on the definition, regarding where exactly to draw the line between a planet and a star. Multiple exoplanets have been found to orbit in the habitable zones of their stars (where liquid water can potentially exist on a planetary surface), but Earth remains the only planet known to support life. Such a habitable zone is complicated by many factors, such as the atmospheric composition (if there is an atmosphere) of the planet; Mars, for example, has the temperature during the day to form liquid water on its surface on the equator, if only the pressure were higher.

        ## Result 4
        Title: Saturn in fiction
        URL: https://en.wikipedia.org/wiki/Saturn_in_fiction
        Extract: Saturn has made appearances in fiction since the 1752 novel Micromégas by Voltaire. In the earliest depictions, it was portrayed as having a solid surface rather than its actual gaseous composition. In many of these works, the planet is inhabited by aliens that are usually portrayed as being more advanced than humans. In modern science fiction, the Saturnian atmosphere sometimes hosts floating settlements. The planet is occasionally visited by humans and its rings are sometimes mined for resources.
        The moons of Saturn have been depicted in a large number of stories, especially Titan with its Earth-like environment suggesting the possibility of colonization by humans and alien lifeforms living there. A recurring theme has been depicting Titanian lifeforms as slug-like.

        ## Result 5
        Title: Saturn (Rubens)
        URL: https://en.wikipedia.org/wiki/Saturn_(Rubens)
        Extract: Saturn or Saturn Devouring His Son is a 1636 painting by the Flemish artist Peter Paul Rubens, now in the Museo del Prado, in Madrid.
        It was commissioned for the Torre de la Parada by Philip IV of Spain and shows the influence of Michelangelo on Rubens, which he had picked up on his journey to Italy. The three stars at the top of the painting represent the planet Saturn as described by Galileo a few years before its painting. The central star is the planet itself, while the two others represent what he thought were two stars aligned with the planet. In reality, these were the rings around the planet, which his telescope was not powerful enough to distinguish.
        The painting represents the Greek myth of the titan Cronus devouring his children. In the original myth, Cronus swallowed his children whole, and later spit them out, also whole. The painting, however, shows Cronus taking a bite out of one of his children.

        ## Result 6
        Title: Rings of Saturn
        URL: https://en.wikipedia.org/wiki/Rings_of_Saturn
        Extract: Saturn has the most extensive and complex ring system of any planet in the Solar System. The rings consist of particles in orbit around the planet, ranging from micrometers to meters in size, and are made almost entirely of water ice, with a trace component of rocky material.
        Though light reflected from the rings increases Saturn's apparent brightness, they are not themselves visible from Earth with the naked eye. In 1610, the year after his first observations with a telescope, Galileo Galilei became the first person to observe Saturn's rings, though he could not see them well enough to discern their true nature. In 1655, Christiaan Huygens was the first person to describe them as a disk surrounding Saturn. The concept that Saturn's rings are made up of a series of tiny ringlets can be traced to Pierre-Simon Laplace.
        The rings have numerous gaps where particle density drops sharply. Two of these are cleared by moons embedded within them, and many others are at locations of known destabilizing orbital resonances with the moons of Saturn. Other gaps remain unexplained. Stabilizing resonances, on the other hand, are responsible for the longevity of several rings, such as the Titan Ringlet and the G Ring. Well beyond the main rings is the Phoebe ring, which is believed to originate from Phoebe and thus shares its retrograde orbital motion. It is aligned with the plane of Saturn's orbit. Saturn has an axial tilt of 27 degrees, so this ring is tilted at an angle of 27 degrees to the more visible rings orbiting above Saturn's equator.
        There is no consensus as to when the rings formed: while investigations using theoretical models suggested they formed early in the Solar System's existence, newer data from Cassini suggests a more recent date of formation.

        ## Result 7
        Title: Classical planet
        URL: https://en.wikipedia.org/wiki/Classical_planet
        Extract: A classical planet is an astronomical object that is visible to the naked eye and moves across the sky and its backdrop of fixed stars (the common stars which seem still in contrast to the planets), appearing as wandering stars. Visible to humans on Earth there are seven classical planets (the seven luminaries). They are from brightest to dimmest: the Sun, the Moon, Venus, Jupiter, Mercury, Mars and Saturn.
        Greek astronomers such as Geminus and Ptolemy recorded these classical planets during classical antiquity, introducing the term planet, which means 'wanderer' in Greek (πλάνης planēs and πλανήτης planētēs), expressing the fact that these objects move across the celestial sphere relative to the fixed stars. Therefore, the Greeks were the first to document the astrological connections to the planets' visual detail.
        Through the use of telescopes other celestial objects like the classical planets were found, starting with the Galilean moons in 1610. Today the term planet is used considerably differently, with a planet being defined as a natural satellite directly orbiting the Sun (or other stars) and having cleared its own orbit. Therefore, only five of the seven classical planets remain recognized as planets, alongside Earth, Uranus, and Neptune.

        ## Result 8
        Title: Saturn return
        URL: https://en.wikipedia.org/wiki/Saturn_return
        Extract: In horoscopic astrology, a Saturn return is an astrological transit that occurs when the planet Saturn returns to the same position that it occupied at the moment of a person's birth. While Saturnian return is most often discussed in terms of the first return, which occurs in one's late 20s, Saturn returns again in one's 50s and 80s. While the planet takes 29 years to reach the same ecliptic longitude, the influence of the Saturn return is in effect for a few years; Saturn's first return is seen as influential from ages 27 to 30.
        Psychologically, Saturn return is associated with self-discovery and reevaluating one's priorities. The first Saturn return is seen as the time of reaching full adulthood, and being faced, perhaps for the first time, with adult challenges and responsibilities.

        ## Result 9
        Title: Magnetosphere of Saturn
        URL: https://en.wikipedia.org/wiki/Magnetosphere_of_Saturn
        Extract: The magnetosphere of Saturn is the cavity created in the flow of the solar wind by the planet's internally generated magnetic field. Discovered in 1979 by the Pioneer 11 spacecraft, Saturn's magnetosphere is the second largest of any planet in the Solar System after Jupiter's. The magnetopause, the boundary between Saturn's magnetosphere and the solar wind, is located at a distance of about 20 Saturn radii from the planet's center, while its magnetotail stretches hundreds of Saturn radii behind it.
        Saturn's magnetosphere is filled with plasmas originating from both the planet and its moons. The main source is the small moon Enceladus, which ejects as much as 1,000 kg/s of water vapor from the geysers on its south pole, a portion of which is ionized and forced to co-rotate with the Saturn's magnetic field. This loads the field with as much as 100 kg of water group ions per second. This plasma gradually moves out from the inner magnetosphere via the interchange instability mechanism and then escapes through the magnetotail.
        The interaction between Saturn's magnetosphere and the solar wind generates bright oval aurorae around the planet's poles observed in visible, infrared and ultraviolet light. The aurorae are related to the powerful saturnian kilometric radiation (SKR), which spans the frequency interval between 100 kHz to 1300 kHz and was once thought to modulate with a period equal to the planet's rotation. However, later measurements showed that the periodicity of the SKR's modulation varies by as much as 1%, and so probably does not exactly coincide with Saturn's true rotational period, which as of 2010 remains unknown. Inside the magnetosphere there are radiation belts, which house particles with energy as high as tens of megaelectronvolts. The energetic particles have significant influence on the surfaces of inner icy moons of Saturn.
        In 1980–1981 the magnetosphere of Saturn was studied by the Voyager spacecraft. Up until September 2017 it was a subject of ongoing investigation by Cassini mission, which arrived in 2004 and spent over 13 years observing the planet.

        ## Result 10
        Title: Giant planet
        URL: https://en.wikipedia.org/wiki/Giant_planet
        Extract: A giant planet is a diverse type of planet much larger than Earth. It is sometimes referred to as a jovian planet, with Jove being another name for the Roman god Jupiter. Giant planets are usually primarily composed of low-boiling point materials (volatiles), rather than rock or other solid matter, but mega-Earths do also exist. There are four such giant planets in the Solar System: Jupiter, Saturn, Uranus, and Neptune. Many extrasolar giant planets have been identified.
        Giant planets are sometimes known as gas giants, but many astronomers now apply the term only to Jupiter and Saturn, classifying Uranus and Neptune, which have different compositions, as ice giants. Both names are potentially misleading; the Solar System's giant planets all consist primarily of fluids above their critical points, where distinct gas and liquid phases do not exist. Jupiter and Saturn are principally made of hydrogen and helium, whilst Uranus and Neptune consist of water, ammonia, and methane.
        The defining differences between a very low-mass brown dwarf and a massive gas giant (~13 MJ) are debated. One school of thought is based on planetary formation; the other, on the physics of the interior of planets. Part of the debate concerns whether brown dwarfs must, by definition, have experienced nuclear fusion at some point in their history.
