        The defence spending of the United States is more than double the defence spending of all other NATO members combined. (Note that this is total U.S. defense spending, not spending specifically for NATO)<ref>{{Cite news |last=Friedman |first=George |author-link=George Friedman |date=2017-01-24 |title=Where Does The Relationship Between NATO And The U.S. Go From Here? |url=https://www.huffpost.com/entry/nato-and-the-united-states_b_5887844be4b08f5134b624ca |access-date=2024-01-29 |work=[[Huffington Post]] |language=en |archive-date=29 January 2024 |archive-url=https://web.archive.org/web/20240129011419/https://www.huffpost.com/entry/nato-and-the-united-states_b_5887844be4b08f5134b624ca |url-status=live }}</ref> Criticism of the fact that many member states were not contributing their fair share in accordance with the international agreement by then US&nbsp;president [[Donald Trump]] caused various reactions from American and European political figures, ranging from ridicule to panic.<ref>{{Cite news |last1=Birnbaum |first1=Michael |last2=Gibbons-Neff |first2=Thomas |date=2023-04-08 |title=NATO allies boost defense spending in the wake of Trump criticism |url=https://www.washingtonpost.com/world/nato-allies-boost-defense-spending-in-the-wake-of-trump-criticism/2017/06/28/153584de-5a8c-11e7-aa69-3964a7d55207_story.html |access-date=2024-01-29 |newspaper=[[Washington Post]] |language=en-US |issn=0190-8286 |archive-date=1 September 2022 |archive-url=https://web.archive.org/web/20220901044621/https://www.washingtonpost.com/world/nato-allies-boost-defense-spending-in-the-wake-of-trump-criticism/2017/06/28/153584de-5a8c-11e7-aa69-3964a7d55207_story.html |url-status=live }}</ref><ref>{{Cite news |last=Mortimer |first=Caroline |date=2017-03-19 |title=Ex-US ambassador in withering criticism of Trump on Nato |url=https://www.independent.co.uk/news/world/europe/donald-trump-nato-us-ambassador-ivo-daaalder-germany-funding-eastern-europe-security-poland-a7637611.html |access-date=2024-01-29 |work=[[The Independent]] |language=en |archive-date=3 April 2023 |archive-url=https://web.archive.org/web/20230403132902/https://www.independent.co.uk/news/world/europe/donald-trump-nato-us-ambassador-ivo-daaalder-germany-funding-eastern-europe-security-poland-a7637611.html |url-status=live }}</ref><ref>{{Cite news |last=Ridgwell |first=Henry |date=2017-01-25 |title=Shaken by Trump's Criticism of NATO, Europe Mulls Building Own Military Force |url=https://www.voanews.com/a/shaken-by-trump-s-criticism-of-nato-europe-mulls-building-own-military-force/3691549.html |access-date=2024-01-29 |work=[[Voice Of America]] |language=en |archive-date=3 April 2023 |archive-url=https://web.archive.org/web/20230403233228/https://www.voanews.com/a/shaken-by-trump-s-criticism-of-nato-europe-mulls-building-own-military-force/3691549.html |url-status=live }}</ref> While NATO members have committed to spending at least 2% of their Gross Domestic Product (GDP) on defence, most of them did not meet that goal in 2023.<ref>{{Cite news |last1=Gray |first1=Andrew |last2=Siebold |first2=Sabine |date=2024-02-13 |title= What did Trump say about NATO funding and what is Article 5? |url=https://www.reuters.com/world/what-did-trump-say-about-nato-funding-what-is-article-5-2024-02-12/ |access-date=2024-07-07 }}</ref>

