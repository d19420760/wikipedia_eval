        |2,512\n|885,700\n|61.6\n|{{No}}\n|{{No}}\n|}\n\n==Abbreviations==\n[[Abbreviation]]s\
        \ have been used as a shorthand way of grouping countries by their date of\
        \ accession.\n* '''EU15''' includes the fifteen countries in the European\
        \ Union from 1 January 1995 to 30 April 2004. The EU15 comprised Austria,\
        \ Belgium, Denmark, Finland, France, Germany, Greece, Ireland, Italy, Luxembourg,\
        \ Netherlands, Portugal, Spain, Sweden, and United Kingdom.<ref>{{cite web\
        \ |title=OECD Glossary of Statistical Terms - EU15 Definition |url=https://stats.oecd.org/glossary/detail.asp?ID=6805\
        \ |website=stats.oecd.org |access-date=13 August 2019 |archive-date=26 October\
        \ 2019 |archive-url=https://web.archive.org/web/20191026121115/https://stats.oecd.org/glossary/detail.asp?ID=6805\
        \ |url-status=live }}</ref> [[Eurostat]] still uses this expression.\n*'''EU19'''\
        \ includes the countries in the EU15 as well as the [[Central Europe]]an member\
        \ countries of the OECD: Czech Republic, Hungary, Poland, and Slovak Republic.<ref>{{cite\
        \ web |title=OECD Glossary of Statistical Terms - EU21 Definition |url=https://stats.oecd.org/glossary/detail.asp?ID=7020\
        \ |website=stats.oecd.org |access-date=13 August 2019 |archive-date=31 October\
        \ 2013 |archive-url=https://web.archive.org/web/20131031214734/http://stats.oecd.org/glossary/detail.asp?ID=7020\
        \ |url-status=live }}</ref>\n* '''EU11''' is used to refer to the Central,\
        \ [[Southeastern Europe]] and [[Baltic states|Baltic European]] member states\
        \ that joined in 2004, 2007 and 2013: in 2004 the Czech Republic, Estonia,\
        \ Hungary, Latvia, Lithuania, Poland, the Slovak Republic, and Slovenia; in\
        \ 2007 Bulgaria, Romania; and in 2013 Croatia.<ref>{{Cite journal|last=Vértesy|first=László|date=2018|title=Macroeconomic\
        \ Legal Trends in the EU11 Countries|url=https://www.dialogcampus.hu/users/default/dialogcampus/uploads/elektronikus_konyvek/pga2018_01_09_vertesy.pdf|journal=Public\
        \ Governance, Administration and Finances Law Review|volume= 3. No. 1. 2018|access-date=13\
        \ August 2019|archive-url=https://web.archive.org/web/20190812055105/https://www.dialogcampus.hu/users/default/dialogcampus/uploads/elektronikus_konyvek/pga2018_01_09_vertesy.pdf|archive-date=12\
        \ August 2019|url-status=dead}}</ref><ref>{{Cite web|last1=Loichinger|first1=Elke|last2=Madzarevic-Sujster|first2=Sanja|last3=Vincelette|first3=Gallina\
        \ A.|last4=Laco|first4=Matija|last5=Korczyc|first5=Ewa|date=1 June 2013|title=EU11\
        \ regular economic report|url=http://documents.worldbank.org/curated/en/368771468032372107/EU11-regular-economic-report|language=en|pages=1–92|access-date=13\
        \ August 2019|archive-date=12 August 2019|archive-url=https://web.archive.org/web/20190812083640/http://documents.worldbank.org/curated/en/368771468032372107/EU11-regular-economic-report|url-status=live}}</ref>\n\
        * '''EU27''' means all the member states. It was originally used in this sense\
        \ from 2007 until Croatia's accession in 2013, and during the [[Brexit negotiations]]\
        \ from 2017 until the United Kingdom's withdrawal on 31 January 2020 it came\
        \ to mean all members except the UK.\n* '''EU28''' meant all the member states\
        \ from the accession of Croatia in 2013 to the withdrawal of the United Kingdom\
        \ in 2020.\n\nAdditionally, other abbreviations have been used to refer to\
        \ countries which [[Freedom of movement for workers in the European Union#Summary|had\
        \ limited access to the EU labour market]].<ref>{{Cite news|url=https://news.bbc.co.uk/2/hi/programmes/panorama/4479759.stm|title=Who\
        \ are the \"A8 countries\"?|date=24 April 2005|access-date=1 March 2020|language=en-GB|archive-date=10\
        \ May 2020|archive-url=https://web.archive.org/web/20200510134711/http://news.bbc.co.uk/2/hi/programmes/panorama/4479759.stm|url-status=live}}</ref>\n\
        \n* [[A8 countries|A8]] is eight of the ten countries that joined the EU in\
        \ 2004, Czech Republic, Estonia, Hungary, Latvia, Lithuania, Poland, the Slovak\
        \ Republic, and Slovenia.\n* A2 is the countries that joined the EU in 2007,\
        \ Bulgaria and Romania.\n\n==Changes in membership==\n===Enlargement===\n\
        {{See also|Enlargement of the European Union|Potential enlargement of the\
        \ European Union|Brexit}}\n[[File:EC-EU-enlargement animation.gif|thumb|upright=1.35|Member\
        \ states of the European Union (dark blue) (1993–present). Pre-1993, the EU\
        \ was known as the European Communities (sky blue). Animated in order of accession\
        \ and secession.]]\n\nAccording to the [[Copenhagen criteria]], membership\
        \ of the European Union is open to any European country that is a stable,\
        \ [[free market|free-market]] [[liberal democracy]] that respects the [[rule\
        \ of law]] and human rights. Furthermore, it has to be willing to accept all\
        \ the obligations of membership, such as adopting all previously agreed law\
        \ (the 170,000 pages of [[acquis communautaire]]) and switching to the [[euro]].<ref>{{cite\
        \ web|title=Accession criteria |publisher=[[Europa (web portal)|Europa]] |url=http://ec.europa.eu/enlargement/enlargement_process/accession_process/criteria/index_en.htm\
        \ |access-date=25 August 2008 |url-status=dead |archive-url=https://web.archive.org/web/20080209003613/http://ec.europa.eu/enlargement/enlargement_process/accession_process/criteria/index_en.htm\
        \ |archive-date=9 February 2008}}</ref> For a state to join the European Union,\
        \ the prior approval of all current member states is required.  In addition\
        \ to enlargement by adding new countries, the EU can also expand by having\
        \ territories of member states, which are outside the EU, integrate more closely\
        \ (for example in respect to the [[dissolution of the Netherlands Antilles]])\
        \ or by a territory of a member state which had previously seceded and then\
        \ rejoined (see withdrawal below).\n\n===Suspension===\n{{main|Article 7 of\
        \ the Treaty on European Union}}\nThere is no provision to expel a member\
        \ state, but [[s:Consolidated version of the Treaty on European Union/Title\
        \ I: Common Provisions#Article 7|TEU Article 7]] provides for the suspension\
        \ of certain rights. Introduced in the [[Treaty of Amsterdam]], Article 7\
        \ outlines that if a member persistently breaches the EU's founding principles\
        \ (liberty, democracy, human rights and so forth, outlined in [[s:Consolidated\
        \ version of the Treaty on European Union/Title I: Common Provisions#Article\
        \ 2|TEU Article 2]]) then the [[European Council]] can vote to suspend any\
        \ rights of membership, such as voting and representation. Identifying the\
        \ breach requires unanimity (excluding the state concerned), but sanctions\
        \ require only a qualified majority.<ref name=\"suspend\">[http://eur-lex.europa.eu/summary/glossary/suspension_clause.html\
        \ Suspension clause] {{Webarchive|url=https://web.archive.org/web/20171222220107/http://eur-lex.europa.eu/summary/glossary/suspension_clause.html\
        \ |date=22 December 2017 }}, Europa glossary. Retrieved 22 December 2017</ref>\n\
        \nThe state in question would still be bound by the obligations treaties and\
        \ the Council acting by majority may alter or lift such sanctions. The [[Treaty\
        \ of Nice]] included a preventive mechanism whereby the council, acting by\
        \ majority, may identify a potential breach and make recommendations to the\
        \ state to rectify it before action is taken against it as outlined above.<ref\
        \ name=\"suspend\"/> However, the treaties do not provide any mechanism to\
        \ expel a member state outright.<ref name=\"expel\">Athanassiou, Phoebus (December\
        \ 2009) [http://www.ecb.int/pub/pdf/scplps/ecblwp10.pdf Withdrawal and Expulsion\
        \ from the EU and EMU, Some Reflections] {{Webarchive|url=https://web.archive.org/web/20130120184437/http://www.ecb.int/pub/pdf/scplps/ecblwp10.pdf\
        \ |date=20 January 2013 }} (PDF), European Central Bank. Retrieved 8 September\
        \ 2011</ref>\n\n===Withdrawal===\n{{Main|Withdrawal from the European Union}}\n\
        Prior to the [[Lisbon Treaty]], there was no provision or procedure within\
        \ any of the [[Treaties of the European Union]] for a member state to withdraw\
        \ from the [[European Union]] or its predecessor organisations. The Lisbon\
        \ Treaty changed this and included the first provision and procedure of a\
        \ member state to leave the bloc. The procedure for a state to leave is outlined\
        \ in [[s:Consolidated version of the Treaty on European Union/Title VI: Final\
        \ Provisions#Article 50|TEU Article 50]] which also makes clear that \"Any\
        \ Member State may decide to withdraw from the Union in accordance with its\
        \ own constitutional requirements\". Although it calls for a negotiated withdrawal\
        \ between the seceding state and the rest of the EU, if no agreement is reached\
        \ two years after the seceding state notifying of its intention to leave,\
        \ it would cease to be subject to the treaties anyway (thus ensuring a right\
        \ to unilateral withdrawal).<ref name=\"expel\"/> There is no formal limit\
        \ to how much time a member state can take between adopting a policy of withdrawal,\
        \ and actually triggering Article 50.{{citation needed|date=March 2024}}\n\
        \nIn a [[2016 United Kingdom European Union membership referendum|referendum\
        \ in June 2016]], the United Kingdom voted to withdraw from the EU. The UK\
        \ government triggered Article 50 on 29 March 2017.<ref name=GuardianMay>{{cite\
        \ news|url=https://www.theguardian.com/politics/2016/oct/01/theresa-may-to-propose-great-repeal-bill-to-unwind-eu-laws|title=Theresa\
        \ May to trigger article 50 by end of March 2017|last=Elgot|first=Jessica|work=The\
        \ Guardian|date=2 October 2016|access-date=22 October 2016|archive-date=22\
        \ October 2016|archive-url=https://web.archive.org/web/20161022225706/https://www.theguardian.com/politics/2016/oct/01/theresa-may-to-propose-great-repeal-bill-to-unwind-eu-laws|url-status=live}}</ref>\
        \ After an extended period of negotiation and internal political debate the\
        \ UK eventually withdrew from the EU on 31 January 2020.<ref>{{Cite news |url=https://www.bbc.co.uk/news/uk-politics-50870939\
        \ |title=Brexit: MPS back Boris Johnson's plan to leave EU on 31 January |work=BBC\
        \ News |date=20 December 2019 |access-date=2 August 2020 |archive-date=4 September\
        \ 2020 |archive-url=https://web.archive.org/web/20200904214323/https://www.bbc.co.uk/news/uk-politics-50870939\
        \ |url-status=live }}</ref><ref>{{cite news |url=https://www.bbc.co.uk/news/uk-politics-51287430\
        \ |title=Brexit: European Parliament overwhelmingly backs terms of UK's exit\
        \ |date=29 January 2020 |work=BBC News |access-date=2 August 2020 |archive-date=29\
        \ January 2020 |archive-url=https://web.archive.org/web/20200129175943/https://www.bbc.co.uk/news/uk-politics-51287430\
        \ |url-status=live }}</ref>\n\nPrior to 2016, no member state had voted to\
        \ withdraw. However, [[French Algeria]], [[Greenland]] and [[Saint-Barthélemy]]\
        \ did cease being part of the EU (or its predecessor) in 1962, 1985, and 2012,\
        \ respectively, due to status changes. The situation of Greenland being outside\
        \ the EU while still subject to an EU member state had been discussed as a\
        \ template for the pro-EU regions of the UK remaining within the EU or its\
        \ single market.<ref>[http://blogs.lse.ac.uk/europpblog/2016/07/07/reverse-greenland-arrangement/\
        \ Could a 'reverse Greenland' arrangement keep Scotland and Northern Ireland\
        \ in the EU?] {{Webarchive|url=https://web.archive.org/web/20161022222052/http://blogs.lse.ac.uk/europpblog/2016/07/07/reverse-greenland-arrangement/\
        \ |date=22 October 2016 }}, London School of Economics 7 July 2016</ref>\n\
        \nBeyond the formal withdrawal of a member state, there are a number of independence\
        \ movements such as [[Catalan independentism|Catalonia]] or [[Hypothetical\
        \ partition of Belgium|Flanders]]<!---THIS IS JUST MENTIONING TWO EXAMPLES\
        \ FROM DIFFERENT MEMBER STATES, PLEASE DO NOT TURN IT INTO A LIST OF EVERY\
        \ INDEPENDENCE MOVEMENT IN EUROPE---> which could result in a situation similar\
        \ to Greenland's. Were a territory of a member state to secede but wish to\
        \ remain in the EU, some scholars claim it would need to reapply to join as\
        \ if it were a new country applying from scratch.<ref>Happold, Matthew (1999)\
        \ [http://www.cer.org.uk/sites/default/files/publications/attachments/pdf/2011/cerwp2-2807.pdf\
        \ Scotland Europa: independence in Europe?] {{Webarchive|url=https://web.archive.org/web/20131022085918/http://www.cer.org.uk/sites/default/files/publications/attachments/pdf/2011/cerwp2-2807.pdf\
        \ |date=22 October 2013 }}, Centre for European Reform. Retrieved 14 June\
        \ 2010 (PDF)</ref> However, other studies claim internal enlargement is legally\
        \ viable if, in case of a member state dissolution or secession, the resulting\
        \ states are ''all'' considered [[Succession of states|successor states]].<ref>The\
        \ Internal Enlargement of the European Union, Centre Maurits Coppieters Foundation\
        \ [http://www.irla.cat/documents/the-internal-enlargement-of-the-EU.pdf] {{Webarchive|url=https://web.archive.org/web/20140803030902/http://www.irla.cat/documents/the-internal-enlargement-of-the-EU.pdf|date=3\
        \ August 2014}} (PDF)</ref> There is also a [[European Citizens' Initiative]]\
        \ that aims at guaranteeing the continuity of rights and obligations of the\
        \ European citizens belonging to a new state arising from the democratic secession\
        \ of a European Union member state.<ref>{{cite web|url=http://www.euinternalenlargement.org/|title=英語ぺらぺら君中級編で余った時間を有効活用する|website=www.euinternalenlargement.org|access-date=25\
        \ July 2013|archive-date=14 April 2012|archive-url=https://web.archive.org/web/20120414201011/http://www.euinternalenlargement.org/|url-status=dead}}</ref>\n\
        \n==Representation==\n[[File:Familiefoto europese raad 2011.jpg|thumb|upright=1.35|A\
        \ 2011 'family photo' of the [[European Council]], which comprises the [[head\
        \ of state|heads of state]] or [[head of government|government]] of the member\
        \ states, along with [[President of the European Council]] and the [[President\
        \ of the European Commission]]]]\nEach state has representation in the [[institutions\
        \ of the European Union]]. Full membership gives the government of a member\
        \ state a seat in the [[Council of the European Union]] and [[European Council]].\
        \ When decisions are not being taken by [[Consensus decision-making|consensus]],\
        \ [[qualified majority voting]] (which requires majorities both of the number\
        \ of states and of the population they represent, but a sufficient [[Voting\
        \ in the Council of the European Union|blocking minority]]  can veto the proposal).\
        \ The [[Presidency of the Council of the European Union]] rotates among each\
        \ of the member states, allowing each state six months to help direct the\
        \ agenda of the EU.<ref>{{cite web\n |url = http://www.consilium.europa.eu/en/council-eu/presidency-council-eu/\n\
        \ |title = The presidency of the Council of the EU\n |author = <!--Staff writer(s);\
        \ no by-line.-->\n |date = 2 May 2016\n|website = Europa (web portal)\n |publisher\
        \ = The Council of the EU\n |access-date = 14 May 2016\n|archive-url = https://web.archive.org/web/20160326171859/http://www.consilium.europa.eu/en/council-eu/presidency-council-eu/\n\
        \ |archive-date = 26 March 2016\n|quote = The presidency of the Council rotates\
        \ among the EU member states every 6 months}}</ref><ref>{{cite web\n |url\
        \ = http://www.politics.co.uk/reference/european-union-guide\n |title = European\
        \ Union – Guide\n |author = <!--Staff writer(s); no by-line.-->\n |website\
        \ = politics.co.uk\n |access-date = 14 May 2016\n|archive-url = https://web.archive.org/web/20140825164224/http://politics.co.uk/reference/european-union-guide\n\
        \ |archive-date = 25 August 2014\n|quote = Member states take it in turns\
        \ to assume the presidency of the Council of Ministers for six months at a\
        \ time in accordance with a pre-established rota.}}</ref>\n\nSimilarly, each\
        \ state is assigned [[Member of the European Parliament|seats in Parliament]]\
        \ according to their population (smaller countries receiving more seats per\
        \ inhabitant than the larger ones). The members of the [[European Parliament]]\
        \ have been elected by [[universal suffrage]] since 1979 (before that, they\
        \ were seconded from [[National parliaments of the European Union|national\
        \ parliaments]]).<ref>{{cite web|title=The European Parliament: Historical\
        \ Background|url=http://www.consilium.europa.eu/en/council-eu/presidency-council-eu/|access-date=14\
        \ May 2016|archive-date=26 March 2016|archive-url=https://web.archive.org/web/20160326171859/http://www.consilium.europa.eu/en/council-eu/presidency-council-eu/|url-status=live}}</ref><ref>{{cite\
        \ news\n |url = https://news.bbc.co.uk/2/hi/events/euros_99/voting_in_the_uk/348842.stm\n\
        \ |title = Previous UK European elections\n |date = 2 June 1999\n|work=BBC\
        \ News \n |access-date = 14 May 2016\n|archive-url = https://web.archive.org/web/20030424042308/http://news.bbc.co.uk/1/hi/events/euros_99/voting_in_the_uk/348842.stm\n\
        \ |archive-date = 24 April 2003\n|url-status = live\n |quote = The 1951 treaty\
        \ which created the European Coal and Steel Community (a precursor to the\
        \ European Economic Community and later European Union) provided for a representative\
        \ assembly of members drawn from the participating nations' national parliaments.\
        \ In June 1979, the nine EEC countries held the first direct elections to\
        \ the European Parliament.}}</ref>\n\nThe national governments appoint one\
        \ member each to the [[European Commission]], the [[European Court of Justice]]\
        \ and the [[European Court of Auditors]]. Prospective Commissioners must be\
        \ confirmed both by the President of the Commission and by the European Parliament;\
        \ prospective justices must be confirmed by the existing members. Historically,\
        \ larger member states were granted an extra Commissioner. However, as the\
        \ body grew, this right has been removed and each state is represented equally.\
        \ The six largest states are also granted an Advocates General in the Court\
        \ of Justice. Finally, the Governing Council of the [[European Central Bank]]\
        \ includes the governors of the national central banks (who may or may not\
        \ be government appointed) of each [[eurozone|euro area]] country.<ref>{{cite\
        \ web|url=https://www.ecb.europa.eu/ecb/orga/decisions/govc/html/index.en.html|title=Governing\
        \ Council|website=European Central Bank|access-date=14 May 2016|archive-date=3\
        \ February 2019|archive-url=https://web.archive.org/web/20190203063704/https://www.ecb.europa.eu/ecb/orga/decisions/govc/html/index.en.html|url-status=live}}</ref>\n\
        \nThe larger states traditionally carry more weight in negotiations, however\
        \ smaller states can be effective impartial mediators and citizens of smaller\
        \ states are often appointed to sensitive top posts to avoid competition between\
        \ the larger states. This, together with the disproportionate representation\
        \ of the smaller states in terms of votes and seats in parliament, gives the\
        \ smaller EU states a greater power of influence than is normally attributed\
        \ to a state of their size. However most negotiations are still dominated\
        \ by the larger states. This has traditionally been largely through the \"\
        [[France–Germany relations|Franco-German]] motor\" but Franco-German influence\
        \ has diminished slightly following the [[2004 enlargement of the European\
        \ Union|influx of new members in 2004]] (see [[G6 (EU)|G6]]).<ref>{{cite news|author=Peel,\
        \ Q|date=26 March 2010|url=https://www.ft.com/content/d599e1a0-3912-11df-8970-00144feabdc0|title=Deal\
        \ shows Merkel has staked out strong role]|work=[[Financial Times]]|display-authors=etal|access-date=15\
        \ June 2010|archive-date=4 June 2010|archive-url=https://web.archive.org/web/20100604231941/http://www.ft.com/cms/s/0/d599e1a0-3912-11df-8970-00144feabdc0.html|url-status=live}}</ref>\n\
        \n==Sovereignty==\n{{quote box\n|title = Article 4\n|quote=\n# In accordance\
        \ with Article 5, competences not conferred upon the Union in the Treaties\
        \ remain with the member states.\n# The Union shall respect the equality of\
        \ member states before the Treaties as well as their national identities,\
        \ inherent in their fundamental structures, political and constitutional,\
        \ inclusive of regional and local self-government. It shall respect their\
        \ essential State functions, including ensuring the territorial integrity\
        \ of the State, maintaining law and order and safeguarding national security.\
        \ In particular, national security remains the sole responsibility of each\
        \ member state.\n# Pursuant to the principle of [[sincere cooperation]], the\
        \ Union and the member states shall, in full mutual respect, assist each other\
        \ in carrying out tasks which flow from the Treaties. The member states shall\
        \ take any appropriate measure, general or particular, to ensure fulfilment\
        \ of the obligations arising out of the Treaties or resulting from the acts\
        \ of the institutions of the Union. The member states shall facilitate the\
        \ achievement of the Union's tasks and refrain from any measure which could\
        \ jeopardise the attainment of the Union's objectives.\n|source = – [[s:Consolidated\
        \ version of the Treaty on European Union/Title I: Common Provisions#Article\
        \ 4|Article 4 of the Treaty on European Union]]\n|align = right\n|width =\
        \ 400px\n|salign = right\n}}\n\nWhile the member states are sovereign, the\
        \ union partially follows a [[Supranational union|supranational]] system for\
        \ those functions agreed by treaty to be shared. (\"Competences not conferred\
        \ upon the Union in the Treaties remain with the member states\"). Previously\
        \ limited to [[European Community]] matters, the practice, known as the '[[community\
        \ method]]', is currently used in many areas of policy. ''Combined sovereignty''\
        \ is delegated by each member to the institutions in return for representation\
        \ within those institutions. This practice is often referred to as 'pooling\
        \ of sovereignty'. Those institutions are then empowered to make laws and\
        \ execute them at a European level.\n\nIn contrast to some international organisations,\
        \ the EU's style of integration as a [[Political union|union of states]] does\
        \ not \"emphasise sovereignty or the separation of domestic and foreign affairs\
        \ [and it] has become a highly developed system for mutual interference in\
        \ each other's domestic affairs, right down to beer and sausages.\".<ref>[[Robert\
        \ Cooper (strategist)|Cooper, Robert]] (7 April 2002) [https://www.theguardian.com/observer/worldview/story/0,11581,680117,00.html\
        \ Why we still need empires] , ''[[The Guardian]]'' (London)</ref> However,\
        \ on defence and foreign policy issues (and, pre-[[Lisbon Treaty]], police\
        \ and judicial matters) less sovereignty is transferred, with issues being\
        \ dealt with by unanimity and co-operation. Very early on in the history of\
        \ the EU, the unique state of its establishment and pooling of sovereignty\
        \ was emphasised by the Court of Justice:<ref>[http://eur-lex.europa.eu/Notice.do?mode=dbl&lng1=en,en&lang=&lng2=de,en,fi,fr,it,nl,sv,&val=5203:cs&page=&hwords=null\
        \ ECJ opinion on Costa vs ENEL] {{Webarchive|url=https://web.archive.org/web/20121017123153/http://eur-lex.europa.eu/Notice.do?mode=dbl&lng1=en,en&lang=&lng2=de,en,fi,fr,it,nl,sv,&val=5203:cs&page=&hwords=null\
        \ |date=17 October 2012 }} Eur-Lex</ref>\n\n{{blockquote|By creating a Community\
        \ of unlimited duration, having its own institutions, its own personality,\
        \ its own legal capacity and capacity of representation on the international\
        \ plane and, more particularly, real powers stemming from a limitation of\
        \ sovereignty or a transfer of powers from the States to Community, the Member\
        \ States have limited their sovereign rights and have thus created a body\
        \ of law which binds both their nationals and themselves...The transfer by\
        \ the States from their domestic legal system to the Community legal system\
        \ of the rights and obligations arising under the Treaty carries with it a\
        \ permanent limitation of their sovereign rights. |[[European Court of Justice]]\
        \ 1964, in reference to case of [[Costa v ENEL]]<ref>[http://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A61964CJ0006\
        \ Judgment of the Court of 15 July 1964. Flaminio Costa v E.N.E.L. Reference\
        \ for a preliminary ruling: Giudice conciliatore di Milano - Italy. Case 6-64.]\
        \ {{Webarchive|url=https://web.archive.org/web/20171229142104/http://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:61964CJ0006\
        \ |date=29 December 2017 }}, Eur-Lex</ref>}}\n\nThe question of [[Supremacy\
        \ (European Union law)|whether Union law is superior to State law]] is subject\
        \ to some debate. The treaties do not give a judgement on the matter but court\
        \ judgements have established EU's law superiority over national law and it\
        \ is affirmed in a declaration attached to the Treaty of Lisbon (the proposed\
        \ [[European Constitution]] would have fully enshrined this). The legal systems\
        \ of some states also explicitly accept the Court of Justice's interpretation,\
        \ such as France and Italy, however in Poland it does not override the [[Constitution\
        \ of the Republic of Poland|state's constitution]], which it does in Germany.<ref>{{Cite\
        \ web |title=Primacy of EU law (precedence, supremacy) - EUR-Lex |url=https://eur-lex.europa.eu/EN/legal-content/glossary/primacy-of-eu-law-precedence-supremacy.html\
        \ |access-date=2024-10-22 |website=eur-lex.europa.eu |language=en}}</ref><ref>{{Cite\
        \ web |title=The European Commission decides to refer POLAND to the Court\
        \ of Justice of the European Union for violations of EU law by its Constitutional\
        \ Tribunal |url=https://ec.europa.eu/commission/presscorner/detail/en/ip_23_842\
        \ |access-date=2024-10-22 |website=European Commission - European Commission}}</ref>\
        \ The exact areas where the member states have given legislative competence\
        \ to the Union are as follows. Every area not mentioned remains with member\
        \ states.<ref>[http://eur-lex.europa.eu/legal-content/EN/TXT/?uri=celex%3A12012E%2FTXT\
        \ Consolidated versions of the Treaty on European Union and the Treaty on\
        \ the Functioning of the European Union - Tables of equivalences] {{Webarchive|url=https://web.archive.org/web/20171227053044/http://eur-lex.europa.eu/legal-content/EN/TXT/?uri=celex%3A12012E%2FTXT\
        \ |date=27 December 2017 }}, Eur-Lex</ref>\n\n===Competences===\n{{Main|Competences\
        \ of the European Union}}\nIn EU terminology, the term 'competence' means\
        \ 'authority or responsibility to act'. The table below shows which aspects\
        \ of governance are exclusively for collective action (through the commission)\
        \ and which are shared to a greater or lesser extent. If an aspect is not\
        \ listed in the table below, then it remains the exclusive competence of the\
        \ member state. Perhaps the best known example is taxation, which remains\
        \ a matter of state sovereignty.\n\n{{EU competences}}\n\n===Conditional mutual\
        \ support===\nDue to the [[Euro area crisis]], some [[eurozone]] states were\
        \ given a [[bailout]] from their fellow members via the [[European Financial\
        \ Stability Facility]] and [[European Financial Stability Mechanism]] (replaced\
        \ by the [[European Stability Mechanism]] from 2013), but this came with conditions.\
        \ As a result of the [[Greek government-debt crisis]], Greece accepted a large\
        \ austerity plan including privatisations and a sell off of state assets in\
        \ exchange for their bailout. To ensure that Greece complied with the conditions\
        \ set by the [[European troika]] (ECB, IMF, Commission), a 'large-scale technical\
        \ assistance' from the European Commission and other member states was deployed\
        \ to Greek government ministries. Some, including the [[Euro Group#President|President\
        \ of the Euro Group]] [[Jean-Claude Juncker]], stated that \"the sovereignty\
        \ of Greece will be massively limited.\"<ref>Kirschbaum, Erik (3 July 2011)\
        \ {{cite news|url=https://www.reuters.com/article/us-greece-juncker-idUSTRE7620ZK20110703|title=Greek\
        \ sovereignty to be massively limited: Juncker|work=Reuters|date=3 July 2011|access-date=1\
        \ July 2017|archive-date=1 October 2015|archive-url=https://web.archive.org/web/20151001133749/http://www.reuters.com/article/2011/07/03/us-greece-juncker-idUSTRE7620ZK20110703|url-status=live|last1=Kirschbaum|first1=Erik}}</ref><ref>Mahony,\
        \ Honor (4 July 2011) [http://euobserver.com/9/32582 Greece faces 'massive'\
        \ loss of sovereignty] {{Webarchive|url=https://web.archive.org/web/20110707103730/http://euobserver.com/9/32582/\
        \ |date=7 July 2011 }}, ''[[EUobserver]]''</ref><ref name=\"protectorate\"\
        >[http://www.presseurop.eu/en/content/news-brief-cover/755611-athens-becomes-eu-protectorate\
        \ Athens becomes EU 'protectorate'] {{Webarchive|url=https://web.archive.org/web/20110713200429/http://www.presseurop.eu/en/content/news-brief-cover/755611-athens-becomes-eu-protectorate\
        \ |date=13 July 2011 }} [[List of newspapers in Greece|To Ethnos]] via PressEurop\
        \ 4 July 2011</ref> The situation of the bailed out countries (Greece, Portugal\
        \ and Ireland) has been described as being a [[Ward (law)|ward]]<ref>Fitzgerald,\
        \ Kyran (15 October 2011) [https://www.irishexaminer.com/business/arid-20170819.html\
        \ Reform agenda's leading light] {{Webarchive|url=https://web.archive.org/web/20200923135456/https://www.irishexaminer.com/\
        \ |date=23 September 2020 }}, [[Irish Examiner]]</ref><ref>Coy, Peter (13\
        \ January 2011) [http://www.businessweek.com/magazine/content/11_04/b4212009727572.htm\
        \ If Demography Is Destiny, Then India Has the Edge] {{Webarchive|url=https://web.archive.org/web/20110806032801/http://www.businessweek.com/magazine/content/11_04/b4212009727572.htm\
        \ |date=6 August 2011 }}, [[Bloomberg L.P.|Bloomberg]]</ref> or [[protectorate]]<ref\
        \ name=\"protectorate\"/><ref>Mahler ''et al'' (2 September 2010) [http://www.spiegel.de/international/business/0,1518,676507,00.html\
        \ How Brussels Is Trying to Prevent a Collapse of the Euro] {{Webarchive|url=https://web.archive.org/web/20111010112955/http://www.spiegel.de/international/business/0,1518,676507,00.html\
        \ |date=10 October 2011 }}, ''[[Der Spiegel]]''</ref><ref>[http://openeuropeblog.blogspot.com/2010/02/economic-protectorate.html\
        \ The Economic Protectorate] {{Webarchive|url=https://web.archive.org/web/20111108220006/http://openeuropeblog.blogspot.com/2010/02/economic-protectorate.html\
        \ |date=8 November 2011 }}, [[Open Europe]] (4 February 2010)</ref> of the\
        \ EU with some such as the [[Netherlands]] calling for a formalisation of\
        \ the situation.<ref>{{cite web|first =Leigh|last =Phillips|date =7 September\
        \ 2011|url =http://euobserver.com/19/113552|work =[[EU Observer]]|title =Netherlands:\
        \ Indebted states must be made 'wards' of the commission or leave euro|access-date\
        \ =17 October 2011|archive-date =25 October 2011|archive-url =https://web.archive.org/web/20111025202309/http://euobserver.com/19/113552|url-status\
        \ =live}}</ref>\n\n==Multi-speed integration==\n{{Main|European integration#Multi-speed\
        \ Europe}}\n{{see also|Enhanced cooperation|Opt-outs in the European Union}}\n\
        EU integration is not always symmetrical, with some states proceeding with\
        \ integration ahead of hold-outs. There are several different forms of closer\
        \ integration both within and outside the EU's normal framework. One mechanism\
        \ is [[enhanced cooperation]] where nine or more states can use EU structures\
        \ to progress in a field that not all states are willing to partake in.<ref>{{cite\
        \ web|url=http://www.consilium.europa.eu/en/press/press-releases/2017/10/12-eppo-20-ms-confirms/|title=20\
        \ member states confirm the creation of an European Public Prosecutor's Office|date=2017-10-12|access-date=2017-10-21|publisher=[[Council\
        \ of the European Union]]}}</ref> Some states have gained an [[Opt-outs in\
        \ the European Union|opt-out]] in the founding treaties from participating\
        \ in certain policy areas.<ref>{{cite web|url = https://www.politico.eu/article/juncker-to-oppose-multispeed-europe/|title\
        \ = Juncker to oppose multispeed Europe|website = Politico|date = 13 September\
        \ 2017|last = Eder|first = Florian|access-date = 29 December 2017|archive-date\
