        \ in all attempts at measuring coastlines, as expressed in the coastline paradox.\n\
        \n## Result 2\nTitle: West Coast of the United States\nURL: https://en.wikipedia.org/wiki/West_Coast_of_the_United_States\n\
        Extract: The West Coast of the United States, also known as the Pacific Coast\
