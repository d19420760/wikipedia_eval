        \ Jannik Sinner in the 2025 final.\n\n## Result 7\nTitle: 2026 Australian\
        \ Open – Men's singles\nURL: https://en.wikipedia.org/wiki/2026_Australian_Open_%E2%80%93_Men%27s_singles\n\
        Extract: Carlos Alcaraz defeated Novak Djokovic in the final, 2–6, 6–2, 6–3,\
        \ 7–5 to win the men's singles tennis title at the 2026 Australian Open. It\
