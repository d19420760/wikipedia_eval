        \ flexible, and no government approval is required to move between states,\
        \ except for persons restricted by certain types of court orders, such as\
        \ paroled convicts and children of divorced spouses who share child custody.\n\
        State governments in the U.S. are allocated power by the people of each respective\
        \ state through their individual state constitutions. All are grounded in\
        \ republican principles (this being required by the federal constitution),\
        \ and each provides for a government, consisting of three branches, each with\
        \ separate and independent powers: executive, legislative, and judicial. States\
        \ are divided into counties or county-equivalents, which may be assigned some\
        \ local governmental authority but are not sovereign. County or county-equivalent\
        \ structure varies widely by state, and states also create other local governments.\n\
        States, unlike U.S. territories, possess many powers and rights under the\
        \ United States Constitution. States and their citizens are represented in\
        \ the United States Congress, a bicameral legislature consisting of the Senate\
        \ and the House of Representatives. Each state is also entitled to select\
        \ a number of electors, equal to the total number of representatives and senators\
        \ from that state, to vote in the Electoral College, the body that directly\
        \ elects the president of the United States. Each state has the opportunity\
        \ to ratify constitutional amendments. With the consent of Congress, two or\
        \ more states may enter into interstate compacts with one another. The police\
        \ power of each state is also recognized.\nHistorically, the tasks of local\
        \ law enforcement, public education, public health, intrastate commerce regulation,\
        \ and local transportation and infrastructure, in addition to local, state,\
        \ and federal elections, have generally been considered primarily state responsibilities,\
        \ although all of these now have significant federal funding and regulation\
        \ as well. Over time, the Constitution has been amended, and the interpretation\
        \ and application of its provisions have changed. The general tendency has\
        \ been toward centralization and incorporation, with the federal government\
        \ playing a much larger role than it once did. There is a continuing debate\
        \ over states' rights, which concerns the extent and nature of the states'\
        \ powers and sovereignty in relation to the federal government and the rights\
        \ of individuals.\nThe Constitution grants to Congress the authority to admit\
        \ new states into the Union. Since the establishment of the United States\
        \ in 1776 by the Thirteen Colonies, the number of states has expanded from\
        \ the original 13 to 50. Each new state has been admitted on an equal footing\
        \ with the existing states. While the Constitution does not explicitly discuss\
        \ secession from the Union, the United States Supreme Court, in Texas v. White\
        \ (1869), held that the Constitution did not permit states to unilaterally\
        \ do so.\n\n## Result 4\nTitle: Pacific Ocean\nURL: https://en.wikipedia.org/wiki/Pacific_Ocean\n\
        Extract: The Pacific Ocean is the largest and deepest of Earth's five oceanic\
        \ divisions. It stretches from the Arctic Ocean in the north to the Southern\
        \ Ocean, or, depending on the definition, to Antarctica in the south, and\
        \ is bounded by the continents of Asia and Australia in the west and the Americas\
        \ in the east.\nAt 165,250,000 square kilometers (63,800,000 square miles)\
        \ in area (as defined with a southern Antarctic border), the Pacific Ocean\
        \ is the largest division of the World Ocean and the hydrosphere and covers\
        \ approximately 46% of Earth's water surface and about 32% of the planet's\
        \ total surface area, larger than its entire land area (148,940,000 square\
        \ kilometers or 57,510,000 square miles). The centers of both the water hemisphere\
        \ and the Western Hemisphere, as well as the oceanic pole of inaccessibility,\
        \ are in the Pacific Ocean. Ocean circulation (caused by the Coriolis effect)\
        \ subdivides it into two largely independent volumes of water that meet at\
        \ the Equator, the North Pacific Ocean and the South Pacific Ocean (or more\
        \ loosely the South Seas). The Pacific Ocean can also be informally divided\
        \ by the International Date Line into the East Pacific and the West Pacific,\
        \ which allows it to be further divided into four quadrants, namely the Northeast\
        \ Pacific off the coasts of North America, the Southeast Pacific off South\
        \ America, the Northwest Pacific off Far Eastern/Pacific Asia, and the Southwest\
        \ Pacific around Oceania.\nThe Pacific Ocean's mean depth is 4,000 meters\
        \ (13,000 feet; 2,200 fathoms). The Challenger Deep in the Mariana Trench,\
        \ located in the northwestern Pacific, is the deepest known point in the world,\
        \ reaching a depth of 10,928 m (35,853 ft; 5,976 fathoms). The Pacific also\
        \ contains the deepest point in the Southern Hemisphere, the Horizon Deep\
        \ in the Tonga Trench, at 10,823 m (35,509 ft; 5,918 fathoms). The third deepest\
        \ point on Earth, the Sirena Deep, is also located in the Mariana Trench.\n\
        The Pacific has many major marginal seas, including (listed clockwise from\
        \ the west) the Philippine Sea, South China Sea, East China Sea, Sea of Japan,\
        \ Sea of Okhotsk, Bering Sea, Gulf of Alaska, Gulf of California, Tasman Sea,\
        \ and Coral Sea.\n\n## Result 5\nTitle: East Coast of the United States\n\
        URL: https://en.wikipedia.org/wiki/East_Coast_of_the_United_States\nExtract:\
        \ The East Coast of the United States, also known as the Eastern Seaboard,\
        \ the Atlantic Coast, and the Atlantic Seaboard, is the region encompassing\
