        URL: https://en.wikipedia.org/wiki/McDonald%27s\nExtract: McDonald's Corporation,\
        \ doing business as McDonald's, is an American multinational fast food restaurant\
        \ chain. As of 2024, it is the second-largest by number of locations in the\
        \ world, behind the Chinese chain Mixue Ice Cream & Tea.\nBrothers Richard\
