        ## Result 6
        Title: German-speaking Switzerland
        URL: https://en.wikipedia.org/wiki/German-speaking_Switzerland
        Extract: The German-speaking part of Switzerland (German: Deutschschweiz [ˈdɔʏtʃ.ʃvaɪts] ; French: Suisse alémanique; Italian: Svizzera tedesca; Romansh: Svizra tudestga) comprises about 65 percent of Switzerland (North Western Switzerland, Eastern Switzerland, Central Switzerland, most of the Swiss Plateau and the greater part of the Swiss Alps).
        The variety of the German language spoken in Switzerland is called Swiss German which refers to any of the Alemannic dialects and which are divided into Low, High and Highest Alemannic. The only exception within German-speaking Switzerland is the municipality of Samnaun where an Austro-Bavarian dialect is spoken.
        German is the sole official language in 17 Swiss cantons (Aargau, Appenzell Ausserrhoden, Appenzell Innerrhoden, Basel-Stadt, Basel-Landschaft, Glarus, Lucerne, Nidwalden, Obwalden, Schaffhausen, Schwyz, Solothurn, St. Gallen, Thurgau, Uri, Zug, and Zurich). French and German are co-official in 3 cantons (Bern, Fribourg, and Valais). In the trilingual canton of Graubünden, more than half the population speaks German, while most of the rest speak one of the other official languages, Romansh and Italian.
        By the Middle Ages, a marked difference had developed between the rural cantons of the German-speaking part of Switzerland and the city cantons, divided by views about trade and commerce. After the Reformation, all cantons were either Catholic or Protestant, and the denominational influences on culture added to the differences. Even today, where all cantons are somewhat denominationally mixed, the different historical denominations can be seen in the mountain villages, where Roman Catholic Central Switzerland abounds with chapels and statues of saints, and the farm houses in the very similar landscape of the Protestant Bernese Oberland show Bible verses carved on the housefronts, instead.

        ## Result 7
        Title: Romansh language
        URL: https://en.wikipedia.org/wiki/Romansh_language
        Extract: Romansh ( roh-MA(H)NSH; sometimes also spelled Romansch and Rumantsch) is a Romance language of the Gallo-Romance and/or Rhaeto-Romance branch of languages spoken predominantly in the Swiss canton of the Grisons (Graubünden). Romansh has been recognized as a national language of Switzerland since 1938, and as an official language in correspondence with Romansh-speaking citizens since 1996, along with German, French, and Italian. It also has official status in the canton of the Grisons alongside German and Italian and is used as the medium of instruction in schools in Romansh-speaking areas. It is sometimes grouped by linguists with Ladin and Friulian as the Rhaeto-Romance languages, though this is disputed.
        Romansh is one of the descendant languages of the spoken Latin language of the Roman Empire, which by the 5th century AD replaced the Celtic and Raetic languages previously spoken in the area. Romansh retains a small number of words from these languages. Romansh has also been strongly influenced by German in vocabulary and morphosyntax. The language gradually retreated to its current area over the centuries, being replaced in other areas by Alemannic and Bavarian dialects. The earliest writing identified as Romansh dates from the 10th or 11th century, although major works did not appear until the 16th century, when several regional written varieties began to develop. During the 19th century the area where the language was spoken declined due to the industrialization of Switzerland, but the Romansh speakers had a literary revival and started a language movement dedicated to halting the decline of their language.
        In the 2000 Swiss census, 35,095 people (of whom 27,038 live in the canton of the Grisons) indicated Romansh as the language of "best command", and 61,815 as a "regularly spoken" language. In 2010, Switzerland switched to a yearly system of assessment that uses a combination of municipal citizen records and a limited number of surveys. In 2019, 40,074 Swiss residents primarily spoke Romansh; in 2017, 28,698 inhabitants of the canton of the Grisons (14.7% of the population) used it as their main language.
        Romansh is divided into five different regional dialect groups (Sursilvan, Vallader, Putèr, Surmiran, and Sutsilvan), each with its own standardized written language. In addition, a pan-regional variety called Rumantsch Grischun was introduced in 1982, which is controversial among Romansh speakers.

        ## Result 8
