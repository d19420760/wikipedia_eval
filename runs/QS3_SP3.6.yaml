        Extract: Ontario, one of the 13 provinces and territories of Canada, is located in east-central Canada. It is Canada's most populous province by a large margin, accounting for nearly 40 percent of all Canadians, and is the second-largest province in total area. Ontario is fourth-largest in total area when the territories of the Northwest Territories and Nunavut are included. It is home to the nation's capital city, Ottawa, and the nation's most populous city, Toronto.

        ## Result 7
        Title: Capital city
        URL: https://en.wikipedia.org/wiki/Capital_city
        Extract: A capital city, or just capital, is the municipality holding primary status in a country, state, province, department, or other subnational division, usually as its seat of government. A capital is typically a city that physically encompasses the government's offices and meeting places; the status as capital is often designated by law or a constitution. In some jurisdictions, including several countries, different branches of government are in different settlements, sometimes meaning there are multiple official capitals. In some cases, a distinction is made between the official (constitutional) capital and the seat of government.
        English-language media often use the name of the capital metonymically to refer to the government sitting there. For example, "London–Washington relations" is understood to mean diplomatic relations between the United Kingdom and the United States.

