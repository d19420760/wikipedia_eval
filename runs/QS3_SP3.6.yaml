        \ air wing from the constraints of pressurized steam, used aboard the Nimitz-class\
        \ carriers.\n\n## Result 7\nTitle: Sodium Reactor Experiment\nURL: https://en.wikipedia.org/wiki/Sodium_Reactor_Experiment\n\
        Extract: The Sodium Reactor Experiment was a pioneering nuclear power plant\
