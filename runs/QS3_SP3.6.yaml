        \ the four majors in all three disciplines a player is eligible for–singles,\
        \ doubles and mixed doubles–is considered winning a \"boxed set\" of Grand\
        \ Slam titles.\nPrior to 1924, the major tennis championships, governed by\
        \ the International Lawn Tennis Federation (ILTF), were the World Hard Court\
        \ Championships, World Grass Court Championships (Wimbledon), and World Covered\
        \ Court Championships.\nMany top tennis players turned professional before\
        \ the Open Era to play legally for prize money. They played in separate professional\
