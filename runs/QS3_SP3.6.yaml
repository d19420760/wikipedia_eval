        \ 5\nTitle: Einstein–Bergson debate\nURL: https://en.wikipedia.org/wiki/Einstein%E2%80%93Bergson_debate\n\
        Extract: On April 6, 1922, the physicist Albert Einstein and the philosopher\
        \ Henri Bergson met at the Société française de philosophie and debated the\
