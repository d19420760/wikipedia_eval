        \ The song appeared on Rush's eleventh studio album Power Windows in 1985.\
        \ \"Manhattan Project\" is the third track on the album and has a run-time\
        \ of 5:07.\n\n## Result 6\nTitle: Manhattan Project feed materials program\n\
        URL: https://en.wikipedia.org/wiki/Manhattan_Project_feed_materials_program\n\
        Extract: The Manhattan Project feed materials program located and procured\
        \ uranium ores, and refined and processed them into feed materials for use\
        \ in the Manhattan Project's isotope enrichment plants at the Clinton Engineer\
        \ Works in Oak Ridge, Tennessee, and its nuclear reactors at the Hanford Engineer\
        \ Works in Washington state. The highly enriched uranium product of the enrichment\
        \ plants and the plutonium from the reactors was used to make atomic bombs.\n\
        The original goal of the feed materials program in 1942 was to acquire approximately\
        \ 1,500 metric tons (1,700 short tons) of triuranium octoxide (U3O8) (black\
        \ oxide). By the time of the dissolution of the Manhattan District on 1 January\
