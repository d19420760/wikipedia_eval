        Hassanal Bolkiah is the longest-reigning existing monarch, having been Sultan of Brunei since 5 October 1967. He became the longest-reigning monarch upon the death of Elizabeth II of the United Kingdom on 8 September 2022. Ntfombi, Queen Mother of Eswatini is the only female monarch in the world.

        ## Result 4
        Title: List of current monarchs of sovereign states
        URL: https://en.wikipedia.org/wiki/List_of_current_monarchs_of_sovereign_states
        Extract: A monarch is the head of a monarchy, a form of government in which a state is ruled by an individual who normally rules for life or until abdication, and typically inherits the throne by birth. Monarchs may be autocrats (as in all absolute monarchies) or may be ceremonial figureheads, exercising only limited or no reserve powers at all, with actual authority vested in a legislature and/or executive cabinet (as in many constitutional monarchies). In many cases, a monarch will also be linked with a state religion. Most states only have a single monarch at any given time, although a regent may rule when the monarch is a minor, not present, or otherwise incapable of ruling. Cases in which two monarchs rule simultaneously over a single state, as is the current situation in Andorra, are known as coregencies.
        A variety of titles are applied in English; for example, "king" and "queen", "prince" and "princess", "grand duke" and "grand duchess", "emperor" and "empress". Although they will be addressed differently in their local languages, the names and titles in the list below have been styled using the common English equivalent. Roman numerals, used to distinguish related rulers with the same name, have been applied where typical.
        In political and sociocultural studies, monarchies are normally associated with hereditary rule; most monarchs, in both historical and contemporary contexts, have been born and raised within a royal family. Succession has been defined using a variety of distinct formulae, such as proximity of blood, primogeniture, and agnatic seniority. Some monarchies, however, are not hereditary, and the ruler is instead determined through an elective process; a modern example is the throne of Malaysia. These systems defy the model concept of a monarchy, but are commonly considered as such because they retain certain associative characteristics. Many systems use a combination of hereditary and elective elements, where the election or nomination of a successor is restricted to members of a royal bloodline.
        Entries below are listed beside their respective dominions, which are organised alphabetically. These monarchs reign as head of state in their respective sovereign states. Monarchs reigning over a constituent division, cultural or traditional polity are listed under constituent monarchs. For a list of former ruling families or abolished thrones, see: former ruling families.

        ## Result 5
        Title: Royal prerogative in the United Kingdom
        URL: https://en.wikipedia.org/wiki/Royal_prerogative_in_the_United_Kingdom
        Extract: The royal prerogative is a body of customary authority, privilege, and immunity attached to the British monarch (or "sovereign"), recognised in the United Kingdom. The monarch is regarded internally as the absolute authority, or "sole prerogative", and the source of many of the executive powers of the British government.
        Prerogative powers were formerly exercised by the monarch acting on their own initiative. Since the 19th century, by convention, the advice of the prime minister or the cabinet—who are then accountable to Parliament for the decision—has been required in order for the prerogative to be exercised. The monarch remains constitutionally empowered to exercise the royal prerogative against the advice of the prime minister or the cabinet, but in practice would likely only do so in emergencies or where existing precedent does not adequately apply to the circumstances in question.
        Today, the royal prerogative is available in the conduct of the government of the United Kingdom, including foreign affairs, defence, and national security. The monarch has a significant constitutional weight in these and other matters, but limited freedom to act, because the exercise of the prerogative is conventionally in the hands of the prime minister and other ministers or other government officials.

        ## Result 6
        Title: Royal standard of the United Kingdom
        URL: https://en.wikipedia.org/wiki/Royal_standard_of_the_United_Kingdom
        Extract: The royal standard of the United Kingdom is the banner of arms of the monarch of the United Kingdom, currently Charles III. It consists of the monarch's coat of arms in flag form, and is made up of four quarters containing the arms of the former kingdoms of England, Ireland, and Scotland. There are two versions of the banner, one used in Scotland in which the Scottish quarters take precedence, and one used elsewhere in which the English quarters take precedence. Since the 1960s, personal flags for the monarch in their role as sovereign of other Commonwealth realms have been introduced.
        The banner is flown to signify the presence of the monarch. It may be flown when they are present at one of their residences, from the car, ship, or aeroplane they are travelling in, and from any building they are visiting. The banner is never flown at half-mast, as a symbol of the continuity of the monarchy, since there is always a sovereign on the throne.
        Although almost universally called a standard, in heraldic terminology the flag is a banner of arms, as it is a coat of arms in flag form; standards are more typically tapering flags on which heraldic badges and mottoes are displayed.

        ## Result 7
        Title: Coat of arms of the United Kingdom
        URL: https://en.wikipedia.org/wiki/Coat_of_arms_of_the_United_Kingdom
        Extract: The coat of arms of the United Kingdom, also referred to as the royal arms, are the arms of dominion of the British monarch, currently Charles III. They are used by the Government of the United Kingdom and by other Crown institutions, including courts in the United Kingdom and in some parts of the Commonwealth. Differenced versions of the arms are used by members of the British royal family. The monarch's official flag, the royal standard, is the coat of arms in flag form.
        There are two versions of the coat of arms. One is used in Scotland and includes elements derived from the coat of arms of the Kingdom of Scotland, and the other is used elsewhere and includes elements derived from the coat of arms of the Kingdom of England. The shields of both versions of the arms quarter the arms of the kingdoms of England and Scotland, which united to form the Kingdom of Great Britain in 1707, and the Kingdom of Ireland, which united with Great Britain to form the United Kingdom in 1801. The Irish quarter was unaltered following the division of Ireland into Northern Ireland and the Irish Free State in 1922.
        The present arms do not include a representation of the United Kingdom's fourth constituent country, Wales. It is instead represented heraldically by two royal badges, which use the Welsh dragon and the coat of arms of Llywelyn ab Iorwerth respectively.

