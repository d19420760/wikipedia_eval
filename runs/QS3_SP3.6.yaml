      content: "## Result 1\nTitle: Scripps National Spelling Bee\nURL: https://en.wikipedia.org/wiki/Scripps_National_Spelling_Bee\n\
        Extract: The Scripps National Spelling Bee, formerly the Scripps Howard National\
        \ Spelling Bee and often referred to as the National Spelling Bee or simply\
        \ “the Spelling Bee” in the United States, is an annual spelling bee (word\
        \ spelling contest) held in the United States. The bee is run on a not-for-profit\
        \ basis by the E. W. Scripps Company and is held at a hotel or convention\
        \ center in the Washington, D.C. metropolitan area during the week following\
        \ Memorial Day weekend. Since 2011, it has been held at the Gaylord National\
        \ Resort & Convention Center hotel in National Harbor, Maryland, just outside\
        \ Washington D.C. It was previously held at the Grand Hyatt Washington in\
        \ Washington D.C. from 1996 to 2010. In 2026, it will be held in the DAR Constitution\
        \ Hall.\nAlthough most of its participants are from the U.S., students from\
        \ countries such as The Bahamas, Canada, the People's Republic of China, India,\
        \ Ghana, Japan, Jamaica, Kuwait, Mexico, Nigeria, New Zealand, Syria, Pakistan,\
        \ and the Palestinian Territories have also competed in recent years. Historically,\
        \ the competition has been open to, and remains open to, the winners of sponsored\
        \ regional spelling bees in the U.S. (including territories such as Guam,\
        \ American Samoa, Puerto Rico, the Navajo Nation, and the U.S. Virgin Islands,\
        \ along with overseas military bases in Germany and South Korea). Participants\
        \ from countries other than the U.S. must be regional spelling-bee winners\
        \ as well.\nContest participants cannot be older than fourteen as of August\
        \ 31 of the year before the competition; nor can they be past the eighth grade\
        \ as of February 1 of that year's competition. Previous winners are also ineligible\
        \ to compete.\nIn 2019, the Spelling Bee ran out of words that might challenge\
        \ the contestants and ended up having 8 winners. The 2020 National Spelling\
        \ Bee competition, originally scheduled for May 24, was suspended and later\
        \ canceled due to the COVID-19 pandemic. This was the first time it had been\
        \ canceled since 1945.\n\n## Result 2\nTitle: 94th Scripps National Spelling\
        \ Bee\nURL: https://en.wikipedia.org/wiki/94th_Scripps_National_Spelling_Bee\n\
        Extract: The 94th Scripps National Spelling Bee was a spelling bee that was\
        \ held at Gaylord National Resort & Convention Center in National Harbor,\
        \ Maryland. The finals were held on June 2, 2022, and televised on Ion Television\
        \ and Bounce TV, marking its debut on the organiser-owned Scripps Television.\
        \ The winner of the bee was Harini Logan, an 8th–grade girl from San Antonio,\
        \ Texas, who won with 21 words spelt correctly during the Bee's first spell-off\
        \ round.\n\n## Result 3\nTitle: 97th Scripps National Spelling Bee\nURL: https://en.wikipedia.org/wiki/97th_Scripps_National_Spelling_Bee\n\
        Extract: The 97th Scripps National Spelling Bee was a spelling bee competition\
        \ held at the Gaylord National Resort & Convention Center in National Harbor,\
        \ Maryland. The bee marked a special milestone with its commemoration of 100\
        \ years of the Bee since the first one ran in 1925. It ran from May 25 to\
        \ May 30, 2025.\nThe 2025 bee welcomed 243 spellers from the United States,\
        \ its territories, Canada, Ghana, Nigeria, Kuwait, and the Bahamas. Preliminary\
        \ rounds were held on May 27, quarterfinals and  semi-final rounds on May\
        \ 28, and finals on May 29.\nThe Scripps Bee honored the Akron Beacon Journal\
        \ as its Regional Partner of the Year, noteworthy given that the paper has\
        \ sponsored a speller at every bee since its inception in 1925.\nIn 2026,\
        \ the bee will be held at the DAR Constitution Hall, with contestants staying\
        \ at the JW Marriott Washington D.C. 2025 was the last year it will be held\
        \ in National Harbor.\n13-year-old Faizan Zaki won the competition.\n\n##\
        \ Result 4\nTitle: List of Scripps National Spelling Bee champions\nURL: https://en.wikipedia.org/wiki/List_of_Scripps_National_Spelling_Bee_champions\n\
        Extract: The Scripps National Spelling Bee (formerly the Scripps Howard National\
        \ Spelling Bee and commonly called the National Spelling Bee) is an annual\
        \ spelling bee held in the United States.  The competition began in 1925,\
        \ and was initially organized by The Courier-Journal of Louisville, Kentucky,\
        \ until the Scripps Howard Broadcasting Company (now the E. W. Scripps Company)\
        \ assumed sponsorship in 1941.  Every speller in the competition has previously\
        \ participated in a local spelling bee, usually organized by a local newspaper.\n\
        The first champion was Frank Neuhauser  of Louisville, who beat eight other\
        \ finalists to win the inaugural competition.  He was honored with a parade\
        \ in his hometown, where and when he was presented with bouquets of gladioli\
        \ in commemoration of the winning word \"gladiolus\", and returned to the\
        \ Bee a number of times as a guest of honor.  The first girl to win was Pauline\
        \ Bell, also of Louisville, the following year.  Girls won nine consecutive\
        \ competitions from 1932 to 1940.  Joint winners have been crowned on seven\
        \ occasions in the Bee's history. The first such occurrence was in 1950, when\
        \ Colquitt Dean and Diana Reynard were declared co-champions after the contestants\
        \ had exhausted the list of available words.  In both 1957 and 1962 joint\
        \ champions were declared when both remaining contestants spelled the same\
        \ word incorrectly. After three consecutive ties between 2014 and 2016, a\
        \ written tiebreaker round was introduced, but it was discontinued for the\
        \ 2019 Bee, which subsequently resulted in an unprecedented eight-way tie\
        \ when the organizers ended the final session after the remaining contestants\
        \ had completed five consecutive perfect rounds.\nAlthough the competition\
        \ is titled \"National\", it is not restricted to spellers from the United\
        \ States.  In 1998, Jody-Anne Maxwell from Jamaica became the first speller\
        \ from outside the US to win the Bee, as well as the first black winner. \
        \ In recent decades the competition has been dominated by Indian-American\
        \ students.  Although people of South Asian origin make up less than one percent\
        \ of the U.S. population, the vast majority of the winners since 1999, including\
        \ all fourteen champions between 2008–2018 and seven of the eight co-champions\
        \ in 2019, have come from the South Asian community.  \nOne such speller,\
        \ Nihar Janga from Austin, Texas, became the youngest champion in the Bee's\
        \ history when he won the title in 2016 at the age of 11. The 93rd Scripps\
        \ National Spelling Bee was the first time that an African-American (Zaila\
        \ Avant-garde) became the champion and only the second time that the champion\
        \ was a black person.\nThe competition was not held from 1943 to 1945 because\
        \ of World War II. The 2020 competition was canceled due to concerns about\
        \ the COVID-19 pandemic.\nOn May 29, 2025, returning entrant Faizan Zaki of\
        \ Allen, Texas, who was first runner-up in 2024, won the 2025 Scripps National\
        \ Spelling Bee title and trophy over 242 other contestants, including runner-up\
        \ Sarvadnya Kadam of Visalia, California. This year marked the 100th year\
        \ anniversary of the spelling competition which began on June 17, 1925. Forty-two\
        \ former National Spelling Bee winners returned to attend the centennial celebration,\
        \ the earliest two from 1960 (Henry Feldman) and 1961 (John Capehart) to then-current\
        \ reigning champion Bruhat Soma (2024). Next year the 2026 Scripps National\
        \ Spelling Bee finals will be held in Washington, D.C. at the DAR Constitution\
        \ Hall.\n\n## Result 5\nTitle: Spelling bee\nURL: https://en.wikipedia.org/wiki/Spelling_bee\n\
        Extract: A spelling bee is a competition in which contestants are asked to\
        \ spell a broad selection of words, usually with a varying degree of difficulty.\
        \ To compete, contestants must memorize the spellings of words as written\
        \ in dictionaries, and recite them accordingly.\n\n## Result 6\nTitle: 95th\
        \ Scripps National Spelling Bee\nURL: https://en.wikipedia.org/wiki/95th_Scripps_National_Spelling_Bee\n\
        Extract: The 95th Scripps National Spelling Bee was a spelling bee competition\
        \ that was held at Gaylord National Resort & Convention Center in National\
        \ Harbor, Maryland.\nThe 2023 bee welcomed 231 spellers from the United States\
        \ and its territories, Canada, Ghana, and The Bahamas.  After competing in\
        \ quarterfinal and semi-final rounds on May 30 and May 31, 2023, the field\
        \ of competition narrowed to 11 finalists who competed on the night of June\
        \ 1, 2023.\nDev Shah of Largo, Florida, won the competition upon correctly\
        \ spelling the word psammophile after Charlotte Walsh (placed second) spelled\
        \ daviely incorrectly.\nShradha Rachamreddy, and two-time finalist Surya Kapu,\
        \ tied for third place after surviving until round 13 of the competition.\n\
        \n## Result 7\nTitle: 80th Scripps National Spelling Bee\nURL: https://en.wikipedia.org/wiki/80th_Scripps_National_Spelling_Bee\n\
        Extract: The 80th Scripps National Spelling Bee was held on May 30–31, 2007.\n\
        The winner was 13-year-old Evan O'Dorney from Danville, California. He won\
        \ in Round 13 by correctly spelling serrefine. The runner-up was Nate Gartke\
        \ from Edmonton, Canada, who misspelled coryza.\nThere were 286 spellers this\
        \ year, 139 boys and 147 girls. Fifty-nine survived the first day. By lunchtime\
        \ of day two, it was down to 33, and 15 by 2 pm. Andrew Lay's correct spelling\
        \ of \"negus\" and surprised response and Kennyi Aouad laughing upon hearing\
        \ \"sardoodledom\" became popular video snippets. The showdown began between\
        \ O'Dorney and Gartke when both contestants were the last to survive correctly\
        \ spelling 7 consecutive words each.\nThe first place prize was $50,000 in\
        \ cash, and additional prizes from Scripps.\nThe championship finals aired\
        \ live on ABC from 8:00 PM to shortly after 10:00 p.m. EDT.\n\n## Result 8\n\
        Title: The Spelling Bee\nURL: https://en.wikipedia.org/wiki/The_Spelling_Bee\n\
        Extract: The Spelling Bee (commonly called The Spelling Bee Ghana or TSB)\
        \ is an annual spelling bee held in Ghana since 2007.\nThe competition is\
        \ run by a not-for-profit charity founded by Ghanaian Entrepreneur, CEO of\
        \ the Young Educators Foundation, Eugenia Tachie-Menson, Programmes Manager,\
        \ Salomé Dzakpasu, School Coordinator, Johnson Appiah and assisted by a team\
        \ of educators, professionals, and volunteers.\nThe Spelling Bee, targeted\
        \ at students between the ages of 7 – 13, seeks to build their capacity on\
        \ the rudiments of spelling and English language usage.\nThe Spelling Bee\
        \ is a franchise of Scripps National Spelling Bee run in the United States.\n\
        Since its inception, the winners of the competition have represented Ghana\
        \ at the annual Scripps National Spelling Bee.\n\n## Result 9\nTitle: Akash\
        \ Vukoti\nURL: https://en.wikipedia.org/wiki/Akash_Vukoti\nExtract: Akash\
        \ Vukoti (born May 29, 2009) is an American child prodigy, TV personality,\
