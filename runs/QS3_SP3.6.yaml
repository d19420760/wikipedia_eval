        \ a haberdashery in Kansas City, Missouri, and was elected as a judge of Jackson\
        \ County in 1922. Truman was elected to the U.S. Senate for Missouri in 1934.\
        \ Between 1940 and 1944, he gained national prominence as the chairman of\
        \ the Truman Committee, which aimed to reduce waste and inefficiency in wartime\
        \ contracts. Truman was elected vice president in the 1944 presidential election\
        \ and became president upon Roosevelt's death in April 1945. Only then was\
        \ he told about the ongoing Manhattan Project and the atomic bomb. Truman\
        \ authorized the first and only use of nuclear weapons in war against the\
        \ Japanese cities of Hiroshima and Nagasaki.\nTruman's administration engaged\
        \ in an internationalist foreign policy by working closely with Britain. Truman\
        \ staunchly denounced isolationism. He energized the New Deal coalition during\
        \ the 1948 presidential election, despite some Democrats splitting off into\
        \ the Dixiecrats, and defeated both the Republican Party nominee Thomas E.\
        \ Dewey and Dixiecrat Strom Thurmond. Truman presided over the onset of the\
        \ Cold War in 1947. He oversaw the Berlin Airlift and the Marshall Plan in\
        \ 1948. With America's involvement in the Korean War (1950–1953), South Korea\
        \ repelled the invasion by North Korea. Domestically, the postwar economic\
        \ challenges such as strikes and inflation created a mixed reaction over the\
        \ effectiveness of his administration. In 1948, he proposed that Congress\
        \ should pass comprehensive civil rights legislation. Congress refused, so\
        \ Truman issued Executive Order 9980 and Executive Order 9981, which prohibited\
        \ discrimination in agencies of the federal government and desegregated the\
        \ United States Armed Forces.\nInvestigations revealed corruption in parts\
        \ of the Truman administration, and this became a major campaign issue in\
        \ the 1952 presidential election, although they did not implicate Truman himself.\
        \ He was eligible for reelection in 1952 but he chose not to run due to poor\
        \ polling. Subsequently, Truman went into a retirement marked by the founding\
        \ of his presidential library and the publication of his memoirs. It was long\
        \ believed that Truman's retirement years were financially difficult, resulting\
        \ in Congress establishing a pension for former presidents. However, evidence\
        \ eventually emerged that he amassed considerable wealth, some of it during\
        \ his presidency. When Truman left office, his administration was heavily\
        \ criticized. Despite this controversy, historians consistently rank Truman\
        \ in the first quartile of U.S. presidents. In addition, critical reassessments\
        \ of his presidency have improved his reputation among historians and the\
        \ general population.\n\n## Result 2\nTitle: Harry S. Truman Scholarship\n\
        URL: https://en.wikipedia.org/wiki/Harry_S._Truman_Scholarship\nExtract: The\
        \ Harry S. Truman Scholarship is a graduate fellowship in the United States\
        \ for public service leadership. It is a federally funded scholarship granted\
        \ to U.S. undergraduate students for demonstrated leadership potential, academic\
        \ excellence, and a commitment to public service. It is administered by the\
        \ Harry S. Truman Scholarship Foundation, an independent federal agency based\
        \ in Washington, D.C.\nThe U.S. Congress created the scholarship in 1975 as\
        \ a memorial to Harry S. Truman, who served as the 33rd president of the United\
        \ States. The Truman Scholarship is the official federal memorial to its namesake\
        \ president. According to The Washington Post, the Truman Scholarship's \"\
        sole aim is to pick out people with potential to become leaders—then provide\
        \ support to help them realize their aspirations.\" The scholarship supports\
        \ public service oriented graduate study in the amount of $30,000.\nEach year,\
        \ between 50 and 60 university nominated candidates in their junior year are\
        \ named Truman Scholars following an application process involving essays,\
        \ recommendations, and an interview. Scholarships have historically been awarded\
        \ to one individual from each U.S. state. Each university in the United States\
        \ may nominate, annually, only four regularly-enrolled candidates, and up\
        \ to three transfer students, who represent the most accomplished nominees\
        \ from that university.\n\n## Result 3\nTitle: Presidency of Harry S. Truman\n\
        URL: https://en.wikipedia.org/wiki/Presidency_of_Harry_S._Truman\nExtract:\
        \ Harry S. Truman's tenure as the 33rd president of the United States began\
        \ on April 12, 1945, upon the death of President Franklin D. Roosevelt, and\
        \ ended on January 20, 1953. He had been vice president for only 82 days when\
        \ he succeeded to the presidency. Truman, a Democrat from Missouri, ran for\
        \ and won a full four-year term in the 1948 presidential election, in which\
        \ he narrowly defeated Republican nominee Thomas E. Dewey and Dixiecrat nominee\
        \ Strom Thurmond. Although his existing term was exempt from the newly ratified\
        \ Twenty-second Amendment that established a two-term limit for presidents,\
        \ Truman withdrew his bid for a second full term in the 1952 presidential\
        \ election because of his low popularity. He was succeeded by Republican Dwight\
        \ D. Eisenhower.\nTruman's presidency was a turning point in foreign affairs,\
        \ as the United States engaged in an internationalist foreign policy and renounced\
        \ isolationism. During his first year in office, Truman approved the atomic\
        \ bombings of Hiroshima and Nagasaki and subsequently accepted the surrender\
        \ of Japan, which marked the end of World War II. In the aftermath of World\
        \ War II, he helped establish the United Nations and other post-war institutions.\
        \ Relations with the Soviet Union declined after 1945, and by 1947 the two\
        \ countries had entered a long period of tension and war preparation known\
        \ as the Cold War, during which a hot fighting war with Moscow was avoided.\
        \ Truman broke with Roosevelt's prior vice president Henry A. Wallace, who\
        \ called for friendship with Moscow and ran as the presidential candidate\
        \ of Progressive Party in 1948. In 1947, Truman promulgated the Truman Doctrine,\
        \ which called for the United States to prevent the spread of Communism through\
        \ foreign aid to Greece and Turkey. In 1948 the Republican-controlled Congress\
        \ approved the Marshall Plan, a massive financial aid package designed to\
        \ rebuild Western Europe. In 1949, the Truman administration designed and\
        \ presided over the creation of NATO, a military alliance of Western countries\
        \ designed to prevent the further westward expansion of Soviet power.\nTruman\
        \ proposed an ambitious domestic liberal agenda known as the Fair Deal. However,\
        \ nearly all his initiatives were blocked by the conservative coalition of\
        \ Republicans and conservative Southern Democrats. Republicans took control\
        \ of Congress in the 1946 elections after the strike wave of 1945–46. Truman\
        \ suffered another major defeat by the conservative coalition when the 80th\
        \ Congress passed the Taft–Hartley Act into law over his veto. It reversed\
        \ some of the pro-labor union legislation that was central to the New Deal.\
        \ When Robert A. Taft, the conservative Republican senator, unexpectedly supported\
        \ the Housing Act of 1949, Truman achieved one new liberal program. Truman\
        \ took a strong stance on civil rights, ordering equal rights in the military\
        \ to the disgust of the white politicians in the Deep South. They supported\
        \ a \"Dixiecrat\" third-party candidate, Strom Thurmond, in 1948.  Truman\
        \ later pushed for the integration of the military in the 1950s. During his\
        \ presidency, fears of Soviet espionage led to a Red Scare; Truman denounced\
        \ those who made unfounded accusations of Soviet sympathies, but also purged\
        \ left-wing federal employees who refused to disavow Communism.\nWhen Communist\
        \ North Korea invaded South Korea in 1950, Truman sent U.S. troops to prevent\
        \ the fall of South Korea. After initial successes, the war settled into a\
        \ stalemate that lasted throughout the final years of Truman's presidency.\
        \ Truman left office as one of the most unpopular presidents of the twentieth\
        \ century, mainly due to the Korean War and his then controversial decision\
        \ to dismiss General Douglas MacArthur, resulting in a huge loss of support.\
        \ In the 1952 presidential election, Eisenhower successfully campaigned against\
        \ what he denounced as Truman's failures: \"Korea, Communism and Corruption\"\
        . Nonetheless, Truman retained a strong reputation among scholars, and his\
        \ public reputation eventually recovered in the 1960s. In polls of historians\
        \ and political scientists, Truman is generally ranked as one of the ten greatest\
        \ presidents.\n\n## Result 4\nTitle: Harry S. Truman 1948 presidential campaign\n\
        URL: https://en.wikipedia.org/wiki/Harry_S._Truman_1948_presidential_campaign\n\
        Extract: In 1948, Harry S. Truman and Alben W. Barkley were elected president\
        \ and vice president of the United States, defeating Republican nominees Thomas\
        \ E. Dewey and Earl Warren. Truman, a Democrat and vice president under Franklin\
        \ D. Roosevelt, had ascended to the presidency upon Roosevelt's death in 1945.\
        \ He announced his candidacy for election on March 8, 1948. Unchallenged by\
        \ any major nominee in the Democratic primaries, he won almost all of them\
        \ easily; however, many Democrats like James Roosevelt opposed his candidacy\
        \ and urged former Chief of Staff of the United States Army Dwight D. Eisenhower\
        \ to run instead.\nTruman wanted U.S. Supreme Court Associate Justice William\
        \ O. Douglas to be his running mate. Douglas declined, claiming a lack of\
        \ political experience; in reality, his friend Thomas Gardiner Corcoran had\
        \ advised him not to be a \"number two man to a number two man\". Senator\
        \ Barkley's keynote address at the 1948 Democratic National Convention energized\
        \ the delegates and impressed Truman, who then selected Barkley as his running\
        \ mate. When the convention adopted Truman's civil rights plank in a close\
        \ vote of 651+1⁄2 to 582+1⁄2, many Southern delegates walked out of the convention.\
        \ After order was restored, a roll call vote gave Truman a majority of delegates\
        \ to be the nominee; Barkley was nominated the vice-presidential candidate\
        \ by acclamation.\nThe Progressive Party nominated Henry A. Wallace, a former\
        \ Democratic vice president, to run against Truman. Strom Thurmond, the governor\
        \ of South Carolina, who had led a walkout of a large group of delegates from\
        \ Mississippi and Alabama at the 1948 convention, also ran against Truman\
        \ as a Dixiecrat, campaigning for states' rights. With a split of the Democratic\
        \ Party, most polls and political writers predicted victory for Dewey and\
        \ gave Truman little chance. \nDuring the campaign, Truman mostly focused\
        \ on blaming the Republican-controlled Congress for not passing his legislation,\
        \ calling it a \"do-nothing Congress.\" In early September 1948, Truman conducted\
        \ various whistle-stop tours across the nation, covering over 21,928 miles\
        \ (35,290 km) on the Ferdinand Magellan railcar. Of all of the speeches which\
        \ he gave during his whistle-stop tour, only about 70 were broadcast on the\
        \ radio even locally, and only 20 of them were heard nationally. During the\
        \ final days of the campaign, the Truman campaign released a film titled The\
        \ Truman Story showing newsreel footage of the whistle-stop tour. Although\
        \ he received some endorsements, including that of Screen Actors Guild president\
        \ and future 40th president Ronald Reagan, most broadcasting companies were\
        \ sure of Dewey's victory. Ultimately, Truman won with 303 electoral votes\
        \ to Dewey's 189 and Thurmond's 39. Before the results were released, an early\
        \ edition of the Chicago Daily Tribune wrongly anticipated the result with\
        \ the headline \"Dewey Defeats Truman\". Time magazine later described an\
        \ image of Truman holding the newspaper as the \"greatest photograph ever\
        \ made of a politician celebrating victory.\" Truman and Barkley were inaugurated\
        \ on January 20, 1949. Truman's 1948 campaign and the election are most remembered\
        \ for the failure of polls and Truman's upset victory.\n\n## Result 5\nTitle:\
        \ Harry S. Truman Little White House\nURL: https://en.wikipedia.org/wiki/Harry_S._Truman_Little_White_House\n\
        Extract: The Harry S. Truman Little White House in Key West, Florida, United\
        \ States, was the winter White House for President Harry S. Truman for 175\
        \ days during 11 visits.  The house is located in the Truman Annex neighborhood\
        \ of Old Town, Key West.\n\n## Result 6\nTitle: 1948 United States presidential\
        \ election\nURL: https://en.wikipedia.org/wiki/1948_United_States_presidential_election\n\
        Extract: Presidential elections were held in the United States on November\
        \ 2, 1948. The Democratic ticket of incumbent President Harry S. Truman and\
        \ Senator Alben Barkley defeated the Republican ticket of New York Governor\
        \ Thomas E. Dewey and California Governor Earl Warren and the Dixiecrat ticket\
        \ of South Carolina Governor Strom Thurmond and Mississippi Governor Fielding\
        \ Wright in one of the greatest election upsets in American history.\nTruman\
        \ had been elected vice president in the 1944 election, and he succeeded to\
        \ the presidency in April 1945 upon the death of Franklin D. Roosevelt. He\
        \ won his party's nomination at the 1948 Democratic National Convention only\
        \ after defeating attempts to drop him from the ticket. The convention's civil\
        \ rights plank caused a walkout by several Southern delegates, who launched\
        \ a third-party \"States' Rights Democratic Party\" ticket, more commonly\
        \ known as the Dixiecrats, led by South Carolina Governor Strom Thurmond.\
        \ The Dixiecrats hoped to win enough electoral votes to force a contingent\
        \ election in the House of Representatives, where they could extract concessions\
        \ from either Dewey or Truman in exchange for their support. Former vice president\
        \ Henry A. Wallace also challenged Truman by launching the Progressive Party\
        \ and criticizing his confrontational Cold War policies. Dewey, the leader\
        \ of his party's liberal eastern wing and the 1944 Republican presidential\
        \ nominee, defeated conservative Ohio Senator Robert A. Taft and other challengers\
        \ at the 1948 Republican National Convention. This was the first election\
        \ to have primary and general election debates, with Dewey debating Harold\
        \ Stassen in the Republican primary, while Norman Thomas debated Farrell Dobbs\
        \ in the general election.\nTruman's feisty campaign style energized his base\
        \ of traditional Democrats, consisting of most of the white South, as well\
        \ as labor unions, and Catholic and Jewish voters; he also fared surprisingly\
        \ well with Midwestern farmers. Dewey ran a low-risk campaign and avoided\
        \ directly criticizing Truman. With the three-way split in the Democratic\
        \ Party, and with Truman's low approval ratings, Truman was widely considered\
        \ to be the underdog in the race, and virtually every prediction (with or\
        \ without public opinion polls) indicated Dewey would win the election. Defying\
        \ these predictions, Truman won the election with 303 electoral votes to Dewey's\
        \ 189. Truman also won 49.6% of the popular vote compared to Dewey's 45.1%,\
        \ while the third-party candidacies of Thurmond and Wallace each won less\
        \ than 3% of the popular vote, with Thurmond carrying four states in the Deep\
        \ South. Truman became the third president to be elected to a full term after\
        \ succeeding to the presidency upon his predecessor's death.\nTruman's surprise\
        \ victory was the fifth consecutive presidential win for the Democratic Party,\
        \ the longest winning streak for the Democrats, and the longest for either\
        \ party since the 1880 election. With simultaneous success in the 1948 congressional\
        \ elections, the Democrats regained control of both houses of Congress, which\
        \ they had lost in 1946. Thus, Truman's election confirmed the Democratic\
        \ Party's status as the nation's majority party. This was the last presidential\
        \ election before the ratification of the 22nd Amendment in 1951, which established\
        \ presidential term limits. This did not apply to the incumbent Truman, but\
        \ as he chose not to run in 1952, this was the last presidential election\
        \ with no future disqualification effect for second-term winners.\n\n## Result\
        \ 7\nTitle: Bibliography of Harry S. Truman\nURL: https://en.wikipedia.org/wiki/Bibliography_of_Harry_S._Truman\n\
        Extract: This bibliography of Harry S. Truman is a selective list of scholarly\
        \ works about Harry S. Truman, the thirty-third president of the United States\
        \ (1945–1953). See also the bibliographies at Harry S. Truman, Presidency\
        \ of Harry S. Truman, and Foreign policy of the Harry S. Truman administration.\n\
        \n## Result 8\nTitle: Historical rankings of presidents of the United States\n\
        URL: https://en.wikipedia.org/wiki/Historical_rankings_of_presidents_of_the_United_States\n\
        Extract: In political studies, since the mid 20th-century, surveys have been\
        \ conducted in order to construct historical rankings of the success of the\
        \ presidents of the United States. Ranking systems are usually based on surveys\
        \ of academic historians and political scientists, or popular opinion. The\
        \ scholarly rankings focus on presidential achievements, leadership qualities,\
        \ failures, and faults. Among such scholarly rankings, Abraham Lincoln is\
        \ most often ranked as the best, while his predecessor James Buchanan is most\
        \ often ranked as the worst. Popular-opinion polls typically focus on recent\
        \ or well-known presidents.\n\n## Result 9\nTitle: Clifton Truman Daniel\n\
        URL: https://en.wikipedia.org/wiki/Clifton_Truman_Daniel\nExtract: Clifton\
        \ Truman Daniel (born June 5, 1957) is an American writer and public relations\
        \ executive who is the oldest grandson of former United States President Harry\
        \ S. Truman and First Lady Bess Truman. He is a son of the late E. Clifton\
        \ Daniel Jr., former managing editor of The New York Times, and best-selling\
        \ mystery writer Margaret Truman. He serves as a vice president of the Society\
        \ of Presidential Descendants.\n\n## Result 10\nTitle: Timeline of the Harry\
        \ S. Truman presidency\nURL: https://en.wikipedia.org/wiki/Timeline_of_the_Harry_S._Truman_presidency\n\
        Extract: The presidency of Harry S. Truman began on April 12, 1945, when Harry\
        \ S. Truman became the 33rd president upon the death of Franklin D. Roosevelt,\
        \ and ended on January 20, 1953."
