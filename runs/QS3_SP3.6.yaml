      content: "## Result 1\nTitle: HIV\nURL: https://en.wikipedia.org/wiki/HIV\n\
        Extract: Human immunodeficiency viruses (HIVs) are two species of Lentivirus\
        \ (a subgroup of retrovirus) that infect humans. Over time, they cause acquired\
        \ immunodeficiency syndrome (AIDS), a condition in which progressive failure\
        \ of the immune system allows life-threatening opportunistic infections and\
        \ cancers to thrive. Without treatment, the average survival time after infection\
        \ with HIV is estimated to be 9 to 11 years, depending on the HIV subtype.\n\
        In most cases, HIV is a sexually transmitted infection and is transmitted\
        \ by contact with or transfer of blood, pre-ejaculate, semen, and vaginal\
        \ fluids. Non-sexual transmission can occur from an infected mother to her\
        \ infant during pregnancy, during childbirth by exposure to her blood or vaginal\
        \ fluid, and through breast milk. Within these bodily fluids, HIV is present\
        \ as both free virus particles and virus within infected immune cells.\nResearch\
        \ has shown (for both same-sex and opposite-sex couples) that HIV is not contagious\
        \ during sexual intercourse without a condom if the HIV-positive partner has\
        \ a consistently undetectable viral load.\nHIV infects vital cells in the\
        \ human immune system, such as helper T cells (specifically CD4+ T cells),\
        \ macrophages, and dendritic cells. HIV infection leads to low levels of CD4+\
        \ T cells through a number of mechanisms, including pyroptosis of abortively\
        \ infected T cells, apoptosis of uninfected bystander cells, direct viral\
        \ killing of infected cells, and killing of infected CD4+ T cells by CD8+\
        \ cytotoxic lymphocytes that recognize infected cells. When CD4+ T cell numbers\
        \ decline below a critical level, cell-mediated immunity is lost, and the\
        \ body becomes progressively more susceptible to opportunistic infections,\
        \ leading to the development of AIDS.\n\n## Result 2\nTitle: HIV/AIDS\nURL:\
        \ https://en.wikipedia.org/wiki/HIV/AIDS\nExtract: The human immunodeficiency\
        \ virus (HIV) is a retrovirus that attacks the immune system. Without treatment,\
        \ it can lead to a spectrum of conditions including acquired immunodeficiency\
        \ syndrome (AIDS). It is a preventable disease. It can be managed with treatment\
        \ and become a manageable chronic health condition. While there is no cure\
        \ or vaccine for HIV, antiretroviral treatment can slow the course of the\
        \ disease, and, if used before significant disease progression, can extend\
        \ the life expectancy of someone living with HIV to a nearly standard level.\
        \ An HIV-positive person on treatment can expect to live a normal life, and\
        \ die with the virus, not of it. Effective treatment for HIV-positive people\
        \ (people living with HIV) involves a life-long regimen of medicine to suppress\
        \ the virus, making the viral load undetectable.  Early testing can show if\
        \ treatment is needed to stop progression and to prevent infecting others.\n\
        Treatment is recommended as soon as the diagnosis is made. An HIV-positive\
        \ person who has an undetectable viral load as a result of long-term treatment\
        \ has effectively no risk of transmitting HIV sexually. Campaigns by UNAIDS\
        \ and organizations around the world have communicated this as Undetectable\
        \ = Untransmittable. \nWithout treatment the infection can interfere with\
        \ the immune system, and eventually progress to AIDS, sometimes taking many\
        \ years. Following initial infection an individual may not notice any symptoms,\
        \ or may experience a brief period of influenza-like illness. During this\
        \ period the person may not know that they are HIV-positive, yet they will\
        \ be able to pass on the virus. Typically, this period is followed by a prolonged\
        \ incubation period with no symptoms. Eventually the HIV infection increases\
        \ the risk of developing other infections such as tuberculosis, as well as\
        \ other opportunistic infections, and tumors which are rare in people who\
        \ have normal immune function. The late stage is often also associated with\
        \ unintended weight loss. Without treatment, the life expectancy of an individual\
        \ with HIV is around 11 years. \nHIV is spread primarily by unprotected sex\
        \ (including anal, oral and vaginal sex), contaminated hypodermic needles\
        \ or blood transfusions, and from mother to child during pregnancy, delivery,\
        \ or breastfeeding. Some bodily fluids, such as saliva, sweat, and tears,\
        \ do not transmit the virus. Oral sex has little risk of transmitting the\
        \ virus. Ways to avoid catching HIV and preventing the spread include safe\
        \ sex, treatment to prevent infection (\"PrEP\"), treatment to stop infection\
        \ in someone who has been recently exposed (\"PEP\"), treating those who are\
        \ infected, and needle exchange programs. Disease in a baby can often be prevented\
        \ by giving both the mother and child antiretroviral medication.\nRecognized\
        \ worldwide in the early 1980s, HIV/AIDS has had a large impact on society,\
        \ both as an illness and as a source of discrimination. The disease also has\
        \ large economic impacts. There are many misconceptions about HIV/AIDS, such\
        \ as the belief that it can be transmitted by casual non-sexual contact. The\
        \ disease has become subject to many controversies involving religion, including\
        \ the Catholic Church's position not to support condom use as prevention.\
        \ It has attracted international medical and political attention as well as\
        \ large-scale funding since it was identified in the 1980s.\nHIV made the\
        \ jump from other primates to humans in west-central Africa in the early-to-mid-20th\
        \ century. AIDS was first recognized by the U.S. Centers for Disease Control\
        \ and Prevention (CDC) in 1981 and its cause—HIV infection—was identified\
        \ in the early part of the decade. Between the first time AIDS was readily\
        \ identified through 2024, the disease is estimated to have caused at least\
        \ 42.3 million deaths worldwide. In 2023, 630,000 people died from HIV-related\
        \ causes, an estimated 1.3 million people acquired HIV and about 39.9 million\
        \ people worldwide living with HIV, 65% of whom are in the World Health Organization\
        \ (WHO) African Region. HIV/AIDS is considered a pandemic—a disease outbreak\
        \ which is present over a large area and is actively spreading. The United\
        \ States' National Institutes of Health (NIH) and the Gates Foundation have\
        \ pledged $200 million focused on developing a global cure for AIDS.\n\n##\
        \ Result 3\nTitle: Human body\nURL: https://en.wikipedia.org/wiki/Human_body\n\
        Extract: The human body is the entire structure of a human being. It is composed\
        \ of many different types of cells that together create tissues and subsequently\
        \ organs and then organ systems.\nThe external human body consists of a head,\
        \ hair, neck, torso (which includes the thorax and abdomen), genitals, arms,\
        \ hands, legs, and feet. The internal human body includes organs, teeth, bones,\
        \ muscles, tendons, ligaments, blood vessels and blood, lymphatic vessels\
        \ and lymph.\nThe study of the human body includes anatomy, physiology, histology,\
        \ and embryology. The body varies anatomically in known ways. Physiology focuses\
        \ on the systems and organs of the human body and their functions. Many systems\
        \ and mechanisms interact in order to maintain homeostasis, with safe levels\
        \ of substances such as sugar, iron, and oxygen in the blood.\nThe human body\
        \ is studied by health professionals, physiologists, anatomists, and artists\
        \ to assist them in their work.\n\n## Result 4\nTitle: Virus\nURL: https://en.wikipedia.org/wiki/Virus\n\
        Extract: A virus is a submicroscopic infectious agent that replicates only\
        \ inside the living cells of an organism. Viruses infect all life forms, from\
        \ animals and plants to microorganisms, including bacteria and archaea. Viruses\
        \ are found in almost every ecosystem on Earth and are the most numerous type\
        \ of biological entity. Since Dmitri Ivanovsky's 1892 article describing a\
        \ non-bacterial pathogen infecting tobacco plants and the discovery of the\
        \ tobacco mosaic virus by Martinus Beijerinck in 1898, more than 16,000 of\
        \ the millions of virus species have been described in detail. The study of\
        \ viruses is known as virology, a subspeciality of microbiology.\nWhen infected,\
        \ a host cell is often forced to rapidly produce thousands of copies of the\
        \ original virus. When not inside an infected cell or in the process of infecting\
        \ a cell, viruses exist in the form of independent viral particles, or virions,\
        \ consisting of (i) genetic material, i.e., long molecules of DNA or RNA that\
        \ encode the structure of the proteins by which the virus acts; (ii) a protein\
        \ coat, the capsid, which surrounds and protects the genetic material; and\
        \ in some cases (iii) an outside envelope of lipids. The shapes of these virus\
        \ particles range from simple helical and icosahedral forms to more complex\
        \ structures. Most virus species have virions too small to be seen with an\
        \ optical microscope and are one-hundredth the size of most bacteria.\nThe\
        \ origins of viruses in the evolutionary history of life are still unclear.\
        \ Some viruses may have evolved from plasmids, which are pieces of DNA that\
        \ can move between cells. Other viruses may have evolved from bacteria. In\
        \ evolution, viruses are an important means of horizontal gene transfer, which\
        \ increases genetic diversity in a way analogous to sexual reproduction. Viruses\
        \ are considered by some biologists to be a life form, because they carry\
        \ genetic material, reproduce, and evolve through natural selection, although\
        \ they lack some key characteristics, such as cell structure, that are generally\
        \ considered necessary criteria for defining life. Because they possess some\
        \ but not all such qualities, viruses have been described as \"organisms at\
        \ the edge of life\" and as replicators.\nViruses spread in many ways. One\
        \ transmission pathway is through disease-bearing organisms known as vectors:\
        \ for example, viruses are often transmitted from plant to plant by insects\
        \ that feed on plant sap, such as aphids; and viruses in animals can be carried\
        \ by blood-sucking insects. Many viruses spread in the air by coughing and\
        \ sneezing, including influenza viruses, SARS-CoV-2, chickenpox, smallpox,\
        \ and measles. Norovirus and rotavirus, common causes of viral gastroenteritis,\
        \ are transmitted by the faecal–oral route, passed by hand-to-mouth contact\
        \ or in food or water. The infectious dose of norovirus required to produce\
        \ infection in humans is fewer than 100 particles. HIV is one of several viruses\
        \ transmitted through sexual contact and by exposure to infected blood. The\
        \ variety of host cells that a virus can infect is called its host range:\
        \ this is narrow for viruses specialized to infect only a few species, or\
        \ broad for viruses capable of infecting many.\nViral infections in animals\
        \ provoke an immune response that usually eliminates the infecting virus.\
        \ Immune responses can also be produced by vaccines, which confer an artificially\
        \ acquired immunity to the specific viral infection. Some viruses, including\
        \ those that cause HIV/AIDS, HPV infection, and viral hepatitis, evade these\
        \ immune responses and result in chronic infections. Several classes of antiviral\
        \ drugs have been developed.\n\n## Result 5\nTitle: Pathophysiology of HIV/AIDS\n\
        URL: https://en.wikipedia.org/wiki/Pathophysiology_of_HIV/AIDS\nExtract: HIV\
        \ is commonly transmitted via unprotected sexual activity, blood transfusions,\
        \ hypodermic needles, and from mother to child. Upon acquisition of the virus,\
        \ the virus replicates inside and kills T helper cells, which are required\
        \ for almost all adaptive immune responses. There is an initial period of\
        \ influenza-like illness, and then a latent, asymptomatic phase. When the\
        \ CD4 lymphocyte count falls below 200 cells/ml of blood, the HIV host has\
        \ progressed to AIDS, a condition characterized by deficiency in cell-mediated\
        \ immunity and the resulting increased susceptibility to opportunistic infections\
        \ and certain forms of cancer.\n\n## Result 6\nTitle: Cytomegalovirus\nURL:\
        \ https://en.wikipedia.org/wiki/Cytomegalovirus\nExtract: Cytomegalovirus\
        \ (CMV) (from cyto- 'cell' via Greek κύτος kútos- 'container' + μέγας mégas\
        \ 'big, megalo-' + -virus via Latin vīrus 'poison') is a genus of viruses\
        \ in the order Herpesvirales, in the family Orthoherpesviridae, in the subfamily\
        \ Betaherpesvirinae. Humans and other primates serve as natural hosts. The\
        \ 11 species in this genus include Human cytomegalovirus (HCMV, HHV-5), which\
        \ is the species that infects humans. Diseases associated with HHV-5 include\
        \ mononucleosis and pneumonia, and congenital CMV in infants can lead to variety\
        \ of birth defects, including those involving the eyes, ears, liver, and spleen.\n\
        In the medical literature, most mentions of CMV without further specification\
        \ refer implicitly to human CMV. Human CMV is the most studied of all cytomegaloviruses.\n\
        MX2/MXB protein was identified as a restriction factor for herpesviruses,\
        \ which acts at a very early stage of the replication cycle and MX2/MXB restriction\
        \ of herpesvirus requires GTPase activity.\n\n## Result 7\nTitle: Epstein–Barr\
        \ virus\nURL: https://en.wikipedia.org/wiki/Epstein%E2%80%93Barr_virus\nExtract:\
        \ The Epstein–Barr virus (EBV;  EP-styne, Yiddish: [ˈɛpʃtejn]), also known\
        \ as human herpesvirus 4 (HHV-4), is one of the nine known human herpesvirus\
        \ types in the herpes family, and is one of the most common viruses in humans.\
        \ EBV is a double-stranded DNA virus. EBV is the first identified oncogenic\
        \ virus, a virus that can cause cancer. EBV establishes a permanent infection\
        \ in human B cells. It is the most common cause (90% of cases) of infectious\
        \ mononucleosis and is also tightly linked to many malignant diseases (cancers\
        \ and autoimmune diseases). Various vaccine formulations have been tested\
        \ in humans and other animals; however, none of them were able to prevent\
        \ EBV infection, and no vaccine has been approved to date.\nInfectious mononucleosis\
        \ (\"mono\" or \"glandular fever\"), is characterized by extreme fatigue,\
        \ fever, sore throat, and swollen lymph nodes. EBV is also associated with\
        \ various non-malignant, premalignant, and malignant EBV-associated lymphoproliferative\
        \ diseases such as Burkitt lymphoma, hemophagocytic lymphohistiocytosis, and\
        \ Hodgkin's lymphoma; non-lymphoid malignancies such as gastric cancer and\
        \ nasopharyngeal carcinoma; and conditions associated with human immunodeficiency\
        \ virus such as hairy leukoplakia and central nervous system lymphomas. The\
        \ virus is also associated with the childhood disorders of Alice in Wonderland\
        \ syndrome and acute cerebellar ataxia and, by some evidence, higher risks\
        \ of developing certain autoimmune diseases, especially dermatomyositis, systemic\
        \ lupus erythematosus, rheumatoid arthritis, and Sjögren's syndrome. About\
        \ 200,000 cancer cases globally per year are thought to be attributable to\
        \ EBV. In January 2022, a large study following 10 million active US military\
        \ over 20 years suggested EBV as the leading cause of multiple sclerosis (MS),\
        \ with a recent EBV infection causing a 32-fold increase in MS risk development.\n\
        Infection with EBV occurs by the oral transfer of saliva and genital secretions.\
        \ Most people become infected with EBV and gain adaptive immunity. In the\
        \ United States, about half of all five-year-old children and about 90% of\
        \ adults have evidence of previous infection. Infants become susceptible to\
        \ EBV as soon as maternal antibody protection disappears. Most children who\
        \ become infected with EBV display no symptoms, or the symptoms are indistinguishable\
        \ from other mild, brief illnesses of childhood. When infection occurs during\
        \ adolescence or young adulthood, it causes infectious mononucleosis 35 to\
        \ 50% of the time.\nEBV infects B cells of the immune system and epithelial\
        \ cells, and may infect T cells, NK cells, and histiocytic-dendritic cells.\
        \ Once EBV's initial lytic infection is brought under control, EBV latency\
        \ persists in the individual's memory B cells for the rest of their life.\n\
        \n## Result 8\nTitle: Adenoviridae\nURL: https://en.wikipedia.org/wiki/Adenoviridae\n\
        Extract: Adenoviruses (members of the family Adenoviridae) are medium-sized\
        \ (90–100 nm), nonenveloped (without an outer lipid bilayer) viruses with\
        \ an icosahedral nucleocapsid containing a double-stranded DNA genome. Their\
        \ name derives from their initial isolation from human adenoids in 1953.\n\
        They have a broad range of vertebrate hosts; in humans, more than 50 distinct\
        \ adenoviral serotypes have been found to cause a wide range of illnesses,\
        \ from mild respiratory infections in young children (the common cold) to\
        \ life-threatening multi-organ disease in people with a weakened immune system.\n\
        \n## Result 9\nTitle: Herpes simplex virus\nURL: https://en.wikipedia.org/wiki/Herpes_simplex_virus\n\
        Extract: Herpes simplex virus 1  and 2  (HSV-1 and HSV-2) are two members\
        \ of the human Herpesviridae family, a set of viruses that produce viral infections\
        \ in the majority of humans. Both HSV-1 and HSV-2 are very common and contagious.\
        \ They can be spread when an infected person begins shedding the virus.\n\
        As of 2016, about 67% of the world population under the age of 50 had HSV-1.\
        \ Because it can be transmitted through any intimate contact, it is one of\
        \ the most common sexually transmitted infections.\n\n## Result 10\nTitle:\
        \ Human herpesvirus 6\nURL: https://en.wikipedia.org/wiki/Human_herpesvirus_6\n\
        Extract: Human herpesvirus 6 (HHV-6) is the common collective name for human\
        \ herpesvirus 6A (HHV-6A) and human herpesvirus 6B (HHV-6B). These closely\
        \ related viruses are two of the nine known herpesviruses that have humans\
        \ as their primary host.\nHHV-6A and HHV-6B are double-stranded DNA viruses\
        \ within the Betaherpesvirinae subfamily and of the genus Roseolovirus. HHV-6A\
        \ and HHV-6B infect almost all of the human populations that have been tested.\n\
        HHV-6A has been described as more neurovirulent, and as such is more frequently\
        \ found in patients with neuroinflammatory diseases such as multiple sclerosis.\
        \ HHV-6 (and HHV-7) levels in the brain are also elevated in people with Alzheimer's\
        \ disease.\nHHV-6B primary infection is the cause of the common childhood\
        \ illness exanthema subitum (also known as roseola infantum or sixth disease).\
        \ It is passed on from child to child. It is uncommon for adults to contract\
        \ this disease as most people have had it by kindergarten, and once contracted,\
        \ immunity arises and prevents future reinfection. Additionally, HHV-6B reactivation\
        \ is common in transplant recipients, which can cause several clinical manifestations\
        \ such as encephalitis, bone marrow suppression, and pneumonitis.\nA variety\
        \ of tests are used in the detection of HHV-6, some of which do not differentiate\
        \ the two species.\nBoth viruses can cause transplacental infection and be\
        \ passed on to a newborn."
