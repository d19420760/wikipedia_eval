        \ of Chang'an-Tianshan Corridor is shared with Kazakhstan and Kyrgyzstan.\n\
        \n## Result 5\nTitle: World Heritage Site\nURL: https://en.wikipedia.org/wiki/World_Heritage_Site\n\
        Extract: World Heritage Sites are landmarks and areas with legal protection\
        \ under an international treaty administered by UNESCO for having cultural,\
        \ historical, or scientific significance. The sites are judged to contain\
        \ \"cultural and natural heritage around the world considered to be of outstanding\
        \ value to humanity\".\nTo be selected, a World Heritage Site is nominated\
        \ by its host country and determined by the UNESCO's World Heritage Committee\
        \ to be a unique landmark which is geographically and historically identifiable,\
        \ having a special cultural or physical significance, and to be under a sufficient\
        \ system of legal protection. World Heritage Sites might be ancient ruins\
        \ or historical structures, buildings, cities, deserts, forests, islands,\
        \ lakes, monuments, mountains, wilderness areas, memorial sites and others.\
        \ \nA World Heritage Site may signify a remarkable accomplishment of humankind\
        \ and serve as evidence of humanity's intellectual history on the planet,\
        \ or it might be a place of great natural beauty. As of July 2025, a total\
        \ of 1,248 World Heritage Sites exist across 170 countries.\nThe sites are\
        \ intended for practical conservation for posterity, which otherwise would\
        \ be subject to risk from human or animal trespassing, unmonitored, uncontrolled\
        \ or unrestricted access, or threat from local administrative negligence.\
        \ Sites are demarcated by UNESCO as protected zones. The World Heritage Sites\
        \ list is maintained by the international World Heritage Program administered\
        \ by the UNESCO World Heritage Committee, composed of 21 \"states parties\"\
        \ that are elected by the United Nations General Assembly, and advised by\
        \ reviews of international panels of experts in natural or cultural history,\
        \ and education. \nThe Program catalogues, names, and conserves sites of outstanding\
        \ cultural or natural importance to the common culture and heritage of humankind.\
        \ The programme began with the Convention Concerning the Protection of the\
        \ World Cultural and Natural Heritage, which was adopted by the General Conference\
        \ of UNESCO on 16 November 1972. Since then, 196 states have ratified the\
        \ convention, making it one of the most widely recognised international agreements\
        \ and the world's most popular cultural programme.\n\n## Result 6\nTitle:\
