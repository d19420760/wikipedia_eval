        \ The third professional major was the French Pro Championship, played between\
        \ 1934 and 1968, on the clay courts of Roland Garros, apart from 1963 to 1967,\
        \ when it was played on the indoor wood courts of Stade Coubertin.\nThe Open\
        \ Era of tennis began in 1968, when the Grand Slam tournaments agreed to allow\
