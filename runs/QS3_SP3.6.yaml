      content: "## Result 1\nTitle: Neil Armstrong\nURL: https://en.wikipedia.org/wiki/Neil_Armstrong\n\
        Extract: Neil Alden Armstrong (August 5, 1930 – August 25, 2012) was an American\
        \ astronaut and aeronautical engineer who, as the commander of the 1969 Apollo\
        \ 11 mission, became the first person to walk on the Moon. He was also a naval\
        \ aviator, test pilot and university professor.\nArmstrong was born and raised\
        \ near Wapakoneta, Ohio. He entered Purdue University, studying aeronautical\
        \ engineering, with the United States Navy paying his tuition under the Holloway\
        \ Plan.  He became a midshipman in 1949 and a naval aviator the following\
        \ year. He saw action in the Korean War, flying the Grumman F9F Panther from\
        \ the aircraft carrier USS Essex. After the war, he completed his bachelor's\
        \ degree at Purdue and became a test pilot at the National Advisory Committee\
        \ for Aeronautics (NACA) High-Speed Flight Station at Edwards Air Force Base\
        \ in California. He was the project pilot on Century Series fighters and flew\
        \ the North American X-15 seven times. He was also a participant in the U.S.\
        \ Air Force's Man in Space Soonest and X-20 Dyna-Soar human spaceflight programs.\n\
        Armstrong joined the NASA Astronaut Corps in the second group, which was selected\
        \ in 1962. He made his first spaceflight as command pilot of Gemini 8 in March\
        \ 1966, becoming NASA's first civilian astronaut to fly in space. During this\
        \ mission with pilot David Scott, he performed the first docking of two spacecraft;\
        \ the mission was aborted after Armstrong used some of his re-entry control\
        \ fuel to stabilize a dangerous roll caused by a stuck thruster. During training\
        \ for Armstrong's second and last spaceflight as commander of Apollo 11, he\
        \ had to eject from the Lunar Landing Research Vehicle moments before a crash.\n\
        On July 20, 1969, Armstrong and Apollo 11 Lunar Module (LM) pilot Buzz Aldrin\
        \ became the first people to land on the Moon, and the next day they spent\
        \ two and a half hours outside the Lunar Module Eagle spacecraft while Michael\
        \ Collins remained in lunar orbit in the Apollo Command Module Columbia. When\
        \ Armstrong first stepped onto the lunar surface, he famously said: \"That's\
        \ one small step for [a] man, one giant leap for mankind.\" It was broadcast\
        \ live to an estimated 530 million viewers worldwide. Apollo 11 was a major\
        \ U.S. victory in the Space Race, by fulfilling a national goal proposed in\
        \ 1961 by President John F. Kennedy \"of landing a man on the Moon and returning\
        \ him safely to the Earth\" before the end of the decade. Along with Collins\
        \ and Aldrin, Armstrong was awarded the Presidential Medal of Freedom by President\
        \ Richard Nixon and received the 1969 Collier Trophy. President Jimmy Carter\
        \ presented him with the Congressional Space Medal of Honor in 1978, he was\
        \ inducted into the National Aviation Hall of Fame in 1979, and with his former\
        \ crewmates received the Congressional Gold Medal in 2009.\nAfter he resigned\
        \ from NASA in 1971, Armstrong taught in the Department of Aerospace Engineering\
        \ at the University of Cincinnati until 1979. He served on the Apollo 13 accident\
        \ investigation and on the Rogers Commission, which investigated the Space\
        \ Shuttle Challenger disaster. In 2012, Armstrong died due to complications\
        \ resulting from coronary bypass surgery, at the age of 82.\n\n## Result 2\n\
        Title: Apollo 11 missing tapes\nURL: https://en.wikipedia.org/wiki/Apollo_11_missing_tapes\n\
        Extract: The Apollo 11 missing tapes were those that were recorded from Apollo\
        \ 11's slow-scan television (SSTV) telecast in its raw format on telemetry\
        \ data tape at the time of the first Moon landing in 1969 and subsequently\
        \ lost. The data tapes were used to record all transmitted data, video as\
        \ well as telemetry, for backup. \nApollo 11 was also equipped with other\
        \ imaging systems whose original high-resolution data survive, notably the\
        \ 16mm Maurer Data Acquisition Camera, which recorded Armstrong's descent\
        \ down the ladder and approximately 86 minutes of the lunar EVA, as well as\
        \ Hasselblad 70mm still cameras. \nTo broadcast the SSTV transmission on standard\
        \ television, NASA ground receiving stations performed real-time scan conversion\
        \ to the NTSC television format. The moonwalk's converted video signal was\
        \ broadcast live around the world on July 21, 1969 (2:56 UTC). At the time,\
        \ the NTSC broadcast was recorded on many videotapes and kinescope films.\
        \ Many of these low-quality recordings remain intact. As the real-time broadcast\
        \ worked and was widely recorded, preservation of the backup video was not\
        \ deemed a priority in the years immediately following the mission. In the\
        \ early 1980s, NASA's Landsat program was facing a severe shortage of data\
        \ tapes and it is likely the tapes were erased and reused at this time.\n\
        A team of retired NASA employees and contractors tried to find the tapes in\
        \ the early 2000s but was unable to do so. The search was sparked when several\
        \ still photographs appeared in the late 1990s that showed the visually superior\
        \ raw SSTV transmission on ground-station monitors. The research team conducted\
        \ a multi-year investigation in the hopes of finding the most pristine and\
        \ detailed video images of the moonwalk. If copies of the original SSTV format\
        \ tapes were to be found, more modern digital technology could make a higher-quality\
        \ conversion, yielding better images than those originally seen. The researchers\
        \ concluded that the tapes containing the raw unprocessed Apollo 11 SSTV signal\
        \ were erased and reused by NASA in the early 1980s, following standard procedure\
        \ at the time. \nAlthough the researchers never found the telemetry tapes,\
        \ they did discover the best visual quality NTSC videotapes as well as Super\
        \ 8 movie film taken of a video monitor in Australia, showing the SSTV transmission\
        \ before it was converted. These visual elements were processed in 2009, as\
        \ part of a NASA-approved restoration project of the first moonwalk. At a\
        \ 2009 news conference in Washington, D.C., the research team released its\
        \ findings regarding the tapes' disappearance. They also partially released\
        \ newly enhanced footage obtained during the search. Lowry Digital completed\
        \ the full moonwalk restoration project in late 2009.\n\n## Result 3\nTitle:\
        \ Apollo 11\nURL: https://en.wikipedia.org/wiki/Apollo_11\nExtract: Apollo\
        \ 11 (July 16–24, 1969) was the American spaceflight that first landed humans\
        \ on the Moon, and the fifth crewed mission of NASA's Apollo program. The\
        \ mission was crewed by Commander Neil Armstrong, Command Module Pilot Michael\
        \ Collins, and Lunar Module Pilot Edwin \"Buzz\" Aldrin, all of whom were\
        \ on their second and final spaceflight.\nLaunched atop a Saturn V rocket\
        \ from Kennedy Space Center in Florida on July 16 at 13:32 UTC, the Apollo\
        \ spacecraft consisted of three parts: the command module (CM), which housed\
        \ the three astronauts and was the only part to return to Earth; the service\
        \ module (SM), which provided propulsion, electrical power, oxygen, and water\
        \ to the command module; and the Lunar Module (LM), which had two stages—a\
        \ descent stage with a large engine and fuel tanks for landing on the Moon,\
        \ and a lighter ascent stage containing a cabin for two astronauts and a small\
        \ engine to return them to lunar orbit. After a three-day transit, Armstrong\
        \ and Aldrin descended to the surface aboard the LM Eagle, landing in the\
        \ Sea of Tranquility (Mare Tranquillitatis) on July 20 at 20:17 UTC while\
        \ Collins remained in lunar orbit aboard the CM Columbia. Armstrong became\
        \ the first human to walk on the Moon approximately six hours after landing,\
        \ followed by Aldrin nineteen minutes later. Together they spent around two\
        \ and a half hours walking on the surface, planting an American flag, speaking\
        \ by telephone with President Richard Nixon, deploying scientific instruments,\
        \ and collecting 21.5 kg (47.5 lb) of lunar material. After more than 21 hours\
        \ on the surface, they rejoined Collins in lunar orbit, and the crew returned\
        \ safely to Earth on July 24, splashing down in the Pacific Ocean.\nApollo\
        \ 11 was the culmination of the Space Race, a geopolitical competition between\
        \ the United States and the Soviet Union rooted in Cold War rivalry. It fulfilled\
        \ a national goal set by President John F. Kennedy in May 1961, who had challenged\
        \ the United States to land a man on the Moon and return him safely before\
        \ the end of the decade. The program overcame a severe setback with the fatal\
        \ Apollo 1 launchpad fire in January 1967 and drew on technologies developed\
        \ through the preceding Mercury and Gemini programs. The Soviet Union, despite\
        \ early leads in spaceflight, was unable to match the Saturn V rocket, and\
        \ its uncrewed lunar probe Luna 15 crashed on the Moon on July 21, while Neil\
        \ Armstrong and Buzz Aldrin were still on the lunar surface.\nArmstrong's\
        \ moonwalk was broadcast live to an estimated 600 million viewers, roughly\
        \ one-fifth of the world's population, making it among the most-watched television\
        \ events in history. Stepping onto the lunar surface, Armstrong declared:\
        \ \"That's one small step for [a] man, one giant leap for mankind.\" Lunar\
        \ samples returned by the mission led to the identification of three previously\
        \ unrecognized minerals, and scientific instruments deployed on the surface\
        \ continued returning data for years afterwards. The crew were honoured with\
        \ ticker-tape parades, a world goodwill tour, and the Presidential Medal of\
        \ Freedom. The command module Columbia is preserved at the National Air and\
        \ Space Museum in Washington, D.C., while the descent stage of Eagle remains\
        \ on the lunar surface.\n\n## Result 4\nTitle: Apollo program\nURL: https://en.wikipedia.org/wiki/Apollo_program\n\
        Extract: The Apollo program, also known as Project Apollo, was the United\
        \ States human spaceflight program led by NASA, which landed the first humans\
        \ on the Moon in 1969. Apollo was conceived in 1960 in the Dwight D. Eisenhower\
        \ presidency during Project Mercury and executed after Project Gemini. Apollo\
        \ was later dedicated to President John F. Kennedy's national goal, \"before\
        \ this decade is out, of landing a man on the Moon and returning him safely\
        \ to the Earth\" in his address to the U.S. Congress on May 25, 1961.\nKennedy's\
        \ goal was accomplished on the Apollo 11 mission, when astronauts Neil Armstrong\
        \ and Buzz Aldrin landed their Apollo Lunar Module (LM) on July 20, 1969,\
        \ and walked on the lunar surface, while Michael Collins remained in lunar\
        \ orbit in the command and service module (CSM), and all three landed safely\
        \ on Earth in the Pacific Ocean on July 24. Approximately 650 million people\
        \ worldwide watched this first landing on television. Five subsequent Apollo\
        \ missions also landed astronauts on the Moon, the last, Apollo 17, in December\
        \ 1972. In these six spaceflights, twelve people walked on the Moon.\n\nApollo\
        \ ran from 1961 to 1972, with the first crewed flight in 1968. It encountered\
        \ a major setback in 1967 when the Apollo 1 cabin fire killed the entire crew\
        \ during a prelaunch test. After the first Moon landing, sufficient flight\
        \ hardware remained for nine follow-on landings with a plan for extended lunar\
        \ geological and astrophysical exploration. Budget cuts forced the cancellation\
        \ of three of these. Five of the remaining six missions achieved landings;\
        \ but the Apollo 13 landing had to be aborted after an oxygen tank exploded\
        \ en route to the Moon, crippling the CSM. The crew barely managed a safe\
        \ return to Earth by using the Lunar Module as a \"lifeboat\" on the return\
        \ journey. \nApollo used the Saturn family of rockets as launch vehicles,\
        \ which were also used for an Apollo Applications Program, which consisted\
        \ of Skylab, a space station that supported three crewed missions in 1973–1974,\
        \ and the Apollo–Soyuz Test Project, a joint United States-Soviet Union low\
        \ Earth orbit mission in 1975.\nApollo set several major human spaceflight\
        \ milestones. It stands alone in sending humans to the lunar surface. Apollo\
        \ 8 was the first crewed mission to leave low Earth orbit and to orbit another\
        \ celestial body, and Apollo 11 was the first crewed mission to land humans\
        \ on one.\nOverall, the Apollo program returned 842 pounds (382 kg) of lunar\
        \ rocks to Earth, greatly contributing to the understanding of the Moon's\
        \ composition and geological history. The program laid the foundation for\
        \ NASA's subsequent human spaceflight capability and funded construction of\
        \ its Johnson Space Center and Kennedy Space Center. Apollo also spurred advances\
        \ in many areas of technology incidental to rocketry and human spaceflight,\
        \ including avionics, telecommunications, and computers.\nFollowing the end\
        \ of the Apollo program, humans would not leave low Earth orbit until the\
        \ Artemis II flyby of the Moon in 2026, as part of the Artemis program, established\
        \ as a successor to Apollo in 2017. Artemis intends to return humans to the\
        \ Moon's surface no earlier than 2028.\n\n## Result 5\nTitle: List of Apollo\
        \ missions\nURL: https://en.wikipedia.org/wiki/List_of_Apollo_missions\nExtract:\
        \ The Apollo program was a United States human spaceflight program carried\
        \ out from 1961 to 1972 by the National Aeronautics and Space Administration\
        \ (NASA), which landed the first astronauts on the Moon. The program used\
        \ the Saturn IB and Saturn V launch vehicles to lift the Command/Service Module\
        \ (CSM) and Lunar Module (LM) spacecraft into space, and the Little Joe II\
        \ rocket to test a launch escape system which was expected to carry the astronauts\
        \ to safety in the event of a Saturn failure. Uncrewed test flights beginning\
        \ in 1966 demonstrated the safety of the launch vehicles and spacecraft to\
        \ carry astronauts, and four crewed flights beginning in October 1968 demonstrated\
        \ the ability of the spacecraft to carry out a lunar landing mission.\nApollo\
        \ achieved the first crewed lunar landing on the Apollo 11 mission, when Neil\
        \ Armstrong and Buzz Aldrin landed their LM Eagle in the Sea of Tranquility\
        \ and walked on the lunar surface, while Michael Collins remained in lunar\
        \ orbit in the CSM Columbia, and all three landed safely on Earth on July\
        \ 24, 1969. Five subsequent missions landed astronauts on various lunar sites,\
        \ ending in December 1972 with 12 men having walked on the Moon and 842 pounds\
        \ (382 kg) of lunar rocks and soil samples returned to Earth, greatly contributing\
        \ to the understanding of the Moon's composition and geological history.\n\
        Two Apollo missions were failures: a 1967 cabin fire killed the entire Apollo\
        \ 1 crew during a ground test in preparation for what was to be the first\
        \ crewed flight; and the third landing attempt on Apollo 13 was aborted by\
        \ an oxygen tank explosion en route to the Moon, which disabled the CSM Odyssey's\
        \ electrical power and life support systems, and made the propulsion system\
        \ unsafe to use. The crew circled the Moon and were returned safely to Earth\
        \ using the LM Aquarius as a \"lifeboat\" for these functions.\n\n## Result\
        \ 6\nTitle: Apollo 12\nURL: https://en.wikipedia.org/wiki/Apollo_12\nExtract:\
        \ Apollo 12 (November 14–24, 1969) was the sixth crewed flight in the United\
        \ States Apollo program and the second to land on the Moon. It was launched\
        \ on November 14, 1969, by NASA from the Kennedy Space Center in Florida,\
        \ landing on the part of the Moon called the Ocean of Storms on November 19,\
        \ 1969. Commander Charles \"Pete\" Conrad and Lunar Module Pilot Alan L. Bean\
        \ completed just over one day and seven hours of lunar surface activity while\
        \ Command Module Pilot Richard F. Gordon remained in lunar orbit.\nApollo\
        \ 12 would have attempted the first lunar landing had Apollo 11 failed, but\
        \ after the success of the earlier mission, Apollo 12 was postponed by two\
        \ months, and other Apollo missions also put on a more relaxed schedule. More\
        \ time was allotted for geologic training in preparation for Apollo 12 than\
        \ for Apollo 11, Conrad and Bean making several geology field trips in preparation\
        \ for their mission. Apollo 12's spacecraft and launch vehicle were almost\
        \ identical to Apollo 11's. One addition was a set of hammocks, designed to\
        \ provide Conrad and Bean with a more comfortable resting arrangement inside\
        \ the Lunar Module during their stay on the Moon.\nShortly after being launched\
        \ on a rainy day at Kennedy Space Center, Apollo 12 was twice struck by lightning,\
        \ causing instrumentation problems but little damage. The crew found that\
        \ switching to the auxiliary power supply resolved the data relay problem,\
        \ which helped save the mission. The outward journey to the Moon otherwise\
        \ saw few problems. On November 19, Conrad and Bean achieved a precise landing\
        \ at their expected location within walking distance of the Surveyor 3 robotic\
        \ probe, which had landed on April 20, 1967. In making a pinpoint landing,\
        \ they showed that NASA could plan future missions in the expectation that\
        \ astronauts could land close to sites of scientific interest. Conrad and\
        \ Bean carried the Apollo Lunar Surface Experiments Package, a group of nuclear-powered\
        \ scientific instruments, as well as the first color television camera taken\
        \ by an Apollo mission to the lunar surface, but transmission was lost after\
        \ Bean accidentally pointed the camera at the Sun and its sensor was burned\
        \ out. On the second of two moonwalks, they visited Surveyor 3 and removed\
        \ parts for return to Earth.\nLunar Module Intrepid lifted off from the Moon\
        \ on November 20 and docked with the command module, which subsequently traveled\
        \ back to Earth. The Apollo 12 mission ended on November 24 with a splashdown.\n\
        \n## Result 7\nTitle: Lunar Panoramic Photography - Apollo 11\nURL: https://en.wikipedia.org/wiki/Lunar_Panoramic_Photography_-_Apollo_11\n\
        Extract: NASA's Apollo Lunar Surface Journal (ALSJ) records the details of\
        \ each mission's period on the lunar surface as a timeline of the activities\
        \ undertaken, the dialogue between the crew and Mission Control, and the relevant\
        \ documentary records. It catalogues each photograph taken and each multi-frame,\
        \ panoramic, sequence is also recorded. The panoramas would be in the form\
        \ of a number of overlapping frames that would be airbrushed together as a\
        \ mosaic once the film had been processed back on Earth. By recording the\
        \ site in this way, all other aspects of the mission to the surface could\
