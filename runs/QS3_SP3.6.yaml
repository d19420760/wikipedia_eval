        \ and US Open (August–September). \nThere was no prize money and players were\
        \ compensated for travel expenses only. A player who wins all four current\
        \ major tournaments in the same calendar year, as an individual or as part\
        \ of a doubles team, is said to have achieved the \"Grand Slam\". If the player\
        \ wins all four consecutively, but not in the same calendar year, it is called\
        \ a \"Non-Calendar Year Grand Slam\". Winning all four at some point in a\
        \ career, even if not consecutively, is referred to as a \"Career Grand Slam\"\
        . Winning the four majors and a gold medal in tennis at the Summer Olympics\
        \ has been called a \"Golden Slam\" since 1988. Winning all four plus gold\
        \ at some point in a career, even if not consecutively, is referred to as\
