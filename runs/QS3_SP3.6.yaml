        ## Result 1
        Title: History of McDonald's
        URL: https://en.wikipedia.org/wiki/History_of_McDonald's
        Extract: {{Short description|none}} <!-- "none" is preferred when the title is sufficiently descriptive; see [[WP:SDNONE]] -->
        {{Use mdy dates|date=January 2021}}[[File:McDonald's square 2020.svg|thumb|200px|McDonald's logo since 2018]]

        The American [[fast-food restaurant]] chain [[McDonald's]] was founded in 1940 by the McDonald brothers, [[Richard and Maurice McDonald|Richard and Maurice]], and has since grown to the world's largest [[restaurant chain]] by revenue.<ref>{{cite web|url=https://www.forbes.com/pictures/591c79084bbe6f1b730a5811/2017-global-2000-restaura/#78d0bcc36d2a|title=McDonald's Is King Of Restaurants In 2017 – pg.1|website=Forbes|access-date=December 12, 2017}}</ref> The McDonald brothers began the business in [[San Bernardino, California]], where the brothers set out to sell their barbecue. However, burgers were more popular with the public and the business model switched to a [[carhop]] drive-in style of restaurant. From the 1940s to the mid-1950s, the brothers expanded their business, even incorporating the famous [[Golden Arches]], until [[Ray Kroc]] turned their small business into the well-known and commercially successful business it is today. Kroc convinced the brothers to move into a more self-serve business model and to expand nationwide.

        Kroc and the McDonald brothers worked together for several years until conflicts over their visions for what McDonald's as a brand should be came to a climax. Kroc asked the McDonald brothers in 1961 how much they would be willing to leave the business for and the brothers agreed to leave for 2.7 million dollars. [[Harry J. Sonneborn]] and Kroc worked together until Sonneborn's resignation in 1967. That same year, McDonald's expanded internationally and now has locations in most countries around the globe. McDonald's operates as one of the largest private employers in the world. Its CEO is [[Chris Kempczinski|Christopher J. Kempczinski]]. Its revenue hits about $26 billion every year.<ref>{{Cite web |date=2024-09-20 |title=Britannica Money |url=https://www.britannica.com/money/McDonalds |access-date=2024-09-22 |website=www.britannica.com |language=en}}</ref>
        == The family years of McDonald's ==
        [[File:DowneyMcdonalds.jpg|thumb|250px|right|The [[Oldest McDonald's restaurant|oldest operating McDonald's]], on Lakewood and [[Florence Avenue|Florence]] in [[Downey, California]] in March 2007, was the chain's third restaurant and the second to be built with the Golden Arches.]][[McDonald's]] was founded in 1940s California by the [[Richard and Maurice McDonald|McDonald brothers]]. Before opening the first restaurant, members of the McDonald family had operated several businesses together around [[California]]. In 1937, an orange juice stand on Route 66, in [[Monrovia, California|Monrovia]] was opened. Sources diverge on whether this was done by the brothers Richard and Maurice McDonald ("Dick" and "Mac")<ref>{{Cite book |last=Shapiro |first=Kelli |title=The Oxford Encyclopedia of the Modern World |publisher=[[Oxford University Press]] |year=2008 |isbn=9780195341126 |editor-last=Stearns |editor-first=Peter N. |editor-link=Peter Stearns}}</ref><ref name=":1">{{Cite journal |last=Hess |first=Alan |author-link=Alan Hess |date=March 1986 |title=The Origins of McDonald's Golden Arches |journal=[[Journal of the Society of Architectural Historians]] |volume=45 |issue=1 |pages=60–67 |doi=10.2307/990129 |jstor=990129}}</ref>{{Rp|page=61}}or by their father Patrick, with the brothers entering the business later.<ref>{{Cite book |last=Skrabec |first=Quentin R. |title=The 100 Most Significant Events in American Business: An Encyclopedia |publisher=[[Bloomsbury Publishing|Bloomsbury Academic]] |year=2012 |isbn=9780313398629}}</ref>{{Rp|page=[https://books.google.com/books?id=IBYJbFS52f0C&q=1937%2C+Patrick+McDonald+opened+%22Mcdonald%27s%22&pg=PA206 206]}} In 1940, the McDonalds opened a barbecue stand in [[San Bernardino, California|San Bernardino]].<ref name=":1" />

        The McDonald's brothers opened their first McDonald's restaurant on May 15, 1940 in San Bernardino, California. Originally, a [[carhop]] [[drive-in]] system was used to serve customers. The initial menu items were centered around barbecue and the first name the brothers used for their business was "McDonald's Famous Barbecue."<ref>{{Cite web |title=The world's first McDonald's restaurant |work=The Times of India |url=https://timesofindia.indiatimes.com/travel/eating-out/the-worlds-first-mcdonalds-restaurant/articleshow/36048438.cms}}</ref> In 1948, the McDonald brothers realized that most of their profits derived from the sale of hamburgers. They shuttered their successful carhop drive-in to establish a streamlined system with a simple menu that consisted of only hamburgers, cheeseburgers, [[potato chip]]s, coffee, ice cream, soft drinks, and apple pie.<ref name="Bryson">{{cite book|last=Bryson|first=Bill|title=Made in America|date=1994|page=338}}</ref>

        In April 1952, the brothers decided that they needed an entirely new building to achieve two goals: further efficiency improvements and a more eye-catching appearance. They collected recommendations for an architect and interviewed at least four, choosing [[Stanley Clark Meston]], who practiced in nearby Fontana.<ref name="Hess">{{cite journal |last=Hess |first=Alan |date=March 1986 |title=The Origins of McDonald's Golden Arches |journal=Journal of the Society of Architectural Historians |volume=45 |issue=1 |pages=60–67 |doi=10.2307/990129 |jstor=990129}}</ref> The brothers and Meston worked together closely in the design of the new building. They achieved the extra efficiencies that they needed by, among other things, drawing the actual measurements of every piece of equipment in chalk on a tennis court behind the McDonald house (with Meston's assistant, Charles Fish).<ref name=HessBlog>{{cite web|last=Hess|first=Alan|title=The oldest McDonald's as Architecture|url=http://alanhess.blogspot.sg/2013/08/the-oldest-mcdonalds-as-architecture.html|access-date=2 March 2014|date=2013-08-14}}</ref>

        The new design achieved a great deal of notice for its gleaming surfaces of red and white ceramic tile, stainless steel, brightly colored sheet metal and glass; pulsing red, white, yellow and green neon; and two 25-foot yellow sheet-metal arches trimmed in neon, which they named the "[[golden arches|Golden Arches]]" at the design stage. A third, smaller arch sign at the roadside depicted a pudgy character in a chef's hat known as Speedee striding across the top, trimmed in animated neon. The brothers implemented a number of techniques to encourage customers to eat more quickly and not to linger in the restaurant, such as reduced heating in the dining area, fixed and angled seating to place customers directly over their food, distance between seats to reduce socialization and cone-shaped cups, which would force customers to hold their drinks while eating.<ref name="Hess" />

        In late 1953, with only a rendering of Meston's design in hand, the brothers began seeking franchisees.<ref name="Hess"/> Their first was Neil Fox, a distributor for General Petroleum Corporation. Fox's stand, the first with Meston's golden arches design, opened in May 1953 at 4050 North Central Avenue and Indian School Road in [[Phoenix, Arizona]]. The cost was a flat fee of $1,000 ({{Inflation|US|1000|1953|r=-2|fmt=eq}}). His restaurant was the first to employ the McDonald brothers' ''Golden Arches'' standardized design, created by Southern California architect [[Stanley Clark Meston]] and his assistant Charles Fish. Fox's use of the "McDonald's" name came as a surprise to the brothers. One of their franchisees (Charles Cox in North Hollywood, CA) would use the name "Peaks" from 1953 until 1965, but all others would be "McDonald's".{{citation needed|date=February 2026}}

        Their second franchisee was the team of Fox's brother-in-law Roger Williams and Burdette "Bud" Landon, both of whom also worked for General Petroleum. Williams and Landon opened their stand on August 18, 1953 at 10207 Lakewood Boulevard in [[Downey, California]]. The Downey stand is the [[Oldest McDonald's restaurant|oldest surviving McDonald's restaurant]].<ref name="Warren 2018">{{cite web | last=Warren | first=Gary | title=Posts From The Road: Oldest McDonald's In America | website=Los Alamos Daily Post – Los Alamos Online News | date=2018-10-20 | url=https://ladailypost.com/posts-from-the-road-nations-oldest-mcdonalds-restaurant/ | access-date=2021-06-17}}</ref><ref name="Peterson 2015">{{cite web | last=Peterson | first=Lucas | title=A Pilgrimage to the World's Oldest Surviving McDonald's | website=Eater LA | date=2015-04-16 | url=https://la.eater.com/2015/4/16/8432039/worlds-oldest-surviving-mcdonalds-los-angeles-downey-feature-photos | access-date=2021-06-17}}</ref><ref name="Becher 2018">{{cite web | last=Becher | first=Brooke | title=Downey's historic McDonalds [''sic''] at 65: Memories bitter and sweet shared under the golden arches | website=Press Telegram | date=2018-08-18 | url=https://www.presstelegram.com/downeys-historic-mcdonalds-at-65-memories-bitter-and-sweet-shared-under-the-golden-arches | access-date=2021-06-17}}</ref>

        == Ray Kroc enters ==
        [[File:Ray Kroc 1976.jpg|thumb|right|150px|[[Ray Kroc]] joined the chain in 1954 and built it into an eventually global franchise, making it the most successful fast-food corporation in the world.]]In 1954, [[Ray Kroc]], a seller of Prince Castle brand Multimixer milkshake machines, learned that the McDonald brothers were using eight of his machines at their San Bernardino restaurant. His curiosity was piqued, and he flew to California to visit the restaurant himself. The McDonald brothers operated six franchise locations.<ref name="money.com">{{Cite web|url=http://money.com/money/4602541/the-founder-mcdonalds-movie-accuracy/|title='The Founder' and the Complicated True Story Behind the Founding of McDonald's|website=Money|language=en|access-date=2019-09-30|archive-date=October 9, 2019|archive-url=https://web.archive.org/web/20191009033344/http://money.com/money/4602541/the-founder-mcdonalds-movie-accuracy/|url-status=dead}}</ref>

        Believing that the McDonald's formula was a ticket to success, Kroc suggested that the brothers franchise their restaurants throughout the United States. The brothers were skeptical that the self-service approach could succeed in colder, rainier climates; furthermore, their thriving business in San Bernardino, and franchises already operating or planned, made them reluctant to risk a national venture. Kroc offered to assume the major responsibility for establishing the new franchises elsewhere. He returned to his home outside of Chicago with rights to set up McDonald's restaurants throughout the country, except in a handful of territories in California and Arizona already licensed by the McDonald brothers. The brothers were to receive 0.5% of gross sales.<ref name="Hess"/>

        === Sonneborn model and shift to real-estate holdings ===
        In 1956, Ray Kroc met [[Harry J. Sonneborn]], a former vice president of finance for [[Tastee-Freez]], who offered an idea to accelerate the growth and investment grade of Kroc's planned McDonald's operation: to own the real estate upon which future franchises would be built. Kroc hired Sonneborn and his plan was executed by forming a separate company, Franchise Realty Corp, to hold McDonald's real estate. The new company signed leases and procured mortgages for both land and buildings, passing these costs on to the franchisee with a 20-40% markup and a reduced initial deposit of $950.<ref name="How McDonald's Works">{{Cite web|url=https://money.howstuffworks.com/mcdonalds.htm|title=How McDonald's Works|date=2008-10-20|website=HowStuffWorks|language=en|access-date=2019-09-30}}</ref><ref>{{Cite web|url=https://www.wiley.com/legacy/products/subject/business/forbes/kroc.html|title=Ray Kroc and the Fast Food Industry|website=www.wiley.com|access-date=2019-09-30}}</ref> The "Sonneborn model" of real-estate ownership within the franchise persists to this day, and may be the most important financial decision in the company's history. McDonald's present-day real-estate holdings represent $37.7 billion on its balance sheet, about 99% of the company's assets and 35% of its annual gross revenue.<ref>{{Cite web|url=https://www.fool.com/investing/general/2016/03/06/mcdonalds-corporation-a-real-estate-empire-finance.aspx|title=McDonald's Corporation: A Real Estate Empire Financed by French Fries|last=Brownlee|first=Adam|date=Sep 21, 2018|website=Motley Fool}}</ref>

        == 1960s ==
        [[File:McDonald's commercial (1963).webm|right|thumb|The first television commercial to feature the Ronald McDonald character, from 1963 portrayed by Willard Scott]]
        [[File:McD Big Mac.png|thumb|right|The [[Big Mac]] hamburger made its debut in 1968.]]
        By 1960, McDonald's restaurants were grossing $56 million annually. The growth in U.S. automobile use that came with suburbanization and the [[interstate highway system]] contributed heavily to McDonald's success. In 1961, Kroc's conflict over the vision of the company with the founding brothers had escalated, and he asked them how much money they wanted to leave their business to him entirely. The brothers asked for $2.7 million ($23.4 million in 2021 dollars), which Kroc did not have. [[Harry J. Sonneborn]] was able to raise the money for him, and Kroc bought the founding brothers' interests in the company. This purchase laid the groundwork for positioning the company for an [[Initial public offering|IPO]] and making McDonald's the top fast-food chain in the country. The exact process by which the company was sold is not known; it is depicted as a [[hostile takeover]] by Kroc in the 2016 biographical film ''[[The Founder]],'' but that portrayal has been disputed, and interviews from the time suggest a more voluntary transition.<ref name="money.com"/><ref>{{Cite web|url=https://www.marketplace.org/2017/02/09/ray-kroc-mcdonalds-fast-food/|title=The true origin story behind McDonald's|date=February 9, 2017|website=Marketplace|language=en-US|access-date=September 30, 2019}}</ref>

        Kroc and Sonneborn disagreed over expansion of the company, leading to Sonneborn's resignation in 1967. Kroc took over the title of CEO and president.<ref name="How McDonald's Works"/> That same year, McDonald's opened its first location outside of the United States in [[Richmond, British Columbia]]<ref name="Our History">{{Cite web |title=Our History|url=https://www.mcdonalds.com/ca/en-ca/about-us/our-history.html|publisher=[[McDonald's Canada]]|language=en-US|access-date=July 17, 2025}}</ref>

        In 1968, a man named Herman Petty was the first African American to franchise a McDonald's. This came off the heels of [[Civil rights movement|the civil rights movement]] and was informally recognized as African American's initial business entry into McDonald's as a cooperation.<ref>{{Cite web |last=Chatelain |first=MArcia |date=July 6, 2020 |title=The complicated history of McDonald's and Black America |url=https://www.marketplace.org/2020/07/06/the-complicated-history-of-mcdonalds-and-black-america/}}</ref>

        McDonald's success in the 1960s was largely the result of the company's skillful marketing and flexible response to customer demand. In 1962, the [[Filet-O-Fish]] sandwich, billed as "the fish that catches people," was introduced.<ref name="NYTimes">{{cite news|last=Smith|first=Craig S.|date=November 7, 2002|title=North Sea Cod Crisis Brings Call for Nations to Act|newspaper=[[The New York Times]]|url=https://www.nytimes.com/2002/11/07/world/north-sea-cod-crisis-brings-call-for-nations-to-act.html|access-date=2010-12-30}}</ref> In 1967, the [[Big Mac]] was created by Jim Delligatti, whose franchised McDonald's was in [[Uniontown, Pennsylvania]], and was added to McDonald's national menu the next year.<ref>{{Cite web |title=Big Mac creator Jim Delligatti dies at 98|url=https://www.usatoday.com/story/money/business/2016/11/30/big-mac-creator-jim-delligatti-dies/94664154/|publisher=[[Associated Press]]|via=[[USA Today]]|language=en-US|url-status=live|date=November 30, 2016|access-date=April 19, 2022|archive-date=December 1, 2016|archive-url=https://web.archive.org/web/20161201120108/https://www.usatoday.com/story/money/business/2016/11/30/big-mac-creator-jim-delligatti-dies/94664154/}}</ref>

        == 1970s ==
        [[File:McDonaldsHQIL.jpg|thumb|right|McDonald's Plaza in [[Oak Brook, Illinois]], home to company headquarters from 1971 to 2018]]
        [[File:New Zealand's first McDonald's restaurant, Porirua, 1976 (26357140254).jpg|thumb|right|New Zealand's first McDonald's restaurant, in [[Porirua]] in September 1976]]
        In 1970, the first restaurant outside of [[Northern America]] opened in [[San José, Costa Rica]].<ref name=":0">{{Cite web |last=Zúñiga |first=Alejandro |title=How McDonald's made history in Costa Rica |url=https://www.crcdaily.com/p/how-mcdonalds-made-history-in-costa |access-date=2024-01-05 |website=www.crcdaily.com |language=en}}</ref> In 1971,<ref>{{Cite web |title=Year of opening of the first McDonald's outlet by country in Europe |url=https://jakubmarian.com/year-of-opening-of-the-first-mcdonalds-outlet-europe/ |access-date=2023-12-25 |language=en}}</ref> McDonald's opened its first European restaurant in [[Zaandam]], [[Netherlands]] through a joint venture with supermarket chain [[Albert Heijn]] called Family Food N.V.<ref>{{cite web|url=https://resolver.kb.nl/resolve?urn=ddd:010558385:mpeg21:p003|title=Mc. Donald's medio 1971 geopend|newspaper=[[Nederlands Dagblad]]|language=nl|date=January 30, 1971|access-date=July 31, 2025|via=[[Delpher]]}}</ref><ref>{{Cite web |last=Iain |date=2016-05-13 |title=McDonald's Netherlands |url=https://foodchainmagazine.com/news/mcdonalds-netherlands/ |access-date=2023-12-25 |website=FoodChain Magazine |language=en-GB}}</ref> The first restaurant in [[Asia]] opened in [[Tokyo]], Japan in July 1971, and in December that year, the first German restaurant, which was then in [[West Germany]], opened in [[Munich]]–[[Obergiesing]].<ref>{{Cite web |date=2023-12-11 |title=McDonald's Germany - About Us |url=https://www.mcdonalds.com/de/de-de/ueber-uns/geschichte.html |url-status=live |archive-url=https://archive.today/20231211090050/https://www.mcdonalds.com/de/de-de/ueber-uns/geschichte.html |archive-date=2023-12-11 |website=McDonald's Germany - About Us}}</ref><ref>{{Cite web |title=McDonald |url=https://datenbank2.deutscher-nachhaltigkeitskodex.de/Profile/CompanyProfile/8881/en/2015/dnk?AspxAutoDetectCookieSupport=&AspxAutoDetectCookieSupport=1&AspxAutoDetectCookieSupport=1 |access-date=2023-12-25 |website=datenbank2.deutscher-nachhaltigkeitskodex.de}}</ref> The first restaurant in [[Oceania]] opened in 1971 in [[Yagoona, New South Wales|Yagoona]], [[Australia]].<ref>{{cite web | url=https://australianfoodtimeline.com.au/first-australian-mcdonalds/ | title=Australian food history timeline - First Australian McDonald's | date=September 20, 1970 }}</ref>

        In 1972, the National Black McDonald's Operators Association (NBMOA) was founded. Herman Petty, the first African American to franchise a McDonald's, helped establish the association and it soon became a representation of Black people's voices inside of the company.<ref>{{Cite web |last=Chatelain |first=Marcia |title=The complicated history of McDonald's and Black America |date=July 6, 2020 |url=https://www.marketplace.org/2020/07/06/the-complicated-history-of-mcdonalds-and-black-america/}}</ref>

        There was some skepticism about the company's phenomenal growth internationally. When Wally and [[Hugh Morris (businessman)|Hugh Morris]] approached the corporation in 1974 to bring McDonald's into [[New Zealand]], they were firmly shunned by Kroc who, citing a visit to the country, stated, "There aren't any people... I never met a more dead-than-alive hole in my life." The Morris brothers were finally granted a franchise in May 1975. They negotiated a deal with the corporation by selling New Zealand cheese to the U.S. to offset the high costs of importing plant equipment. The first New Zealand restaurant opened in June 1976 in [[Porirua]], near [[Wellington]], to much more success than the corporation had predicted.<ref>{{cite book |first= Rosemary |last= Hepözden |editor-first= Brian |editor-last= O'Flaherty |others= in co-op with McDonald's Restaurants (NZ) Ltd |title= Golden Arches under Southern Skies: Celebrating 35 years of McDonald's in New Zealand |year=2011 |publisher= Renaissance Publishing |location= Auckland |isbn= 978-0-9864521-1-6}}</ref> By this time McDonald's had also expanded into many more territories including [[France]], [[Sweden]], [[United Kingdom of Great Britain and Northern Ireland|Britain]] and [[Hong Kong]].<ref>{{cite web | title=Market Place (Published 1976) | website=[[The New York Times]] | date=December 27, 1976 | url=https://www.nytimes.com/1976/12/27/archives/market-place-how-analysts-view-mcdonalds.html }}</ref> By 1976, there were over 3,600 McDonald's restaurants in the U.S. and Canada.
        <ref>{{cite web | title=Market Place (Published 1976) | website=[[The New York Times]] | date=December 27, 1976 | url=https://www.nytimes.com/1976/12/27/archives/market-place-how-analysts-view-mcdonalds.html }}</ref>

        In 1979, the first McDonald's restaurant in [[Southeast Asia]] opened at [[Liat Towers]] in [[Orchard Road]], [[Singapore]].<ref>{{cite web |title=McDonald's Singapore franchise sold: A history of the Golden Arches here |url=https://www.straitstimes.com/singapore/mcdonalds-singapore-franchise-sold-a-history-of-the-golden-arches-here |website=The Straits Times |access-date=1 May 2024 |language=en |date=26 July 2016}}</ref> That same year also saw the opening of the first restaurant in [[South America]], in [[Rio De Janeiro]], [[Brazil]].<ref>{{cite web | title=McDonald's Brazil Has Big Plans: Daily | date=April 9, 2012 | url=https://www.riotimesonline.com/brazil-news/rio-business/mcdonalds-brazil-has-big-growth-plans/ }}</ref>

        == 1980s ==
        The first McDonald's outlet in Malaysia opened at [[Jalan Bukit Bintang]] on April 29, 1982.<ref>{{cite news |title=KL date for Hollywood stars |url=https://eresources.nlb.gov.sg/newspapers/digitised/article/straitstimes19820423-1.2.71.8?qt=mcdonald,%20malaysia&q=mcdonald%20malaysia |work=The Straits Times |date=April 23, 1982}}</ref>

        On July 18, 1984, there was a [[San Ysidro McDonald's massacre|mass shooting]] at a McDonald's restaurant in [[San Ysidro, California]]. The shooter killed 22 people and injured another 19 and the shooting itself ended when a SWAT sniper hit the shooter in the heart. After the shooting, the restaurant was cleaned up and rebuilt in two days. Due to community pressure, the restaurant was torn down and a memorial to the 22 slain was put on the property.

        On October 29, 1985, Saul Kahan, first Joint Venture Partner opened the first McDonald's restaurant in Mexico in Pedregal, Mexico City.<ref>{{cite web|url=https://monchitime.com/2015/10/mcdonalds-pedregal-primer-restaurante-de-la-franquicia-en-mexico-30-aniversario/|author=Berruecos, Pablo|title=McDonald's Pedregal, primer restaurante de la franquicia en México – 30 Aniversario|language=es|url-status=live|date=October 30, 2015|access-date=December 19, 2022|archive-date=February 10, 2018|archive-url=https://web.archive.org/web/20180210215340/https://monchitime.com/2015/10/mcdonalds-pedregal-primer-restaurante-de-la-franquicia-en-mexico-30-aniversario/}}</ref>

        In 1984, the company ran a promotion for the [[1984 Summer Olympics|1984 Olympics]] saying "[[McDonald's 1984 Olympics promotion|When the U.S. wins, you win]]," promising free food items for each medal the U.S. got. However, the [[1984 Summer Olympics boycott|Soviets organized a boycott]] and with minimal competition, the US dominated, winning 174 medals. Over 6,000 locations faced shortages, and the corporation has never admitted to how much money they lost, though it is estimated to be in the millions.<ref>{{Cite web |date=2016-10-11 |title=Let's Remember McDonald's Marketing Disaster In The 1984 Olympics |url=https://laist.com/news/food/mcdonalds-olympics |access-date=2024-04-05 |website=LAist |language=en}}</ref>

        In 1988, McDonald's Japan introduced prepaid cards at three of its outlets in Tokyo. Intended to make payments faster, it offered cards in 1,000, 3,000 and 5,000 yen denominations.<ref>{{cite news |title=McDonald's introduces pre-paid cards in Tokyo |url=https://eresources.nlb.gov.sg/newspapers/digitised/article/straitstimes19881103-1.2.11.12 |agency=Reuters |date=November 3, 1988}}</ref>

        == 1990s ==
        The first McDonald's Express locations opened in 1991. These are smaller-scale prototypes, usually constructed in prefabricated buildings or urban storefronts, that do not feature certain menu items such as milkshakes and Quarter Pounders.<ref>{{cite web|url=https://www.latimes.com/archives/la-xpm-1991-10-23-me-127-story.html|author=Johnson, Greg|title=Here's Your Hamburger, What's Your Hurry?: Fast food: A tiny prefabricated McDonald's going up at the 32nd Street Naval Station will be missing something: seats.|work=[[Los Angeles Times]]|language=en-US|date=October 23, 1991|access-date=December 19, 2022}}</ref>

        [[File:McDonalds in Sanya, China.JPG|thumb|right|A McDonald's soft drink/ice cream stand in [[Sanya]], Hainan, China in December 2005]]
        The first McDonald's in Mainland China opened in [[Dongmen, Shenzhen]] in October 1990.<ref>{{cite web|author=Symotiuk, Rose|url=http://www.thatsmags.com/shenzhen/post/9902/shenzhen-then-and-now-dongmen|title=Shenzhen then and now: Dongmen|publisher=[[That's Magazines|That's Shenzhen]]|date=2015-05-21|access-date=2016-12-09|archive-date=December 1, 2017|archive-url=https://web.archive.org/web/20171201035629/http://www.thatsmags.com/shenzhen/post/9902/shenzhen-then-and-now-dongmen|url-status=dead}}</ref>

        The Extra Value Meal, a burger, fries and drink combination deal, was introduced from 1993, originally as part of a ''[[Jurassic Park]]'' tie-in.<ref>{{cite news |url=https://www.nytimes.com/2014/05/16/business/coke-and-mcdonalds-working-hand-in-hand-since-1955.html|title=Coke and McDonald's, Growing Together Since 1955|work=[[The New York Times]]|date=May 15, 2014 |last1=Gelles |first1=David }}</ref>

        On April 28 and 29, 1992, the [[Taiwan McDonald's bombings]] occurred when bombs were planted in or near various McDonald's restaurants in Taiwan as part of an extortion attempt, causing the death of a policeman and injuries to four civilians, including two young children, and the temporary closure of all 57 McDonald's locations in that country.<ref>{{cite web|url=https://www.deseret.com/1992/4/29/18981348/bombs-explode-at-2-taiwan-mcdonald-s|title=Bombs Explode At 2 Taiwan McDonald's|newspaper=[[Deseret News]]|language=en-US|url-status=live|date=April 29, 1992|access-date=December 15, 2022|archive-date=December 15, 2022|archive-url=https://web.archive.org/web/20221215164115/https://www.deseret.com/1992/4/29/18981348/bombs-explode-at-2-taiwan-mcdonald-s}}</ref><ref>{{cite web|url=https://apnews.com/article/98cf847d49a9b2e6e00c9a74e8c6569e|title=McDonald's Reopens Nine Taiwan Outlets After Bombings|publisher=[[Associated Press]]|language=en-US|url-status=live|date=May 3, 1992|access-date=December 15, 2022|archive-date=December 15, 2022|archive-url=https://web.archive.org/web/20221215163316/https://apnews.com/article/98cf847d49a9b2e6e00c9a74e8c6569e}}</ref>

        A week later on May 7, [[Sydney River McDonald's murders]] took place in [[Sydney River]], [[Nova Scotia]], Canada when a botched robbery committed by employee Derek Wood and two accomplices resulted in the murder of three employees, and the permanent disablement of a fourth employee shot in the head.<ref>{{cite web|last1=King |first1=Nancy |url=https://www.saltwire.com/nova-scotia/news/lone-survivor-of-sydney-river-mcdonalds-murders-has-died-234771/|title=Lone survivor of Sydney River McDonald's murders has died|publisher=[[SaltWire Network]]|language=en|url-status=live|date=August 17, 2018|access-date=November 23, 2018|archive-date=October 2, 2022|archive-url=https://web.archive.org/web/20221002053536/https://www.saltwire.com/nova-scotia/news/lone-survivor-of-sydney-river-mcdonalds-murders-has-died-234771/}}</ref>

        On October 12, 1992, Mark Hopkins was electrocuted at McDonald's Manchester Arndale store.{{Citation needed|date=July 2025}}

        McDonald's Japan's 1,000th outlet opened in September 1993. It plans to boost sales by opening a novelty shop selling T-shirts and cotton kimonos emblazoned with golden arches and McDonald's characters and release a video game featuring Ronald McDonald with [[Sega Enterprises, Ltd.]]<ref name="joins in">{{cite news |title=Latecomer Burger King joins in Japan's hamburger wars |url=https://eresources.nlb.gov.sg/newspapers/digitised/article/straitstimes19930924-1.2.67.1?qt=mos,%20burger&q=MOS%20Burger |work=The Straits Times |agency=Associated Press |date=September 24, 1993}}</ref>

        McDonald's expanded in the [[Middle East]] in 1993-1994, opening its first stores in Israel and Saudi Arabia followed by Kuwait, Oman, Egypt, Bahrain and the United Arab Emirates.<ref>{{cite book|title=McDonald's in the Middle East: Navigating Political and Ethical Minefields|author=Mamoun Benmamoun|year=2023|publisher=NeilsonJournals Publishing}}</ref> In 1995, the first [[kosher]] McDonald's restaurant opened in Israel.<ref>{{cite web | title=First kosher McDonald&#039;s to open - UPI Archives | url=https://www.upi.com/Archives/1995/05/17/First-kosher-McDonalds-to-open/7136800683200/ }}</ref>

        In 1995, the [[McFlurry]] was first created by Canadian McDonald's franchise owner, Ron McLellan in [[Bathurst, New Brunswick]].<ref name="Our History"/>

        In 1997, the first McDonald's outlet in Bolivia was opened in Santa Cruz de la Sierra. In November 2002, McDonald's closed all its locations in that country,<ref>{{cite web | url=https://www.lavanguardia.com/cribeo/cultura/20171012/47420295576/las-razones-por-las-que-bolivia-es-el-unico-pais-donde-ha-quebrado-mcdonald-s.html | title=Las razones por las que Bolivia es el único país donde ha quebrado McDonald's | date=October 12, 2017 |language=es}}</ref> due to cultural rejection from citizens and the government, but especially due to losses from franchisee Arcos Dorados, enabling its exit from the Bolivian market effective November 30, 2002,<ref>{{cite news |title=Bolivia: McDonald's cierra sus puertas |url=http://news.bbc.co.uk/hi/spanish/business/newsid_2533000/2533535.stm |work=[[BBC News]] |archive-url=https://web.archive.org/web/20021202235046/http://news.bbc.co.uk/hi/spanish/business/newsid_2533000/2533535.stm |archive-date=December 2, 2002 |language=es}}</ref> making Bolivia and Cuba the only Latin American countries without McDonald's.<ref>{{Cite web |last=Fee |first=Mike |date=2014-07-11 |title=Why Bolivia Allows KFC and Starbucks, but Bans McDonald's |url=https://www.fool.com/investing/general/2014/07/11/why-bolivia-allows-kfc-and-starbucks-but-bans-mcdo.aspx |access-date=2023-08-28 |website=The Motley Fool |language=en}}</ref> Shortly after its closure, rival chain [[Burger King]] acquired its locations.<ref>{{cite news |title=Burger King compra restaurantes de Mc Donaldos |url=https://www.noticiasfides.com/nacional/sociedad/burger-king-compra-restaurantes-de-mc-donaldos-269523 |work=Agencia de Noticias Fides |language=es}}</ref>

        McDonald's offered pizza options in the 1990s.<ref>{{Cite web |last=Grimsditch |first=Lee |date=2022-05-19 |title=10 things from 1980s and 1990s you no longer see at McDonald's |url=https://www.liverpoolecho.co.uk/incoming/10-things-1980s-1990s-you-23990652 |access-date=2023-04-19 |website=Liverpool Echo |language=en}}</ref>

        == 2000s ==
        [[File:McDonald's i'mlovin'it-Logo.svg|thumb|200px|Logo used from 2003 to 2006/2007]]
        More than 11,000 McDonald's locations were opened outside the United States after the conclusion of the 1990s.<ref>{{Cite web |last=Reed |first=Eric |title=History of McDonald's: Timeline and Facts |date=November 9, 2023 |url=https://www.thestreet.com/markets/history-of-mcdonalds-15128096}}</ref> In 2000, a McDonald's in [[Dearborn, Michigan]] in [[Greater Detroit]] was the first one in Michigan and the only one east of the [[Mississippi River]] to offer [[halal]] food for [[Muslim]] customers.<ref>"Restaurant caters to Muslim customers." ''[[The Detroit News]]''. September 28, 2000. Retrieved on July 5, 2013. "A Dearborn McDonald's has become the first McDonald's restaurant in the state and the only McDonald's east of the Mississippi to offer food acceptable to strict Muslim dietary laws. The McDonald's at 14860 Michigan, east of Greenfield, now offers halal McNuggets. Halal is an Arabic word meaning lawful, or permitted. Halal meat is prepared according to the dictates of the Koran, much like kosher food. Muslims are[...]" Available from [http://nl.newsbank.com/nl-search/we/Archives?p_action=keyword&s_search_type=keyword&p_product=DTNB&p_theme=gannett&s_site=detnews the archives of] ''The Detroit News'': Article ID det8723702.</ref>

        == 2010s ==
        In January 2012, the company announced that revenue for 2011 reached an all-time high of $27 billion, and that 2,400 restaurants would be updated and 1,300 new ones opened worldwide.<ref>{{cite news|url=http://www.news-record.com/content/2012/01/25/article/mcdonalds_unveils_chicken_mcbites |archive-url=https://archive.today/20120905091852/http://www.news-record.com/content/2012/01/25/article/mcdonalds_unveils_chicken_mcbites |url-status=dead |archive-date=2012-09-05 |title=McDonald's Unveils Chicken McBites |date=2012-01-25 |work=Los Angeles Times }}</ref>

        In the middle of the decade, the restaurant began to suffer from declining profits.<ref name="KLFY">{{cite web|title=McDonald's franchisees say all-day breakfast launch a disaster|url=http://klfy.com/2015/10/17/mcdonalds-franchisees-say-all-day-breakfast-launch-a-disaster/|website=KFLY|date=October 17, 2015|access-date=15 September 2017}}</ref> In response, McDonald's began to offer a limited selection of its breakfast menu all day starting in 2015.<ref>{{cite web|last1=Little|first1=Katie|title=McDonald's all-day breakfast? The wait is over for some|url=https://www.cnbc.com/2015/10/01/mcdonalds-to-serve-breakfast-all-day.html|website=CNBC|date=October 2015}}</ref> At first, the launch was unpopular with franchisees who claimed that the changes caused service to slow down.<ref name="KLFY"/> However, the plan paid off with [[CNBC]] reporting that the company's fourth quarter earnings "easily topped analysts' forecasts".<ref>{{cite web|last1=La Monica|first1=Paul R|title=McDonald's sales soar thanks to all day breakfast|url=https://money.cnn.com/2016/01/25/investing/mcdonalds-earnings/index.html|archive-url=https://web.archive.org/web/20160126050136/http://money.cnn.com/2016/01/25/investing/mcdonalds-earnings/index.html|url-status=dead|archive-date=January 26, 2016|website=CNBC|access-date=15 September 2017|date=2016-01-25}}</ref>

        On July 22, 2016, the [[2016 Munich shooting]] took place when David Sonboly, an 18-year-old German-Iranian man, opened fire at a McDonald's restaurant known to be frequented by immigrants, before shooting at bystanders in the street outside and then in [[Olympia-Einkaufszentrum|Olympia shopping mall]], and then killing himself. Nine people were killed,<ref>{{cite web|url=https://www.dw.com/en/germany-2016-munich-attack-had-radical-right-wing-motives-say-police/a-50991641|title='Radical right-wing' motives in Munich 2016 attack|publisher=[[Deutsche Welle]]|language=en|url-status=live|date=October 25, 2019|access-date=December 15, 2022|archive-date=December 15, 2022|archive-url=https://web.archive.org/web/20221215050220/https://www.dw.com/en/germany-2016-munich-attack-had-radical-right-wing-motives-say-police/a-50991641}}</ref> and 16 more injured.<ref>{{cite web|url=http://www.cnn.com/2016/07/22/europe/germany-munich-shooting/index.html|title=Munich shooting: 9 victims, gunman dead|author1=Shoichet, Catherine E. |author2=Ellis, Ralph|author3=Hanna, Jason|publisher=[[CNN]]|language=en-US|url-status=live|date=July 23, 2016|access-date=December 15, 2022|archive-date=October 24, 2022|archive-url=https://web.archive.org/web/20221024023553/http://edition.cnn.com/2016/07/22/europe/germany-munich-shooting/index.html}}</ref>

        == 2020s ==
        On March 8, 2022, McDonald's suspended operations at all 850 of its locations in Russia, in response to the [[Russian invasion of Ukraine]] twelve days prior. The move comes after similar decisions by other Western companies and pressure from critics.<ref name=CNN3.10.22>{{cite web|author=Wiener-Bronner, Danielle|url=https://edition.cnn.com/2022/03/10/business/mcdonalds-russia-history/index.html|title=McDonald's transformed Russia ... now it's abandoning the country|publisher=[[CNN]]|language=en-US|url-status=live|date=March 10, 2022|access-date= March 12, 2022|archive-date=March 11, 2022|archive-url=https://web.archive.org/web/20220311005749/https://edition.cnn.com/2022/03/10/business/mcdonalds-russia-history/index.html}}</ref> The brand relaunched on June 12, 2022 as '[[Vkusno & tochka]]' (Вкусно и точка, Tasty and that's it) by local franchisee Alexander Govor.<ref>{{cite web|url=https://www.kommersant.ru/doc/5407638|title=Сменившую McDonald's в России сеть ресторанов назвали "Вкусно — и точка"|website=[[Kommersant]]|date=12 June 2022}}</ref>

        In July 2022, McDonald's bought its Florida franchisee Caspers Company.<ref>{{cite news |last1=Maze |first1=Jonathan |title=McDonald's is buying out one of its biggest and most prominent franchisees |url=https://www.restaurantbusinessonline.com/financing/mcdonalds-buying-out-one-its-biggest-most-prominent-franchisees |access-date=17 July 2025 |work=Restaurant Business |date=11 July 2022 |language=en}}</ref><ref>{{cite news |last1=Ruggless |first1=Ron |title=McDonald's to buy out Caspers Company franchise group |url=https://www.nrn.com/quick-service/mcdonald-s-to-buy-out-caspers-company-franchise-group |access-date=17 July 2025 |work=Nation's Restaurant News |date=12 July 2022 |language=en}}</ref>

