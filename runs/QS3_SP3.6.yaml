        URL: https://en.wikipedia.org/wiki/Portuguese_Inquisition
        Extract: The Portuguese Inquisition (Portuguese: Inquisição Portuguesa), officially known as the General Council of the Holy Office of the Inquisition in Portugal, was formally established in Portugal in 1536 at a long-standing request of King John III.
        It was one of three different manifestations of the wider Christian Inquisition, along with the Spanish Inquisition and Roman Inquisition, that survived in the period after the Medieval Inquisition. The Goa Inquisition was an extension of the Portuguese Inquisition in colonial-era Portuguese India. The Portuguese Inquisition was terminated in 1821.

        ## Result 7
        Title: Torture chamber
        URL: https://en.wikipedia.org/wiki/Torture_chamber
        Extract: A torture chamber is a room equipped, and sometimes specially constructed, for the infliction of torture. The medieval torture chamber was windowless and often built underground, dimly lit and specifically designed to induce horror, dread and despair.
        Historically, torture chambers were located in royal palaces, in castles of the nobility and even buildings belonging to the church. They featured secret trap-doors which could be activated to throw victims into dark dungeons where they remained and eventually died. The skeletal remains of people who disappeared were strewn on the floor of the hidden dungeons. Other times the dungeons under the trap-doors included pits of water where the victim was thrown to drown after a lengthy torture session in the chamber above.
        In Peru, the torture chambers of the Spanish Inquisition were specifically constructed with thick walls so that the screams of the victims could not penetrate them and no sound could be heard from the outside. Other more sophisticated designs used principles of acoustics to muffle the screams of the tortured and included walls which recessed and protruded in such a fashion as to reflect the screams of the victims so that the sounds would not be carried to the exterior.
        The mere presence of the torture chamber was used as a form of intimidation and coercion. The victims were first shown the chamber and if they confessed they would not be tortured inside it. Other times the torture chamber was used as the final destination in a series of prison cells where the victims would gradually be moved from one type of cell to another, under progressively worsening conditions of incarceration, and if they did not recant in the earlier stages they would finally reach the torture chamber. The final stage of actually going to the torture chamber itself, just prior to the initiation of torture, was euphemistically called the "Question".

        ## Result 8
        Title: Black Legend of the Spanish Inquisition
        URL: https://en.wikipedia.org/wiki/Black_Legend_of_the_Spanish_Inquisition
        Extract: The Black Legend of the Spanish Inquisition is the hypothesis of the existence of a series of myths and fabrications about the Spanish Inquisition used as propaganda against the Spanish Empire in a time of strong military, commercial and political rivalry between European powers, starting in the 16th century. According to its advocates, Protestant propaganda depicted inquisitions of Catholic monarchs as the epitome of human barbarity with fantastic scenes of torture, witch hunting, and evil friars. Proponents of the theory see it as part of the Spanish Black Legend propaganda, as well as of anti-Catholic propaganda, and one of the most recurrent black legend themes.

        ## Result 9
        Title: Water cure (torture)
        URL: https://en.wikipedia.org/wiki/Water_cure_(torture)
        Extract: Water cure is a form of torture in which the victim is forced to drink large quantities of water in a short time, resulting in gastric distension, water intoxication, and possibly death.
        Often the victim has the mouth forced or wedged open, the nose closed with pincers and a funnel or strip of cloth forced down the throat. The victim has to drink all the water (or other liquids) poured into the funnel to avoid drowning. The stomach fills until near bursting, swelling up in the process and is sometimes beaten until the victim vomits and the torture begins again.
        While this use of water as a form of torture is documented to at least the 15th century, the first use of the phrase water cure in this sense is indirectly dated to around 1898, by U.S. soldiers in the Spanish–American War, after the phrase had been introduced to America in the mid-19th century in the therapeutic sense, which was in widespread use. Indeed, while the sense of the phrase water cure as a method of torture was by 1900–1902 established in the U.S. Army, with a conscious sense of irony, this sense was not in widespread use. Webster's 1913 dictionary cited only the therapeutic sense.
        Torture that makes use of water still exists under the name of waterboarding. In this variation, emphasis is placed on inducing the sensation of drowning rather than forcing the individual to consume, and subsequently regurgitate, large quantities of water.

        ## Result 10
        Title: Roman Inquisition
        URL: https://en.wikipedia.org/wiki/Roman_Inquisition
        Extract: The Roman Inquisition, formally Suprema Congregatio Sanctae Romanae et Universalis Inquisitionis (Latin for 'the Supreme Sacred Congregation of the Roman and Universal Inquisition'), was a system of partisan tribunals developed by the Holy See of the Catholic Church, during the second half of the 16th century, responsible for prosecuting individuals accused of a wide array of crimes according to Catholic law and doctrine, relating to Catholic religious life or alternative religious or secular beliefs. It was established in 1542 by the leader of the Catholic Church, Pope Paul III. In the period after the Medieval Inquisition, it was one of three different manifestations of the wider Catholic Inquisition, the other two being the Spanish Inquisition and Portuguese Inquisition.
