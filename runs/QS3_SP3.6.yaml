      text: |-
        The Spanish Inquisition used three officially permitted torture methods:

        1. **Garrucha (Strappado)** — The victim's hands were tied behind their back and they were suspended by their wrists, sometimes with weights attached to their feet. The body was repeatedly raised and dropped, causing violent dislocations of the shoulders.

        2. **Toca (Water interrogation)** — The victim was restrained and forced to ingest water poured from a jar, simulating drowning. This is the historical precursor to modern waterboarding.

        3. **Potro (The Rack)** — Limbs were stretched apart; this was likely the most commonly used method.

        **Additional notes from Wikipedia:**
        - Torture was applied only when guilt was considered "half proven," per Torquemada's *instrucciones*.
        - Church law prohibited drawing blood, maiming, or causing permanent damage, though broken limbs and death still occurred in practice.
        - A physician was typically required to certify the prisoner's health before torture was administered.
        - Confessions extracted under torture were formally declared "true, not forced."
        - Frequency of torture varied significantly by tribunal, time period, and type of offense.
