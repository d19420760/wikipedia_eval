        \ Result 8\nTitle: S-50 (Manhattan Project)\nURL: https://en.wikipedia.org/wiki/S-50_(Manhattan_Project)\n\
        Extract: The S-50 Project was the Manhattan Project's effort to produce enriched\
        \ uranium by liquid thermal diffusion during World War II. It was one of three\
        \ technologies for uranium enrichment pursued by the Manhattan Project.\n\
        The liquid thermal diffusion process was not one of the enrichment technologies\
        \ initially selected for use in the Manhattan Project, and was developed independently\
        \ by Philip H. Abelson and other scientists at the United States Naval Research\
        \ Laboratory. This was primarily due to doubts about the process's technical\
        \ feasibility, but inter-service rivalry between the United States Army and\
        \ United States Navy also played a part.\nPilot plants were built at the Anacostia\
        \ Naval Air Station and the Philadelphia Navy Yard, and a production facility\
        \ at the Clinton Engineer Works in Oak Ridge, Tennessee. This was the only\
        \ production-scale liquid thermal diffusion plant ever built. It could not\
