        \ making her the highest-certified female album artist. On the Billboard 200\
        \ chart, she has accumulated 15 albums and 98 total weeks at number one, more\
        \ than any other solo act.\nSwift released six albums with Big Machine Records.\
        \ Her debut album, Taylor Swift (2006), spent more weeks on the Billboard\
        \ 200 than any other album in the 2000s decade, and her second, Fearless (2008),\
        \ was the only album from the 2000s decade to spend one year in the top 10\
        \ of the Billboard 200. Fearless was Swift's first album to top the charts\
        \ in Australia, Canada, and New Zealand. Her next albums—Speak Now (2010),\
        \ Red (2012), 1989 (2014), and Reputation (2017)—all reached number one on\
        \ the Billboard 200, and each of them sold over one million US first-week\
        \ copies. All four albums reached number one in Australia, Canada, and New\
        \ Zealand; and the latter three all reached number one in the United Kingdom.\n\
        Under a recording contract with Republic Records signed in 2018, Swift has\
        \ released six original albums—Lover (2019), Folklore (2020), Evermore (2020),\
        \ Midnights (2022), The Tortured Poets Department (2024), and The Life of\
        \ a Showgirl (2025)—all of them peaked atop the Billboard 200. Lover was Swift's\
        \ first to reach number one in Spain and Sweden. Midnights, The Tortured Poets\
        \ Department, and The Life of a Showgirl each sold one million first-week\
        \ copies in the United States, and they reached number one in Australia, Canada,\
        \ Denmark, Ireland, New Zealand, Spain, Norway, and the United Kingdom. In\
        \ the United States, The Tortured Poets Department was Swift's first album\
        \ to open with two million units first-week, and The Life of a Showgirl opened\
        \ with four million units, becoming the fastest-selling album in modern American\
        \ history.\nSwift's departure from Big Machine resulted in a dispute over\
        \ the ownership of her first six albums in 2019, which resulted in her re-recording\
        \ four albums—Fearless (Taylor's Version) (2021), Red (Taylor's Version) (2021),\
        \ Speak Now (Taylor's Version) (2023), and 1989 (Taylor's Version) (2023)—all\
        \ of which reached number one in Australia, Canada, Ireland, New Zealand,\
        \ the United Kingdom, and the United States. Fearless (Taylor's Version) was\
        \ the first re-recorded album to top the Billboard 200, and 1989 (Taylor's\
        \ Version) sold over a million US first-week copies. Swift holds the record\
        \ for the most annual best-selling albums in the United States—nine times:\
        \ Fearless in 2009, 1989 in 2014, Reputation in 2017, Lover in 2019, Folklore\
        \ in 2020, Midnights in 2022, 1989 (Taylor's Version) in 2023, The Tortured\
        \ Poets Department in 2024, and The Life of a Showgirl in 2025.\n\n## Result\
        \ 2\nTitle: List of songs by Taylor Swift\nURL: https://en.wikipedia.org/wiki/List_of_songs_by_Taylor_Swift\n\
        Extract: The American singer-songwriter Taylor Swift has written or co-written\
        \ every song in her twelve-album discography, with the exception of several\
        \ cover versions and guest features. She has also written standalone singles,\
        \ songs for film soundtracks, and songs recorded by other artists.\nSwift\
        \ signed a publishing contract with Sony/ATV Tree Music Publishing to become\
        \ a professional songwriter in 2005. She signed with Big Machine Records in\
        \ 2005, and the label released her first six studio albums until the contract\
        \ expired in 2018. Her early-career songwriting outputs featured collaborations\
        \ with Liz Rose, who co-wrote with Swift for the albums Taylor Swift (2006),\
        \ Fearless (2008), and Red (2012). She was the sole writer of the majority\
        \ of Fearless and Red, and she wrote her third studio album, Speak Now, solely\
        \ herself. Promoted to country radio, these four albums incorporate mainstream\
        \ pop and rock elements, and some Red songs feature influences of electronic\
        \ and hip-hop. She recalibrated her artistry from country to pop with her\
        \ fifth studio album, 1989 (2014), which includes writing collaborations with\
        \ Jack Antonoff, Max Martin, and Shellback. The three writers-producers worked\
        \ with Swift again on her sixth studio album, Reputation (2017).\nSwift signed\
        \ with Republic Records in 2018 and has worked with Antonoff on every album\
        \ she released thereafter. Her first album under Republic, Lover (2019), is\
        \ a pop album that features collaborations with Ryan Tedder, Joel Little,\
        \ Louis Bell, and Frank Dukes. In 2020, Swift signed a new publishing deal\
        \ with Universal Music Publishing Group and released two albums, Folklore\
        \ and Evermore, which both incorporate indie folk. Folklore and Evermore contains\
        \ collaborations with Aaron Dessner, who became a frequent collaborator with\
        \ Swift in the subsequent albums, Midnights (2022) and The Tortured Poets\
        \ Department (2024), which both have a synth-pop sound. Swift's former boyfriend,\
        \ the actor Joe Alwyn, co-wrote several songs with her for Folklore, Evermore,\
        \ and Midnights. For her twelfth studio album, The Life of a Showgirl (2025),\
        \ Swift co-wrote and co-produced every track with Martin and Shellback.  \n\
        Swift's departure from Big Machine resulted in a public dispute over the ownership\
        \ of her first six albums in 2019, and she re-recorded them to claim ownership\
        \ to their master recordings. From 2021 to 2023, she released four re-recorded\
        \ albums—Fearless (Taylor's Version), Red (Taylor's Version), Speak Now (Taylor's\
        \ Version), and 1989 (Taylor's Version); each includes unreleased songs Swift\
        \ had written but excluded from the original releases.\n\n## Result 3\nTitle:\
        \ Taylor Swift singles discography\nURL: https://en.wikipedia.org/wiki/Taylor_Swift_singles_discography\n\
        Extract: The American singer-songwriter Taylor Swift has released 68 singles\
        \ as lead artist, 9 singles as a featured artist, and 41 promotional singles.\
        \ As of May 2025, Swift had achieved 137.5 million certified digital single\
        \ units based on sales and on-demand streaming by the Recording Industry Association\
        \ of America (RIAA). On the Billboard Hot 100, as of February 2026, she has\
